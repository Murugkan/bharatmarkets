<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
    <title>Portfolio Data</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg:#000; --s1:#0a0a0a; --b1:#222; --bl:#00f2ff; --gr:#00ff88; --rd:#ff4d6d; --tx:#fff; }
        *{box-sizing:border-box;margin:0;padding:0;}
        body { background:var(--bg); color:var(--tx); font-family:'JetBrains Mono',monospace; padding-bottom:80px; }
        header { background:var(--s1); border-bottom:1px solid var(--b1); padding:12px; display:flex; justify-content:space-between; align-items:center; }
        .title { font-size:14px; font-weight:800; color:var(--bl); }
        .header-right { display:flex; gap:10px; }
        button { padding:8px 12px; background:#00ff88; color:#000; border:none; border-radius:4px; cursor:pointer; font-weight:bold; font-size:11px; }
        button:hover { opacity:0.9; }
        .container { padding:15px; max-width:100%; margin:0 auto; }
        .refresh-section { background:#0a0a0a; border:1px solid var(--b1); border-radius:8px; padding:15px; margin-bottom:20px; }
        .refresh-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(250px, 1fr)); gap:15px; }
        .refresh-card { background:#050505; border:1px solid var(--b1); border-radius:6px; padding:12px; }
        .refresh-card-title { font-size:11px; color:var(--bl); font-weight:800; margin-bottom:8px; }
        .refresh-btn { width:100%; padding:10px; background:var(--gr); color:#000; border:none; border-radius:4px; font-weight:bold; cursor:pointer; font-size:11px; }
        .refresh-btn:hover { opacity:0.9; }
        .table-wrap { overflow-x:auto; background:#050505; border:1px solid var(--b1); border-radius:8px; margin-top:20px; max-height:600px; overflow-y:auto; }
        table { width:100%; border-collapse:collapse; font-size:10px; }
        th { background:#111; color:#00ff88; padding:8px; text-align:left; border-bottom:1px solid var(--b1); position:sticky; top:0; font-weight:800; }
        td { padding:8px; border-bottom:0.5px solid #111; }
        tr:hover { background:#0a0a0a; }
        .pos { color:#00ff88; }
        .neg { color:#ff6b85; }
        
        footer { position:fixed; bottom:0; width:100%; background:rgba(0,0,0,0.95); border-top:1px solid #222; display:flex; justify-content:space-around; padding:12px 0; z-index:1000; }
        .nav-btn { text-decoration:none; color:#666; display:flex; flex-direction:column; align-items:center; width:33%; padding:8px 0; transition:color 0.2s; }
        .nav-btn:hover { color:var(--bl); }
        .nav-btn.active { color:var(--bl); font-weight:800; }
        .nav-label { font-size:8px; margin-top:4px; font-weight:800; text-transform:uppercase; letter-spacing:1px; }
    </style>
</head>
<body>

<header>
    <div class="title">📊 PORTFOLIO DATA</div>
    <div class="header-right">
        <button onclick="openImportWorkflow()">📥 Load</button>
        <button onclick="location.reload()">🔄 Reload</button>
        <button onclick="exportData()">📤 Export</button>
    </div>
</header>

<div class="container">
    <!-- Refresh Controls -->
    <div class="refresh-section">
        <div class="refresh-grid">
            <div class="refresh-card">
                <div class="refresh-card-title">📈 Refresh Prices</div>
                <button class="refresh-btn" onclick="refreshPrices()">Refresh Prices</button>
                <div style="font-size:9px;color:#666;margin-top:8px;">Last Updated: Never</div>
            </div>
            <div class="refresh-card">
                <div class="refresh-card-title">💹 Refresh Fundamentals</div>
                <button class="refresh-btn" onclick="refreshFundamentals()">Refresh Fundamentals</button>
                <div style="font-size:9px;color:#666;margin-top:8px;">Last Updated: Never</div>
            </div>
            <div class="refresh-card">
                <div class="refresh-card-title">🔗 Full Sync & Reload</div>
                <button class="refresh-btn" onclick="fullSync()">Full Sync & Reload</button>
                <div style="font-size:9px;color:#666;margin-top:8px;">Last Updated: Never</div>
            </div>
        </div>
    </div>
    
    <!-- Data Table -->
    <div class="table-wrap">
        <table id="portfolio-table">
            <thead>
                <tr>
                    <th>Symbol</th>
                    <th>Name</th>
                    <th>Type</th>
                    <th>QTY</th>
                    <th>AVG</th>
                    <th>LTP</th>
                    <th>Invested</th>
                    <th>Current</th>
                    <th>P&L</th>
                    <th>P&L%</th>
                    <th>Sector</th>
                    <th>ISIN</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="portfolio-body">
                <tr><td colspan="13" style="text-align:center;padding:20px;color:#666;">No data loaded</td></tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Footer -->
<footer>
    <a href="index.html" class="nav-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>
        <span class="nav-label">Portfolio</span>
    </a>
    <a href="data.html" class="nav-btn active">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"></path><path d="M21 3v5h-5"></path><path d="M21 12a9 9 0 0 1-9 9 9.76 9.76 0 0 1-6.74-2.74L3 16"></path><path d="M3 21v-5h5"></path></svg>
        <span class="nav-label">Data</span>
    </a>
    <a href="nexus.html" class="nav-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
        <span class="nav-label">Import</span>
    </a>
</footer>

<script src="app-import.js"></script>
<script>
function refreshPrices() {
    if (typeof refreshPortfolioData === 'function') {
        refreshPortfolioData();
    } else {
        alert('Prices refresh - loading prices.json');
    }
}

function refreshFundamentals() {
    if (typeof loadFundamentals === 'function') {
        loadFundamentals(true);
    } else {
        alert('Fundamentals refresh - loading fundamentals.json');
    }
}

function fullSync() {
    refreshPrices();
    refreshFundamentals();
    location.reload();
}

function exportData() {
    var DB_NAME = "OnyxPortfolioDB";
    var STORE_NAME = "Stocks";
    
    try {
        var request = indexedDB.open(DB_NAME, 8);
        
        request.onsuccess = function(e) {
            var db = e.target.result;
            var tx = db.transaction(STORE_NAME, 'readonly');
            var store = tx.objectStore(STORE_NAME);
            var getAll = store.getAll();
            
            getAll.onsuccess = function() {
                var portfolio = getAll.result || [];
                
                if (portfolio.length === 0) {
                    alert('No portfolio data to export');
                    return;
                }
                
                var csv = 'Symbol,Name,Type,QTY,AVG,LTP,Sector,ISIN\n';
                for (var i = 0; i < portfolio.length; i++) {
                    var s = portfolio[i];
                    csv += (s.SYM || s.sym || '-') + ',' + (s.name || '-') + ',' + (s.type || 'PORTFOLIO') + ',' + (s.QTY || s.qty || 0) + ',' + (s.AVG || s.avg || 0) + ',' + (s.LTP || s.ltp || 0) + ',' + (s.SECTOR || s.sector || '-') + ',' + (s.isin || '-') + '\n';
                }
                
                var blob = new Blob([csv], {type:'text/csv'});
                var url = URL.createObjectURL(blob);
                var a = document.createElement('a');
                a.href = url;
                a.download = 'portfolio-' + new Date().toISOString().split('T')[0] + '.csv';
                a.click();
            };
        };
    } catch(e) {
        console.error('Error exporting data:', e);
        alert('Error exporting data');
    }
}

function loadPortfolioTable() {
    // Load portfolio from IndexedDB (OnyxPortfolioDB)
    var DB_NAME = "OnyxPortfolioDB";
    var STORE_NAME = "Stocks";
    
    try {
        var request = indexedDB.open(DB_NAME, 8);
        
        request.onerror = function() {
            console.error('Failed to open IndexedDB');
            renderTable([]);
        };
        
        request.onsuccess = function(e) {
            var db = e.target.result;
            var tx = db.transaction(STORE_NAME, 'readonly');
            var store = tx.objectStore(STORE_NAME);
            var getAll = store.getAll();
            
            getAll.onerror = function() {
                console.error('Failed to get stocks from IndexedDB');
                renderTable([]);
            };
            
            getAll.onsuccess = function() {
                var stocks = getAll.result || [];
                renderTable(stocks);
            };
        };
    } catch(e) {
        console.error('Error accessing IndexedDB:', e);
        renderTable([]);
    }
}

function renderTable(portfolio) {
    var tbody = document.getElementById('portfolio-body');
    if (portfolio.length === 0) {
        tbody.innerHTML = '<tr><td colspan="13" style="text-align:center;padding:20px;color:#666;">No data loaded</td></tr>';
        return;
    }
    
    var html = '';
    for (var i = 0; i < portfolio.length; i++) {
        var s = portfolio[i];
        // Handle both uppercase (from IndexedDB) and lowercase field names
        var sym = s.SYM || s.sym || '-';
        var name = s.name || '-';
        var type = s.type || 'PORTFOLIO';
        var qty = s.QTY || s.qty || 0;
        var avg = s.AVG || s.avg || 0;
        var ltp = s.LTP || s.ltp || 0;
        var sector = s.SECTOR || s.sector || '-';
        var isin = s.isin || '-';
        
        var invested = qty * avg;
        var current = qty * ltp;
        var pnl = current - invested;
        var pnlPct = invested > 0 ? ((pnl / invested) * 100) : 0;
        var pnlClass = pnl >= 0 ? 'pos' : 'neg';
        
        html += '<tr><td>' + sym + '</td><td>' + name + '</td><td>' + type + '</td><td>' + qty + '</td><td>₹' + parseFloat(avg).toFixed(2) + '</td><td>₹' + parseFloat(ltp).toFixed(2) + '</td><td>₹' + invested.toFixed(2) + '</td><td>₹' + current.toFixed(2) + '</td><td class="' + pnlClass + '">₹' + pnl.toFixed(2) + '</td><td class="' + pnlClass + '">' + pnlPct.toFixed(2) + '%</td><td>' + sector + '</td><td>' + isin + '</td><td><button onclick="deleteStock(' + i + ')" style="background:#ff6b85;color:#fff;padding:2px 6px;font-size:9px;border:none;border-radius:2px;cursor:pointer;">✕</button></td></tr>';
    }
    tbody.innerHTML = html;
}

function deleteStock(idx) {
    alert('Delete - coming soon');
}

function closeImportModal() {
    var modal = document.getElementById('import-modal');
    if (modal) {
        modal.style.display = 'none';
    }
}

// Load table on page load
window.addEventListener('DOMContentLoaded', loadPortfolioTable);
</script>

</body>
</html>
