name: fetch_screener_data

on:
  workflow_dispatch:

jobs:
  fetch_screener:
    runs-on: ubuntu-latest
    timeout-minutes: 480

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r fetch_financials_screener_requirements.txt

      - name: Create directories
        run: mkdir -p data/logs

      - name: Run scraper
        run: python fetch_screener_financials.py --symbols 99

      - name: Commit results to repo
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add data/screener_financials.json data/logs/
          git commit -m "Update screener data - $(date)" || echo "No changes to commit"
          git push

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results
          path: |
            data/screener_financials.json
            data/logs/
          retention-days: 30
