name: Fetch Screener Data

on:
  workflow_dispatch:
    inputs:
      symbols_limit:
        description: 'Number of symbols to fetch'
        required: false
        default: '10'
      resume:
        description: 'Resume from checkpoint'
        required: false
        default: 'false'

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 480
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - run: pip install -r requirements.txt
      
      - run: mkdir -p data logs
      
      - name: Run scraper
        run: |
          ARGS=""
          if [ ! -z "${{ inputs.symbols_limit }}" ]; then
            ARGS="--symbols ${{ inputs.symbols_limit }}"
          fi
          if [ "${{ inputs.resume }}" = "true" ]; then
            ARGS="$ARGS --resume"
          fi
          python fetch_financials_screener.py $ARGS
      
      - name: Commit results to repo
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add data/ logs/
          git commit -m "Update screener data - $(date)" || echo "No changes to commit"
          git push
      
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results
          path: |
            data/
            logs/
          retention-days: 30
