name: Fetch Screener Financial Data

on:
  workflow_dispatch:
    inputs:
      symbols_limit:
        description: 'Number of symbols to fetch (leave empty for all)'
        required: false
        default: ''
      resume:
        description: 'Resume from checkpoint'
        required: true
        type: choice
        default: 'false'
        options:
          - 'true'
          - 'false'
      upload_artifacts:
        description: 'Upload results as artifacts'
        required: true
        type: choice
        default: 'true'
        options:
          - 'true'
          - 'false'

env:
  PYTHON_VERSION: '3.11'
  PIP_CACHE_VERSION: 1

jobs:
  fetch-screener-data:
    runs-on: ubuntu-latest
    timeout-minutes: 480  # 8 hours max
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser chromium-chromedriver
          echo "Chromium version:"
          chromium-browser --version
          echo "ChromeDriver version:"
          chromedriver --version
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium beautifulsoup4 requests lxml
          echo "Installed packages:"
          pip list | grep -E "selenium|beautifulsoup4|requests|lxml"
      
      - name: Create data directory
        run: mkdir -p data logs
      
      - name: Check unified-symbols.json
        run: |
          if [ ! -f "unified-symbols.json" ]; then
            echo "❌ unified-symbols.json not found!"
            echo "Creating example file..."
            cat > unified-symbols.json << 'EOF'
          [
            {"symbol": "INFY"},
            {"symbol": "TCS"},
            {"symbol": "WIPRO"},
            {"symbol": "HBLPOWER"},
            {"symbol": "BAJAJFINSV"},
            {"symbol": "RELIANCE"}
          ]
          EOF
            echo "Created example with 6 symbols. Add your symbols to the file."
          fi
          echo "Symbols count:"
          python3 -c "import json; data=json.load(open('unified-symbols.json')); print(f'  Total: {len(data) if isinstance(data, list) else len(data.get(\"symbols\", []))} symbols')"
      
      - name: Display configuration
        run: |
          echo "=== Configuration ==="
          echo "Symbols limit: ${{ inputs.symbols_limit || 'All' }}"
          echo "Resume: ${{ inputs.resume }}"
          echo "Upload artifacts: ${{ inputs.upload_artifacts }}"
          echo "Python version: ${{ env.PYTHON_VERSION }}"
          echo "Runner OS: ${{ runner.os }}"
      
      - name: Run Screener scraper
        id: scrape
        run: |
          ARGS=""
          
          # Add symbols limit if provided
          if [ ! -z "${{ inputs.symbols_limit }}" ]; then
            ARGS="$ARGS --symbols ${{ inputs.symbols_limit }}"
          fi
          
          # Add resume flag if true
          if [ "${{ inputs.resume }}" = "true" ]; then
            ARGS="$ARGS --resume"
          fi
          
          echo "Running: python fetch_financials_screener.py $ARGS"
          python fetch_financials_screener.py $ARGS
          
          # Capture exit code
          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          exit $EXIT_CODE
      
      - name: Check output files
        if: always()
        run: |
          echo "=== Output Files ==="
          ls -lh data/ || echo "No data directory"
          echo ""
          echo "=== Log File ==="
          tail -20 logs/screener_scraper.log 2>/dev/null || echo "No log file"
      
      - name: Generate summary
        if: always()
        run: |
          echo "## 📊 Scraper Execution Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Configuration" >> $GITHUB_STEP_SUMMARY
          echo "- **Symbols limit**: ${{ inputs.symbols_limit || 'All' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Resume**: ${{ inputs.resume }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Runner**: ${{ runner.os }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -f "data/screener-history.json" ]; then
            echo "### ✅ Results" >> $GITHUB_STEP_SUMMARY
            echo "- **Output JSON**: data/screener-history.json" >> $GITHUB_STEP_SUMMARY
            echo "- **Output CSV**: data/screener-raw.csv" >> $GITHUB_STEP_SUMMARY
            
            # Extract stats from JSON
            python3 << 'PYTHON_EOF' >> $GITHUB_STEP_SUMMARY
          import json
          try:
            with open('data/screener-history.json', 'r') as f:
              data = json.load(f)
            meta = data.get('metadata', {})
            print(f"- **Total Scraped**: {meta.get('total_scraped', 'N/A')}")
            print(f"- **Total Failed**: {meta.get('total_failed', 'N/A')}")
            print(f"- **Success Rate**: {meta.get('success_rate', 'N/A')}")
            print(f"- **Duration**: {meta.get('duration_seconds', 'N/A')} seconds")
          except:
            print("- Error reading results file")
          PYTHON_EOF
          else
            echo "### ❌ No results" >> $GITHUB_STEP_SUMMARY
            echo "Check the logs for errors." >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📋 Files" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          ls -lh data/ logs/ 2>/dev/null || echo "No output files" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
      
      - name: Upload results as artifacts
        if: ${{ inputs.upload_artifacts == 'true' && always() }}
        uses: actions/upload-artifact@v4
        with:
          name: screener-results
          path: |
            data/screener-history.json
            data/screener-raw.csv
            logs/fetch_financials_screener.log
          retention-days: 30
          if-no-files-found: warn
      
      - name: Upload data to release (optional)
        if: success() && github.event_name == 'workflow_dispatch'
        continue-on-error: true
        run: |
          # This is optional - uncomment if you want to attach to releases
          # Requires: gh auth token with repo scope
          echo "Artifacts ready for download from GitHub Actions"
      
      - name: Notify on failure
        if: failure()
        run: |
          echo "⚠️  Scraper failed with exit code: ${{ steps.scrape.outputs.exit_code }}"
          echo "Check logs for details:"
          cat logs/screener_scraper.log 2>/dev/null || echo "No log file"

  # Optional: Send results to a storage service
  store-results:
    needs: fetch-screener-data
    runs-on: ubuntu-latest
    if: always() && success()
    
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: screener-results
      
      - name: Display downloaded files
        run: |
          echo "Downloaded files:"
          ls -lh
      
      - name: Show data summary
        run: |
          echo "=== Data Summary ==="
          python3 << 'EOF'
          import json
          try:
            with open('screener-history.json', 'r') as f:
              data = json.load(f)
            meta = data.get('metadata', {})
            print(f"Timestamp: {meta.get('timestamp', 'N/A')}")
            print(f"Total scraped: {meta.get('total_scraped', 'N/A')}")
            print(f"Success rate: {meta.get('success_rate', 'N/A')}")
            print(f"Duration: {meta.get('duration_seconds', 'N/A')}s")
          except Exception as e:
            print(f"Error: {e}")
          EOF
      
      # Add your own storage steps here
      # Example: Upload to S3, GitHub releases, etc.
