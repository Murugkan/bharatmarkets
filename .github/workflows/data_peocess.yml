name: "[MERGE] data processing"

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  merge-only:
    name: "Merge Raw Data"
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create data directories
        run: mkdir -p data/logs

      - name: Run merge_4datasets.py
        run: python merge_script.py

      - name: Configure Git
        run: |
          git config user.email "pipeline@bharatmarkets.dev"
          git config user.name "BharatMarkets Pipeline"

      - name: Commit and Push
        run: |
          git add data/raw_market_data.json data/logs/raw_market_data.log
          git commit -m "Auto: Merge Raw Data $(date +'%Y-%m-%d %H:%M:%S')" || echo "No changes"
          git push origin HEAD:main

  process-data:
    name: "Generate Canonical JSON"
    needs: merge-only
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create data directories
        run: mkdir -p data/logs

      - name: Run process_data.py
        run: python process_data.py

      - name: Configure Git
        run: |
          git config user.email "pipeline@bharatmarkets.dev"
          git config user.name "BharatMarkets Pipeline"

      - name: Commit and Push
        run: |
          git add data/market_data.json data/logs/complete_processing.log
          git commit -m "Auto: Generate Market Data $(date +'%Y-%m-%d %H:%M:%S')" || echo "No changes"
          git push origin HEAD:main
