name: "[MERGE] data processing"

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  merge-only:
    name: "Merge Raw Data"
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create data directories
        run: mkdir -p data logs

      - name: Run merge_script.py
        run: python merge_script.py

      - name: Configure Git
        run: |
          git config user.email "pipeline@bharatmarkets.dev"
          git config user.name "BharatMarkets Pipeline"

      - name: Commit and Push
        run: |
          git add data/raw_market_data.json logs/raw_market_data.log || true
          git commit -m "Auto: Merge Raw Data $(date +'%Y-%m-%d %H:%M:%S')" || echo "No changes"
          git push origin HEAD:main || true

  process-data:
    name: "Generate Canonical JSON"
    needs: merge-only
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create data directories
        run: mkdir -p data data/logs

      - name: Run data_processing.py
        run: python data_processing.py

      - name: Verify Output Files
        run: |
          echo "Checking generated files..."
          ls -lh data/market_data.json || echo "ERROR: market_data.json not created"
          ls -lh logs/data_processing.log || echo "ERROR: log file not created"
          wc -l data/market_data.json

      - name: Configure Git
        run: |
          git config user.email "pipeline@bharatmarkets.dev"
          git config user.name "BharatMarkets Pipeline"

      - name: Commit and Push Generated Data
        run: |
          # Stage generated data files
          git add -f data/market_data.json
          git add -f data/logs/
          
          # Show what's staged
          echo "Files staged:"
          git diff --cached --name-only
          
          # Commit if there are changes
          git commit -m "Data: Generate canonical market_data.json $(date +'%Y-%m-%d %H:%M:%S')" || echo "No changes"
          
          # Push to main
          git push origin HEAD:main || echo "Push failed, retrying..."
          git push -u origin main || true
