name: fetch_financials_screener (scraper)

on:
  workflow_dispatch:

jobs:
  fetch_screener:
    runs-on: ubuntu-latest
    timeout-minutes: 480

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Chrome
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update -q
          sudo apt-get install -y google-chrome-stable

      - name: Install dependencies
        run: pip install -r fetch_financials_screener_requirements.txt

      - name: Create directories
        run: mkdir -p data/logs

      - name: Run scraper
        run: python fetch_screener_financials.py

      - name: Commit results to repo (retry on concurrent updates)
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add data/screener_financials.json data/logs/
          if git diff --quiet --cached; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Update screener data - $(date +'%Y-%m-%d %H:%M:%S')"

          # Retry push with rebase to survive other workflows pushing to main
          # concurrently (this job can run for hours, so the gap between
          # rebase and push is large). Each retry re-applies this commit on
          # top of the latest remote main.
          max_attempts=5
          attempt=1
          until git push origin main; do
            if [ $attempt -ge $max_attempts ]; then
              echo "::error::Push failed after $max_attempts attempts"
              exit 1
            fi
            echo "Push rejected (attempt $attempt/$max_attempts) — pulling and retrying..."
            attempt=$((attempt + 1))
            sleep $((RANDOM % 5 + 1))  # jitter to reduce repeated collisions
            git fetch origin main
            git rebase origin/main
          done

          echo "Push succeeded on attempt $attempt"

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: results
          path: |
            data/screener_financials.json
            data/logs/
          retention-days: 30
