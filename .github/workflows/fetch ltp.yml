name: Fetch_ltp

on:
  workflow_dispatch:

jobs:
  fetch-ltp:
    name: Fetch Live LTP
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with: {ref: main}
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - run: pip install yfinance
      - name: DEBUG - check JUNIORBEES/NIFTYBEES in unified-symbols.json
        run: |
          python3 - << 'PYTHON_EOF'
          import json
          d = json.load(open("data/unified-symbols.json"))
          print("count field:", d.get("count"), "| len(symbols):", len(d["symbols"]))
          for s in d["symbols"]:
              if s["ticker"] in ("JUNIORBEES", "NIFTYBEES"):
                  print(s["ticker"], "-> sector:", repr(s.get("sector")),
                        "| instrument_type:", repr(s.get("instrument_type")),
                        "| isin:", repr(s.get("isin")))
          PYTHON_EOF
          echo "--- git info ---"
          git log -1 --oneline -- data/unified-symbols.json
          git rev-parse HEAD
          md5sum data/unified-symbols.json
      - name: Fetch LTP
        run: python fetch_ltp.py
      - name: Commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ltp.json data/sector_indices.json data/unified-symbols.json data/logs/fetch_ltp.log || true
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "data: ltp $(date -u +'%H:%M UTC') [skip pages]"
          for i in 1 2 3; do git pull --rebase origin main && git push && break; sleep 5; done
