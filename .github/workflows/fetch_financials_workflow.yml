name: "[FETCH] Financials Loading -yf & scr"

on:
  workflow_dispatch:
    inputs:
      providers:
        description: "Providers to fetch"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - screener_only
          - yahoof_only
      log_level:
        description: "Log level"
        required: true
        default: "WARNING"
        type: choice
        options:
          - DEBUG
          - INFO
          - WARNING
          - ERROR

jobs:
  fetch-financials:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: "📥 Checkout repository"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "🐍 Setup Python"
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: "📦 Install dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas requests beautifulsoup4 -q

      - name: "⚙️ Create fetch configuration"
        run: |
          cat > .fetch_config.json << 'EOF'
          {
            "screener": ${{ github.event.inputs.providers == 'all' || github.event.inputs.providers == 'screener_only' || github.event_name == 'schedule' }},
            "yahoof": ${{ github.event.inputs.providers == 'all' || github.event.inputs.providers == 'yahoof_only' || github.event_name == 'schedule' }},
            "log_level": "${{ github.event.inputs.log_level || 'WARNING' }}"
          }
          EOF
          cat .fetch_config.json

      - name: "🔄 [Screener] Fetch financial data"
        if: |
          github.event.inputs.providers == 'all' ||
          github.event.inputs.providers == 'screener_only'
        run: |
          python fetch_screener_financials.py
        continue-on-error: true

      - name: "🔄 [YahooF] Fetch financial metrics"
        if: |
          github.event.inputs.providers == 'all' ||
          github.event.inputs.providers == 'yahoof_only'
        run: |
          python fetch_yahoof_financials_1.py
        continue-on-error: true

      - name: "📊 Verify output files"
        run: |
          echo "=== Checking YahooF Output Files ==="
          if [ -f data/yahoof_financials_1.json ]; then
            echo "✓ yahoof_financials_1.json exists"
            ls -lh data/yahoof_financials_1.json
            echo "  Size: $(wc -c < data/yahoof_financials_1.json) bytes"
            echo "  First 100 chars:"
            head -c 100 data/yahoof_financials_1.json
          else
            echo "✗ yahoof_financials_1.json NOT FOUND"
          fi
          
          echo ""
          echo "=== Checking Screener Output Files ==="
          if [ -f data/screener_financials_1.json ]; then
            echo "✓ screener_financials_1.json exists"
            ls -lh data/screener_financials_1.json
            echo "  Size: $(wc -c < data/screener_financials_1.json) bytes"
            echo "  First 100 chars:"
            head -c 100 data/screener_financials_1.json
          else
            echo "✗ screener_financials_1.json NOT FOUND"
          fi
          
          echo ""
          echo "=== Checking Log Files ==="
          if [ -f data/logs/yahoof_financials_1.log ]; then
            echo "✓ yahoof_financials_1.log exists"
            ls -lh data/logs/yahoof_financials_1.log
            echo "  Size: $(wc -c < data/logs/yahoof_financials_1.log) bytes"
            tail -5 data/logs/yahoof_financials_1.log
          else
            echo "✗ yahoof_financials_1.log NOT FOUND"
          fi
          
          if [ -f data/logs/screener_financials_1.log ]; then
            echo "✓ screener_financials_1.log exists"
            ls -lh data/logs/screener_financials_1.log
            echo "  Size: $(wc -c < data/logs/screener_financials_1.log) bytes"
            tail -5 data/logs/screener_financials_1.log
          else
            echo "✗ screener_financials_1.log NOT FOUND"
          fi
          
          echo ""
          echo "=== All data directory files ==="
          ls -lhR data/ 2>/dev/null || echo "No data directory"

      - name: "🔐 Configure Git & Check Gitignore"
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          echo "=== Checking .gitignore ==="
          if [ -f .gitignore ]; then
            echo "Contents of .gitignore:"
            cat .gitignore
          else
            echo "No .gitignore file found"
          fi
          
          echo ""
          echo "=== Current git status ==="
          git status

      - name: "✅ Force-commit & Push"
        run: |
          echo "Force-adding files (overriding .gitignore)..."
          git add -f fetch_yahoof_financials_1.py fetch_screener_financials.py
          
          [ -f data/yahoof_financials_1.json ] && git add -f data/yahoof_financials_1.json || echo "⚠ yahoof_financials_1.json not found"
          [ -f data/logs/yahoof_financials_1.log ] && git add -f data/logs/yahoof_financials_1.log || echo "⚠ yahoof_financials_1.log not found"
          
          [ -f data/screener_financials_1.json ] && git add -f data/screener_financials_1.json || echo "⚠ screener_financials_1.json not found"
          [ -f data/logs/screener_financials_1.log ] && git add -f data/logs/screener_financials_1.log || echo "⚠ screener_financials_1.log not found"
          
          echo ""
          echo "Git status after add..."
          git status
          
          echo ""
          echo "Committing..."
          git commit -m "chore: [FETCH] Financial Metrics - $(date +'%Y-%m-%d %H:%M:%S')" 2>&1 || echo "Nothing new to commit"
          
          echo ""
          echo "Pushing..."
          git push origin HEAD:main 2>&1 || echo "Push failed"

      - name: "📝 Summary"
        if: always()
        run: |
          echo "=== FETCH SUMMARY ==="
          echo "Workflow: [FETCH] Financials Loading -yf & scr"
          echo "Status: ${{ job.status }}"
          echo "Timestamp: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          echo ""
          echo "Output files:"
          echo "  - data/screener_financials_1.json"
          echo "  - data/yahoof_financials_1.json"
          echo ""
          echo "Log files:"
          echo "  - data/logs/screener_financials_1.log"
          echo "  - data/logs/yahoof_financials_1.log"
