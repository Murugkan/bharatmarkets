name: "[FETCH] Financials Loading -yf & scr"

on:
  workflow_dispatch:
    inputs:
      providers:
        description: "Providers to fetch"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - screener_only
          - yahoof_only
      log_level:
        description: "Log level"
        required: true
        default: "WARNING"
        type: choice
        options:
          - DEBUG
          - INFO
          - WARNING
          - ERROR

jobs:
  fetch-financials:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: "📥 Checkout repository"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "🐍 Setup Python"
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: "📦 Install dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas requests beautifulsoup4 -q

      - name: "⚙️ Create fetch configuration"
        run: |
          cat > .fetch_config.json << 'EOF'
          {
            "screener": ${{ github.event.inputs.providers == 'all' || github.event.inputs.providers == 'screener_only' || github.event_name == 'schedule' }},
            "yahoof": ${{ github.event.inputs.providers == 'all' || github.event.inputs.providers == 'yahoof_only' || github.event_name == 'schedule' }},
            "log_level": "${{ github.event.inputs.log_level || 'WARNING' }}"
          }
          EOF
          cat .fetch_config.json

      - name: "🔄 [Screener] Fetch financial data"
        if: |
          github.event.inputs.providers == 'all' ||
          github.event.inputs.providers == 'screener_only'
        run: |
          python fetch_screener_financials.py
        continue-on-error: true

      - name: "🔄 [YahooF] Fetch financial metrics"
        if: |
          github.event.inputs.providers == 'all' ||
          github.event.inputs.providers == 'yahoof_only'
        run: |
          python fetch_yahoof_financials_1.py
        continue-on-error: true

      - name: "📊 List output files"
        run: |
          echo "=== Output Files ==="
          ls -lh data/ 2>/dev/null || echo "No data directory"
          echo ""
          echo "=== Log Files ==="
          ls -lh data/logs/ 2>/dev/null || echo "No logs directory"

      - name: "🔐 Configure Git"
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: "✅ Commit & Push changes"
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
          else
            git add data/screener_financials_1.json data/yahoof_financials_1.json data/logs/*.log 2>/dev/null || true
            git commit -m "chore: [FETCH] Financials - yf & scr data update" || true
            git push origin HEAD:main || echo "Push failed, may be due to no changes"
          fi

      - name: "📝 Summary"
        if: always()
        run: |
          echo "=== FETCH SUMMARY ==="
          echo "Workflow: [FETCH] Financials Loading -yf & scr"
          echo "Status: ${{ job.status }}"
          echo "Timestamp: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          echo ""
          echo "Output files:"
          echo "  - data/screener_financials_1.json"
          echo "  - data/yahoof_financials_1.json"
          echo ""
          echo "Log files:"
          echo "  - data/logs/screener_financials_1.log"
          echo "  - data/logs/yahoof_financials_1.log"
