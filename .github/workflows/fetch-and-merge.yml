name: "[HISTORY] Fetch & Merge Data"

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  history-load:
    name: "Fetch & Merge Stock Data"
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install yfinance requests beautifulsoup4

      - name: Create data directories
        run: mkdir -p data logs

      - name: Run fetch_history.py
        run: python fetch_history.py

      - name: Run merge_script.py
        run: python merge_script.py

      - name: Configure Git
        run: |
          git config user.email "pipeline@bharatmarkets.dev"
          git config user.name "BharatMarkets Pipeline"

      - name: Commit and Push
        run: |
          git add -A
          git commit -m "Auto: Fetch & Merge $(date +'%Y-%m-%d %H:%M:%S')" || echo "No changes to commit"
          git push origin HEAD:main || echo "Push failed - check permissions"
