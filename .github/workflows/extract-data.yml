name: Extract static data to JSON

on:
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Write extract script
        run: |
          cat > extract_data.js << 'ENDOFSCRIPT'
          const fs = require('fs');
          let js = fs.readFileSync('app.js', 'utf8');
          const before = js.split('\n').length;

          // ── Extract NSE_DB ──────────────────────────────────────
          const nseStart = js.indexOf('const NSE_DB = [');
          const nseEnd   = js.indexOf('];', nseStart) + 2;
          const nseBlock = js.slice(nseStart, nseEnd);

          // Parse NSE_DB entries into JSON array
          const nseEntries = [];
          const nseLines = nseBlock.split('\n');
          nseLines.forEach(line => {
            const m = line.match(/\{sym:'([^']+)',name:'([^']+)',sector:'([^']+)'\}/);
            if (m) nseEntries.push({ sym: m[1], name: m[2], sector: m[3] });
          });
          console.log('NSE_DB entries:', nseEntries.length);

          // ── Extract ISIN_MAP ────────────────────────────────────
          const isinStart = js.indexOf('const ISIN_MAP = {');
          const isinEnd   = js.indexOf('};', isinStart) + 2;
          const isinBlock = js.slice(isinStart, isinEnd);

          // Parse ISIN_MAP into JSON object
          const isinMap = {};
          const isinMatches = isinBlock.matchAll(/'(INE[A-Z0-9]+)':'([A-Z0-9_\-]+)'/g);
          for (const m of isinMatches) {
            if (!isinMap[m[1]]) isinMap[m[1]] = m[2];
          }
          console.log('ISIN_MAP entries:', Object.keys(isinMap).length);

          // ── Extract MACRO_DATA ──────────────────────────────────
          const macroStart = js.indexOf('const MACRO_DATA = [');
          const macroEnd   = js.indexOf('];', macroStart) + 2;
          const macroBlock = js.slice(macroStart, macroEnd);

          // Evaluate MACRO_DATA safely
          let macroData = [];
          try {
            const cleaned = macroBlock
              .replace('const MACRO_DATA = ', '')
              .replace(/;$/, '')
              .trim();
            macroData = eval(cleaned);
            console.log('MACRO_DATA entries:', macroData.length);
          } catch(e) {
            console.warn('MACRO_DATA parse warning:', e.message);
          }

          // ── Write JSON files ────────────────────────────────────
          fs.writeFileSync('nse_db.json', JSON.stringify({
            stocks: nseEntries,
            isin:   isinMap,
          }, null, 2));
          console.log('Written nse_db.json');

          if (macroData.length) {
            fs.writeFileSync('macro_data.json', JSON.stringify(macroData, null, 2));
            console.log('Written macro_data.json');
          }

          // ── Remove static data blocks from app.js ───────────────
          // Replace NSE_DB with loader
          const nseLoader = `// NSE_DB loaded from nse_db.json on boot
          let NSE_DB = [];
          let ISIN_MAP = {};`;

          js = js.slice(0, nseStart) + nseLoader + js.slice(nseEnd);

          // Remove ISIN_MAP block (now loaded via nse_db.json)
          const isinStart2 = js.indexOf('const ISIN_MAP = {');
          if (isinStart2 !== -1) {
            const isinEnd2 = js.indexOf('};', isinStart2) + 2;
            js = js.slice(0, isinStart2) + js.slice(isinEnd2);
          }

          // Replace MACRO_DATA with loader
          const macroStart2 = js.indexOf('const MACRO_DATA = [');
          if (macroStart2 !== -1) {
            const macroEnd2 = js.indexOf('];', macroStart2) + 2;
            const macroLoader = `// MACRO_DATA loaded from macro_data.json on boot
          let MACRO_DATA = [];`;
            js = js.slice(0, macroStart2) + macroLoader + js.slice(macroEnd2);
          }

          // ── Add loader function before boot() ───────────────────
          const loaderFn = `
          // Load static data from JSON files
          async function loadStaticData() {
            try {
              const r = await fetch('./nse_db.json?t=' + Date.now(), {cache:'force-cache'});
              if (r.ok) {
                const d = await r.json();
                NSE_DB   = d.stocks || [];
                ISIN_MAP = d.isin   || {};
                console.log('nse_db.json loaded:', NSE_DB.length, 'stocks,', Object.keys(ISIN_MAP).length, 'ISINs');
              }
            } catch(e) { console.warn('nse_db.json load failed:', e.message); }

            try {
              const r = await fetch('./macro_data.json?t=' + Date.now(), {cache:'force-cache'});
              if (r.ok) {
                MACRO_DATA = await r.json();
                console.log('macro_data.json loaded:', MACRO_DATA.length, 'entries');
              }
            } catch(e) { console.warn('macro_data.json load failed:', e.message); }
          }
          `;

          js = js.replace('function boot(){', loaderFn + '\nfunction boot(){');

          // ── Update boot() to await loadStaticData first ─────────
          js = js.replace(
            'function boot(){\n  loadState();',
            'function boot(){\n  loadState();\n  loadStaticData().then(()=>{ buildTicker(); render(); });'
          );

          // Remove duplicate render calls after loadStaticData
          js = js.replace(
            "loadStaticData().then(()=>{ buildTicker(); render(); });\n  buildTicker();\n  setInterval(updClock,10000);\n  updClock();\n\n  // Render immediately with whatever is in localStorage\n  render();\n\n  // Then load fresh data in background and re-render when ready\n  loadFundamentals()",
            "loadStaticData().then(()=>{ buildTicker(); render(); });\n  setInterval(updClock,10000);\n  updClock();\n\n  loadFundamentals()"
          );

          // ── Compress blank lines ─────────────────────────────────
          js = js.replace(/\n{3,}/g, '\n\n');

          // ── Write output ─────────────────────────────────────────
          fs.writeFileSync('app.js', js);
          const after = js.split('\n').length;

          console.log('\nLines: ' + before + ' -> ' + after + ' (saved ' + (before-after) + ' lines)');

          // ── Verification ─────────────────────────────────────────
          const checks = [
            ['app.js written',              fs.existsSync('app.js')],
            ['nse_db.json written',         fs.existsSync('nse_db.json')],
            ['macro_data.json written',     fs.existsSync('macro_data.json')],
            ['NSE_DB is now let',           js.includes('let NSE_DB = [];')],
            ['ISIN_MAP is now let',         js.includes('let ISIN_MAP = {};')],
            ['MACRO_DATA is now let',       js.includes('let MACRO_DATA = [];')],
            ['loadStaticData defined',      js.includes('function loadStaticData()')],
            ['boot calls loadStaticData',   js.includes('loadStaticData()')],
            ['parseCDSLXls present',        js.includes('function parseCDSLXls(')],
            ['renderUpload present',        js.includes('function renderUpload(')],
            ['autoSyncPortfolioSymbols',    js.includes('function autoSyncPortfolioSymbols(')],
            ['clearStockAnalysis present',  js.includes('function clearStockAnalysis(')],
            ['renderImportPanel present',   js.includes('function renderImportPanel(')],
            ['nse_db has stocks',           nseEntries.length > 200],
            ['isin_map has entries',        Object.keys(isinMap).length > 50],
          ];

          console.log('\nVerification:');
          checks.forEach(([name, pass]) => console.log((pass ? '  PASS' : '  FAIL') + ' ' + name));
          const failed = checks.filter(([,pass]) => !pass);
          if (failed.length) {
            console.error('\n' + failed.length + ' checks failed');
            process.exit(1);
          }
          console.log('\nAll checks passed!');
          ENDOFSCRIPT

      - name: Run extract script
        run: node extract_data.js

      - name: Commit all changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add app.js nse_db.json macro_data.json
          git diff --staged --quiet || git commit -m "extract: NSE_DB + ISIN_MAP + MACRO_DATA to JSON files"
          git push
