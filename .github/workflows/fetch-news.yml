name: Fetch Stock News

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    # 6:00 AM IST = 0:30 AM UTC
    - cron: '30 0 * * *'
    # 7:00 AM IST = 1:30 AM UTC
    - cron: '30 1 * * *'
    # 1:00 PM IST = 7:30 AM UTC
    - cron: '30 7 * * *'
    # 6:00 PM IST = 12:30 PM UTC
    - cron: '30 12 * * *'
  workflow_dispatch:

concurrency:
  group: git-push-main
  cancel-in-progress: false

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch news and push
        run: python fetch_news.py
