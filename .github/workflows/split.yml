
name: Split into index.html + app.js

on:
  workflow_dispatch:

jobs:
  split:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Split index.html into HTML and JS
        run: |
          node -e "
          const fs = require('fs');
          const html = fs.readFileSync('index.html', 'utf8');
          const scriptStart = html.indexOf('<script>');
          const scriptEnd = html.lastIndexOf('</script>');
          const js = html.slice(scriptStart + 8, scriptEnd).trim();
          const newHtml = html.slice(0, scriptStart) + '<script src=\"app.js\"></script>\n</body>\n</html>';
          fs.writeFileSync('app.js', js);
          fs.writeFileSync('index.html', newHtml);
          console.log('Done. app.js lines:', js.split('\n').length);
          "

      - name: Commit both files
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add index.html app.js
          git commit -m "split: extract app.js from index.html"
          git push
