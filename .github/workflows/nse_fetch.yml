name: NSE Financial Fetch

on:
  workflow_dispatch:

  schedule:
    - cron: "30 1 * * *"

jobs:

  fetch:

    runs-on: ubuntu-latest

    timeout-minutes: 20

    strategy:
      fail-fast: false

    steps:

      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          pip install requests

      - name: Run NSE Fetch
        run: |
          python nse_fetch.py

      - name: Commit Files
        run: |

          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add raw/*.json
          git add logs/runtime_history.json

          git commit -m "Update NSE financial data" || echo "No changes"

          git push
