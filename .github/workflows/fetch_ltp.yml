name: Fetch - ltp, nav & index

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fetch-ltp:
    name: Fetch Live LTP & index
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with: {ref: main}
      - uses: actions/setup-python@v6
        with: {python-version: '3.12'}
      - run: pip install yfinance
      - name: Fetch LTP
        run: python fetch_ltp.py
      - name: Commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ltp.json data/sector_indices.json data/unified-symbols.json data/logs/fetch_ltp.log || true
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "data: ltp $(date -u +'%H:%M UTC') [skip ci]"
          for i in 1 2 3; do git pull --rebase origin main && git push && break; sleep 5; done

  fetch-nav:
    name: Fetch NAV (MF/SGB/QSIF)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with: {ref: main}
      - uses: actions/setup-python@v6
        with: {python-version: '3.12'}
      - run: pip install requests beautifulsoup4 -q
      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Fetch NAV (commits internally)
        run: python fetch_nav_ltp.py
