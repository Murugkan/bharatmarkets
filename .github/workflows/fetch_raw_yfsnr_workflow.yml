name: 'Fetch Raw Data - yahoofin + screener'

on:
  workflow_dispatch:
    inputs:
      providers:
        description: 'Select which data providers to fetch'
        required: true
        default: 'all'
        type: choice
        options:
          - 'all'
          - 'yahoofin'
          - 'screener'
      history_period:
        description: 'Yahoo history period'
        required: false
        default: '5y'
        type: choice
        options:
          - '1y'
          - '2y'
          - '5y'
          - '10y'
      log_level:
        description: 'Log level (DEBUG=verbose, INFO=normal, WARNING=errors only)'
        required: false
        default: 'WARNING'
        type: choice
        options:
          - 'DEBUG'
          - 'INFO'
          - 'WARNING'
          - 'ERROR'

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance requests beautifulsoup4 lxml -q

      - name: Display Loading Configuration
        run: |
          echo "════════════════════════════════════════════════════════════"
          echo "  📊 RAW DATA FETCH - LOADING CONFIGURATION"
          echo "════════════════════════════════════════════════════════════"
          echo ""
          echo "  Selection: ${{ github.event.inputs.providers }}"
          echo "  History Period: ${{ github.event.inputs.history_period }}"
          echo ""
          
          if [[ "${{ github.event.inputs.providers }}" == "all" ]]; then
            echo "  ✓ Yahoo Finance:      ENABLED"
            echo "    • Last 6 months:     1d interval (daily)"
            echo "    • Last ${{ github.event.inputs.history_period }}:       1wk + 1mo intervals"
            echo "  ✓ Screener.in:        ENABLED"
            echo ""
            echo "  Output files:"
            echo "    - data/yahoofin_raw_data.json"
            echo "    - data/screener_raw_data.json"
          elif [[ "${{ github.event.inputs.providers }}" == "yahoofin" ]]; then
            echo "  ✓ Yahoo Finance:      ENABLED"
            echo "    • Last 6 months:     1d interval (daily)"
            echo "    • Last ${{ github.event.inputs.history_period }}:       1wk + 1mo intervals"
            echo "  ✗ Screener.in:        DISABLED"
            echo ""
            echo "  Output files:"
            echo "    - data/yahoofin_raw_data.json"
          elif [[ "${{ github.event.inputs.providers }}" == "screener" ]]; then
            echo "  ✗ Yahoo Finance:      DISABLED"
            echo "  ✓ Screener.in:        ENABLED"
            echo ""
            echo "  Output files:"
            echo "    - data/screener_raw_data.json"
          fi
          
          echo ""
          echo "  Tickers: 97 companies"
          echo "  Runtime: ~2-3 minutes"
          echo ""
          echo "════════════════════════════════════════════════════════════"

      - name: Run fetch_raw_yfsnr.py
        env:
          FETCH_PROVIDERS: ${{ github.event.inputs.providers }}
          HISTORY_PERIOD: ${{ github.event.inputs.history_period }}
          LOG_LEVEL: ${{ github.event.inputs.log_level }}
        run: |
          # Create fetch configuration
          python3 << 'PYTHON_EOF'
          import os
          import json
          
          providers = os.getenv('FETCH_PROVIDERS', 'all')
          history_period = os.getenv('HISTORY_PERIOD', '5y')
          log_level = os.getenv('LOG_LEVEL', 'WARNING')
          
          # Intervals: script uses INTERVAL_PERIOD_MAP to determine periods
          # - 1d: 6 months (fixed, recent daily data)
          # - 1wk: full history_period
          # - 1mo: full history_period
          history_intervals = ['1d', '1wk', '1mo']
          
          # Map selection to provider flags
          config = {
            'yahoo': False,
            'screener': False,
            'history_period': history_period,
            'history_intervals': history_intervals,
            'log_level': log_level
          }
          
          if 'all' in providers:
            config['yahoo'] = True
            config['screener'] = True
          elif 'yahoofin' in providers:
            config['yahoo'] = True
          elif 'screener' in providers:
            config['screener'] = True
          
          # Save to file for fetch_raw_yfsnr.py to read
          with open('.fetch_config.json', 'w') as f:
            json.dump(config, f, indent=2)
          
          print(f"Fetch config: {json.dumps(config, indent=2)}")
          PYTHON_EOF
          
          python fetch_raw_yfsnr.py

      - name: Verify output files
        run: |
          echo "=== Checking output files ==="
          [ -f data/yahoofin_raw_data.json ] && echo "✓ yahoofin_raw_data.json" || echo "✗ yahoofin_raw_data.json not found"
          [ -f data/screener_raw_data.json ] && echo "✓ screener_raw_data.json" || echo "✗ screener_raw_data.json not found"
          [ -f data/logs/fetch_raw_yfsnr.log ] && echo "✓ fetch_raw_yfsnr.log" || echo "✗ fetch_raw_yfsnr.log not found"

      - name: Commit & Push
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          
          # Add files
          git add data/yahoofin_raw_data.json data/screener_raw_data.json data/logs/fetch_raw_yfsnr.log 2>/dev/null || true
          
          # Check if there are changes
          if git diff --quiet --cached; then
            echo "No changes to commit"
            exit 0
          fi
          
          git commit -m "[Step 1] Fetch Raw Data: $(date +'%Y-%m-%d %H:%M:%S')"
          git push origin main

