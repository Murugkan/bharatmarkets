name: 'Fetch QSIF NAV (self-determining: full load or delta)'

# Triggerable two ways, running the exact same job either way:
#   1. workflow_call — invoked by e2e-parallel.yml on every daily run.
#      The very first time it runs (qsif_nav.json doesn't exist yet),
#      fetch_nav_ltp.py's qsif-nav mode does a full historical load. On
#      every run after that, it automatically does a gap-fill (delta) —
#      no separate "seed" step or workflow needed; the script itself
#      detects which case applies per held ISIN.
#   2. workflow_dispatch — standalone manual trigger, runs the identical
#      job. Useful for forcing an out-of-band update, or re-running after
#      a failure, without waiting for the next scheduled e2e run.
#
# Output: data/qsif_nav.json. Most days, this will already be up to date
# by the time e2e's daily run fires (NAV only updates once a day on
# qsif.com), so most calls to this workflow do little/no network work —
# see run_qsif_nav_update()'s per-ISIN "already up to date" skip path.

on:
  workflow_call:
  workflow_dispatch:

jobs:
  fetch-qsif-nav:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 -q

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run fetch_nav_ltp.py qsif-nav (commits internally)
        run: python fetch_nav_ltp.py qsif-nav

      - name: Verify output files
        run: |
          if [ -f data/qsif_nav.json ]; then
            echo "✓ qsif_nav.json exists"
            ls -lh data/qsif_nav.json
          else
            echo "✗ qsif_nav.json NOT FOUND"
          fi
          if [ -f data/fetch_nav_ltp_summary.json ]; then
            echo "✓ fetch_nav_ltp_summary.json exists"
            cat data/fetch_nav_ltp_summary.json
          else
            echo "✗ fetch_nav_ltp_summary.json NOT FOUND"
          fi
