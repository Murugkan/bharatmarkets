# .github/workflows/fetch-screener-concalls.yml
name: Fetch Screener Concalls

on:
  schedule:
    - cron: '0 2 * * 1'  # Every Monday at 2 AM UTC
  workflow_dispatch:      # Manual trigger

jobs:
  fetch-concalls:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      
      - name: Run Screener Concalls Fetch
        env:
          SCREENER_EMAIL: ${{ secrets.SCREENER_EMAIL }}
          SCREENER_PASSWORD: ${{ secrets.SCREENER_PASSWORD }}
          SECTOR_FILTER: ${{ vars.SECTOR_FILTER || 'IT' }}
        run: python fetch_screener_concalls.py
      
      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/screener-concalls.json
          git add data/logs/fetch-concall-history.log
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update: Screener concalls data & logs" && git push)
