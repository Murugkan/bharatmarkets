name: 'Fetch & process All Financials (e2e-Parallel)'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    # 5:00 PM IST = 11:30 AM UTC, Mon-Fri
    - cron: '30 11 * * 1-5'
  workflow_dispatch:
    inputs:
      providers:
        description: 'Raw data providers (for fetch-raw-yfsnr.py)'
        required: true
        default: 'all'
        type: choice
        options:
          - 'all'
          - 'yahoofin'
          - 'screener'
      history_period:
        description: 'Yahoo history period (for fetch-raw-yfsnr.py)'
        required: false
        default: '10y'
        type: choice
        options:
          - '10y'
          - '5y'
          - '2y'
          - '1y'
      log_level:
        description: 'Log level (applies to all jobs)'
        required: false
        default: 'WARNING'
        type: choice
        options:
          - 'DEBUG'
          - 'INFO'
          - 'WARNING'
          - 'ERROR'

jobs:
  # ==========================================================================
  # JOB 1: Raw data (Yahoo history + Screener overview) — fetch-raw-yfsnr.py
  # Commit & push is handled INSIDE fetch-raw-yfsnr.py (commit_to_git()),
  # including its own 5-attempt retry loop with fetch/stash/rebase/stash-pop.
  # No separate git step here — avoids double-commit/double-push.
  # ==========================================================================
  fetch-raw:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r libraries_yfin.txt -q

      - name: Run fetch-raw-yfsnr.py
        env:
          FETCH_PROVIDERS: ${{ github.event.inputs.providers || 'all' }}
          HISTORY_PERIOD: ${{ github.event.inputs.history_period || '10y' }}
          LOG_LEVEL: ${{ github.event.inputs.log_level || 'WARNING' }}
        run: |
          python3 << 'PYTHON_EOF'
          import os
          import json

          providers = os.getenv('FETCH_PROVIDERS', 'all')
          history_period = os.getenv('HISTORY_PERIOD', '10y')
          log_level = os.getenv('LOG_LEVEL', 'WARNING')

          history_intervals = ['1d', '1wk', '1mo']

          config = {
            'yahoo': False,
            'screener': False,
            'history_period': history_period,
            'history_intervals': history_intervals,
            'log_level': log_level
          }

          if 'all' in providers:
            config['yahoo'] = True
            config['screener'] = True
          elif 'yahoofin' in providers:
            config['yahoo'] = True
          elif 'screener' in providers:
            config['screener'] = True

          with open('.fetch_config.json', 'w') as f:
            json.dump(config, f, indent=2)

          print(f"Fetch config: {json.dumps(config, indent=2)}")
          PYTHON_EOF

          python fetch-raw-yfsnr.py

      - name: Verify output files
        run: |
          echo "=== Checking output files ==="
          [ -f data/yahoofin_raw_data.json ] && echo "✓ yahoofin_raw_data.json" || echo "✗ yahoofin_raw_data.json not found"
          [ -f data/screener_raw_data.json ] && echo "✓ screener_raw_data.json" || echo "✗ screener_raw_data.json not found"
          [ -f data/logs/fetch-raw-yfsnr.log ] && echo "✓ fetch-raw-yfsnr.log" || echo "✗ fetch-raw-yfsnr.log not found"

  # ==========================================================================
  # JOB 2: Yahoo Finance financial metrics — fetch_yahoofin_financials.py
  # ==========================================================================
  fetch-yahoofin-financials:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: "📥 Checkout repository"
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: "🐍 Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: "📦 Install dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install -r libraries_yfin.txt -q

      - name: "⚙️ Create fetch configuration"
        run: |
          cat > .fetch_config.json << 'EOF'
          {
            "yahoof": true,
            "log_level": "${{ github.event.inputs.log_level || 'WARNING' }}"
          }
          EOF
          cat .fetch_config.json

      - name: "🔄 [YahooF] Fetch financial metrics"
        run: |
          python fetch_yahoofin_financials.py
        continue-on-error: true

      - name: "📊 Verify output files"
        run: |
          echo "=== Checking YahooF Output Files ==="
          if [ -f data/yahoofin_financials.json ]; then
            echo "✓ yahoofin_financials.json exists"
            ls -lh data/yahoofin_financials.json
          else
            echo "✗ yahoofin_financials.json NOT FOUND"
          fi

          echo ""
          echo "=== Checking Log Files ==="
          if [ -f data/logs/fetch_yahoofin_financials.log ]; then
            echo "✓ fetch_yahoofin_financials.log exists"
            tail -5 data/logs/fetch_yahoofin_financials.log
          else
            echo "✗ fetch_yahoofin_financials.log NOT FOUND"
          fi

      - name: "🔐 Configure Git"
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config core.autocrlf false
          git config core.fileMode false

      - name: "✅ Force-commit & Push (retry on concurrent updates)"
        run: |
          [ -f fetch_yahoofin_financials.py ]              && git add -f fetch_yahoofin_financials.py              || echo "⚠ fetch_yahoofin_financials.py not found"
          [ -f data/yahoofin_financials.json ]             && git add -f data/yahoofin_financials.json             || echo "⚠ yahoofin_financials.json not found"
          [ -f data/logs/fetch_yahoofin_financials.log ]   && git add -f data/logs/fetch_yahoofin_financials.log   || echo "⚠ fetch_yahoofin_financials.log not found"
          [ -f .fetch_config.json ]                        && git add -f .fetch_config.json                        || echo "⚠ .fetch_config.json not found"

          git diff --cached --stat

          if git diff --cached --quiet; then
            echo "Nothing new to commit — skipping"
            exit 0
          fi

          git commit -m "chore: [FETCH] Financial Metrics - $(date +'%Y-%m-%d %H:%M:%S') [skip ci]"

          max_attempts=5
          attempt=1
          until git push origin HEAD:main; do
            if [ $attempt -ge $max_attempts ]; then
              echo "::error::Push failed after $max_attempts attempts"
              exit 1
            fi
            echo "Push rejected (attempt $attempt/$max_attempts) — pulling and retrying..."
            attempt=$((attempt + 1))
            sleep $((RANDOM % 5 + 1))
            git fetch origin main
            git stash --include-untracked
            git rebase origin/main
            git stash pop || true
          done

          echo "Push succeeded on attempt $attempt"

  # ==========================================================================
  # JOB 3: Screener.in financials (Selenium scraper) — fetch_screener_financials.py
  # ==========================================================================
  fetch-screener-financials:
    runs-on: ubuntu-latest
    timeout-minutes: 480
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Chrome
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update -q
          sudo apt-get install -y google-chrome-stable

      - name: Install dependencies
        run: pip install -r libraries_snr.txt

      - name: Create directories
        run: mkdir -p data/logs

      - name: Run scraper
        run: python fetch_screener_financials.py

      - name: Commit results to repo (retry on concurrent updates)
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add data/screener_financials.json data/logs/
          if git diff --quiet --cached; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Update screener data - $(date +'%Y-%m-%d %H:%M:%S') [skip ci]"

          max_attempts=5
          attempt=1
          until git push origin main; do
            if [ $attempt -ge $max_attempts ]; then
              echo "::error::Push failed after $max_attempts attempts"
              exit 1
            fi
            echo "Push rejected (attempt $attempt/$max_attempts) — pulling and retrying..."
            attempt=$((attempt + 1))
            sleep $((RANDOM % 5 + 1))
            git fetch origin main
            git stash --include-untracked
            git rebase origin/main
            git stash pop || true
          done

          echo "Push succeeded on attempt $attempt"

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: results
          path: |
            data/screener_financials.json
            data/logs/
          retention-days: 30

  # ==========================================================================
  # JOB 4: Flatten/merge all sources into market_data_raw.json
  # ==========================================================================
  flatten-market-data:
    runs-on: ubuntu-latest
    needs: [fetch-raw, fetch-yahoofin-financials, fetch-screener-financials, fetch-qsif-history-delta]
    steps:
      - name: Checkout repo (latest main)
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run market_data_flatten.py
        run: python market_data_flatten.py

      - name: Verify output file
        run: |
          if [ -f data/market_data_raw.json ]; then
            echo "✓ market_data_raw.json exists"
            ls -lh data/market_data_raw.json
          else
            echo "✗ market_data_raw.json NOT FOUND"
          fi

      - name: Commit & Push (retry on concurrent updates)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/market_data_raw.json data/logs/market_data_flatten.log 2>/dev/null || true

          if git diff --quiet --cached; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "[Step 2] Flatten Market Data: $(date +'%Y-%m-%d %H:%M:%S') [skip ci]"

          max_attempts=5
          attempt=1
          until git push origin main; do
            if [ $attempt -ge $max_attempts ]; then
              echo "::error::Push failed after $max_attempts attempts"
              exit 1
            fi
            echo "Push rejected (attempt $attempt/$max_attempts) — pulling and retrying..."
            attempt=$((attempt + 1))
            sleep $((RANDOM % 5 + 1))
            git fetch origin main
            git stash --include-untracked
            git rebase origin/main
            git stash pop || true
          done

          echo "Push succeeded on attempt $attempt"

  # ==========================================================================
  # JOB 5: NAV/LTP for MF, SGB, QSIF — fetch_nav_ltp.py
  # Commit & push is handled INSIDE fetch_nav_ltp.py (git_commit_and_push()).
  # No separate git step here — avoids double-commit/double-push.
  # ==========================================================================
  fetch-nav-ltp:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 -q

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run fetch_nav_ltp.py EOD mode (commits internally)
        run: python fetch_nav_ltp.py eod

      - name: Verify output file
        run: |
          if [ -f data/nav_ltp.json ]; then
            echo "✓ nav_ltp.json exists"
            ls -lh data/nav_ltp.json
          else
            echo "✗ nav_ltp.json NOT FOUND"
          fi
          if [ -f data/logs/fetch_nav_ltp.log ]; then
            echo "✓ fetch_nav_ltp.log exists"
            tail -5 data/logs/fetch_nav_ltp.log
          else
            echo "✗ fetch_nav_ltp.log NOT FOUND"
          fi

  # ==========================================================================
  # JOB 6: Bucket market_data_raw.json -> market_data.json (final output)
  # ==========================================================================
  bucket-market-data:
    runs-on: ubuntu-latest
    needs: [flatten-market-data, fetch-nav-ltp]
    steps:
      - name: Checkout repo (latest main)
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run market_data.py
        run: python market_data.py

      - name: Verify output file
        run: |
          if [ -f data/market_data.json ]; then
            echo "✓ market_data.json exists"
            ls -lh data/market_data.json
          else
            echo "✗ market_data.json NOT FOUND"
          fi

      - name: Commit & Push (retry on concurrent updates)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/market_data.json data/logs/market_data.log 2>/dev/null || true

          if git diff --quiet --cached; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "[Step 3] Bucket Market Data: $(date +'%Y-%m-%d %H:%M:%S') [skip ci]"

          max_attempts=5
          attempt=1
          until git push origin main; do
            if [ $attempt -ge $max_attempts ]; then
              echo "::error::Push failed after $max_attempts attempts"
              exit 1
            fi
            echo "Push rejected (attempt $attempt/$max_attempts) — pulling and retrying..."
            attempt=$((attempt + 1))
            sleep $((RANDOM % 5 + 1))
            git fetch origin main
            git stash --include-untracked
            git rebase origin/main
            git stash pop || true
          done

          echo "Push succeeded on attempt $attempt"

  # ==========================================================================
  # JOB 7: QSIF full NAV history SEED — fetch_nav_ltp.py history-seed
  # MANUAL ONLY (workflow_dispatch). Run once to seed qsif_history.json
  # with full available history; after that, the delta job (8) keeps it
  # up to date automatically. Re-run manually only if you need to force
  # a full re-fetch (e.g. file got corrupted or deleted).
  # SLOW — paginates each scheme's full history (minute+ per scheme).
  # Commit & push is handled INSIDE fetch_nav_ltp.py (git_commit_and_push()).
  # ==========================================================================
  fetch-qsif-history-seed:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 -q

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run fetch_nav_ltp.py history-seed (commits internally)
        run: python fetch_nav_ltp.py history-seed

      - name: Verify output file
        run: |
          if [ -f data/qsif_history.json ]; then
            echo "✓ qsif_history.json exists"
            ls -lh data/qsif_history.json
          else
            echo "✗ qsif_history.json NOT FOUND"
          fi
          if [ -f data/logs/fetch_nav_ltp.log ]; then
            echo "✓ fetch_nav_ltp.log exists"
            tail -5 data/logs/fetch_nav_ltp.log
          else
            echo "✗ fetch_nav_ltp.log NOT FOUND"
          fi

  # ==========================================================================
  # JOB 8: QSIF history DELTA fill — fetch_nav_ltp.py history-delta
  # Runs daily alongside the rest of the pipeline. Reads the existing
  # qsif_history.json, fetches only the gap since the last saved date per
  # scheme, and appends — so the file keeps accumulating rather than
  # being re-fetched from scratch. Cheap/fast in normal operation (small
  # or no gap each day). Falls back to a full fetch for any scheme with
  # no prior saved data (e.g. seed never run, or a new ISIN just added).
  # Commit & push is handled INSIDE fetch_nav_ltp.py (git_commit_and_push()).
  # ==========================================================================
  fetch-qsif-history-delta:
    runs-on: ubuntu-latest
    needs: [fetch-qsif-history-seed]
    if: always() && (needs.fetch-qsif-history-seed.result == 'success' || needs.fetch-qsif-history-seed.result == 'skipped')
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 -q

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run fetch_nav_ltp.py history-delta (commits internally)
        run: python fetch_nav_ltp.py history-delta

      - name: Verify output file
        run: |
          if [ -f data/qsif_history.json ]; then
            echo "✓ qsif_history.json exists"
            ls -lh data/qsif_history.json
          else
            echo "✗ qsif_history.json NOT FOUND"
          fi
          if [ -f data/logs/fetch_nav_ltp.log ]; then
            echo "✓ fetch_nav_ltp.log exists"
            tail -5 data/logs/fetch_nav_ltp.log
          else
            echo "✗ fetch_nav_ltp.log NOT FOUND"
          fi
