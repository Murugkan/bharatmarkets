# GitHub Actions Workflow - Manual Trigger Only
# Copy this file to: .github/workflows/merge-data-manual.yml
# 
# Usage: GitHub repo → Actions tab → "Data Merge (Manual)" → "Run workflow"

name: Data Merge (Manual)

# Manual trigger only - click "Run workflow" button in Actions tab
on:
  workflow_dispatch:
    inputs:
      debug_mode:
        description: 'Enable debug output'
        required: false
        default: 'false'

env:
  PYTHON_VERSION: '3.10'

jobs:
  merge-data:
    name: Merge Data Manually
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      actions: read
    
    steps:
      # Step 1: Checkout code
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      # Step 2: Set up Python
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      # Step 3: Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      
      # Step 4: Run merge script
      - name: 🔄 Run merge script
        id: merge
        run: |
          echo "Starting merge process..."
          python scripts/merge_script.py
          echo "merge_status=success" >> $GITHUB_OUTPUT
      
      # Step 5: Check if outputs exist
      - name: ✓ Verify output files
        run: |
          echo "Checking output files..."
          ls -lh data/outputs/
          
          if [ -f data/outputs/unified-data.json ]; then
            echo "✓ unified-data.json found"
            SIZE=$(wc -c < data/outputs/unified-data.json)
            echo "  Size: $(( SIZE / 1048576 )) MB"
          else
            echo "✗ unified-data.json NOT found"
            exit 1
          fi
      
      # Step 6: Display validation results
      - name: 📊 Show validation results
        if: always()
        run: |
          echo "=== VALIDATION REPORT ==="
          if [ -f data/outputs/validation-report.json ]; then
            python << 'EOF'
          import json
          with open('data/outputs/validation-report.json') as f:
              report = json.load(f)
          
          summary = report['summary']
          print(f"\nStatus: {summary['status']}")
          print(f"Total Stocks: {summary['total_stocks']}")
          print(f"Total Issues: {summary['total_issues']}")
          print(f"Critical Errors: {summary['critical_errors']}")
          print(f"Warnings: {summary['warnings']}")
          
          if summary['status'] == 'PASS':
              print("\n✅ VALIDATION PASSED")
          else:
              print("\n❌ VALIDATION FAILED")
              print("\nIssues:")
              for issue in summary.get('issues', [])[:5]:
                  print(f"  - {issue['type']}: {issue['message']}")
          EOF
          fi
      
      # Step 7: Upload artifacts
      - name: 📦 Upload outputs as artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: merge-outputs
          path: |
            data/outputs/
          retention-days: 30
      
      # Step 8: Create summary
      - name: 📋 Create job summary
        if: always()
        run: |
          echo "## 📊 Data Merge Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Run Number:** ${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -f data/outputs/validation-report.json ]; then
            echo "### ✅ Validation Report" >> $GITHUB_STEP_SUMMARY
            python << 'EOF'
          import json
          with open('data/outputs/validation-report.json') as f:
              report = json.load(f)
          
          summary = report['summary']
          print(f"- **Status:** {summary['status']}")
          print(f"- **Total Stocks:** {summary['total_stocks']}")
          print(f"- **Issues Found:** {summary['total_issues']}")
          print(f"- **Critical Errors:** {summary['critical_errors']}")
          print(f"- **Warnings:** {summary['warnings']}")
          EOF
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📁 Output Files" >> $GITHUB_STEP_SUMMARY
          echo "Available as artifacts below ↓" >> $GITHUB_STEP_SUMMARY
      
      # Step 9: Commit results (optional)
      - name: 💾 Commit results
        if: success()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "github-actions[bot]"
          
          git add data/outputs/ 2>/dev/null || true
          
          if git diff --cached --quiet; then
              echo "No changes to commit"
          else
              git commit -m "chore: manual data merge results"
              git push || echo "Could not push (branch may be protected)"
          fi
        continue-on-error: true
      
      # Step 10: Post success message
      - name: ✅ Success summary
        if: success()
        run: |
          echo ""
          echo "╔════════════════════════════════════════╗"
          echo "║  ✅ MERGE COMPLETED SUCCESSFULLY       ║"
          echo "╚════════════════════════════════════════╝"
          echo ""
          echo "📊 Outputs generated:"
          echo "  • unified-data.json"
          echo "  • validation-report.json"
          echo "  • conflicts-log.json"
          echo "  • unified-data-meta.json"
          echo ""
          echo "📦 Download artifacts from: Actions → This run → Artifacts"
          echo ""
