name: Deploy to GitHub Pages

on:
  push:
    paths:
      - 'index.html'
      - 'app-core.js'
      - 'app-import.js'
      - 'app-portfolio.js'
      - 'app-watchlist.js'
      - 'app-drill.js'
      - 'app-analysis.js'
      - 'app-settings.js'
      - 'app-engine.js'
      - 'app-boot.js'
      - '.github/workflows/pages.yml'
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: pages-deploy
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Minify JS modules
        run: |
          # The list below now includes app-engine and app-boot
          for f in app-core.js app-import.js app-portfolio.js app-watchlist.js app-drill.js app-analysis.js app-settings.js app-engine.js app-boot.js; do
            if [ -f "$f" ]; then
              npx --yes terser "$f" --compress --mangle --output "${f%.js}.min.js"
              echo "✅ Minified $f"
            fi
          done

      - name: Patch index.html to use minified modules
        run: |
          # This replaces src="app-engine.js" with src="app-engine.min.js"
          for f in app-core app-import app-portfolio app-watchlist app-drill app-analysis app-settings app-engine app-boot; do
            sed -i "s/src=\"${f}\.js\"/src=\"${f}.min.js\"/g" index.html
          done

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
