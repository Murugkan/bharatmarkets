name: BharatMarkets Data Fetch

on:
  schedule:
    - cron: '*/15 3-10 * * 1-5'
    - cron: '30 12 * * 1-5'
  workflow_dispatch:
    inputs:
      fetch_type:
        description: 'What to fetch'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - prices_only
          - fundamentals_only

jobs:
  fetch-prices:
    name: Fetch Live Prices
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    if: >
      (github.event_name == 'schedule' && github.event.schedule == '*/15 3-10 * * 1-5') ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.fetch_type == 'all' || github.event.inputs.fetch_type == 'prices_only'))
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install yfinance
      - run: python fetch_prices.py
      - run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prices.json symbols.json charts/ || true
          git diff --staged --quiet || git commit -m "data: prices $(date -u +'%H:%M UTC')"
          git push

  fetch-fundamentals:
    name: Fetch Fundamentals (Yahoo + Screener)
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    if: >
      (github.event_name == 'schedule' && github.event.schedule == '30 12 * * 1-5') ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.fetch_type == 'all' || github.event.inputs.fetch_type == 'fundamentals_only'))
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install yfinance requests beautifulsoup4 lxml
      - run: python fetch_fundamentals.py
      - run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add fundamentals.json || true
          git diff --staged --quiet || git commit -m "data: fundamentals $(date -u +'%H:%M UTC')"
          git push
