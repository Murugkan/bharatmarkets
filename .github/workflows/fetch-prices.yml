name: Fetch NSE Prices

on:
  schedule:
    # Every 15 min, Mon–Fri, 9:00–15:30 IST (03:30–10:00 UTC)
    - cron: '*/15 3-10 * * 1-5'
  workflow_dispatch:   # Manual trigger button in GitHub UI

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install yfinance

      - name: Fetch prices & charts
        run: python fetch_prices.py

      - name: Commit & push data files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prices.json symbols.json charts/
          git diff --staged --quiet || git commit -m "chore: update prices $(date -u +'%H:%M UTC')"
          git push
