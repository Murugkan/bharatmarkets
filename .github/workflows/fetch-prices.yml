name: BharatMarkets Data Fetch

on:
  schedule:
    - cron: '*/15 3-11 * * 1-5'   # prices every 15min, 8:30-4:30 IST Mon-Fri
    - cron: '30 12 * * 1-5'        # fundamentals daily 6PM IST Mon-Fri
  workflow_dispatch:
    inputs:
      fetch_type:
        description: 'What to fetch'
        required: false
        default: 'all'
        type: choice
        options: [all, prices_only, fundamentals_only, clean]

jobs:
  fetch-prices:
    name: Fetch Live Prices
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check if should run
        id: check
        run: |
          EVENT="${{ github.event_name }}"
          TYPE="${{ github.event.inputs.fetch_type }}"
          if [ "$EVENT" = "schedule" ]; then
            echo "run=true" >> $GITHUB_OUTPUT
          elif [ "$TYPE" = "all" ] || [ "$TYPE" = "prices_only" ] || [ "$TYPE" = "clean" ]; then
            echo "run=true" >> $GITHUB_OUTPUT
          else
            echo "run=false" >> $GITHUB_OUTPUT
          fi
      - uses: actions/checkout@v4
        if: steps.check.outputs.run == 'true'
        with: {ref: main}
      - uses: actions/setup-python@v5
        if: steps.check.outputs.run == 'true'
        with: {python-version: '3.12'}
      - run: pip install yfinance
        if: steps.check.outputs.run == 'true'
      - name: Fetch prices
        if: steps.check.outputs.run == 'true'
        env:
          RESOLVE:     ${{ github.event.inputs.fetch_type == 'all' && 'true' || 'false' }}
          CLEAN_STALE: ${{ github.event.inputs.fetch_type == 'clean' && 'true' || 'false' }}
        run: python fetch_prices.py
      - name: Commit
        if: steps.check.outputs.run == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prices.json symbols.json charts/ || true
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "data: prices $(date -u +'%H:%M UTC') [skip pages]"
          for i in 1 2 3; do git pull --rebase origin main && git push && break; sleep 5; done

  fetch-fundamentals:
    name: Fetch Fundamentals
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check if should run
        id: check
        run: |
          TYPE="${{ github.event.inputs.fetch_type }}"
          if [ "$TYPE" = "all" ] || [ "$TYPE" = "fundamentals_only" ] || [ "$TYPE" = "clean" ]; then
            echo "run=true" >> $GITHUB_OUTPUT
          else
            echo "run=false" >> $GITHUB_OUTPUT
          fi
      - uses: actions/checkout@v4
        if: steps.check.outputs.run == 'true'
        with: {ref: main}
      - uses: actions/setup-python@v5
        if: steps.check.outputs.run == 'true'
        with: {python-version: '3.12'}
      - run: pip install yfinance requests beautifulsoup4 lxml
        if: steps.check.outputs.run == 'true'
      - name: Fetch fundamentals
        if: steps.check.outputs.run == 'true'
        env:
          RESOLVE:     ${{ github.event.inputs.fetch_type == 'all' && 'true' || 'false' }}
          CLEAN_STALE: ${{ github.event.inputs.fetch_type == 'clean' && 'true' || 'false' }}
        run: python fetch_fundamentals.py
      - name: Commit
        if: steps.check.outputs.run == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add fundamentals.json guidance.json symbols.json || true
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "data: fundamentals $(date -u +'%H:%M UTC') [skip pages]"
          for i in 1 2 3; do git pull --rebase origin main && git push && break; sleep 5; done
