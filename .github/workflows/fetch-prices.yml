name: BharatMarkets Data Fetch

on:
  schedule:
    - cron: '*/15 3-11 * * 1-5'   # prices every 15min during NSE hours
    - cron: '30 12 * * 1-5'        # fundamentals daily at 6PM IST
  workflow_dispatch:
    inputs:
      fetch_type:
        description: 'What to fetch'
        required: false
        default: 'all'
        type: choice
        options: [all, prices_only, fundamentals_only, new_symbol]
      symbol:
        description: 'Single NSE symbol (for new_symbol only)'
        required: false
        default: ''

jobs:
  fetch-prices:
    name: Fetch Live Prices
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      SINGLE_SYMBOL: ${{ github.event.inputs.symbol || '' }}
    if: >
      (github.event_name == 'schedule' && github.event.schedule == '*/15 3-11 * * 1-5') ||
      (github.event_name == 'workflow_dispatch' && contains(fromJson('["all","prices_only","new_symbol"]'), github.event.inputs.fetch_type))
    steps:
      - uses: actions/checkout@v4
        with: {ref: main}
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - run: pip install yfinance
      - run: python fetch_prices.py
      - run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prices.json symbols.json charts/ || true
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "data: prices $(date -u +'%H:%M UTC') [skip pages]"
          for i in 1 2 3; do git pull --rebase origin main && git push && break; sleep 5; done

  fetch-fundamentals:
    name: Fetch Fundamentals
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      SINGLE_SYMBOL: ${{ github.event.inputs.symbol || '' }}
    if: >
      (github.event_name == 'schedule' && github.event.schedule == '30 12 * * 1-5') ||
      (github.event_name == 'workflow_dispatch' && contains(fromJson('["all","fundamentals_only","new_symbol"]'), github.event.inputs.fetch_type))
    steps:
      - uses: actions/checkout@v4
        with: {ref: main}
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - run: pip install yfinance requests beautifulsoup4 lxml
      - run: python fetch_fundamentals.py
      - run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add fundamentals.json || true
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "data: fundamentals $(date -u +'%H:%M UTC') [skip pages]"
          for i in 1 2 3; do git pull --rebase origin main && git push && break; sleep 5; done
