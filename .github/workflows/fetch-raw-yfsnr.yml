name: Fetch Raw LTP (Yahoo + Screener)

on:
  schedule:
    # 17:00 IST daily = 11:30 UTC (after NSE market close at 15:30 IST)
    - cron: '30 11 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-raw-yfsnr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance requests beautifulsoup4

      - name: Run fetch-raw-yfsnr.py
        run: python fetch-raw-yfsnr.py

      - name: Pull remote changes before push
        run: git pull --rebase origin main
        continue-on-error: true

      - name: Push changes
        run: git push origin main
        continue-on-error: true
