name: 'Fetch Raw Data (Yahoo history + Screener overview)'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# fetch-raw-yfsnr.py — bulk historical price/overview data from Yahoo
# Finance and Screener.in. Standalone so it can be run manually for just
# this one step without triggering the rest of the pipeline, or called
# from e2e-parallel.yml as part of the full daily run.

on:
  workflow_call:
    inputs:
      providers:
        type: string
        default: 'all'
      history_period:
        type: string
        default: '10y'
      log_level:
        type: string
        default: 'WARNING'
  workflow_dispatch:
    inputs:
      providers:
        description: 'Raw data providers'
        required: true
        default: 'all'
        type: choice
        options:
          - 'all'
          - 'yahoofin'
          - 'screener'
      history_period:
        description: 'Yahoo history period'
        required: false
        default: '10y'
        type: choice
        options:
          - '10y'
          - '5y'
          - '2y'
          - '1y'
      log_level:
        description: 'Log level'
        required: false
        default: 'WARNING'
        type: choice
        options:
          - 'DEBUG'
          - 'INFO'
          - 'WARNING'
          - 'ERROR'

jobs:
  fetch-raw:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r libraries_yfin.txt -q

      - name: Run fetch-raw-yfsnr.py
        env:
          FETCH_PROVIDERS: ${{ inputs.providers || 'all' }}
          HISTORY_PERIOD: ${{ inputs.history_period || '10y' }}
          LOG_LEVEL: ${{ inputs.log_level || 'WARNING' }}
        run: |
          python3 << 'PYTHON_EOF'
          import os
          import json

          providers = os.getenv('FETCH_PROVIDERS', 'all')
          history_period = os.getenv('HISTORY_PERIOD', '10y')
          log_level = os.getenv('LOG_LEVEL', 'WARNING')

          history_intervals = ['1d', '1wk', '1mo']

          config = {
            'yahoo': False,
            'screener': False,
            'history_period': history_period,
            'history_intervals': history_intervals,
            'log_level': log_level
          }

          if 'all' in providers:
            config['yahoo'] = True
            config['screener'] = True
          elif 'yahoofin' in providers:
            config['yahoo'] = True
          elif 'screener' in providers:
            config['screener'] = True

          with open('.fetch_config.json', 'w') as f:
            json.dump(config, f, indent=2)

          print(f"Fetch config: {json.dumps(config, indent=2)}")
          PYTHON_EOF

          python fetch-raw-yfsnr.py

      - name: Verify output files
        run: |
          echo "=== Checking output files ==="
          [ -f data/yahoofin_raw_data.json ] && echo "✓ yahoofin_raw_data.json" || echo "✗ yahoofin_raw_data.json not found"
          [ -f data/screener_raw_data.json ] && echo "✓ screener_raw_data.json" || echo "✗ screener_raw_data.json not found"
          [ -f data/logs/fetch-raw-yfsnr.log ] && echo "✓ fetch-raw-yfsnr.log" || echo "✗ fetch-raw-yfsnr.log not found"
