name: 'Test: MF NAV + Bucket Market Data'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:

jobs:
  # ==========================================================================
  # JOB 1: Mutual fund / SGB NAV from AMFI — fetch_nav_ltp.py
  # ==========================================================================
  fetch-mf-nav:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests -q

      - name: Run fetch_nav_ltp.py
        run: python fetch_nav_ltp.py

      - name: Verify output file
        run: |
          if [ -f data/nav_ltp.json ]; then
            echo "✓ nav_ltp.json exists"
            cat data/nav_ltp.json
          else
            echo "✗ nav_ltp.json NOT FOUND"
          fi

      - name: Commit & Push (retry on concurrent updates)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/nav_ltp.json data/logs/fetch_nav_ltp.log 2>/dev/null || true

          if git diff --quiet --cached; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "[TEST] Fetch AMFI NAV: $(date +'%Y-%m-%d %H:%M:%S')"

          max_attempts=5
          attempt=1
          until git push origin main; do
            if [ $attempt -ge $max_attempts ]; then
              echo "::error::Push failed after $max_attempts attempts"
              exit 1
            fi
            echo "Push rejected (attempt $attempt/$max_attempts) — pulling and retrying..."
            attempt=$((attempt + 1))
            sleep $((RANDOM % 5 + 1))
            git fetch origin main
            git stash --include-untracked
            git rebase origin/main
            git stash pop || true
          done

          echo "Push succeeded on attempt $attempt"

  # ==========================================================================
  # JOB 2: Bucket market_data_raw.json -> market_data.json (final output)
  # Runs after fetch-mf-nav so nav_ltp.json is available.
  # NOTE: requires market_data_raw.json to already exist in the repo from a
  # previous full pipeline run.
  # ==========================================================================
  bucket-market-data:
    runs-on: ubuntu-latest
    needs: [fetch-mf-nav]
    steps:
      - name: Checkout repo (latest main)
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run market_data.py
        run: python market_data.py

      - name: Verify output file
        run: |
          if [ -f data/market_data.json ]; then
            echo "✓ market_data.json exists"
            ls -lh data/market_data.json
          else
            echo "✗ market_data.json NOT FOUND"
          fi

      - name: Commit & Push (retry on concurrent updates)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/market_data.json data/logs/market_data.log 2>/dev/null || true

          if git diff --quiet --cached; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "[TEST] Bucket Market Data: $(date +'%Y-%m-%d %H:%M:%S')"

          max_attempts=5
          attempt=1
          until git push origin main; do
            if [ $attempt -ge $max_attempts ]; then
              echo "::error::Push failed after $max_attempts attempts"
              exit 1
            fi
            echo "Push rejected (attempt $attempt/$max_attempts) — pulling and retrying..."
            attempt=$((attempt + 1))
            sleep $((RANDOM % 5 + 1))
            git fetch origin main
            git stash --include-untracked
            git rebase origin/main
            git stash pop || true
          done

          echo "Push succeeded on attempt $attempt"
