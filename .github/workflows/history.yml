name: "[HISTORY] Fetch & Merge Data"

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  history-load:
    name: "Fetch & Merge Stock Data"
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install dependencies
        run: pip install yfinance requests beautifulsoup4

      - name: Create data directories
        run: mkdir -p data

      - name: Fetch data (Step 1)
        run: python fetch_history.py

      - name: Merge data (Step 2)
        run: python merge_script.py
