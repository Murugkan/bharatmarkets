name: Fetch eq-ltp & indices

on:
  schedule:
    # Every 50 min, 5:20 AM – 12:00 PM IST (Mon–Fri)
    # IST = UTC + 5:30; times below are UTC
    - cron: '50 23 * * 0-4'  # 05:20 IST
    - cron: '40 0 * * 1-5'   # 06:10 IST
    - cron: '30 1 * * 1-5'   # 07:00 IST
    - cron: '20 2 * * 1-5'   # 07:50 IST
    - cron: '10 3 * * 1-5'   # 08:40 IST
    - cron: '0 4 * * 1-5'    # 09:30 IST
    - cron: '50 4 * * 1-5'   # 10:20 IST
    - cron: '40 5 * * 1-5'   # 11:10 IST
    - cron: '30 6 * * 1-5'   # 12:00 IST
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fetch-prices:
    name: Fetch Live Price & index
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with: {ref: main}
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - run: pip install yfinance requests beautifulsoup4 -q
      - name: Fetch prices
        run: python fetch_ltp.py
      - name: Commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ltp.json data/sector_indices.json data/unified-symbols.json data/logs/fetch_ltp.log || true
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "data: ltp $(date -u +'%H:%M UTC') [skip ci]"
          for i in 1 2 3; do git pull --rebase origin main && git push && break; sleep 5; done
