name: "fetch_financials_yahoofin"

on:
  workflow_dispatch:
    inputs:
      log_level:
        description: "Log level"
        required: true
        default: "WARNING"
        type: choice
        options:
          - DEBUG
          - INFO
          - WARNING
          - ERROR

jobs:
  fetch-financials:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: "📥 Checkout repository"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "🐍 Setup Python"
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: "📦 Install dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas requests beautifulsoup4 -q

      - name: "⚙️ Create fetch configuration"
        run: |
          cat > .fetch_config.json << 'EOF'
          {
            "yahoof": true,
            "log_level": "${{ github.event.inputs.log_level || 'WARNING' }}"
          }
          EOF
          cat .fetch_config.json

      - name: "🔄 [YahooF] Fetch financial metrics"
        run: |
          python fetch_yahoofin_financials.py
        continue-on-error: true

      - name: "📊 Verify output files"
        run: |
          echo "=== Checking YahooF Output Files ==="
          if [ -f data/yahoofin_financials.json ]; then
            echo "✓ yahoofin_financials.json exists"
            ls -lh data/yahoofin_financials.json
            echo "  Size: $(wc -c < data/yahoofin_financials.json) bytes"
            echo "  First 100 chars:"
            head -c 100 data/yahoofin_financials.json
          else
            echo "✗ yahoofin_financials.json NOT FOUND"
          fi
          
          echo ""
          echo "=== Checking Log Files ==="
          if [ -f data/logs/fetch_yahoofin_financials.log ]; then
            echo "✓ fetch_yahoofin_financials.log exists"
            ls -lh data/logs/fetch_yahoofin_financials.log
            echo "  Size: $(wc -c < data/logs/fetch_yahoofin_financials.log) bytes"
            tail -5 data/logs/fetch_yahoofin_financials.log
          else
            echo "✗ fetch_yahoofin_financials.log NOT FOUND"
          fi
          
          echo ""
          echo "=== All data directory files ==="
          ls -lhR data/ 2>/dev/null || echo "No data directory"

      - name: "🔐 Configure Git & Check Gitignore"
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          echo "=== Checking .gitignore ==="
          if [ -f .gitignore ]; then
            echo "Contents of .gitignore:"
            cat .gitignore
          else
            echo "No .gitignore file found"
          fi
          
          echo ""
          echo "=== Current git status ==="
          git status

      - name: "✅ Force-commit & Push"
        run: |
          echo "Force-adding files (overriding .gitignore)..."
          [ -f fetch_yahoofin_financials.py ] && git add -f fetch_yahoofin_financials.py || echo "⚠ yahoofin script not found"
          
          [ -f data/yahoofin_financials.json ] && git add -f data/yahoofin_financials.json || echo "⚠ yahoofin_financials.json not found"
          [ -f data/logs/fetch_yahoofin_financials.log ] && git add -f data/logs/fetch_yahoofin_financials.log || echo "⚠ fetch_yahoofin_financials.log not found"
          
          echo ""
          echo "Git status after add..."
          git status
          
          echo ""
          echo "Committing..."
          git commit -m "chore: [FETCH] Financial Metrics - $(date +'%Y-%m-%d %H:%M:%S')" 2>&1 || echo "Nothing new to commit"
          
          echo ""
          echo "Pushing..."
          git push origin HEAD:main 2>&1 || echo "Push failed"

      - name: "📝 Summary"
        if: always()
        run: |
          echo "=== FETCH SUMMARY ==="
          echo "Workflow: fetch_financials_yahoofin"
          echo "Status: ${{ job.status }}"
          echo "Timestamp: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          echo ""
          echo "Output files:"
          echo "  - data/yahoofin_financials.json"
          echo ""
          echo "Log files:"
          echo "  - data/logs/fetch_yahoofin_financials.log"
