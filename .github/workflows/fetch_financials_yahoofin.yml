name: "fetch_financials_yahoofin"

on:
  workflow_dispatch:
    inputs:
      log_level:
        description: "Log level"
        required: true
        default: "WARNING"
        type: choice
        options:
          - DEBUG
          - INFO
          - WARNING
          - ERROR

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fetch-financials:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: "📥 Checkout repository"
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: "🐍 Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: "📦 Install dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas requests beautifulsoup4 -q

      - name: "⚙️ Create fetch configuration"
        run: |
          cat > .fetch_config.json << 'EOF'
          {
            "yahoof": true,
            "log_level": "${{ github.event.inputs.log_level || 'WARNING' }}"
          }
          EOF
          cat .fetch_config.json

      - name: "🔄 [YahooF] Fetch financial metrics"
        run: |
          python fetch_yahoofin_financials.py
        continue-on-error: true

      - name: "📊 Verify output files"
        run: |
          echo "=== Checking YahooF Output Files ==="
          if [ -f data/yahoofin_financials.json ]; then
            echo "✓ yahoofin_financials.json exists"
            ls -lh data/yahoofin_financials.json
            echo "  Size: $(wc -c < data/yahoofin_financials.json) bytes"
            echo "  First 100 chars:"
            head -c 100 data/yahoofin_financials.json
          else
            echo "✗ yahoofin_financials.json NOT FOUND"
          fi

          echo ""
          echo "=== Checking Log Files ==="
          if [ -f data/logs/fetch_yahoofin_financials.log ]; then
            echo "✓ fetch_yahoofin_financials.log exists"
            ls -lh data/logs/fetch_yahoofin_financials.log
            echo "  Size: $(wc -c < data/logs/fetch_yahoofin_financials.log) bytes"
            tail -5 data/logs/fetch_yahoofin_financials.log
          else
            echo "✗ fetch_yahoofin_financials.log NOT FOUND"
          fi

          echo ""
          echo "=== All data directory files ==="
          ls -lhR data/ 2>/dev/null || echo "No data directory"

      - name: "🔐 Configure Git & Check Status"
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config core.autocrlf false
          git config core.fileMode false

          echo "=== Checking .gitignore ==="
          if [ -f .gitignore ]; then
            echo "Contents of .gitignore:"
            cat .gitignore
          else
            echo "No .gitignore file found"
          fi

          echo ""
          echo "=== Current git status ==="
          git status

      - name: "✅ Force-commit & Push (retry on concurrent updates)"
        run: |
          echo "Force-adding files..."
          [ -f fetch_yahoofin_financials.py ]              && git add -f fetch_yahoofin_financials.py              || echo "⚠ fetch_yahoofin_financials.py not found"
          [ -f data/yahoofin_financials.json ]             && git add -f data/yahoofin_financials.json             || echo "⚠ yahoofin_financials.json not found"
          [ -f data/logs/fetch_yahoofin_financials.log ]   && git add -f data/logs/fetch_yahoofin_financials.log   || echo "⚠ fetch_yahoofin_financials.log not found"
          [ -f .fetch_config.json ]                        && git add -f .fetch_config.json                        || echo "⚠ .fetch_config.json not found"

          echo ""
          echo "=== Staged changes ==="
          git diff --cached --stat

          echo ""
          if git diff --cached --quiet; then
            echo "Nothing new to commit — skipping"
            exit 0
          fi

          echo "Committing..."
          git commit -m "chore: [FETCH] Financial Metrics - $(date +'%Y-%m-%d %H:%M:%S')"

          # Retry push with rebase to survive other workflows pushing to main
          # concurrently. Each retry re-applies this commit on top of the
          # latest remote main.
          echo ""
          echo "Pushing..."
          max_attempts=5
          attempt=1
          until git push origin HEAD:main; do
            if [ $attempt -ge $max_attempts ]; then
              echo "::error::Push failed after $max_attempts attempts"
              exit 1
            fi
            echo "Push rejected (attempt $attempt/$max_attempts) — pulling and retrying..."
            attempt=$((attempt + 1))
            sleep $((RANDOM % 5 + 1))  # jitter to reduce repeated collisions
            git fetch origin main
            git stash --include-untracked
            git rebase origin/main
            git stash pop || true
          done

          echo "Push succeeded on attempt $attempt"

      - name: "📝 Summary"
        if: always()
        run: |
          echo "=== FETCH SUMMARY ==="
          echo "Workflow: fetch_financials_yahoofin"
          echo "Status: ${{ job.status }}"
          echo "Timestamp: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          echo ""
          echo "Output files:"
          echo "  - data/yahoofin_financials.json"
          echo ""
          echo "Log files:"
          echo "  - data/logs/fetch_yahoofin_financials.log"
