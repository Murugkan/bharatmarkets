name: BharatMarkets Data Fetch

on:
  schedule:
    - cron: '*/15 3-11 * * 1-5'
    - cron: '30 12 * * 1-5'
  workflow_dispatch:
    inputs:
      fetch_type:
        description: 'What to fetch'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - prices_only
          - fundamentals_only
          - new_symbol
          - guidance
      symbol:
        description: 'Single NSE symbol (for new_symbol only)'
        required: false
        default: ''

jobs:
  fetch-prices:
    name: Fetch Live Prices
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      SINGLE_SYMBOL: ${{ github.event.inputs.symbol || '' }}
    if: ${{ (github.event_name == 'schedule' && github.event.schedule == '*/15 3-11 * * 1-5') || (github.event_name == 'workflow_dispatch' && (github.event.inputs.fetch_type == 'all' || github.event.inputs.fetch_type == 'prices_only' || github.event.inputs.fetch_type == 'new_symbol')) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install yfinance

      - name: Fetch prices
        run: python fetch_prices.py

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prices.json symbols.json charts/ || true
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "data: prices $(date -u +'%H:%M UTC') [skip pages]"
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break
            sleep 5
          done

  fetch-fundamentals:
    name: Fetch Fundamentals
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      SINGLE_SYMBOL: ${{ github.event.inputs.symbol || '' }}
    if: ${{ (github.event_name == 'schedule' && github.event.schedule == '30 12 * * 1-5') || (github.event_name == 'workflow_dispatch' && (github.event.inputs.fetch_type == 'all' || github.event.inputs.fetch_type == 'fundamentals_only' || github.event.inputs.fetch_type == 'new_symbol')) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install yfinance requests beautifulsoup4 lxml

      - name: Fetch fundamentals
        run: python fetch_fundamentals.py

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add fundamentals.json || true
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "data: fundamentals $(date -u +'%H:%M UTC') [skip pages]"
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break
            sleep 5
          done

  fetch-guidance:
    name: Fetch AI Guidance
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      SINGLE_SYMBOL: ${{ github.event.inputs.symbol || '' }}
    if: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.fetch_type == 'all' || github.event.inputs.fetch_type == 'guidance') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch guidance
        run: python fetch_guidance.py

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add guidance.json || true
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "data: guidance $(date -u +'%b %Y') [skip pages]"
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break
            sleep 5
          done
