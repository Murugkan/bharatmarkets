<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>BharatMarkets | Tape Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
    <style>
        *{box-sizing:border-box;margin:0;padding:0;}
        body{background:#000;color:#fff;font-family:'JetBrains Mono',monospace;padding:16px;font-size:11px;line-height:2;}
        b{color:#00f2ff;}
        pre{background:#111;padding:10px;border-radius:6px;overflow:auto;font-size:10px;line-height:1.6;white-space:pre-wrap;word-break:break-all;}
    </style>
</head>
<body>
<script>
const out = [];
out.push('<b>All localStorage keys:</b><br>' + Object.keys(localStorage).join(', ') + '<br><br>');

const raw = localStorage.getItem(‘bmp_port_v2’);
if (!raw) {
out.push(’<b>bmp_port_v2:</b> null / not found<br>’);
} else {
out.push(’<b>bmp_port_v2 length:</b> ’ + raw.length + ’ chars<br>’);
out.push(’<b>First 500 chars:</b><br><pre>’ + raw.slice(0,500) + ‘</pre><br>’);
try {
const parsed = JSON.parse(raw);
out.push(’<b>Type:</b> ’ + (Array.isArray(parsed) ? ‘Array[’+parsed.length+’]’ : typeof parsed) + ‘<br>’);
if (typeof parsed === ‘object’ && !Array.isArray(parsed)) {
out.push(’<b>Keys:</b> ’ + Object.keys(parsed).join(’, ‘) + ‘<br>’);
}
if (Array.isArray(parsed) && parsed.length > 0) {
out.push(’<b>First item keys:</b> ’ + Object.keys(parsed[0]).join(’, ‘) + ‘<br>’);
out.push(’<b>First item:</b><br><pre>’ + JSON.stringify(parsed[0], null, 2) + ‘</pre>’);
}
} catch(e) {
out.push(’<b>JSON parse error:</b> ’ + e.message + ‘<br>’);
}
}

document.body.innerHTML = out.join(’’);
</script>

</body>
</html>
