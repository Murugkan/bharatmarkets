<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
    <title>Portfolio Data</title>
    <style>
        :root { --bg:#000; --s1:#0a0a0a; --b1:#222; --bl:#00f2ff; --gr:#00ff88; --rd:#ff4d6d; --tx:#fff; }
        *{box-sizing:border-box;margin:0;padding:0;}
        body { background:var(--bg); color:var(--tx); font-family:monospace; padding-bottom:80px; }
        
        header { background:var(--s1); border-bottom:1px solid var(--b1); padding:12px; display:flex; justify-content:space-between; }
        .title { font-size:14px; font-weight:bold; color:var(--bl); }
        .header-right { display:flex; gap:10px; }
        button { padding:8px 12px; background:var(--gr); color:#000; border:none; border-radius:4px; cursor:pointer; font-weight:bold; font-size:11px; }
        
        .container { padding:15px; }
        
        /* LOG WINDOW - CRITICAL FOR iPHONE */
        #debug-log-window {
            background:#000;
            border:2px solid var(--gr);
            border-radius:6px;
            padding:10px;
            margin:15px 0;
            max-height:200px;
            overflow-y:auto;
            font-size:10px;
            color:var(--gr);
            font-family:monospace;
            white-space:pre-wrap;
            word-break:break-all;
        }
        
        .log-header {
            color:var(--gr);
            font-weight:bold;
            margin-bottom:10px;
            border-bottom:1px solid var(--gr);
            padding-bottom:5px;
        }
        
        .table-wrap { overflow-x:auto; background:#050505; border:1px solid var(--b1); border-radius:8px; margin:20px 0; max-height:400px; overflow-y:auto; }
        table { width:100%; border-collapse:collapse; font-size:10px; }
        th { background:#111; color:var(--gr); padding:8px; text-align:left; border-bottom:1px solid var(--b1); position:sticky; top:0; }
        td { padding:8px; border-bottom:0.5px solid #111; }
        
        .pat-section { background:var(--s1); border:1px solid var(--b1); border-radius:8px; padding:15px; margin:20px 0; }
        .pat-section h3 { color:var(--gr); font-size:12px; margin-bottom:10px; }
        
        input { width:100%; padding:8px; margin:5px 0; background:#000; border:1px solid var(--b1); color:var(--tx); border-radius:4px; font-size:11px; font-family:monospace; box-sizing:border-box; }
        
        .button-group { display:flex; gap:10px; margin:10px 0; }
        .button-group button { flex:1; }
        
        footer { position:fixed; bottom:0; width:100%; background:rgba(0,0,0,0.95); border-top:1px solid #222; display:flex; justify-content:space-around; padding:12px 0; z-index:1000; }
        .nav-btn { text-decoration:none; color:#666; display:flex; flex-direction:column; align-items:center; width:33%; padding:8px 0; font-size:10px; }
        .nav-btn.active { color:var(--bl); font-weight:bold; }
    </style>
</head>
<body>

<header>
    <div class="title">📊 DATA</div>
    <div class="header-right">
        <button onclick="location.reload()">🔄 Reload</button>
    </div>
</header>

<div class="container">
    
    <!-- LOG WINDOW - VISIBLE FOR iPhone -->
    <div style="border:2px solid var(--gr); border-radius:6px; padding:10px; margin:15px 0;">
        <div class="log-header">📋 DEBUG LOG</div>
        <div id="debug-log-window" style="background:#000;color:var(--gr);font-size:10px;max-height:200px;overflow-y:auto;padding:8px;border:1px solid #333;border-radius:4px;font-family:monospace;white-space:pre-wrap;word-break:break-all;">
            Starting...
        </div>
    </div>
    
    <!-- PORTFOLIO TABLE -->
    <h3 style="color:var(--gr);margin-top:20px;">Portfolio</h3>
    <div class="table-wrap">
        <table id="portfolio-table">
            <thead>
                <tr>
                    <th>Symbol</th>
                    <th>Name</th>
                    <th>Type</th>
                    <th>QTY</th>
                    <th>AVG</th>
                    <th>Sector</th>
                    <th>ISIN</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="portfolio-body">
                <tr><td colspan="8" style="text-align:center;color:#666;">No data</td></tr>
            </tbody>
        </table>
    </div>
    
    <!-- REFRESH BUTTONS -->
    <h3 style="color:var(--gr);margin-top:20px;">Refresh Data</h3>
    <div class="button-group">
        <button onclick="refreshPrices()">📈 Prices</button>
        <button onclick="refreshFundamentals()">💹 Fundamentals</button>
        <button onclick="fullSync()">🔗 Full Sync</button>
    </div>
    
    <!-- GITHUB PAT CONFIG - ONE SECTION ONLY -->
    <div class="pat-section">
        <h3>🔐 GitHub PAT Config</h3>
        
        <div id="pat-form" style="display:none;">
            <label style="color:#888;font-size:9px;">GitHub PAT:</label>
            <input type="password" id="ghPAT" placeholder="ghp_xxxxxxxxxxxxx">
            <label style="color:#888;font-size:9px;">GitHub User:</label>
            <input type="text" id="ghUser" placeholder="murugkan">
            <label style="color:#888;font-size:9px;">GitHub Repo:</label>
            <input type="text" id="ghRepo" placeholder="bharatmarkets">
            <div class="button-group">
                <button onclick="savePATConfig()">Save Config</button>
            </div>
        </div>
        
        <div id="pat-display" style="display:none;padding:10px;background:#050505;border-radius:4px;font-size:10px;">
            <div style="color:var(--gr);font-weight:bold;margin-bottom:5px;">✅ Configured</div>
            <div style="color:#888;">
                User: <span id="display-user"></span><br>
                Repo: <span id="display-repo"></span><br>
                PAT: <span id="display-pat"></span>
            </div>
        </div>
        
        <div class="button-group">
            <button onclick="togglePATForm()" id="toggle-btn">Edit Config</button>
            <button onclick="testPATConnection()">🧪 Test</button>
        </div>
        
        <div id="pat-message" style="margin-top:10px;font-size:10px;color:#888;"></div>
    </div>
    
</div>

<!-- FOOTER -->
<footer>
    <a href="index.html" class="nav-btn">📊 Portfolio</a>
    <a href="data.html" class="nav-btn active">📋 Data</a>
    <a href="nexus.html" class="nav-btn">📥 Import</a>
</footer>

<script src="app-import.js"></script>
<script>

// ===== LOG WINDOW =====
var debugLogs = [];

function addDebugLog(msg) {
    var ts = new Date().toLocaleTimeString();
    var logMsg = '[' + ts + '] ' + msg;
    debugLogs.push(logMsg);
    
    var logDiv = document.getElementById('debug-log-window');
    if (logDiv) {
        logDiv.innerHTML += logMsg + '\n';
        logDiv.scrollTop = logDiv.scrollHeight;
    }
    console.log(logMsg);
}

// ===== PAT FUNCTIONS =====
function initPATDisplay() {
    var ghPAT = localStorage.getItem('ghPAT');
    var ghUser = localStorage.getItem('ghUser');
    var ghRepo = localStorage.getItem('ghRepo');
    var isPATConfigured = ghPAT && ghUser && ghRepo;
    
    var patForm = document.getElementById('pat-form');
    var patDisplay = document.getElementById('pat-display');
    
    if (isPATConfigured) {
        patForm.style.display = 'none';
        patDisplay.style.display = 'block';
        document.getElementById('display-user').textContent = ghUser;
        document.getElementById('display-repo').textContent = ghRepo;
        document.getElementById('display-pat').textContent = ghPAT.substring(0, 10) + '...';
        document.getElementById('toggle-btn').textContent = 'Edit Config';
        addDebugLog('✅ PAT configured');
    } else {
        patForm.style.display = 'block';
        patDisplay.style.display = 'none';
        document.getElementById('toggle-btn').textContent = 'Show Form';
        addDebugLog('⚠️ PAT not configured');
    }
}

function togglePATForm() {
    var patForm = document.getElementById('pat-form');
    patForm.style.display = patForm.style.display === 'none' ? 'block' : 'none';
}

function savePATConfig() {
    var pat = document.getElementById('ghPAT').value.trim();
    var user = document.getElementById('ghUser').value.trim();
    var repo = document.getElementById('ghRepo').value.trim();
    
    if (!pat || !user || !repo) {
        addDebugLog('❌ All fields required');
        return;
    }
    
    localStorage.setItem('ghPAT', pat);
    localStorage.setItem('ghUser', user);
    localStorage.setItem('ghRepo', repo);
    
    addDebugLog('✅ PAT saved');
    initPATDisplay();
    
    document.getElementById('ghPAT').value = '';
    document.getElementById('ghUser').value = '';
    document.getElementById('ghRepo').value = '';
}

function testPATConnection() {
    var ghPAT = localStorage.getItem('ghPAT');
    var ghUser = localStorage.getItem('ghUser');
    var ghRepo = localStorage.getItem('ghRepo');
    
    if (!ghPAT || !ghUser || !ghRepo) {
        addDebugLog('❌ PAT not configured');
        return;
    }
    
    addDebugLog('🧪 Testing connection...');
    
    var apiUrl = 'https://api.github.com/repos/' + ghUser + '/' + ghRepo + '/contents/unified-symbols.json';
    
    fetch(apiUrl, {
        headers: { 'Authorization': 'token ' + ghPAT }
    })
    .then(function(r) {
        if (r.status === 200) {
            addDebugLog('✅ Connection OK');
        } else {
            addDebugLog('❌ Error ' + r.status);
        }
    })
    .catch(function(e) {
        addDebugLog('❌ Connection failed');
    });
}

// ===== REFRESH FUNCTIONS =====
function refreshPrices() {
    addDebugLog('📈 Refreshing prices...');
    location.reload();
}

function refreshFundamentals() {
    addDebugLog('💹 Refreshing fundamentals...');
    location.reload();
}

function fullSync() {
    addDebugLog('🔗 Full sync + reload...');
    setTimeout(function() {
        location.reload();
    }, 500);
}

// ===== TABLE FUNCTIONS =====
function loadPortfolioTable() {
    var DB_NAME = "OnyxPortfolioDB";
    var STORE_NAME = "Stocks";
    
    try {
        var request = indexedDB.open(DB_NAME, 8);
        
        request.onsuccess = function(e) {
            var db = e.target.result;
            var tx = db.transaction(STORE_NAME, 'readonly');
            var store = tx.objectStore(STORE_NAME);
            var getAll = store.getAll();
            
            getAll.onsuccess = function() {
                var stocks = getAll.result || [];
                addDebugLog('📊 Loaded ' + stocks.length + ' stocks');
                renderTable(stocks);
            };
        };
    } catch(e) {
        addDebugLog('❌ Error: ' + e.message);
    }
}

function renderTable(portfolio) {
    var tbody = document.getElementById('portfolio-body');
    
    if (!portfolio || portfolio.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;color:#666;">No data</td></tr>';
        return;
    }
    
    var html = '';
    for (var i = 0; i < portfolio.length; i++) {
        var stock = portfolio[i];
        var sym = stock.SYM || stock.sym || '?';
        var name = stock.name || '?';
        var type = stock.type || '?';
        var qty = stock.QTY || 0;
        var avg = stock.AVG || 0;
        var sector = stock.SECTOR || '?';
        var isin = stock.isin || '?';
        
        html += '<tr>' +
            '<td>' + sym + '</td>' +
            '<td>' + name + '</td>' +
            '<td>' + type + '</td>' +
            '<td>' + qty + '</td>' +
            '<td>' + avg.toFixed(2) + '</td>' +
            '<td>' + sector + '</td>' +
            '<td>' + isin + '</td>' +
            '<td><button onclick="deleteStock(\'' + sym + '\')" style="padding:4px 8px;font-size:9px;background:#ff6b85;">✕</button></td>' +
            '</tr>';
    }
    
    tbody.innerHTML = html;
    addDebugLog('✅ Table rendered (' + portfolio.length + ' rows)');
}

function deleteStock(sym) {
    if (!confirm('Delete ' + sym + '?')) return;
    
    addDebugLog('🗑️ Deleting ' + sym + '...');
    
    var DB_NAME = "OnyxPortfolioDB";
    var STORE_NAME = "Stocks";
    
    var request = indexedDB.open(DB_NAME, 8);
    
    request.onsuccess = function(e) {
        var db = e.target.result;
        var tx = db.transaction(STORE_NAME, 'readwrite');
        var store = tx.objectStore(STORE_NAME);
        var getAll = store.getAll();
        
        getAll.onsuccess = function() {
            var stocks = getAll.result || [];
            
            for (var i = 0; i < stocks.length; i++) {
                if ((stocks[i].SYM || stocks[i].sym) === sym) {
                    store.delete(i);
                    addDebugLog('✅ Deleted from IndexedDB');
                    break;
                }
            }
            
            setTimeout(function() {
                loadPortfolioTable();
            }, 300);
        };
    };
}

// ===== PAGE LOAD =====
window.addEventListener('DOMContentLoaded', function() {
    addDebugLog('🚀 Page loaded');
    initPATDisplay();
    loadPortfolioTable();
});

</script>
</body>
</html>
