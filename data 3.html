<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
    <title>Portfolio Data</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg:#000; --s1:#0a0a0a; --b1:#222; --bl:#00f2ff; --gr:#00ff88; --rd:#ff4d6d; --tx:#fff; }
        *{box-sizing:border-box;margin:0;padding:0;}
        body { background:var(--bg); color:var(--tx); font-family:'JetBrains Mono',monospace; padding-bottom:80px; }
        header { background:var(--s1); border-bottom:1px solid var(--b1); padding:12px; display:flex; justify-content:space-between; align-items:center; }
        .title { font-size:14px; font-weight:800; color:var(--bl); }
        .header-right { display:flex; gap:10px; }
        button { padding:8px 12px; background:#00ff88; color:#000; border:none; border-radius:4px; cursor:pointer; font-weight:bold; font-size:11px; }
        button:hover { opacity:0.9; }
        .container { padding:15px; max-width:100%; margin:0 auto; }
        .refresh-section { background:#0a0a0a; border:1px solid var(--b1); border-radius:8px; padding:15px; margin-bottom:20px; }
        .refresh-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(250px, 1fr)); gap:15px; }
        .refresh-card { background:#050505; border:1px solid var(--b1); border-radius:6px; padding:12px; }
        .refresh-card-title { font-size:11px; color:var(--bl); font-weight:800; margin-bottom:8px; }
        .refresh-btn { width:100%; padding:10px; background:var(--gr); color:#000; border:none; border-radius:4px; font-weight:bold; cursor:pointer; font-size:11px; transition: opacity 0.2s; }
        .refresh-btn:hover { opacity:0.9; }
        .refresh-btn:disabled { opacity:0.5; cursor:not-allowed; }
        .refresh-timestamp { font-size:9px; color:#666; margin-top:8px; }
        .refresh-status { font-size:9px; color:#888; margin-top:4px; font-style:italic; }
        .table-wrap { overflow-x:auto; background:#050505; border:1px solid var(--b1); border-radius:8px; margin-top:20px; max-height:600px; overflow-y:auto; }
        table { width:100%; border-collapse:collapse; font-size:10px; }
        th { background:#111; color:#00ff88; padding:8px; text-align:left; border-bottom:1px solid var(--b1); position:sticky; top:0; font-weight:800; }
        td { padding:8px; border-bottom:0.5px solid #111; }
        tr:hover { background:#0a0a0a; }
        .pos { color:#00ff88; }
        .neg { color:#ff6b85; }
        .editable { cursor:pointer; color:#00ff88; text-decoration:underline; }
        .editable:hover { opacity:0.8; }
        
        footer { position:fixed; bottom:0; width:100%; background:rgba(0,0,0,0.95); border-top:1px solid #222; display:flex; justify-content:space-around; padding:12px 0; z-index:1000; }
        .nav-btn { text-decoration:none; color:#666; display:flex; flex-direction:column; align-items:center; width:33%; padding:8px 0; transition:color 0.2s; }
        .nav-btn:hover { color:var(--bl); }
        .nav-btn.active { color:var(--bl); font-weight:800; }
        .nav-label { font-size:8px; margin-top:4px; font-weight:800; text-transform:uppercase; letter-spacing:1px; }
        
        .alert { padding:10px; margin:10px 0; border-radius:4px; font-size:11px; }
        .alert-success { background:#0a2a1a; color:#00ff88; border-left:3px solid #00ff88; }
        .alert-error { background:#2a0a0a; color:#ff6b85; border-left:3px solid #ff6b85; }
        .alert-info { background:#0a1a2a; color:#00f2ff; border-left:3px solid #00f2ff; }
    </style>
</head>
<body>

<header>
    <div class="title">📊 PORTFOLIO DATA</div>
    <div class="header-right">
        <button onclick="openImportWorkflow()">📥 Load</button>
        <button onclick="location.reload()">🔄 Reload</button>
    </div>
</header>

<div class="container">
    <!-- Status Messages -->
    <div id="status-container"></div>
    
    <!-- Refresh Controls -->
    <div class="refresh-section">
        <div class="refresh-grid">
            <div class="refresh-card">
                <div class="refresh-card-title">📈 Refresh Prices</div>
                <button class="refresh-btn" id="refresh-prices-btn" onclick="refreshPrices()">Refresh Prices</button>
                <div class="refresh-timestamp" id="prices-timestamp">Last Updated: Never</div>
                <div class="refresh-status" id="prices-status"></div>
            </div>
            <div class="refresh-card">
                <div class="refresh-card-title">💹 Refresh Fundamentals</div>
                <button class="refresh-btn" id="refresh-fundamentals-btn" onclick="refreshFundamentals()">Refresh Fundamentals</button>
                <div class="refresh-timestamp" id="fundamentals-timestamp">Last Updated: Never</div>
                <div class="refresh-status" id="fundamentals-status"></div>
            </div>
            <div class="refresh-card">
                <div class="refresh-card-title">🔗 Full Sync & Reload</div>
                <button class="refresh-btn" id="refresh-sync-btn" onclick="fullSync()">Full Sync & Reload</button>
                <div class="refresh-timestamp" id="sync-timestamp">Last Updated: Never</div>
                <div class="refresh-status" id="sync-status"></div>
            </div>
        </div>
    </div>
    
    <!-- Data Table -->
    <div class="table-wrap">
        <table id="portfolio-table">
            <thead>
                <tr>
                    <th>Symbol</th>
                    <th>Name</th>
                    <th>Type</th>
                    <th>QTY</th>
                    <th>AVG</th>
                    <th>Sector</th>
                    <th>ISIN</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="portfolio-body">
                <tr><td colspan="8" style="text-align:center;padding:20px;color:#666;">No data loaded</td></tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Footer -->

        <span class="nav-label">Data</span>

        <span class="nav-label">Import</span>

<script src="app-import.js"></script>
<script>
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// Status Message Helper
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function showStatus(message, type) {
    var container = document.getElementById('status-container');
    var alertClass = 'alert-' + (type || 'info');
    var html = '<div class="alert ' + alertClass + '">' + message + '</div>';
    
    if (container) {
        container.innerHTML = html;
        // Auto-hide after 5 seconds
        setTimeout(function() {
            container.innerHTML = '';
        }, 5000);
    }
}

function updateTimestamp(elementId) {
    var el = document.getElementById(elementId);
    if (el) {
        var now = new Date();
        var timeStr = now.toLocaleTimeString('en-IN', { 
            hour12: false, 
            hour: '2-digit', 
            minute: '2-digit',
            second: '2-digit'
        });
        var dateStr = now.toLocaleDateString('en-IN');
        el.textContent = 'Last Updated: ' + dateStr + ' ' + timeStr;
    }
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// REFRESH FUNCTIONS - FIXED
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

function refreshPrices() {
    var btn = document.getElementById('refresh-prices-btn');
    var status = document.getElementById('prices-status');
    
    btn.disabled = true;
    status.textContent = 'Loading...';
    
    // Fetch prices.json from repository
    fetch('prices.json?cache=' + Date.now())
        .then(function(response) {
            if (!response.ok) throw new Error('HTTP ' + response.status);
            return response.json();
        })
        .then(function(data) {
            if (!data.quotes) throw new Error('Invalid prices format');
            
            // Store in localStorage for reference
            localStorage.setItem('lastPricesUpdate', JSON.stringify({
                timestamp: new Date().toISOString(),
                count: data.count || Object.keys(data.quotes).length
            }));
            
            updateTimestamp('prices-timestamp');
            status.textContent = '✅ ' + (data.count || Object.keys(data.quotes).length) + ' stocks loaded';
            showStatus('✅ Prices refreshed successfully', 'success');
            btn.disabled = false;
        })
        .catch(function(err) {
            console.error('Prices refresh error:', err);
            status.textContent = '❌ ' + err.message;
            showStatus('❌ Failed to refresh prices: ' + err.message, 'error');
            btn.disabled = false;
        });
}

function refreshFundamentals() {
    var btn = document.getElementById('refresh-fundamentals-btn');
    var status = document.getElementById('fundamentals-status');
    
    btn.disabled = true;
    status.textContent = 'Loading...';
    
    // Fetch fundamentals.json from repository
    fetch('fundamentals.json?cache=' + Date.now())
        .then(function(response) {
            if (!response.ok) throw new Error('HTTP ' + response.status);
            return response.json();
        })
        .then(function(data) {
            if (typeof data !== 'object' || !data) throw new Error('Invalid fundamentals format');
            
            // Store in localStorage for reference
            localStorage.setItem('lastFundamentalsUpdate', JSON.stringify({
                timestamp: new Date().toISOString(),
                count: Object.keys(data).length
            }));
            
            updateTimestamp('fundamentals-timestamp');
            status.textContent = '✅ ' + Object.keys(data).length + ' fundamentals loaded';
            showStatus('✅ Fundamentals refreshed successfully', 'success');
            btn.disabled = false;
        })
        .catch(function(err) {
            console.error('Fundamentals refresh error:', err);
            status.textContent = '❌ ' + err.message;
            showStatus('❌ Failed to refresh fundamentals: ' + err.message, 'error');
            btn.disabled = false;
        });
}

function fullSync() {
    var btn = document.getElementById('refresh-sync-btn');
    var status = document.getElementById('sync-status');
    
    btn.disabled = true;
    status.textContent = 'Syncing...';
    
    // Fetch all data files
    Promise.all([
        fetch('prices.json?cache=' + Date.now()).then(r => r.json()),
        fetch('fundamentals.json?cache=' + Date.now()).then(r => r.json()),
        fetch('unified-symbols.json?cache=' + Date.now()).then(r => r.json())
    ])
    .then(function(results) {
        var prices = results[0];
        var fundamentals = results[1];
        var symbols = results[2];
        
        if (!prices || !fundamentals || !symbols) {
            throw new Error('Missing data files');
        }
        
        // Store sync timestamp
        localStorage.setItem('lastFullSync', new Date().toISOString());
        updateTimestamp('sync-timestamp');
        
        status.textContent = '✅ All data synced';
        showStatus('✅ Full sync completed. Reloading...', 'success');
        
        // Reload after 1 second
        setTimeout(function() {
            location.reload();
        }, 1000);
    })
    .catch(function(err) {
        console.error('Full sync error:', err);
        status.textContent = '❌ ' + err.message;
        showStatus('❌ Full sync failed: ' + err.message, 'error');
        btn.disabled = false;
    });
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// EDIT & DELETE HANDLERS - FIXED
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

// Edit Quantity (XSS-safe version)
function editQty(sym, currentQty) {
    var newQty = prompt('Edit Quantity for ' + sym + ':', currentQty);
    if (newQty !== null && newQty.trim() !== '') {
        var qtyVal = parseFloat(newQty);
        if (!isNaN(qtyVal) && qtyVal >= 0) {
            updateStock(sym, { qty: qtyVal });
        } else {
            alert('Please enter a valid number');
        }
    }
}

// Edit Average Price (XSS-safe version)
function editAvg(sym, currentAvg) {
    var newAvg = prompt('Edit Average Price for ' + sym + ':', currentAvg.toFixed(2));
    if (newAvg !== null && newAvg.trim() !== '') {
        var avgVal = parseFloat(newAvg);
        if (!isNaN(avgVal) && avgVal >= 0) {
            updateStock(sym, { avg: avgVal });
        } else {
            alert('Please enter a valid number');
        }
    }
}

// Update stock in IndexedDB - FIXED to use proper key
function updateStock(sym, updates) {
    var DB_NAME = "OnyxPortfolioDB";
    var STORE_NAME = "Stocks";
    
    try {
        var request = indexedDB.open(DB_NAME, 8);
        
        request.onsuccess = function(e) {
            var db = e.target.result;
            var tx = db.transaction(STORE_NAME, 'readwrite');
            var store = tx.objectStore(STORE_NAME);
            var getAll = store.getAll();
            
            getAll.onsuccess = function() {
                var stocks = getAll.result || [];
                var updated = false;
                
                for (var i = 0; i < stocks.length; i++) {
                    var s = stocks[i];
                    // Normalize field name check
                    var stockSym = s.SYM || s.sym || s.ticker || s.TICKER;
                    if (stockSym === sym) {
                        // Update fields (handle both cases)
                        if (updates.qty !== undefined) {
                            s.QTY = updates.qty;
                            s.qty = updates.qty;
                        }
                        if (updates.avg !== undefined) {
                            s.AVG = updates.avg;
                            s.avg = updates.avg;
                        }
                        // Use the key if available, otherwise update by position
                        if (s.key !== undefined) {
                            store.put(s, s.key);
                        } else {
                            store.put(s);
                        }
                        updated = true;
                        break;
                    }
                }
                
                if (updated) {
                    showStatus('✅ ' + sym + ' updated successfully', 'success');
                    loadPortfolioTable();
                } else {
                    showStatus('❌ Stock not found: ' + sym, 'error');
                }
            };
        };
        
        request.onerror = function() {
            showStatus('❌ Failed to open database', 'error');
        };
    } catch(e) {
        console.error('Error updating stock:', e);
        showStatus('❌ Error updating stock: ' + e.message, 'error');
    }
}

// Delete stock from IndexedDB - FIXED
function deleteStock(sym) {
    if (!confirm('Delete ' + sym + ' from portfolio? This cannot be undone.')) return;
    
    var DB_NAME = "OnyxPortfolioDB";
    var STORE_NAME = "Stocks";
    
    try {
        var request = indexedDB.open(DB_NAME, 8);
        
        request.onsuccess = function(e) {
            var db = e.target.result;
            var tx = db.transaction(STORE_NAME, 'readwrite');
            var store = tx.objectStore(STORE_NAME);
            var getAll = store.getAll();
            
            getAll.onsuccess = function() {
                var stocks = getAll.result || [];
                var deleted = false;
                
                // Find and remove from IndexedDB
                for (var i = 0; i < stocks.length; i++) {
                    var s = stocks[i];
                    var stockSym = s.SYM || s.sym || s.ticker || s.TICKER;
                    if (stockSym === sym) {
                        // Delete using proper key
                        if (s.key !== undefined) {
                            store.delete(s.key);
                        } else {
                            // Fallback: use index key from getAll
                            store.delete(store.keyPath ? s[store.keyPath] : i);
                        }
                        deleted = true;
                        break;
                    }
                }
                
                if (deleted) {
                    // Try to update unified-symbols.json on GitHub
                    updateUnifiedSymbols(sym, 'DELETE');
                    
                    setTimeout(function() {
                        showStatus('✅ ' + sym + ' deleted from portfolio', 'success');
                        loadPortfolioTable();
                    }, 300);
                } else {
                    showStatus('❌ Stock not found: ' + sym, 'error');
                }
            };
        };
        
        request.onerror = function() {
            showStatus('❌ Failed to access database', 'error');
        };
    } catch(e) {
        console.error('Error deleting stock:', e);
        showStatus('❌ Error deleting stock: ' + e.message, 'error');
    }
}

// Update unified-symbols.json on GitHub
function updateUnifiedSymbols(sym, action) {
    var ghPAT = localStorage.getItem('ghPAT');
    var ghUser = localStorage.getItem('ghUser');
    var ghRepo = localStorage.getItem('ghRepo');
    
    if (!ghPAT || !ghUser || !ghRepo) {
        console.warn('GitHub PAT not configured - skipping unified-symbols.json update');
        return;
    }
    
    // Fetch current unified-symbols.json from GitHub
    var apiUrl = 'https://api.github.com/repos/' + ghUser + '/' + ghRepo + '/contents/unified-symbols.json';
    
    fetch(apiUrl, {
        headers: { 'Authorization': 'token ' + ghPAT }
    })
    .then(function(r) { 
        if (!r.ok) throw new Error('GitHub API error: ' + r.status);
        return r.json();
    })
    .then(function(data) {
        if (action === 'DELETE') {
            // Decode base64 content
            var content = JSON.parse(atob(data.content));
            // Remove stock
            content.symbols = content.symbols.filter(function(s) { return s.ticker !== sym; });
            // Update count
            content.count = content.symbols.length;
            // Commit
            commitUnifiedSymbols(content, data.sha, sym, 'DELETE');
        }
    })
    .catch(function(err) {
        console.error('Error updating unified-symbols.json:', err);
        // Don't fail silently - log it
        console.warn('Could not update GitHub: ' + err.message);
    });
}

// Commit unified-symbols.json to GitHub
function commitUnifiedSymbols(content, sha, sym, action) {
    var ghPAT = localStorage.getItem('ghPAT');
    var ghUser = localStorage.getItem('ghUser');
    var ghRepo = localStorage.getItem('ghRepo');
    
    var apiUrl = 'https://api.github.com/repos/' + ghUser + '/' + ghRepo + '/contents/unified-symbols.json';
    
    fetch(apiUrl, {
        method: 'PUT',
        headers: {
            'Authorization': 'token ' + ghPAT,
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({
            message: action + ' stock: ' + sym,
            content: btoa(JSON.stringify(content)),
            sha: sha
        })
    })
    .then(function(r) {
        if (r.ok) {
            console.log('✅ ' + sym + ' deleted from unified-symbols.json on GitHub');
        } else {
            console.warn('GitHub commit failed: ' + r.status);
        }
    })
    .catch(function(err) {
        console.error('Error committing to GitHub:', err);
    });
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// TABLE RENDERING - FIXED XSS
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

function loadPortfolioTable() {
    // Load portfolio from IndexedDB (OnyxPortfolioDB)
    var DB_NAME = "OnyxPortfolioDB";
    var STORE_NAME = "Stocks";
    
    try {
        var request = indexedDB.open(DB_NAME, 8);
        
        request.onerror = function() {
            console.error('Failed to open IndexedDB');
            renderTable([]);
        };
        
        request.onsuccess = function(e) {
            var db = e.target.result;
            var tx = db.transaction(STORE_NAME, 'readonly');
            var store = tx.objectStore(STORE_NAME);
            var getAll = store.getAll();
            
            getAll.onerror = function() {
                console.error('Failed to get stocks from IndexedDB');
                renderTable([]);
            };
            
            getAll.onsuccess = function() {
                var stocks = getAll.result || [];
                renderTable(stocks);
            };
        };
    } catch(e) {
        console.error('Error accessing IndexedDB:', e);
        renderTable([]);
    }
}

function renderTable(portfolio) {
    var tbody = document.getElementById('portfolio-body');
    if (portfolio.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:20px;color:#666;">No data loaded. Click "Load" to import stocks.</td></tr>';
        return;
    }
    
    var html = '';
    for (var i = 0; i < portfolio.length; i++) {
        var s = portfolio[i];
        // Handle both uppercase (from IndexedDB) and lowercase field names
        var sym = s.SYM || s.sym || s.ticker || s.TICKER || '-';
        var name = s.name || s.NAME || '-';
        var type = s.type || s.TYPE || 'PORTFOLIO';
        var qty = s.QTY || s.qty || 0;
        var avg = s.AVG || s.avg || 0;
        var sector = s.SECTOR || s.sector || '-';
        var isin = s.isin || s.ISIN || '-';
        
        // XSS Prevention: Encode special characters
        sym = escapeHtml(sym);
        name = escapeHtml(name);
        sector = escapeHtml(sector);
        isin = escapeHtml(isin);
        
        html += '<tr>' +
            '<td>' + sym + '</td>' +
            '<td>' + name + '</td>' +
            '<td>' + type + '</td>' +
            '<td style="text-align:right;"><span class="editable" data-sym="' + sym + '" data-qty="' + qty + '" onclick="editQtyHandler(this)"><u>' + qty + '</u></span></td>' +
            '<td style="text-align:right;"><span class="editable" data-sym="' + sym + '" data-avg="' + avg + '" onclick="editAvgHandler(this)"><u>₹' + parseFloat(avg).toFixed(2) + '</u></span></td>' +
            '<td>' + sector + '</td>' +
            '<td>' + isin + '</td>' +
            '<td><button onclick="deleteStockHandler(this)" data-sym="' + sym + '" style="background:#ff6b85;color:#fff;padding:2px 6px;font-size:9px;border:none;border-radius:2px;cursor:pointer;">✕</button></td>' +
            '</tr>';
    }
    tbody.innerHTML = html;
}

// XSS Prevention Helper
function escapeHtml(str) {
    if (!str) return '';
    var div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
}

// Event handler wrappers (safe from XSS)
function editQtyHandler(el) {
    var sym = el.getAttribute('data-sym');
    var qty = el.getAttribute('data-qty');
    editQty(sym, parseFloat(qty));
}

function editAvgHandler(el) {
    var sym = el.getAttribute('data-sym');
    var avg = el.getAttribute('data-avg');
    editAvg(sym, parseFloat(avg));
}

function deleteStockHandler(el) {
    var sym = el.getAttribute('data-sym');
    deleteStock(sym);
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// Close import modal
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function closeImportModal() {
    var modal = document.getElementById('import-modal');
    if (modal) {
        modal.style.display = 'none';
        document.body.classList.remove('modal-open');
    }
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// Initialize on page load
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
window.addEventListener('DOMContentLoaded', function() {
    loadPortfolioTable();
    
    // Load last sync timestamps if available
    var lastSync = localStorage.getItem('lastFullSync');
    if (lastSync) {
        var date = new Date(lastSync);
        var timeStr = date.toLocaleTimeString('en-IN', { hour12: false, hour: '2-digit', minute: '2-digit' });
        var dateStr = date.toLocaleDateString('en-IN');
        document.getElementById('sync-timestamp').textContent = 'Last Updated: ' + dateStr + ' ' + timeStr;
    }
});
</script>
