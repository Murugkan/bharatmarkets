name: Fetch Fundamentals Weekly

on:
  schedule:
    # Every Sunday at 00:00 UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  fetch-fundamentals:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas requests beautifulsoup4

      - name: Fetch fundamentals
        run: |
          python fetch_fundamentals.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: 'data: update fundamentals (weekly sync)'
          file_pattern: |
            fundamentals.json
            unified-symbols.json
          commit_options: '--no-verify'
          create_branch: false

      - name: Log completion
        run: |
          echo "Fundamentals updated successfully"
          echo "Timestamp: $(date -u)"
