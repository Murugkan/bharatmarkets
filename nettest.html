<!DOCTYPE html>
<html>
<head>
<meta charset=UTF-8>
<meta name=viewport content=width=device-width,initial-scale=1>
<style>
body{font-family:monospace;font-size:11px;background:#060c18;color:#f0f6ff;padding:12px}
pre{white-space:pre-wrap;word-break:break-all;color:#7a8fa0;font-size:10px;margin:4px 0 12px;border-left:2px solid #1a2332;padding-left:8px;max-height:200px;overflow:auto}
.ok{color:#00e896}.err{color:#ff6b85}.h{color:#00f2ff;font-weight:bold;margin:12px 0 4px}
button{background:#1a2332;color:#00f2ff;border:1px solid #00f2ff;padding:8px 16px;border-radius:4px;cursor:pointer;margin:4px;font-size:12px}
</style>
</head>
<body>
<div class=h>Network Test v2 — SBIN</div>
<button onclick=runAll()>▶ Run All Tests</button>
<div id=out></div>
<script>
var out=document.getElementById('out');
function log(label,msg,ok){
  out.innerHTML+='<div class=h>'+label+'</div><pre class='+(ok?'ok':'err')+'>'+
    (typeof msg==='string'?msg:JSON.stringify(msg,null,2)).replace(/</g,'&lt;')+'</pre>';
}

var Q='State+Bank+India';
var RSS='https://news.google.com/rss/search?hl=en-IN&gl=IN&ceid=IN:en&q='+Q;

function parseRssXml(xml){
  var items=[];
  var blocks=xml.split('<item>').slice(1);
  blocks.forEach(function(b){
    var t=(b.match(/<title><!\[CDATA\[(.*?)\]\]><\/title>/)||b.match(/<title>(.*?)<\/title>/))||['',''];
    var l=(b.match(/<link>(.*?)<\/link>/))||['',''];
    var d=(b.match(/<pubDate>(.*?)<\/pubDate>/))||['',''];
    var s=(b.match(/<source[^>]*>(.*?)<\/source>/))||['',''];
    items.push({title:t[1],link:l[1],pubDate:d[1],source:s[1]});
  });
  return items;
}

async function test1(){
  try{
    var r=await fetch('https://api.allorigins.win/get?url='+encodeURIComponent(RSS));
    var d=await r.json();
    var xml=d.contents||'';
    var items=parseRssXml(xml);
    log('1. allorigins.win → Google News RSS',
      'HTTP '+r.status+' | xml_len='+xml.length+' | items='+items.length+'\n'+
      (items.length?'First: '+items[0].title:'no items — xml preview: '+xml.slice(0,300)),
      items.length>0);
  }catch(e){log('1. allorigins.win','FAIL: '+e.message,false);}
}

async function test2(){
  try{
    var r=await fetch('https://corsproxy.io/?'+encodeURIComponent(RSS));
    var xml=await r.text();
    var items=parseRssXml(xml);
    log('2. corsproxy.io → Google News RSS',
      'HTTP '+r.status+' | xml_len='+xml.length+' | items='+items.length+'\n'+
      (items.length?'First: '+items[0].title:'no items — xml preview: '+xml.slice(0,300)),
      items.length>0);
  }catch(e){log('2. corsproxy.io','FAIL: '+e.message,false);}
}

async function test3(){
  // rss2json with a PAID/different endpoint - test if 429 is consistent
  try{
    var r=await fetch('https://api.rss2json.com/v1/api.json?rss_url='+encodeURIComponent(RSS));
    var d=await r.json();
    log('3. rss2json (expect 429)','HTTP '+r.status+' status='+d.status+' msg='+(d.message||''),
      r.status===200&&d.status==='ok');
  }catch(e){log('3. rss2json','FAIL: '+e.message,false);}
}

async function test4(){
  // Direct fetch Google News RSS (will likely fail CORS but let's see)
  try{
    var r=await fetch(RSS);
    var xml=await r.text();
    var items=parseRssXml(xml);
    log('4. Direct Google News RSS','HTTP '+r.status+' items='+items.length,items.length>0);
  }catch(e){log('4. Direct Google News','FAIL: '+e.message,false);}
}

async function runAll(){
  out.innerHTML='<pre style=color:#ffbf47>Running…</pre>';
  await test1();await test2();await test3();await test4();
}
</script>
</body>
</html>
