<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
    <title>Portfolio Data</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg:#000; --s1:#0a0a0a; --b1:#222; --bl:#00f2ff; --gr:#00ff88; --rd:#ff4d6d; --tx:#fff; }
        *{box-sizing:border-box;margin:0;padding:0;}
        body { background:var(--bg); color:var(--tx); font-family:'JetBrains Mono',monospace; padding-bottom:80px; }
        header { background:var(--s1); border-bottom:1px solid var(--b1); padding:12px; display:flex; justify-content:space-between; align-items:center; }
        .title { font-size:14px; font-weight:800; color:var(--bl); }
        .header-right { display:flex; gap:10px; }
        button { padding:8px 12px; background:#00ff88; color:#000; border:none; border-radius:4px; cursor:pointer; font-weight:bold; font-size:11px; }
        button:hover { opacity:0.9; }
        .container { padding:15px; }
        .table-wrap { overflow-x:auto; background:#050505; border:1px solid var(--b1); border-radius:8px; margin-top:20px; max-height:500px; overflow-y:auto; }
        table { width:100%; border-collapse:collapse; font-size:10px; }
        th { background:#111; color:#00ff88; padding:8px; text-align:left; border-bottom:1px solid var(--b1); position:sticky; top:0; font-weight:800; }
        td { padding:8px; border-bottom:0.5px solid #111; }
        tr:hover { background:#0a0a0a; }
        footer { position:fixed; bottom:0; width:100%; background:rgba(0,0,0,0.95); border-top:1px solid #222; display:flex; justify-content:space-around; padding:12px 0; z-index:1000; }
        .nav-btn { text-decoration:none; color:#666; display:flex; flex-direction:column; align-items:center; width:33%; padding:8px 0; transition:color 0.2s; }
        .nav-btn:hover { color:var(--bl); }
        .nav-btn.active { color:var(--bl); font-weight:800; }
        .nav-label { font-size:8px; margin-top:4px; font-weight:800; text-transform:uppercase; letter-spacing:1px; }
    </style>
</head>
<body>

<header>
    <div class="title">📊 PORTFOLIO DATA</div>
    <div class="header-right">
        <button onclick="location.reload()">🔄 Reload</button>
    </div>
</header>

<div class="container">
    
    <!-- LOG WINDOW - CRITICAL -->
    <div style="background:#000;border:2px solid var(--gr);border-radius:6px;padding:10px;margin:15px 0;">
        <div style="color:var(--gr);font-weight:bold;font-size:10px;margin-bottom:5px;">📋 LOG</div>
        <div id="debug-log-window" style="color:var(--gr);font-size:9px;font-family:monospace;white-space:pre-wrap;word-break:break-all;max-height:120px;overflow-y:auto;border:1px solid #333;border-radius:4px;padding:5px;">Loading...</div>
    </div>
    
    <!-- TABLE -->
    <h3 style="color:var(--gr);margin-top:20px;">Portfolio</h3>
    <div class="table-wrap">
        <table id="portfolio-table">
            <thead>
                <tr>
                    <th>Symbol</th>
                    <th>Name</th>
                    <th>Type</th>
                    <th>QTY</th>
                    <th>AVG</th>
                    <th>Sector</th>
                    <th>ISIN</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="portfolio-body">
                <tr><td colspan="8" style="text-align:center;padding:20px;color:#666;">Loading...</td></tr>
            </tbody>
        </table>
    </div>
    
    <!-- BUTTONS -->
    <div style="margin:20px 0;display:flex;gap:10px;">
        <button onclick="refreshPrices()">📈 Refresh Prices</button>
        <button onclick="refreshFundamentals()">💹 Fundamentals</button>
        <button onclick="fullSync()">🔗 Full Sync</button>
    </div>
    
    <!-- PAT CONFIG - ONE SECTION ONLY -->
    <div style="background:var(--s1);border:1px solid var(--b1);border-radius:8px;padding:15px;margin-top:30px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
            <h3 style="color:#00ff88;font-size:14px;margin:0;">🔐 GitHub PAT</h3>
            <span id="pat-status" style="font-size:11px;color:#ffb347;">⚠️ Not configured</span>
        </div>
        
        <div id="pat-form" style="display:none;margin-bottom:12px;">
            <div style="margin:8px 0;">
                <label style="color:#888;font-size:11px;">GitHub PAT:</label>
                <input type="password" id="ghPAT" placeholder="ghp_xxxxxxxxxxxxx" style="width:100%;padding:8px;background:#000;border:1px solid #222;color:#fff;border-radius:4px;font-family:monospace;font-size:11px;margin-top:4px;box-sizing:border-box;">
            </div>
            <div style="margin:8px 0;">
                <label style="color:#888;font-size:11px;">GitHub User:</label>
                <input type="text" id="ghUser" placeholder="murugkan" style="width:100%;padding:8px;background:#000;border:1px solid #222;color:#fff;border-radius:4px;font-size:11px;margin-top:4px;box-sizing:border-box;">
            </div>
            <div style="margin:8px 0;">
                <label style="color:#888;font-size:11px;">GitHub Repo:</label>
                <input type="text" id="ghRepo" placeholder="bharatmarkets" style="width:100%;padding:8px;background:#000;border:1px solid #222;color:#fff;border-radius:4px;font-size:11px;margin-top:4px;box-sizing:border-box;">
            </div>
            <button onclick="savePATConfig()" style="width:100%;margin-top:10px;">Save Config</button>
        </div>
        
        <div id="pat-display" style="display:none;padding:10px;background:#050505;border:1px solid #222;border-radius:4px;font-size:11px;margin-bottom:12px;">
            <div style="color:#00ff88;font-weight:bold;margin-bottom:8px;">✅ Configured</div>
            <div style="color:#888;">User: <b id="display-user"></b><br>Repo: <b id="display-repo"></b><br>PAT: <b id="display-pat"></b></div>
        </div>
        
        <div style="display:flex;gap:10px;">
            <button onclick="togglePATForm()" id="toggle-btn" style="flex:1;background:#444;color:#fff;">Edit Config</button>
            <button onclick="testPATConnection()" style="flex:1;">🧪 Test</button>
        </div>
        
        <div id="pat-message" style="margin-top:10px;font-size:10px;color:#888;"></div>
    </div>
    
</div>

<footer>
    <a href="index.html" class="nav-btn">📊 Portfolio</a>
    <a href="data.html" class="nav-btn active">📋 Data</a>
    <a href="nexus.html" class="nav-btn">📥 Import</a>
</footer>

<script src="app-import.js"></script>
<script>

// ===== LOG WINDOW =====
function addDebugLog(msg) {
    var ts = new Date().toLocaleTimeString();
    var logMsg = '[' + ts + '] ' + msg;
    
    var logDiv = document.getElementById('debug-log-window');
    if (logDiv) {
        logDiv.innerHTML += logMsg + '\n';
        logDiv.scrollTop = logDiv.scrollHeight;
    }
    console.log(logMsg);
}

function showToast(msg) {
    addDebugLog('📢 ' + msg);
}

// ===== PAT CONFIG =====
function initPATDisplay() {
    var ghPAT = localStorage.getItem('ghPAT');
    var ghUser = localStorage.getItem('ghUser');
    var ghRepo = localStorage.getItem('ghRepo');
    var isPATConfigured = ghPAT && ghUser && ghRepo;
    
    var patForm = document.getElementById('pat-form');
    var patDisplay = document.getElementById('pat-display');
    
    if (isPATConfigured) {
        patForm.style.display = 'none';
        patDisplay.style.display = 'block';
        document.getElementById('display-user').textContent = ghUser;
        document.getElementById('display-repo').textContent = ghRepo;
        document.getElementById('display-pat').textContent = ghPAT.substring(0, 10) + '...';
        document.getElementById('toggle-btn').textContent = 'Edit Config';
        addDebugLog('✅ PAT configured');
    } else {
        patForm.style.display = 'block';
        patDisplay.style.display = 'none';
        document.getElementById('toggle-btn').textContent = 'Show Form';
        addDebugLog('⚠️ PAT not configured');
    }
}

function togglePATForm() {
    var patForm = document.getElementById('pat-form');
    patForm.style.display = patForm.style.display === 'none' ? 'block' : 'none';
}

function savePATConfig() {
    var pat = document.getElementById('ghPAT').value.trim();
    var user = document.getElementById('ghUser').value.trim();
    var repo = document.getElementById('ghRepo').value.trim();
    
    if (!pat || !user || !repo) {
        addDebugLog('❌ All fields required');
        return;
    }
    
    localStorage.setItem('ghPAT', pat);
    localStorage.setItem('ghUser', user);
    localStorage.setItem('ghRepo', repo);
    
    addDebugLog('✅ PAT saved');
    initPATDisplay();
    
    document.getElementById('ghPAT').value = '';
    document.getElementById('ghUser').value = '';
    document.getElementById('ghRepo').value = '';
}

function testPATConnection() {
    var ghPAT = localStorage.getItem('ghPAT');
    var ghUser = localStorage.getItem('ghUser');
    var ghRepo = localStorage.getItem('ghRepo');
    
    if (!ghPAT || !ghUser || !ghRepo) {
        addDebugLog('❌ PAT not configured');
        return;
    }
    
    addDebugLog('🧪 Testing connection...');
    
    var apiUrl = 'https://api.github.com/repos/' + ghUser + '/' + ghRepo + '/contents/unified-symbols.json';
    
    fetch(apiUrl, {
        headers: { 'Authorization': 'token ' + ghPAT }
    })
    .then(function(r) {
        if (r.status === 200) {
            addDebugLog('✅ Connection OK');
        } else {
            addDebugLog('❌ Error ' + r.status);
        }
    })
    .catch(function(e) {
        addDebugLog('❌ Connection failed');
    });
}

// ===== REFRESH =====
function refreshPrices() {
    addDebugLog('📈 Refresh prices...');
    setTimeout(function() { location.reload(); }, 500);
}

function refreshFundamentals() {
    addDebugLog('💹 Refresh fundamentals...');
    setTimeout(function() { location.reload(); }, 500);
}

function fullSync() {
    addDebugLog('🔗 Full sync...');
    setTimeout(function() { location.reload(); }, 500);
}

// ===== TABLE =====
function loadPortfolioTable() {
    var DB_NAME = "OnyxPortfolioDB";
    var STORE_NAME = "Stocks";
    
    try {
        var request = indexedDB.open(DB_NAME, 8);
        
        request.onsuccess = function(e) {
            var db = e.target.result;
            var tx = db.transaction(STORE_NAME, 'readonly');
            var store = tx.objectStore(STORE_NAME);
            var getAll = store.getAll();
            
            getAll.onsuccess = function() {
                var stocks = getAll.result || [];
                addDebugLog('📊 Loaded ' + stocks.length + ' stocks');
                renderPortfolioTable(stocks);
            };
            
            getAll.onerror = function() {
                addDebugLog('❌ Error loading stocks');
            };
        };
        
        request.onerror = function() {
            addDebugLog('❌ Cannot open IndexedDB');
        };
    } catch(e) {
        addDebugLog('❌ Error: ' + e.message);
    }
}

function renderPortfolioTable(portfolio) {
    var tbody = document.getElementById('portfolio-body');
    
    if (!portfolio || portfolio.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:20px;color:#666;">No data</td></tr>';
        addDebugLog('⚠️ No stocks to display');
        return;
    }
    
    var html = '';
    for (var i = 0; i < portfolio.length; i++) {
        var s = portfolio[i];
        var sym = s.SYM || s.sym || '?';
        var name = s.name || '?';
        var type = s.type || 'PORTFOLIO';
        var qty = s.QTY || s.qty || 0;
        var avg = s.AVG || s.avg || 0;
        var sector = s.SECTOR || s.sector || '?';
        var isin = s.isin || '?';
        
        html += '<tr>' +
            '<td>' + sym + '</td>' +
            '<td>' + name + '</td>' +
            '<td>' + type + '</td>' +
            '<td>' + qty + '</td>' +
            '<td>₹' + parseFloat(avg).toFixed(2) + '</td>' +
            '<td>' + sector + '</td>' +
            '<td>' + isin + '</td>' +
            '<td><button onclick="deleteStock(\'' + sym + '\')" style="background:#ff6b85;padding:2px 6px;font-size:9px;">✕</button></td>' +
            '</tr>';
    }
    
    tbody.innerHTML = html;
    addDebugLog('✅ Table rendered (' + portfolio.length + ' rows)');
}

function deleteStock(sym) {
    if (!confirm('Delete ' + sym + '?')) return;
    
    addDebugLog('🗑️ Deleting ' + sym);
    location.reload();
}

// ===== PAGE LOAD =====
window.addEventListener('DOMContentLoaded', function() {
    addDebugLog('🚀 Page loaded');
    initPATDisplay();
    loadPortfolioTable();
});

</script>

</body>
</html>
