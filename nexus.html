<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
    <title>Onyx | Nexus Terminal</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;800&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg:#000; --s1:#0a0a0a; --s2:#111; --b1:#222; --b2:#333; --bl:#00f2ff; --gr:#00ff88; --rd:#ff4d6d; --tx:#fff; --tx3:#666; --ac:#f97316; --mono:'JetBrains Mono',monospace; }
        * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
        body { background:var(--bg); color:var(--tx); font-family:var(--mono); padding-bottom:100px; }
        
        #ov { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); display:none; z-index:900; backdrop-filter:blur(4px); }
        #ov.on { display:block; }
        #import-panel { position:fixed; bottom:0; left:0; width:100%; background:var(--s1); border-top:1px solid var(--b1); border-radius:20px 20px 0 0; transform:translateY(100%); transition:transform .3s cubic-bezier(0.4, 0, 0.2, 1); z-index:1000; max-height:90vh; overflow-y:auto; padding:20px; }
        #import-panel.on { transform:translateY(0); }

        header { background:var(--s1); border-bottom:1px solid var(--b1); padding:20px; text-align:center; }
        .title { font-size:11px; font-weight:800; letter-spacing:3px; color:var(--bl); text-transform:uppercase; }

        .container { padding: 20px; max-width: 600px; margin: 0 auto; }
        .card { background: var(--s1); border: 1px solid var(--b1); border-radius: 12px; padding: 16px; margin-bottom: 16px; }
        .stat-label { font-size: 8px; color: var(--tx3); text-transform: uppercase; margin-bottom: 4px; letter-spacing: 1px; }
        .stat-val { font-size: 14px; font-weight: 800; }

        .btn-load { width:100%; padding:18px; background:var(--bl); color:#000; border:none; border-radius:8px; font-weight:800; font-size:12px; text-transform:uppercase; letter-spacing:1px; margin-bottom:10px; cursor:pointer; }
        .btn-clear { width:100%; padding:14px; background:var(--s2); color:var(--tx3); border:1px solid var(--b1); border-radius:8px; font-weight:800; font-size:11px; text-transform:uppercase; }

        #log-terminal { background: #050505; border: 1px solid #111; padding: 12px; height: 160px; overflow-y: auto; font-size: 10px; color: #555; border-radius: 8px; margin-top: 15px; border-left: 2px solid var(--b1); }
        
        footer { position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.9); border-top: 1px solid var(--b1); display: flex; justify-content: space-around; padding: 15px 0; padding-bottom: calc(15px + env(safe-area-inset-bottom)); z-index: 100; }
        .nav-btn { text-decoration: none; color: var(--tx3); text-align: center; font-size: 10px; font-weight: 800; text-transform: uppercase; }
        .nav-btn.active { color: var(--bl); }

        /* Dynamic classes for app-import.js */
        .u-gr2 { color: var(--gr); } .u-rd2 { color: var(--rd); } .u-yw2 { color: #ffbf47; }
        .import-textarea { width:100%; background:#000; border:1px solid var(--b2); border-radius:8px; color:#fff; padding:12px; font-family:var(--mono); font-size:11px; margin:10px 0; outline:none; }
        .import-btn { width:100%; padding:15px; background:var(--ac); color:#000; border:none; border-radius:8px; font-weight:800; font-size:11px; text-transform:uppercase; cursor:pointer; }
    </style>
</head>
<body>

<div id="ov" onclick="closePanel()"></div>
<div id="import-panel">
    <div id="import-panel-body"></div>
</div>

<header><div class="title">Terminal // Nexus</div></header>

<div class="container">
    <div class="card">
        <div class="stat-label">Local Portfolio Cache</div>
        <div class="stat-val" id="cache-count">-- STOCKS</div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:12px;">
            <div style="background:#050505; padding:12px; border-radius:8px; border:1px solid #151515;">
                <div class="stat-label">Engine</div>
                <div class="stat-val">ONYX v8</div>
            </div>
            <div style="background:#050505; padding:12px; border-radius:8px; border:1px solid #151515;">
                <div class="stat-label">Database</div>
                <div class="stat-val" style="color:var(--gr)">CONNECTED</div>
            </div>
        </div>
    </div>

    <button class="btn-load" onclick="openImport()">📤 Load Portfolio Stocks List</button>
    <button class="btn-clear" onclick="if(confirm('Wipe DB?')) { localStorage.removeItem('portfolio'); location.reload(); }">Clear Database</button>

    <div id="log-terminal">
        <div style="color:var(--tx3)">[SYSTEM] Terminal ready for ingestion...</div>
    </div>
</div>

<footer>
    <a href="index.html" class="nav-btn">Portfolio</a>
    <a href="nexus.html" class="nav-btn active">Terminal</a>
    <a href="system.html" class="nav-btn">System</a>
</footer>

<script>
    var S = {
        portfolio: JSON.parse(localStorage.getItem('portfolio') || '[]'),
        settings: JSON.parse(localStorage.getItem('settings') || '{}'),
        curTab: 'terminal'
    };
    var FUND = {}, ISIN_MAP = {};

    function savePF() { localStorage.setItem('portfolio', JSON.stringify(S.portfolio)); }
    function saveSettings() { localStorage.setItem('settings', JSON.stringify(S.settings)); }
    function toast(m) { alert(m); }
    function fmt(n) { return n.toLocaleString('en-IN'); }
    async function ensureStaticData() { return true; } 
    function render() { refreshUI(); }

    function refreshUI() {
        const count = S.portfolio ? S.portfolio.length : 0;
        document.getElementById('cache-count').textContent = count + " STOCKS";
    }

    // INTERCEPTOR: Forces the manual text into the clean Name, Qty, Price format
    window.addEventListener('click', function(e) {
        if(e.target && e.target.classList.contains('import-btn')) {
            const ta = document.querySelector('.import-textarea');
            if(ta && ta.value.trim() !== "") {
                // Ensure spaces are treated as commas for the 3-point extraction
                ta.value = ta.value.split('\n').map(line => {
                    return line.trim().replace(/\s+/g, ',');
                }).join('\n');
            }
        }
    }, true);

    var _sheetJSLoaded = true;
    window.onload = refreshUI;
</script>

<script src="app-import.js"></script>

</body>
</html>
