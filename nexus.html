<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>Onyx | Nexus Control</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg:#000; --s1:#0a0a0a; --b1:#222; --bl:#00f2ff; --gr:#00ff88; --rd:#ff4d6d; --tx:#fff; }
        *{box-sizing:border-box;margin:0;padding:0;}
        body { background:var(--bg); color:var(--tx); font-family:'JetBrains Mono',monospace; overflow:hidden; }
        header { background:var(--s1); border-bottom:1px solid var(--b1); padding:20px; text-align:center; }
        .title { font-size:14px; font-weight:800; letter-spacing:2px; color:var(--bl); text-transform:uppercase; }
        
        .control-panel { padding:20px; height:calc(100vh - 180px); overflow-y:auto; -webkit-overflow-scrolling:touch; }
        .card { background:var(--s1); border:1px solid var(--b1); border-radius:8px; padding:20px; margin-bottom:15px; }
        .card-title { font-size:10px; color:#666; text-transform:uppercase; margin-bottom:15px; letter-spacing:1px; }
        
        .btn { 
            width:100%; padding:15px; background:var(--b1); color:var(--tx); border:none; border-radius:4px; 
            font-family:'JetBrains Mono'; font-size:12px; font-weight:800; cursor:pointer; margin-bottom:10px;
            display:flex; justify-content:center; align-items:center; gap:10px;
        }
        .btn:active { opacity:0.7; scale:0.98; }
        .btn-prime { background:var(--bl); color:#000; }
        .btn-danger { color:var(--rd); border:1px solid var(--rd); background:transparent; }
        
        .log-box { 
            background:#050505; border:1px solid #111; border-radius:4px; padding:10px; 
            height:120px; overflow-y:auto; font-size:9px; color:#444; margin-top:10px;
        }
        .log-entry { margin-bottom:4px; border-left:2px solid var(--bl); padding-left:6px; }

        footer { 
            position: fixed; bottom: 0; width: 100%; 
            background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--b1); display: flex; justify-content: space-around; align-items: center; 
            padding: 15px 0; z-index: 1000; padding-bottom: calc(15px + env(safe-area-inset-bottom));
        }
        .nav-btn { text-decoration: none; color: #444; display: flex; flex-direction: column; align-items: center; width: 33%; }
        .nav-btn.active { color: var(--bl); }
        .nav-label { font-size: 8px; margin-top: 6px; letter-spacing: 2px; font-weight: 800; text-transform: uppercase; }
    </style>
</head>
<body>

<header>
    <div class="title">Data Nexus</div>
</header>

<div class="control-panel">
    <div class="card">
        <div class="card-title">Engine Control</div>
        <button class="btn btn-prime" onclick="refreshData()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
            Full Sync Fundamentals
        </button>
        <button class="btn" onclick="checkUpdate()">Check For Updates</button>
        <div class="log-box" id="log">
            <div class="log-entry">Nexus System Online. Ready for instructions.</div>
        </div>
    </div>

    <div class="card">
        <div class="card-title">Database Maintenance</div>
        <button class="btn btn-danger" onclick="clearDB()">Wipe IndexedDB Cache</button>
        <p style="font-size:8px; color:#444; margin-top:10px; text-align:center;">Action will force a full reload of fundamentals.json on next boot.</p>
    </div>
</div>

<footer>
    <a href="index.html" class="nav-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>
        <span class="nav-label">Terminal</span>
    </a>
    <a href="nexus.html" class="nav-btn active">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path></svg>
        <span class="nav-label">Nexus</span>
    </a>
    <a href="nexus.html" class="nav-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="17 8 12 3 7 8"></polyline>
            <line x1="12" y1="3" x2="12" y2="15"></line>
        </svg>
        <span class="nav-label">ETL</span>
    </a>
</footer>

<script>
const DB_NAME = "OnyxPortfolioDB", STORE_NAME = "Stocks", DB_VERSION = 8;

function logger(msg) {
    const log = document.getElementById('log');
    const div = document.createElement('div');
    div.className = 'log-entry';
    div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
    log.prepend(div);
}

async function refreshData() {
    logger("Initiating Full Sync...");
    try {
        const resp = await fetch('fundamentals.json');
        const json = await resp.json();
        const stocks = json.stocks || json;
        
        const db = await new Promise(res => {
            const req = indexedDB.open(DB_NAME, DB_VERSION);
            req.onsuccess = () => res(req.result);
        });

        const writeTx = db.transaction(STORE_NAME, "readwrite");
        const store = writeTx.objectStore(STORE_NAME);
        
        Object.keys(stocks).forEach(t => {
            const s = stocks[t];
            const entry = { SYM: t.split('.')[0].toUpperCase() };
            Object.keys(s).forEach(k => entry[k.toUpperCase()] = s[k]);
            store.put(entry);
        });

        writeTx.oncomplete = () => logger("Sync Complete. Database Updated.");
    } catch (e) {
        logger("Error: Sync Failed. Check fundamentals.json");
    }
}

function clearDB() {
    if(confirm("Confirm Database Wipe?")) {
        indexedDB.deleteDatabase(DB_NAME);
        logger("Database Purged. System will rebuild on Terminal launch.");
    }
}

function checkUpdate() {
    logger("Scanning for version shifts...");
    setTimeout(() => logger("System up to date."), 1000);
}
</script>
</body>
</html>
