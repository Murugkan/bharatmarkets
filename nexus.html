<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
    <title>Onyx | Terminal Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;800&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg:#000; --s1:#0a0a0a; --s2:#111; --b1:#222; --b2:#333; --bl:#00f2ff; --gr:#00ff88; --rd:#ff4d6d; --tx:#fff; --tx3:#666; --ac:#f97316; --mono:'JetBrains Mono',monospace; }
        * { box-sizing:border-box; margin:0; padding:0; }
        body { background:var(--bg); color:var(--tx); font-family:var(--mono); padding-bottom:100px; -webkit-tap-highlight-color:transparent; }
        
        header { background:var(--s1); border-bottom:1px solid var(--b1); padding:20px; text-align:center; position:sticky; top:0; z-index:100; }
        .title { font-size:11px; font-weight:800; letter-spacing:3px; color:var(--bl); text-transform:uppercase; }

        .container { padding: 20px; }
        .status-card { background: var(--s1); border: 1px solid var(--b1); border-radius: 12px; padding: 16px; margin-bottom: 16px; }
        
        /* KPI Grid */
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 12px; }
        .stat-item { background: #050505; padding: 12px; border-radius: 8px; border: 1px solid #151515; }
        .stat-label { font-size: 8px; color: var(--tx3); text-transform: uppercase; margin-bottom: 4px; letter-spacing: 1px; }
        .stat-val { font-size: 13px; font-weight: 800; }

        /* Data Loading Tabs — Matches app-import.js Logic */
        .imp-tabs { display: flex; border-bottom: 1px solid var(--b1); margin-bottom: 15px; }
        .imp-tab { flex:1; background:none; border:none; color:var(--tx3); padding:12px; font-family:'Syne',sans-serif; font-size:11px; font-weight:800; cursor:pointer; border-bottom: 2px solid transparent; text-align:center; }
        .imp-tab.on { color:var(--ac); border-bottom-color:var(--ac); }
        .imp-pane { display:none; } 
        .imp-pane.on { display:block; }

        /* Inputs & Buttons */
        .import-textarea { width:100%; height:120px; background:#050505; border:1px solid var(--b1); color:#fff; padding:12px; font-family:var(--mono); font-size:10px; border-radius:8px; resize:none; margin-top:10px; }
        .import-btn { width: 100%; padding: 16px; background: var(--s2); color: var(--tx); border: 1px solid var(--b1); border-radius: 8px; font-family: inherit; font-weight: 800; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-top: 10px; cursor: pointer; }
        .btn-glow { background: var(--ac); color: #000; border: none; }

        /* Log Output */
        #log { background: #050505; border: 1px solid #111; padding: 12px; height: 150px; overflow-y: auto; font-size: 10px; color: #444; border-radius: 8px; margin-top: 15px; }
        .log-line { margin-bottom: 4px; padding-left: 8px; border-left: 2px solid #222; }

        /* Navigation Menu */
        footer { position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); border-top: 1px solid var(--b1); display: flex; justify-content: space-around; padding: 12px 0; padding-bottom: calc(12px + env(safe-area-inset-bottom)); z-index: 1000; }
        .nav-btn { text-decoration: none; color: #444; display: flex; flex-direction: column; align-items: center; width: 33%; transition: .2s; }
        .nav-btn.active { color: var(--bl); }
        .nav-label { font-size: 8px; margin-top: 5px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

<header><div class="title">Terminal // Data Engine</div></header>

<div class="container">
    <div class="status-card">
        <div class="stat-label">System Status</div>
        <div class="stat-val" id="sys-status">READY</div>
        <div class="stat-grid">
            <div class="stat-item">
                <div class="stat-label">Local Cache</div>
                <div class="stat-val" id="cache-count">-- STOCKS</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">DB Mode</div>
                <div class="stat-val">ONYX v8.0</div>
            </div>
        </div>
    </div>

    <div class="status-card" style="border-color: var(--b2);">
        <div class="imp-tabs">
            <div class="imp-tab on" id="itab-file" onclick="switchImpTab('file')">📁 CDSL XLS</div>
            <div class="imp-tab" id="itab-manual" onclick="switchImpTab('manual')">✏ MANUAL</div>
        </div>

        <div class="imp-pane on" id="ipane-file">
            <div class="file-drop" onclick="document.getElementById('file-input').click()" 
                 style="border:2px dashed var(--b1); padding:30px; text-align:center; border-radius:12px; background:#050505;">
                <input type="file" id="file-input" accept=".xls,.xlsx,.csv" style="display:none;" 
                       onchange="handleFileSelect(this.files[0])">
                <div style="font-size:24px; margin-bottom:10px;">📂</div>
                <div style="font-size:11px; font-weight:800;">SELECT CDSL XLS</div>
            </div>
        </div>

        <div class="imp-pane" id="ipane-manual">
            <textarea id="import-ta-manual" class="import-textarea" 
                      placeholder="SYMBOL, QTY, AVG_BUY (e.g. RELIANCE, 10, 2500)"></textarea>
            <button class="import-btn btn-glow" onclick="runManualIngestion()">RESOLVE & INJECT</button>
        </div>
    </div>

    <div id="imp-report" style="display:none;"></div>
    <div id="file-status" style="margin-top:10px; font-size:10px; color:var(--bl); min-height:15px;"></div>

    <div id="log">
        <div class="log-line">Awaiting data input...</div>
    </div>
</div>

<footer>
    <a href="index.html" class="nav-btn">
        <span class="nav-label">Portfolio</span>
    </a>
    <a href="nexus.html" class="nav-btn active">
        <span class="nav-label">Terminal</span>
    </a>
</footer>

<script src="app-import.js"></script>
<script>
    // Initialize stats
    window.onload = () => {
        const pf = JSON.parse(localStorage.getItem('portfolio') || '[]');
        document.getElementById('cache-count').textContent = pf.length + " STOCKS";
    };

    // Bridging UI to app-import.js Core
    function runManualIngestion() {
        const text = document.getElementById('import-ta-manual').value;
        if(!text) return;
        
        // Calling your original parser
        parsedHoldings = parsePortfolioText(text); 
        
        if(parsedHoldings.length > 0) {
            // Commit to database and trigger GitHub Sync
            applyImport('append'); 
            alert("Resolved and injected " + parsedHoldings.length + " stocks.");
            location.reload();
        } else {
            document.getElementById('log').innerHTML = '<div class="log-line" style="color:var(--rd)">✗ Resolution Failed: Check Format</div>';
        }
    }
</script>
</body>
</html>
