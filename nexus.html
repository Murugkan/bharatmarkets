<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
    <title>Onyx | Terminal Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;800&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg:#000; --s1:#0a0a0a; --s2:#111; --b1:#222; --b2:#333; --bl:#00f2ff; --gr:#00ff88; --rd:#ff4d6d; --tx:#fff; --tx3:#666; --ac:#f97316; --mono:'JetBrains Mono',monospace; }
        * { box-sizing:border-box; margin:0; padding:0; }
        body { background:var(--bg); color:var(--tx); font-family:var(--mono); padding-bottom:100px; -webkit-tap-highlight-color:transparent; }
        header { background:var(--s1); border-bottom:1px solid var(--b1); padding:20px; text-align:center; }
        .title { font-size:11px; font-weight:800; letter-spacing:3px; color:var(--bl); text-transform:uppercase; }
        .container { padding: 20px; }
        .status-card { background: var(--s1); border: 1px solid var(--b1); border-radius: 12px; padding: 16px; margin-bottom: 16px; }
        
        /* Dashboard Stats */
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 12px; }
        .stat-item { background: #050505; padding: 12px; border-radius: 8px; border: 1px solid #151515; }
        .stat-label { font-size: 8px; color: var(--tx3); text-transform: uppercase; margin-bottom: 4px; }
        .stat-val { font-size: 13px; font-weight: 800; }

        /* Import UI Styles (Mirrored from app-import.js) */
        .imp-tabs{display:flex;gap:0;border-bottom:2px solid var(--b2);margin-bottom:14px;}
        .imp-tab{flex:1;padding:12px 6px;text-align:center;font-size:11px;font-weight:700;cursor:pointer;color:var(--tx3);border-bottom:2px solid transparent;}
        .imp-tab.on{color:var(--ac);border-bottom-color:var(--ac);}
        .imp-pane{display:none;} .imp-pane.on{display:block;}
        .file-drop{border:2px dashed var(--b2);border-radius:12px;padding:28px 16px;text-align:center;background:var(--s1);font-size:11px;}
        .import-textarea{width:100%;background:#050505;border:1px solid var(--b1);color:#fff;padding:12px;font-family:var(--mono);font-size:11px;border-radius:8px;}
        .btn-wide{width:100%;padding:16px;background:var(--ac);border:none;border-radius:8px;color:#000;font-weight:800;margin-top:12px;text-transform:uppercase;}

        /* Navigation Menu */
        footer { position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); border-top: 1px solid var(--b1); display: flex; justify-content: space-around; padding: 15px 0; padding-bottom: calc(15px + env(safe-area-inset-bottom)); }
        .nav-btn { text-decoration: none; color: var(--tx3); display: flex; flex-direction: column; align-items: center; width: 33%; font-size: 10px; font-weight: 800; }
        .nav-btn.active { color: var(--bl); }
    </style>
</head>
<body>

<header><div class="title">Terminal // Ingestion</div></header>

<div class="container">
    <div class="status-card">
        <div class="stat-label">Local Database</div>
        <div class="stat-val" id="cache-display">-- STOCKS</div>
        <div class="stat-grid">
            <div class="stat-item"><div class="stat-label">Mode</div><div class="stat-val">ONYX v8</div></div>
            <div class="stat-item"><div class="stat-label">Status</div><div class="stat-val" style="color:var(--gr)">ONLINE</div></div>
        </div>
    </div>

    <div class="status-card" style="border-color: var(--b2);">
        <div class="stat-label" style="margin-bottom:15px;">Data Loading Section</div>
        
        <div class="imp-tabs">
            <div class="imp-tab on" id="itab-file" onclick="switchImpTab('file')">📁 CDSL FILE</div>
            <div class="imp-tab" id="itab-manual" onclick="switchImpTab('manual')">✏ MANUAL</div>
        </div>

        <div class="imp-pane on" id="ipane-file">
            <div class="file-drop" onclick="document.getElementById('file-input').click()">
                <input type="file" id="file-input" style="display:none" onchange="handleFileSelect(this.files[0])">
                <div style="font-size:20px;margin-bottom:8px">📂</div>
                <b>UPLOAD CDSL STATEMENT</b>
                <div style="color:var(--tx3);margin-top:4px;font-size:9px">Select XLS or CSV from Files</div>
            </div>
        </div>

        <div class="imp-pane" id="ipane-manual">
            <textarea id="import-ta-manual" class="import-textarea" rows="6" placeholder="SYMBOL, QTY, PRICE (e.g. RELIANCE, 10, 2500)"></textarea>
            <button class="btn-wide" onclick="processManualInput()">Resolve & Inject</button>
        </div>
    </div>

    <div id="imp-report"></div>
    <div id="file-status" style="font-size:10px; color:var(--bl); padding:10px;"></div>
</div>

<footer>
    <a href="index.html" class="nav-btn">PORTFOLIO</a>
    <a href="nexus.html" class="nav-btn active">TERMINAL</a>
</footer>

<script src="app-import.js"></script>
<script>
    // Initialize count and verify storage
    function initNexus() {
        const data = JSON.parse(localStorage.getItem('portfolio') || '[]');
        document.getElementById('cache-display').textContent = data.length + " STOCKS";
    }
    window.onload = initNexus;

    // Bridge for Manual Ingestion using app-import.js functions
    function processManualInput() {
        const raw = document.getElementById('import-ta-manual').value;
        if(!raw) return;

        // Use the parser from your app-import.js
        parsedHoldings = parsePortfolioText(raw); 
        
        if(parsedHoldings.length > 0) {
            // Use the original apply function to save and sync to GitHub
            applyImport('append'); 
            
            // Refresh UI to show new count (94 -> 109)
            setTimeout(() => {
                initNexus();
                alert("Successfully loaded " + parsedHoldings.length + " symbols.");
            }, 800);
        } else {
            alert("Resolution failed. Check format: SYMBOL, QTY, PRICE");
        }
    }
</script>
</body>
</html>
