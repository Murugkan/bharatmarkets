<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
    <title>Onyx | Terminal Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;800&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg:#000; --s1:#0a0a0a; --s2:#111; --b1:#222; --b2:#333; --bl:#00f2ff; --gr:#00ff88; --rd:#ff4d6d; --tx:#fff; --tx3:#666; --ac:#f97316; --mono:'JetBrains Mono',monospace; }
        * { box-sizing:border-box; margin:0; padding:0; }
        body { background:var(--bg); color:var(--tx); font-family:var(--mono); padding-bottom:100px; -webkit-tap-highlight-color:transparent; }
        
        header { background:var(--s1); border-bottom:1px solid var(--b1); padding:20px; text-align:center; position:sticky; top:0; z-index:100; }
        .title { font-size:11px; font-weight:800; letter-spacing:3px; color:var(--bl); text-transform:uppercase; }

        .container { padding: 20px; }
        .status-card { background: var(--s1); border: 1px solid var(--b1); border-radius: 12px; padding: 16px; margin-bottom: 16px; }
        
        /* KPI Grid */
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 12px; }
        .stat-item { background: #050505; padding: 12px; border-radius: 8px; border: 1px solid #151515; }
        .stat-label { font-size: 8px; color: var(--tx3); text-transform: uppercase; margin-bottom: 4px; letter-spacing: 1px; }
        .stat-val { font-size: 13px; font-weight: 800; }

        /* Data Loading Tabs */
        .imp-tabs { display: flex; border-bottom: 1px solid var(--b1); margin-bottom: 15px; }
        .btn-tab { flex:1; background:none; border:none; color:var(--tx3); padding:12px; font-family:'Syne',sans-serif; font-size:11px; font-weight:800; cursor:pointer; border-bottom: 2px solid transparent; }
        .btn-tab.active { color:var(--bl); border-bottom-color:var(--bl); }

        /* Buttons & Inputs */
        .btn { width: 100%; padding: 16px; background: var(--s2); color: var(--tx); border: 1px solid var(--b1); border-radius: 8px; font-family: inherit; font-weight: 800; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-glow { background: var(--bl); color: #000; border: none; }
        .import-textarea { width:100%; height:120px; background:#050505; border:1px solid var(--b1); color:#fff; padding:12px; font-family:var(--mono); font-size:10px; border-radius:8px; resize:none; }

        /* Log Output */
        #log { background: #050505; border: 1px solid #111; padding: 12px; height: 180px; overflow-y: auto; font-size: 10px; color: #444; border-radius: 8px; margin-top: 15px; }
        .log-line { margin-bottom: 4px; padding-left: 8px; border-left: 2px solid #222; }
        .log-line.success { border-color: var(--gr); color: var(--gr); }
        .log-line.error { border-color: var(--rd); color: var(--rd); }

        /* Navigation Menu */
        footer { position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); border-top: 1px solid var(--b1); display: flex; justify-content: space-around; padding: 12px 0; padding-bottom: calc(12px + env(safe-area-inset-bottom)); z-index: 1000; }
        .nav-btn { text-decoration: none; color: #444; display: flex; flex-direction: column; align-items: center; width: 33%; transition: .2s; }
        .nav-btn.active { color: var(--bl); }
        .nav-label { font-size: 8px; margin-top: 5px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

<header><div class="title">Terminal // Data Engine</div></header>

<div class="container">
    <div class="status-card">
        <div class="stat-label">System Status</div>
        <div class="stat-val" id="sys-status">READY</div>
        <div class="stat-grid">
            <div class="stat-item">
                <div class="stat-label">Local Cache</div>
                <div class="stat-val" id="count-val">FETCHING...</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Engine Mode</div>
                <div class="stat-val">ONYX PRO v8</div>
            </div>
        </div>
    </div>

    <div class="status-card" style="border-color: var(--b2);">
        <div class="imp-tabs">
            <button class="btn-tab active" id="tab-file" onclick="switchMode('file')">CDSL FILE</button>
            <button class="btn-tab" id="tab-manual" onclick="switchMode('manual')">MANUAL ENTRY</button>
        </div>

        <div id="pane-file">
            <div class="file-drop" onclick="document.getElementById('file-input').click()" 
                 style="border:2px dashed var(--b1); padding:40px 20px; text-align:center; border-radius:12px; background:rgba(0,242,255,0.02);">
                <input type="file" id="file-input" accept=".xls,.xlsx,.csv" style="display:none;" 
                       onchange="handleFileSelect(this.files[0])">
                <div style="font-size:32px; margin-bottom:10px;">📂</div>
                <div style="font-size:12px; font-weight:800; font-family:'Syne';">UPLOAD CDSL XLS</div>
                <div style="font-size:9px; color:var(--tx3); margin-top:8px;">Resolves ISIN to Symbols Automatically</div>
            </div>
            <div id="file-status" style="margin-top:10px; font-size:9px; color:var(--bl);"></div>
        </div>

        <div id="pane-manual" style="display:none;">
            <textarea id="import-ta-manual" class="import-textarea" 
                      placeholder="SYMBOL, QTY, AVG_BUY (One per line)"></textarea>
            <button class="btn btn-glow" onclick="processManual()">RESOLVE & INJECT</button>
        </div>
    </div>

    <div id="imp-report" style="display:none;"></div>

    <div id="log">
        <div class="log-line">Terminal initialized. Awaiting ingestion...</div>
    </div>
</div>

<footer>
    <a href="index.html" class="nav-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>
        <span class="nav-label">Portfolio</span>
    </a>
    <a href="nexus.html" class="nav-btn active">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
        <span class="nav-label">Terminal</span>
    </a>
</footer>

<script src="app-import.js"></script>
<script>
    // Initialize Local Cache Display
    window.onload = () => {
        const count = JSON.parse(localStorage.getItem('portfolio') || '[]').length;
        document.getElementById('count-val').textContent = count + " STOCKS";
    };

    function switchMode(mode) {
        document.getElementById('pane-file').style.display = mode === 'file' ? 'block' : 'none';
        document.getElementById('pane-manual').style.display = mode === 'manual' ? 'block' : 'none';
        document.getElementById('tab-file').classList.toggle('active', mode === 'file');
        document.getElementById('tab-manual').classList.toggle('active', mode === 'manual');
    }

    function log(msg, type='') {
        const l = document.getElementById('log');
        const d = document.createElement('div');
        d.className = `log-line ${type}`;
        d.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
        l.prepend(d);
    }

    // Bridge to app-import.js Manual Logic
    async function processManual() {
        const text = document.getElementById('import-ta-manual').value;
        if(!text) return log("Error: No data entered", "error");
        
        log("Parsing manual entries...", "info");
        parsedHoldings = parsePortfolioText(text); // Calls app-import.js core
        
        if(parsedHoldings.length > 0) {
            log(`Resolved ${parsedHoldings.length} stocks. Injecting...`, "success");
            applyImport('append'); // Calls app-import.js core to save and sync
            location.reload();
        } else {
            log("Failed: No valid symbols resolved", "error");
        }
    }
</script>
</body>
</html>
