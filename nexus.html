<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>Onyx // Nexus</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg:#000; --s1:#0a0a0a; --b1:#1a1a1a; --ac:#00f2ff; --gr:#00ff88; --rd:#ff4d6d; --tx:#fff; --tx3:#555; }
        body { background:var(--bg); color:var(--tx); font-family:'JetBrains Mono',monospace; padding:15px; overflow-x:hidden; }
        header { margin-bottom:20px; border-bottom: 1px solid var(--b1); padding-bottom: 10px; display:flex; justify-content:space-between; align-items:center; }
        h1 { font-size:18px; color:var(--ac); letter-spacing: -1px; margin:0; }
        textarea { width:100%; height:160px; background:var(--s1); border:1px solid var(--b1); border-radius:8px; color:var(--gr); padding:12px; font-size:13px; font-family:inherit; outline:none; resize:none; }
        .btn { background:var(--ac); color:#000; border:none; padding:18px; font-size:13px; font-weight:800; border-radius:8px; width:100%; margin-top:12px; display:flex; justify-content:center; align-items:center; }
        .btn:active { opacity: 0.7; transform: scale(0.98); }
        #audit-grid { margin-top:20px; border-top: 1px solid var(--b1); padding-top:10px; }
        .audit-item { font-size:11px; padding:8px; background:var(--s1); margin-bottom:4px; border-radius:4px; display:flex; justify-content:space-between; border-left: 3px solid var(--b1); }
        .audit-item.mapped { border-left-color: var(--gr); }
        #status-log { font-size: 10px; color: var(--tx3); margin-top: 10px; font-style: italic; }
    </style>
</head>
<body>
    <header><h1>ONYX // NEXUS</h1></header>
    <div style="font-size: 9px; color: var(--tx3); margin-bottom: 6px; letter-spacing: 1px;">1. EXTRACT FROM PORTFOLIO_SYMBOLS.TXT</div>
    <textarea id="symbol-well" placeholder="Paste symbols here..."></textarea>
    
    <button class="btn" onclick="runResolution()">RESOLVE & REGISTER</button>
    <button id="sync-btn" class="btn" style="background:var(--gr); display:none;" onclick="runSync()">PUSH TO GITHUB</button>

    <div id="status-log">Ready...</div>
    <div id="audit-grid"></div>

    <script src="nexus-bridge.js"></script>
    <script>
        const log = (msg) => document.getElementById('status-log').innerText = msg;
        async function runResolution() {
            const raw = document.getElementById('symbol-well').value;
            const input = [...new Set(raw.split(/[\s,]+/).map(s => s.trim().toUpperCase()).filter(s => s))];
            try {
                const resp = await fetch('symbol_map.json');
                const mapData = await resp.json();
                const overrides = mapData.overrides || {};
                const resolved = input.map(s => ({
                    sym: s,
                    yf: overrides[s] || `${s}.NS`,
                    source: ["portfolio"],
                    mapped: !!overrides[s]
                }));
                localStorage.setItem('onyx_symbols', JSON.stringify(resolved));
                renderAudit(resolved);
                log(`Resolved ${resolved.length} symbols. Ready for Sync.`);
                document.getElementById('sync-btn').style.display = 'flex';
            } catch (e) { log("Error loading symbol_map.json"); }
        }
        function renderAudit(list) {
            document.getElementById('audit-grid').innerHTML = list.map(s => `
                <div class="audit-item ${s.mapped ? 'mapped' : ''}">
                    <span>${s.sym}</span><span style="color:var(--tx3)">→ ${s.yf}</span>
                </div>`).join('');
        }
        async function runSync() {
            log("Syncing to GitHub...");
            const success = await NEXUS_BRIDGE.syncToCloud();
            if(success) log("✅ SUCCESS: symbols.json updated!");
        }
    </script>
</body>
</html>
