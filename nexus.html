<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
    <title>Onyx // Nexus Terminal</title>
    <style>
        :root { --bg:#000; --s1:#0a0a0a; --b1:#222; --b2:#333; --bl:#00f2ff; --tx:#fff; --tx3:#666; --ac:#f97316; --mono:'JetBrains Mono',monospace; }
        body { background:var(--bg); color:var(--tx); font-family:sans-serif; margin:0; padding-bottom:100px; }
        header { padding:20px; text-align:center; border-bottom:1px solid var(--b1); font-weight:800; color:var(--bl); letter-spacing:2px; font-size:12px; }
        .container { padding:20px; }
        
        /* Re-using your app-import.js styles for perfect compatibility */
        .imp-tabs{display:flex;gap:0;border-bottom:2px solid var(--b2);margin-bottom:14px;}
        .imp-tab{flex:1;padding:12px 6px;text-align:center;font-size:11px;font-weight:700;cursor:pointer;color:var(--tx3);border-bottom:2px solid transparent;}
        .imp-tab.on{color:var(--ac);border-bottom-color:var(--ac);}
        .imp-pane{display:none;} .imp-pane.on{display:block;}
        
        .status-card { background:var(--s1); border:1px solid var(--b1); border-radius:12px; padding:16px; margin-bottom:16px; }
        .import-textarea { width:100%; background:#050505; border:1px solid var(--b1); color:#fff; padding:12px; font-family:var(--mono); font-size:11px; border-radius:8px; margin-top:10px; }
        .import-btn { width:100%; padding:16px; background:var(--ac); border:none; border-radius:8px; color:#000; font-weight:800; margin-top:10px; text-transform:uppercase; }
        
        footer { position:fixed; bottom:0; width:100%; background:#000; border-top:1px solid var(--b1); display:flex; padding:15px 0; }
        .nav-btn { flex:1; text-align:center; text-decoration:none; color:var(--tx3); font-size:10px; font-weight:800; }
        .nav-btn.active { color:var(--bl); }
    </style>
</head>
<body>

<header>DATA ENGINE // NEXUS</header>

<div class="container">
    <div class="status-card">
        <div style="font-size:9px; color:var(--tx3);">LOCAL CACHE</div>
        <div id="cache-count" style="font-size:18px; font-weight:800; margin-top:5px;">-- STOCKS</div>
    </div>

    <div class="status-card">
        <div class="imp-tabs">
            <div class="imp-tab on" id="itab-file" onclick="switchImpTab('file')">📁 FILE</div>
            <div class="imp-tab" id="itab-manual" onclick="switchImpTab('manual')">✏ MANUAL</div>
        </div>

        <div class="imp-pane on" id="ipane-file">
            <input type="file" id="file-input" style="display:none;" onchange="handleFileSelect(this.files[0])">
            <button class="import-btn" style="background:var(--b2); color:#fff;" onclick="document.getElementById('file-input').click()">Select CDSL XLS</button>
        </div>

        <div class="imp-pane" id="ipane-manual">
            <textarea class="import-textarea" id="import-ta-manual" rows="6" placeholder="RELIANCE, 10, 2500"></textarea>
            <button class="import-btn" onclick="runManualImport()">Inject 15 Stocks</button>
        </div>
    </div>

    <div id="file-status" style="font-size:10px; color:var(--bl); padding:10px;"></div>
    <div id="imp-report"></div>
</div>

<footer>
    <a href="index.html" class="nav-btn">PORTFOLIO</a>
    <a href="nexus.html" class="nav-btn active">TERMINAL</a>
</footer>

<script src="app-import.js"></script>
<script>
    // Force refresh the stock count from your real portfolio data
    function refreshCount() {
        const data = JSON.parse(localStorage.getItem('portfolio') || '[]');
        document.getElementById('cache-count').textContent = data.length + " STOCKS";
    }
    window.onload = refreshCount;

    // Bridge function for Manual Entry
    function runManualImport() {
        const text = document.getElementById('import-ta-manual').value;
        if(!text) return;
        
        // Calling your original parser in app-import.js
        parsedHoldings = parsePortfolioText(text); 
        if(parsedHoldings.length > 0) {
            // Calling your original apply function
            applyImport('append'); 
            setTimeout(() => { 
                refreshCount();
                alert("Successfully added " + parsedHoldings.length + " stocks.");
            }, 500);
        }
    }
</script>
</body>
</html>
