<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
    <title>Onyx | Nexus ETL</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg:#000; --s1:#0a0a0a; --b1:#222; --bl:#00f2ff; --gr:#00ff88; --rd:#ff4d6d; --tx:#fff; }
        *{box-sizing:border-box;margin:0;padding:0;}
        body { background:var(--bg); color:var(--tx); font-family:'JetBrains Mono',monospace; -webkit-text-size-adjust:100%; padding-bottom: 100px; }
        
        header { background:var(--s1); border-bottom:1px solid var(--b1); padding:20px; text-align:center; }
        .title { font-size:12px; font-weight:800; letter-spacing:3px; color:var(--bl); text-transform:uppercase; }

        .container { padding: 20px; }
        .status-card { background: var(--s1); border: 1px solid var(--b1); border-radius: 8px; padding: 20px; margin-bottom: 20px; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .stat-item { background: #050505; padding: 10px; border-radius: 4px; border: 1px solid #111; }
        .stat-label { font-size: 8px; color: #555; text-transform: uppercase; margin-bottom: 4px; }
        .stat-val { font-size: 13px; font-weight: 800; color: var(--tx); }

        .btn { 
            width: 100%; padding: 16px; background: var(--b1); color: var(--tx); border: none; 
            border-radius: 4px; font-family: inherit; font-weight: 800; font-size: 11px; 
            text-transform: uppercase; letter-spacing: 1px; cursor: pointer; margin-top: 10px;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn:active { background: #333; }
        .btn-glow { background: var(--bl); color: #000; box-shadow: 0 0 15px rgba(0, 242, 255, 0.2); }
        
        #log { 
            background: #050505; border: 1px solid #111; padding: 15px; height: 200px; 
            overflow-y: auto; font-size: 10px; color: #444; border-radius: 4px; margin-top: 20px;
        }
        .log-line { margin-bottom: 6px; border-left: 2px solid var(--b1); padding-left: 8px; }
        .log-line.success { border-color: var(--gr); color: var(--tx); }

        /* Navigation Footer */
        footer { 
            position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.9); 
            backdrop-filter: blur(10px); border-top: 1px solid var(--b1); 
            display: flex; justify-content: space-around; padding: 15px 0;
            padding-bottom: calc(15px + env(safe-area-inset-bottom));
        }
        .nav-btn { text-decoration: none; color: #444; display: flex; flex-direction: column; align-items: center; width: 33%; }
        .nav-btn.active { color: var(--bl); }
        .nav-label { font-size: 8px; margin-top: 6px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

<header><div class="title">Data Engine // Nexus</div></header>

<div class="container">
    <div class="status-card">
        <div class="stat-label">System Status</div>
        <div class="stat-val" id="sys-status">STANDBY</div>
        
        <div class="stat-grid">
            <div class="stat-item">
                <div class="stat-label">Local Cache</div>
                <div class="stat-val" id="count-val">0 STOCKS</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">DB Version</div>
                <div class="stat-val">v8.0</div>
            </div>
        </div>
    </div>

    <button class="btn btn-glow" onclick="runETL()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
        Load Stock List
    </button>
    
    <button class="btn" onclick="clearCache()">Clear Database</button>

    <div id="log">
        <div class="log-line">Initializing ETL environment...</div>
    </div>
</div>

<footer>
    <a href="nexus.html" class="nav-btn active">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
        <span class="nav-label">Terminal</span>
    </a>
    <a href="index.html" class="nav-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>
        <span class="nav-label">Portfolio</span>
    </a>
    <a href="#" class="nav-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
        <span class="nav-label">System</span>
    </a>
</footer>

<script>
const DB_NAME = "OnyxPortfolioDB", STORE_NAME = "Stocks", DB_VERSION = 8;

function log(msg, type='') {
    const l = document.getElementById('log');
    const d = document.createElement('div');
    d.className = `log-line ${type}`;
    d.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
    l.prepend(d);
}

async function updateStats() {
    const db = await new Promise(r => {
        const req = indexedDB.open(DB_NAME, DB_VERSION);
        req.onsuccess = () => r(req.result);
    });
    const tx = db.transaction(STORE_NAME, "readonly");
    const count = await new Promise(r => {
        tx.objectStore(STORE_NAME).count().onsuccess = e => r(e.target.result);
    });
    document.getElementById('count-val').textContent = `${count} STOCKS`;
}

async function runETL() {
    log("Fetching stock list...", "success");
    document.getElementById('sys-status').textContent = "SYNCING...";
    
    try {
        const resp = await fetch('fundamentals.json');
        const json = await resp.json();
        const stocks = json.stocks || json;
        
        const db = await new Promise(res => {
            const req = indexedDB.open(DB_NAME, DB_VERSION);
            req.onsuccess = () => res(req.result);
        });

        const writeTx = db.transaction(STORE_NAME, "readwrite");
        const store = writeTx.objectStore(STORE_NAME);
        
        Object.keys(stocks).forEach(t => {
            const s = stocks[t];
            const entry = { SYM: t.split('.')[0].toUpperCase() };
            Object.keys(s).forEach(k => entry[k.toUpperCase()] = s[k]);
            store.put(entry);
        });

        writeTx.oncomplete = () => {
            log(`Success: ${Object.keys(stocks).length} symbols injected.`, "success");
            document.getElementById('sys-status').textContent = "READY";
            updateStats();
        };
    } catch(e) {
        log("Error: Fetch failed. Check fundamentals.json location.");
        document.getElementById('sys-status').textContent = "ERROR";
    }
}

function clearCache() {
    if(confirm("Confirm full wipe?")) {
        indexedDB.deleteDatabase(DB_NAME);
        log("Database deleted.");
        updateStats();
    }
}

window.onload = updateStats;
</script>
</body>
</html>
