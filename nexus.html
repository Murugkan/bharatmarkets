<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
    <title>Onyx | Nexus Terminal</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg:#000; --s1:#0a0a0a; --b1:#111; --bl:#00f2ff; --gr:#00ff88; --tx:#fff; --mono:'JetBrains Mono',monospace; }
        * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
        body { background:var(--bg); color:var(--tx); font-family:var(--mono); padding:20px; }
        
        header { text-align:center; margin-bottom:30px; }
        .title { font-size:12px; font-weight:800; letter-spacing:4px; color:var(--bl); text-transform:uppercase; }

        .card { background:var(--s1); border:1px solid var(--b1); border-radius:12px; padding:20px; margin-bottom:12px; }
        .stat-label { font-size:9px; color:#555; text-transform:uppercase; margin-bottom:8px; }
        .stat-val { font-size:18px; font-weight:800; }

        .btn-main { width:100%; padding:22px; background:var(--bl); color:#000; border:none; border-radius:10px; font-weight:800; font-size:12px; text-transform:uppercase; cursor:pointer; margin-bottom:12px; }
        .btn-sec { width:100%; padding:18px; background:var(--s1); color:#444; border:1px solid var(--b1); border-radius:10px; font-weight:800; font-size:11px; text-transform:uppercase; }

        #log-terminal { margin-top:25px; padding:15px; font-size:10px; color:#444; border-top:1px solid #111; line-height:1.8; }
        
        /* Modal for Manual Input */
        #ov { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); display:none; z-index:900; }
        #manual-panel { position:fixed; bottom:0; left:0; width:100%; background:#050505; border-top:1px solid #222; border-radius:20px 20px 0 0; transform:translateY(100%); transition:transform .3s; z-index:1000; padding:20px; }
        #manual-panel.on { transform:translateY(0); }
        #ov.on { display:block; }
        textarea { width:100%; height:120px; background:#000; border:1px solid #222; color:#fff; padding:12px; font-family:var(--mono); font-size:11px; margin:10px 0; outline:none; }
    </style>
</head>
<body>

<div id="ov" onclick="closePanel()"></div>
<div id="manual-panel">
    <div class="stat-label">Manual Ingestion (Name Qty Avg)</div>
    <textarea id="m-input" placeholder="HDFC 34 6700"></textarea>
    <button class="btn-main" onclick="processManual()">Inject & Sync</button>
</div>

<header><div class="title">Terminal // Nexus</div></header>

<div class="card">
    <div class="stat-label">Local Portfolio Cache</div>
    <div id="cache-count" class="stat-val">0 STOCKS</div>
</div>

<button class="btn-main" onclick="document.getElementById('f-input').click()">📩 Load Portfolio Stocks List</button>
<button class="btn-sec" onclick="openManual()">⌨️ Manual Ingestion</button>
<button class="btn-sec" style="margin-top:12px;" onclick="wipeDB()">Clear Database</button>

<input type="file" id="f-input" hidden onchange="processFile(this)">

<div id="log-terminal">
    <div id="status-line">[SYSTEM] Terminal ready. Cloud Sync Active.</div>
</div>

<script>
    // 1. DATA STATE
    let S = { portfolio: JSON.parse(localStorage.getItem('portfolio') || '[]') };
    const GITHUB_CONFIG = {
        owner: "murugkan", 
        repo: "onyx-data", // Update to your actual repo
        path: "symbols.json",
        token: localStorage.getItem('gh_token')
    };

    function refreshUI() {
        document.getElementById('cache-count').textContent = S.portfolio.length + " STOCKS";
    }

    function openManual() { 
        document.getElementById('ov').classList.add('on');
        document.getElementById('manual-panel').classList.add('on');
    }

    function closePanel() {
        document.getElementById('ov').classList.remove('on');
        document.getElementById('manual-panel').classList.remove('on');
    }

    // 2. NEXUS BRIDGE SYNC
    async function syncToCloud() {
        if(!GITHUB_CONFIG.token) { addLog("ERR: Missing GitHub Token"); return; }
        addLog("Syncing to GitHub...");
        
        try {
            const url = `https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/${GITHUB_CONFIG.config_path || GITHUB_CONFIG.path}`;
            const ref = await fetch(url, { headers: { 'Authorization': `token ${GITHUB_CONFIG.token}` } });
            const data = await ref.json();

            const push = await fetch(url, {
                method: 'PUT',
                headers: { 'Authorization': `token ${GITHUB_CONFIG.token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    message: "Nexus Update via iPhone",
                    content: btoa(unescape(encodeURIComponent(JSON.stringify(S.portfolio)))),
                    sha: data.sha
                })
            });
            if(push.ok) addLog("CLOUD SYNC COMPLETE");
        } catch (e) { addLog("SYNC FAILED"); }
    }

    // 3. RE-ENGINEERED INGESTION (Fixes Space/Comma Resolution)
    function processManual() {
        const val = document.getElementById('m-input').value.trim();
        const lines = val.split('\n');
        let count = 0;

        lines.forEach(line => {
            const p = line.split(/[\s,]+/).filter(x => x.length > 0);
            if(p.length >= 3) {
                S.portfolio.push({ symbol: p[0].toUpperCase(), qty: parseFloat(p[1]), avg: parseFloat(p[2]) });
                count++;
            }
        });

        if(count > 0) {
            localStorage.setItem('portfolio', JSON.stringify(S.portfolio));
            addLog(`Injected ${count} stocks.`);
            closePanel();
            refreshUI();
            syncToCloud();
        }
    }

    function processFile(input) {
        const file = input.files[0];
        const reader = new FileReader();
        reader.onload = (e) => {
            const wb = XLSX.read(new Uint8Array(e.target.result), {type: 'array'});
            const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header: 1});
            rows.forEach(r => {
                if(r.length >= 3 && typeof r[1] === 'number') S.portfolio.push({symbol: r[0], qty: r[1], avg: r[2]});
            });
            localStorage.setItem('portfolio', JSON.stringify(S.portfolio));
            refreshUI();
            syncToCloud();
        };
        reader.readAsArrayBuffer(file);
    }

    function addLog(m) { document.getElementById('status-line').innerHTML += `<div>> ${m}</div>`; }
    function wipeDB() { if(confirm("Wipe?")) { localStorage.clear(); location.reload(); } }
    
    window.onload = refreshUI;
</script>
</body>
</html>
