<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BharatMarkets Pro</title>

<style>
body{
font-family:system-ui;
background:#0f172a;
color:white;
padding:16px;
}

h1{font-size:22px;margin-bottom:10px;}

.controls{display:flex;gap:10px;margin-bottom:12px;}

input{
flex:1;
padding:8px;
border-radius:6px;
border:none;
}

button{
background:#2563eb;
color:white;
border:none;
padding:8px 14px;
border-radius:6px;
}

table{width:100%;border-collapse:collapse;}

th,td{
padding:8px;
border-bottom:1px solid #333;
}

.green{color:#22c55e;}
.red{color:#ef4444;}
.small{font-size:12px;color:#9ca3af;}
</style>
</head>

<body>

<h1>BharatMarkets Pro</h1>

<div class="controls">
<input id="search" placeholder="Search stock">
<button onclick="load()">Refresh</button>
</div>

<div id="time" class="small"></div>

<table>
<thead>
<tr>
<th>Stock</th>
<th>LTP</th>
<th>%</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<script>

const STOCKS=[
"RELIANCE","TCS","INFY","HDFCBANK","ICICIBANK",
"SBIN","LT","ITC","BHARTIARTL","HINDUNILVR",
"AXISBANK","KOTAKBANK","BAJFINANCE","BAJAJFINSV",
"MARUTI","TITAN","ULTRACEMCO","ASIANPAINT",
"SUNPHARMA","HCLTECH","WIPRO"
];

async function load(){

let table=document.getElementById("table");
table.innerHTML="Loading...";

let search=document.getElementById("search").value.toUpperCase();
let html="";

for(let sym of STOCKS){

try{

let url=`https://query1.finance.yahoo.com/v8/finance/chart/${sym}.NS?interval=1d&range=1d`;

let r=await fetch("https://corsproxy.io/?"+url);
let j=await r.json();

let meta=j.chart.result[0].meta;

let price=meta.regularMarketPrice;
let prev=meta.previousClose;

let chg=((price-prev)/prev)*100;

let cls=chg>=0?"green":"red";

if(search && !sym.includes(search)) continue;

html+=`
<tr>
<td>${sym}</td>
<td>₹${price.toFixed(2)}</td>
<td class="${cls}">${chg.toFixed(2)}%</td>
</tr>
`;

}catch(e){}

}

table.innerHTML=html;

document.getElementById("time").innerText=
"Updated "+new Date().toLocaleString();

}

load();
setInterval(load,60000);

</script>

</body>
</html>
