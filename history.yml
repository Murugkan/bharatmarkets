name: "[HISTORY] Manual Full Load Reset"

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  history-load:
    name: "History - Full Load All Data (fetch_history.py)"
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install yfinance

      - name: "[HISTORY] Full load - Fetch all prices & fundamentals"
        run: python fetch_history.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add data/history_yahoo_*.json data/meta_history_yahoo_*.json data/history_yahoo_*.log
          
          git diff --cached --quiet && exit 0
          
          git commit -m "history: manual load [$(date -u +'%Y-%m-%dT%H:%M:%SZ')]"
          git pull --rebase origin main
          git push origin HEAD:main
