name: "[HISTORY] Fetch & Merge Data"

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  history-load:
    name: "Fetch Data (fetch_history.py)"
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install yfinance requests beautifulsoup4

      - name: Create data directories
        run: mkdir -p data/chart

      - name: Fetch data - Yahoo & Screener
        run: python fetch_history.py

      - name: Merge data with validation
        run: python merge_script.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add data/yahoo-history.json data/screener-history.json data/yahoo-history.log data/screener-history.log data/unified-data.json data/validation-report.json data/conflicts-log.json data/chart/ 2>/dev/null || true
          
          git diff --cached --quiet && exit 0
          
          git commit -m "data: fetch & merge [$(date -u +'%Y-%m-%dT%H:%M:%SZ')]"
          git pull --rebase origin main
          git push origin HEAD:main
