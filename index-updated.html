<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
    <title>Onyx | Pro Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg:#000; --s1:#0a0a0a; --b1:#222; --bl:#00f2ff; --gr:#00ff88; --rd:#ff4d6d; --tx:#fff; }
        *{box-sizing:border-box;margin:0;padding:0;}
        body { background:var(--bg); color:var(--tx); font-family:'JetBrains Mono',monospace; overflow:hidden; -webkit-text-size-adjust:100%; padding-bottom: 80px; }
        header { background:var(--s1); border-bottom:1px solid var(--b1); padding:12px; display:flex; justify-content:space-around; }
        .kpi-box { text-align:center; }
        .kpi-label { font-size:8px; color:#666; text-transform:uppercase; letter-spacing:1px; }
        .kpi-val { font-size:14px; font-weight:800; margin-top:2px; color:var(--bl); }
        #bar-wrap { padding:12px; background:#111; border-bottom:1px solid var(--b1); }
        #tape-bar { width:100%; height:32px; border-radius:4px; overflow:hidden; display:flex; background:#050505; }
        .seg { height:100%; cursor:pointer; flex-shrink:0; border-right:1px solid rgba(0,0,0,0.3); }
        #legend { display:flex; flex-wrap:wrap; gap:6px 12px; padding:10px; border-bottom:1px solid var(--b1); background:#000; max-height:80px; overflow-y:auto; }
        .leg { display:flex; align-items:center; gap:6px; font-size:9px; color:#666; cursor:pointer; }
        .leg.on { color:#fff; font-weight:800; }
        .dot { width:8px; height:8px; border-radius:2px; }
        .view { width:100%; overflow:auto; height:calc(100vh - 210px); background:#000; -webkit-overflow-scrolling:touch; }
        table { width:100%; border-collapse:collapse; font-size:10px; white-space:nowrap; }
        th { background:var(--s1); color:#666; padding:12px; position:sticky; top:0; z-index:10; border-bottom:2px solid var(--b1); text-align:left; cursor: pointer; }
        th.active { color: var(--bl); }
        td { padding:12px; border-bottom:1px solid #111; }
        tfoot td { background: var(--s1); font-weight: 800; color: var(--tx); border-top: 2px solid var(--b1); position: sticky; bottom: 0; }
        .sticky { position:sticky; left:0; background:#0a0a0a!important; z-index:5; border-right:1px solid var(--b1); color:var(--bl)!important; }
        .pos { color:var(--gr)!important; }
        .neg { color:var(--rd)!important; }
        .sig-buy { color:#00ff88; font-weight:800; border:1px solid #00ff88; padding:2px 4px; border-radius:2px; font-size:9px; }
        #status { padding:40px; font-size:11px; color:var(--bl); text-align:center; position:absolute; width:100%; top:200px; }

        /* Navigation Footer */
        footer { 
            position: fixed; bottom: 0; width: 100%; 
            background: rgba(0,0,0,0.95); backdrop-filter: blur(10px);
            border-top: 1px solid var(--b1); display: flex; justify-content: space-around; 
            padding: 12px 0; padding-bottom: calc(12px + env(safe-area-inset-bottom)); z-index: 1000;
        }
        .nav-btn { text-decoration: none; color: #444; display: flex; flex-direction: column; align-items: center; width: 33%; }
        .nav-btn.active { color: var(--bl); }
        .nav-label { font-size: 8px; margin-top: 4px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
    </style>
    <!-- ADDED: Import workflow script -->
    <script src="app-import.js"></script>
</head>
<body>

<header>
    <div class="kpi-box"><div class="kpi-label">Holdings</div><div class="kpi-val" id="k-count">0</div></div>
    <div class="kpi-box"><div class="kpi-label">P&L</div><div class="kpi-val" id="k-pnl">—</div></div>
    <div class="kpi-box" style="cursor:pointer;" onclick="runEngineSync()" title="Click to sync data"><div class="kpi-label">Action</div><div class="kpi-val" style="color:#00ff88; font-size:11px;">SYNC ↻</div></div>
    <!-- ADDED: Import button -->
    <div class="kpi-box" style="cursor:pointer;" onclick="openImportWorkflow()" title="Import your portfolio"><div class="kpi-label">Import</div><div class="kpi-val" style="color:#00ff88; font-size:11px;">📥</div></div>
</header>

<div id="bar-wrap"><div id="tape-bar"></div></div>
<div id="legend"></div>
<div id="status">Loading Pro Engine...</div>
<div class="view"><div id="app"></div></div>

<footer>
    <a href="nexus.html" class="nav-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
        <span class="nav-label">Terminal</span>
    </a>
    <a href="index.html" class="nav-btn active">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>
        <span class="nav-label">Portfolio</span>
    </a>
    <a href="#" class="nav-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
        <span class="nav-label">System</span>
    </a>
</footer>

<script>
const DB_NAME = "OnyxPortfolioDB", STORE_NAME = "Stocks", DB_VERSION = 8;
const PALETTE = ['#00f2ff','#7000ff','#ff007a','#ffb800','#00ff88','#007aff','#ff4d6d','#f97316','#a3e635','#ec4899','#8b5cf6','#f43f5e'];

let MASTER = [], SECTORS = [], COL = {}, filter = null, sortCol = 'P/L', sortAsc = false;

const UI_FIELDS = [
    'SYM', 'SIGNAL', 'PNL', 'PNL%', '1D%', 'LTP',
    'QTY', 'AVG', 'INVESTED',
    'POS', 'NEG', 'ROE%', 'ROCE%', 'OPM%', 'NPM%',
    'PE', 'PB', 'MCAP', 'SALES', 'EBITDA', 'CFO',
    'EPS', 'PROM%', 'FII%', 'DII%', 'ATH%', '52W%',
    'SECTOR'
];

const cleanNum = (v) => {
    if (typeof v === 'number') return v;
    if (!v || v === '—') return 0;
    return parseFloat(v.toString().replace(/[^\d.-]/g, '')) || 0;
};

const fmt = (val, field) => {
    const n = cleanNum(val);
    if (n === 0 && val === '—') return '—';
    if (['LTP', 'AVG', 'PNL', 'INVESTED', 'MCAP'].includes(field)) return n.toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    if (field.includes('%')) return n.toFixed(2) + '%';
    if (['PE', 'PB', 'ROE%', 'ROCE%', 'OPM%', 'NPM%', 'EPS'].includes(field)) return n.toFixed(2);
    return n.toString();
};

async function boot() {
    try {
        const db = await new Promise((r, j) => {
            const req = indexedDB.open(DB_NAME, DB_VERSION);
            req.onsuccess = () => r(req.result);
            req.onerror = () => j(req.error);
        });
        const tx = db.transaction(STORE_NAME, 'readonly');
        const data = await new Promise((r) => {
            tx.objectStore(STORE_NAME).getAll().onsuccess = (e) => r(e.target.result);
        });
        MASTER = data;
        render();
    } catch (err) {
        console.error('Boot error:', err);
    }
}

function render() {
    const app = document.getElementById('app');
    if (!MASTER || MASTER.length === 0) {
        app.innerHTML = '<div style="padding:40px; text-align:center; color:#666;">' +
            '<p>No data loaded. Click 📥 Import to add your stocks or SYNC ↻ to load market data.</p>' +
            '</div>';
        return;
    }
    
    const filtered = filter ? MASTER.filter(s => s.SYM && s.SYM.includes(filter.toUpperCase())) : MASTER;
    const sorted = filtered.sort((a, b) => {
        const av = cleanNum(a[sortCol]);
        const bv = cleanNum(b[sortCol]);
        return sortAsc ? av - bv : bv - av;
    });
    
    let html = '<table>';
    html += '<thead><tr>';
    UI_FIELDS.forEach(f => {
        const isActive = f === sortCol ? 'active' : '';
        html += `<th class="${isActive}" onclick="doSort('${f}')">${f}</th>`;
    });
    html += '</tr></thead>';
    html += '<tbody>';
    
    sorted.forEach(row => {
        html += '<tr>';
        UI_FIELDS.forEach(f => {
            const val = row[f] || '—';
            const color = f === 'SYM' ? 'sticky' : '';
            if (f === 'PNL' || f === 'PNL%' || f === '1D%') {
                const n = cleanNum(val);
                const cls = n > 0 ? 'pos' : n < 0 ? 'neg' : '';
                html += `<td class="${color} ${cls}">${fmt(val, f)}</td>`;
            } else {
                html += `<td class="${color}">${fmt(val, f)}</td>`;
            }
        });
        html += '</tr>';
    });
    
    html += '</tbody></table>';
    app.innerHTML = html;
    updateKPIs();
}

function updateKPIs() {
    const pnl = MASTER.reduce((sum, s) => sum + cleanNum(s.PNL), 0);
    const count = MASTER.length;
    document.getElementById('k-count').textContent = count;
    document.getElementById('k-pnl').textContent = '₹' + pnl.toLocaleString('en-IN', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
}

function doSort(col) {
    sortCol = col;
    sortAsc = !sortAsc;
    render();
}

window.addEventListener('DOMContentLoaded', boot);
</script>

</body>
</html>
