<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>BharatMarkets | Tape Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --s1: #0a0a0a; --b1: #222; --bl: #00f2ff; --gr: #064e3b; --rd: #7f1d1d; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: #fff; font-family: 'JetBrains Mono', monospace; }

```
    header { background: var(--s1); border-bottom: 1px solid var(--b1); padding: 10px 12px; display: flex; justify-content: space-around; }
    .kpi-box { text-align: center; }
    .kpi-label { font-size: 8px; color: #666; text-transform: uppercase; }
    .kpi-val { font-size: 14px; font-weight: 800; margin-top: 2px; }

    /* BAR — guaranteed visible */
    #bar-wrap {
        width: 100%;
        padding: 10px;
        background: #111;
        border-bottom: 1px solid var(--b1);
    }
    #tape-bar {
        width: 100%;
        height: 36px;
        border-radius: 4px;
        overflow: hidden;
        display: flex;
        background: #333; /* fallback so you can see the container */
    }
    .seg {
        height: 100%;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 8px;
        font-weight: 800;
        color: #000;
        overflow: hidden;
        white-space: nowrap;
        transition: opacity .2s;
    }
    .seg.dimmed { opacity: 0.2; }

    #legend {
        display: flex;
        flex-wrap: wrap;
        gap: 6px 12px;
        padding: 6px 10px;
        border-bottom: 1px solid var(--b1);
    }
    .leg { display: flex; align-items: center; gap: 5px; font-size: 9px; color: #888; cursor: pointer; }
    .leg.on { color: #fff; }
    .dot { width: 8px; height: 8px; border-radius: 2px; }

    #active-label {
        font-size: 9px; color: #555; padding: 3px 10px;
        border-bottom: 1px solid #111; min-height: 18px;
    }
    #active-label span { color: var(--bl); font-weight: 800; }

    .view { overflow: auto; height: calc(100vh - 200px); }
    table { width: 100%; border-collapse: collapse; font-size: 11px; white-space: nowrap; }
    th { background: var(--s1); color: #666; padding: 10px 12px; position: sticky; top: 0; z-index: 9; border-bottom: 1px solid var(--b1); text-align: left; }
    td { padding: 10px 12px; border-bottom: 1px solid #111; }
    .pin { position: sticky; left: 0; background: #111; border-right: 1px solid var(--b1); color: var(--bl); font-weight: 800; z-index: 5; }
    .pos { background: var(--gr); }
    .neg { background: var(--rd); }
</style>

</head>
<body>
    <header>
        <div class="kpi-box"><div class="kpi-label">Invested</div><div class="kpi-val" id="ki">—</div></div>
        <div class="kpi-box"><div class="kpi-label">Mkt Value</div><div class="kpi-val" id="kv">—</div></div>
        <div class="kpi-box"><div class="kpi-label">Total P&L</div><div class="kpi-val" id="kp">—</div></div>
    </header>
    <div id="bar-wrap"><div id="tape-bar"></div></div>
    <div id="legend"></div>
    <div id="active-label">&nbsp;</div>
    <div class="view"><div id="app"></div></div>

<script>
// ── DEMO DATA (no fetch needed) ──────────────────────────────────────────────
const STOCKS = [
    { SYM:"RELIANCE", QTY:10, AVG:2400, LTP:2650, SECTOR:"Energy",  ROE:14 },
    { SYM:"INFY",     QTY:20, AVG:1500, LTP:1420, SECTOR:"IT",      ROE:29 },
    { SYM:"HDFCBANK", QTY:15, AVG:1600, LTP:1720, SECTOR:"Banking", ROE:17 },
    { SYM:"TCS",      QTY:8,  AVG:3500, LTP:3800, SECTOR:"IT",      ROE:45 },
    { SYM:"TATASTEEL",QTY:50, AVG:120,  LTP:135,  SECTOR:"Metals",  ROE:21 },
    { SYM:"SUNPHARMA",QTY:12, AVG:1100, LTP:1050, SECTOR:"Pharma",  ROE:18 },
    { SYM:"ICICIBANK",QTY:25, AVG:900,  LTP:980,  SECTOR:"Banking", ROE:16 }
];

const PALETTE = ['#00f2ff','#7000ff','#ff007a','#ffb800','#00ff88','#007aff','#ff4d6d'];
const FIELDS  = ['SYM','QTY','AVG','LTP','PNL','ROE','SECTOR'];

// pre-compute
const DATA = STOCKS.map(s => ({
    ...s,
    COST: s.QTY * s.AVG,
    MKT:  s.QTY * s.LTP,
    PNL:  Math.round(s.QTY * s.LTP - s.QTY * s.AVG)
}));

// sector colour map
const SECTORS = [...new Set(DATA.map(s => s.SECTOR))];
const COL = {};
SECTORS.forEach((s, i) => COL[s] = PALETTE[i % PALETTE.length]);

let filter = null;

// ── RENDER ───────────────────────────────────────────────────────────────────
function fmt(n) { return `₹${(n/100000).toFixed(2)}L`; }

function renderKPIs() {
    let tI=0,tM=0,tP=0;
    DATA.forEach(s => { tI+=s.COST; tM+=s.MKT; tP+=s.PNL; });
    document.getElementById('ki').textContent = fmt(tI);
    document.getElementById('kv').textContent = fmt(tM);
    const kp = document.getElementById('kp');
    kp.textContent = fmt(tP);
    kp.style.color = tP >= 0 ? '#00ff88' : '#ff4d6d';
}

function renderBar() {
    const secCost = {};
    DATA.forEach(s => { secCost[s.SECTOR] = (secCost[s.SECTOR]||0) + s.COST; });
    const total = Object.values(secCost).reduce((a,b)=>a+b, 0);

    document.getElementById('tape-bar').innerHTML = SECTORS.map(sec => {
        const pct = (secCost[sec] / total * 100).toFixed(2);
        const dim = filter && filter !== sec ? ' dimmed' : '';
        const lbl = pct > 9 ? sec : '';
        return `<div class="seg${dim}" style="width:${pct}%;background:${COL[sec]}"
                     onclick="tap('${sec}')" title="${sec} ${pct}%">${lbl}</div>`;
    }).join('');

    document.getElementById('legend').innerHTML = SECTORS.map(sec =>
        `<div class="leg ${filter===sec?'on':''}" onclick="tap('${sec}')">
            <div class="dot" style="background:${COL[sec]}"></div>${sec}
         </div>`
    ).join('');

    const lbl = document.getElementById('active-label');
    lbl.innerHTML = filter ? `Sector: <span>${filter}</span> — tap again to clear` : '&nbsp;';
}

function renderTable() {
    const rows = filter ? DATA.filter(s => s.SECTOR === filter) : DATA;
    let h = `<table><thead><tr>`
        + FIELDS.map(f => `<th${f==='SYM'?' class="pin"':''}>${f}</th>`).join('')
        + `</tr></thead><tbody>`;
    rows.forEach(s => {
        h += `<tr>` + FIELDS.map(f => {
            const v = s[f] ?? '—';
            const c = f==='SYM' ? 'pin' : f==='PNL' ? (v>=0?'pos':'neg') : '';
            return `<td${c?` class="${c}"`:''}>${v}${f==='ROE'?'%':''}</td>`;
        }).join('') + `</tr>`;
    });
    document.getElementById('app').innerHTML = h + `</tbody></table>`;
}

function tap(sec) {
    filter = filter === sec ? null : sec;
    renderBar();
    renderTable();
}

// ── BOOT ─────────────────────────────────────────────────────────────────────
renderKPIs();
renderBar();
renderTable();

// If you have fundamentals.json, swap in live data
fetch('fundamentals.json').then(r => r.ok ? r.json() : null).then(json => {
    if (!json) return;
    DATA.length = 0;
    Object.keys(json.stocks).forEach(ticker => {
        const s = json.stocks[ticker];
        const cost = (s.qty||0) * (s.avgBuy||s.AVG||0);
        const mkt  = (s.qty||0) * (s.ltp||0);
        DATA.push({ SYM: ticker.split('.')[0].toUpperCase(),
            QTY: s.qty||0, AVG: s.avgBuy||s.AVG||0, LTP: s.ltp||0,
            SECTOR: s.sector||'Others', ROE: s.roe||0,
            COST: cost, MKT: mkt, PNL: Math.round(mkt - cost) });
    });
    renderKPIs(); renderBar(); renderTable();
}).catch(() => {});
</script>

</body>
</html>
