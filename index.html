<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
    <title>Onyx // Portfolio Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #000; --s1: #050505; --b1: #111; 
            --ac: #00f2ff; --gr: #00ff88; --rd: #ff4d6d; 
            --tx: #fff; --tx3: #444; 
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body { 
            background: var(--bg); color: var(--tx); 
            font-family: 'JetBrains Mono', monospace; 
            margin: 0; padding: 0; overflow-x: hidden; 
        }

        /* --- Header & Live Stats --- */
        header { 
            padding: 30px 20px 15px; 
            border-bottom: 1px solid var(--b1); 
            background: var(--bg); 
            position: sticky; top: 0; z-index: 100; 
        }
        
        .h-flex { display: flex; justify-content: space-between; align-items: flex-end; }
        
        h1 { 
            font-size: 22px; margin: 0; 
            color: var(--ac); letter-spacing: -1.5px; 
            font-weight: 800; text-transform: uppercase;
        }
        
        .status-indicator { 
            font-size: 9px; color: var(--gr); 
            text-transform: uppercase; letter-spacing: 1px; 
            display: flex; align-items: center; gap: 6px; margin-top: 4px; 
        }
        
        .status-indicator::before { 
            content: ''; width: 6px; height: 6px; 
            background: var(--gr); border-radius: 50%; 
            display: inline-block; box-shadow: 0 0 8px var(--gr); 
        }

        /* --- Search Infrastructure --- */
        .search-container { 
            padding: 12px 20px; 
            background: var(--s1); 
            border-bottom: 1px solid var(--b1); 
        }
        
        #search-box { 
            width: 100%; background: #080808; 
            border: 1px solid #1a1a1a; color: var(--tx); 
            padding: 12px; border-radius: 8px; 
            font-size: 14px; font-family: inherit; 
            transition: border 0.2s ease;
        }
        
        #search-box:focus { border-color: var(--ac); }

        /* --- High-Density Data Grid --- */
        main { padding-bottom: 110px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        
        table { width: 100%; border-collapse: collapse; min-width: 800px; table-layout: fixed; }
        
        th { 
            background: var(--s1); color: var(--tx3); 
            font-size: 10px; text-align: left; 
            padding: 18px 12px; position: sticky; top: 0; 
            border-bottom: 2px solid var(--b1); 
            text-transform: uppercase; cursor: pointer; z-index: 20; 
        }
        
        th:active { color: var(--ac); }
        
        td { 
            padding: 16px 12px; font-size: 13px; 
            border-bottom: 1px solid #080808; 
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; 
        }

        /* --- Dynamic Styling --- */
        .up { color: var(--gr); }
        .dn { color: var(--rd); }
        .dim { color: var(--tx3); font-size: 11px; }
        
        .sector-tag { 
            font-size: 9px; background: #111; 
            padding: 4px 8px; border-radius: 4px; 
            color: var(--ac); border: 1px solid #222; 
            font-weight: 800; text-transform: uppercase; 
        }

        /* --- PERSISTENT FOOTER (The Nexus Gateway) --- */
        footer { 
            position: fixed; bottom: 0; width: 100%; 
            background: rgba(0,0,0,0.92); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border-top: 1px solid var(--b1); 
            display: flex; justify-content: space-around; align-items: center; 
            padding: 15px 0; z-index: 1000;
            padding-bottom: calc(15px + env(safe-area-inset-bottom));
        }
        
        .nav-link { 
            text-decoration: none; color: var(--tx3); 
            display: flex; flex-direction: column; align-items: center; 
            width: 33%; transition: all 0.2s ease;
        }
        
        .nav-link.active { color: var(--ac); }
        
        .nav-link:active { transform: scale(0.9); opacity: 0.6; }
        
        .nav-label { 
            font-size: 8px; margin-top: 6px; 
            letter-spacing: 2px; font-weight: 800; 
            text-transform: uppercase; 
        }

        /* --- State Handling --- */
        #error-state { padding: 80px 20px; text-align: center; display: none; }
        
        .btn-action { 
            display: inline-block; margin-top: 25px; 
            padding: 16px 35px; background: var(--ac); 
            color: #000; border-radius: 8px; 
            text-decoration: none; font-weight: 800; font-size: 13px; 
        }
    </style>
</head>
<body>

    <header>
        <div class="h-flex">
            <div>
                <h1>ONYX TERMINAL</h1>
                <div class="status-indicator" id="engine-status">Systems Nominal</div>
            </div>
            <div style="text-align: right">
                <div id="stat-count" style="font-size: 11px; color: var(--tx3); font-weight: 800;">TOTAL: 0</div>
                <div id="stat-refresh" style="font-size: 9px; color: var(--tx3); margin-top: 4px;">REFRESH: --:--</div>
            </div>
        </div>
    </header>

    <div class="search-container">
        <input type="text" id="search-box" placeholder="SEARCH SYMBOLS OR SECTORS..." onkeyup="ui.filter()">
    </div>

    <div id="error-state">
        <div style="color: var(--tx3); font-size: 12px; letter-spacing: 1px;">DATA ENGINE DISCONNECTED</div>
        <a href="nexus.html" class="btn-action">GO TO NEXUS GATEWAY</a>
    </div>

    <main id="main-view">
        <table id="portfolio-table">
            <thead>
                <tr>
                    <th style="width: 25%;" onclick="ui.sort('sym')">Symbol</th>
                    <th style="width: 15%;" onclick="ui.sort('price')">LTP</th>
                    <th style="width: 15%;" onclick="ui.sort('chg')">Change%</th>
                    <th style="width: 20%;" onclick="ui.sort('sector')">Sector</th>
                    <th style="width: 25%;" onclick="ui.sort('roe')">ROE / PE</th>
                </tr>
            </thead>
            <tbody id="table-body">
                </tbody>
        </table>
    </main>

    <footer>
        <a href="index.html" class="nav-link active">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                <polyline points="9 22 9 12 15 12 15 22"></polyline>
            </svg>
            <span class="nav-label">Terminal</span>
        </a>
        
        <a href="nexus.html" class="nav-link">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2L2 7l10 5 10-5-10-5z"></path>
                <path d="M2 17l10 5 10-5"></path>
                <path d="M2 12l10 5 10-5"></path>
            </svg>
            <span class="nav-label">Nexus</span>
        </a>
    </footer>

    <script>
        /**
         * ONYX CORE DATA ENGINE
         * Logic: Fetch -> Sanitize (Blank Killer) -> Render -> Sort
         */
        const core = {
            master: [],
            active: [],
            async start() {
                try {
                    const response = await fetch('unified_data.json');
                    if (!response.ok) throw new Error("Fetch Failed");
                    
                    const rawJson = await response.json();
                    
                    // The Blank Killer: Ensures no nulls break the UI
                    this.master = rawJson.map(item => ({
                        sym: item.sym || '???',
                        price: parseFloat(item.price) || 0.00,
                        chg: parseFloat(item.chg) || 0.00,
                        sector: item.sector || 'OTHER',
                        roe: parseFloat(item.roe) || 0.00,
                        pe: parseFloat(item.pe) || 0.00
                    }));

                    this.active = [...this.master];
                    this.render();
                    
                    document.getElementById('stat-count').innerText = `TOTAL: ${this.master.length}`;
                    document.getElementById('stat-refresh').innerText = `REFRESH: ${new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}`;
                } catch (err) {
                    console.error("Engine Error:", err);
                    document.getElementById('main-view').style.display = 'none';
                    document.getElementById('error-state').style.display = 'block';
                    document.getElementById('engine-status').style.color = 'var(--rd)';
                    document.getElementById('engine-status').innerText = 'Sync Required';
                }
            },

            render() {
                const target = document.getElementById('table-body');
                target.innerHTML = this.active.map(row => `
                    <tr>
                        <td style="font-weight:800; color:var(--ac);">${row.sym}</td>
                        <td>${row.price.toLocaleString('en-IN', {minimumFractionDigits: 2})}</td>
                        <td class="${row.chg >= 0 ? 'up' : 'dn'}">${row.chg > 0 ? '+' : ''}${row.chg.toFixed(2)}%</td>
                        <td><span class="sector-tag">${row.sector}</span></td>
                        <td>
                            <span class="${row.roe > 15 ? 'up' : ''}">${row.roe.toFixed(1)}</span>
                            <span class="dim">/ ${row.pe.toFixed(1)}</span>
                        </td>
                    </tr>
                `).join('');
            }
        };

        const ui = {
            sortDir: 1,
            sortKey: '',
            filter() {
                const query = document.getElementById('search-box').value.toUpperCase();
                core.active = core.master.filter(i => 
                    i.sym.includes(query) || i.sector.toUpperCase().includes(query)
                );
                core.render();
            },
            sort(key) {
                if(this.sortKey === key) this.sortDir *= -1; 
                else { this.sortKey = key; this.sortDir = 1; }
                
                core.active.sort((a,b) => {
                    let valA = a[key];
                    let valB = b[key];
                    if (typeof valA === 'string') return this.sortDir * valA.localeCompare(valB);
                    return this.sortDir * (valA - valB);
                });
                core.render();
            }
        };

        window.onload = () => core.start();
    </script>
</body>
</html>
