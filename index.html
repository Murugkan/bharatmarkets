<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
    <title>Onyx | PORTFOLIO</title>
    <link rel="stylesheet" href="app-styles.css">
    <script src="app-core.js"></script>
    <style>
        .pf-table { width: 100%; border-collapse: collapse; }
        .pf-table th { text-align: left; font-size: 9px; color: var(--tx3); padding: 12px 8px; border-bottom: 2px solid var(--b1); position: sticky; top: 0; background: var(--bg); z-index: 5; }
        .pf-table td { padding: 12px 8px; border-bottom: 1px solid var(--b1); font-size: 11px; vertical-align: middle; }
        .ticker { font-weight: 800; color: var(--bl); display: block; font-size: 12px; }
        .sub { font-size: 8px; color: var(--tx3); text-transform: uppercase; }
        #sector-bar { display: flex; gap: 8px; overflow-x: auto; padding: 12px 0; -webkit-overflow-scrolling: touch; }
        .s-pill { white-space: nowrap; padding: 6px 12px; background: var(--b1); border-radius: 20px; font-size: 9px; color: var(--tx3); border: 1px solid transparent; }
        .s-pill.on { background: var(--bl); color: #000; font-weight: 800; }
    </style>
</head>
<body>

<header style="display:flex; justify-content:space-between; align-items:center; padding: 10px 0;">
    <div style="font-size:11px; font-weight:800; letter-spacing:2px; color:var(--bl);">ONYX // PORTFOLIO</div>
    <div style="display:flex; gap:8px;">
        <span class="dot" id="dot-token"></span>
        <span class="dot" id="dot-repo"></span>
    </div>
</header>

<div class="sec" style="padding:20px; background: linear-gradient(145deg, #0a0a0a, #000); border: 1px solid var(--b1);">
    <div style="font-size:8px; color:var(--tx3); text-transform:uppercase; margin-bottom:4px;">Portfolio Value</div>
    <div id="total-val" style="font-size:26px; font-weight:800; letter-spacing:-1px;">₹ 0.00</div>
    <div id="total-pnl" style="font-size:11px; font-weight:800; margin-top:8px; color:var(--gr);">+0.00% Today</div>
</div>

<div id="sector-bar">
    <div class="s-pill on" id="s-all" onclick="PF.filter('ALL')">ALL</div>
</div>

<div class="sec" style="margin-top:10px;">
    <table class="pf-table">
        <thead>
            <tr>
                <th onclick="PF.sort('sym')">ASSET</th>
                <th style="text-align:right;" onclick="PF.sort('qty')">QTY</th>
                <th style="text-align:right;" onclick="PF.sort('val')">VALUE</th>
                <th style="text-align:right;" onclick="PF.sort('pnl')">P&L</th>
            </tr>
        </thead>
        <tbody id="pf-body"></tbody>
    </table>
</div>

<nav class="footer-nav">
    <a href="data.html" class="nav-item">📂<br>DATA</a>
    <a href="index.html" class="nav-item active">📊<br>PORTFOLIO</a>
    <a href="system.html" class="nav-item">🛠️<br>SYSTEM</a>
</nav>

<script>
const PF = {
    sortKey: 'val', sortDir: -1, activeSector: 'ALL',

    async init() {
        loadState();
        if (S.settings.ghToken) {
            const data = await ghFetchRaw('symbols.json');
            if (data) SYMBOLS = migrateSymbols(data);
            const pData = await ghFetchRaw('prices.json');
            if (pData) PRICES = pData.quotes || {};
        }
        this.renderSectors();
        this.render();
        refreshPatStatus(); // From app-core.js
    },

    renderSectors() {
        const sectors = [...new Set(SYMBOLS.filter(s=>s.category==='portfolio').map(s=>s.sector||'Other'))];
        const bar = document.getElementById('sector-bar');
        sectors.forEach(s => {
            const div = document.createElement('div');
            div.className = 's-pill';
            div.innerText = s.toUpperCase();
            div.onclick = () => this.filter(s);
            bar.appendChild(div);
        });
    },

    filter(s) {
        this.activeSector = s;
        document.querySelectorAll('.s-pill').forEach(p => p.classList.toggle('on', p.innerText === s.toUpperCase()));
        if (s === 'ALL') document.getElementById('s-all').classList.add('on');
        this.render();
    },

    sort(k) {
        if (this.sortKey === k) this.sortDir *= -1;
        else { this.sortKey = k; this.sortDir = -1; }
        this.render();
    },

    render() {
        const body = document.getElementById('pf-body');
        body.innerHTML = '';
        let list = SYMBOLS.filter(s => s.category === 'portfolio');
        if (this.activeSector !== 'ALL') list = list.filter(s => (s.sector||'Other') === this.activeSector);

        list.sort((a,b) => {
            let vA = this.getVal(a), vB = this.getVal(b);
            return vA > vB ? (1 * this.sortDir) : (-1 * this.sortDir);
        });

        let total = 0;
        list.forEach(s => {
            const ltp = PRICES[s.sym]?.price || 0;
            const val = s.qty * ltp;
            total += val;
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><span class="ticker">${s.sym}</span><span class="sub">${s.name.slice(0,12)}</span></td>
                <td style="text-align:right;">${s.qty}</td>
                <td style="text-align:right;">₹${fmt(val)}</td>
                <td style="text-align:right; color:var(--gr);">+0.0%</td>
            `;
            body.appendChild(tr);
        });
        document.getElementById('total-val').innerText = `₹ ${fmt(total)}`;
    },

    getVal(s) {
        if (this.sortKey === 'sym') return s.sym;
        if (this.sortKey === 'qty') return s.qty;
        return s.qty * (PRICES[s.sym]?.price || 0);
    }
};

// Map status dot helper to app-core logic
function refreshPatStatus() {
    const setDot = (id, ok) => { const el = document.getElementById(id); if (el) el.className = 'dot ' + (ok ? 'dot-ok' : 'dot-off'); };
    setDot('dot-token', !!S.settings.ghToken);
    setDot('dot-repo', !!S.settings.ghRepo);
}

window.addEventListener('load', () => PF.init());
</script>
</body>
</html>
