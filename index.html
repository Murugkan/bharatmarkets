<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>BharatMarkets | 33-Field Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&family=Syne:wght@800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #04060f; --s1: #0a0e1a; --s2: #121a2d; --b1: #1e293b;
            --gr1: #00f2ff; --gr2: #00ff88; --rd1: #ff4d6d; --amb: #ffb100;
            --tx1: #f0f6ff; --tx3: #708499;
        }
        body { background: var(--bg); color: var(--tx1); font-family: -apple-system, sans-serif; margin: 0; padding: 0; }
        
        #debug-log { height: 60px; overflow-y: auto; background: #000; border-bottom: 1px solid var(--b1); font-family: 'JetBrains Mono'; font-size: 10px; padding: 10px; color: var(--gr1); }

        /* Scrollable Table Container */
        .bls-table-outer { width: 100%; overflow: auto; padding-bottom: 100px; height: calc(100vh - 160px); }
        .bls-t { border-collapse: collapse; font-size: 10px; font-family: 'JetBrains Mono'; white-space: nowrap; min-width: 100%; }
        
        /* Sticky Headers */
        .bls-t th { 
            background: var(--s1); color: var(--tx3); padding: 12px 15px; 
            text-align: left; border: 1px solid var(--b1); position: sticky; top: 0; z-index: 10; 
            text-transform: uppercase; font-size: 9px;
        }
        .bls-t td { padding: 10px 15px; border: 1px solid #182840; color: #fff; }
        
        /* Highlight the Ticker Column */
        .sticky-col { position: sticky; left: 0; background: var(--s2) !important; z-index: 5; border-right: 2px solid var(--gr1) !important; }

        .badge { padding: 2px 5px; border-radius: 3px; font-weight: 700; }
        .pos { color: var(--gr2); }
        .neg { color: var(--rd1); }

        #nav { position: fixed; bottom: 0; width: 100%; background: var(--s1); display: flex; border-top: 1px solid var(--b1); padding-bottom: env(safe-area-inset-bottom); }
        .nb { flex: 1; background: none; border: none; color: var(--tx3); padding: 18px 0; font-size: 10px; font-weight: 700; text-transform: uppercase; }
        .nb.active { color: var(--gr1); border-top: 2px solid var(--gr1); }
        .btn-sync { background: var(--gr1) !important; color: #000 !important; font-weight: 900; }
    </style>
</head>
<body onload="init()">

    <div id="debug-log">V1.5: Dynamic Field Discovery Active.</div>
    <div id="content"></div>

    <nav id="nav">
        <button class="nb active" onclick="showTab('portfolio', this)">Full Portfolio</button>
        <button class="nb" onclick="showTab('import', this)">Import</button>
        <button class="nb btn-sync" onclick="flattenAndSync()">SYNC ALL FIELDS</button>
    </nav>

    <script src="app-engine.js"></script>
    <script>
        let curTab = 'portfolio';

        async function flattenAndSync() {
            try {
                const response = await fetch('fundamentals.json');
                const data = await response.json();
                const db = await initEngineDB();
                const tx = db.transaction('UnifiedStocks', 'readwrite');
                const store = tx.objectStore('UnifiedStocks');
                const holdings = await new Promise(r => { store.getAll().onsuccess = (e) => r(e.target.result || []); });

                holdings.forEach(h => {
                    const f = data.stocks[h.sym] || {};
                    // This creates the "FLAT" object with every single field from JSON
                    store.put({ ...h, ...f, pnl: Math.round((h.qty * (f.ltp || 0)) - (h.qty * h.avgBuy)) });
                });

                tx.oncomplete = () => { document.getElementById('debug-log').innerHTML = "> SYNC COMPLETE: 33+ Fields Flat."; render(); };
            } catch (e) { console.error(e); }
        }

        async function renderPortfolio(container) {
            const db = await initEngineDB();
            const stocks = await new Promise(r => {
                const tx = db.transaction('UnifiedStocks', 'readonly');
                tx.objectStore('UnifiedStocks').getAll().onsuccess = (e) => r(e.target.result || []);
            });

            if (!stocks.length) return container.innerHTML = "<div style='padding:50px'>No data. Import Symbols & Sync.</div>";

            // 1. DYNAMIC FIELD DISCOVERY
            // We collect every key that exists in ANY stock record
            const keySet = new Set(['sym', 'ltp', 'pnl', 'roe', 'opm_pct', 'debt_eq']); // Priority keys first
            stocks.forEach(s => Object.keys(s).forEach(k => {
                if(!['qty', 'avgBuy', 'quarterly'].includes(k)) keySet.add(k);
            }));
            const allKeys = Array.from(keySet);

            // 2. BUILD DYNAMIC HEADER
            let html = `<div class="bls-table-outer"><table class="bls-t"><thead><tr>`;
            allKeys.forEach(k => {
                const isSticky = k === 'sym' ? 'class="sticky-col"' : '';
                html += `<th ${isSticky}>${k.replace('_', ' ')}</th>`;
            });
            html += `</tr></thead><tbody>`;

            // 3. BUILD DYNAMIC ROWS
            stocks.forEach(s => {
                html += `<tr>`;
                allKeys.forEach(k => {
                    const isSticky = k === 'sym' ? 'class="sticky-col"' : '';
                    let val = s[k] !== undefined ? s[k] : '—';
                    
                    // Add some basic coloring for common fields
                    let style = "";
                    if (k === 'pnl') style = val >= 0 ? 'class="pos"' : 'class="neg"';
                    if (k === 'roe' && val > 15) style = 'style="color:var(--gr2)"';
                    
                    html += `<td ${isSticky} ${style}>${val}</td>`;
                });
                html += `</tr>`;
            });
            
            container.innerHTML = html + `</tbody></table></div>`;
        }

        function showTab(t, btn) {
            curTab = t;
            document.querySelectorAll('.nb').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            render();
        }

        function render() {
            const c = document.getElementById('content');
            if (curTab === 'import') {
                c.innerHTML = `<div style="padding:20px"><textarea id="import-area" style="width:100%;height:150px;background:#121a2d;color:#fff;padding:10px" placeholder="TICKER QTY AVG"></textarea><button class="nb btn-sync" style="width:100%;margin-top:10px" onclick="processImport()">SAVE</button></div>`;
            } else {
                renderPortfolio(c);
            }
        }

        async function processImport() {
            const text = document.getElementById('import-area').value;
            const db = await initEngineDB();
            const tx = db.transaction('UnifiedStocks', 'readwrite');
            const store = tx.objectStore('UnifiedStocks');
            text.trim().split('\n').forEach(line => {
                const p = line.split(/\s+/);
                if (p.length >= 3) store.put({ sym: p[0].toUpperCase(), qty: parseFloat(p[1]), avgBuy: parseFloat(p[2]) });
            });
            tx.oncomplete = () => { showTab('portfolio', document.querySelector('.nb')); };
        }

        function init() { render(); }
    </script>
</body>
</html>
