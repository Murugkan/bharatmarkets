<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>BharatMarkets | Tape Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
    <style>
        :root{--bg:#000;--s1:#0a0a0a;--b1:#222;--bl:#00f2ff;--gr:#064e3b;--rd:#7f1d1d;}
        *{box-sizing:border-box;margin:0;padding:0;}
        body{background:var(--bg);color:#fff;font-family:'JetBrains Mono',monospace;}
        header{background:var(--s1);border-bottom:1px solid var(--b1);padding:10px 12px;display:flex;justify-content:space-around;}
        .kpi-box{text-align:center;}
        .kpi-label{font-size:8px;color:#666;text-transform:uppercase;}
        .kpi-val{font-size:14px;font-weight:800;margin-top:2px;}
        #bar-wrap{padding:10px;background:#111;border-bottom:1px solid var(--b1);}
        #tape-bar{width:100%;height:36px;border-radius:4px;overflow:hidden;display:flex;}
        .seg{height:100%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:800;color:#000;overflow:hidden;white-space:nowrap;}
        .seg.dimmed{opacity:0.2;}
        #legend{display:flex;flex-wrap:wrap;gap:6px 12px;padding:6px 10px;border-bottom:1px solid var(--b1);}
        .leg{display:flex;align-items:center;gap:5px;font-size:9px;color:#888;cursor:pointer;}
        .leg.on{color:#fff;}
        .dot{width:8px;height:8px;border-radius:2px;}
        #active-label{font-size:9px;color:#555;padding:3px 10px;border-bottom:1px solid #111;min-height:18px;}
        #active-label span{color:var(--bl);font-weight:800;}
        #loading{padding:40px;text-align:center;font-size:11px;color:#444;}
        .view{overflow:auto;height:calc(100vh - 200px);}
        table{width:100%;border-collapse:collapse;font-size:11px;white-space:nowrap;}
        th{background:var(--s1);color:#666;padding:10px 12px;position:sticky;top:0;z-index:9;border-bottom:1px solid var(--b1);text-align:left;}
        td{padding:10px 12px;border-bottom:1px solid #111;}
        .pin{position:sticky;left:0;background:#111;border-right:1px solid var(--b1);color:var(--bl);font-weight:800;z-index:5;}
        .pos{background:var(--gr);}
        .neg{background:var(--rd);}
    </style>
</head>
<body>
    <header>
        <div class="kpi-box"><div class="kpi-label">Invested</div><div class="kpi-val" id="ki">—</div></div>
        <div class="kpi-box"><div class="kpi-label">Mkt Value</div><div class="kpi-val" id="kv">—</div></div>
        <div class="kpi-box"><div class="kpi-label">Total P&L</div><div class="kpi-val" id="kp">—</div></div>
    </header>
    <div id="bar-wrap"><div id="tape-bar"></div></div>
    <div id="legend"></div>
    <div id="active-label">&nbsp;</div>
    <div class="view"><div id="app"><div id="loading">Loading…</div></div></div>

<script>
const PALETTE = ['#00f2ff','#7000ff','#ff007a','#ffb800','#00ff88','#007aff','#ff4d6d'];
const FIELDS  = ['SYM','QTY','AVG','LTP','PNL','ROE','SECTOR'];
let DATA = [], SECTORS = [], COL = {}, filter = null;

function fmt(n){ return `₹${(n/100000).toFixed(2)}L`; }
function tap(sec){ filter = filter===sec ? null : sec; render(); }
function status(msg){ document.getElementById('loading').textContent = msg; }

// ── Auto-detect DB name and store name ───────────────────────────────────────
async function findDB() {
    // list all databases the browser knows about
    const dbs = await indexedDB.databases();
    status('Found DBs: ' + dbs.map(d=>d.name).join(', '));

    for (const info of dbs) {
        const db = await new Promise((res,rej) => {
            const r = indexedDB.open(info.name);
            r.onsuccess = () => res(r.result);
            r.onerror   = () => rej(r.error);
        });
        const stores = Array.from(db.objectStoreNames);
        // try every store, return first one that has rows with a SYM field
        for (const store of stores) {
            try {
                const rows = await new Promise((res,rej) => {
                    const tx  = db.transaction(store, 'readonly');
                    const req = tx.objectStore(store).getAll();
                    req.onsuccess = () => res(req.result);
                    req.onerror   = () => rej(req.error);
                });
                if (rows.length > 0 && rows[0].SYM !== undefined) {
                    return { db, store, rows };
                }
            } catch(e) { /* skip */ }
        }
        db.close();
    }
    return null;
}

findDB().then(result => {
    if (!result) {
        status('No portfolio data found in any IndexedDB. DBs checked: see above.');
        return;
    }
    const { rows } = result;
    DATA    = rows;
    SECTORS = [...new Set(DATA.map(s=>s.SECTOR))];
    SECTORS.forEach((s,i) => COL[s] = PALETTE[i % PALETTE.length]);
    render();
}).catch(err => {
    status('Error: ' + err);
});

function render() {
    // KPIs
    let tI=0,tM=0,tP=0;
    DATA.forEach(s=>{ tI+=s.COST; tM+=s.MKT; tP+=s.PNL; });
    document.getElementById('ki').textContent = fmt(tI);
    document.getElementById('kv').textContent = fmt(tM);
    const kp = document.getElementById('kp');
    kp.textContent = fmt(tP);
    kp.style.color = tP>=0 ? '#00ff88' : '#ff4d6d';

    // Bar
    const sc={};
    DATA.forEach(s=>{ sc[s.SECTOR]=(sc[s.SECTOR]||0)+s.COST; });
    const total = Object.values(sc).reduce((a,b)=>a+b,0);
    document.getElementById('tape-bar').innerHTML = SECTORS.map(sec=>{
        const pct = (sc[sec]/total*100).toFixed(2);
        const dim = filter && filter!==sec ? ' dimmed':'';
        return `<div class="seg${dim}" style="width:${pct}%;background:${COL[sec]}"
                     onclick="tap('${sec}')">${pct>9?sec:''}</div>`;
    }).join('');

    // Legend
    document.getElementById('legend').innerHTML = SECTORS.map(sec=>
        `<div class="leg ${filter===sec?'on':''}" onclick="tap('${sec}')">
            <div class="dot" style="background:${COL[sec]}"></div>${sec}</div>`
    ).join('');

    // Active label
    document.getElementById('active-label').innerHTML =
        filter ? `Sector: <span>${filter}</span> — tap again to clear` : '&nbsp;';

    // Table
    const rows = filter ? DATA.filter(s=>s.SECTOR===filter) : DATA;
    let h = `<table><thead><tr>`
        + FIELDS.map(f=>`<th${f==='SYM'?' class="pin"':''}>${f}</th>`).join('')
        + `</tr></thead><tbody>`;
    rows.forEach(s=>{
        h += `<tr>` + FIELDS.map(f=>{
            const v = s[f]??'—';
            const c = f==='SYM'?'pin':f==='PNL'?(v>=0?'pos':'neg'):'';
            return `<td${c?` class="${c}"`:''}>${v}${f==='ROE'?'%':''}</td>`;
        }).join('') + `</tr>`;
    });
    document.getElementById('app').innerHTML = h + `</tbody></table>`;
}
</script>

</body>
</html>
