<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>BharatMarkets Pro | Nested Sync Fix</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #04060f; --s1: #0a0e1a; --s2: #121a2d; --b1: #1e293b;
            --gr1: #00f2ff; --gr2: #00e896; --rd1: #ff4d6d; --tx1: #f0f6ff; --tx3: #708499;
        }
        body { background: var(--bg); color: var(--tx1); font-family: -apple-system, sans-serif; margin: 0; padding: 0; }
        #debug-log { height: 120px; overflow-y: auto; background: #000; border-bottom: 2px solid var(--gr1); font-family: 'JetBrains Mono'; font-size: 11px; padding: 15px; color: var(--gr1); }
        .bls-table-outer { width: 100%; overflow: auto; padding-bottom: 100px; height: calc(100vh - 270px); }
        .bls-t { border-collapse: collapse; font-size: 10px; font-family: 'JetBrains Mono'; white-space: nowrap; width: 100%; }
        .bls-t th { background: #16213e; color: var(--gr1); padding: 12px 15px; text-align: left; border: 1px solid var(--b1); position: sticky; top: 0; z-index: 10; }
        .bls-t td { padding: 10px 15px; border: 1px solid #182840; color: #fff; }
        #nav { position: fixed; bottom: 0; width: 100%; background: var(--s1); display: flex; border-top: 1px solid var(--b1); padding-bottom: env(safe-area-inset-bottom); }
        .nb { flex: 1; background: none; border: none; color: var(--tx3); padding: 18px 0; font-size: 10px; font-weight: 700; text-transform: uppercase; cursor: pointer; }
        .nb.active { color: var(--gr1); border-top: 2px solid var(--gr1); }
        .btn-sync { background: var(--gr2) !important; color: #000 !important; font-weight: 900; }
    </style>
</head>
<body onload="init()">

    <div id="debug-log">V1.3: READY. Logic adjusted for 'stocks' header.</div>
    <div id="content"></div>

    <nav id="nav">
        <button class="nb active" onclick="showTab('portfolio', this)">Portfolio</button>
        <button class="nb" onclick="showTab('raw', this)">33 Fields View</button>
        <button class="nb" onclick="showTab('import', this)">Import</button>
        <button class="nb btn-sync" onclick="bakeAllFields()">FULL BAKE</button>
    </nav>

    <script src="app-engine.js"></script>
    <script>
        let curTab = 'portfolio';

        function log(msg) {
            const l = document.getElementById('debug-log');
            l.innerHTML = `<div>> ${msg}</div>` + l.innerHTML;
        }

        // SPECIFIC FIX: Your JSON puts everything inside ["stocks"]
        function findDataInJson(data, ticker) {
            if (!data) return null;
            if (data.stocks && data.stocks[ticker]) return data.stocks[ticker]; 
            if (data[ticker]) return data[ticker];
            return null;
        }

        async function bakeAllFields() {
            log("STARTING NESTED SYNC...");
            try {
                const [fRaw, pRaw, sMaster, sMap] = await Promise.all([
                    fetch('fundamentals.json').then(r => r.json()),
                    fetch('prices.json').then(r => r.json()),
                    fetch('symbols.json').then(r => r.json()),
                    fetch('symbol_map.json').then(r => r.json())
                ]);

                const db = await initEngineDB();
                const tx = db.transaction('UnifiedStocks', 'readwrite');
                const store = tx.objectStore('UnifiedStocks');
                
                const holdings = await new Promise(r => {
                    store.getAll().onsuccess = (e) => r(e.target.result || []);
                });

                let successCount = 0;
                holdings.forEach(h => {
                    const mappedSym = sMap.overrides[h.sym] || h.sym;
                    const cleanKey = mappedSym.split('.')[0];
                    const variants = [mappedSym, cleanKey, h.sym];

                    let fEntry = null;
                    for (let v of variants) {
                        const found = findDataInJson(fRaw, v);
                        if (found) { fEntry = found; break; }
                    }

                    const m = sMaster.find(item => item.sym === h.sym || item.sym === cleanKey) || {};

                    const baked = {
                        ...h,
                        ...m,
                        ...fEntry, // This now spreads all 33 fields from your file
                        sym: mappedSym,
                        sync_status: fEntry ? "OK" : "MISSING"
                    };

                    if (fEntry) successCount++;
                    store.put(baked);
                });

                tx.oncomplete = () => {
                    log(`SUCCESS: ${successCount} stocks baked. Header 'stocks' detected.`);
                    render();
                };
            } catch (e) {
                log("FETCH ERROR. Check file placement.");
            }
        }

        async function renderRaw(container) {
            const db = await initEngineDB();
            const stocks = await new Promise(r => {
                const tx = db.transaction('UnifiedStocks', 'readonly');
                tx.objectStore('UnifiedStocks').getAll().onsuccess = (e) => r(e.target.result || []);
            });

            if (!stocks.length) return container.innerHTML = "<div style='padding:50px'>No data.</div>";

            const allKeys = new Set();
            stocks.forEach(s => Object.keys(s).forEach(k => allKeys.add(k)));
            const keys = Array.from(allKeys);

            let h = `<div class="bls-table-outer"><table class="bls-t"><thead><tr>`;
            keys.forEach(k => h += `<th>${k}</th>`);
            h += `</tr></thead><tbody>`;

            stocks.forEach(s => {
                h += `<tr>`;
                keys.forEach(k => {
                    let val = s[k];
                    if (k === 'quarterly') val = "[Array]";
                    h += `<td>${val !== undefined ? val : '—'}</td>`;
                });
                h += `</tr>`;
            });
            container.innerHTML = h + `</tbody></table></div>`;
        }

        async function renderPortfolio(container) {
            const db = await initEngineDB();
            const stocks = await new Promise(r => {
                const tx = db.transaction('UnifiedStocks', 'readonly');
                tx.objectStore('UnifiedStocks').getAll().onsuccess = (e) => r(e.target.result || []);
            });

            let h = `<div class="bls-table-outer"><table class="bls-t"><thead><tr>
                <th>Ticker</th><th>Sector</th><th>ROE%</th><th>OPM%</th><th>Debt/Eq</th>
            </tr></thead><tbody>`;

            stocks.forEach(s => {
                h += `<tr>
                    <td><strong>${s.sym}</strong></td>
                    <td>${s.sector || '—'}</td>
                    <td>${s.roe || '—'}</td>
                    <td>${s.opm_pct || '—'}</td>
                    <td>${s.debt_eq || '—'}</td>
                </tr>`;
            });
            container.innerHTML = h + `</tbody></table></div>`;
        }

        function showTab(t, btn) {
            curTab = t;
            document.querySelectorAll('.nb').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            render();
        }

        function render() {
            const c = document.getElementById('content');
            if (curTab === 'import') {
                c.innerHTML = `<div style="padding:20px"><textarea id="import-area" style="width:100%;height:150px;background:#121a2d;color:#fff;padding:10px" placeholder="OLECTRA 10 1000"></textarea><button class="nb btn-sync" style="width:100%;margin-top:10px;border-radius:8px" onclick="processImport()">SAVE</button></div>`;
            } else if (curTab === 'raw') {
                renderRaw(c);
            } else {
                renderPortfolio(c);
            }
        }

        async function processImport() {
            const text = document.getElementById('import-area').value;
            const db = await initEngineDB();
            const tx = db.transaction('UnifiedStocks', 'readwrite');
            const store = tx.objectStore('UnifiedStocks');
            text.trim().split('\n').forEach(line => {
                const p = line.split(/\s+/);
                if (p.length >= 3) store.put({ sym: p[0].toUpperCase(), qty: parseFloat(p[1]), avgBuy: parseFloat(p[2]) });
            });
            tx.oncomplete = () => { log("Saved. Click FULL BAKE."); showTab('portfolio', document.querySelector('.nb')); };
        }

        function init() { render(); }
    </script>
</body>
</html>
