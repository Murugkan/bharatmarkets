<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black"/>
<meta name="theme-color" content="#04060d"/>
<title>BharatMarkets Pro</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
/* ═══════════════════════════════════════════
   FIX #1: HIGH CONTRAST DARK THEME
═══════════════════════════════════════════ */
:root{
  --bg:#02040a;
  --s1:#070c18;
  --s2:#0d1525;
  --card:#111d30;
  --b1:#182840;
  --b2:#1e3350;
  --b3:#263d5c;
  --tx1:#ffffff;
  --tx2:#d1dce5;
  --tx3:#899fb3;
  --gr1:#00ff88;
  --gr2:#22c55e;
  --rd1:#ff4b4b;
  --rd2:#ef4444;
  --yw1:#ffd700;
  --yw2:#f59e0b;
}

/* ═══════════════════════════════════════════
   ENGINE DASHBOARD: SWIPE UI
═══════════════════════════════════════════ */
.swipe-wrap {
  position: relative;
  overflow: hidden;
  background: var(--rd2); 
  border-radius: 12px;
  margin: 6px 12px;
  user-select: none;
  touch-action: pan-y;
}

.engine-row {
  position: relative;
  background: var(--s2); 
  z-index: 2;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 16px;
  border: 1px solid var(--b1);
  border-radius: 12px;
  transition: transform 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28);
  will-change: transform;
}

.delete-underlay {
  position: absolute;
  right: 0;
  top: 0;
  bottom: 0;
  width: 90px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 1;
}

.delete-text {
  color: #fff;
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.sig-badge {
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 10px;
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700;
  background: var(--b3);
  color: var(--tx2);
}

.sig-buy  { background: var(--gr2); color: #000; }
.sig-sell { background: var(--rd2); color: #fff; }

/* ═══════════════════════════════════════════
   CORE APP LAYOUT
═══════════════════════════════════════════ */
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{
  margin:0; background:var(--bg); color:var(--tx1);
  font-family:'DM Sans',sans-serif; font-size:14px;
  line-height:1.5; overscroll-behavior:none;
}
#app{display:flex;flex-direction:column;height:100vh;overflow:hidden;}
#header{
  padding:16px 16px 12px; background:var(--s1); 
  border-bottom:1px solid var(--b1); flex-shrink:0;
}
#content{flex:1;overflow-y:auto;padding-bottom:100px;}

/* TAB NAV */
#nav{
  position:fixed;bottom:0;left:0;right:0;height:72px;
  background:rgba(7,12,24,0.9);backdrop-filter:blur(15px);
  display:flex;justify-content:space-around;align-items:center;
  border-top:1px solid var(--b1);z-index:100;padding-bottom:env(safe-area-inset-bottom);
}
.nb{
  background:none;border:none;color:var(--tx3);display:flex;
  flex-direction:column;align-items:center;gap:4px;font-size:10px;
  font-weight:600;width:16%;transition:0.2s;
}
.nb.active{color:var(--yw1);}
.nb-ico{font-size:20px;margin-bottom:2px;}

/* OVERLAYS */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:900;display:none;backdrop-filter:blur(4px);}
.bottom-panel{
  position:fixed;bottom:0;left:0;right:0;background:var(--s1);
  border-radius:24px 24px 0 0;z-index:950;transform:translateY(100%);
  transition:transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  max-height:90vh;display:flex;flex-direction:column;border-top:1px solid var(--b2);
}
.bottom-panel.open{transform:translateY(0);}
#toast{
  position:fixed;top:24px;left:50%;transform:translateX(-50%);
  background:var(--card);border:1px solid var(--b2);padding:10px 20px;
  border-radius:12px;z-index:2000;display:none;font-weight:600;
  box-shadow:0 10px 30px rgba(0,0,0,0.5);
}
</style>
</head>
<body>

<div id="app">
  <div id="header">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div style="font-family:'Syne',sans-serif;font-weight:800;font-size:18px;letter-spacing:-0.5px">
        BHARAT<span style="color:var(--yw1)">MARKETS</span> <span style="font-size:10px;background:var(--b2);padding:2px 6px;border-radius:4px;vertical-align:middle;margin-left:4px">PRO</span>
      </div>
      <div id="top-actions" style="display:flex;gap:12px"></div>
    </div>
    <div id="sub-header" style="margin-top:12px"></div>
  </div>

  <div id="content"></div>
</div>

<div id="nav">
  <button class="nb active" onclick="showTab('portfolio',this)">
    <span class="nb-ico">💼</span>Portfolio
  </button>
  <button class="nb" onclick="showTab('watchlist',this)">
    <span class="nb-ico">👁</span>Watchlist
  </button>
  <button class="nb" onclick="showTab('macro',this)">
    <span class="nb-ico">🌐</span>Macro
  </button>
  <button class="nb" onclick="showTab('movers',this)">
    <span class="nb-ico">⚡</span>Movers
  </button>
  <button class="nb" onclick="showTab('analysis',this)">
    <span class="nb-ico">🔬</span>Analysis
  </button>
  <button class="nb" onclick="showTab('upload',this)">
    <span class="nb-ico">⬆</span>Upload
  </button>
</div>

<div class="overlay" id="ov" onclick="closePanel()"></div>
<div class="bottom-panel" id="import-panel">
  <div class="panel-handle" style="width:40px;height:4px;background:var(--b3);border-radius:2px;margin:12px auto 8px"></div>
  <div class="panel-head" style="padding:0 16px 12px;display:flex;justify-content:space-between;align-items:center">
    <span class="panel-title" style="font-family:'Syne',sans-serif;font-weight:700">📂 Import Portfolio</span>
    <button onclick="closePanel()" style="background:none;border:none;color:var(--tx3);font-size:20px">✕</button>
  </div>
  <div class="panel-body" id="import-panel-body" style="flex:1;overflow-y:auto;padding:0 16px 24px"></div>
</div>

<div id="toast"></div>

<script src="app-core.js"></script>
<script src="app-import.js"></script>
<script src="app-portfolio.js"></script>
<script src="app-watchlist.js"></script>
<script src="app-drill.js"></script>
<script src="app-analysis.js"></script>
<script src="app-settings.js"></script>

<script src="app-engine.js"></script> 

<script src="app-boot.js"></script>

</body>
</html>
