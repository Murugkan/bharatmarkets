<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>BharatMarkets | Unified Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&family=Syne:wght@800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #04060f; --s1: #0a0e1a; --s2: #121a2d; --b1: #1e293b;
            --gr1: #00f2ff; --gr2: #00ff88; --rd1: #ff4d6d; --amb: #ffb100;
            --tx1: #f0f6ff; --tx3: #708499;
        }
        body { background: var(--bg); color: var(--tx1); font-family: -apple-system, sans-serif; margin: 0; padding: 0; }
        
        /* Terminal Console */
        #console { height: 60px; background: #000; border-bottom: 1px solid var(--b1); font-family: 'JetBrains Mono'; font-size: 10px; padding: 12px; color: var(--gr1); overflow-y: auto; }

        /* Unified Table Styles */
        .table-outer { width: 100%; overflow: auto; height: calc(100vh - 140px); }
        table { width: 100%; border-collapse: collapse; font-family: 'JetBrains Mono'; font-size: 11px; white-space: nowrap; }
        th { background: var(--s1); color: var(--tx3); padding: 12px; position: sticky; top: 0; z-index: 10; border-bottom: 1px solid var(--b1); text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #182840; }
        
        .sticky-sym { position: sticky; left: 0; background: var(--s2) !important; z-index: 5; border-right: 2px solid var(--gr1); font-weight: 700; color: var(--gr1); }

        /* Nav */
        nav { position: fixed; bottom: 0; width: 100%; display: flex; background: var(--s1); border-top: 1px solid var(--b1); padding-bottom: env(safe-area-inset-bottom); }
        .nb { flex: 1; padding: 18px 0; border: none; background: none; color: var(--tx3); font-size: 10px; font-weight: 700; text-transform: uppercase; cursor: pointer; }
        .nb.active { color: var(--gr1); border-top: 2px solid var(--gr1); }
        .btn-sync { background: var(--gr1) !important; color: #000 !important; }
    </style>
</head>
<body onload="init()">

    <div id="console">> READY. UNIFIED NAME RESOLUTION ACTIVE.</div>
    <div id="app"></div>

    <nav>
        <button class="nb active" onclick="setView('portfolio', this)">Portfolio</button>
        <button class="nb" onclick="setView('import', this)">Import</button>
        <button class="nb btn-sync" onclick="unifiedSync()">SYNC & FLATTEN</button>
    </nav>

    <script>
        const DB_NAME = "BharatMarkets_v2";
        const STORE_NAME = "UnifiedStore";
        let currentView = 'portfolio';

        function log(m) { const c = document.getElementById('console'); c.innerHTML = `<div>> ${m}</div>` + c.innerHTML; }

        // DB Core
        function openDB() {
            return new Promise((res) => {
                const req = indexedDB.open(DB_NAME, 1);
                req.onupgradeneeded = (e) => e.target.result.createObjectStore(STORE_NAME, { keyPath: "sym" });
                req.onsuccess = () => res(req.result);
            });
        }

        // UNIFIED SYNC: Resolves name and structure BEFORE saving
        async function unifiedSync() {
            log("Fetching Fundamentals...");
            try {
                const res = await fetch('fundamentals.json');
                const raw = await res.json();
                
                const db = await openDB();
                const tx = db.transaction(STORE_NAME, "readwrite");
                const store = tx.objectStore(STORE_NAME);

                // Get current user holdings (Qty/Avg)
                const holdings = await new Promise(r => store.getAll().onsuccess = e => r(e.target.result));

                if (holdings.length === 0) return log("ABORT: No holdings. Import symbols first.");

                holdings.forEach(h => {
                    // RESOLUTION: Drill into .stocks[sym] to flatten the structure
                    const webData = raw.stocks[h.sym] || {};
                    
                    // UNIFIED RECORD: Merge everything into one level
                    const unifiedRecord = {
                        ...h,        // Personal: qty, avgBuy
                        ...webData,  // Web: ltp, roe, pe, opm_pct, debt_eq, etc.
                        pnl: Math.round((h.qty * (webData.ltp || 0)) - (h.qty * h.avgBuy)),
                        sync_ts: new Date().toLocaleTimeString()
                    };

                    store.put(unifiedRecord);
                });

                tx.oncomplete = () => { log("SUCCESS: 33+ Fields Unified & Flattened."); render(); };
            } catch (e) { log("Error: Check JSON file path."); }
        }

        async function renderPortfolio() {
            const db = await openDB();
            const stocks = await new Promise(r => db.transaction(STORE_NAME).objectStore(STORE_NAME).getAll().onsuccess = e => r(e.target.result));
            const container = document.getElementById('app');

            if (!stocks.length) return container.innerHTML = "<div style='padding:40px'>Nothing here. Import symbols.</div>";

            // DYNAMIC DISCOVERY: Identify all 33+ fields
            const allKeys = new Set(['sym', 'ltp', 'pnl', 'roe', 'opm_pct', 'debt_eq']);
            stocks.forEach(s => Object.keys(s).forEach(k => {
                if(!['quarterly', 'qty', 'avgBuy', 'sync_ts'].includes(k)) allKeys.add(k);
            }));
            const keys = Array.from(allKeys);

            let html = `<div class="table-outer"><table><thead><tr>`;
            keys.forEach(k => html += `<th class="${k==='sym'?'sticky-sym':''}">${k.toUpperCase()}</th>`);
            html += `</tr></thead><tbody>`;

            stocks.forEach(s => {
                html += `<tr>`;
                keys.forEach(k => {
                    const val = s[k] !== undefined ? s[k] : '—';
                    html += `<td class="${k==='sym'?'sticky-sym':''}">${val}</td>`;
                });
                html += `</tr>`;
            });
            container.innerHTML = html + `</tbody></table></div>`;
        }

        function setView(v, btn) {
            currentView = v;
            document.querySelectorAll('.nb').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            render();
        }

        function render() {
            const app = document.getElementById('app');
            if (currentView === 'import') {
                app.innerHTML = `<div style="padding:20px">
                    <textarea id="imp" style="width:100%;height:150px;background:#121a2d;color:#fff;padding:10px" placeholder="TICKER QTY AVG"></textarea>
                    <button class="nb btn-sync" style="width:100%;margin-top:10px;border-radius:8px" onclick="doImport()">SAVE SYMBOLS</button>
                </div>`;
            } else { renderPortfolio(); }
        }

        async function doImport() {
            const txt = document.getElementById('imp').value.trim();
            const db = await openDB();
            const tx = db.transaction(STORE_NAME, "readwrite");
            const store = tx.objectStore(STORE_NAME);
            txt.split('\n').forEach(l => {
                const [s, q, a] = l.split(/\s+/);
                if(s) store.put({ sym: s.toUpperCase(), qty: parseFloat(q)||0, avgBuy: parseFloat(a)||0 });
            });
            tx.oncomplete = () => { log("Holdings Saved. Click Sync."); setView('portfolio', document.querySelector('.nb')); };
        }

        function init() { render(); }
    </script>
</body>
</html>
