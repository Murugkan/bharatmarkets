<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
    <title>Onyx | Pro Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg:#000; --s1:#0a0a0a; --b1:#222; --bl:#00f2ff; --gr:#00ff88; --rd:#ff4d6d; --tx:#fff; }
        *{box-sizing:border-box;margin:0;padding:0;}
        body { background:var(--bg); color:var(--tx); font-family:'JetBrains Mono',monospace; overflow:hidden; -webkit-text-size-adjust:100%; display:flex; flex-direction:column; height:100vh; }
        header { background:var(--s1); border-bottom:1px solid var(--b1); padding:8px; display:flex; justify-content:space-around; flex-shrink:0; }
        .kpi-box { text-align:center; }
        .kpi-label { font-size:8px; color:#666; text-transform:uppercase; letter-spacing:1px; }
        .kpi-val { font-size:14px; font-weight:800; margin-top:1px; color:var(--bl); }
        #bar-wrap { padding:8px; background:#0a0a0a; border-bottom:2px solid #00ff88; flex-shrink:0; }
        #tape-bar { width:100%; height:32px; border-radius:4px; overflow:hidden; display:flex; background:#050505; }
        .seg { height:100%; cursor:pointer; flex-shrink:0; border-right:1px solid rgba(0,255,136,0.3); transition: all 0.3s; filter: brightness(1); }
        .seg.dimmed { opacity: 0.2; filter: brightness(0.5); }
        #legend { display:flex; flex-wrap:wrap; gap:6px 12px; padding:10px; border-bottom:2px solid #00f2ff; background:#000; max-height:50px; overflow-y:auto; flex-shrink:0; }
        .leg { display:flex; align-items:center; gap:6px; font-size:9px; color:#fff; cursor:pointer; font-weight:400; }
        .leg.on { font-weight:800; }
        .dot { width:8px; height:8px; border-radius:2px; }
        .view { flex:1; overflow-y:auto; overflow-x:auto; background:#000; -webkit-overflow-scrolling:touch; }
        table { width:100%; border-collapse:collapse; font-size:10px; white-space:nowrap; }
        th { background:var(--s1); color:#666; padding:6px; position:sticky; top:0; z-index:10; border-bottom:2px solid var(--b1); text-align:left; cursor: pointer; }
        th.active { color: var(--bl); }
        td { padding:6px; border-bottom:1px solid #111; }
        tfoot td { background: var(--s1); font-weight: 800; color: var(--tx); border-top: 2px solid var(--b1); }
        .sticky { position:sticky; left:0; background:#0a0a0a!important; z-index:5; border-right:1px solid var(--b1); color:var(--bl)!important; }
        .pos { background:#00ff88!important; color:#000!important; }
        .neg { background:#ff6b85!important; color:#fff!important; }
        .sig-buy { color:#00ff88; font-weight:800; border:1px solid #00ff88; padding:2px 4px; border-radius:2px; font-size:9px; }
        #status { padding:40px; font-size:11px; color:var(--bl); text-align:center; position:absolute; width:100%; top:200px; }
        footer { position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); border-top: 1px solid var(--b1); display: flex; justify-content: space-around; padding: 6px 0; padding-bottom: calc(6px + env(safe-area-inset-bottom)); z-index: 1000; flex-shrink:0; }
        .nav-btn { text-decoration: none; color: #666; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 33%; padding: 4px 0; transition: color 0.2s; }
        .nav-btn svg { display: none; }
        .nav-btn:hover { color: var(--bl); }
        .nav-btn.active { color: var(--bl); font-weight: 800; }
        .nav-label { font-size: 7px; margin-top: 2px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; }
    </style>
</head>
<body>

<header>
    <div class="kpi-box"><div class="kpi-label">Portfolio</div><div class="kpi-val" id="k-pval">₹0</div></div>
    <div class="kpi-box"><div class="kpi-label">Invested</div><div class="kpi-val" id="k-inv">₹0</div></div>
    <div class="kpi-box"><div class="kpi-label">Total P&L</div><div class="kpi-val" id="k-pnl">—</div></div>
    <div class="kpi-box"><div class="kpi-label">Today</div><div class="kpi-val" id="k-today" style="display:flex; align-items:center; gap:6px;"><span id="k-today-val">₹0</span><span style="color:#00ff88; font-size:9px; font-weight:bold;" id="k-today-pos">↑0</span><span style="color:#ff6b85; font-size:9px; font-weight:bold;" id="k-today-neg">↓0</span></div></div>
    <div class="kpi-box" style="cursor:pointer;" onclick="runEngineSync()" title="Click to sync data"><div class="kpi-label">Action</div><div class="kpi-val" style="color:#00ff88; font-size:11px;">SYNC ↻</div></div>
</header>

<div id="bar-wrap"><div id="tape-bar"></div></div>
<div id="legend"></div>
<div id="view-mode-toggle" style="padding:8px 12px; background:#0a0a0a; border-bottom:1px solid #00ff88; display:flex; gap:6px; justify-content:flex-start; align-items:center;">
    <input type="text" id="search-input" placeholder="🔍" maxlength="4" style="padding:6px 8px; background:#111; color:#fff; border:1px solid #00ff88; border-radius:4px; font-size:11px; width:50px; outline:none;" oninput="onSearchInput(this.value)">
    <button onclick="toggleViewMode()" id="btn-toggle" style="padding:6px 10px; background:#00ff88; color:#000; border:none; border-radius:4px; font-weight:bold; font-size:11px; cursor:pointer;">P↔W</button>
    <button onclick="toggleReturnFilter()" id="btn-return" style="padding:6px 10px; background:#666; color:#fff; border:none; border-radius:4px; font-weight:bold; font-size:10px; cursor:pointer;">↑↓1D%</button>
    <button onclick="resetAll()" id="btn-all" style="padding:6px 10px; background:#00ff88; color:#000; border:none; border-radius:4px; font-weight:bold; font-size:11px; cursor:pointer;">ALL</button>
</div>
<div id="status">Loading Pro Engine...</div>
<div class="view"><div id="app"></div></div>

<footer>
    <a href="index.html" class="nav-btn active"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg><span class="nav-label">Portfolio</span></a>
    <a href="data.html" class="nav-btn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"></path><path d="M21 3v5h-5"></path><path d="M21 12a9 9 0 0 1-9 9 9.76 9.76 0 0 1-6.74-2.74L3 16"></path><path d="M3 21v-5h5"></path></svg><span class="nav-label">Data</span></a>
    <a href="analysis.html" class="nav-btn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg><span class="nav-label">Analysis</span></a>
</footer>

<script>
// ===== DEBUG LOG (Console only) =====
function addDebugLog(msg) {
    var ts = new Date().toLocaleTimeString();
    console.log('[' + ts + '] ' + msg);
}

function showToast(msg) {
    console.log('📢 ' + msg);
}

// ===== PORTFOLIO CODE =====
const DB_NAME = "OnyxPortfolioDB", STORE_NAME = "Stocks", DB_VERSION = 8;
const PALETTE = ['#00f2ff','#7000ff','#ff007a','#ffb800','#00ff88','#007aff','#ff4d6d','#f97316','#a3e635','#ec4899','#8b5cf6','#f43f5e'];
let MASTER = [], SECTORS = [], COL = {}, filter = null, sortCol = 'P/L', sortAsc = false, viewMode = 'portfolio', searchQuery = '', returnFilter = null;
const UI_FIELDS = ['#', 'SECTOR', 'SIGNAL', 'POS', 'NEG', 'QTY', 'AVG', 'INVESTED', 'PNL', 'PNL%', 'TICKER', '1D%', 'LTP', 'ROE%', 'ROCE%', 'OPM%', 'NPM%', 'PE', 'PB', 'MCAP', 'SALES', 'EBITDA', 'CFO', 'EPS', 'PROM%', 'FII%', 'DII%', 'ATH%', '52W%'];

const cleanNum = (v) => {
    if (typeof v === 'number') return v;
    if (!v || v === '—') return 0;
    return parseFloat(v.toString().replace(/[^\d.-]/g, '')) || 0;
};

// ===== TEXT FIELDS (Alphabetical Sorting) =====
const TEXT_FIELDS = ['TICKER', 'SECTOR', 'SIGNAL'];
const isTextField = (field) => TEXT_FIELDS.includes(field);

const fmt = (val, field) => {
    const n = cleanNum(val);
    if (n === 0 && val === '—') return '—';
    if (['LTP', 'AVG', 'PNL', 'INVESTED', 'MCAP'].includes(field)) return n.toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    if (field.includes('%')) return n.toFixed(2) + '%';
    return val;
};

const resolve = (obj, field) => {
    const f = field.toUpperCase();
    const mappings = { 
        'SYM':['ticker','SYM','SYMBOL','TICKER'], 
        'TICKER':['ticker','SYM','SYMBOL','TICKER'], 
        'SIGNAL':['signal','SIGNAL','TECH_SIGNAL'],
        'PNL':['pnl','PNL','P/L'], 
        'PNL%':['pnlPct','PNL%','PNL_PCT'], 
        '1D%':['changePct','1D%','CHANGE_1D','CHANGE'], 
        'LTP':['ltp','LTP','PRICE','price'], 
        'QTY':['qty','QTY','quantity'], 
        'AVG':['avg','AVG','AVGBUY','avgbuy'], 
        'INVESTED':['invested','INVESTED'], 
        'POS':['pos','POS','POSITIVE'], 
        'NEG':['neg','NEG','NEGATIVE'], 
        'ROE%':['roe','ROE%','ROE','roe'], 
        'ROCE%':['roce','ROCE%','ROCE'], 
        'OPM%':['opm','OPM%','OPM','opmPct'], 
        'NPM%':['npm','NPM%','NPM','npmPct'], 
        'PE':['pe','PE','P/E'], 
        'PB':['pb','PB','P/B'], 
        'MCAP':['mcap','MCAP','marketcap'], 
        'SALES':['sales','SALES','revenue'], 
        'EBITDA':['ebitda','EBITDA'], 
        'CFO':['cfo','CFO'], 
        'EPS':['eps','EPS'], 
        'PROM%':['prom','PROM%','prom_pct'], 
        'FII%':['fii','FII%','fii_pct'], 
        'DII%':['dii','DII%','dii_pct'], 
        'ATH%':['ath','ATH%','ath_pct'], 
        '52W%':['w52','52W%','52WEEK','w52_pct'], 
        'SECTOR':['sector','SECTOR'],
        'NAME':['name','NAME','COMPANY'],
        'OPEN':['open','OPEN'],
        'HIGH':['high','HIGH'],
        'LOW':['low','LOW'],
        'CHANGE':['change','CHANGE'],
        'VOL':['vol','VOL','VOLUME'],
        'BETA':['beta','BETA']
    };
    const targets = mappings[f] || [f];
    for (let t of targets) {
        if (obj[t] !== undefined) return obj[t];
        const cleanT = t.replace('%', '');
        if (obj[cleanT] !== undefined) return obj[cleanT];
    }
    return '—';
};

// Get color class based on field and value (professional thresholds)
const getMetricColor = (field, value, stock) => {
    const n = cleanNum(value);
    if (n === 0 || value === '—') return '';
    
    // AVG and INVESTED: green if AVG < LTP (profit), red if AVG >= LTP (loss/breakeven)
    if ((field === 'AVG' || field === 'INVESTED') && stock) {
        const avg = cleanNum(resolve(stock, 'AVG'));
        const ltp = cleanNum(resolve(stock, 'LTP'));
        if (avg > 0 && ltp > 0) {
            return ltp > avg ? ' pos' : ' neg';
        }
        return '';
    }
    
    const thresholds = {
        'PE': { green: n < 15, red: n > 25 },
        'PB': { green: n < 1, red: n > 3 },
        'ROE%': { green: n > 20, red: n < 15 },
        'ROCE%': { green: n > 20, red: n < 15 },
        'OPM%': { green: n > 15, red: n < 10 },
        'NPM%': { green: n > 10, red: n < 5 },
        'PROM%': { green: n > 50, red: n < 40 },
        'FII%': { green: n > 20, red: n < 10 },
        'DII%': { green: n > 20, red: n < 10 },
        'ATH%': { green: n < -50, red: n > -20 },
        '52W%': { green: n > 0, red: n < 0 },
        'PNL': { green: n > 0, red: n < 0 },
        'PNL%': { green: n > 0, red: n < 0 },
        '1D%': { green: n > 0, red: n < 0 }
        // POS and NEG are counts, not metrics - no coloring
    };
    
    const t = thresholds[field];
    if (!t) return '';
    if (t.green) return ' pos';
    if (t.red) return ' neg';
    return '';
};

// ===== READ FROM INDEXEDDB =====
async function init() {
    const statusEl = document.getElementById('status');
    const db = await new Promise(res => {
        // Open without specific version to handle version mismatches from data.html
        const req = indexedDB.open(DB_NAME);
        req.onupgradeneeded = e => {
            const d = e.target.result;
            if (!d.objectStoreNames.contains(STORE_NAME)) {
                d.createObjectStore(STORE_NAME, { keyPath: "ticker" });
            }
        };
        req.onsuccess = () => {
            addDebugLog('✅ IndexedDB opened successfully');
            res(req.result);
        };
        req.onerror = () => {
            addDebugLog('❌ Failed to open IndexedDB: ' + req.error);
            res(null);
        };
    });
    
    if (!db) {
        statusEl.innerHTML = "FAILED TO OPEN DATABASE<br>Check browser storage settings";
        addDebugLog('⚠️ Database connection failed');
        return;
    }
    
    try {
        const tx = db.transaction(STORE_NAME, "readonly");
        MASTER = await new Promise((res, rej) => {
            const req = tx.objectStore(STORE_NAME).getAll();
            req.onsuccess = e => {
                const result = e.target.result || [];
                addDebugLog('📖 Read ' + result.length + ' records from object store');
                res(result);
            };
            req.onerror = () => {
                addDebugLog('❌ Error reading object store: ' + req.error);
                rej(req.error);
            };
        });
    } catch(e) {
        statusEl.innerHTML = "ERROR READING DATABASE<br>" + e.message;
        addDebugLog('❌ Transaction error: ' + e.message);
        return;
    }
    
    if (MASTER.length === 0) {
        statusEl.innerHTML = "DATABASE EMPTY<br><br>📊 Go to Data tab → Click 🚀 LOAD JSON<br>(No authentication required)";
        addDebugLog('⚠️ No data in IndexedDB');
        return;
    }
    
    addDebugLog('✅ Loaded ' + MASTER.length + ' stocks');
                    addDebugLog('✅ Loaded ' + MASTER.length + ' stocks');
                    
                    // Log sample data loaded
                    if (MASTER.length > 0) {
                        const sample = MASTER[0];
                        addDebugLog(`📌 Sample: ${resolve(sample,'TICKER')} | LTP: ${resolve(sample,'LTP')} | PE: ${resolve(sample,'PE')} | OPM: ${resolve(sample,'OPM%')}`);
                    }
    statusEl.style.display = "none";
    SECTORS = [...new Set(MASTER.map(s => resolve(s, 'SECTOR') || 'OTHER'))].sort();
    SECTORS.forEach((s, i) => COL[s] = PALETTE[i % PALETTE.length]);
    viewMode = 'portfolio';  // Initialize with portfolio view
    render();
}

function enrichStock(stock) {
    // Calculate INVESTED = QTY * AVG
    const qty = cleanNum(resolve(stock, 'QTY'));
    const avg = cleanNum(resolve(stock, 'AVG'));
    if (qty && avg && !stock.invested) {
        stock.invested = qty * avg;
    }
    
    // Calculate PNL = (LTP - AVG) * QTY
    const ltp = cleanNum(resolve(stock, 'LTP'));
    if (qty && avg && ltp && !stock.pnl) {
        stock.pnl = (ltp - avg) * qty;
    }
    
    // Calculate PNL% = ((LTP - AVG) / AVG) * 100
    if (avg && ltp && !stock.pnlPct) {
        stock.pnlPct = ((ltp - avg) / avg) * 100;
    }
    
    // Calculate POS & NEG based on 8 metrics with thresholds (only if not already set)
    if (!stock.pos || !stock.neg) {
        let pos = 0, neg = 0;
        
        const checkMetric = (field, goodFn, badFn) => {
            const v = cleanNum(resolve(stock, field));
            if (v === 0) return;
            if (goodFn(v)) pos++;
            else if (badFn(v)) neg++;
        };
        
        // Check 8 key metrics
        checkMetric('ROE%', v => v > 15, v => v < 8);
        checkMetric('PE', v => v > 0 && v < 18, v => v > 35);
        checkMetric('OPM%', v => v > 15, v => v > 0 && v < 8);
        checkMetric('NPM%', v => v > 10, v => v > 0 && v < 5);
        checkMetric('PROM%', v => v > 50, v => v > 0 && v < 35);
        checkMetric('1D%', v => v > 1, v => v < -1);
        checkMetric('ATH%', v => v > -10, v => v < -20);
        checkMetric('PB', v => v > 0 && v < 0.5, v => v > 1.5);  // Using PB as proxy for debt_eq
        
        stock.pos = pos;
        stock.neg = neg;
        
        // Compute SIGNAL based on net = pos - neg
        const net = pos - neg;
        if (!stock.signal) {
            stock.signal = net >= 3 ? 'BUY' : net <= -3 ? 'SELL' : 'HOLD';
        }
    }
    
    return stock;
}

function render() {
    // Enrich each stock with calculated fields
    MASTER.forEach(s => enrichStock(s));
    
    let sumPnl = 0, sumInv = 0, sumPVal = 0, sumToday = 0, posCount = 0, negCount = 0, sc = {};
    MASTER.forEach(s => { 
        const sec = resolve(s, 'SECTOR') || 'OTHER';
        const qty = cleanNum(resolve(s, 'QTY'));
        const ltp = cleanNum(resolve(s, 'LTP'));
        const changePct = cleanNum(resolve(s, '1D%'));
        
        sumPnl += cleanNum(resolve(s, 'PNL'));
        sumInv += cleanNum(resolve(s, 'INVESTED'));
        sumPVal += qty * ltp;  // Portfolio value
        
        // Today's gain/loss: If price changed by X%, then gain = currentValue * (X% / 100)
        const todayGain = (qty * ltp * changePct) / 100;
        sumToday += todayGain;
        
        // Count positive and negative changes
        if (qty > 0) {  // Only count stocks in portfolio
            if (changePct > 0) posCount++;
            else if (changePct < 0) negCount++;
        }
        
        const weight = Math.max(cleanNum(resolve(s, 'MCAP')) || ltp, 1);
        sc[sec] = (sc[sec] || 0) + weight; 
    });
    
    // Update KPI displays
    document.getElementById('k-pval').textContent = '₹' + (sumPVal/100000).toFixed(2) + 'L';
    document.getElementById('k-inv').textContent = '₹' + (sumInv/100000).toFixed(2) + 'L';
    const pEl = document.getElementById('k-pnl');
    pEl.textContent = '₹' + (sumPnl/100000).toFixed(2) + 'L';
    pEl.style.color = sumPnl >= 0 ? 'var(--gr)' : 'var(--rd)';
    const tValEl = document.getElementById('k-today-val');
    tValEl.textContent = '₹' + Math.abs(sumToday/100000).toFixed(2) + 'L';
    tValEl.style.color = sumToday >= 0 ? 'var(--gr)' : 'var(--rd)';
    const posEl = document.getElementById('k-today-pos');
    posEl.textContent = '↑' + posCount;
    const negEl = document.getElementById('k-today-neg');
    negEl.textContent = '↓' + negCount;
    const totalW = Object.values(sc).reduce((a, b) => a + b, 0);
    // Sort sectors by weight for bar display
    const sortedSectors = SECTORS.slice().sort((a, b) => (sc[b] || 0) - (sc[a] || 0));
    
    document.getElementById('tape-bar').innerHTML = sortedSectors.map(sec => '<div class="seg' + (filter && filter !== sec ? ' dimmed' : '') + '" style="flex-basis:' + ((sc[sec]/totalW)*100) + '%;background:' + COL[sec] + '" onclick="tap(\'' + sec + '\')"></div>').join('');
    document.getElementById('legend').innerHTML = SECTORS.map(sec => '<div class="leg ' + (filter === sec ? 'on' : '') + '" onclick="tap(\'' + sec + '\')" style="padding:4px 8px; border-radius:4px; transition:all .2s;"><div class="dot" style="background:' + COL[sec] + '"></div>' + sec + '</div>').join('');
    
    // ===== APPLY FILTERS: Sector + View Mode (Portfolio/Watchlist) + Search + Return Filter =====
    let rows = MASTER.slice();
    if (filter) rows = rows.filter(s => resolve(s, 'SECTOR') === filter);
    
    if (viewMode === 'portfolio') {
        rows = rows.filter(s => cleanNum(resolve(s, 'QTY')) > 0);
    } else if (viewMode === 'watchlist') {
        rows = rows.filter(s => cleanNum(resolve(s, 'QTY')) === 0 || resolve(s, 'QTY') === '—');
    }
    
    // Apply search filter
    if (searchQuery) {
        rows = rows.filter(s => resolve(s, 'TICKER').toUpperCase().includes(searchQuery.toUpperCase()));
    }
    
    // Apply return filter (positive/negative 1D%)
    if (returnFilter === 'pos') {
        rows = rows.filter(s => cleanNum(resolve(s, '1D%')) > 0);
    } else if (returnFilter === 'neg') {
        rows = rows.filter(s => cleanNum(resolve(s, '1D%')) < 0);
    }
    // 'all' shows both portfolio and watchlist
    rows.sort((a, b) => {
        let vA = resolve(a, sortCol), vB = resolve(b, sortCol);
        
        // ===== TEXT FIELDS: Alphabetical Sorting =====
        if (isTextField(sortCol)) {
            let strA = (vA || '').toString().toUpperCase();
            let strB = (vB || '').toString().toUpperCase();
            return sortAsc ? strA.localeCompare(strB) : strB.localeCompare(strA);
        }
        
        // ===== NUMERIC FIELDS: Numeric Sorting =====
        let nA = cleanNum(vA), nB = cleanNum(vB);
        return sortAsc ? nA - nB : nB - nA;
    });
    let h = '<table><thead><tr>';
    UI_FIELDS.forEach(f => {
        if (f === '#') {
            h += '<th class="' + (f==='TICKER'?'sticky':'') + '"><sup></sup>' + f + '</th>';
        } else {
            const sectorWidth = f === 'SECTOR' ? 'style="max-width:70px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;"' : '';
            h += '<th onclick="doSort(\'' + f + '\')" class="' + (f===sortCol?'active':'') + ' ' + (f==='TICKER'?'sticky':'') + '" ' + sectorWidth + '><sup>' + (f===sortCol?(sortAsc?'▲':'▼'):'') + '</sup>' + f + '</th>';
        }
    });
    h += '</tr></thead><tbody>';
    rows.forEach((s, idx) => {
        const ticker = resolve(s, 'TICKER');
        h += '<tr style="cursor:pointer;" onclick="window.location.href=\'analysis.html?drill=' + encodeURIComponent(ticker) + '\'">';
        UI_FIELDS.forEach(f => {
            if (f === '#') {
                h += '<td style="color:#666; text-align:center;">' + (idx + 1) + '</td>';
            } else {
                const raw = resolve(s, f);
                const val = fmt(raw, f);
                let cls = f === 'TICKER' ? 'sticky' : '';
                const n = cleanNum(raw);
                if (f === 'SIGNAL' && val.toString().toUpperCase() === 'BUY') h += '<td class="' + cls + '"><span class="sig-buy">BUY</span></td>';
                else {
                    // Use professional thresholds for colors (pass stock object for AVG/INVESTED comparison)
                    cls += getMetricColor(f, raw, s);
                    h += '<td class="' + cls + '">' + val + '</td>';
                }
            }
        });
        h += '</tr>';
    });
    h += '</tbody><tfoot><tr>';
    UI_FIELDS.forEach(f => {
        let cls = f === 'TICKER' ? 'sticky' : '';
        if (f === '#') h += '<td style="color:#666;"></td>';
        else if (f === 'TICKER') h += '<td class="' + cls + '">TOTAL</td>';
        else if (f === 'PNL') h += '<td class="' + (sumPnl>=0?'pos':'neg') + '">' + fmt(sumPnl, 'PNL') + '</td>';
        else if (f === 'INVESTED') h += '<td>' + fmt(sumInv, 'INVESTED') + '</td>';
        else h += '<td class="' + cls + '"></td>';
    });
    document.getElementById('app').innerHTML = h + '</tr></tfoot></table>';
}

function doSort(f) { if(sortCol === f) sortAsc = !sortAsc; else { sortCol = f; sortAsc = false; } render(); }
function tap(sec) { filter = filter === sec ? null : sec; render(); }

function toggleViewMode() {
    if (viewMode === 'portfolio') {
        viewMode = 'watchlist';
        document.getElementById('btn-toggle').innerHTML = 'W↔P';
    } else {
        viewMode = 'portfolio';
        document.getElementById('btn-toggle').innerHTML = 'P↔W';
    }
    document.getElementById('btn-all').style.background = '#666';
    document.getElementById('btn-all').style.color = '#fff';
    render();
}

function toggleReturnFilter() {
    if (returnFilter === null) {
        returnFilter = 'pos';  // Show only positive returns
        document.getElementById('btn-return').style.background = '#00ff88';
        document.getElementById('btn-return').style.color = '#000';
    } else if (returnFilter === 'pos') {
        returnFilter = 'neg';  // Show only negative returns
        document.getElementById('btn-return').style.background = '#ff6b85';
        document.getElementById('btn-return').style.color = '#fff';
    } else {
        returnFilter = null;  // Show all
        document.getElementById('btn-return').style.background = '#666';
        document.getElementById('btn-return').style.color = '#fff';
    }
    render();
}

function setViewMode(mode) {
    viewMode = mode;
    document.getElementById('btn-toggle').style.background = '#666';
    document.getElementById('btn-toggle').style.color = '#fff';
    document.getElementById('btn-all').style.background = mode === 'all' ? '#00ff88' : '#666';
    document.getElementById('btn-all').style.color = mode === 'all' ? '#000' : '#fff';
    render();
}

function onSearchInput(value) {
    searchQuery = value;
    render();
}

function resetAll() {
    filter = null;
    sortCol = 'P/L';
    sortAsc = false;
    viewMode = 'portfolio';
    searchQuery = '';
    returnFilter = null;
    document.getElementById('search-input').value = '';
    document.getElementById('btn-toggle').innerHTML = 'P↔W';
    document.getElementById('btn-toggle').style.background = '#00ff88';
    document.getElementById('btn-toggle').style.color = '#000';
    document.getElementById('btn-return').style.background = '#666';
    document.getElementById('btn-return').style.color = '#fff';
    document.getElementById('btn-all').style.background = '#00ff88';
    document.getElementById('btn-all').style.color = '#000';
    render();
}

// ===== SYNC ENGINE - Now reads from IndexedDB =====
function runEngineSync() {
    addDebugLog('🔄 Refreshing from IndexedDB...');
    init().then(() => {
        addDebugLog('✅ Sync complete');
    });
}

// Initialize on page load
window.addEventListener('pageshow', function(event) {
    if (event.persisted) {
        addDebugLog('📄 Page restored from cache - syncing...');
        init();
    }
});

init();
</script>
