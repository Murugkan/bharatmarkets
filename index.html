<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>BharatMarkets | Unified Core</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #04060f; --s1: #0a0e1a; --s2: #121a2d; --b1: #1e293b; --gr1: #00f2ff; --gr2: #00ff88; --rd1: #ff4d6d; --tx3: #708499; }
        body { background: var(--bg); color: #fff; font-family: 'JetBrains Mono', monospace; margin: 0; overflow: hidden; }
        
        /* Look and Feel: Legacy Header */
        header { height: 60px; background: var(--s1); border-bottom: 1px solid var(--b1); display: flex; align-items: center; padding: 0 20px; justify-content: space-between; }
        .logo { font-weight: 800; color: var(--gr1); font-size: 14px; }
        .totals { display: flex; gap: 15px; font-size: 10px; }
        .t-val { font-weight: 700; color: var(--gr1); }

        /* The Viewport: Selective Mirror */
        .table-outer { width: 100%; overflow: auto; height: calc(100vh - 60px); }
        table { width: 100%; border-collapse: collapse; font-size: 10px; white-space: nowrap; }
        th { background: var(--s1); color: var(--tx3); padding: 12px 15px; position: sticky; top: 0; z-index: 10; border-bottom: 1px solid var(--b1); text-align: left; }
        td { padding: 12px 15px; border-bottom: 1px solid #182840; }
        
        .sticky-sym { position: sticky; left: 0; background: var(--s2) !important; z-index: 5; border-right: 2px solid var(--gr1); font-weight: 700; color: var(--gr1); }
        .up { color: var(--gr2); } .down { color: var(--rd1); }
        .BUY { color: var(--gr2); font-weight: 800; } .SELL { color: var(--rd1); font-weight: 800; } .HOLD { color: #ffb800; }
    </style>
</head>
<body onload="init()">

    <header>
        <div class="logo">BHARAT MARKETS</div>
        <div class="totals" id="totals-bar">
            <span>INV: <span class="t-val" id="t-inv">0</span></span>
            <span>PNL: <span class="t-val" id="t-pnl">0</span></span>
        </div>
    </header>

    <div id="app" class="table-outer"></div>

    <script>
        const DB_NAME = "BharatCoreDB"; const STORE = "MasterDump";

        // --- THE BASIS 1: THE DUMP (EVERY STOCK, EVERY FUNDAMENTAL) ---
        async function runMasterDump() {
            try {
                const res = await fetch('fundamentals.json');
                const data = await res.json();
                const db = await openDB();
                const tx = db.transaction(STORE, "readwrite");
                const store = tx.objectStore(STORE);

                // This is the "Raw Dump" - No filtering here.
                Object.keys(data.stocks).forEach(ticker => {
                    const raw = data.stocks[ticker];
                    const sym = ticker.split('.')[0].toUpperCase(); // Resolve Suffix
                    
                    // Standardize all keys to UPPERCASE during dump to fix "—" mismatches
                    const record = { SYM: sym };
                    for (let key in raw) record[key.toUpperCase()] = raw[key];
                    
                    // Force calculate PNL for the UI mirror
                    if (record.LTP && record.QTY) {
                        record.PNL_VAL = Math.round((record.QTY * record.LTP) - (record.QTY * record.AVG));
                    }
                    
                    store.put(record); // The full 33+ field record goes into DB
                });

                tx.oncomplete = () => renderPortfolio();
            } catch (e) { console.error("Dump Error:", e); }
        }

        // --- THE BASIS 2: SELECTIVE VIEW (OLD PORTFOLIO FIELDS) ---
        async function renderPortfolio() {
            const db = await openDB();
            const stocks = await new Promise(r => {
                db.transaction(STORE).objectStore(STORE).getAll().onsuccess = e => r(e.target.result);
            });

            if (!stocks.length) return;

            // These are the SELECTIVE fields from your old portfolio JS
            const cols = ['SYM', 'LTP', 'CHG1D', 'PNL_VAL', 'ROE', 'OPM_PCT', 'PE', 'DEBT_EQ', 'MCAP', 'SIGNAL', 'SECTOR'];

            // Totals
            let tInv = 0, tPnl = 0;
            stocks.forEach(s => { 
                tInv += (s.QTY * s.AVG) || 0; 
                tPnl += s.PNL_VAL || 0; 
            });
            document.getElementById('t-inv').innerText = Math.round(tInv).toLocaleString();
            document.getElementById('t-pnl').innerText = Math.round(tPnl).toLocaleString();

            let h = `<table><thead><tr>`;
            cols.forEach(c => h += `<th class="${c==='SYM'?'sticky-sym':''}">${c}</th>`);
            h += `</tr></thead><tbody>`;

            stocks.forEach(s => {
                h += `<tr>`;
                cols.forEach(c => {
                    let val = s[c] !== undefined ? s[c] : '—';
                    let cls = c === 'SYM' ? 'sticky-sym' : '';
                    
                    if (c === 'PNL_VAL' || c === 'CHG1D') cls += ` ${val >= 0 ? 'up' : 'down'}`;
                    if (c === 'SIGNAL') cls += ` ${val}`;
                    if (c === 'CHG1D' && val !== '—') val = val + '%';

                    h += `<td class="${cls}">${val}</td>`;
                });
                h += `</tr>`;
            });
            document.getElementById('app').innerHTML = h + `</tbody></table>`;
        }

        function openDB() {
            return new Promise(res => {
                const req = indexedDB.open(DB_NAME, 1);
                req.onupgradeneeded = e => e.target.result.createObjectStore(STORE, { keyPath: "SYM" });
                req.onsuccess = () => res(req.result);
            });
        }

        function init() { runMasterDump(); }
    </script>
</body>
</html>
