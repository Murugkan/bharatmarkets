<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Soya Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #000000; --s1: #111111; --s2: #1a1a1a;
      --b1: #222222; --b2: #333333;
      --tx: #ffffff; --tx2: #cccccc; --tx3: #888888;
      --ac: #f97316; --gr2: #22c55e; --rd2: #ef4444; --yw2: #eab308;
      --mono: 'JetBrains Mono', monospace;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { 
      margin: 0; background: var(--bg); color: var(--tx); 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      overflow-x: hidden;
    }

    /* Header & Nav */
    .app-header { padding: 20px 15px 10px; font-family: 'Syne', sans-serif; font-weight: 800; font-size: 20px; }
    .app-nav { display: flex; gap: 8px; padding: 0 15px 15px; border-bottom: 1px solid var(--b1); }
    .nb { 
      background: var(--s2); border: 1px solid var(--b2); color: var(--tx2);
      padding: 8px 16px; border-radius: 20px; font-size: 13px; font-weight: 600; cursor: pointer;
    }
    .nb.active { background: var(--ac); border-color: var(--ac); color: #000; }

    /* UI Components */
    .overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.8); backdrop-filter: blur(5px);
      opacity: 0; visibility: hidden; transition: 0.3s; z-index: 1000;
    }
    .overlay.on { opacity: 1; visibility: visible; }

    .panel {
      position: fixed; bottom: -100%; left: 0; width: 100%; height: 90vh;
      background: var(--s1); border-top: 1px solid var(--b2);
      border-radius: 24px 24px 0 0; transition: bottom 0.4s cubic-bezier(0, 0.5, 0.5, 1);
      z-index: 1001; padding: 20px; overflow-y: auto;
    }
    .panel.on { bottom: 0; }

    .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .panel-title { font-family: 'Syne', sans-serif; font-size: 18px; color: var(--tx); }
    .panel-close { font-size: 24px; color: var(--tx3); padding: 5px; cursor: pointer; }

    /* Utility Helpers for JS */
    .u-gr2 { color: var(--gr2); } .u-rd2 { color: var(--rd2); } .u-yw2 { color: var(--yw2); }
    .import-textarea {
      width: 100%; background: var(--bg); border: 1px solid var(--b2);
      color: var(--tx); border-radius: 12px; padding: 12px; font-family: var(--mono); font-size: 12px;
      margin-bottom: 15px; resize: none;
    }
    .import-btn {
      width: 100%; background: var(--ac); color: #000; border: none;
      padding: 14px; border-radius: 12px; font-weight: 700; font-size: 14px; margin-top: 10px;
    }
  </style>
</head>
<body>

  <header class="app-header">SOYA</header>
  <div id="import-status-strip"></div>

  <nav class="app-nav">
    <button class="nb active" id="btn-portfolio" onclick="switchTab('portfolio')">Portfolio</button>
    <button class="nb" id="btn-watchlist" onclick="switchTab('watchlist')">Watchlist</button>
    <button class="nb" onclick="openImport()">Stock Upload</button>
  </nav>

  <main id="app-content">
    <div id="dashboard-view">
      <div id="sector-grid"></div>
      <div id="stock-list" style="padding:15px; color:var(--tx3); font-size:12px;">Loading portfolio...</div>
    </div>
  </main>

  <div id="ov" class="overlay" onclick="closePanel()"></div>
  <div id="import-panel" class="panel">
    <div class="panel-header">
      <div class="panel-title">Stock Intelligence Hub</div>
      <div class="panel-close" onclick="closePanel()">✕</div>
    </div>
    <div id="import-panel-body"></div>
  </div>

  <script src="js/app-core.js"></script>
  <script src="js/app-import.js"></script>
  <script src="js/app-watchlist.js"></script>

  <script>
    // Global State Container
    window.S = {
      curTab: 'portfolio',
      portfolio: JSON.parse(localStorage.getItem('soya_portfolio') || '[]'),
      settings: JSON.parse(localStorage.getItem('soya_settings') || '{}'),
      _importStatus: null
    };

    async function init() {
      // Build the ISIN map from symbols.json
      await loadMasterData();
      render(); // Initial draw of the portfolio
    }

    async function loadMasterData() {
      try {
        const res = await fetch('symbols.json');
        window.FUND = await res.json();
        window.ISIN_MAP = {};
        window.FUND.forEach(item => { if(item.isin) ISIN_MAP[item.isin] = item.sym; });
      } catch(e) { console.error("Data error:", e); }
    }

    function switchTab(tab) {
      S.curTab = tab;
      document.querySelectorAll('.nb').forEach(b => b.classList.remove('active'));
      document.getElementById('btn-' + tab).classList.add('active');
      render(); // Calls the function in app-watchlist.js
    }

    window.onload = init;
  </script>
</body>
</html>
