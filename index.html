<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>BharatMarkets | Tape Terminal</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --s1: #0a0a0a; --b1: #222; --bl: #00f2ff; --gr: #064e3b; --rd: #7f1d1d; --tx: #fff; }
        body { background: var(--bg); color: var(--tx); font-family: 'JetBrains Mono', monospace; margin: 0; overflow: hidden; }
        
        header { background: var(--s1); border-bottom: 1px solid var(--b1); padding: 12px; display: flex; justify-content: space-around; }
        .kpi-box { text-align: center; }
        .kpi-label { font-size: 8px; color: #666; text-transform: uppercase; }
        .kpi-val { font-size: 14px; font-weight: 800; margin-top: 2px; }

        /* TAPE CHART AREA */
        #chart-wrap { height: 80px; background: #000; padding: 20px 10px; border-bottom: 1px solid var(--b1); }
        
        .view { width: 100%; overflow: auto; height: calc(100vh - 180px); }
        table { width: 100%; border-collapse: collapse; font-size: 11px; white-space: nowrap; }
        th { background: var(--s1); color: #666; padding: 12px; position: sticky; top: 0; z-index: 10; border-bottom: 1px solid var(--b1); text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #111; color: #fff !important; }
        
        .sticky { position: sticky; left: 0; background: #111 !important; z-index: 5; border-right: 1px solid var(--b1); color: var(--bl) !important; font-weight: 800; }
        
        .pos { background: var(--gr) !important; }
        .neg { background: var(--rd) !important; }
    </style>
</head>
<body onload="init()">

    <header>
        <div class="kpi-box"><div class="kpi-label">Invested</div><div class="kpi-val" id="kpi-inv">0.00L</div></div>
        <div class="kpi-box"><div class="kpi-label">Mkt Value</div><div class="kpi-val" id="kpi-val">0.00L</div></div>
        <div class="kpi-box"><div class="kpi-label">Total P&L</div><div class="kpi-val" id="kpi-pnl">0.00L</div></div>
    </header>

    <div id="chart-wrap"><canvas id="tapeChart"></canvas></div>
    <div id="app" class="view"></div>

    <script>
        const DB_NAME = "BharatTapeDB"; const STORE = "Data";
        let MASTER_DATA = [], activeFilter = null, chart = null;
        const FIELDS = ['SYM', 'QTY', 'AVG', 'LTP', 'PNL', 'ROE', 'SECTOR'];
        const PALETTE = ['#00f2ff', '#7000ff', '#ff007a', '#ffb800', '#00ff88', '#007aff', '#ff4d6d'];

        async function init() {
            const res = await fetch('fundamentals.json');
            const data = await res.json();
            const db = await openDB();
            const tx = db.transaction(STORE, "readwrite");
            const store = tx.objectStore(STORE);

            Object.keys(data.stocks).forEach(ticker => {
                const s = data.stocks[ticker];
                const rec = {
                    SYM: ticker.split('.')[0].toUpperCase(),
                    QTY: s.qty || 0,
                    AVG: s.avgBuy || s.AVG || 0,
                    LTP: s.ltp || 0,
                    SECTOR: s.sector || 'Others',
                    ROE: s.roe || 0
                };
                rec.COST = rec.QTY * rec.AVG;
                rec.MKT = rec.QTY * rec.LTP;
                rec.PNL = Math.round(rec.MKT - rec.COST);
                store.put(rec);
            });
            tx.oncomplete = () => load();
        }

        async function load() {
            const db = await openDB();
            MASTER_DATA = await new Promise(r => {
                db.transaction(STORE).objectStore(STORE).getAll().onsuccess = e => r(e.target.result);
            });
            updateKPIs(); renderChart(); renderTable();
        }

        function updateKPIs() {
            let tI = 0, tM = 0, tP = 0;
            MASTER_DATA.forEach(s => { tI += s.COST; tM += s.MKT; tP += s.PNL; });
            document.getElementById('kpi-inv').innerText = `₹${(tI/100000).toFixed(2)}L`;
            document.getElementById('kpi-val').innerText = `₹${(tM/100000).toFixed(2)}L`;
            document.getElementById('kpi-pnl').innerText = `₹${(tP/100000).toFixed(2)}L`;
            document.getElementById('kpi-pnl').style.color = tP >= 0 ? '#00ff88' : '#ff4d6d';
        }

        function renderChart() {
            const ctx = document.getElementById('tapeChart').getContext('2d');
            const secMap = {};
            MASTER_DATA.forEach(s => { secMap[s.SECTOR] = (secMap[s.SECTOR] || 0) + s.COST; });

            const labels = Object.keys(secMap);
            const datasets = labels.map((label, i) => ({
                label: label,
                data: [secMap[label]],
                backgroundColor: PALETTE[i % PALETTE.length],
                borderWidth: 0,
                barThickness: 30
            }));

            if(chart) chart.destroy();
            chart = new Chart(ctx, {
                type: 'bar',
                data: { labels: ['Portfolio'], datasets: datasets },
                options: {
                    indexAxis: 'y',
                    maintainAspectRatio: false,
                    plugins: { 
                        legend: { display: false },
                        tooltip: { callbacks: { label: (ctx) => `${ctx.dataset.label}: ₹${(ctx.raw/100000).toFixed(2)}L` } }
                    },
                    scales: { 
                        x: { stacked: true, display: false }, 
                        y: { stacked: true, display: false } 
                    },
                    onClick: (e, elements) => {
                        if (elements.length > 0) {
                            const dsIndex = elements[0].datasetIndex;
                            const clickedSector = chart.data.datasets[dsIndex].label;
                            activeFilter = (activeFilter === clickedSector) ? null : clickedSector;
                            renderTable();
                        }
                    }
                }
            });
        }

        function renderTable() {
            const filtered = activeFilter ? MASTER_DATA.filter(s => s.SECTOR === activeFilter) : MASTER_DATA;
            let h = `<table><thead><tr>`;
            FIELDS.forEach(f => h += `<th class="${f==='SYM'?'sticky':''}">${f}</th>`);
            h += `</tr></thead><tbody>`;
            filtered.forEach(s => {
                h += `<tr>`;
                FIELDS.forEach(f => {
                    let v = s[f] ?? '—';
                    let cls = f==='SYM' ? 'sticky' : (f==='PNL' ? (v >= 0 ? 'pos' : 'neg') : '');
                    h += `<td class="${cls}">${v}${f==='ROE'?'%':''}</td>`;
                });
                h += `</tr>`;
            });
            document.getElementById('app').innerHTML = h + `</tbody></table>`;
        }

        function openDB() { return new Promise(res => { const req = indexedDB.open(DB_NAME, 1); req.onupgradeneeded = e => e.target.result.createObjectStore(STORE, { keyPath: "SYM" }); req.onsuccess = () => res(req.result); }); }
    </script>
</body>
</html>
