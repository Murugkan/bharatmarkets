<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>BharatMarkets | Solid State Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #04060f; --s1: #0a0e1a; --s2: #121a2d; --b1: #1e293b; --gr1: #00f2ff; --gr2: #00ff88; --rd1: #ff4d6d; --tx3: #708499; }
        body { background: var(--bg); color: #fff; font-family: 'JetBrains Mono', monospace; margin: 0; overflow: hidden; }
        
        /* 1. LOOK & FEEL: The Legacy Interface */
        header { height: 60px; background: var(--s1); border-bottom: 1px solid var(--b1); display: flex; align-items: center; padding: 0 20px; justify-content: space-between; }
        .logo { font-weight: 800; color: var(--gr1); font-size: 14px; letter-spacing: 1px; }
        .status { font-size: 9px; color: var(--tx3); text-transform: uppercase; }

        .table-outer { width: 100%; overflow: auto; height: calc(100vh - 60px); }
        table { width: 100%; border-collapse: collapse; font-size: 11px; white-space: nowrap; }
        th { background: var(--s1); color: var(--tx3); padding: 15px; position: sticky; top: 0; z-index: 10; border-bottom: 1px solid var(--b1); text-align: left; }
        td { padding: 15px; border-bottom: 1px solid #182840; }
        
        /* Sticky Symbol Column */
        .sticky-sym { position: sticky; left: 0; background: var(--s2) !important; z-index: 5; border-right: 2px solid var(--gr1); font-weight: 700; color: var(--gr1); }

        /* Color Coding */
        .pos { color: var(--gr2); } 
        .neg { color: var(--rd1); }
        .BUY { color: var(--gr2); font-weight: 700; }
        .SELL { color: var(--rd1); font-weight: 700; }
        .HOLD { color: #ffb800; font-weight: 700; }
    </style>
</head>
<body onload="init()">

    <header>
        <div class="logo">BHARAT MARKETS</div>
        <div class="status" id="db-status">DB: CONNECTING...</div>
    </header>

    <div id="portfolio" class="table-outer"></div>

    <script>
        const DB_NAME = "BharatSolidState";
        const STORE = "MasterData";

        // --- THE ENGINE: RESOLVES MISMATCHES & BAKES DATA ---
        async function runDataPipeline() {
            try {
                const res = await fetch('fundamentals.json');
                const raw = await res.json();
                
                const db = await openDB();
                const tx = db.transaction(STORE, "readwrite");
                const store = tx.objectStore(STORE);

                // Clear existing to prevent stale mismatches
                store.clear();

                // Flatten the 33-field Nested JSON into Flat DB Records
                Object.keys(raw.stocks).forEach(ticker => {
                    const metrics = raw.stocks[ticker];
                    const cleanSym = ticker.split('.')[0].toUpperCase(); // Resolves "HDFC.NS" -> "HDFC"
                    
                    // The "Bake": Merge user data (qty/avg) with 33 metrics and calc P&L
                    const bakedRecord = {
                        sym: cleanSym,
                        ...metrics,
                        pnl: metrics.LTP ? Math.round((metrics.QTY * metrics.LTP) - (metrics.QTY * metrics.AVG)) : 0
                    };
                    store.put(bakedRecord);
                });

                tx.oncomplete = () => {
                    document.getElementById('db-status').innerText = "DB: SYNCED & RESOLVED";
                    renderPortfolio();
                };
            } catch (e) { document.getElementById('db-status').innerText = "DB: SYNC ERROR"; }
        }

        // --- THE UI: PASSIVE MIRROR (LOOK & FEEL ONLY) ---
        async function renderPortfolio() {
            const db = await openDB();
            const stocks = await new Promise(r => {
                db.transaction(STORE).objectStore(STORE).getAll().onsuccess = e => r(e.target.result);
            });

            const container = document.getElementById('portfolio');
            if (!stocks.length) return;

            // Define exactly what to show from the 33 available fields
            const displayCols = ['sym', 'LTP', 'CHG1D', 'pnl', 'ROE', 'SIGNAL', 'SECTOR'];

            let html = `<table><thead><tr>`;
            displayCols.forEach(col => {
                const isSticky = col === 'sym' ? 'class="sticky-sym"' : '';
                html += `<th ${isSticky}>${col.toUpperCase()}</th>`;
            });
            html += `</tr></thead><tbody>`;

            stocks.forEach(s => {
                html += `<tr>`;
                displayCols.forEach(col => {
                    const val = s[col] !== undefined ? s[col] : '—';
                    const isSticky = col === 'sym' ? 'class="sticky-sym"' : '';
                    
                    let styleClass = "";
                    if (col === 'pnl' || col === 'CHG1D') styleClass = val >= 0 ? 'pos' : 'neg';
                    if (col === 'SIGNAL') styleClass = val;

                    html += `<td ${isSticky} class="${styleClass}">${val}${col === 'CHG1D' ? '%' : ''}</td>`;
                });
                html += `</tr>`;
            });
            container.innerHTML = html + `</tbody></table>`;
        }

        function openDB() {
            return new Promise(res => {
                const req = indexedDB.open(DB_NAME, 1);
                req.onupgradeneeded = e => e.target.result.createObjectStore(STORE, { keyPath: "sym" });
                req.onsuccess = () => res(req.result);
            });
        }

        function init() {
            runDataPipeline(); // Auto-run pipeline on load to ensure DB is current
        }
    </script>
</body>
</html>
