<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>BharatMarkets | Onyx Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --s1: #0a0a0a; --s2: #111; --b1: #222; --gr: #00ff88; --rd: #ff4d6d; --bl: #00f2ff; --yl: #ffb800; --tx: #fff; --tx3: #888; }
        body { background: var(--bg); color: var(--tx); font-family: 'JetBrains Mono', monospace; margin: 0; overflow: hidden; }

        /* KPI TOP ROW */
        .kpi-row { display: flex; justify-content: space-around; background: var(--s1); padding: 12px 10px; border-bottom: 1px solid var(--b1); }
        .kpi-box { text-align: center; flex: 1; }
        .kpi-label { font-size: 9px; color: var(--tx3); text-transform: uppercase; margin-bottom: 4px; }
        .kpi-val { font-size: 14px; font-weight: 800; }
        .kpi-sub { font-size: 10px; margin-top: 2px; }

        /* CHART AREA */
        #chart-wrap { height: 160px; background: var(--bg); border-bottom: 1px solid var(--b1); padding: 10px; }
        
        /* TABLE AREA */
        .view { width: 100%; overflow: auto; height: calc(100vh - 250px); }
        table { width: 100%; border-collapse: collapse; font-size: 11px; white-space: nowrap; }
        th { background: var(--s1); color: var(--tx3); padding: 12px 15px; position: sticky; top: 0; z-index: 10; border-bottom: 2px solid var(--b1); text-align: left; cursor: pointer; }
        td { padding: 12px 15px; border-bottom: 1px solid #111; }
        
        .sticky { position: sticky; left: 0; background: var(--s2) !important; z-index: 5; border-right: 1px solid var(--b1); color: var(--bl); font-weight: 800; }
        
        /* Heatmap Styles */
        .pos { background: rgba(0,255,136,0.15) !important; color: var(--gr) !important; }
        .neg { background: rgba(255,77,109,0.15) !important; color: var(--rd) !important; }
        .neu { background: rgba(255,184,0,0.1) !important; color: var(--yl) !important; }
        .BUY { background: var(--gr) !important; color: #000 !important; font-weight: 800; text-align: center; border-radius: 2px; }
        .SELL { background: var(--rd) !important; color: #000 !important; font-weight: 800; text-align: center; border-radius: 2px; }
    </style>
</head>
<body onload="init()">

    <div class="kpi-row">
        <div class="kpi-box">
            <div class="kpi-label">Invested</div>
            <div class="kpi-val" id="kpi-inv">0.00L</div>
        </div>
        <div class="kpi-box">
            <div class="kpi-label">Mkt Value</div>
            <div class="kpi-val" id="kpi-val">0.00L</div>
        </div>
        <div class="kpi-box">
            <div class="kpi-label">Total P&L</div>
            <div class="kpi-val" id="kpi-pnl">0.00L</div>
            <div class="kpi-sub" id="kpi-pnl-pct">0.00%</div>
        </div>
    </div>

    <div id="chart-wrap"><canvas id="mainChart"></canvas></div>
    <div id="app" class="view"></div>

    <script>
        const DB_NAME = "BharatOnyxDB"; const STORE = "MasterData";
        let MASTER_DATA = [], activeFilter = null, chart = null, sort = { col: 'SYM', asc: true };
        const COLS = ['SYM', 'QTY', 'AVG', 'LTP', 'CHG1D', 'PNL', 'PNL_PCT', 'ROE', 'PE', 'SIGNAL', 'POS', 'NEG', 'SECTOR'];

        async function runBuild() {
            const res = await fetch('fundamentals.json');
            const data = await res.json();
            const db = await openDB();
            const tx = db.transaction(STORE, "readwrite");
            const store = tx.objectStore(STORE);

            Object.keys(data.stocks).forEach(ticker => {
                const raw = data.stocks[ticker], rec = { SYM: ticker.split('.')[0].toUpperCase() };
                for (let k in raw) rec[k.toUpperCase()] = raw[k];
                
                const q = rec.QTY||0, a = rec.AVG||0, l = rec.LTP||0;
                rec.COST = q * a; rec.MKT = q * l;
                rec.PNL = Math.round(rec.MKT - rec.COST);
                rec.PNL_PCT = rec.COST ? parseFloat(((rec.PNL / rec.COST) * 100).toFixed(2)) : 0;
                rec.POS = (rec.ROE > 15?1:0) + (rec.PE < 25?1:0) + (rec.CHG1D > 0?1:0);
                rec.NEG = 3 - rec.POS;
                store.put(rec);
            });
            tx.oncomplete = () => load();
        }

        async function load() {
            const db = await openDB();
            MASTER_DATA = await new Promise(r => {
                db.transaction(STORE).objectStore(STORE).getAll().onsuccess = e => r(e.target.result);
            });
            updateKPIs(); renderChart(); renderTable();
        }

        function updateKPIs() {
            let tInv = 0, tCur = 0, tPnl = 0;
            MASTER_DATA.forEach(s => { tInv += s.COST; tCur += s.MKT; tPnl += s.PNL; });
            const pPct = tInv ? ((tPnl / tInv) * 100).toFixed(2) : 0;

            document.getElementById('kpi-inv').innerText = `₹${(tInv/100000).toFixed(2)}L`;
            document.getElementById('kpi-val').innerText = `₹${(tCur/100000).toFixed(2)}L`;
            document.getElementById('kpi-pnl').innerText = `₹${(tPnl/100000).toFixed(2)}L`;
            document.getElementById('kpi-pnl').className = `kpi-val ${tPnl>=0?'pos':'neg'}`;
            document.getElementById('kpi-pnl-pct').innerText = `${pPct}%`;
            document.getElementById('kpi-pnl-pct').className = `kpi-sub ${tPnl>=0?'pos':'neg'}`;
        }

        function renderChart() {
            const ctx = document.getElementById('mainChart').getContext('2d');
            const secMap = {}; MASTER_DATA.forEach(s => { secMap[s.SECTOR] = (secMap[s.SECTOR]||0) + s.PNL; });
            const labels = Object.keys(secMap), values = Object.values(secMap);

            if(chart) chart.destroy();
            chart = new Chart(ctx, {
                type: 'line',
                data: { labels, datasets: [{ data: values, borderColor: '#00f2ff', tension: 0.4, fill: true, backgroundColor: 'rgba(0,242,255,0.05)' }] },
                options: { maintainAspectRatio: false, plugins: { legend: { display: false } }, 
                scales: { x: { grid: { display: false }, ticks: { color: '#555', font: { size: 8 } } }, y: { grid: { color: '#222' }, ticks: { color: '#555', font: { size: 8 } } } },
                onClick: (e, el) => { if(el.length) { activeFilter = (activeFilter === labels[el[0].index]) ? null : labels[el[0].index]; renderTable(); } }
            }});
        }

        function renderTable() {
            const data = activeFilter ? MASTER_DATA.filter(s => s.SECTOR === activeFilter) : MASTER_DATA;
            data.sort((a,b) => {
                let v1 = a[sort.col], v2 = b[sort.col];
                return typeof v1 === 'string' ? (sort.asc ? v1.localeCompare(v2) : v2.localeCompare(v1)) : (sort.asc ? v1-v2 : v2-v1);
            });

            let h = `<table><thead><tr>`;
            COLS.forEach(f => h += `<th onclick="handleSort('${f}')" class="${f==='SYM'?'sticky':''}">${f}${sort.col===f?(sort.asc?'↑':'↓'):''}</th>`);
            h += `</tr></thead><tbody>`;
            data.forEach(s => {
                h += `<tr>`;
                COLS.forEach(f => {
                    let v = s[f] ?? '—', cls = f==='SYM'?'sticky' : (['PNL','CHG1D','PNL_PCT'].includes(f) ? (v>=0?'pos':'neg') : (f==='SIGNAL'?v:''));
                    if(f==='ROE') cls = v>15?'pos':(v>10?'neu':'neg');
                    h += `<td class="${cls}">${v}${['CHG1D','PNL_PCT','ROE'].includes(f)?'%':''}</td>`;
                });
                h += `</tr>`;
            });
            document.getElementById('app').innerHTML = h + `</tbody></table>`;
        }

        function handleSort(col) { sort.asc = sort.col===col ? !sort.asc : true; sort.col = col; renderTable(); }
        function openDB() { return new Promise(res => { const req = indexedDB.open(DB_NAME, 1); req.onupgradeneeded = e => e.target.result.createObjectStore(STORE, { keyPath: "SYM" }); req.onsuccess = () => res(req.result); }); }
        function init() { runBuild(); }
    </script>
</body>
</html>
