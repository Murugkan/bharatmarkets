<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>BharatMarkets | Computational Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #04060f; --s1: #0a0e1a; --s2: #121a2d; --b1: #1e293b; --gr1: #00f2ff; --gr2: #00ff88; --rd1: #ff4d6d; --tx3: #708499; }
        body { background: var(--bg); color: #fff; font-family: 'JetBrains Mono', monospace; margin: 0; overflow: hidden; }
        header { height: 65px; background: var(--s1); border-bottom: 1px solid var(--b1); padding: 5px 20px; display: flex; flex-direction: column; justify-content: center; }
        .logo { font-weight: 800; color: var(--gr1); font-size: 13px; }
        .totals-bar { display: flex; gap: 20px; font-size: 10px; margin-top: 5px; border-top: 1px solid var(--b1); padding-top: 5px; }
        .t-val { font-weight: 700; color: var(--gr1); }
        .view { width: 100%; overflow: auto; height: calc(100vh - 65px); }
        table { width: 100%; border-collapse: collapse; font-size: 10px; white-space: nowrap; }
        th { background: var(--s1); color: var(--tx3); padding: 12px 15px; position: sticky; top: 0; z-index: 10; border-bottom: 1px solid var(--b1); text-align: left; }
        td { padding: 12px 15px; border-bottom: 1px solid #182840; }
        .sticky { position: sticky; left: 0; background: var(--s2) !important; z-index: 5; border-right: 2px solid var(--gr1); color: var(--gr1); }
        .pos { color: var(--gr2); } .neg { color: var(--rd1); }
        .BUY { color: var(--gr2); font-weight: 800; border: 1px solid var(--gr2); padding: 1px 3px; }
        .SELL { color: var(--rd1); font-weight: 800; border: 1px solid var(--rd1); padding: 1px 3px; }
    </style>
</head>
<body onload="init()">

    <header>
        <div class="logo">BHARAT MARKETS | PORTFOLIO</div>
        <div class="totals-bar">
            <span>INV: <span class="t-val" id="t-inv">0</span></span>
            <span>CUR: <span class="t-val" id="t-cur">0</span></span>
            <span>P&L: <span class="t-val" id="t-pnl">0</span></span>
        </div>
    </header>

    <div id="app" class="view"></div>

    <script>
        const DB_NAME = "BharatCompDB"; const STORE = "Portfolio";

        // THE SELECTIVE LIST: Bringing computed and raw fields together
        const COLS = [
            { id: 'SYM', label: 'SYMBOL' },
            { id: 'QTY', label: 'QTY' },
            { id: 'AVG', label: 'AVG' },
            { id: 'LTP', label: 'LTP' },
            { id: 'CHG1D', label: '1D %' },
            { id: 'PNL', label: 'P&L' },         // Computed
            { id: 'PNL_PCT', label: 'P&L %' },   // Computed
            { id: 'ROE', label: 'ROE%' },
            { id: 'PE', label: 'P/E' },
            { id: 'SIGNAL', label: 'SIGNAL' },
            { id: 'SECTOR', label: 'SECTOR' }
        ];

        async function runPipeline() {
            const res = await fetch('fundamentals.json');
            const data = await res.json();
            const db = await openDB();
            const tx = db.transaction(STORE, "readwrite");
            const store = tx.objectStore(STORE);

            Object.keys(data.stocks).forEach(ticker => {
                const raw = data.stocks[ticker];
                const sym = ticker.split('.')[0].toUpperCase();
                
                const record = { SYM: sym };
                for (let key in raw) record[key.toUpperCase()] = raw[key];
                
                // --- THE COMPUTATIONS (The "Heavy Lifting") ---
                const q = record.QTY || 0;
                const a = record.AVG || 0;
                const l = record.LTP || 0;
                
                record.INV_VAL = q * a;
                record.CUR_VAL = q * l;
                record.PNL = record.CUR_VAL - record.INV_VAL;
                record.PNL_PCT = record.INV_VAL ? ((record.PNL / record.INV_VAL) * 100).toFixed(2) : 0;
                
                store.put(record); 
            });
            tx.oncomplete = () => render();
        }

        async function render() {
            const db = await openDB();
            const stocks = await new Promise(r => {
                db.transaction(STORE).objectStore(STORE).getAll().onsuccess = e => r(e.target.result);
            });

            // Header Totals from Computed DB fields
            let tInv = 0, tCur = 0, tPnl = 0;
            stocks.forEach(s => { tInv += s.INV_VAL; tCur += s.CUR_VAL; tPnl += s.PNL; });
            document.getElementById('t-inv').innerText = Math.round(tInv).toLocaleString();
            document.getElementById('t-cur').innerText = Math.round(tCur).toLocaleString();
            document.getElementById('t-pnl').innerText = Math.round(tPnl).toLocaleString();

            let h = `<table><thead><tr>`;
            COLS.forEach(f => h += `<th class="${f.id==='SYM'?'sticky':''}">${f.label}</th>`);
            h += `</tr></thead><tbody>`;

            stocks.forEach(s => {
                h += `<tr>`;
                COLS.forEach(f => {
                    let val = s[f.id] !== undefined ? s[f.id] : '—';
                    let cls = f.id === 'SYM' ? 'sticky' : '';
                    if (f.id === 'PNL' || f.id === 'CHG1D' || f.id === 'PNL_PCT') cls += ` ${val >= 0 ? 'pos' : 'neg'}`;
                    if (f.id === 'SIGNAL') cls += ` ${val}`;
                    
                    h += `<td class="${cls}">${val}${ (f.id==='CHG1D'||f.id==='PNL_PCT') && val!=='—' ? '%' : ''}</td>`;
                });
                h += `</tr>`;
            });
            document.getElementById('app').innerHTML = h + `</tbody></table>`;
        }

        function openDB() {
            return new Promise(res => {
                const req = indexedDB.open(DB_NAME, 1);
                req.onupgradeneeded = e => e.target.result.createObjectStore(STORE, { keyPath: "SYM" });
                req.onsuccess = () => res(req.result);
            });
        }

        function init() { runPipeline(); }
    </script>
</body>
</html>
