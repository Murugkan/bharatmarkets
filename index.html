<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bharat Markets // Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --card: #0a0a0a; --border: #1a1a1a; --accent: #00f2ff; --text: #fff; --text-dim: #555; --pos: #00ff88; --neg: #ff4d6d; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 20px; padding-bottom: 80px; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; margin: 0; }
        .stats { display: flex; gap: 15px; font-size: 11px; color: var(--text-dim); }
        .search-container { margin-bottom: 20px; }
        #search { width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 12px; font-size: 14px; outline: none; }
        #search:focus { border-color: var(--accent); }
        .table-container { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { background: #0f0f0f; text-align: left; padding: 15px; color: var(--text-dim); font-size: 10px; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; border-bottom: 1px solid var(--border); }
        td { padding: 15px; border-bottom: 1px solid var(--border); }
        tr:last-child td { border-bottom: none; }
        .sym { font-weight: 700; color: var(--accent); }
        .up { color: var(--pos); }
        .down { color: var(--neg); }
        .sec { font-size: 11px; color: var(--text-dim); background: #111; padding: 3px 6px; border-radius: 4px; }
        
        /* THE ADDED FOOTER NAVIGATION */
        footer { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 15px 0; z-index: 1000; }
        .nav-link { color: var(--text-dim); text-decoration: none; display: flex; flex-direction: column; align-items: center; font-size: 9px; font-weight: 700; text-transform: uppercase; }
        .nav-link.active { color: var(--accent); }
    </style>
</head>
<body>

    <header>
        <h1>PORTFOLIO</h1>
        <div class="stats">
            <span id="count">0 Stocks</span>
            <span id="total-val">--</span>
        </div>
    </header>

    <div class="search-container">
        <input type="text" id="search" placeholder="Search symbol or sector..." onkeyup="filterTable()">
    </div>

    <div class="table-container">
        <table id="portfolio">
            <thead>
                <tr>
                    <th onclick="sortTable(0)">Symbol</th>
                    <th onclick="sortTable(1)">LTP</th>
                    <th onclick="sortTable(2)">Change%</th>
                    <th onclick="sortTable(3)">Sector</th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>

    <footer>
        <a href="index.html" class="nav-link active">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>
            <span>Terminal</span>
        </a>
        <a href="nexus.html" class="nav-link">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path></svg>
            <span>Nexus</span>
        </a>
    </footer>

    <script src="js/app-portfolio.js"></script>
    <script>
        // YOUR ORIGINAL LOGIC UNTOUCHED
        async function loadData() {
            try {
                const r = await fetch('unified_data.json');
                const data = await r.json();
                renderTable(data);
            } catch (e) { console.log("Error loading data"); }
        }

        function renderTable(data) {
            const body = document.getElementById('table-body');
            body.innerHTML = '';
            document.getElementById('count').innerText = `${data.length} Stocks`;
            
            data.forEach(s => {
                const tr = document.createElement('tr');
                const c = s.changePct >= 0 ? 'up' : 'down';
                tr.innerHTML = `
                    <td class="sym">${s.sym}</td>
                    <td>${s.price.toFixed(2)}</td>
                    <td class="${c}">${s.changePct > 0 ? '+' : ''}${s.changePct.toFixed(2)}%</td>
                    <td><span class="sec">${s.sector}</span></td>
                `;
                body.appendChild(tr);
            });
        }

        function filterTable() {
            const q = document.getElementById('search').value.toUpperCase();
            const rows = document.querySelectorAll('#table-body tr');
            rows.forEach(r => {
                const txt = r.textContent.toUpperCase();
                r.style.display = txt.includes(q) ? '' : 'none';
            });
        }

        function sortTable(n) {
            const table = document.getElementById("portfolio");
            let rows, switching, i, x, y, shouldSwitch, dir, switchcount = 0;
            switching = true; dir = "asc";
            while (switching) {
                switching = false;
                rows = table.rows;
                for (i = 1; i < (rows.length - 1); i++) {
                    shouldSwitch = false;
                    x = rows[i].getElementsByTagName("TD")[n];
                    y = rows[i + 1].getElementsByTagName("TD")[n];
                    if (dir == "asc") {
                        if (x.innerHTML.toLowerCase() > y.innerHTML.toLowerCase()) { shouldSwitch = true; break; }
                    } else if (dir == "desc") {
                        if (x.innerHTML.toLowerCase() < y.innerHTML.toLowerCase()) { shouldSwitch = true; break; }
                    }
                }
                if (shouldSwitch) {
                    rows[i].parentNode.insertBefore(rows[i + 1], rows[i]);
                    switching = true; switchcount ++;
                } else {
                    if (switchcount == 0 && dir == "asc") { dir = "desc"; switching = true; }
                }
            }
        }
        window.onload = loadData;
    </script>
</body>
</html>
