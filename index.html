<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Soya Debug Mode</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <style>
    :root { --bg: #000; --s1: #0a0a0a; --s2: #161616; --b2: #333; --tx: #fff; --ac: #f97316; --mono: 'JetBrains Mono', monospace; }
    body { margin: 0; background: var(--bg); color: var(--tx); font-family: -apple-system, system-ui, sans-serif; }
    .app-header { padding: 20px; font-family: 'Syne', sans-serif; font-weight: 800; font-size: 24px; }
    .app-nav { display: flex; gap: 8px; padding: 0 20px 20px; }
    .nb { background: var(--s2); border: none; color: #888; padding: 10px 18px; border-radius: 20px; font-weight: 700; }
    .nb.active { background: var(--ac); color: #000; }
    
    /* Live Log Window */
    #debug-log { 
      position: fixed; bottom: 0; left: 0; width: 100%; height: 150px; 
      background: #111; border-top: 2px solid #444; color: #0f0; 
      font-family: var(--mono); font-size: 10px; padding: 10px; 
      overflow-y: auto; z-index: 9999; pointer-events: none;
    }

    .panel { position: fixed; bottom: -100%; left: 0; width: 100%; height: 85vh; background: var(--s1); border-top: 1px solid var(--b2); border-radius: 25px 25px 0 0; transition: 0.4s; z-index: 1001; padding: 20px; }
    .panel.on { bottom: 150px; } /* Push up above log */
    .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); opacity: 0; visibility: hidden; z-index: 1000; }
    .overlay.on { opacity: 1; visibility: visible; }
  </style>
</head>
<body>

  <header class="app-header">SOYA <small style="font-size:10px; color:var(--ac)">DEBUG</small></header>
  
  <nav class="app-nav">
    <button class="nb active" id="tab-portfolio" onclick="handleTab('portfolio')">Portfolio</button>
    <button class="nb" id="tab-watchlist" onclick="handleTab('watchlist')">Watchlist</button>
    <button class="nb" onclick="openImport()">Stock Upload</button>
  </nav>

  <main id="app-content">
    <div id="sector-grid"></div>
    <div id="stock-list" style="padding:20px; font-family:var(--mono); font-size:12px; color:#666;">Waiting for scripts...</div>
  </main>

  <div id="debug-log">Log initialized...<br></div>

  <div id="ov" class="overlay" onclick="closePanel()"></div>
  <div id="import-panel" class="panel">
    <div id="import-panel-body"></div>
  </div>

  <script>
    // 1. Immediate Logger
    const logEl = document.getElementById('debug-log');
    window.log = function(msg) {
      logEl.innerHTML += `> ${msg}<br>`;
      logEl.scrollTop = logEl.scrollHeight;
      console.log(msg);
    };

    window.onerror = function(m, u, l) { log(`ERR: ${m} at line ${l}`); };

    // 2. Global State
    window.S = {
      curTab: 'portfolio',
      portfolio: JSON.parse(localStorage.getItem('soya_portfolio') || '[]')
    };

    // 3. Script Loader Verification
    function checkScripts() {
      log("Checking scripts...");
      if (typeof render === 'function') log("✓ app-watchlist.js loaded");
      else log("✗ app-watchlist.js MISSING");
      
      if (typeof openImport === 'function') log("✓ app-import.js loaded");
      else log("✗ app-import.js MISSING");
    }

    window.handleTab = function(tab) {
      log(`Switching to ${tab}`);
      S.curTab = tab;
      document.querySelectorAll('.nb').forEach(b => b.classList.remove('active'));
      document.getElementById('tab-' + tab).classList.add('active');
      if (typeof render === 'function') render();
    };

    window.onload = () => {
      log("Window loaded.");
      checkScripts();
      handleTab('portfolio');
    };
  </script>

  <script src="app-core.js"></script>
  <script src="app-watchlist.js"></script>
  <script src="app-import.js"></script>
</body>
</html>
