<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Soya</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#000; --s1:#0a0a0a; --s2:#161616; --b2:#333; --tx:#fff; --ac:#f97316; --mono:'JetBrains Mono',monospace; }
    body { margin:0; background:var(--bg); color:var(--tx); font-family:-apple-system, system-ui, sans-serif; padding-bottom:160px; }
    .app-header { padding:24px 20px 12px; font-family:'Syne',sans-serif; font-weight:800; font-size:26px; }
    .app-nav { display:flex; gap:10px; padding:0 20px 20px; position:sticky; top:0; background:var(--bg); z-index:100; }
    .nb { background:var(--s2); border:none; color:#888; padding:10px 20px; border-radius:25px; font-size:14px; font-weight:700; outline:none; }
    .nb.active { background:var(--ac); color:#000; }
    
    /* Log Window */
    #debug-log { position:fixed; bottom:0; left:0; width:100%; height:120px; background:#111; border-top:2px solid #444; color:#0f0; font-family:var(--mono); font-size:11px; padding:10px; overflow-y:scroll; z-index:9999; pointer-events:auto; user-select:text; -webkit-user-select:text; }

    /* Panel & Overlay */
    .overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); opacity:0; visibility:hidden; z-index:1000; transition:0.3s; backdrop-filter: blur(4px); }
    .overlay.on { opacity:1; visibility:visible; }
    .panel { position:fixed; bottom:-100%; left:0; width:100%; height:90vh; background:var(--s1); border-top:1px solid var(--b2); border-radius:30px 30px 0 0; transition:0.4s cubic-bezier(0, 0.5, 0.5, 1); z-index:1001; padding:25px 20px; overflow-y:auto; }
    .panel.on { bottom:0; }
    
    /* Toast Notification */
    #toast { position:fixed; top:20px; left:50%; transform:translateX(-50%); background:var(--ac); color:#000; padding:12px 24px; border-radius:30px; font-weight:700; font-size:14px; z-index:10000; display:none; box-shadow:0 10px 30px rgba(0,0,0,0.5); }
  </style>
</head>
<body>

  <div id="toast"></div>
  <header class="app-header">SOYA</header>
  
  <nav class="app-nav">
    <button class="nb active" id="tab-portfolio" onclick="handleTab('portfolio')">Portfolio</button>
    <button class="nb" id="tab-watchlist" onclick="handleTab('watchlist')">Watchlist</button>
    <button class="nb" onclick="openImport()">Stock Upload</button>
  </nav>

  <main id="app-content">
    <div id="sector-grid"></div>
    <div id="stock-list"></div>
  </main>

  <div id="debug-log"></div>

  <div id="ov" class="overlay" onclick="closePanel()"></div>
  <div id="import-panel" class="panel">
    <div id="import-panel-body"></div>
  </div>

  <script src="app-core.js"></script>
  <script src="app-watchlist.js"></script>
  <script src="app-import.js"></script>

  <script>
    const logEl = document.getElementById('debug-log');
    window.log = (msg) => {
      const line = document.createElement('div');
      line.textContent = `> ${msg}`;
      logEl.appendChild(line);
      logEl.scrollTop = logEl.scrollHeight;
    };

    window.S = {
      curTab: 'portfolio',
      portfolio: JSON.parse(localStorage.getItem('soya_portfolio') || '[]'),
      settings: JSON.parse(localStorage.getItem('soya_settings') || '{}')
    };

    // UI HELPER FUNCTIONS
    window.toast = (msg) => {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.style.display = 'block';
      log(`TOAST: ${msg}`);
      setTimeout(() => { t.style.display = 'none'; }, 3000);
    };

    window.closePanel = () => {
      document.getElementById('ov').classList.remove('on');
      document.getElementById('import-panel').classList.remove('on');
      log("Panel Closed");
    };

    window.handleTab = (tab) => {
      S.curTab = tab;
      document.querySelectorAll('.nb').forEach(b => b.classList.remove('active'));
      document.getElementById('tab-' + tab).classList.add('active');
      if (typeof render === 'function') render();
    };

    window.onload = async () => {
      log("Booting system...");
      try {
        const res = await fetch('symbols.json');
        window.FUND = await res.json();
        window.ISIN_MAP = {};
        window.FUND.forEach(item => { if(item.isin) ISIN_MAP[item.isin] = item.sym; });
        log("✓ Symbols loaded");
      } catch(e) { log("! Symbols load fail"); }

      if (typeof render === 'function') render();
    };

    window.onerror = (m, u, l) => { log(`ERR: ${m} (Line ${l})`); };
  </script>
</body>
</html>
