</head>
<body>
    <header>
        <div class="kpi-box"><div class="kpi-label">Invested</div><div class="kpi-val" id="ki">—</div></div>
        <div class="kpi-box"><div class="kpi-label">Mkt Value</div><div class="kpi-val" id="kv">—</div></div>
        <div class="kpi-box"><div class="kpi-label">Total P&L</div><div class="kpi-val" id="kp">—</div></div>
    </header>
    <div id="bar-wrap"><div id="tape-bar"></div></div>
    <div id="legend"></div>
    <div id="active-label">&nbsp;</div>
    <div class="view"><div id="app"><div id="status">Loading…</div></div></div>

<script>
const PALETTE = ['#00f2ff','#7000ff','#ff007a','#ffb800','#00ff88','#007aff','#ff4d6d','#f97316','#a3e635'];
const FIELDS  = ['SYM','QTY','AVG','LTP','PNL','ROE','SECTOR'];

let DATA = [], SECTORS = [], COL = {}, filter = null;

function fmt(n){ return `₹${(n/100000).toFixed(2)}L`; }
function tap(sec){ filter = filter===sec ? null : sec; render(); }
function status(msg){ document.getElementById('status').innerHTML = msg; }

// ── Read portfolio from localStorage (S.portfolio) ──────────────
function getPortfolio() {
    // Your app stores state as S in localStorage — try common keys
    const keys = ['S', 'bharat_state', 'app_state', 'state'];
    for (const key of keys) {
        try {
            const raw = localStorage.getItem(key);
            if (!raw) continue;
            const obj = JSON.parse(raw);
            // S.portfolio is the array
            if (obj.portfolio && Array.isArray(obj.portfolio) && obj.portfolio.length > 0) {
                return obj.portfolio;
            }
        } catch(e) {}
    }
    // Also try direct 'portfolio' key
    try {
        const raw = localStorage.getItem('portfolio');
        if (raw) {
            const arr = JSON.parse(raw);
            if (Array.isArray(arr) && arr.length > 0) return arr;
        }
    } catch(e) {}
    return null;
}

// ── Build DATA by merging portfolio holdings + fundamentals ──────
async function boot() {
    const holdings = getPortfolio();

    if (!holdings || holdings.length === 0) {
        // Show all available localStorage keys to help debug
        const allKeys = Object.keys(localStorage);
        status(`No portfolio found in localStorage.<br><br>
            Keys found: <b style="color:#00f2ff">${allKeys.length > 0 ? allKeys.join(', ') : '(none)'}</b><br><br>
            This page must be served from the <b>same origin</b> as your main app.`);
        return;
    }

    // Load fundamentals.json for live ltp + sector + roe
    let fund = {};
    try {
        const res = await fetch('fundamentals.json');
        if (res.ok) {
            const json = await res.json();
            fund = json.stocks || {};
        }
    } catch(e) {}

    DATA = holdings
        .filter(h => h.sym && h.qty > 0)
        .map(h => {
            const f   = fund[h.sym] || fund[h.sym + '.NS'] || {};
            const ltp = f.ltp || h.ltp || 0;
            const avg = h.avgBuy || h.avg || 0;
            const qty = h.qty || 0;
            const cost = qty * avg;
            const mkt  = qty * ltp;
            return {
                SYM:    h.sym,
                QTY:    qty,
                AVG:    avg,
                LTP:    ltp,
                SECTOR: f.sector || h.sector || 'Other',
                ROE:    f.roe    || h.roe    || 0,
                COST:   cost,
                MKT:    mkt,
                PNL:    Math.round(mkt - cost)
            };
        })
        .filter(d => d.QTY > 0);

    if (DATA.length === 0) {
        status('Portfolio found but no valid holdings with qty > 0.');
        return;
    }

    SECTORS = [...new Set(DATA.map(s => s.SECTOR))];
    SECTORS.forEach((s, i) => COL[s] = PALETTE[i % PALETTE.length]);
    render();
}

function render() {
    // KPIs
    let tI=0, tM=0, tP=0;
    DATA.forEach(s => { tI += s.COST; tM += s.MKT; tP += s.PNL; });
    document.getElementById('ki').textContent = fmt(tI);
    document.getElementById('kv').textContent = fmt(tM);
    const kp = document.getElementById('kp');
    kp.textContent = fmt(tP);
    kp.style.color = tP >= 0 ? '#00ff88' : '#ff4d6d';

    // Bar
    const sc = {};
    DATA.forEach(s => { sc[s.SECTOR] = (sc[s.SECTOR]||0) + s.COST; });
    const total = Object.values(sc).reduce((a,b)=>a+b, 0);
    document.getElementById('tape-bar').innerHTML = SECTORS.map(sec => {
        const pct = (sc[sec]/total*100).toFixed(2);
        const dim = filter && filter !== sec ? ' dimmed' : '';
        return `<div class="seg${dim}" style="width:${pct}%;background:${COL[sec]}"
                     onclick="tap('${sec}')">${pct > 9 ? sec : ''}</div>`;
    }).join('');

    // Legend
    document.getElementById('legend').innerHTML = SECTORS.map(sec =>
        `<div class="leg ${filter===sec?'on':''}" onclick="tap('${sec}')">
            <div class="dot" style="background:${COL[sec]}"></div>${sec}</div>`
    ).join('');

    // Active label
    document.getElementById('active-label').innerHTML =
        filter ? `Sector: <span>${filter}</span> — tap again to clear` : '&nbsp;';

    // Table
    const rows = filter ? DATA.filter(s => s.SECTOR === filter) : DATA;
    let h = `<table><thead><tr>`
        + FIELDS.map(f => `<th${f==='SYM'?' class="pin"':''}>${f}</th>`).join('')
        + `</tr></thead><tbody>`;
    rows.forEach(s => {
        h += `<tr>` + FIELDS.map(f => {
            const v = s[f] ?? '—';
            const c = f==='SYM' ? 'pin' : f==='PNL' ? (v>=0?'pos':'neg') : '';
            return `<td${c?` class="${c}"`:''}>${v}${f==='ROE'?'%':''}</td>`;
        }).join('') + `</tr>`;
    });
    document.getElementById('app').innerHTML = h + `</tbody></table>`;
}

boot();
</script>

</body>
</html>
