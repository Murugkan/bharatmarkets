<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>BharatMarkets | Onyx Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #000000;      /* Pure Black */
            --s1: #0a0a0a;      /* Near Black for Header */
            --s2: #111111;      /* Sticky Column Background */
            --b1: #222222;      /* Borders */
            
            /* Appealing Heatmap Palette (Box Backgrounds) */
            --bg-gr: #064e3b;   /* Deep Emerald Green */
            --bg-rd: #7f1d1d;   /* Deep Maroon/Red */
            --bg-yl: #78350f;   /* Deep Amber/Yellow */
            --bg-bl: #1e3a8a;   /* Deep Royal Blue */
            
            /* Text & Accents */
            --fg-bl: #00f2ff;   /* Neon Cyan for Symbols */
            --tx: #ffffff;      /* High-Contrast White */
            --tx-dim: #888888;  /* Dimmed Headers */
        }

        body { background: var(--bg); color: var(--tx); font-family: 'JetBrains Mono', monospace; margin: 0; overflow: hidden; }
        
        header { height: 60px; background: var(--s1); border-bottom: 1px solid var(--b1); padding: 0 20px; display: flex; align-items: center; justify-content: space-between; }
        .logo { font-weight: 800; color: var(--fg-bl); font-size: 14px; letter-spacing: 1px; }
        .t-box { font-size: 11px; color: var(--tx-dim); }
        .t-val { color: #00ff88; font-weight: 700; font-size: 13px; text-shadow: 0 0 8px rgba(0,255,136,0.4); }

        .view { width: 100%; overflow: auto; height: calc(100vh - 60px); }
        table { width: 100%; border-collapse: collapse; font-size: 11px; white-space: nowrap; }
        
        th { background: var(--s1); color: var(--tx-dim); padding: 15px; position: sticky; top: 0; z-index: 10; border-bottom: 2px solid var(--b1); text-align: left; cursor: pointer; text-transform: uppercase; }
        td { padding: 14px 15px; border-bottom: 1px solid #1a1a1a; transition: background 0.2s; }
        
        /* Sticky Symbol Logic */
        .sticky { position: sticky; left: 0; background: var(--s2) !important; z-index: 5; border-right: 1px solid var(--b1); color: var(--fg-bl); font-weight: 700; }
        
        /* Full Box Color Logic */
        .pos { background-color: var(--bg-gr) !important; color: #ffffff !important; font-weight: 600; }
        .neg { background-color: var(--bg-rd) !important; color: #ffffff !important; font-weight: 600; }
        .neu { background-color: var(--bg-yl) !important; color: #ffffff !important; }
        .inf { background-color: var(--bg-bl) !important; color: #ffffff !important; }

        /* Signal Blocks: Solid Bright Colors with Black Text for "Alert" feel */
        .BUY { background-color: #00ff88 !important; color: #000 !important; font-weight: 800; border-radius: 2px; text-align: center; display: block; width: 100%; }
        .SELL { background-color: #ff4d6d !important; color: #000 !important; font-weight: 800; border-radius: 2px; text-align: center; display: block; width: 100%; }
        .HOLD { color: #ffb800; font-weight: 800; text-align: center; }
    </style>
</head>
<body onload="init()">

    <header>
        <div class="logo">BHARAT MARKETS</div>
        <div class="t-box">GRAND INVESTED: <span class="t-val" id="t-inv">₹ 0</span></div>
    </header>

    <div id="app" class="view"></div>

    <script>
        const DB_NAME = "OnyxTerminalDB"; const STORE = "MasterData";
        let MASTER_DATA = []; let currentSort = { col: 'SYM', asc: true };

        const FIELDS = ['SYM', 'QTY', 'AVG', 'LTP', 'CHG1D', 'PNL', 'PNL_PCT', 'ROE', 'PE', 'SIGNAL', 'POS', 'NEG', 'SECTOR'];

        async function runBuild() {
            const res = await fetch('fundamentals.json');
            const data = await res.json();
            const db = await openDB();
            const tx = db.transaction(STORE, "readwrite");
            const store = tx.objectStore(STORE);

            Object.keys(data.stocks).forEach(ticker => {
                const raw = data.stocks[ticker];
                const record = { SYM: ticker.split('.')[0].toUpperCase() };
                for (let key in raw) record[key.toUpperCase()] = raw[key];
                
                const q = record.QTY || 0; const a = record.AVG || 0; const l = record.LTP || 0;
                record.INV_VAL = q * a;
                record.PNL = Math.round((q * l) - record.INV_VAL);
                record.PNL_PCT = record.INV_VAL ? parseFloat(((record.PNL / record.INV_VAL) * 100).toFixed(2)) : 0;

                // Simple Pos/Neg Indicators
                record.POS = (record.ROE > 15 ? 1 : 0) + (record.PE < 25 ? 1 : 0) + (record.CHG1D > 0 ? 1 : 0);
                record.NEG = 3 - record.POS;

                store.put(record);
            });
            tx.oncomplete = () => loadAndRender();
        }

        function getCellClass(field, val) {
            if (field === 'SYM') return 'sticky';
            if (field === 'SIGNAL') return val;
            
            if (['PNL', 'CHG1D', 'PNL_PCT'].includes(field)) return val >= 0 ? 'pos' : 'neg';
            if (field === 'ROE') return val > 15 ? 'pos' : (val > 10 ? 'neu' : 'neg');
            if (field === 'PE') return val < 20 ? 'pos' : (val < 40 ? 'neu' : 'neg');
            if (field === 'POS') return 'pos';
            if (field === 'NEG') return 'neg';
            if (field === 'SECTOR') return 'inf';
            return '';
        }

        async function loadAndRender() {
            const db = await openDB();
            MASTER_DATA = await new Promise(r => {
                db.transaction(STORE).objectStore(STORE).getAll().onsuccess = e => r(e.target.result);
            });
            renderTable();
        }

        function renderTable() {
            const totalInv = MASTER_DATA.reduce((sum, s) => sum + (s.INV_VAL || 0), 0);
            document.getElementById('t-inv').innerText = '₹ ' + Math.round(totalInv).toLocaleString('en-IN');

            const sorted = [...MASTER_DATA].sort((a, b) => {
                let v1 = a[currentSort.col], v2 = b[currentSort.col];
                if (typeof v1 === 'string') return currentSort.asc ? v1.localeCompare(v2) : v2.localeCompare(v1);
                return currentSort.asc ? v1 - v2 : v2 - v1;
            });

            let h = `<table><thead><tr>`;
            FIELDS.forEach(f => {
                const arrow = currentSort.col === f ? (currentSort.asc ? ' ↑' : ' ↓') : '';
                h += `<th onclick="handleSort('${f}')" class="${f==='SYM'?'sticky':''}">${f}${arrow}</th>`;
            });
            h += `</tr></thead><tbody>`;

            sorted.forEach(s => {
                h += `<tr>`;
                FIELDS.forEach(f => {
                    let val = s[f] !== undefined ? s[f] : '—';
                    let cls = getCellClass(f, val);
                    let suffix = (f==='CHG1D'||f==='PNL_PCT'||f==='ROE') && val!=='—' ? '%' : '';
                    h += `<td class="${cls}">${val}${suffix}</td>`;
                });
                h += `</tr>`;
            });
            document.getElementById('app').innerHTML = h + `</tbody></table>`;
        }

        function handleSort(col) {
            if (currentSort.col === col) currentSort.asc = !currentSort.asc;
            else { currentSort.col = col; currentSort.asc = true; }
            renderTable();
        }

        function openDB() {
            return new Promise(res => {
                const req = indexedDB.open(DB_NAME, 1);
                req.onupgradeneeded = e => e.target.result.createObjectStore(STORE, { keyPath: "SYM" });
                req.onsuccess = () => res(req.result);
            });
        }

        function init() { runBuild(); }
    </script>
</body>
</html>
