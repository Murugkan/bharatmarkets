<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>Onyx | Full Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg:#000; --s1:#0a0a0a; --b1:#222; --bl:#00f2ff; --gr:#064e3b; --rd:#7f1d1d; --tx:#fff; }
        *{box-sizing:border-box;margin:0;padding:0;}
        body { background:var(--bg); color:var(--tx); font-family:'JetBrains Mono',monospace; overflow:hidden; }
        
        header { background:var(--s1); border-bottom:1px solid var(--b1); padding:12px; display:flex; justify-content:space-around; }
        .kpi-box { text-align:center; }
        .kpi-label { font-size:8px; color:#666; text-transform:uppercase; letter-spacing:1px; }
        .kpi-val { font-size:14px; font-weight:800; margin-top:2px; color:var(--bl); }

        #bar-wrap { padding:12px; background:#111; border-bottom:1px solid var(--b1); }
        #tape-bar { width:100%; height:34px; border-radius:4px; overflow:hidden; display:flex; background:#050505; }
        .seg { height:100%; cursor:pointer; display:flex; align-items:center; justify-content:center;
               font-size:9px; font-weight:800; color:#000; overflow:hidden; white-space:nowrap; transition: opacity 0.2s; }
        .seg.dimmed { opacity:0.15; }

        #legend { display:flex; flex-wrap:wrap; gap:6px 12px; padding:8px 12px; border-bottom:1px solid var(--b1); background:#000; }
        .leg { display:flex; align-items:center; gap:6px; font-size:9px; color:#777; cursor:pointer; }
        .leg.on { color:#fff; font-weight:800; }
        .dot { width:8px; height:8px; border-radius:2px; flex-shrink:0; }
        
        #filter-label { font-size:9px; color:#444; padding:6px 12px; border-bottom:1px solid #111; min-height:24px; background:#050505; }
        #filter-label span { color:var(--bl); font-weight:800; }

        .view { width:100%; overflow:auto; height:calc(100vh - 210px); background:#000; }
        table { width:100%; border-collapse:collapse; font-size:11px; white-space:nowrap; }
        th { background:var(--s1); color:#555; padding:12px; position:sticky; top:0; z-index:10; border-bottom:2px solid var(--b1); text-align:left; text-transform: uppercase; }
        td { padding:12px; border-bottom:1px solid #111; color:#eee; }
        
        .sticky { position:sticky; left:0; background:#0a0a0a!important; z-index:5; border-right:1px solid var(--b1); color:var(--bl)!important; font-weight:800; }
        
        .pos { background:var(--gr)!important; color:#fff!important; }
        .neg { background:var(--rd)!important; color:#fff!important; }
        #loading { padding:60px; text-align:center; color:var(--bl); font-size:12px; }
    </style>
</head>
<body>

    <header>
        <div class="kpi-box"><div class="kpi-label">Holdings</div><div class="kpi-val" id="kpi-count">—</div></div>
        <div class="kpi-box"><div class="kpi-label">Net P&L</div><div class="kpi-val" id="kpi-pnl">—</div></div>
        <div class="kpi-box"><div class="kpi-label">Sectors</div><div class="kpi-val" id="kpi-sec">—</div></div>
    </header>

    <div id="bar-wrap"><div id="tape-bar"></div></div>
    <div id="legend"></div>
    <div id="filter-label">Syncing data engine...</div>

    <div class="view">
        <div id="app"><div id="loading">LOADING MODULES...</div></div>
    </div>

<script>
// --- FULL FIELD DEFINITION ---
const FIELDS  = ['SYM','LTP','PNL','PNL%','ROE','PE','PB','MCAP','SECTOR'];
const PALETTE = ['#00f2ff','#7000ff','#ff007a','#ffb800','#00ff88','#007aff','#ff4d6d','#f97316','#a3e635','#ec4899'];

let DATA = [], SECTORS = [], COL = {}, filter = null;

async function init() {
    try {
        const res = await fetch('fundamentals.json');
        const json = await res.json();

        DATA = Object.keys(json.stocks).map(ticker => {
            const s = json.stocks[ticker];
            const qty = s.qty || 0;
            const avg = s.avgBuy || 0;
            const ltp = s.ltp || 0;
            
            // Logic: If personal data exists, calc PNL; else show '—'
            const cost = qty * avg;
            const mkt  = qty * ltp;
            const pnl  = qty > 0 ? Math.round(mkt - cost) : null;
            const pnlP = cost > 0 ? ((pnl / cost) * 100).toFixed(1) : null;

            return {
                SYM:    ticker.split('.')[0].toUpperCase(),
                LTP:    ltp,
                'PNL':  pnl !== null ? pnl : '—',
                'PNL%': pnlP !== null ? pnlP + '%' : '—',
                ROE:    s.roe || 0,
                PE:     s.pe ? +s.pe.toFixed(1) : '—',
                PB:     s.pb ? +s.pb.toFixed(2) : '—',
                MCAP:   s.mcap ? Math.round(s.mcap) : 0,
                SECTOR: s.sector || 'Other',
                _w:     s.mcap || ltp || 1, // Bar weighting
                _rawP:  pnl // Helper for KPI coloring
            };
        }).filter(d => d.LTP > 0);

        SECTORS = [...new Set(DATA.map(s => s.SECTOR))].sort();
        SECTORS.forEach((s, i) => COL[s] = PALETTE[i % PALETTE.length]);

        render();
    } catch (e) {
        document.getElementById('loading').innerHTML = `ERROR: JSON FETCH FAILED`;
    }
}

function render() {
    // 1. KPIs
    let totalPnl = 0;
    DATA.forEach(s => { if(typeof s._rawP === 'number') totalPnl += s._rawP; });
    
    document.getElementById('kpi-count').textContent = DATA.length;
    document.getElementById('kpi-sec').textContent = SECTORS.length;
    
    const pnlEl = document.getElementById('kpi-pnl');
    pnlEl.textContent = totalPnl !== 0 ? `₹${(totalPnl/100000).toFixed(2)}L` : 'GLOBAL';
    pnlEl.style.color = totalPnl >= 0 ? '#00ff88' : '#ff4d6d';

    // 2. TAPE BAR
    const sc = {};
    DATA.forEach(s => { sc[s.SECTOR] = (sc[s.SECTOR] || 0) + s._w; });
    const total = Object.values(sc).reduce((a, b) => a + b, 0);

    document.getElementById('tape-bar').innerHTML = SECTORS.map(sec => {
        const pct = (sc[sec] / total * 100).toFixed(2);
        const dim = filter && filter !== sec ? ' dimmed' : '';
        return `<div class="seg${dim}" style="width:${pct}%;background:${COL[sec]}" 
                     onclick="tap('${sec}')">${pct > 8 ? sec : ''}</div>`;
    }).join('');

    // 3. LEGEND
    document.getElementById('legend').innerHTML = SECTORS.map(sec => `
        <div class="leg ${filter === sec ? 'on' : ''}" onclick="tap('${sec}')">
            <div class="dot" style="background:${COL[sec]}"></div>${sec}
        </div>
    `).join('');

    // 4. TABLE
    const rows = filter ? DATA.filter(s => s.SECTOR === filter) : DATA;
    let h = `<table><thead><tr>` + FIELDS.map(f => `<th class="${f==='SYM'?'sticky':''}">${f}</th>`).join('') + `</tr></thead><tbody>`;
    
    rows.forEach(s => {
        h += `<tr>` + FIELDS.map(f => {
            const v = s[f] ?? '—';
            let c = f === 'SYM' ? 'sticky' : '';
            
            // Heatmap: PNL & ROE
            if ((f === 'PNL' || f === 'PNL%') && typeof s._rawP === 'number') {
                c += s._rawP >= 0 ? ' pos' : ' neg';
            }
            if (f === 'ROE' && v !== '—') {
                if (v > 22) c += ' pos';
                else if (v < 12) c += ' neg';
            }

            return `<td class="${c}">${v}</td>`;
        }).join('') + `</tr>`;
    });

    document.getElementById('app').innerHTML = h + `</tbody></table>`;
    document.getElementById('filter-label').innerHTML = filter ? `Sector: <span>${filter}</span>` : "Terminal: All Sectors Active";
}

function tap(sec) { filter = filter === sec ? null : sec; render(); }

init();
</script>
</body>
</html>
