<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>BharatMarkets Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #04060d; --s1: #0a0e1a; --s2: #121a2d;
            --b1: #1e293b; --gr1: #00f2ff; --rd2: #ff4d4d;
            --tx1: #ffffff; --tx3: #708499;
        }
        body { background: var(--bg); color: var(--tx1); font-family: 'DM Sans', sans-serif; margin: 0; overflow-x: hidden; }
        
        /* Navigation */
        #nav { position: fixed; bottom: 0; width: 100%; background: var(--s1); display: flex; border-top: 1px solid var(--b1); z-index: 100; padding-bottom: env(safe-area-inset-bottom); }
        .nb { flex: 1; background: none; border: none; color: var(--tx3); padding: 15px 0; font-size: 10px; font-weight: bold; text-transform: uppercase; }
        .nb.active { color: var(--gr1); }
        
        /* Content Area */
        #content { min-height: 100vh; padding-bottom: 80px; }

        /* Debug Window */
        #debug-window { position: fixed; top: 10px; right: 10px; width: 80%; max-height: 200px; background: rgba(0,0,0,0.9); border: 1px solid var(--b1); font-size: 10px; overflow-y: auto; display: none; z-index: 1000; padding: 10px; font-family: monospace; }
        
        /* UI Components */
        .card { background: var(--s2); border: 1px solid var(--b1); border-radius: 12px; padding: 16px; margin-bottom: 12px; }
        .btn-main { background: var(--gr1); color: var(--bg); border: none; padding: 16px; border-radius: 12px; font-weight: 800; width: 100%; font-family: 'Syne'; }
    </style>
</head>
<body onload="init()">

    <div id="debug-window"></div>
    <div id="content"></div>

    <nav id="nav">
        <button class="nb active" onclick="showTab('portfolio', this)">Portfolio</button>
        <button class="nb" onclick="showTab('upload', this)">Import</button>
        <button class="nb" onclick="toggleDebug()">Debug</button>
    </nav>

    <script>
        /* ═══════════════════════════════════════════════════════════
           CORE ENGINE & STATE
        ═══════════════════════════════════════════════════════════ */
        const DB_NAME = 'BharatEngineDB';
        const STORE = 'UnifiedStocks';
        let currentTab = 'portfolio';

        function log(msg, type = 'info') {
            const dbg = document.getElementById('debug-window');
            dbg.innerHTML = `<div>[${type}] ${msg}</div>` + dbg.innerHTML;
            console.log(msg);
        }

        function toggleDebug() {
            const dbg = document.getElementById('debug-window');
            dbg.style.display = dbg.style.display === 'none' ? 'block' : 'none';
        }

        async function initDB() {
            return new Promise((resolve) => {
                const req = indexedDB.open(DB_NAME, 1);
                req.onupgradeneeded = (e) => {
                    if (!e.target.result.objectStoreNames.contains(STORE))
                        e.target.result.createObjectStore(STORE, { keyPath: 'sym' });
                };
                req.onsuccess = (e) => resolve(e.target.result);
            });
        }

        /* ═══════════════════════════════════════════════════════════
           NAVIGATION & RENDERING
        ═══════════════════════════════════════════════════════════ */
        async function showTab(t, btn) {
            currentTab = t;
            document.querySelectorAll('.nb').forEach(b => b.classList.remove('active'));
            if(btn) btn.classList.add('active');
            render();
        }

        async function render() {
            const container = document.getElementById('content');
            if (currentTab === 'portfolio') await renderPortfolio(container);
            else if (currentTab === 'upload') renderImportUI(container);
        }

        /* ═══════════════════════════════════════════════════════════
           PORTFOLIO LOGIC
        ═══════════════════════════════════════════════════════════ */
        async function renderPortfolio(container) {
            const db = await initDB();
            const stocks = await new Promise(r => {
                const tx = db.transaction(STORE, 'readonly');
                tx.objectStore(STORE).getAll().onsuccess = (e) => r(e.target.result || []);
            });

            log(`Rendering ${stocks.length} stocks`);

            if (stocks.length === 0) {
                container.innerHTML = `<div style="padding:100px 20px; text-align:center;">
                    <div style="font-size:50px">📁</div>
                    <p style="color:var(--tx3)">No data found. Go to Import.</p>
                </div>`;
                return;
            }

            let html = `<div style="padding:30px 20px; background:var(--s1); border-bottom:1px solid var(--b1)">
                <div style="font-size:11px; color:var(--tx3)">PORTFOLIO</div>
                <div style="font-size:32px; font-weight:800; font-family:Syne">${stocks.length} Stocks</div>
            </div><div style="padding:16px">`;

            stocks.forEach(s => {
                html += `<div class="card">
                    <div style="font-weight:800; font-size:18px">${s.sym}</div>
                    <div style="color:var(--tx3); font-size:13px">Qty: ${s.qty}</div>
                </div>`;
            });
            container.innerHTML = html + `</div>`;
        }

        /* ═══════════════════════════════════════════════════════════
           IMPORT LOGIC
        ═══════════════════════════════════════════════════════════ */
        function renderImportUI(container) {
            container.innerHTML = `
                <div style="padding:40px 20px">
                    <h2 style="font-family:Syne">Import Data</h2>
                    <textarea id="import-area" placeholder="RELIANCE 10" style="width:100%; height:200px; background:var(--s2); border:1px solid var(--b1); color:white; border-radius:12px; padding:15px; margin-bottom:20px; box-sizing:border-box; outline:none;"></textarea>
                    <button class="btn-main" onclick="processImport()">SAVE TO DATABASE</button>
                </div>`;
        }

        async function processImport() {
            const txt = document.getElementById('import-area').value;
            const lines = txt.split('\n');
            const stocks = [];

            lines.forEach(l => {
                const p = l.trim().split(/\s+/);
                if (p.length >= 2) stocks.push({ sym: p[0].toUpperCase(), qty: parseInt(p[1]) });
            });

            if (stocks.length > 0) {
                const db = await initDB();
                const tx = db.transaction(STORE, 'readwrite');
                stocks.forEach(s => tx.objectStore(STORE).put(s));
                tx.oncomplete = () => {
                    log(`Imported ${stocks.length} stocks`);
                    showTab('portfolio');
                };
            }
        }

        function init() {
            log("System Unified & Ready.");
            render();
        }
    </script>
</body>
</html>
