<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>BharatMarkets | Tape Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg:#000; --s1:#0a0a0a; --b1:#222; --bl:#00f2ff; --gr:#064e3b; --rd:#7f1d1d; --tx:#fff; }
        *{box-sizing:border-box;margin:0;padding:0;}
        body { background:var(--bg); color:var(--tx); font-family:'JetBrains Mono',monospace; overflow:hidden; }
        header { background:var(--s1); border-bottom:1px solid var(--b1); padding:12px; display:flex; justify-content:space-around; }
        .kpi-box { text-align:center; }
        .kpi-label { font-size:8px; color:#666; text-transform:uppercase; }
        .kpi-val { font-size:14px; font-weight:800; margin-top:2px; }
        #bar-wrap { padding:10px; background:#111; border-bottom:1px solid var(--b1); }
        #tape-bar { width:100%; height:32px; border-radius:4px; overflow:hidden; display:flex; }
        .seg { height:100%; cursor:pointer; display:flex; align-items:center; justify-content:center;
               font-size:8px; font-weight:800; color:#000; overflow:hidden; white-space:nowrap; }
        .seg.dimmed { opacity:0.2; }
        #legend { display:flex; flex-wrap:wrap; gap:4px 10px; padding:6px 10px; border-bottom:1px solid var(--b1); }
        .leg { display:flex; align-items:center; gap:4px; font-size:9px; color:#777; cursor:pointer; }
        .leg.on { color:#fff; }
        .dot { width:8px; height:8px; border-radius:2px; flex-shrink:0; }
        #filter-label { font-size:9px; color:#555; padding:3px 10px; border-bottom:1px solid #111; min-height:16px; }
        #filter-label span { color:var(--bl); font-weight:800; }
        .view { width:100%; overflow:auto; height:calc(100vh - 196px); }
        table { width:100%; border-collapse:collapse; font-size:11px; white-space:nowrap; }
        th { background:var(--s1); color:#666; padding:12px; position:sticky; top:0; z-index:10; border-bottom:1px solid var(--b1); text-align:left; }
        td { padding:12px; border-bottom:1px solid #111; color:#fff; }
        .sticky { position:sticky; left:0; background:#111!important; z-index:5; border-right:1px solid var(--b1); color:var(--bl)!important; font-weight:800; }
        .pos { background:var(--gr)!important; }
        .neg { background:var(--rd)!important; }
    </style>
</head>
<body>
    <header>
        <div class="kpi-box"><div class="kpi-label">Invested</div><div class="kpi-val" id="kpi-inv">—</div></div>
        <div class="kpi-box"><div class="kpi-label">Mkt Value</div><div class="kpi-val" id="kpi-val">—</div></div>
        <div class="kpi-box"><div class="kpi-label">Total P&L</div><div class="kpi-val" id="kpi-pnl">—</div></div>
    </header>
    <div id="bar-wrap"><div id="tape-bar"></div></div>
    <div id="legend"></div>
    <div id="filter-label">&nbsp;</div>
    <div class="view"><div id="app"></div></div>

<script>
const FIELDS  = ['SYM','LTP','ROE','SECTOR','PE','PB','MCAP'];
const PALETTE = ['#00f2ff','#7000ff','#ff007a','#ffb800','#00ff88','#007aff','#ff4d6d','#f97316','#a3e635'];

let DATA = [], SECTORS = [], COL = {}, filter = null;

async function init() {
    const res  = await fetch('fundamentals.json');
    const json = await res.json();

    // Build flat array from fundamentals.json — no qty/avgBuy needed
    DATA = Object.keys(json.stocks).map(ticker => {
        const s   = json.stocks[ticker];
        const sym = ticker.split('.')[0].toUpperCase();
        return {
            SYM:    sym,
            LTP:    s.ltp    || 0,
            ROE:    s.roe    || 0,
            SECTOR: s.sector || 'Other',
            PE:     s.pe     ? +s.pe.toFixed(1)   : '—',
            PB:     s.pb     ? +s.pb.toFixed(2)   : '—',
            MCAP:   s.mcap   ? +s.mcap.toFixed(0) : '—',
            // weight for bar = mcap (best proxy for sector size)
            _w:     s.mcap   || s.ltp || 1
        };
    }).filter(d => d.LTP > 0);

    SECTORS = [...new Set(DATA.map(s => s.SECTOR))];
    SECTORS.forEach((s, i) => COL[s] = PALETTE[i % PALETTE.length]);

    render();
}

function render() {
    // KPIs — count & sector breakdown
    const n = DATA.length;
    document.getElementById('kpi-inv').textContent  = n + ' stocks';
    document.getElementById('kpi-val').textContent  = SECTORS.length + ' sectors';
    document.getElementById('kpi-pnl').textContent  = filter || 'All';
    document.getElementById('kpi-pnl').style.color  = '#00f2ff';

    // Bar — weighted by mcap
    const sc = {};
    DATA.forEach(s => { sc[s.SECTOR] = (sc[s.SECTOR]||0) + s._w; });
    const total = Object.values(sc).reduce((a,b) => a+b, 0);

    document.getElementById('tape-bar').innerHTML = SECTORS.map(sec => {
        const pct = (sc[sec] / total * 100).toFixed(2);
        const dim = filter && filter !== sec ? ' dimmed' : '';
        return `<div class="seg${dim}" style="width:${pct}%;background:${COL[sec]}"
                     onclick="tap('${sec}')">${pct > 7 ? sec : ''}</div>`;
    }).join('');

    // Legend
    document.getElementById('legend').innerHTML = SECTORS.map(sec =>
        `<div class="leg ${filter===sec?'on':''}" onclick="tap('${sec}')">
            <div class="dot" style="background:${COL[sec]}"></div>${sec}</div>`
    ).join('');

    // Filter label
    document.getElementById('filter-label').innerHTML =
        filter ? `Sector: <span>${filter}</span> — tap again to clear` : '&nbsp;';

    // Table
    const rows = filter ? DATA.filter(s => s.SECTOR === filter) : DATA;
    let h = `<table><thead><tr>`
        + FIELDS.map(f => `<th${f==='SYM'?' class="sticky"':''}>${f}</th>`).join('')
        + `</tr></thead><tbody>`;
    rows.forEach(s => {
        h += `<tr>` + FIELDS.map(f => {
            const v = s[f] ?? '—';
            const c = f==='SYM' ? 'sticky' : '';
            return `<td${c?` class="${c}"`:''}>${v}${f==='ROE'?'%':''}</td>`;
        }).join('') + `</tr>`;
    });
    document.getElementById('app').innerHTML = h + `</tbody></table>`;
}

function tap(sec){ filter = filter===sec ? null : sec; render(); }

init();
</script>

</body>
</html>
