<!DOCTYPE html>
<html lang="en">
<!-- BUILD: 2026-03-22-v8 -->
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black"/>
<meta name="theme-color" content="#04060d"/>
<title>BharatMarkets Pro</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
/* ═══════════════════════════════════════════
   FIX #1: HIGH CONTRAST DARK THEME
   All text must be clearly visible on dark bg
═══════════════════════════════════════════ */
:root{
  --bg:#02040a;
  --s1:#070c18;
  --s2:#0d1525;
  --card:#111d30;
  --b1:#182840;
  --b2:#1e3350;
  --b3:#253e60;

  /* FIX: Much brighter text for dark theme visibility */
  --tx:#f0f6ff;       /* Primary text — near white */
  --tx2:#c8dff5;      /* Secondary text — light blue-white */
  --tx3:#8eb0d0;      /* Tertiary text — medium blue */
  --mu:#4a6888;       /* Muted text */
  --su:#5878a8;       /* Subtle text */
  --label:#7a9ab8;    /* Labels */
  --title:#ffffff;    /* Titles */

  --ac:#f97316;
  --ac2:#fb923c;
  --gr:#00d084;
  --gr2:#00e896;
  --gr3:#004520;
  --rd:#ff3b5c;
  --rd2:#ff6b85;
  --rd3:#5c0018;
  --yw:#f5a623;
  --yw2:#ffbf47;
  --bl:#2196f3;
  --bl2:#64b5f6;
  --bl3:#0d47a1;
  --pu:#9c27b0;
  --pu2:#ce93d8;
  --te:#00bcd4;
  --te2:#4dd0e1;
  --mono:'JetBrains Mono',monospace;
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);}
body{display:flex;flex-direction:column;}

/* Scrollbar */
::-webkit-scrollbar{width:3px;height:3px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:4px;}

/* ─── HEADER ─── */
#hdr{
  background:linear-gradient(180deg,#050c1a,var(--s1));
  border-bottom:1px solid var(--b2);
  padding:10px 14px;display:flex;justify-content:space-between;align-items:center;
  flex-shrink:0;
}
.logo{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;letter-spacing:-.3px;color:var(--title);}
.logo em{color:var(--ac);font-style:normal;}
.logo-sub{font-size:8px;color:var(--mu);letter-spacing:2px;margin-top:2px;text-transform:uppercase;}
.live-row{display:flex;align-items:center;gap:5px;}
.ldot{width:5px;height:5px;border-radius:50%;background:var(--gr);animation:pulse 2s infinite;}
.llbl{font-size:9px;color:var(--gr2);font-weight:700;letter-spacing:.5px;}
.clktxt{font-size:9px;color:var(--tx3);margin-top:2px;text-align:right;font-family:var(--mono);}

/* ─── TICKER ─── */
#tkwrap{display:none;}
#tkinner{display:flex;width:max-content;animation:none;overflow-x:auto;height:32px;align-items:center;}
.ti{display:flex;flex-direction:column;padding:0 12px;border-right:1px solid var(--b1);min-width:110px;}
.ti-n{font-size:7px;color:var(--tx3);letter-spacing:1px;font-weight:600;text-transform:uppercase;}
.ti-r{display:flex;align-items:baseline;gap:4px;margin-top:1px;}
.ti-v{font-size:11px;font-weight:600;color:var(--tx);font-family:var(--mono);}
.ti-c{font-size:10px;font-weight:700;font-family:var(--mono);}

/* ─── BOTTOM NAV ─── */
#nav{
  background:var(--s1);border-top:1px solid var(--b1);
  display:flex;flex-shrink:0;order:99;
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  padding-bottom:env(safe-area-inset-bottom,0px);
}
.nb{
  flex:1;padding:8px 4px 6px;background:none;border:none;
  border-top:2px solid transparent;color:var(--mu);
  font-size:9px;font-weight:600;font-family:'DM Sans',sans-serif;
  cursor:pointer;transition:all .18s;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:2px;letter-spacing:.2px;
}
.nb.active{color:var(--ac);border-top-color:var(--ac);}
.nb-ico{font-size:18px;line-height:1;}

/* ─── CONTENT ─── */
#content{
  flex:1;overflow-y:auto;padding-bottom:calc(64px + env(safe-area-inset-bottom,0px));
  -webkit-overflow-scrolling:touch;
}

/* ─── MONO ─── */
.mono{font-family:var(--mono);}

/* ─── SECTION LABEL ─── */
.sec-lbl{
  font-size:9px;font-weight:700;color:var(--label);
  text-transform:uppercase;letter-spacing:1.2px;
  display:flex;align-items:center;gap:8px;margin-bottom:8px;
}
.sec-lbl::after{content:'';flex:1;height:1px;background:var(--b2);}

/* ─── CARDS ─── */
.card{
  background:var(--card);border:1px solid var(--b1);
  border-radius:10px;padding:12px 13px;
}
.card.accent-gr{border-left:3px solid var(--gr);}
.card.accent-rd{border-left:3px solid var(--rd);}
.card.accent-ac{border-left:3px solid var(--ac);}
.card.accent-bl{border-left:3px solid var(--bl);}
.card.accent-yw{border-left:3px solid var(--yw);}

/* ─── PILLS / BADGES ─── */
.pill{
  display:inline-flex;align-items:center;font-size:8px;font-weight:700;
  padding:2px 7px;border-radius:20px;letter-spacing:.4px;
}
.pill-gr{background:rgba(0,208,132,.15);color:var(--gr2);border:1px solid rgba(0,208,132,.3);}
.pill-rd{background:rgba(255,59,92,.15);color:var(--rd2);border:1px solid rgba(255,59,92,.3);}
.pill-yw{background:rgba(245,166,35,.15);color:var(--yw2);border:1px solid rgba(245,166,35,.3);}
.pill-bl{background:rgba(33,150,243,.15);color:var(--bl2);border:1px solid rgba(33,150,243,.3);}
.pill-ac{background:rgba(249,115,22,.15);color:var(--ac2);border:1px solid rgba(249,115,22,.3);}
.pill-pu{background:rgba(156,39,176,.15);color:var(--pu2);border:1px solid rgba(156,39,176,.3);}

/* ─── DRILL DOWN ─── */
.drill-wrap{padding:10px 12px 14px;animation:fadeIn .18s ease;}
.drill-hdr{display:flex;align-items:flex-start;gap:8px;margin-bottom:10px;}
.back-btn{
  background:var(--card);border:1px solid var(--b2);border-radius:7px;
  padding:6px 11px;color:var(--tx2);font-size:11px;font-family:'DM Sans',sans-serif;
  cursor:pointer;flex-shrink:0;white-space:nowrap;
}
.back-btn:active{background:var(--b2);}
.dsym{font-family:'Syne',sans-serif;font-weight:800;font-size:16px;color:var(--title);letter-spacing:.3px;}
.dchg{font-size:13px;font-weight:700;font-family:var(--mono);}

/* ─── DRILL TABS ─── */
.dtabs{
  display:flex;gap:3px;overflow-x:auto;padding-bottom:2px;
  margin-bottom:10px;scrollbar-width:none;
}
.dtabs::-webkit-scrollbar{display:none;}
.dtab{
  padding:5px 12px;border-radius:20px;border:1px solid var(--b1);
  background:var(--s2);color:var(--tx3);font-size:10px;font-weight:600;
  font-family:'DM Sans',sans-serif;cursor:pointer;white-space:nowrap;transition:all .15s;
}
.dtab.active{background:#f9731618;border-color:var(--ac);color:var(--ac2);font-weight:700;}

/* ─── CHART STYLES ─── */
.chart-card{
  background:var(--s1);border:1px solid var(--b1);border-radius:10px;
  margin-bottom:10px;overflow:hidden;
}
.chart-header{
  padding:10px 12px 8px;border-bottom:1px solid var(--b1);
  display:flex;justify-content:space-between;align-items:center;
}
.chart-title{font-size:11px;font-weight:700;color:var(--tx2);font-family:var(--mono);}
.chart-price{font-size:13px;font-weight:700;color:var(--tx);font-family:var(--mono);}

/* Timeframe buttons */
.tf-row{display:flex;gap:3px;padding:6px 10px;border-bottom:1px solid var(--b1);overflow-x:auto;}
.tf-row::-webkit-scrollbar{display:none;}
.tf-btn{
  padding:3px 9px;border-radius:5px;border:1px solid var(--b2);
  background:var(--card);color:var(--tx3);font-size:9px;font-weight:700;
  font-family:var(--mono);cursor:pointer;white-space:nowrap;transition:all .15s;
}
.tf-btn.active{background:rgba(33,150,243,.2);border-color:var(--bl);color:var(--bl2);}

/* Canvas zone */
.cv-zone{position:relative;width:100%;}
canvas{display:block;width:100%;}

/* Chart stat row */
.chart-stats{
  display:flex;border-top:1px solid var(--b1);padding:6px 0;
}
.cstat{flex:1;text-align:center;padding:0 4px;}
.cstat-l{font-size:7px;color:var(--label);text-transform:uppercase;letter-spacing:.5px;}
.cstat-v{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--tx);margin-top:2px;}

/* MA legend */
.ma-legend{
  display:flex;gap:10px;padding:5px 10px;
  border-bottom:1px solid var(--b1);flex-wrap:wrap;
}
.ma-leg-item{
  display:flex;align-items:center;gap:4px;
  font-size:8px;color:var(--tx2);font-family:var(--mono);
  cursor:pointer;padding:2px 5px;border-radius:4px;border:1px solid transparent;
  transition:all .15s;
}
.ma-leg-item.off{opacity:.35;}
.ma-leg-item:active{background:var(--b1);}
.ma-leg-dot{width:12px;height:2px;border-radius:1px;}

/* ─── SIGNAL ROWS ─── */
.sig-row{
  background:var(--s2);border:1px solid var(--b1);border-radius:8px;
  padding:9px 12px;display:flex;align-items:center;
  justify-content:space-between;margin-bottom:5px;
}
.sig-name{font-size:11px;font-weight:600;color:var(--tx2);}
.sig-sub{font-size:8px;color:var(--tx3);margin-top:1px;font-family:var(--mono);}
.sig-val{font-size:12px;font-weight:700;font-family:var(--mono);color:var(--tx);}
.sig-pill{font-size:8px;font-weight:700;padding:2px 8px;border-radius:4px;letter-spacing:.5px;}
.sig-buy{background:rgba(0,208,132,.15);color:var(--gr2);border:1px solid rgba(0,208,132,.3);}
.sig-sell{background:rgba(255,59,92,.15);color:var(--rd2);border:1px solid rgba(255,59,92,.3);}
.sig-neutral{background:rgba(245,166,35,.15);color:var(--yw2);border:1px solid rgba(245,166,35,.3);}

/* Verdict box */
.verdict-box{
  border-radius:10px;padding:14px;margin-bottom:10px;
  border:1px solid;text-align:center;
}

/* ─── FUND GRID ─── */
.fund-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.fund-cell{
  background:var(--s2);border:1px solid var(--b1);border-radius:9px;
  padding:11px 12px;position:relative;overflow:hidden;
}
.fund-cell.good{border-left:3px solid var(--gr);}
.fund-cell.warn{border-left:3px solid var(--yw);}
.fund-cell.bad{border-left:3px solid var(--rd);}
.fund-cell.neutral{border-left:3px solid var(--b3);}
.fc-lbl{font-size:8px;font-weight:700;color:var(--label);text-transform:uppercase;letter-spacing:.7px;}
.fc-val{font-family:var(--mono);font-size:16px;font-weight:600;color:var(--tx);margin-top:4px;}
.fc-sub{font-size:9px;color:var(--tx3);margin-top:3px;}

/* ─── STOCK ROW (SCREENER/WATCHLIST) ─── */
.srow{
  background:var(--card);border:1px solid var(--b1);border-radius:10px;
  padding:11px 13px;margin-bottom:7px;cursor:pointer;transition:all .15s;
  position:relative;overflow:hidden;
}
.srow::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:10px 0 0 10px;
}
.srow.bull::before{background:var(--gr);}
.srow.bear::before{background:var(--rd);}
.srow:active{background:var(--s2);}
.srow-sym{font-family:'Syne',sans-serif;font-weight:800;font-size:14px;color:var(--title);}
.srow-name{font-size:10px;color:var(--tx3);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:170px;}
.srow-price{font-size:15px;font-weight:700;color:var(--tx);font-family:var(--mono);}
.srow-chg{font-size:11px;font-weight:700;margin-top:2px;font-family:var(--mono);}
.score-ring{
  width:38px;height:38px;border-radius:50%;border:2px solid;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  flex-shrink:0;cursor:pointer;
}
.score-num{font-size:11px;font-weight:800;line-height:1;}
.score-lbl{font-size:7px;font-weight:700;line-height:1;margin-top:1px;}

/* ─── SEARCH BOX ─── */
.search-box{
  display:flex;align-items:center;gap:8px;
  background:var(--s2);border:1px solid var(--b2);border-radius:9px;
  padding:0 12px;margin:10px 13px;transition:border-color .2s;
}
.search-box:focus-within{border-color:var(--bl);}
.srch-ico{color:var(--tx3);font-size:13px;flex-shrink:0;}
.srch-inp{
  flex:1;background:none;border:none;outline:none;
  font-family:'DM Sans',sans-serif;font-size:13px;color:var(--tx);
  padding:10px 0;-webkit-appearance:none;caret-color:var(--ac);
}
.srch-inp::placeholder{color:var(--mu);font-size:12px;}

/* Search results dropdown */
.srch-results{
  background:var(--s2);border:1px solid var(--b2);border-radius:10px;
  margin:0 13px 8px;overflow:hidden;
  box-shadow:0 8px 32px rgba(0,0,0,.6);max-height:280px;overflow-y:auto;
}
.sr-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 13px;border-bottom:1px solid var(--b1);cursor:pointer;transition:background .1s;
}
.sr-row:last-child{border-bottom:none;}
.sr-row:active{background:var(--b1);}
.sr-sym{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--tx);}
.sr-name{font-size:10px;color:var(--tx3);margin-top:2px;}
.sr-sect{font-size:8px;color:var(--mu);margin-top:1px;}
.sr-add{
  font-size:9px;font-weight:700;padding:3px 10px;border-radius:5px;
  background:rgba(249,115,22,.15);color:var(--ac2);border:1px solid rgba(249,115,22,.3);
  flex-shrink:0;
}

/* ─── PORTFOLIO SUMMARY ─── */
.port-sum-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:8px;
  padding:12px 13px;
}
.psum-card{
  background:var(--card);border:1px solid var(--b1);border-radius:10px;
  padding:12px 13px;
}
.psum-lbl{font-size:8px;font-weight:700;color:var(--label);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;}
.psum-val{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--tx);line-height:1;}
.psum-sub{font-size:10px;color:var(--tx3);margin-top:4px;font-family:var(--mono);}

/* Portfolio Holdings Table */
.port-table{width:100%;border-collapse:collapse;}
.port-table th{
  text-align:right;padding:6px 8px;font-size:8px;color:var(--label);
  text-transform:uppercase;letter-spacing:.7px;font-weight:700;
  border-bottom:1px solid var(--b2);background:var(--s2);
  position:sticky;top:0;z-index:5;
}
.port-table th:first-child{text-align:left;}
.port-table td{
  padding:9px 8px;border-bottom:1px solid var(--b1);
  text-align:right;font-family:var(--mono);font-size:11px;color:var(--tx2);
}
.port-table td:first-child{text-align:left;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:700;color:var(--tx);}
.port-table tr:last-child td{border-bottom:none;}
.td-up{color:var(--gr2)!important;}
.td-dn{color:var(--rd2)!important;}

/* FIX #4: Import as text area */
.import-zone{
  margin:12px 13px;padding:20px;border:2px dashed var(--b2);
  border-radius:12px;background:var(--s2);cursor:pointer;
  transition:border-color .2s,background .2s;
}
.import-zone:active{border-color:var(--ac);background:rgba(249,115,22,.05);}
.import-zone-ico{font-size:30px;margin-bottom:8px;text-align:center;}
.import-zone-title{font-size:13px;font-weight:700;color:var(--tx);text-align:center;margin-bottom:4px;}
.import-zone-sub{font-size:10px;color:var(--tx3);text-align:center;line-height:1.6;}
.import-textarea{
  width:100%;background:var(--bg);border:1px solid var(--b2);border-radius:9px;
  padding:11px 13px;color:var(--tx);font-size:11px;font-family:var(--mono);
  resize:vertical;min-height:120px;outline:none;line-height:1.7;
}
.import-textarea:focus{border-color:var(--ac);}
.import-textarea::placeholder{color:var(--mu);}
.import-btn{
  width:100%;padding:12px;background:var(--ac);border:none;border-radius:10px;
  color:#fff;font-size:13px;font-weight:700;font-family:'Syne',sans-serif;
  cursor:pointer;margin-top:10px;
}
.import-btn:active{opacity:.85;}
.import-preview{
  background:var(--bg);border:1px solid var(--gr);border-radius:10px;
  padding:12px 13px;margin-top:10px;display:none;
}
.import-preview.show{display:block;}
.import-preview-title{font-size:9px;font-weight:700;color:var(--gr2);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;}
.import-err{
  background:rgba(255,59,92,.1);border:1px solid rgba(255,59,92,.3);
  border-radius:9px;padding:10px 13px;margin-top:8px;
  color:var(--rd2);font-size:11px;display:none;
}
.import-err.show{display:block;}

/* ─── MACRO / NEWS CARDS ─── */
.macro-card{
  background:var(--card);border:1px solid var(--b1);border-radius:10px;
  padding:13px;cursor:pointer;transition:all .15s;margin-bottom:8px;
}
.macro-card.exp{border-color:var(--ac);}
.macro-val{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;color:var(--title);margin:5px 0 3px;}
.macro-trend{font-size:9px;font-family:var(--mono);}
.macro-detail{
  font-size:11px;color:var(--tx2);line-height:1.7;margin-top:10px;
  padding-top:10px;border-top:1px solid var(--b1);
}
.macro-name{font-size:9px;color:var(--label);font-weight:600;letter-spacing:.5px;text-transform:uppercase;}

.news-item{
  background:var(--card);border:1px solid var(--b1);border-radius:9px;
  padding:12px 13px;margin-bottom:7px;
}
.news-src{font-size:8px;color:var(--label);text-transform:uppercase;letter-spacing:.6px;font-family:var(--mono);margin-bottom:5px;display:flex;gap:8px;align-items:center;}
.news-title{font-size:13px;font-weight:700;color:var(--tx);line-height:1.4;margin-bottom:5px;}
.news-body{font-size:11px;color:var(--tx3);line-height:1.6;margin-bottom:5px;}
.news-meta{font-size:9px;color:var(--mu);font-family:var(--mono);}
.imp-badge{
  display:inline-flex;font-size:7px;font-weight:700;padding:2px 6px;
  border-radius:3px;letter-spacing:.4px;
}
.imp-H{background:rgba(255,59,92,.15);color:var(--rd2);border:1px solid rgba(255,59,92,.3);}
.imp-M{background:rgba(245,166,35,.15);color:var(--yw2);border:1px solid rgba(245,166,35,.3);}
.imp-L{background:rgba(0,208,132,.15);color:var(--gr2);border:1px solid rgba(0,208,132,.3);}

/* Filter chips */
.chip-row{display:flex;gap:5px;overflow-x:auto;padding:8px 13px;scrollbar-width:none;}
.chip-row::-webkit-scrollbar{display:none;}
.chip{
  padding:4px 12px;border-radius:20px;border:1px solid var(--b1);
  background:var(--s2);color:var(--tx3);font-size:10px;font-weight:500;
  cursor:pointer;white-space:nowrap;font-family:'DM Sans',sans-serif;transition:all .15s;
}
.chip.active{background:rgba(249,115,22,.12);border-color:var(--ac);color:var(--ac2);font-weight:700;}

/* Empty state */
.empty-state{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:50px 24px;text-align:center;
}
.empty-icon{font-size:42px;margin-bottom:14px;opacity:.6;}
.empty-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;color:var(--tx);margin-bottom:6px;}
.empty-sub{font-size:12px;color:var(--tx3);line-height:1.7;}

/* Movers */
.mover-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:9px 11px;background:var(--bg);border-radius:7px;margin-bottom:5px;
  border-left:3px solid;
}
.mover-sym{font-size:12px;font-weight:700;color:var(--tx2);}
.mover-why{font-size:8px;color:var(--mu);margin-top:1px;}
.mover-chg{font-size:13px;font-weight:800;font-family:var(--mono);}

/* Animations */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes ticker{from{transform:translateX(0)}to{transform:translateX(-50%)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.fin{animation:fadeIn .22s ease;}

/* Overlay & Panel */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none;backdrop-filter:blur(3px);}
.overlay.on{display:block;}
.bottom-panel{
  position:fixed;bottom:0;left:0;right:0;background:var(--s1);
  border-radius:16px 16px 0 0;border-top:1px solid var(--b2);
  z-index:201;transform:translateY(100%);transition:transform .3s cubic-bezier(.25,.8,.25,1);
  max-height:85vh;display:flex;flex-direction:column;
}
.bottom-panel.on{transform:translateY(0);}
.panel-handle{width:36px;height:4px;background:var(--b2);border-radius:2px;margin:10px auto 0;}
.panel-head{
  padding:12px 16px 10px;display:flex;justify-content:space-between;align-items:center;
  border-bottom:1px solid var(--b1);
}
.panel-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--title);}
.panel-close{
  background:var(--card);border:1px solid var(--b1);border-radius:7px;
  padding:5px 12px;color:var(--tx3);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;
}
.panel-body{padding:14px 16px;overflow-y:auto;flex:1;}

/* Toast */
#toast{
  position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(6px);
  background:var(--card);border:1px solid var(--b2);border-radius:20px;
  padding:8px 18px;font-family:var(--mono);font-size:11px;color:var(--tx);
  opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;
  z-index:9999;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.5);
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* Sector allocation bar */
.alloc-bar{height:8px;border-radius:4px;overflow:hidden;display:flex;margin:6px 0;}
.alloc-seg{height:100%;transition:width .5s;}
.alloc-legend{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;}
.alloc-item{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--tx3);}
.alloc-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0;}

/* Input fields */
.input-field{
  width:100%;background:var(--s2);border:1px solid var(--b1);border-radius:8px;
  padding:9px 12px;color:var(--tx);font-size:12px;font-family:'DM Sans',sans-serif;outline:none;
}
.input-field:focus{border-color:var(--ac);}

/* Metric cells */
.mbox{background:var(--s2);border:1px solid var(--b1);border-radius:8px;padding:10px 12px;}
.mbox.good{border-left:3px solid var(--gr);}
.mbox.warn{border-left:3px solid var(--yw);}
.mbox.bad{border-left:3px solid var(--rd);}
.mbox.neutral{border-left:3px solid var(--b3);}
.ml{font-size:8px;font-weight:700;color:var(--label);text-transform:uppercase;letter-spacing:.7px;margin-bottom:4px;}
.mv{font-family:var(--mono);font-size:14px;font-weight:600;color:var(--tx);}

// ── Helpers ───────────────────────────────────────────
function fmt(n) {
  if(n==null||isNaN(n))return '—';
  return Number(n).toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2});
}
function fmtCr(n) {
  if(!n||isNaN(n))return '—';
  if(n>=1e12)return (n/1e12).toFixed(2)+'L Cr';
  if(n>=1e7) return (n/1e7).toFixed(2)+' Cr';
  if(n>=1e5) return (n/1e5).toFixed(2)+' L';
  return '₹'+fmt(n);
}
function fmtVol(n){if(!n)return '—';if(n>=1e7)return(n/1e7).toFixed(1)+'Cr';if(n>=1e5)return(n/1e5).toFixed(1)+'L';if(n>=1e3)return(n/1e3).toFixed(0)+'K';return String(n);}
function trunc(s,n){return s&&s.length>n?s.slice(0,n)+'…':(s||'');}
function timeAgo(d){if(!d||isNaN(d))return '';const s=Math.floor((Date.now()-d)/1000);if(s<60)return 'just now';if(s<3600)return Math.floor(s/60)+'m ago';if(s<86400)return Math.floor(s/3600)+'h ago';return Math.floor(s/86400)+'d ago';}
function classifyNews(t){
  const u=t.toUpperCase();
  if(/RESULT|PROFIT|REVENUE|EARNING|Q[1-4]/.test(u))return{tag:'RESULTS',imp:'H'};
  if(/RBI|REPO|INFLATION|CPI|GDP|RATE CUT|RATE HIKE|MONETARY/.test(u))return{tag:'RBI',imp:'H'};
  if(/SEBI|REGULATION|PENALTY|PROBE|CBI|ED/.test(u))return{tag:'POLICY',imp:'H'};
  if(/OIL|CRUDE|OPEC|BRENT|PETROLEUM/.test(u))return{tag:'OIL',imp:'H'};
  if(/WAR|IRAN|ISRAEL|CONFLICT|SANCTION|GEO|MILITARY/.test(u))return{tag:'GEO',imp:'H'};
  if(/FII|FPI|DII|FOREIGN INFLOW|OUTFLOW/.test(u))return{tag:'FII',imp:'M'};
  if(/MERGER|ACQUI|DEAL|STAKE|BUYBACK|DIVIDEND/.test(u))return{tag:'CORP',imp:'M'};
  if(/SENSEX|NIFTY|RALLY|CRASH|SURGE|PLUNGE/.test(u))return{tag:'INDEX',imp:'M'};
  return{tag:'NEWS',imp:'L'};
}
function extractDomain(url){try{return new URL(url).hostname.replace(/^www\./,'').split('.')[0];}catch(_){return 'News';}}

function scoreColor(s){return s>=80?'var(--gr)':s>=65?'var(--yw)':'var(--rd)';}
function scoreLabel(s){return s>=80?'Strong':s>=65?'Watch':'Caution';}

let toastT=null;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(toastT);
  toastT=setTimeout(()=>el.classList.remove('show'),2800);
}

  const el=document.getElementById('clk');
  if(el)el.textContent='NSE · '+t+' IST · v8';
}

// ── File Upload Handler ─────────────────────────────
function handleFileDrop(e){
  e.preventDefault();
  document.getElementById('file-drop-zone').classList.remove('drag');
  const file = e.dataTransfer.files[0];
  if(file) handleFileSelect(file);
}

function handleFileSelect(file){
  if(!file) return;
  const status = document.getElementById('file-status');
  status.innerHTML = `<span style="color:var(--yw2)">⏳ Reading ${file.name}…</span>`;

  const ext = file.name.split('.').pop().toLowerCase();

  // XLS/XLSX — use SheetJS (CDN)
  if(ext==='xls'||ext==='xlsx'){
    loadSheetJS(()=>{
      const reader = new FileReader();
      reader.onload = e=>{
        try{
          const wb  = XLSX.read(e.target.result, {type:'binary'});
          const ws  = wb.Sheets[wb.SheetNames[0]];
          const csv = XLSX.utils.sheet_to_csv(ws);
          processImportText(csv, file.name, status);
        } catch(err){
          status.innerHTML = `<span style="color:var(--rd2)">✗ Could not read XLS: ${err.message}</span>`;
        }
      };
      reader.readAsBinaryString(file);
    });
    return;
  }

  // CSV / TXT — read as text
  const reader = new FileReader();
  reader.onload = e => processImportText(e.target.result, file.name, status);
  reader.onerror = ()=>{ status.innerHTML='<span style="color:var(--rd2)">✗ Could not read file</span>'; };
  reader.readAsText(file);
}

let _sheetJSLoaded = false;
function loadSheetJS(cb){
  if(_sheetJSLoaded){ cb(); return; }
  if(window.XLSX){ _sheetJSLoaded=true; cb(); return; }
  const s = document.createElement('script');
  s.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
  s.onload = ()=>{ _sheetJSLoaded=true; cb(); };
  s.onerror = ()=>{
    document.getElementById('file-status').innerHTML=
      '<span style="color:var(--rd2)">✗ Could not load XLS reader — try saving as CSV first</span>';
  };
  document.head.appendChild(s);
}

    showImportPreview();

// FIX #5: Robust multi-format parser
function parsePortfolioText(text){
  const results = [];
  const seen    = new Set();

  // ── Detect CDSL XLS/CSV export format ─────────────────────────
  // Header: Stock Name,ISIN,Sector Name,Quantity,Average Cost Price,Value At Cost,
  //         Current Market Price,Current Market Price % Change,Valuation at Current Market Price,
  //         Unrealized Profit/Loss,...
  const isCDSLExport = /Stock Name.*ISIN.*Sector.*Quantity.*Average Cost Price/i.test(text) ||
                       /ISIN.*Sector.*Quantity.*Average Cost/i.test(text);

  if(isCDSLExport){
    // Parse as CSV — split by lines, skip header rows and summary rows
    const lines = text.replace(/\r/g,'').split('\n');
    for(const line of lines){
      const cols = line.split(',').map(c=>c.replace(/^"|"$/g,'').trim());
      // Need at least: name, isin, sector, qty, avgBuy
      if(cols.length < 5) continue;
      const isin = cols[1];
      if(!/^IN[A-Z0-9]{10,12}$/.test(isin)) continue; // must have valid ISIN

      const name    = cols[0].trim();
      const sector  = cols[2].trim();
      const qty     = Math.round(parseFloat(cols[3].replace(/,/g,''))||0);
      const avgBuy  = Math.round(parseFloat(cols[4].replace(/,/g,''))*100)/100 || 0;
      const ltp     = Math.round(parseFloat((cols[6]||'').replace(/,/g,''))*100)/100 || 0;
      const pnl     = parseFloat((cols[9]||'').replace(/,/g,'')) || 0;

      if(!name || qty <= 0 || seen.has(isin)) continue;

      // Skip ETFs and Bonds (no NSE equity symbol)
      if(/ETF|BOND|GOLDBOND|SGB|SBI ETF|MIRAEAMC/i.test(name)) continue;

      // Resolve NSE symbol from ISIN map first, then name
      let sym = ISIN_MAP[isin] || '';
      if(!sym){
        // Try matching name against NSE_DB
        const nameUp = name.toUpperCase();
        const found  = NSE_DB.find(s=>
          nameUp.startsWith(s.name.toUpperCase().slice(0,8)) ||
          s.name.toUpperCase().startsWith(nameUp.slice(0,8))
        );
        sym = found ? found.sym : name.replace(/[^A-Z0-9]/g,'').slice(0,12);
      }

      seen.add(isin);
      const info = NSE_DB.find(s=>s.sym===sym)||{name,sector};
      results.push({
        sym,
        isin,
        cdslName: name,   // original CDSL company name — used for Yahoo search fallback
        name:    info.name || name,
        sector:  info.sector || sector || 'Diversified',
        qty,
        avgBuy,           // ✅ Real avg buy price from CDSL
        ltp,              // Current market price from CDSL
        change:  0,
        pnl,              // Unrealized P&L from CDSL
        cdslImport: true,
      });
    }
    console.log('CDSL export parsed:', results.length, 'holdings');
    return results;
  }

  // ── Fallback: Plain text / manual paste ────────────────────────
  // Step 1: Join wrapped CDSL lines (ISIN on line 1, Beneficiary on line 2)
  const rawLines = text.replace(/\r/g,'').split('\n').map(l=>l.trim()).filter(l=>l.length>2);
  const joined   = [];
  let i = 0;
  while(i < rawLines.length){
    const cur    = rawLines[i];
    const hasISIN = /\bIN[A-Z0-9]{10,12}\b/.test(cur);
    const hasBen  = /beneficiary/i.test(cur);
    if(hasISIN && !hasBen && i+1 < rawLines.length){
      let merged = cur, j = i+1;
      while(j < rawLines.length && !/beneficiary/i.test(merged)){
        merged = merged + ' ' + rawLines[j]; j++;
      }
      joined.push(merged); i = j;
    } else {
      joined.push(cur); i++;
    }
  }

  for(const line of joined){
    if(/^(symbol|name|isin|sr\.?no|total|date|page|user|holding|demat|client)/i.test(line)) continue;
    if(/saturday|sunday|monday|tuesday|wednesday|thursday|friday/i.test(line)) continue;
    if(/mutual fund|government of india|SGB|sovereign/i.test(line)) continue;
    if(line.length < 5) continue;

    let sym='', isin='', qty=0, avgBuy=0, ltp=0;

    // Pattern 1: CDSL text — has ISIN + Beneficiary
    const cdslMatch = line.match(/\b(IN[A-Z0-9]{10,12})\b/);
    if(cdslMatch){
      isin = cdslMatch[1];
      sym  = ISIN_MAP[isin] || '';
      const benIdx  = line.search(/beneficiary/i);
      const numPart = benIdx >= 0 ? line.slice(benIdx) : line;
      const nums    = [...numPart.matchAll(/[\d,]+\.?\d*/g)]
        .map(m=>parseFloat(m[0].replace(/,/g,'')))
        .filter(n=>n>0&&n<1e10);
      if(nums.length>=2){
        qty = Math.round(nums[0]);
        // CDSL text: value is current market value, not avg buy
        ltp = qty>0 ? Math.round(nums[nums.length-1]/qty*100)/100 : 0;
        avgBuy = 0; // unknown from text format
      } else if(nums.length===1){
        qty = Math.round(nums[0]);
      }
      if(!sym){
        const nameMatch = line.replace(isin,'')
          .replace(/new\s+fv\s+r[se]\.?\s*[\d./]+\s*/gi,'')
          .replace(/fv\s+r[se]\.?\s*[\d./]+\s*/gi,'')
          .match(/([A-Z][A-Z\s&.()\-]+?(?:LTD\.?|LIMITED|CORP|CO\.?|IND|BANK|POWER|TECH|SOLAR|ENERGY|FINANCE))/i);
        if(nameMatch){
          const nu = nameMatch[1].toUpperCase().replace(/\s+/g,' ').trim();
          const found = NSE_DB.find(s=>
            s.name.toUpperCase().startsWith(nu.split(' ').slice(0,2).join(' ')) ||
            nu.startsWith(s.name.toUpperCase().split(' ').slice(0,2).join(' '))
          );
          sym = found ? found.sym : nu.replace(/[^A-Z0-9]/g,'').slice(0,12);
        }
      }
      if(sym && qty>0 && !seen.has(isin)){
        seen.add(isin);
        const info = NSE_DB.find(s=>s.sym===sym)||{name:sym,sector:'Diversified'};
        results.push({sym,isin,name:info.name||sym,sector:info.sector||'Diversified',
          qty:Math.round(qty),avgBuy,ltp,change:0});
      }
      continue;
    }

    // Pattern 2: CSV / manual — Symbol, Qty, AvgBuy  OR  Symbol, ISIN, Qty, AvgBuy
    const parts = line.split(/[,\t|;]+/).map(p=>p.trim()).filter(Boolean);
    if(parts.length>=2){
      const maybeISIN = parts.find(p=>/^IN[A-Z0-9]{10,12}$/.test(p));
      const maybeSym  = parts[0].toUpperCase().replace(/[^A-Z0-9&\-]/g,'').replace(/\.NS$/,'');
      const nums      = parts.map(p=>parseFloat(p.replace(/[,₹]/g,''))).filter(n=>!isNaN(n)&&n>0);
      isin = maybeISIN || '';
      sym  = isin ? (ISIN_MAP[isin]||maybeSym) : maybeSym;
      if(nums.length>=2){ qty=Math.round(nums[0]); avgBuy=nums[1]; }
      // If 3 numbers and nums[1] looks like a total invested amount (not per-share):
      // heuristic — if nums[1]/nums[0] gives a price < nums[2] then nums[1] is total
      if(nums.length>=3){
        const perShare = nums[1]/Math.max(nums[0],1);
        if(perShare > 1 && perShare < nums[2] * 0.95){
          qty = Math.round(nums[0]);
          avgBuy = Math.round(perShare*100)/100;
        }
      }
      if(sym&&sym.length>=2&&sym.length<=15&&qty>0&&avgBuy>0&&!seen.has(sym)){
        seen.add(sym);
        const info=NSE_DB.find(s=>s.sym===sym)||{name:sym,sector:'Diversified'};
        results.push({sym,isin,name:info.name||sym,sector:info.sector||'Diversified',
          qty:Math.round(qty),avgBuy,ltp:0,change:0});
      }
    }
  }
  return results;
}

function applyImport(mode){
  if(!parsedHoldings.length){toast('Nothing to import — paste data first');return;}
  if(mode==='replace') S.portfolio=[];
  const existing = new Set(S.portfolio.map(h=>h.sym));
  parsedHoldings.forEach(h=>{
    if(existing.has(h.sym)){
      const idx=S.portfolio.findIndex(p=>p.sym===h.sym);
      if(idx>=0) Object.assign(S.portfolio[idx],h);
    } else {
      S.portfolio.push({...h});
      existing.add(h.sym);
    }
  });
  savePF();
  closePanel();
  toast(`Imported ${parsedHoldings.length} holdings ✓`);

// Refresh state

// Signal logic for each stock
function calcSignal(h) {
  let bull=0, bear=0;
  const ltp = h.liveLtp||h.ltp||0;  // web price only — never avgBuy
  if(h.pe!=null && h.pe<22)  bull++; else if(h.pe!=null && h.pe>35) bear++;
  if(h.roe!=null && h.roe>15) bull++; else if(h.roe!=null && h.roe<8) bear++;
  if(h.change>1)  bull++; else if(h.change<-1) bear++;
  if(h.sma20 && ltp>h.sma20) bull++; else if(h.sma20 && ltp<h.sma20) bear++;
  if(h.promoter && h.promoter>50) bull++; else if(h.promoter && h.promoter<35) bear++;
  const net = bull - bear;
  if(net>=2)  return {label:'BUY',  bg:'rgba(0,208,132,.18)',  border:'rgba(0,208,132,.4)',  txt:'var(--gr2)',  rowBg:'rgba(0,208,132,.04)'};
  if(net<=-2) return {label:'SELL', bg:'rgba(255,59,92,.18)',  border:'rgba(255,59,92,.4)',  txt:'var(--rd2)',  rowBg:'rgba(255,59,92,.04)'};
  return       {label:'HOLD', bg:'rgba(245,166,35,.15)', border:'rgba(245,166,35,.35)', txt:'var(--yw2)', rowBg:'rgba(245,166,35,.02)'};
}

// Color a numeric cell based on value vs threshold
function cellColor(val, goodAbove, badBelow) {
  if(val==null||isNaN(val)) return 'color:var(--tx3)';
  if(val>=goodAbove) return 'color:var(--gr2)';
  if(val<=badBelow)  return 'color:var(--rd2)';
  return 'color:var(--yw2)';
}


// ═══════════════════════════════════════════════════════════════
//  BLOOMBERG-STYLE 37-COLUMN PORTFOLIO SCREENER
//  Data sources:
//    prices.json       → LTP, %1D, %5D, P/E, P/B, EPS, MCAP, 52Wk
//    fundamentals.json → ATH%, Prom%, Pledge%, OPM%, NPM%, ROE,
//                        Sales, CFO, EBITDA, Signal, Pos, Neg
// ═══════════════════════════════════════════════════════════════

// App-level fundamentals cache (loaded from ./fundamentals.json)
let FUND = {};   // { SYM: { roe, pe, opm_pct, ... } }
let pfRefreshing = false;
let pfLastRefresh = null;
let fundLoaded = false;

// Load fundamentals.json on boot (same-origin, CORS-safe)
const FUND_CACHE_TTL = 60 * 60 * 1000; // 1 hour in ms

async function loadFundamentals(){
  try{
    // Check localStorage cache first — fundamentals only update once daily
    const cached   = localStorage.getItem('fund_cache');
    const cacheTs  = parseInt(localStorage.getItem('fund_cache_ts') || '0');
    const cacheAge = Date.now() - cacheTs;

    if(cached && cacheAge < FUND_CACHE_TTL){
      const d = JSON.parse(cached);
      FUND = d.stocks || {};
      fundLoaded = true;
      console.log(`✓ fundamentals from cache (${Math.round(cacheAge/60000)}m old):`, Object.keys(FUND).length, 'stocks');
      return;
    }

    // Cache miss or stale — fetch fresh
    const r = await fetch('./fundamentals.json?t='+Date.now(), {cache:'no-store'});
    if(!r.ok) throw new Error('HTTP '+r.status);
    const d = await r.json();
    FUND = d.stocks || {};
    fundLoaded = true;

    // Save to cache
    try{
      localStorage.setItem('fund_cache', JSON.stringify(d));
      localStorage.setItem('fund_cache_ts', Date.now().toString());
    } catch(_){ /* storage full — skip cache */ }

    console.log('✓ fundamentals.json loaded fresh:', Object.keys(FUND).length, 'stocks');
  } catch(e){
    // Try stale cache as fallback
    try{
      const cached = localStorage.getItem('fund_cache');
      if(cached){ FUND = JSON.parse(cached).stocks || {}; fundLoaded = true;
        console.warn('fundamentals: using stale cache (fetch failed)'); return; }
    } catch(_){}
    console.warn('fundamentals.json not found — run GitHub Action to generate');
  }
}

// Merge portfolio holding with fundamentals data
function mergeHolding(h){
  const f = FUND[h.sym] || {};
  const liveLtp = h.liveLtp || f.ltp || 0;  // single source of truth for live price
  return {
    // From portfolio import
    sym:       h.sym,
    isin:      h.isin||'',
    name:      f.name || h.name || h.sym,
    sector:    f.sector || h.sector || '—',
    qty:       h.qty||0,
    avgBuy:    h.avgBuy||0,
    // Live prices — web sources only, never computed or CDSL snapshot:
    // 1. h.liveLtp = live from Refresh button or prices.json (freshest)
    // 2. f.ltp     = from fundamentals.json (updated daily by GitHub Actions)
    // 3. 0         = no live price yet — shows NO PRICE badge
    // h.ltp (CDSL snapshot) deliberately excluded — it is stale point-in-time data
    ltp:       liveLtp,
    chg1d:     h.change || f.chg1d || 0,
    chg5d:     f.chg5d || 0,
    // NSE/Yahoo fundamentals — use ?? not || so 0 values are preserved
    pe:        h.pe   ?? f.pe   ?? null,
    pb:        h.pb   ?? f.pb   ?? null,
    eps:       h.eps  ?? f.eps  ?? null,
    roe:       h.roe  ?? f.roe  ?? null,
    roce:      h.roce ?? f.roce ?? null,
    mcap:      h.mcapRaw ? h.mcapRaw/1e7 : (f.mcap ?? null),
    w52h:      h.week52H ?? f.w52h ?? null,
    w52l:      h.week52L ?? f.w52l ?? null,
    // Derived 52W%
    w52_pct:   (liveLtp&&(h.week52H??f.w52h)) ? round2((liveLtp/(h.week52H??f.w52h)-1)*100) : (f.w52_pct??null),
    ath:       f.ath  ?? null,
    ath_pct:   f.ath_pct ?? null,
    prom_pct:  f.prom_pct ?? h.promoter ?? null,
    public_pct:f.public_pct ?? null,
    opm_pct:   f.opm_pct ?? h.ebitdaMargin ?? null,
    npm_pct:   f.npm_pct ?? h.netMargin ?? null,
    ebitda:    f.ebitda ?? null,
    sales:     f.sales ?? null,
    cfo:       f.cfo ?? null,
    // Signal
    signal:    f.signal || calcSignalLocal(h, f),
    pos:       f.pos||0,
    neg:       f.neg||0,
  };
}

function round2(n){ return Math.round(n*100)/100; }

// Local signal computation when fundamentals.json not available
function calcSignalLocal(h, f){
  let pos=0, neg=0;
  const roe = h.roe||f.roe||0;
  const pe  = h.pe||f.pe||0;
  const chg = h.change||0;
  const prom= h.promoter||f.prom_pct||0;
  if(roe>15) pos++; else if(roe<8) neg++;
  if(pe>0&&pe<18) pos++; else if(pe>35) neg++;
  if(chg>1) pos++; else if(chg<-1) neg++;
  if(prom>50) pos++; else if(prom&&prom<35) neg++;
  const net=pos-neg;
  return net>=2?'BUY':net<=-2?'SELL':'HOLD';
}

  if(val===null||val===undefined||isNaN(val)) return '';
  if(val>=greenAbove) return 'color:#00e896;font-weight:600';

}

// Signal badge HTML
function sigBadge(sig){
  const cfg = {
    BUY:  {bg:'rgba(0,208,132,.2)',bd:'#00d084',tx:'#00e896'},
    SELL: {bg:'rgba(255,59,92,.2)', bd:'#ff3b5c',tx:'#ff6b85'},

  }[sig]||{bg:'rgba(80,120,160,.15)',bd:'#4a6888',tx:'#8eb0d0'};
  return `<span style="display:inline-block;font-size:8px;font-weight:800;

    background:${cfg.bg};border:1px solid ${cfg.bd};color:${cfg.tx}">
    ${sig}

}

// Format a number cell — show '—' for null
function fn(v, dp=1, prefix='', suffix=''){
  if(v===null||v===undefined||isNaN(v)) return '<span style="color:#3a5a72">—</span>';
  return prefix+Number(v).toFixed(dp)+suffix;
}
function fnCr(v){
  if(v===null||v===undefined||isNaN(v)) return '<span style="color:#3a5a72">—</span>';
  if(v>=100000) return (v/100000).toFixed(1)+'LCr';
  if(v>=1000)   return (v/1000).toFixed(1)+'KCr';
  return v.toFixed(0)+'Cr';
}

// ── Render table rows ──────────────────────────────────
function renderBLSRows(rows, totalCur){
  return rows.map(h=>{
    const ltp    = h.ltp||0;   // already web-only from mergeHolding
    const inv    = h.qty*(h.avgBuy||0);
    const cur    = ltp>0 ? h.qty*ltp : null;  // null = price not loaded
    const pnl    = cur!==null ? cur-inv : null;
    const pnlP   = cur!==null && inv>0 ? (pnl/inv*100) : null;
    const wt     = cur!==null && totalCur>0 ? (cur/totalCur*100) : 0;
    const sig    = h.signal||'HOLD';
    const rb     = rowBg(sig);

    // Individual cell styles (color-coded per spec)
    const c1d  = h.chg1d>=0  ? 'color:#00e896;font-weight:700' : 'color:#ff6b85;font-weight:700';
    const c5d  = h.chg5d>=0  ? 'color:#00e896'                 : 'color:#ff6b85';
    const cROE = cc(h.roe,   15, 8);
    const cPE  = h.pe===null||h.pe===undefined ? '' :
                 h.pe<18  ? 'color:#00e896;font-weight:600' :
                 h.pe>35  ? 'color:#ff6b85;font-weight:600' : 'color:#c8dff5';
    const cOPM = cc(h.opm_pct, 15, 8);
    const cNPM = cc(h.npm_pct, 10, 5);
    const cATH = h.ath_pct===null ? '' :
                 h.ath_pct>-10 ? 'color:#00e896;font-weight:600' :
                 h.ath_pct<-20 ? 'color:#ff6b85;font-weight:600' : 'color:#c8dff5';
    const cW52 = h.w52_pct===null ? '' :
                 h.w52_pct>-10 ? 'color:#00e896;font-weight:600' :
                 h.w52_pct<-20 ? 'color:#ff6b85;font-weight:600' : 'color:#c8dff5';
    const cPR  = h.prom_pct===null ? '' :
                 h.prom_pct>50 ? 'color:#00e896;font-weight:600' :
                 h.prom_pct<35 ? 'color:#ff6b85;font-weight:600' : 'color:#c8dff5';
    const cPnL = pnl>=0 ? 'color:#00e896;font-weight:700' : 'color:#ff6b85;font-weight:700';

    // Fixed-left bg must match row bg
    const fixBg = sig==='BUY' ? 'background:#030e07' :
                  sig==='SELL'? 'background:#0e0306' : 'background:#03060f';

    return `<tr style="${rb}" onclick="openPortfolioStock('${h.sym}')">
      <!-- Fixed left -->
      <td class="td-l td-fix td-fix1" style="${fixBg}">
        <div class="sym-main">${h.sym}</div>
        <div class="sym-name">${trunc(h.name,14)}</div>
      </td>
      <td class="td-l td-fix td-fix2" style="${fixBg};color:#7a9ab8;font-size:8px;max-width:70px;overflow:hidden;text-overflow:ellipsis">${trunc(h.sector||"—",10)}</td>
      <!-- Scrollable -->
      <td><div class="pos-neg"><span class="pn-p">${h.pos||0}</span></div></td>
      <td><div class="pos-neg"><span class="pn-n">${h.neg||0}</span></div></td>
      <td style="${cATH}">${fn(h.ath_pct,1,'','%')}</td>
      <td style="${cW52}">${fn(h.w52_pct,1,'','%')}</td>
      <td style="${cPR}">${fn(h.prom_pct,1,'','%')}</td>
      <td style="color:#3a5a72">—</td>
      <td>${fn(h.public_pct,1,'','%')}</td>
      <td>${fn(h.pb,1,'','x')}</td>
      <td style="color:#c8dff5">${fn(h.eps,1,'₹')}</td>
      <td>${fnCr(h.sales)}</td>
      <td style="${h.cfo>0?'color:#00e896':'color:#ff6b85'}">${fnCr(h.cfo)}</td>
      <td style="${cROE}">${fn(h.roe,1,'','%')}</td>
      <td style="${cPE}">${fn(h.pe,1,'','x')}</td>
      <td style="color:#8eb0d0;font-size:8px;max-width:90px;text-align:left;overflow:hidden;text-overflow:ellipsis">${trunc(h.name,12)}</td>
      <td style="${cOPM}">${fn(h.opm_pct,1,'','%')}</td>
      <td>${fnCr(h.ebitda)}</td>
      <td style="${cNPM}">${fn(h.npm_pct,1,'','%')}</td>
      <td style="color:#8eb0d0">${fnCr(h.mcap)}</td>
      <td style="${c1d}">${h.chg1d>=0?'+':''}${fn(h.chg1d,2,'','%')}</td>
      <td style="${c5d}">${h.chg5d>=0?'+':''}${fn(h.chg5d,2,'','%')}</td>
      <td style="color:${ltp>0?'#f0f6ff':'#4a6888'};font-weight:${ltp>0?'600':'400'}">
        ${ltp>0?'₹'+ltp.toFixed(1):'<span style="font-size:7px;background:rgba(245,166,35,.15);border:1px solid rgba(245,166,35,.3);color:#ffbf47;padding:1px 4px;border-radius:3px">NO PRICE</span>'}
      </td>
      <td style="color:#8eb0d0">${h.qty.toLocaleString('en-IN')}</td>
      <td style="color:#fb923c;font-weight:600">₹${h.avgBuy>0?h.avgBuy.toFixed(1):'—'}</td>
      <td style="${ltp>0?cPnL:'color:#3a5a72'}">${ltp>0?(pnl>=0?'+':'')+pnl.toFixed(0):'—'}</td>
      <td style="${ltp>0?cPnL:'color:#3a5a72'}">${ltp>0?(pnlP>=0?'+':'')+pnlP.toFixed(1)+'%':'—'}</td>
      <td style="color:#8eb0d0">${wt.toFixed(1)}%</td>
      <td>${sigBadge(sig)}</td>
    </tr>`;
  }).join('');
}

// ── Manual Refresh — Yahoo Finance via proxy ────────────
// ── Refresh: Load prices.json from GitHub first, then Yahoo for live ──
async function refreshPortfolioData(){
  if(pfRefreshing||!S.portfolio.length)return;
  pfRefreshing=true;
  const ico=document.getElementById('rf-icon');
  if(ico)ico.classList.add('spin');
  toast('Loading prices…');

  let updated=0;
  try{
    // prices.json covers all portfolio stocks — single fast same-origin fetch
    const r = await fetch('./prices.json?t='+Date.now(), {cache:'no-store'});
    if(r.ok){
      const d = await r.json();
      const quotes = d.quotes || d;
      S.portfolio.forEach(h=>{
        const q = quotes[h.sym];
        if(!q) return;
        if(q.ltp)       { h.ltp = q.ltp; h.liveLtp = q.ltp; updated++; }
        if(q.changePct) { h.change = q.changePct; }
        if(q.chg5d)     { h.chg5d  = q.chg5d; }
        if(q.w52h)      { h.week52H= q.w52h; }
        if(q.w52l)      { h.week52L= q.w52l; }
      });
    }
  } catch(e){ console.warn('prices.json fetch failed:', e); }
  finally {
    pfLastRefresh=Date.now();
    pfRefreshing=false;
    if(ico)ico.classList.remove('spin');
    savePF();
    if(S.curTab==='portfolio') render();  // single render after all updates
    toast(updated>0
      ? `✓ ${updated}/${S.portfolio.length} prices updated`
      : '⚠ No prices — commit portfolio_symbols.txt and run Actions');
  }
}

// ── Auto-refresh every 5 min during NSE market hours (IST 9:15–15:35, Mon–Fri) ──
function isMarketHours(){
  const now = new Date();
  const day = now.getUTCDay();
  if(day===0||day===6) return false;
  const istMin = (now.getUTCHours()*60 + now.getUTCMinutes() + 330) % 1440;
  return istMin >= 555 && istMin <= 935; // 9:15=555, 15:35=935
}
setInterval(()=>{
  if(isMarketHours() && S.curTab==='portfolio' && !pfRefreshing)
    refreshPortfolioData();
}, 5 * 60 * 1000);

function genCandles(ltp,n){
  const cs=[];let p=ltp*(1-(n*0.002));
  for(let i=0;i<n;i++){
    const c=p*(1+(Math.random()-.47)*.015);
    const o=p,h=Math.max(o,c)*(1+Math.random()*.005),l=Math.min(o,c)*(1-Math.random()*.005);
    cs.push({o:Math.round(o),h:Math.round(h),l:Math.round(l),c:Math.round(c),v:parseFloat((1+Math.random()*3).toFixed(1))});
    p=c;
  }
  cs[cs.length-1].c=Math.round(ltp);
  return cs;
}

function wlSearch(val){
  S.wlSearch = val.trim();
  const el = document.getElementById('wl-results');
  if(!el) return;
  if(!S.wlSearch){el.innerHTML='';return;}

  const q = S.wlSearch.toUpperCase();
  const already = new Set(S.watchlist.map(w=>w.symbol));

  // Search NSE_DB — by symbol prefix first, then name contains
  const exact   = NSE_DB.filter(s=>s.sym===q);
  const prefix  = NSE_DB.filter(s=>s.sym!==q&&s.sym.startsWith(q));
  const partial = NSE_DB.filter(s=>!s.sym.startsWith(q)&&(s.sym.includes(q)||s.name.toUpperCase().includes(q)||s.sector.toUpperCase().includes(q)));
  const hits = [...exact,...prefix,...partial].filter(s=>!already.has(s.sym)).slice(0,8);

  if(!hits.length){
    el.innerHTML=`<div class="srch-results"><div style="padding:12px;text-align:center;font-size:11px;color:var(--mu)">No results for "${S.wlSearch}"</div></div>`;
    return;
  }

  el.innerHTML=`<div class="srch-results">
    ${hits.map(h=>`
      <div class="sr-row" onclick="addToWL('${h.sym}')">
        <div>
          <div class="sr-sym">${h.sym}</div>
          <div class="sr-name">${h.name}</div>
          <div class="sr-sect">${h.sector}</div>
        </div>
        <span class="sr-add">+ Add</span>
      </div>`).join('')}
  </div>`;
}

function addToWL(sym){
  sym = sym.toUpperCase().replace(/\.NS$/,'');
  if(S.watchlist.find(w=>w.symbol===sym)){toast(sym+' already in watchlist');return;}
  const info = NSE_DB.find(s=>s.sym===sym)||{name:sym,sector:'Diversified'};
  const ltp  = 100 + Math.random()*2000; // placeholder until refresh
  S.watchlist.push({
    symbol:sym, name:info.name, sector:info.sector,
    ltp:0, change:0, score:68,
    pe:22, pb:2.5, roe:15, roce:18,
    week52H:0, week52L:0,
    candles:genCandles(ltp,15),
  });
  S.wlSearch='';
  saveWL();
  toast('Added '+sym+' to watchlist');
  render();
}

function removeFromWL(sym){
  S.watchlist=S.watchlist.filter(w=>w.symbol!==sym);
  saveWL();render();
}

// FIX #2 & #3: RSS News loader
async function loadMacroNews(){
  const el=document.getElementById('macro-news-list');
  if(!el)return;
  const FEEDS=[
    'https://economictimes.indiatimes.com/markets/rssfeeds/1977021501.cms',
    'https://economictimes.indiatimes.com/economy/rssfeeds/1373380680.cms',
  ];
  const all=[];
  for(const feed of FEEDS){
    try{
      const url='https://api.rss2json.com/v1/api.json?rss_url='+encodeURIComponent(feed)+'&count=10';
      const res=await fetch(url,{signal:AbortSignal.timeout?AbortSignal.timeout(8000):undefined});
      const d=await res.json();
      if(d.status==='ok')all.push(...(d.items||[]));
    }catch(_){}
  }
  // Deduplicate
  const seen=new Set();
  const items=all.filter(i=>{if(seen.has(i.title))return false;seen.add(i.title);return true;})
    .sort((a,b)=>new Date(b.pubDate)-new Date(a.pubDate))
    .slice(0,12);

  if(!items.length){
    el.innerHTML=`<div style="padding:14px;text-align:center;font-size:11px;color:var(--mu)">Could not load news — check connection</div>`;
    return;
  }

  const filterTag=S.macroFilter;
  const filtered=filterTag==='ALL'?items:items.filter(i=>classifyNews(i.title).tag===filterTag);

  el.innerHTML=(filtered.length?filtered:items).map(item=>{
    const{tag,imp}=classifyNews(item.title);
    const src=item.source?.name||extractDomain(item.link)||'ET Markets';
    const body=item.description?item.description.replace(/<[^>]+>/g,'').slice(0,120)+'…':'';
    return `<div class="news-item">
      <div class="news-src">
        <span>${src}</span>
        <span class="imp-badge imp-${imp}">${imp==='H'?'HIGH':imp==='M'?'MED':'LOW'}</span>
        <span class="pill pill-bl" style="font-size:7px">${tag}</span>
        <span>${timeAgo(new Date(item.pubDate))}</span>
      </div>
      <div class="news-title">${item.title}</div>
      ${body?`<div class="news-body">${body}</div>`:''}
    </div>`;
  }).join('');
}
