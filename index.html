<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
    <title>Onyx | Pro Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg:#000; --s1:#0a0a0a; --b1:#222; --bl:#00f2ff; --gr:#00ff88; --rd:#ff4d6d; --tx:#fff; }
        *{box-sizing:border-box;margin:0;padding:0;}
        body { background:var(--bg); color:var(--tx); font-family:'JetBrains Mono',monospace; overflow:hidden; -webkit-text-size-adjust:100%; display:flex; flex-direction:column; height:100vh; }
        header { background:var(--s1); border-bottom:1px solid var(--b1); padding:8px; display:flex; justify-content:space-around; flex-shrink:0; }
        .kpi-box { text-align:center; }
        .kpi-label { font-size:8px; color:#666; text-transform:uppercase; letter-spacing:1px; }
        .kpi-val { font-size:14px; font-weight:800; margin-top:1px; color:var(--bl); }
        #bar-wrap { padding:8px; background:#0a0a0a; border-bottom:2px solid #00ff88; flex-shrink:0; }
        #tape-bar { width:100%; height:20px; border-radius:4px; overflow:hidden; display:flex; background:#050505; }
        .seg { height:100%; cursor:pointer; flex-shrink:0; border-right:1px solid rgba(0,255,136,0.3); transition: all 0.3s; filter: brightness(1); }
        .seg.dimmed { opacity: 0.2; filter: brightness(0.5); }
        #legend { display:flex; flex-wrap:wrap; gap:6px 12px; padding:10px; border-bottom:2px solid #00f2ff; background:#000; max-height:50px; overflow-y:auto; flex-shrink:0; }
        .leg { display:flex; align-items:center; gap:6px; font-size:9px; color:#fff; cursor:pointer; font-weight:400; }
        .leg.on { font-weight:800; }
        .dot { width:8px; height:8px; border-radius:2px; }
        .view { flex:1; overflow-y:auto; overflow-x:auto; background:#000; -webkit-overflow-scrolling:touch; }
        table { width:100%; border-collapse:collapse; font-size:10px; white-space:nowrap; margin-bottom:80px; }
        th { background:var(--s1); color:#666; padding:6px; position:sticky; top:0; z-index:10; border-bottom:2px solid var(--b1); text-align:center; cursor: pointer; text-transform: uppercase; font-size: 9px; letter-spacing: 0.5px; }
        th.active { color: var(--bl); }
        td { padding:6px; border-bottom:1px solid #111; }
        tfoot td { background: var(--s1); font-weight: 800; color: var(--tx); border-top: 2px solid var(--b1); }
        .sticky { position:sticky; left:0; background:#0a0a0a!important; z-index:5; border-right:1px solid var(--b1); color:var(--bl)!important; }
        .pos { background:#00ff88!important; color:#000!important; }
        .neg { background:#ff6b85!important; color:#fff!important; }
        .sig-buy { color:#00ff88; font-weight:800; border:1px solid #00ff88; padding:2px 4px; border-radius:2px; font-size:9px; }
        .sig-sell { color:#ff4d6d; font-weight:800; border:1px solid #ff4d6d; padding:2px 4px; border-radius:2px; font-size:9px; }
        #status { padding:40px; font-size:11px; color:var(--bl); text-align:center; position:absolute; width:100%; top:200px; }
        #app { padding-bottom: 100px; }
        footer { position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); border-top: 1px solid var(--b1); display: flex; justify-content: space-around; padding: 6px 0; padding-bottom: calc(6px + env(safe-area-inset-bottom)); z-index: 1000; flex-shrink:0; }
        .nav-btn { text-decoration: none; color: #666; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 33%; padding: 4px 0; transition: color 0.2s; }
        .nav-btn svg { display: none; }
        .nav-btn:hover { color: var(--bl); }
        .nav-btn.active { color: var(--bl); font-weight: 800; }
        .nav-label { font-size: 7px; margin-top: 2px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; }
    </style>
</head>

    <a href="analysis.html" class="nav-btn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg><span class="nav-label">Analysis</span></a>
</footer>

<script>
/**
 * BHARATMARKETS ONYX PRO TERMINAL
 * Portfolio Manager & Analytics Dashboard
 * 
 * Version: 1.0 | Status: Production | Last Updated: May 3, 2026
 * 
 * CODE ORGANIZATION:
 *   - Constants & Configuration (DB, Colors, Fields)
 *   - Global State (MASTER, SECTORS, Filters, etc)
 *   - Utility Functions (cleanNum, fmt, resolve, etc)
 *   - Business Logic (enrichStock, getMetricColor, init)
 *   - UI & Rendering (render function, table generation)
 *   - Event Handlers (doSort, tap, toggle functions)
 *   - Page Initialization
 */

// ===== CONSTANTS & CONFIGURATION =====
const DB_NAME = 'OnyxPortfolioDB';
const STORE_NAME = 'Stocks';
const DB_VERSION = 8;

const PALETTE = [
    '#00f2ff', '#7000ff', '#ff007a', '#ffb800', '#00ff88', '#007aff',
    '#ff4d6d', '#f97316', '#a3e635', '#ec4899', '#8b5cf6', '#f43f5e'
];

const UI_FIELDS = [
    '#', 'SECTOR', 'SIGNAL', 'POS', 'NEG', 'QTY', 'AVG', 'INVESTED', 'PNL', 'PNL%',
    'TICKER', '1D%', '1D_GAIN', 'LTP', 'ROE%', 'ROCE%', 'OPM%', 'NPM%', 'PE', 'FV',
    'PB', 'EPS', 'PROM%', 'FII%', 'DII%', 'ATH%', '52W%', 'MCAP', 'SALES', 'EBITDA', 'CFO'
];

const TEXT_FIELDS = ['TICKER', 'SECTOR', 'SIGNAL'];

// ===== GLOBAL STATE =====
let MASTER = [];          // All stocks (portfolio + watchlist)
let SECTORS = [];         // Unique sectors
let COL = {};             // Sector -> Color mapping
let filter = null;        // Current sector filter
let sortCol = 'PNL';      // Current sort column
let sortAsc = false;      // Sort direction (ascending/descending)
let viewMode = 'all';     // View mode: 'all', 'portfolio', 'watchlist'
let searchQuery = '';     // Search filter text
let returnFilter = null;  // Return filter state
let categoryFilter = null; // Category filter: 'equity', 'other', or null

// ===== UTILITY FUNCTIONS =====

/**
 * Convert value to number, handling various formats and edge cases
 * Safely parses strings, handles '—' (dash), null, undefined
 * @param {*} v - Value to convert (number, string, null, undefined, '—')
 * @returns {number} Parsed number or 0 if invalid
 */
const cleanNum = (v) => {
    if (typeof v === 'number') return v;
    if (!v || v === '—') return 0;
    const parsed = parseFloat(v.toString().replace(/[^\d.-]/g, '')) || 0;
    return isNaN(parsed) ? 0 : parsed;
};


/**
 * Check if a field should be sorted alphabetically (text) vs numerically
 * @param {string} field - Field name to check
 * @returns {boolean} True if field is text-based
 */
const isTextField = (field) => TEXT_FIELDS.includes(field);

/**
 * Format value for display based on field type
 * Handles: K/L currency format, decimals, percentages
 * Examples: 100000 → '1.0L', 1500 → '1.5k', 0.95 → '0.9%'
 * @param {*} val - Raw value to format
 * @param {string} field - Field name (determines format rules)
 * @returns {string} Formatted display value
 */
const fmt = (val, field) => {
    if (!field || typeof field !== 'string') return val;
    
    const n = cleanNum(val);
    if (n === 0 && val === '—') return '—';
    
    const formatLargeNum = (num) => {
        if (Math.abs(num) >= 100000) return (num / 100000).toFixed(1) + 'L';
        if (Math.abs(num) >= 1000) return (num / 1000).toFixed(1) + 'k';
        return Math.round(num).toString();
    };
    
    // LTP: 1 decimal with k format for large numbers
    if (field === 'LTP') {
        if (Math.abs(n) >= 1000) return (n / 1000).toFixed(1) + 'k';
        return n.toFixed(1);
    }
    
    if (['MCAP', 'EBITDA', 'SALES', 'CFO'].includes(field)) return formatLargeNum(n);
    if (['INVESTED', '1D_GAIN', 'PNL'].includes(field)) return formatLargeNum(n);
    if (['AVG'].includes(field)) return Math.round(n).toString(); // Remove decimals
    if (['FV'].includes(field)) return Math.round(n).toString();
    if (['PE', 'PB', 'EPS'].includes(field)) return n.toFixed(1); // 1 decimal for EPS
    if (field.includes('%')) return n.toFixed(1) + '%';
    return val;
};

/**
 * Resolve field value from object using field mappings and aliases
 * Maps common field names to actual object properties
 * Examples: 'TICKER' resolves to 'ticker', 'SYM', 'SYMBOL', etc
 * @param {Object} obj - Data object to search (null-checked)
 * @param {string} field - Field name to resolve
 * @returns {*} Field value from object or '—' if not found
 */
const resolve = (obj, field) => {
    // Validation: check inputs
    if (!obj || typeof obj !== 'object') return '—';
    if (!field || typeof field !== 'string') return '—';
    
    const f = field.toUpperCase();
    const mappings = { 
        'SYM':['ticker','SYM','SYMBOL','TICKER'], 
        'TICKER':['ticker','SYM','SYMBOL','TICKER'], 
        'SIGNAL':['signal','SIGNAL','TECH_SIGNAL'],
        'PNL':['pnl','PNL','P/L'], 
        'PNL%':['pnlPct','PNL%','PNL_PCT'], 
        '1D%':['changePct','1D%','CHANGE_1D','CHANGE'], 
        '1D_GAIN':['1dGain','1D_GAIN','1DGAIN'],
        'LTP':['ltp','LTP','PRICE','price'], 
        'QTY':['qty','QTY','quantity'], 
        'AVG':['avg','AVG','AVGBUY','avgbuy'], 
        'INVESTED':['invested','INVESTED'], 
        'POS':['pos','POS','POSITIVE'], 
        'NEG':['neg','NEG','NEGATIVE'], 
        'ROE%':['roe','ROE%','ROE','roe'], 
        'ROCE%':['roce','ROCE%','ROCE'], 
        'OPM%':['opm','OPM%','OPM','opmPct','opm_pct'], 
        'NPM%':['npm','NPM%','NPM','npmPct','npm_pct'], 
        'PE':['pe','PE','P/E'], 
        'PB':['pb','PB','P/B'], 
        'MCAP':['mcap','MCAP','marketcap'], 
        'SALES':['sales','SALES','revenue'], 
        'EBITDA':['ebitda','EBITDA'], 
        'CFO':['cfo','CFO'], 
        'EPS':['eps','EPS'], 
        'FV':['face_value','FV','FACE_VALUE','faceValue'],
        'PROM%':['prom','PROM%','prom_pct'], 
        'FII%':['fii','FII%','fii_pct'], 
        'DII%':['dii','DII%','dii_pct'], 
        'ATH%':['ath','ATH%','ath_pct'], 
        '52W%':['w52','52W%','52WEEK','w52_pct'], 
        'W52H':['w52h','W52H','52WH','52weekHigh'],
        'W52L':['w52l','W52L','52WL','52weekLow'],
        'SECTOR':['sector','SECTOR'],
        'NAME':['name','NAME','COMPANY'],
        'OPEN':['open','OPEN'],
        'HIGH':['high','HIGH'],
        'LOW':['low','LOW'],
        'CHANGE':['change','CHANGE'],
        'VOL':['vol','VOL','VOLUME'],
        'BETA':['beta','BETA']
    };
    const targets = mappings[f] || [f];
    for (let t of targets) {
        if (obj[t] !== undefined) return obj[t];
        const cleanT = t.replace('%', '');
        if (obj[cleanT] !== undefined) return obj[cleanT];
    }
    return '—';
};

/**
 * Determine color class for field value based on professional thresholds
 * Returns CSS class: ' pos' (green), ' neg' (red), or '' (neutral)
 * Applies different logic for different metrics (LTP, PE, ROE, etc)
 * @param {string} field - Field name
 * @param {*} value - Field value to evaluate
 * @param {Object} stock - Stock object for context (optional)
 * @returns {string} CSS class for coloring (' pos', ' neg', or '')
 */
const getMetricColor = (field, value, stock) => {
    const n = cleanNum(value);
    if (n === 0 || value === '—') return '';
    
    // LTP: color based on 1D% (market gain/loss)
    if (field === 'LTP' && stock) {
        const changePct = cleanNum(resolve(stock, '1D%'));
        if (changePct > 0) return ' pos';
        if (changePct < 0) return ' neg';
        return '';
    }
    
    // AVG and INVESTED: green if AVG < LTP (profit), red if AVG >= LTP (loss/breakeven)
    if ((field === 'AVG' || field === 'INVESTED') && stock) {
        const avg = cleanNum(resolve(stock, 'AVG'));
        const ltp = cleanNum(resolve(stock, 'LTP'));
        if (avg > 0 && ltp > 0) {
            return ltp > avg ? ' pos' : ' neg';
        }
        return '';
    }
    
    // EPS: color based on relationship with PE ratio
    if (field === 'EPS' && stock) {
        const eps = cleanNum(value);
        const pe = cleanNum(resolve(stock, 'PE'));
        
        if (eps < 0) return ' neg'; // Negative EPS = red
        if (eps === 0) return ''; // No EPS = neutral
        
        // High EPS + Low PE = Green (good value)
        if (eps > 50 && pe > 0 && pe < 15) return ' pos';
        // High EPS + High PE = Red (expensive despite good earnings)
        if (eps > 50 && pe > 25) return ' neg';
        // Low EPS + High PE = Red (avoid)
        if (eps > 0 && eps < 20 && pe > 25) return ' neg';
        // Positive EPS with reasonable PE = neutral/acceptable
        return '';
    }
    
    // CFO: color based on CFO vs EPS quality
    if (field === 'CFO' && stock) {
        const cfo = cleanNum(value);
        const eps = cleanNum(resolve(stock, 'EPS'));
        
        if (cfo < 0) return ' neg'; // Negative CFO = red (losing cash)
        if (cfo === 0) return ''; // No CFO = neutral
        
        // CFO > EPS = High-quality earnings (green)
        if (cfo > eps && eps > 0) return ' pos';
        // CFO positive but lower than EPS = adequate (neutral)
        if (cfo > 0 && cfo <= eps) return '';
        
        return '';
    }
    
    // EBITDA: color based on valuation (MCAP/EBITDA ratio as proxy for EV/EBITDA)
    if (field === 'EBITDA' && stock) {
        const ebitda = cleanNum(value);
        const mcap = cleanNum(resolve(stock, 'MCAP'));
        
        if (ebitda < 0) return ' neg'; // Negative EBITDA = red (operational loss)
        if (ebitda === 0) return ''; // No EBITDA = neutral
        
        // Calculate simplified EV/EBITDA ratio using MCAP as proxy
        const evEbitdaRatio = mcap > 0 ? mcap / ebitda : 0;
        
        // EV/EBITDA < 8 = Green (cheap)
        if (ebitda > 0 && evEbitdaRatio > 0 && evEbitdaRatio < 8) return ' pos';
        // EV/EBITDA > 20 = Red (expensive)
        if (ebitda > 0 && evEbitdaRatio > 20) return ' neg';
        // EV/EBITDA 8-15 = Neutral (fairly valued)
        return '';
    }
    
    const thresholds = {
        'PE': { green: n < 15, red: n > 25 },
        'PB': { green: n < 1, red: n > 3 },
        'ROE%': { green: n > 20, red: n < 15 },
        'ROCE%': { green: n > 20, red: n < 15 },
        'OPM%': { green: n > 15, red: n < 10 },
        'NPM%': { green: n > 10, red: n < 5 },
        'PROM%': { green: n > 50, red: n < 40 },
        'FII%': { green: n > 20, red: n < 10 },
        'DII%': { green: n > 20, red: n < 10 },
        'ATH%': { green: n > -20, red: n < -50 },
        '52W%': { green: n > 0, red: n < 0 },
        'PNL': { green: n > 0, red: n < 0 },
        'PNL%': { green: n > 0, red: n < 0 },
        '1D%': { green: n > 0, red: n < 0 },
        '1D_GAIN': { green: n > 0, red: n < 0 }
        // POS and NEG are counts, not metrics - no coloring
    };
    
    const t = thresholds[field];
    if (!t) return '';
    if (t.green) return ' pos';
    if (t.red) return ' neg';
    return '';
};

// ===== DATA INITIALIZATION =====

/**
 * Initialize portfolio data from IndexedDB
 * Loads stock data, calculates metrics, populates UI
 * Handles database errors gracefully with user feedback
 * @returns {Promise<void>}
 */
async function init() {
    const statusEl = document.getElementById('status');
    const db = await new Promise(res => {
        // Open without specific version to handle version mismatches from data.html
        const req = indexedDB.open(DB_NAME);
        req.onupgradeneeded = e => {
            const d = e.target.result;
            if (!d.objectStoreNames.contains(STORE_NAME)) {
                d.createObjectStore(STORE_NAME, { keyPath: "ticker" });
            }
        };
        req.onsuccess = () => {
            res(req.result);
        };
        req.onerror = () => {
            res(null);
        };
    });
    
    if (!db) {
        statusEl.innerHTML = "FAILED TO OPEN DATABASE<br>Check browser storage settings";
        return;
    }
    
    try {
        const tx = db.transaction(STORE_NAME, "readonly");
        MASTER = await new Promise((res, rej) => {
            const req = tx.objectStore(STORE_NAME).getAll();
            req.onsuccess = e => {
                const result = e.target.result || [];
                res(result);
            };
            req.onerror = () => {
                rej(req.error);
            };
        });
    } catch(e) {
        statusEl.innerHTML = "ERROR READING DATABASE<br>" + e.message;
        return;
    }
    
    if (MASTER.length === 0) {
        statusEl.innerHTML = "DATABASE EMPTY<br><br>📊 Go to Data tab → Click 🚀 LOAD JSON<br>(No authentication required)";
        return;
    }
    
    statusEl.style.display = "none";
    SECTORS = [...new Set(MASTER.map(s => resolve(s, 'SECTOR') || 'OTHER'))].sort();
    SECTORS.forEach((s, i) => COL[s] = PALETTE[i % PALETTE.length]);
    viewMode = 'all';  // Initialize with mixed portfolio+watchlist view
    render();
}

/**
 * Calculate and enrich stock with derived metrics
 * Computes: INVESTED, PNL, PNL%, 1D_GAIN, ATH%, POS, NEG, SIGNAL
 * Modifies stock object in-place with calculated fields
 * @param {Object} stock - Stock object from MASTER array
 * @returns {Object} Enriched stock object with all calculated fields
 */
function enrichStock(stock) {
    // Calculate INVESTED = QTY * AVG
    const qty = cleanNum(resolve(stock, 'QTY'));
    const avg = cleanNum(resolve(stock, 'AVG'));
    if (qty && avg && !stock.invested) {
        stock.invested = qty * avg;
    }
    
    // Calculate PNL = (LTP - AVG) * QTY
    const ltp = cleanNum(resolve(stock, 'LTP'));
    if (qty && avg && ltp && !stock.pnl) {
        stock.pnl = (ltp - avg) * qty;
    }
    
    // Calculate PNL% = ((LTP - AVG) / AVG) * 100
    if (avg && ltp && !stock.pnlPct) {
        stock.pnlPct = ((ltp - avg) / avg) * 100;
    }
    
    // Calculate 1D_GAIN = QTY * (LTP * changePct / 100)
    const changePct = cleanNum(resolve(stock, '1D%'));
    if (qty && ltp && !stock['1dGain']) {
        stock['1dGain'] = qty * (ltp * changePct / 100);
    }
    
    // Calculate ATH% = ((LTP - 52W High) / 52W High) * 100
    const w52h = cleanNum(resolve(stock, 'W52H'));
    if (ltp && w52h) {
        stock.ath = ((ltp - w52h) / w52h) * 100;
    }
    
    // Calculate POS & NEG based on 8 metrics with thresholds (only if not already set)
    if (!stock.pos || !stock.neg) {
        let pos = 0, neg = 0;
        
        const checkMetric = (field, goodFn, badFn) => {
            const v = cleanNum(resolve(stock, field));
            if (v === 0) return;
            if (goodFn(v)) pos++;
            else if (badFn(v)) neg++;
        };
        
        // Check 8 key metrics
        checkMetric('ROE%', v => v > 15, v => v < 8);
        checkMetric('PE', v => v > 0 && v < 18, v => v > 35);
        checkMetric('OPM%', v => v > 15, v => v > 0 && v < 8);
        checkMetric('NPM%', v => v > 10, v => v > 0 && v < 5);
        checkMetric('PROM%', v => v > 50, v => v > 0 && v < 35);
        checkMetric('1D%', v => v > 1, v => v < -1);
        checkMetric('ATH%', v => v > -10, v => v < -20);
        checkMetric('PB', v => v > 0 && v < 0.5, v => v > 1.5);  // Using PB as proxy for debt_eq
        
        stock.pos = pos;
        stock.neg = neg;
        
        // Compute SIGNAL based on net = pos - neg
        const net = pos - neg;
        if (!stock.signal) {
            stock.signal = net >= 3 ? 'BUY' : net <= -3 ? 'SELL' : 'HOLD';
        }
    }
    
    return stock;
}

// ===== HELPER FUNCTIONS FOR RENDERING =====

/**
 * Calculate portfolio totals and metrics
 * Computes: total PNL, invested, portfolio value, daily gains, sector weights
 * @param {Array} stocks - Array of stock objects to analyze
 * @returns {Object} Totals object with sums and metrics
 */
function calculateTotals(stocks) {
    let sumPnl = 0, sumInv = 0, sumPVal = 0, sumToday = 0, sumLTP = 0, sum1dGain = 0;
    let posCount = 0, negCount = 0, sectorWeights = {};
    
    stocks.forEach(stock => { 
        const sector = resolve(stock, 'SECTOR') || 'OTHER';
        const qty = cleanNum(resolve(stock, 'QTY'));
        const ltp = cleanNum(resolve(stock, 'LTP'));
        const changePct = cleanNum(resolve(stock, '1D%'));
        
        sumPnl += cleanNum(resolve(stock, 'PNL'));
        sumInv += cleanNum(resolve(stock, 'INVESTED'));
        sumLTP += qty * ltp;
        sumPVal += qty * ltp;  // Portfolio value
        
        // Today's gain/loss calculation
        const todayGain = (qty * ltp * changePct) / 100;
        sumToday += todayGain;
        const gain1d = cleanNum(resolve(stock, '1D_GAIN'));
        sum1dGain += gain1d;
        
        // Count positive and negative changes (portfolio stocks only)
        if (qty > 0) {
            if (changePct > 0) posCount++;
            else if (changePct < 0) negCount++;
        }
        
        // Sector weight calculation
        const weight = Math.max(cleanNum(resolve(stock, 'MCAP')) || ltp, 1);
        sectorWeights[sector] = (sectorWeights[sector] || 0) + weight; 
    });
    
    return { sumPnl, sumInv, sumPVal, sumToday, sumLTP, sum1dGain, posCount, negCount, sectorWeights };
}

/**
 * Update KPI display elements with calculated totals
 * Updates: Portfolio Value, Invested, PNL, Daily Gain, Gainers/Losers count
 * @param {Object} totals - Totals object from calculateTotals()
 * @returns {void}
 */
function updateKPIDisplay(totals) {
    const { sumPnl, sumInv, sumPVal, sumToday, posCount, negCount, sectorWeights } = totals;
    
    document.getElementById('k-pval').textContent = '₹' + (sumPVal/100000).toFixed(2) + 'L';
    document.getElementById('k-inv').textContent = '₹' + (sumInv/100000).toFixed(2) + 'L';
    
    const pEl = document.getElementById('k-pnl');
    pEl.textContent = '₹' + (sumPnl/100000).toFixed(2) + 'L';
    pEl.style.color = sumPnl >= 0 ? 'var(--gr)' : 'var(--rd)';
    
    const tValEl = document.getElementById('k-today-val');
    tValEl.textContent = '₹' + Math.abs(sumToday/100000).toFixed(2) + 'L';
    tValEl.style.color = sumToday >= 0 ? 'var(--gr)' : 'var(--rd)';
    
    document.getElementById('k-today-pos').textContent = '↑' + posCount;
    document.getElementById('k-today-neg').textContent = '↓' + negCount;
    
    // Update sector bars
    const totalWeight = Object.values(sectorWeights).reduce((a, b) => a + b, 0);
    const sortedSectors = SECTORS.slice().sort((a, b) => (sectorWeights[b] || 0) - (sectorWeights[a] || 0));
    
    document.getElementById('tape-bar').innerHTML = sortedSectors.map(sector => 
        '<div class="seg' + (filter && filter !== sector ? ' dimmed' : '') + '" ' +
        'style="flex-basis:' + ((sectorWeights[sector]/totalWeight)*100) + '%;background:' + COL[sector] + '" ' +
        'onclick="tap(\'' + sector + '\')"></div>'
    ).join('');
    
    document.getElementById('legend').innerHTML = (filter ? SECTORS.filter(s => s === filter) : SECTORS)
        .map(sector => 
            '<div class="leg ' + (filter === sector ? 'on' : '') + '" ' +
            'onclick="tap(\'' + sector + '\')" ' +
            'style="padding:4px 8px; border-radius:4px; transition:all .2s;">' +
            '<div class="dot" style="background:' + COL[sector] + '"></div>' + sector + '</div>'
        ).join('');
}

/**
 * Apply all active filters to stocks array
 * Filters by: sector, view mode (portfolio/watchlist), category (equity/other), search, return
 * @param {Array} stocks - Array of all stocks
 * @returns {Array} Filtered stocks array
 */
function applyFilters(stocks) {
    let filtered = stocks.slice();
    
    // Sector filter
    if (filter) {
        filtered = filtered.filter(stock => resolve(stock, 'SECTOR') === filter);
    }
    
    // View mode filter (portfolio/watchlist)
    if (viewMode === 'portfolio') {
        filtered = filtered.filter(stock => cleanNum(resolve(stock, 'QTY')) > 0);
    } else if (viewMode === 'watchlist') {
        filtered = filtered.filter(stock => cleanNum(resolve(stock, 'QTY')) === 0 || resolve(stock, 'QTY') === '—');
    }
    
    // Category filter (equity vs other)
    if (categoryFilter === 'equity') {
        filtered = filtered.filter(stock => {
            const isin = (stock.isin || '').toUpperCase();
            return isin.startsWith('INE');
        });
    } else if (categoryFilter === 'other') {
        filtered = filtered.filter(stock => {
            const isin = (stock.isin || '').toUpperCase();
            return !isin.startsWith('INE');
        });
    }
    
    // Search filter
    if (searchQuery) {
        filtered = filtered.filter(stock => 
            resolve(stock, 'TICKER').toUpperCase().includes(searchQuery.toUpperCase())
        );
    }
    
    // Return filter (positive/negative 1D%)
    if (returnFilter === 'pos') {
        filtered = filtered.filter(stock => cleanNum(resolve(stock, '1D%')) > 0);
    } else if (returnFilter === 'neg') {
        filtered = filtered.filter(stock => cleanNum(resolve(stock, '1D%')) < 0);
    }
    
    return filtered;
}

/**
 * Sort stocks array by specified column
 * Handles: text sorting (alphabetical) vs numeric sorting
 * @param {Array} stocks - Array of stocks to sort
 * @returns {Array} Sorted stocks array
 */
function sortStocks(stocks) {
    const sorted = stocks.slice();
    
    sorted.sort((a, b) => {
        let valueA = resolve(a, sortCol);
        let valueB = resolve(b, sortCol);
        
        // Text fields: alphabetical sorting
        if (isTextField(sortCol)) {
            let strA = (valueA || '').toString().toUpperCase();
            let strB = (valueB || '').toString().toUpperCase();
            return sortAsc ? strA.localeCompare(strB) : strB.localeCompare(strA);
        }
        
        // Numeric fields: numeric sorting
        let numA = cleanNum(valueA);
        let numB = cleanNum(valueB);
        return sortAsc ? numA - numB : numB - numA;
    });
    
    return sorted;
}

/**
 * Build table header HTML
 * Includes column names, sort indicators, click handlers
 * @returns {string} HTML for table header
 */
function buildTableHeader() {
    let html = '<table><thead><tr>';
    
    UI_FIELDS.forEach(field => {
        if (field === '#') {
            html += '<th class="' + (field === 'TICKER' ? 'sticky' : '') + '"><sup></sup>#</th>';
        } else {
            let widthStyle = '';
            if (field === 'SECTOR') widthStyle = 'style="max-width:60px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;"';
            else if (field === 'TICKER') widthStyle = 'style="max-width:70px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;"';
            
            const displayName = {'INVESTED':'inv', '1D_GAIN':'1dg', '1D%':'1dg%'}[field] || field;
            const sortIndicator = field === sortCol ? (sortAsc ? '▲' : '▼') : '';
            
            html += '<th onclick="doSort(\'' + field + '\')" ' +
                    'class="' + (field === sortCol ? 'active' : '') + ' ' + (field === 'TICKER' ? 'sticky' : '') + '" ' +
                    widthStyle + '>' +
                    '<sup>' + sortIndicator + '</sup>' + displayName + '</th>';
        }
    });
    
    html += '</tr></thead><tbody>';
    return html;
}

/**
 * Build table body rows HTML
 * Renders each stock with formatted values and color coding
 * @param {Array} stocks - Array of stocks to render
 * @returns {string} HTML for table rows
 */
function buildTableRows(stocks) {
    let html = '';
    
    stocks.forEach((stock, index) => {
        const ticker = resolve(stock, 'TICKER');
        html += '<tr style="cursor:pointer;" onclick="window.location.href=\'analysis.html?drill=' + encodeURIComponent(ticker) + '\'">';
        
        UI_FIELDS.forEach(field => {
            if (field === '#') {
                html += '<td style="color:#666; text-align:center;">' + (index + 1) + '</td>';
            } else {
                const rawValue = resolve(stock, field);
                const formattedValue = fmt(rawValue, field);
                let cellClass = field === 'TICKER' ? 'sticky' : '';
                let cellStyle = '';
                
                if (field === 'SECTOR') cellStyle = 'style="max-width:60px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;"';
                else if (field === 'TICKER') cellStyle = 'style="max-width:70px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;"';
                
                if (field === 'SIGNAL') {
                    const signalValue = formattedValue.toString().toUpperCase();
                    if (signalValue === 'BUY') html += '<td class="' + cellClass + '" ' + cellStyle + '><span class="sig-buy">BUY</span></td>';
                    else if (signalValue === 'SELL') html += '<td class="' + cellClass + '" ' + cellStyle + '><span class="sig-sell">SELL</span></td>';
                    else html += '<td class="' + cellClass + '" ' + cellStyle + '>' + formattedValue + '</td>';
                } else {
                    cellClass += getMetricColor(field, rawValue, stock);
                    html += '<td class="' + cellClass + '" ' + cellStyle + '>' + formattedValue + '</td>';
                }
            }
        });
        
        html += '</tr>';
    });
    
    return html;
}

/**
 * Build table footer HTML with totals
 * Shows total PNL, Invested amount, Daily gain across all visible stocks
 * @param {Object} totals - Totals object from calculateTotals()
 * @returns {string} HTML for table footer
 */
function buildTableFooter(totals) {
    const { sumPnl, sumInv, sum1dGain } = totals;
    let html = '</tbody><tfoot><tr>';
    
    UI_FIELDS.forEach(field => {
        let cellClass = field === 'TICKER' ? 'sticky' : '';
        
        if (field === '#') {
            html += '<td style="color:#666;"></td>';
        } else if (field === 'TICKER') {
            html += '<td class="' + cellClass + '">TOTAL</td>';
        } else if (field === 'PNL') {
            html += '<td class="' + (sumPnl >= 0 ? 'pos' : 'neg') + '">' + fmt(sumPnl, 'PNL') + '</td>';
        } else if (field === 'INVESTED') {
            html += '<td>' + fmt(sumInv, 'INVESTED') + '</td>';
        } else if (field === '1D_GAIN') {
            html += '<td class="' + (sum1dGain >= 0 ? 'pos' : 'neg') + '">' + fmt(sum1dGain, '1D_GAIN') + '</td>';
        } else {
            html += '<td class="' + cellClass + '"></td>';
        }
    });
    
    html += '</tr></tfoot></table>';
    return html;
}

// ===== UI & RENDERING =====

/**
 * Main render function - orchestrates table generation and display
 * Calls helper functions for: filtering, sorting, calculating totals, building table
 * Updates KPI display and renders table HTML
 * Called after any filter/sort change or data update
 * @returns {void}
 */
function render() {
    // Enrich all stocks with calculated fields
    MASTER.forEach(stock => enrichStock(stock));
    
    // Calculate totals from all master stocks (for KPI display)
    const totals = calculateTotals(MASTER);
    updateKPIDisplay(totals);
    
    // Apply filters and sort
    let filteredRows = applyFilters(MASTER);
    filteredRows = sortStocks(filteredRows);
    
    // Build and render table
    let html = buildTableHeader();
    html += buildTableRows(filteredRows);
    html += buildTableFooter(totals);
    
    document.getElementById('app').innerHTML = html;
}

// ===== EVENT HANDLERS & CONTROLS =====

/**
 * Handle column sort clicks
 * Toggles sort direction if same column clicked, resets to ascending for new column
 * @param {string} fieldName - Field/column name to sort by
 * @returns {void}
 */
function doSort(fieldName) {
    if (sortCol === fieldName) sortAsc = !sortAsc;
    else { sortCol = fieldName; sortAsc = false; }
    render();
}

/**
 * Handle sector filter toggle (tapping sector bar)
 * Toggles between filtering to sector and showing all
 * @param {string} sector - Sector name to filter
 * @returns {void}
 */
function tap(sector) {
    filter = filter === sector ? null : sector;
    render();
}

/**
 * Toggle view mode: All → Portfolio → Watchlist → All
 * Updates button text and color, re-renders table
 * @returns {void}
 */
function toggleViewMode() {
    if (viewMode === 'all') {
        viewMode = 'portfolio';
        document.getElementById('btn-toggle').innerHTML = 'PT';
        document.getElementById('btn-toggle').style.background = '#007aff';
        document.getElementById('btn-toggle').style.color = '#fff';
    } else if (viewMode === 'portfolio') {
        viewMode = 'watchlist';
        document.getElementById('btn-toggle').innerHTML = 'WA';
        document.getElementById('btn-toggle').style.background = '#ff9500';
        document.getElementById('btn-toggle').style.color = '#fff';
    } else {
        viewMode = 'all';
        document.getElementById('btn-toggle').innerHTML = 'PW';
        document.getElementById('btn-toggle').style.background = '#666';
        document.getElementById('btn-toggle').style.color = '#fff';
    }
    document.getElementById('btn-all').style.background = '#666';
    document.getElementById('btn-all').style.color = '#fff';
    render();
}

/**
 * Toggle return/daily gain filter: All → Gainers (↑) → Losers (↓) → All
 * Shows stocks by daily return (1D_GAIN): positive, negative, or all
 * @returns {void}
 */
function toggleReturnFilter() {
    if (returnFilter === null) {
        returnFilter = 'pos';  // Show only positive returns
        document.getElementById('btn-return').innerHTML = '↑';
        document.getElementById('btn-return').style.background = '#00ff88';
        document.getElementById('btn-return').style.color = '#000';
    } else if (returnFilter === 'pos') {
        returnFilter = 'neg';  // Show only negative returns
        document.getElementById('btn-return').innerHTML = '↓';
        document.getElementById('btn-return').style.background = '#ff6b85';
        document.getElementById('btn-return').style.color = '#fff';
    } else {
        returnFilter = null;  // Show all
        document.getElementById('btn-return').innerHTML = 'DG';
        document.getElementById('btn-return').style.background = '#666';
        document.getElementById('btn-return').style.color = '#fff';
    }
    render();
}

/**
 * Toggle category filter: All → Equity (INE) → Other (non-INE) → All
 * Filters stocks by ISIN type: equity stocks vs mutual funds/bonds
 * @returns {void}
 */
function toggleCategoryFilter() {
    if (categoryFilter === null) {
        categoryFilter = 'equity';  // Show only equities (INE)
        document.getElementById('btn-category').innerHTML = 'EQ';
        document.getElementById('btn-category').style.background = '#007aff';
        document.getElementById('btn-category').style.color = '#fff';
    } else if (categoryFilter === 'equity') {
        categoryFilter = 'other';  // Show only non-equities (non-INE)
        document.getElementById('btn-category').innerHTML = 'INS';
        document.getElementById('btn-category').style.background = '#ff9500';
        document.getElementById('btn-category').style.color = '#fff';
    } else {
        categoryFilter = null;  // Show all
        document.getElementById('btn-category').innerHTML = 'SPLT';
        document.getElementById('btn-category').style.background = '#666';
        document.getElementById('btn-category').style.color = '#fff';
    }
    render();
}

/**
 * Set view mode programmatically
 * Used by "ALL" button to reset to all-stocks view
 * @param {string} mode - View mode: 'all', 'portfolio', 'watchlist'
 * @returns {void}
 */
function setViewMode(mode) {
    viewMode = mode;
    document.getElementById('btn-toggle').style.background = '#666';
    document.getElementById('btn-toggle').style.color = '#fff';
    document.getElementById('btn-all').style.background = mode === 'all' ? '#00ff88' : '#666';
    document.getElementById('btn-all').style.color = mode === 'all' ? '#000' : '#fff';
    render();
}

/**
 * Handle search input changes
 * Updates searchQuery and re-renders table with search filter applied
 * @param {string} value - Search query text
 * @returns {void}
 */
function onSearchInput(value) {
    searchQuery = value;
    render();
}

/**
 * Reset all filters and view modes to defaults
 * Clears: search, sector filter, view mode, return filter, category filter
 * Resets all button styles to default
 * @returns {void}
 */
function resetAll() {
    filter = null;
    sortCol = 'P/L';
    sortAsc = false;
    viewMode = 'all';
    searchQuery = '';
    returnFilter = null;
    categoryFilter = null;
    document.getElementById('search-input').value = '';
    document.getElementById('btn-toggle').innerHTML = 'PW';
    document.getElementById('btn-toggle').style.background = '#666';
    document.getElementById('btn-toggle').style.color = '#fff';
    document.getElementById('btn-category').innerHTML = 'SPLT';
    document.getElementById('btn-category').style.background = '#666';
    document.getElementById('btn-category').style.color = '#fff';
    document.getElementById('btn-return').innerHTML = 'DG';
    document.getElementById('btn-return').style.background = '#666';
    document.getElementById('btn-return').style.color = '#fff';
    document.getElementById('btn-all').style.background = '#00ff88';
    document.getElementById('btn-all').style.color = '#000';
    render();
}

 * Sync engine - refresh data from IndexedDB
 * Called by manual sync controls (if implemented)
 * @returns {Promise<void>}
 */
function runEngineSync() {
    init().catch(err => {
        console.error('Sync error:', err);
    });
}

    if (event.persisted) {
        init().catch(err => {
            console.error('Page reload error:', err);
        });
    }
});

// Initialize on first page load
init().catch(err => {

    if (statusEl) {
        statusEl.innerHTML = 'ERROR: Failed to load portfolio<br>' + (err.message || 'Unknown error');
        statusEl.style.display = 'block';
    }
    console.error('Initialization error:', err);
});
