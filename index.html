<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>BharatMarkets | Portfolio Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&family=Syne:wght@800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #04060f; --s1: #0a0e1a; --s2: #121a2d; --b1: #1e293b;
            --gr1: #00f2ff; --gr2: #00ff88; --rd1: #ff4d6d; --amb: #ffb100;
            --tx1: #f0f6ff; --tx3: #708499;
        }
        body { background: var(--bg); color: var(--tx1); font-family: -apple-system, sans-serif; margin: 0; padding: 0; }
        
        /* Matching your app-portfolio.js CSS logic */
        .badge { padding: 2px 6px; border-radius: 4px; font-family: 'JetBrains Mono'; font-size: 10px; font-weight: 700; }
        .bg-grn { background: #003a20; color: var(--gr2); }
        .bg-red { background: #3a0010; color: var(--rd1); }
        .bg-amb { background: #3a1a00; color: var(--amb); }

        .bls-table-outer { width: 100%; overflow-x: auto; padding-bottom: 100px; }
        .bls-t { width: 100%; border-collapse: collapse; font-size: 11px; font-family: 'JetBrains Mono'; white-space: nowrap; }
        .bls-t th { background: var(--s1); color: var(--tx3); padding: 12px 10px; text-align: right; border-bottom: 1px solid var(--b1); position: sticky; top: 0; }
        .bls-t td { padding: 12px 10px; border-bottom: 1px solid #182840; text-align: right; vertical-align: middle; }
        .t-left { text-align: left !important; }

        .sym-cell { display: flex; flex-direction: column; line-height: 1.2; }
        .sym-cell b { font-family: 'Syne'; font-size: 13px; color: var(--gr1); }
        .sym-cell small { font-size: 9px; color: var(--tx3); text-transform: uppercase; }

        #nav { position: fixed; bottom: 0; width: 100%; background: var(--s1); display: flex; border-top: 1px solid var(--b1); padding-bottom: env(safe-area-inset-bottom); }
        .nb { flex: 1; background: none; border: none; color: var(--tx3); padding: 18px 0; font-size: 10px; font-weight: 700; text-transform: uppercase; cursor: pointer; }
        .nb.active { color: var(--gr1); border-top: 2px solid var(--gr1); }
        .btn-sync { background: var(--gr1) !important; color: #000 !important; font-weight: 900; }
    </style>
</head>
<body onload="init()">

    <div id="content"></div>

    <nav id="nav">
        <button class="nb active" onclick="showTab('portfolio', this)">Portfolio</button>
        <button class="nb" onclick="showTab('import', this)">Import</button>
        <button class="nb btn-sync" onclick="fullBakeSync()">SYNC ALL</button>
    </nav>

    <script src="app-engine.js"></script>
    <script>
        let curTab = 'portfolio';

        // Helper for the Green/Red/Amber logic from your .js file
        function getStyle(val, type) {
            if (type === 'roe') return val > 20 ? 'bg-grn' : (val > 12 ? 'bg-amb' : 'bg-red');
            if (type === 'pnl') return val >= 0 ? 'bg-grn' : 'bg-red';
            return '';
        }

        async function fullBakeSync() {
            try {
                const [fData, sMap] = await Promise.all([
                    fetch('fundamentals.json').then(r => r.json()),
                    fetch('symbol_map.json').then(r => r.json())
                ]);

                const db = await initEngineDB();
                const tx = db.transaction('UnifiedStocks', 'readwrite');
                const store = tx.objectStore('UnifiedStocks');
                const holdings = await new Promise(r => {
                    store.getAll().onsuccess = (e) => r(e.target.result || []);
                });

                holdings.forEach(h => {
                    const mapped = sMap.overrides[h.sym] || h.sym;
                    const clean = mapped.split('.')[0];
                    // DIGGING INTO THE 'STOCKS' WRAPPER FOUND IN YOUR JSON
                    const f = fData.stocks[mapped] || fData.stocks[clean] || fData.stocks[h.sym] || {};

                    const ltp = f.ltp || 0;
                    const pnl = Math.round((h.qty * ltp) - (h.qty * h.avgBuy));
                    const pnlNet = h.avgBuy > 0 ? ((ltp - h.avgBuy) / h.avgBuy * 100).toFixed(2) : 0;

                    store.put({ ...h, ...f, sym: mapped, ltp, pnl, pnlNet });
                });

                tx.oncomplete = () => render();
            } catch (e) { console.error("Sync Failed", e); }
        }

        async function renderPortfolio(container) {
            const db = await initEngineDB();
            const stocks = await new Promise(r => {
                const tx = db.transaction('UnifiedStocks', 'readonly');
                tx.objectStore('UnifiedStocks').getAll().onsuccess = (e) => r(e.target.result || []);
            });

            if (!stocks.length) { container.innerHTML = "<div style='padding:40px'>No Data. Import & Sync.</div>"; return; }

            let h = `<div class="bls-table-outer"><table class="bls-t"><thead><tr>
                <th class="t-left">SYMBOL</th><th>LTP</th><th>ROE%</th><th>OPM%</th><th>P&L</th>
            </tr></thead><tbody>`;

            stocks.forEach(s => {
                h += `<tr>
                    <td class="t-left">
                        <div class="sym-cell"><b>${s.sym}</b><small>${s.sector || '—'}</small></div>
                    </td>
                    <td><div style="font-weight:700">₹${s.ltp || 0}</div><small style="color:var(--tx3)">${s.chg1d || 0}%</small></td>
                    <td><span class="badge ${getStyle(s.roe, 'roe')}">${s.roe || 0}%</span></td>
                    <td><span class="badge bg-amb">${s.opm_pct || 0}%</span></td>
                    <td><span class="badge ${getStyle(s.pnl, 'pnl')}">${s.pnl || 0}</span><br><small class="${getStyle(s.pnl, 'pnl')}" style="background:none">${s.pnlNet}%</small></td>
                </tr>`;
            });
            container.innerHTML = h + `</tbody></table></div>`;
        }

        function showTab(t, btn) {
            curTab = t;
            document.querySelectorAll('.nb').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            render();
        }

        function render() {
            const c = document.getElementById('content');
            if (curTab === 'import') {
                c.innerHTML = `<div style="padding:20px"><textarea id="import-area" style="width:100%;height:200px;background:#0a0e1a;color:#fff;border:1px solid #1e293b;padding:12px;font-family:'JetBrains Mono'" placeholder="TICKER QTY AVG"></textarea><button class="nb btn-sync" style="width:100%;margin-top:10px;border-radius:8px" onclick="processImport()">SAVE SYMBOLS</button></div>`;
            } else { renderPortfolio(c); }
        }

        async function processImport() {
            const text = document.getElementById('import-area').value;
            const db = await initEngineDB();
            const tx = db.transaction('UnifiedStocks', 'readwrite');
            const store = tx.objectStore('UnifiedStocks');
            text.trim().split('\n').forEach(line => {
                const p = line.split(/\s+/);
                if (p.length >= 3) store.put({ sym: p[0].toUpperCase(), qty: parseFloat(p[1]), avgBuy: parseFloat(p[2]) });
            });
            tx.oncomplete = () => { showTab('portfolio', document.querySelector('.nb')); };
        }

        function init() { render(); }
    </script>
</body>
</html>
