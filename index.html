<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>BharatMarkets Pro | Full Data Sync</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #04060f; --s1: #0a0e1a; --s2: #121a2d; --b1: #1e293b;
            --gr1: #00f2ff; --gr2: #00e896; --tx1: #f0f6ff; --tx3: #708499;
        }
        body { background: var(--bg); color: var(--tx1); font-family: -apple-system, sans-serif; margin: 0; padding: 0; }
        
        /* Expanded Debug Window */
        #debug-log { height: 150px; overflow-y: auto; background: #000; border-bottom: 2px solid var(--gr1); font-family: 'JetBrains Mono'; font-size: 11px; padding: 15px; color: var(--gr1); line-height: 1.6; }
        
        .bls-table-outer { width: 100%; overflow-x: auto; padding-bottom: 100px; }
        .bls-t { width: 100%; border-collapse: collapse; font-size: 11px; font-family: 'JetBrains Mono'; white-space: nowrap; }
        .bls-t th { background: var(--s1); color: var(--tx3); padding: 12px 15px; text-align: left; border-bottom: 1px solid var(--b1); position: sticky; top: 0; z-index: 10; }
        .bls-t td { padding: 12px 15px; border-bottom: 1px solid #182840; }

        .import-box { padding: 20px; }
        #import-area { width: 100%; height: 150px; background: var(--s2); color: #fff; border: 1px solid var(--b1); border-radius: 8px; padding: 12px; font-family: 'JetBrains Mono'; }
        
        #nav { position: fixed; bottom: 0; width: 100%; background: var(--s1); display: flex; border-top: 1px solid var(--b1); padding-bottom: env(safe-area-inset-bottom); }
        .nb { flex: 1; background: none; border: none; color: var(--tx3); padding: 18px 0; font-size: 10px; font-weight: 700; text-transform: uppercase; }
        .nb.active { color: var(--gr1); border-top: 2px solid var(--gr1); }
        
        .btn-sync { background: var(--gr2) !important; color: #000 !important; font-weight: 900; }
    </style>
</head>
<body onload="init()">

    <div id="debug-log">SYSTEM READY. WAITING FOR COMMAND...</div>
    <div id="content"></div>

    <nav id="nav">
        <button class="nb active" onclick="showTab('portfolio', this)">Portfolio</button>
        <button class="nb" onclick="showTab('raw', this)">33 Fields View</button>
        <button class="nb" onclick="showTab('import', this)">Import</button>
        <button class="nb btn-sync" onclick="bakeAllFields()">BAKE 33 FIELDS</button>
    </nav>

    <script src="app-engine.js"></script>
    <script>
        let curTab = 'portfolio';

        function log(msg) {
            const l = document.getElementById('debug-log');
            const time = new Date().toLocaleTimeString().split(' ')[0];
            l.innerHTML = `<div><span style="color:#555">[${time}]</span> ${msg}</div>` + l.innerHTML;
        }

        async function bakeAllFields() {
            log("INITIATING FULL DATA EXTRACTION...");
            try {
                const [fData, pData, sMaster, sMap] = await Promise.all([
                    fetch('fundamentals.json').then(r => r.json()),
                    fetch('prices.json').then(r => r.json()),
                    fetch('symbols.json').then(r => r.json()),
                    fetch('symbol_map.json').then(r => r.json())
                ]);

                const db = await initEngineDB();
                const tx = db.transaction('UnifiedStocks', 'readwrite');
                const store = tx.objectStore('UnifiedStocks');
                
                const holdings = await new Promise(r => {
                    store.getAll().onsuccess = (e) => r(e.target.result || []);
                });

                if (holdings.length === 0) return log("ABORTED: No symbols in DB.");

                holdings.forEach(h => {
                    const resolvedSym = sMap.overrides[h.sym] || h.sym;
                    const cleanKey = resolvedSym.split('.')[0];
                    
                    // Match across all possible naming conventions
                    const variants = [resolvedSym, `${resolvedSym}.NS`, `${resolvedSym}.BO`, cleanKey];
                    let fundEntry = {}, priceEntry = {};
                    
                    for (let v of variants) {
                        if (fData[v]) fundEntry = fData[v];
                        if (pData[v]) priceEntry = pData[v];
                    }

                    const master = sMaster.find(m => m.sym === h.sym || m.sym === cleanKey) || {};

                    // BAKE ALL FIELDS (The 33 fields from your JSON)
                    const bakedRecord = {
                        ...h,
                        ...master,      // Pulls sector, name, isin
                        ...fundEntry,    // Pulls ROE, PE, OPM%, Sales, EBITDA, etc.
                        ...priceEntry,   // Pulls LTP, Change%
                        sym: resolvedSym,
                        lastSync: new Date().toISOString()
                    };

                    // Re-calculate basic P&L based on the newly pulled LTP
                    const ltp = bakedRecord.ltp || 0;
                    bakedRecord.pnl = Math.round((h.qty * ltp) - (h.qty * h.avgBuy));
                    bakedRecord.pnlNet = h.avgBuy > 0 ? (((ltp - h.avgBuy) / h.avgBuy) * 100).toFixed(2) : 0;

                    store.put(bakedRecord);
                });

                tx.oncomplete = () => {
                    log("SUCCESS: 33+ fields baked into IndexedDB.");
                    render();
                };
            } catch (e) {
                log("FETCH ERROR: Ensure fundamentals.json and prices.json are accessible.");
            }
        }

        async function renderRaw(container) {
            const db = await initEngineDB();
            const stocks = await new Promise(r => {
                const tx = db.transaction('UnifiedStocks', 'readonly');
                tx.objectStore('UnifiedStocks').getAll().onsuccess = (e) => r(e.target.result || []);
            });

            if (!stocks.length) { container.innerHTML = "<div style='padding:50px'>No data.</div>"; return; }

            const keys = Object.keys(stocks[0]);
            let h = `<div class="bls-table-outer"><table class="bls-t"><thead><tr>`;
            keys.forEach(k => h += `<th>${k}</th>`);
            h += `</tr></thead><tbody>`;

            stocks.forEach(s => {
                h += `<tr>`;
                keys.forEach(k => h += `<td>${s[k] !== undefined ? s[k] : '—'}</td>`);
                h += `</tr>`;
            });
            container.innerHTML = h + `</tbody></table></div>`;
        }

        async function renderPortfolio(container) {
            const db = await initEngineDB();
            const stocks = await new Promise(r => {
                const tx = db.transaction('UnifiedStocks', 'readonly');
                tx.objectStore('UnifiedStocks').getAll().onsuccess = (e) => r(e.target.result || []);
            });

            if (!stocks.length) { container.innerHTML = "<div style='padding:100px;text-align:center'>Empty.</div>"; return; }

            let h = `<div class="bls-table-outer"><table class="bls-t"><thead><tr>
                <th>Stock</th><th>Sector</th><th>ROE</th><th>LTP</th><th>P&L</th>
            </tr></thead><tbody>`;

            stocks.forEach(s => {
                h += `<tr>
                    <td><strong>${s.sym}</strong></td>
                    <td style="color:var(--tx3)">${s.sector || '—'}</td>
                    <td>${s.roe || 0}%</td>
                    <td>₹${s.ltp || 0}</td>
                    <td style="color:${s.pnl >= 0 ? 'var(--gr2)' : 'var(--rd2)'}">${s.pnl || 0} (${s.pnlNet}%)</td>
                </tr>`;
            });
            container.innerHTML = h + `</tbody></table></div>`;
        }

        function showTab(t, btn) {
            curTab = t;
            document.querySelectorAll('.nb').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            render();
        }

        function render() {
            const c = document.getElementById('content');
            if (curTab === 'import') {
                c.innerHTML = `<div class="import-box">
                    <textarea id="import-area" placeholder="SYMBOL QTY AVG"></textarea>
                    <button class="nb btn-sync" style="width:100%;margin-top:10px;border-radius:8px" onclick="processImport()">SAVE SYMBOLS</button>
                </div>`;
            } else if (curTab === 'raw') {
                renderRaw(c);
            } else {
                renderPortfolio(c);
            }
        }

        async function processImport() {
            const text = document.getElementById('import-area').value;
            const lines = text.trim().split('\n');
            const db = await initEngineDB();
            const tx = db.transaction('UnifiedStocks', 'readwrite');
            const store = tx.objectStore('UnifiedStocks');
            lines.forEach(line => {
                const p = line.split(/\s+/);
                if (p.length >= 3) store.put({ sym: p[0].toUpperCase(), qty: parseFloat(p[1]), avgBuy: parseFloat(p[2]) });
            });
            tx.oncomplete = () => { log("Symbols Saved. Click BAKE."); showTab('portfolio', document.querySelector('.nb')); };
        }

        function init() { render(); }
    </script>
</body>
</html>
