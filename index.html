<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>BharatMarkets Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #04060f; --s1: #0a0e1a; --s2: #121a2d;
            --b1: #1e293b; --gr1: #00f2ff; --gr2: #00e896; --rd2: #ff6b85;
            --tx1: #f0f6ff; --tx3: #708499; --yw2: #ffbf47;
        }
        body { background: var(--bg); color: var(--tx1); font-family: -apple-system, system-ui, sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        
        /* THE SCREEENER TABLE STYLES */
        .bls-table-outer { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; border-top: 1px solid var(--b1); }
        .bls-t { width: 100%; border-collapse: collapse; font-size: 11px; font-family: 'JetBrains Mono', monospace; white-space: nowrap; }
        .bls-t th { background: var(--s1); color: var(--tx3); font-weight: 700; padding: 10px 8px; text-align: right; border-bottom: 1px solid var(--b1); position: sticky; top: 0; z-index: 20; }
        .bls-t td { padding: 10px 8px; border-bottom: 1px solid #18284040; text-align: right; }
        
        /* Sticky Columns */
        .th-l, .td-l { text-align: left !important; }
        .th-fix, .td-fix { position: sticky; left: 0; z-index: 10; background: var(--bg); }
        .th-fix1, .td-fix1 { left: 0; min-width: 80px; }
        .th-fix2, .td-fix2 { left: 80px; min-width: 70px; border-right: 1px solid var(--b1); }

        /* KPI Strip */
        .kpi-strip { display: flex; overflow-x: auto; background: var(--s1); padding: 15px; gap: 20px; border-bottom: 1px solid var(--b1); }
        .kpi { flex-shrink: 0; }
        .kpi-l { font-size: 9px; color: var(--tx3); font-weight: 800; text-transform: uppercase; margin-bottom: 4px; }
        .kpi-v { font-size: 16px; font-weight: 700; font-family: 'Syne'; }
        .kpi-s { font-size: 10px; color: var(--tx3); margin-top: 2px; }

        /* Navigation */
        #nav { position: fixed; bottom: 0; width: 100%; background: var(--s1); display: flex; border-top: 1px solid var(--b1); padding-bottom: env(safe-area-inset-bottom); z-index: 1000; }
        .nb { flex: 1; background: none; border: none; color: var(--tx3); padding: 16px 0; font-size: 10px; font-weight: 700; text-transform: uppercase; }
        .nb.active { color: var(--gr1); border-top: 2px solid var(--gr1); }

        /* Utilities */
        .u-dark { color: #4a6888; }
        .u-dim { color: #8eb0d0; }
        .pos-neg { display: flex; gap: 4px; justify-content: flex-end; }
        .pn-p { color: var(--gr2); font-weight: 800; }
        .pn-n { color: var(--rd2); font-weight: 800; }
    </style>
</head>
<body onload="init()">

    <div id="content"></div>

    <nav id="nav">
        <button class="nb active" onclick="showTab('portfolio', this)">Portfolio</button>
        <button class="nb" onclick="showTab('watchlist', this)">Watchlist</button>
        <button class="nb" onclick="openImport()">Import</button>
    </nav>

    <script src="app-engine.js"></script>

    <script>
        /* ═══════════════════════════════════════════════════════════
           SECTION 1: UTILITIES (From app-portfolio.js)
        ═══════════════════════════════════════════════════════════ */
        const CSS = {
            GRN_BD: 'background:#003a20;color:#fff;font-weight:700',
            RED_BD: 'background:#3a0010;color:#fff;font-weight:700',
            DIM: 'color:#4a6888',
            NEU: 'color:#c8dff5'
        };

        function fn(v, dp=1, prefix='', suffix=''){
            if(v===null||v===undefined||isNaN(v)) return '<span class="u-dark">—</span>';
            return prefix+Number(v).toFixed(dp)+suffix;
        }

        function fnCr(v){
            if(v===null||v===undefined||isNaN(v)) return '<span class="u-dark">—</span>';
            if(v>=100000) return (v/100000).toFixed(1)+'LCr';
            if(v>=1000)   return (v/1000).toFixed(1)+'KCr';
            return v.toFixed(0)+'Cr';
        }

        /* ═══════════════════════════════════════════════════════════
           SECTION 2: RENDERERS
        ═══════════════════════════════════════════════════════════ */
        async function renderPortfolio(container) {
            const db = await initEngineDB();
            const stocks = await new Promise(r => {
                const tx = db.transaction('UnifiedStocks', 'readonly');
                tx.objectStore('UnifiedStocks').getAll().onsuccess = (e) => r(e.target.result || []);
            });

            // 1. KPI Calculation
            const totalInv = stocks.reduce((a,h)=> a + (h.qty * (h.avgBuy || 0)), 0);
            const totalCur = stocks.reduce((a,h)=> a + (h.qty * (h.ltp || 0)), 0);
            const totalPnL = totalCur - totalInv;
            const pnlPct = totalInv > 0 ? (totalPnL / totalInv) * 100 : 0;

            let html = `
                <div class="kpi-strip">
                    <div class="kpi"><div class="kpi-l">Invested</div><div class="kpi-v" style="color:#64b5f6">₹${(totalInv/100000).toFixed(2)}L</div></div>
                    <div class="kpi"><div class="kpi-l">Mkt Value</div><div class="kpi-v">₹${(totalCur/100000).toFixed(2)}L</div></div>
                    <div class="kpi"><div class="kpi-l">Total P&L</div><div class="kpi-v" style="color:${totalPnL>=0?'var(--gr2)':'var(--rd2)'}">${totalPnL>=0?'+':''}₹${(Math.abs(totalPnL)/100000).toFixed(2)}L</div><div class="kpi-s">${pnlPct.toFixed(2)}%</div></div>
                </div>
                
                <div class="bls-table-outer">
                    <table class="bls-t">
                        <thead>
                            <tr>
                                <th class="th-l th-fix th-fix1">Ticker</th>
                                <th class="th-l th-fix th-fix2">Sector</th>
                                <th>LTP</th>
                                <th>%1D</th>
                                <th>Qty</th>
                                <th>Avg</th>
                                <th>P&L</th>
                                <th>P&L%</th>
                                <th>Signals</th>
                            </tr>
                        </thead>
                        <tbody>`;

            stocks.forEach(h => {
                const inv = h.qty * (h.avgBuy || 0);
                const cur = h.qty * (h.ltp || 0);
                const pnl = cur - inv;
                const pnlP = inv > 0 ? (pnl/inv)*100 : 0;
                const cPnL = pnl >= 0 ? CSS.GRN_BD : CSS.RED_BD;

                html += `
                    <tr>
                        <td class="td-l td-fix td-fix1"><strong>${h.sym}</strong></td>
                        <td class="td-l td-fix td-fix2" style="color:var(--tx3); font-size:9px">${h.sector || '—'}</td>
                        <td style="font-weight:600">₹${fn(h.ltp, 1)}</td>
                        <td style="${h.chg >= 0 ? 'color:var(--gr2)' : 'color:var(--rd2)'}">${h.chg >= 0 ? '+' : ''}${fn(h.chg, 2)}%</td>
                        <td class="u-dim">${h.qty}</td>
                        <td class="u-dim">₹${fn(h.avgBuy, 1)}</td>
                        <td style="${cPnL}">${pnl >= 0 ? '+' : ''}${pnl.toFixed(0)}</td>
                        <td style="${cPnL}">${pnlP >= 0 ? '+' : ''}${pnlP.toFixed(1)}%</td>
                        <td><div class="pos-neg"><span class="pn-p">3</span><span class="pn-n">0</span></div></td>
                    </tr>`;
            });

            html += `</tbody></table></div>`;
            container.innerHTML = html;
        }

        /* ═══════════════════════════════════════════════════════════
           CORE NAVIGATION
        ═══════════════════════════════════════════════════════════ */
        async function showTab(t, btn) {
            currentTab = t;
            document.querySelectorAll('.nb').forEach(b => b.classList.remove('active'));
            if(btn) btn.classList.add('active');
            render();
        }

        async function render() {
            const container = document.getElementById('content');
            if (currentTab === 'portfolio') await renderPortfolio(container);
            else container.innerHTML = '<div style="padding:40px; text-align:center; color:var(--tx3)">Module coming soon...</div>';
        }

        function init() { render(); }
    </script>
</body>
</html>
