```
<header>
    <div class="kpi-box"><div class="kpi-label">Invested</div><div class="kpi-val" id="kpi-inv">0.00L</div></div>
    <div class="kpi-box"><div class="kpi-label">Mkt Value</div><div class="kpi-val" id="kpi-val">0.00L</div></div>
    <div class="kpi-box"><div class="kpi-label">Total P&L</div><div class="kpi-val" id="kpi-pnl">0.00L</div></div>
</header>

<div id="chart-wrap"><canvas id="tapeChart"></canvas></div>
<div id="sector-legend"></div>
<div id="filter-badge" style="display:none">Sector: <span id="filter-name"></span> — tap chart again to clear</div>
<div id="app" class="view"></div>

<script>
    const DB_NAME = "BharatTapeDB"; const STORE = "Data";
    let MASTER_DATA = [], activeFilter = null, chart = null;
    const FIELDS = ['SYM', 'QTY', 'AVG', 'LTP', 'PNL', 'ROE', 'SECTOR'];
    const PALETTE = ['#00f2ff', '#7000ff', '#ff007a', '#ffb800', '#00ff88', '#007aff', '#ff4d6d'];

    async function init() {
        // Try to load from fundamentals.json; fall back to demo data if fetch fails
        let data;
        try {
            const res = await fetch('fundamentals.json');
            if (!res.ok) throw new Error('not found');
            data = await res.json();
        } catch(e) {
            // Demo data so the UI renders without the JSON file
            data = {
                stocks: {
                    "RELIANCE.NS": { qty: 10, avgBuy: 2400, ltp: 2650, sector: "Energy", roe: 14 },
                    "INFY.NS":     { qty: 20, avgBuy: 1500, ltp: 1420, sector: "IT", roe: 29 },
                    "HDFCBANK.NS": { qty: 15, avgBuy: 1600, ltp: 1720, sector: "Banking", roe: 17 },
                    "TCS.NS":      { qty: 8,  avgBuy: 3500, ltp: 3800, sector: "IT", roe: 45 },
                    "TATASTEEL.NS":{ qty: 50, avgBuy: 120,  ltp: 135,  sector: "Metals", roe: 21 },
                    "SUNPHARMA.NS":{ qty: 12, avgBuy: 1100, ltp: 1050, sector: "Pharma", roe: 18 },
                    "ICICIBANK.NS":{ qty: 25, avgBuy: 900,  ltp: 980,  sector: "Banking", roe: 16 }
                }
            };
        }

        const db = await openDB();
        const tx = db.transaction(STORE, "readwrite");
        const store = tx.objectStore(STORE);

        Object.keys(data.stocks).forEach(ticker => {
            const s = data.stocks[ticker];
            const rec = {
                SYM: ticker.split('.')[0].toUpperCase(),
                QTY: s.qty || 0,
                AVG: s.avgBuy || s.AVG || 0,
                LTP: s.ltp || 0,
                SECTOR: s.sector || 'Others',
                ROE: s.roe || 0
            };
            rec.COST = rec.QTY * rec.AVG;
            rec.MKT  = rec.QTY * rec.LTP;
            rec.PNL  = Math.round(rec.MKT - rec.COST);
            store.put(rec);
        });
        tx.oncomplete = () => load();
    }

    async function load() {
        const db = await openDB();
        MASTER_DATA = await new Promise(r => {
            db.transaction(STORE).objectStore(STORE).getAll().onsuccess = e => r(e.target.result);
        });
        updateKPIs(); renderChart(); renderTable();
    }

    function updateKPIs() {
        let tI = 0, tM = 0, tP = 0;
        MASTER_DATA.forEach(s => { tI += s.COST; tM += s.MKT; tP += s.PNL; });
        document.getElementById('kpi-inv').innerText = `₹${(tI/100000).toFixed(2)}L`;
        document.getElementById('kpi-val').innerText = `₹${(tM/100000).toFixed(2)}L`;
        document.getElementById('kpi-pnl').innerText = `₹${(tP/100000).toFixed(2)}L`;
        document.getElementById('kpi-pnl').style.color = tP >= 0 ? '#00ff88' : '#ff4d6d';
    }

    function renderChart() {
        // Build sector → cost map
        const secMap = {};
        MASTER_DATA.forEach(s => { secMap[s.SECTOR] = (secMap[s.SECTOR] || 0) + s.COST; });

        const sectors = Object.keys(secMap);

        /*
         * FIX: A stacked horizontal bar with ONE group row.
         * Each sector becomes ONE dataset whose `data` array has exactly
         * one entry (the portfolio row). Chart.js stacks them side-by-side.
         */
        const datasets = sectors.map((sector, i) => ({
            label: sector,
            data: [secMap[sector]],           // single value per dataset ✓
            backgroundColor: PALETTE[i % PALETTE.length],
            borderWidth: 0,
            borderRadius: 2,
            barThickness: 28                  // fits inside 60px chart-wrap
        }));

        const ctx = document.getElementById('tapeChart').getContext('2d');
        if (chart) chart.destroy();

        chart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Portfolio'],         // single row label ✓
                datasets
            },
            options: {
                indexAxis: 'y',
                maintainAspectRatio: false,
                animation: { duration: 600 },
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        callbacks: {
                            label: ctx => `${ctx.dataset.label}: ₹${(ctx.raw / 100000).toFixed(2)}L`
                        }
                    }
                },
                scales: {
                    x: { stacked: true, display: false },
                    y: { stacked: true, display: false }
                },
                onClick: (e, elements) => {
                    if (elements.length > 0) {
                        const clicked = chart.data.datasets[elements[0].datasetIndex].label;
                        activeFilter = (activeFilter === clicked) ? null : clicked;
                        updateFilterBadge();
                        renderTable();
                        renderLegend(sectors);
                    }
                }
            }
        });

        renderLegend(sectors);
    }

    function renderLegend(sectors) {
        const el = document.getElementById('sector-legend');
        el.innerHTML = sectors.map((s, i) => `
            <div class="legend-item ${activeFilter === s ? 'active' : ''}"
                 onclick="toggleFilter('${s}', ${JSON.stringify(sectors).replace(/"/g,"'")})">
                <div class="legend-dot" style="background:${PALETTE[i % PALETTE.length]}"></div>
                ${s}
            </div>
        `).join('');
    }

    function toggleFilter(sector, sectors) {
        activeFilter = (activeFilter === sector) ? null : sector;
        updateFilterBadge();
        renderTable();
        renderLegend(sectors);
    }

    function updateFilterBadge() {
        const badge = document.getElementById('filter-badge');
        if (activeFilter) {
            badge.style.display = 'block';
            document.getElementById('filter-name').innerText = activeFilter;
        } else {
            badge.style.display = 'none';
        }
    }

    function renderTable() {
        const filtered = activeFilter
            ? MASTER_DATA.filter(s => s.SECTOR === activeFilter)
            : MASTER_DATA;

        let h = `<table><thead><tr>`;
        FIELDS.forEach(f => h += `<th class="${f === 'SYM' ? 'sticky' : ''}">${f}</th>`);
        h += `</tr></thead><tbody>`;

        filtered.forEach(s => {
            h += `<tr>`;
            FIELDS.forEach(f => {
                let v = s[f] ?? '—';
                let cls = f === 'SYM' ? 'sticky'
                        : f === 'PNL' ? (v >= 0 ? 'pos' : 'neg')
                        : '';
                h += `<td class="${cls}">${v}${f === 'ROE' ? '%' : ''}</td>`;
            });
            h += `</tr>`;
        });

        document.getElementById('app').innerHTML = h + `</tbody></table>`;
    }

    function openDB() {
        return new Promise(res => {
            const req = indexedDB.open(DB_NAME, 1);
            req.onupgradeneeded = e => e.target.result.createObjectStore(STORE, { keyPath: "SYM" });
            req.onsuccess = () => res(req.result);
        });
    }
</script>
