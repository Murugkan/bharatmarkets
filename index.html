<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
    <title>Onyx | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg:#000; --s1:#0a0a0a; --b1:#222; --bl:#00f2ff; --gr:#00ff88; --rd:#ff4d6d; --tx:#fff; }
        *{box-sizing:border-box;margin:0;padding:0;}
        body { background:var(--bg); color:var(--tx); font-family:'JetBrains Mono',monospace; overflow:hidden; padding-bottom: 80px; }
        header { background:var(--s1); border-bottom:1px solid var(--b1); padding:12px; display:flex; justify-content:space-around; }
        .kpi-box { text-align:center; }
        .kpi-label { font-size:8px; color:#666; text-transform:uppercase; letter-spacing:1px; }
        .kpi-val { font-size:14px; font-weight:800; margin-top:2px; color:var(--bl); }
        #bar-wrap { padding:12px; background:#111; border-bottom:1px solid var(--b1); }
        #tape-bar { width:100%; height:32px; border-radius:4px; overflow:hidden; display:flex; background:#050505; }
        .seg { height:100%; cursor:pointer; flex-shrink:0; border-right:1px solid rgba(0,0,0,0.3); }
        #legend { display:flex; flex-wrap:wrap; gap:6px 12px; padding:10px; border-bottom:1px solid var(--b1); background:#000; max-height:80px; overflow-y:auto; }
        .leg { display:flex; align-items:center; gap:6px; font-size:9px; color:#666; cursor:pointer; }
        .leg.on { color:#fff; font-weight:800; }
        .dot { width:8px; height:8px; border-radius:2px; }
        #debug-log-window { background:#000; border:2px solid var(--gr); border-radius:6px; padding:8px; margin:8px; max-height:120px; overflow-y:auto; font-size:9px; color:var(--gr); font-family:monospace; white-space:pre-wrap; word-break:break-all; }
        .view { width:100%; overflow:auto; height:calc(100vh - 350px); background:#000; }
        table { width:100%; border-collapse:collapse; font-size:10px; white-space:nowrap; }
        th { background:var(--s1); color:#666; padding:12px; position:sticky; top:0; z-index:10; border-bottom:2px solid var(--b1); text-align:left; cursor: pointer; }
        th.active { color: var(--bl); }
        td { padding:12px; border-bottom:1px solid #111; }
        tfoot td { background: var(--s1); font-weight: 800; color: var(--tx); border-top: 2px solid var(--b1); position: sticky; bottom: 0; }
        .sticky { position:sticky; left:0; background:#0a0a0a!important; z-index:5; border-right:1px solid var(--b1); color:var(--bl)!important; }
        .pos { color:var(--gr)!important; }
        .neg { color:var(--rd)!important; }
        #status { padding:40px; font-size:11px; color:var(--bl); text-align:center; position:absolute; width:100%; top:200px; }
        footer { position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.95); border-top: 1px solid var(--b1); display: flex; justify-content: space-around; padding: 12px 0; z-index: 1000; }
        .nav-btn { text-decoration: none; color: #666; display: flex; flex-direction: column; align-items: center; width: 33%; padding: 8px 0; transition: color 0.2s; }
        .nav-btn:hover { color: var(--bl); }
        .nav-btn.active { color: var(--bl); font-weight: 800; }
        .nav-label { font-size: 8px; margin-top: 4px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

<header>
    <div class="kpi-box"><div class="kpi-label">Holdings</div><div class="kpi-val" id="k-count">0</div></div>
    <div class="kpi-box"><div class="kpi-label">P&L</div><div class="kpi-val" id="k-pnl">—</div></div>
    <div class="kpi-box" style="cursor:pointer;" onclick="runEngineSync()" title="Click to sync"><div class="kpi-label">Action</div><div class="kpi-val" style="color:#00ff88;font-size:11px;">SYNC ↻</div></div>
</header>

<div id="bar-wrap"><div id="tape-bar"></div></div>
<div id="legend"></div>

<!-- LOG WINDOW -->
<div style="border:2px solid var(--gr);border-radius:6px;margin:8px;padding:8px;max-height:120px;overflow-y:auto;">
    <div style="color:var(--gr);font-weight:bold;font-size:10px;margin-bottom:5px;">📋 LOG</div>
    <div id="debug-log-window">Starting...</div>
</div>

<div id="status">Loading...</div>
<div class="view"><div id="app"><table><tbody id="app-tbody"><tr><td colspan="10" style="text-align:center;padding:20px;color:#666;">No data</td></tr></tbody></table></div></div>

<footer>
    <a href="index.html" class="nav-btn active">📊 Portfolio</a>
    <a href="data.html" class="nav-btn">📋 Data</a>
    <a href="nexus.html" class="nav-btn">📥 Import</a>
</footer>

<script>

// ===== LOG WINDOW =====
function addDebugLog(msg) {
    var ts = new Date().toLocaleTimeString();
    var logMsg = '[' + ts + '] ' + msg;
    var logDiv = document.getElementById('debug-log-window');
    if (logDiv) {
        logDiv.innerHTML += logMsg + '\n';
        logDiv.scrollTop = logDiv.scrollHeight;
    }
    console.log(logMsg);
}

// ===== DB & SYNC =====
var DB_NAME = "OnyxPortfolioDB";
var STORE_NAME = "Stocks";
var DB_VERSION = 8;
var MASTER = [];

function runEngineSync() {
    addDebugLog('🔄 SYNC started...');
    
    Promise.all([
        fetch('./unified-symbols.json'),
        fetch('./fundamentals.json'),
        fetch('./prices.json')
    ])
    .then(function(responses) {
        addDebugLog('📥 All responses received');
        
        if (!responses[0].ok || !responses[1].ok || !responses[2].ok) {
            addDebugLog('❌ File error');
            throw new Error('File fetch failed');
        }
        
        addDebugLog('✅ All files OK');
        return Promise.all([
            responses[0].json(),
            responses[1].json(),
            responses[2].json()
        ]);
    })
    .then(function(data) {
        var unifiedData = data[0];
        var fundData = data[1];
        var priceData = data[2];
        
        addDebugLog('✅ All files parsed');
        addDebugLog('📊 unified: ' + (unifiedData.symbols ? unifiedData.symbols.length : 0) + ' stocks');
        addDebugLog('📈 prices: ' + (priceData.quotes ? Object.keys(priceData.quotes).length : 0) + ' prices');
        
        var req = indexedDB.open(DB_NAME, DB_VERSION);
        req.onsuccess = function(e) {
            var db = e.target.result;
            var tx = db.transaction(STORE_NAME, 'readwrite');
            var store = tx.objectStore(STORE_NAME);
            
            store.clear();
            
            var stocks = fundData.stocks || {};
            var count = 0;
            
            for (var ticker in stocks) {
                var fundStock = stocks[ticker];
                var priceQuotes = priceData.quotes || priceData;
                var priceData_stock = priceQuotes[ticker] || {};
                
                var record = {
                    SYM: ticker,
                    SYMBOL: ticker,
                    TICKER: ticker,
                    name: fundStock.name || ticker,
                    SECTOR: fundStock.sector || 'OTHER',
                    LTP: priceData_stock.ltp || fundStock.ltp || 0,
                    '1D%': priceData_stock.changePct || fundStock.chg1d || 0,
                    QTY: fundStock.qty || 0,
                    AVG: fundStock.avg || 0,
                    INVESTED: (fundStock.qty || 0) * (fundStock.avg || 0),
                    PNL: fundStock.pnl || 0,
                    'PNL%': fundStock.pnl_pct || 0,
                    PE: fundStock.pe || 0,
                    PB: fundStock.pb || 0,
                    EPS: fundStock.eps || 0,
                    BV: fundStock.bv || 0,
                    ROE: fundStock.roe || 0,
                    'ROE%': fundStock.roe || 0,
                    'OPM%': fundStock.opm_pct || 0,
                    'NPM%': fundStock.npm_pct || 0,
                    MCAP: fundStock.mcap || 0,
                    SALES: fundStock.sales || 0,
                    EBITDA: fundStock.ebitda || 0,
                    CFO: fundStock.cfo || 0,
                    '52WH': fundStock.w52h || 0,
                    '52WL': fundStock.w52l || 0,
                    '52W%': fundStock.w52_pct || 0,
                    'ATH%': fundStock.ath_pct || 0,
                    BETA: fundStock.beta || 0,
                    'DIV%': fundStock.div_yield || 0,
                    SIGNAL: '—',
                    POS: 0,
                    NEG: 0,
                    ROCE: 0,
                    'ROCE%': 0,
                    PROM: 0,
                    'PROM%': 0,
                    FII: 0,
                    'FII%': 0,
                    DII: 0,
                    'DII%': 0
                };
                
                store.put(record);
                count++;
            }
            
            tx.oncomplete = function() {
                addDebugLog('✅ Stored ' + count + ' stocks');
                MASTER = [];
                init();
            };
            tx.onerror = function() {
                addDebugLog('❌ DB error');
            };
        };
        req.onerror = function() {
            addDebugLog('❌ Cannot open DB');
        };
    })
    .catch(function(err) {
        addDebugLog('❌ Sync error: ' + err.message);
    });
}

function init() {
    addDebugLog('📂 Loading from IndexedDB...');
    
    var req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onsuccess = function(e) {
        var db = e.target.result;
        var tx = db.transaction(STORE_NAME, 'readonly');
        var store = tx.objectStore(STORE_NAME);
        var getAll = store.getAll();
        
        getAll.onsuccess = function() {
            MASTER = getAll.result || [];
            addDebugLog('📊 Loaded ' + MASTER.length + ' stocks');
            
            if (MASTER.length === 0) {
                document.getElementById('status').innerHTML = 'EMPTY - CLICK SYNC';
                return;
            }
            
            document.getElementById('status').style.display = 'none';
            renderTable();
        };
        
        getAll.onerror = function() {
            addDebugLog('❌ Error loading from DB');
        };
    };
}

function renderTable() {
    var tbody = document.getElementById('app-tbody');
    var sumPnl = 0, sumInv = 0;
    
    var html = '';
    for (var i = 0; i < MASTER.length; i++) {
        var s = MASTER[i];
        var sym = s.SYM || '?';
        var name = s.name || '?';
        var pnl = parseFloat(s.PNL || 0);
        var inv = parseFloat(s.INVESTED || 0);
        var ltp = parseFloat(s.LTP || 0);
        var qty = parseFloat(s.QTY || 0);
        var pct = parseFloat(s['1D%'] || 0);
        
        sumPnl += pnl;
        sumInv += inv;
        
        var pnlClass = pnl >= 0 ? 'pos' : 'neg';
        var pctClass = pct >= 0 ? 'pos' : 'neg';
        
        html += '<tr>' +
            '<td class="sticky">' + sym + '</td>' +
            '<td>' + name + '</td>' +
            '<td class="' + pnlClass + '">₹' + pnl.toFixed(2) + '</td>' +
            '<td class="' + pctClass + '">' + pct.toFixed(2) + '%</td>' +
            '<td>₹' + ltp.toFixed(2) + '</td>' +
            '<td>' + qty + '</td>' +
            '<td class="sticky">₹' + parseFloat(s.AVG || 0).toFixed(2) + '</td>' +
            '</tr>';
    }
    
    var total = '<tr>' +
        '<td class="sticky">TOTAL</td><td></td>' +
        '<td class="' + (sumPnl >= 0 ? 'pos' : 'neg') + '">₹' + sumPnl.toFixed(2) + '</td>' +
        '<td></td><td></td><td></td><td>₹' + sumInv.toFixed(2) + '</td>' +
        '</tr>';
    
    tbody.innerHTML = html + '<tr style="height:10px;"></tr>' + total;
    
    document.getElementById('k-count').textContent = MASTER.length;
    var pEl = document.getElementById('k-pnl');
    pEl.textContent = '₹' + (sumPnl/100000).toFixed(2) + 'L';
    pEl.style.color = sumPnl >= 0 ? 'var(--gr)' : 'var(--rd)';
    
    addDebugLog('✅ Table rendered (' + MASTER.length + ' rows)');
}

window.addEventListener('DOMContentLoaded', function() {
    addDebugLog('🚀 Page loaded');
    init();
});

</script>

</body>
</html>
