<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>BharatMarkets Pro (Flat DB)</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&family=Syne:wght@800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #04060f; --s1: #0a0e1a; --b1: #1e293b;
            --gr1: #00f2ff; --gr2: #00e896; --rd2: #ff6b85; --tx3: #708499;
        }
        body { background: var(--bg); color: #f0f6ff; font-family: sans-serif; margin: 0; padding: 0; }
        
        #debug-log { height: 100px; overflow-y: auto; background: #000; font-family: 'JetBrains Mono'; font-size: 10px; padding: 10px; color: var(--gr1); border-bottom: 1px solid var(--b1); }
        
        .bls-table-outer { width: 100%; overflow-x: auto; padding-bottom: 80px; }
        .bls-t { width: 100%; border-collapse: collapse; font-size: 11px; font-family: 'JetBrains Mono'; white-space: nowrap; }
        .bls-t th { background: var(--s1); color: var(--tx3); padding: 12px; text-align: left; border-bottom: 1px solid var(--b1); position: sticky; top: 0; }
        .bls-t td { padding: 12px; border-bottom: 1px solid #182840; }

        #nav { position: fixed; bottom: 0; width: 100%; background: var(--s1); display: flex; border-top: 1px solid var(--b1); padding-bottom: env(safe-area-inset-bottom); }
        .nb { flex: 1; background: none; border: none; color: var(--tx3); padding: 18px 0; font-size: 10px; font-weight: 700; text-transform: uppercase; }
        .nb.active { color: var(--gr1); }
        
        .btn-action { background: #1e293b; color: var(--gr1); border: 1px solid var(--gr1); padding: 10px 20px; border-radius: 4px; font-family: 'JetBrains Mono'; font-weight: 700; margin: 20px; cursor: pointer; }
    </style>
</head>
<body onload="init()">

    <div id="debug-log">System Initialized (Flat DB Mode)</div>
    
    <div id="content"></div>

    <nav id="nav">
        <button class="nb active" onclick="showTab('portfolio', this)">Portfolio</button>
        <button class="nb" onclick="showTab('raw', this)">Raw Table</button>
        <button class="nb" onclick="seedFlatData()">Seed Full DB</button>
    </nav>

    <script src="app-engine.js"></script>
    <script>
        let curTab = 'portfolio';

        function log(msg) {
            const l = document.getElementById('debug-log');
            l.innerHTML = `<div>> ${msg}</div>` + l.innerHTML;
        }

        // 1. SEED DATA: Inserting EVERYTHING into the DB directly
        async function seedFlatData() {
            log("Deleting old records and seeding full dataset...");
            const db = await initEngineDB();
            const tx = db.transaction('UnifiedStocks', 'readwrite');
            const store = tx.objectStore('UnifiedStocks');
            
            // Clear existing to ensure fresh start
            store.clear();

            const fullDataset = [
                { sym: 'HDFCBANK', qty: 20, avgBuy: 1550, ltp: 1420, chg: 0.2, sector: 'Banking', roe: 16.8, pe: 18.2, signal: 'BUY' },
                { sym: 'RELIANCE', qty: 10, avgBuy: 2450.5, ltp: 2980.2, chg: 1.2, sector: 'Energy', roe: 18.5, pe: 25.4, signal: 'BUY' },
                { sym: 'TCS', qty: 5, avgBuy: 3200, ltp: 3850, chg: -0.5, sector: 'IT', roe: 35.2, pe: 30.1, signal: 'HOLD' }
            ];

            fullDataset.forEach(s => store.put(s));
            
            tx.oncomplete = () => {
                log("DB populated with 9 fields per record. No merge required.");
                render();
            };
        }

        // 2. RENDER PORTFOLIO: Directly uses DB data (No FUND lookup)
        async function renderPortfolio(container) {
            const db = await initEngineDB();
            const stocks = await new Promise(r => {
                const tx = db.transaction('UnifiedStocks', 'readonly');
                tx.objectStore('UnifiedStocks').getAll().onsuccess = (e) => r(e.target.result || []);
            });

            if (stocks.length === 0) {
                container.innerHTML = `<button class="btn-action" onclick="seedFlatData()">Seed Database</button>`;
                return;
            }

            let h = `
                <div class="bls-table-outer">
                    <table class="bls-t">
                        <thead>
                            <tr>
                                <th>Ticker</th>
                                <th>Sector</th>
                                <th>LTP</th>
                                <th>ROE%</th>
                                <th>P/E</th>
                                <th>Qty</th>
                                <th>P&L</th>
                            </tr>
                        </thead>
                        <tbody>`;

            stocks.forEach(s => {
                const inv = s.qty * s.avgBuy;
                const cur = s.qty * s.ltp;
                const pnl = cur - inv;
                const pnlCol = pnl >= 0 ? 'var(--gr2)' : 'var(--rd2)';

                h += `
                    <tr>
                        <td><strong>${s.sym}</strong><br><span style="font-size:9px; color:var(--tx3)">${s.signal}</span></td>
                        <td style="color:var(--tx3)">${s.sector}</td>
                        <td style="font-weight:700">₹${s.ltp}</td>
                        <td style="color:${s.roe > 20 ? 'var(--gr2)' : 'white'}">${s.roe}%</td>
                        <td>${s.pe}x</td>
                        <td>${s.qty}</td>
                        <td style="color:${pnlCol}; font-weight:800">₹${pnl.toFixed(0)}</td>
                    </tr>`;
            });

            h += `</tbody></table></div>`;
            container.innerHTML = h;
        }

        // 3. RAW DATA VIEWER: Confirms everything is in the record
        async function renderRaw(container) {
            const db = await initEngineDB();
            const stocks = await new Promise(r => {
                const tx = db.transaction('UnifiedStocks', 'readonly');
                tx.objectStore('UnifiedStocks').getAll().onsuccess = (e) => r(e.target.result || []);
            });

            if(!stocks.length) { container.innerHTML = "DB is empty."; return; }

            const keys = Object.keys(stocks[0]);
            let h = `<div class="bls-table-outer"><table class="bls-t"><thead><tr>`;
            keys.forEach(k => h += `<th>${k}</th>`);
            h += `</tr></thead><tbody>`;

            stocks.forEach(s => {
                h += `<tr>`;
                keys.forEach(k => h += `<td>${s[k]}</td>`);
                h += `</tr>`;
            });
            container.innerHTML = h + `</tbody></table></div>`;
        }

        function showTab(t, btn) {
            curTab = t;
            document.querySelectorAll('.nb').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            render();
        }

        function render() {
            const c = document.getElementById('content');
            if(curTab === 'portfolio') renderPortfolio(c);
            else renderRaw(c);
        }

        function init() { render(); }
    </script>
</body>
</html>
