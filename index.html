<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>BharatMarkets Pro (Unified Flat DB)</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&family=Syne:wght@800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #04060f; --s1: #0a0e1a; --s2: #121a2d; --b1: #1e293b;
            --gr1: #00f2ff; --gr2: #00e896; --rd2: #ff6b85; --tx1: #f0f6ff; --tx3: #708499;
        }
        body { background: var(--bg); color: var(--tx1); font-family: -apple-system, sans-serif; margin: 0; padding: 0; }
        
        #debug-log { height: 80px; overflow-y: auto; background: #000; border-bottom: 1px solid var(--b1); font-family: 'JetBrains Mono'; font-size: 10px; padding: 10px; color: var(--gr1); }
        
        .bls-table-outer { width: 100%; overflow-x: auto; padding-bottom: 100px; }
        .bls-t { width: 100%; border-collapse: collapse; font-size: 11px; font-family: 'JetBrains Mono'; white-space: nowrap; }
        .bls-t th { background: var(--s1); color: var(--tx3); padding: 12px 15px; text-align: right; border-bottom: 1px solid var(--b1); position: sticky; top: 0; }
        .bls-t td { padding: 12px 15px; border-bottom: 1px solid #182840; text-align: right; }
        .th-l, .td-l { text-align: left !important; }

        .import-box { padding: 20px; }
        #import-area { width: 100%; height: 200px; background: var(--s2); color: #fff; border: 1px solid var(--b1); border-radius: 8px; padding: 12px; font-family: 'JetBrains Mono'; font-size: 12px; }
        .btn-main { width: 100%; padding: 16px; background: var(--gr1); color: #000; border: none; border-radius: 8px; font-weight: 800; margin-top: 10px; cursor: pointer; }

        #nav { position: fixed; bottom: 0; width: 100%; background: var(--s1); display: flex; border-top: 1px solid var(--b1); padding-bottom: env(safe-area-inset-bottom); }
        .nb { flex: 1; background: none; border: none; color: var(--tx3); padding: 18px 0; font-size: 10px; font-weight: 700; text-transform: uppercase; }
        .nb.active { color: var(--gr1); border-top: 2px solid var(--gr1); }
    </style>
</head>
<body onload="init()">

    <div id="debug-log">Ready. Symbols will be resolved during Sync.</div>
    <div id="content"></div>

    <nav id="nav">
        <button class="nb active" onclick="showTab('portfolio', this)">Portfolio</button>
        <button class="nb" onclick="showTab('import', this)">Import</button>
        <button class="nb" onclick="syncAndResolve()" style="color:var(--gr2)">Resolve & Sync</button>
    </nav>

    <script src="app-engine.js"></script>
    <script>
        let curTab = 'portfolio';

        function log(msg) {
            const l = document.getElementById('debug-log');
            l.innerHTML = `<div>> ${msg}</div>` + l.innerHTML;
        }

        async function processImport() {
            const text = document.getElementById('import-area').value;
            const lines = text.trim().split('\n');
            const db = await initEngineDB();
            const tx = db.transaction('UnifiedStocks', 'readwrite');
            const store = tx.objectStore('UnifiedStocks');

            lines.forEach(line => {
                const parts = line.split(/\s+/);
                if (parts.length >= 3) {
                    store.put({
                        sym: parts[0].toUpperCase(),
                        qty: parseFloat(parts[1]),
                        avgBuy: parseFloat(parts[2]),
                        ltp: 0, sector: '—', roe: 0, pe: 0, signal: 'WAIT'
                    });
                }
            });

            tx.oncomplete = () => {
                log("Imported. Run 'Resolve & Sync' to unify symbols.");
                showTab('portfolio', document.querySelector('.nb'));
            };
        }

        // THE RESOLUTION ENGINE: Resolves symbols before saving to DB
        async function syncAndResolve() {
            log("Loading Map & Market Data...");
            try {
                const [fData, pData, sMaster, sMap] = await Promise.all([
                    fetch('fundamentals.json').then(r => r.json()),
                    fetch('prices.json').then(r => r.json()),
                    fetch('symbols.json').then(r => r.json()),
                    fetch('symbol_map.json').then(r => r.json())
                ]);

                const db = await initEngineDB();
                const tx = db.transaction('UnifiedStocks', 'readwrite');
                const store = tx.objectStore('UnifiedStocks');
                
                const holdings = await new Promise(r => {
                    store.getAll().onsuccess = (e) => r(e.target.result || []);
                });

                // Clear DB for fresh "Unified" write
                store.clear();

                holdings.forEach(h => {
                    // RESOLVE SYMBOL HERE
                    const unifiedSym = sMap.overrides[h.sym] || h.sym;
                    const cleanKey = unifiedSym.split('.')[0];

                    const f = fData[unifiedSym] || fData[cleanKey] || {};
                    const p = pData[unifiedSym] || pData[cleanKey] || {};
                    const m = sMaster.find(item => item.sym === h.sym || item.sym === cleanKey) || {};

                    // Save under the UNIFIED symbol
                    store.put({
                        ...h,
                        sym: unifiedSym, // Symbol is now resolved permanently in DB
                        sector: f.sector || m.sector || h.sector,
                        roe: f.roe || 0,
                        pe: p.pe || f.pe || 0,
                        ltp: p.ltp || h.ltp,
                        signal: f.signal || 'HOLD'
                    });
                });

                tx.oncomplete = () => {
                    log("SUCCESS: All symbols resolved and database is Flat.");
                    render();
                };
            } catch (e) {
                log("Sync failed. Check JSON files.");
            }
        }

        async function renderPortfolio(container) {
            const db = await initEngineDB();
            const stocks = await new Promise(r => {
                const tx = db.transaction('UnifiedStocks', 'readonly');
                tx.objectStore('UnifiedStocks').getAll().onsuccess = (e) => r(e.target.result || []);
            });

            if (!stocks.length) {
                container.innerHTML = `<div style="padding:100px;text-align:center">No Data.</div>`;
                return;
            }

            // UI simply refers to the data - No logic needed here!
            let h = `<div class="bls-table-outer"><table class="bls-t"><thead><tr>
                <th class="th-l">Ticker</th><th class="th-l">Sector</th><th>ROE%</th><th>LTP</th><th>Qty</th><th>P&L</th>
            </tr></thead><tbody>`;

            stocks.forEach(s => {
                const pnl = (s.qty * s.ltp) - (s.qty * s.avgBuy);
                h += `<tr>
                    <td class="td-l"><strong>${s.sym}</strong></td>
                    <td class="td-l" style="color:var(--tx3)">${s.sector}</td>
                    <td>${s.roe}%</td>
                    <td style="font-weight:700">₹${s.ltp}</td>
                    <td class="u-dim">${s.qty}</td>
                    <td style="background:${pnl>=0?'#003a20':'#3a0010'};color:#fff">${pnl.toFixed(0)}</td>
                </tr>`;
            });
            container.innerHTML = h + `</tbody></table></div>`;
        }

        function showTab(t, btn) {
            curTab = t;
            document.querySelectorAll('.nb').forEach(b => b.classList.remove('active'));
            if (btn) btn.classList.add('active');
            render();
        }

        function render() {
            const c = document.getElementById('content');
            if (curTab === 'import') {
                c.innerHTML = `<div class="import-box">
                    <textarea id="import-area" placeholder="HDFC 20 1550"></textarea>
                    <button class="btn-main" onclick="processImport()">SAVE SYMBOLS</button>
                </div>`;
            } else {
                renderPortfolio(c);
            }
        }

        function init() { render(); }
    </script>
</body>
</html>
