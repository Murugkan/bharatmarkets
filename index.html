<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
    <title>Onyx // Portfolio Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg:#000; --s1:#050505; --b1:#111; --ac:#00f2ff; --gr:#00ff88; --rd:#ff4d6d; --tx:#fff; --tx3:#444; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { background:var(--bg); color:var(--tx); font-family:'JetBrains Mono',monospace; margin:0; padding:0; overflow-x:hidden; padding-bottom: 80px; }
        
        /* Header & Search Logic */
        header { padding: 30px 20px 15px; border-bottom: 1px solid var(--b1); background: var(--bg); position: sticky; top: 0; z-index: 100; }
        .h-row { display: flex; justify-content: space-between; align-items: flex-end; }
        h1 { font-size: 22px; margin: 0; color: var(--ac); letter-spacing: -1.5px; font-weight: 800; }
        .mkt { font-size: 9px; color: var(--gr); text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; gap: 6px; margin-top: 4px; }
        .mkt::before { content: ''; width: 6px; height: 6px; background: var(--gr); border-radius: 50%; display: inline-block; box-shadow: 0 0 8px var(--gr); }

        .search-bar { padding: 12px 20px; background: var(--s1); border-bottom: 1px solid var(--b1); }
        #q { width: 100%; background: #080808; border: 1px solid #1a1a1a; color: var(--tx); padding: 12px; border-radius: 8px; font-size: 14px; font-family: inherit; }
        #q:focus { border-color: var(--ac); }

        /* High-Density Table Logic */
        main { overflow-x: auto; -webkit-overflow-scrolling: touch; }
        table { width: 100%; border-collapse: collapse; min-width: 750px; table-layout: fixed; }
        th { background: var(--s1); color: var(--tx3); font-size: 10px; text-align: left; padding: 18px 12px; position: sticky; top: 0; border-bottom: 2px solid var(--b1); text-transform: uppercase; cursor: pointer; z-index: 20; }
        td { padding: 16px 12px; font-size: 13px; border-bottom: 1px solid #080808; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Cell Formatting */
        .up { color: var(--gr); } .dn { color: var(--rd); } .dim { color: var(--tx3); font-size: 11px; }
        .tag { font-size: 9px; background: #111; padding: 4px 8px; border-radius: 4px; color: var(--ac); border: 1px solid #222; font-weight: 800; }

        /* --- THE NEXUS FOOTER --- */
        footer { 
            position: fixed; bottom: 0; width: 100%; 
            background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--b1); display: flex; justify-content: space-around; align-items: center; 
            padding: 15px 0; z-index: 1000; padding-bottom: calc(15px + env(safe-area-inset-bottom));
        }
        .nav-btn { text-decoration: none; color: var(--tx3); display: flex; flex-direction: column; align-items: center; width: 50%; transition: 0.2s; }
        .nav-btn.active { color: var(--ac); }
        .nav-btn:active { transform: scale(0.9); }
        .nav-label { font-size: 8px; margin-top: 6px; letter-spacing: 2px; font-weight: 800; text-transform: uppercase; }
    </style>
</head>
<body>

    <header>
        <div class="h-row">
            <div><h1>PORTFOLIO</h1><div class="mkt">Live Engine</div></div>
            <div style="text-align: right">
                <div id="stat-count" style="font-size: 11px; color: var(--tx3); font-weight: 800;">ITEMS: 0</div>
                <div id="stat-time" style="font-size: 9px; color: var(--tx3); margin-top: 4px;">SYNC: --:--</div>
            </div>
        </div>
    </header>

    <div class="search-bar">
        <input type="text" id="q" placeholder="SEARCH SYMBOLS..." onkeyup="ui.filter()">
    </div>

    <main>
        <table>
            <thead>
                <tr>
                    <th style="width: 25%;" onclick="ui.sort('sym')">Symbol</th>
                    <th style="width: 15%;" onclick="ui.sort('price')">LTP</th>
                    <th style="width: 15%;" onclick="ui.sort('chg')">Change%</th>
                    <th style="width: 20%;" onclick="ui.sort('sector')">Sector</th>
                    <th style="width: 25%;" onclick="ui.sort('roe')">ROE / PE</th>
                </tr>
            </thead>
            <tbody id="rows"></tbody>
        </table>
    </main>

    <footer>
        <a href="index.html" class="nav-btn active">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>
            <span class="nav-label">Terminal</span>
        </a>
        <a href="nexus.html" class="nav-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path></svg>
            <span class="nav-label">Nexus</span>
        </a>
    </footer>

    <script src="js/app-portfolio.js"></script>
    <script>
        const engine = {
            raw: [], active: [],
            async boot() {
                try {
                    const res = await fetch('unified_data.json');
                    const data = await res.json();
                    this.raw = data.map(i => ({
                        sym: i.sym || 'N/A',
                        price: parseFloat(i.price) || 0,
                        chg: parseFloat(i.chg) || 0,
                        sector: i.sector || 'OTHER',
                        roe: parseFloat(i.roe) || 0,
                        pe: parseFloat(i.pe) || 0
                    }));
                    this.active = [...this.raw];
                    this.render();
                    document.getElementById('stat-count').innerText = `ITEMS: ${this.raw.length}`;
                    document.getElementById('stat-time').innerText = `SYNC: ${new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}`;
                } catch (e) { console.error("Sync Required"); }
            },
            render() {
                document.getElementById('rows').innerHTML = this.active.map(r => `
                    <tr>
                        <td style="font-weight:800; color:var(--ac);">${r.sym}</td>
                        <td>${r.price.toFixed(2)}</td>
                        <td class="${r.chg >= 0 ? 'up' : 'dn'}">${r.chg > 0 ? '+' : ''}${r.chg.toFixed(2)}%</td>
                        <td><span class="tag">${r.sector}</span></td>
                        <td>${r.roe.toFixed(1)} <span class="dim">/ ${r.pe.toFixed(1)}</span></td>
                    </tr>
                `).join('');
            }
        };

        const ui = {
            dir: 1, key: '',
            filter() {
                const val = document.getElementById('q').value.toUpperCase();
                engine.active = engine.raw.filter(i => i.sym.includes(val) || i.sector.toUpperCase().includes(val));
                engine.render();
            },
            sort(k) {
                if(this.key === k) this.dir *= -1; else { this.key = k; this.dir = 1; }
                engine.active.sort((a,b) => {
                    let vA = a[k], vB = b[k];
                    return typeof vA === 'string' ? this.dir * vA.localeCompare(vB) : this.dir * (vA - vB);
                });
                engine.render();
            }
        };
        window.onload = () => engine.boot();
    </script>
</body>
</html>
