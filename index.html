</head>
<body>
    <header>
        <div class="kpi-box"><div class="kpi-label">Invested</div><div class="kpi-val" id="ki">—</div></div>
        <div class="kpi-box"><div class="kpi-label">Mkt Value</div><div class="kpi-val" id="kv">—</div></div>
        <div class="kpi-box"><div class="kpi-label">Total P&L</div><div class="kpi-val" id="kp">—</div></div>
    </header>
    <div id="bar-wrap"><div id="tape-bar"></div></div>
    <div id="legend"></div>
    <div id="active-label">&nbsp;</div>
    <div class="view"><div id="app"></div></div>

<script>
const PALETTE = ['#00f2ff','#7000ff','#ff007a','#ffb800','#00ff88','#007aff','#ff4d6d'];
const FIELDS  = ['SYM','QTY','AVG','LTP','PNL','ROE','SECTOR'];

// ── hardcoded fallback — always used unless fundamentals.json loads cleanly ──
const FALLBACK = [
    { SYM:"RELIANCE",  QTY:10, AVG:2400, LTP:2650, SECTOR:"Energy",  ROE:14 },
    { SYM:"INFY",      QTY:20, AVG:1500, LTP:1420, SECTOR:"IT",      ROE:29 },
    { SYM:"HDFCBANK",  QTY:15, AVG:1600, LTP:1720, SECTOR:"Banking", ROE:17 },
    { SYM:"TCS",       QTY:8,  AVG:3500, LTP:3800, SECTOR:"IT",      ROE:45 },
    { SYM:"TATASTEEL", QTY:50, AVG:120,  LTP:135,  SECTOR:"Metals",  ROE:21 },
    { SYM:"SUNPHARMA", QTY:12, AVG:1100, LTP:1050, SECTOR:"Pharma",  ROE:18 },
    { SYM:"ICICIBANK", QTY:25, AVG:900,  LTP:980,  SECTOR:"Banking", ROE:16 }
];

let DATA = [], SECTORS = [], COL = {}, filter = null;

function prepare(rows) {
    DATA = rows.map(s => ({
        ...s,
        COST: s.QTY * s.AVG,
        MKT:  s.QTY * s.LTP,
        PNL:  Math.round(s.QTY * s.LTP - s.QTY * s.AVG)
    }));
    SECTORS = [...new Set(DATA.map(s => s.SECTOR))];
    COL = {};
    SECTORS.forEach((s,i) => COL[s] = PALETTE[i % PALETTE.length]);
}

function fmt(n){ return `₹${(n/100000).toFixed(2)}L`; }

function renderAll() {
    // KPIs
    let tI=0,tM=0,tP=0;
    DATA.forEach(s=>{ tI+=s.COST; tM+=s.MKT; tP+=s.PNL; });
    document.getElementById('ki').textContent = fmt(tI);
    document.getElementById('kv').textContent = fmt(tM);
    const kp = document.getElementById('kp');
    kp.textContent = fmt(tP);
    kp.style.color = tP>=0 ? '#00ff88' : '#ff4d6d';

    // Bar
    const secCost={};
    DATA.forEach(s=>{ secCost[s.SECTOR]=(secCost[s.SECTOR]||0)+s.COST; });
    const total = Object.values(secCost).reduce((a,b)=>a+b,0);
    document.getElementById('tape-bar').innerHTML = SECTORS.map(sec=>{
        const pct = (secCost[sec]/total*100).toFixed(2);
        const dim = filter && filter!==sec ? ' dimmed':'';
        return `<div class="seg${dim}" style="width:${pct}%;background:${COL[sec]}"
                     onclick="tap('${sec}')" title="${sec} ${pct}%">${pct>9?sec:''}</div>`;
    }).join('');

    // Legend
    document.getElementById('legend').innerHTML = SECTORS.map(sec=>
        `<div class="leg ${filter===sec?'on':''}" onclick="tap('${sec}')">
            <div class="dot" style="background:${COL[sec]}"></div>${sec}</div>`
    ).join('');

    // Filter label
    const lbl = document.getElementById('active-label');
    lbl.innerHTML = filter ? `Sector: <span>${filter}</span> — tap again to clear` : '&nbsp;';

    // Table
    const rows = filter ? DATA.filter(s=>s.SECTOR===filter) : DATA;
    let h = `<table><thead><tr>`
        + FIELDS.map(f=>`<th${f==='SYM'?' class="pin"':''}>${f}</th>`).join('')
        + `</tr></thead><tbody>`;
    rows.forEach(s=>{
        h += `<tr>` + FIELDS.map(f=>{
            const v = s[f]??'—';
            const c = f==='SYM'?'pin':f==='PNL'?(v>=0?'pos':'neg'):'';
            return `<td${c?` class="${c}"`:''}>${v}${f==='ROE'?'%':''}</td>`;
        }).join('') + `</tr>`;
    });
    document.getElementById('app').innerHTML = h + `</tbody></table>`;
}

function tap(sec){ filter = filter===sec ? null : sec; renderAll(); }

// ── boot: render immediately with fallback, never re-render on fetch failure ──
prepare(FALLBACK);
renderAll();

// only swap in live data if fundamentals.json exists AND parses correctly
fetch('fundamentals.json')
    .then(r => { if (!r.ok) return null; return r.json(); })
    .then(json => {
        if (!json || !json.stocks) return; // no file — keep fallback, do nothing
        const rows = Object.keys(json.stocks).map(ticker => {
            const s = json.stocks[ticker];
            return { SYM: ticker.split('.')[0].toUpperCase(),
                QTY: s.qty||0, AVG: s.avgBuy||s.AVG||0,
                LTP: s.ltp||0, SECTOR: s.sector||'Others', ROE: s.roe||0 };
        });
        filter = null;
        prepare(rows);
        renderAll();
    })
    .catch(() => {}); // silently keep fallback
</script>

</body>
</html>
