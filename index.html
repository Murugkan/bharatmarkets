<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>BharatMarkets | Data Dump</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #04060f; --s1: #0a0e1a; --s2: #121a2d; --b1: #1e293b; --gr1: #00f2ff; --tx3: #708499; }
        body { background: var(--bg); color: #fff; font-family: 'JetBrains Mono', monospace; margin: 0; overflow: hidden; }
        
        /* Header & Sync Bar */
        header { height: 60px; background: var(--s1); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 1px solid var(--b1); }
        .logo { font-weight: 800; color: var(--gr1); letter-spacing: 1px; }
        .btn-sync { background: var(--gr1); color: #000; border: none; padding: 8px 16px; font-weight: 900; border-radius: 4px; cursor: pointer; font-size: 11px; }

        /* Full Screen Data Table */
        .table-outer { width: 100%; overflow: auto; height: calc(100vh - 60px); }
        table { width: 100%; border-collapse: collapse; font-size: 11px; white-space: nowrap; }
        th { background: var(--s1); color: var(--tx3); padding: 15px; position: sticky; top: 0; z-index: 10; border-bottom: 1px solid var(--b1); text-align: left; text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid #182840; }
        
        /* Sticky Ticker Column */
        .sticky-sym { position: sticky; left: 0; background: var(--s2) !important; z-index: 5; border-right: 2px solid var(--gr1); font-weight: 700; color: var(--gr1); }
    </style>
</head>
<body onload="refreshData()">

    <header>
        <div class="logo">BHARAT MARKETS</div>
        <button class="btn-sync" onclick="runDumpSync()">REFRESH DUMP</button>
    </header>

    <div id="app"></div>

    <script>
        const DB_NAME = "BharatDumpDB"; const STORE = "RawData";

        function getDB() {
            return new Promise(res => {
                const req = indexedDB.open(DB_NAME, 1);
                req.onupgradeneeded = e => e.target.result.createObjectStore(STORE, { keyPath: "sym" });
                req.onsuccess = () => res(req.result);
            });
        }

        // 1. THE DUMP ENGINE: No imports, just flattens the JSON and saves
        async function runDumpSync() {
            try {
                const res = await fetch('fundamentals.json');
                const data = await res.json();
                
                const db = await getDB();
                const tx = db.transaction(STORE, "readwrite");
                const store = tx.objectStore(STORE);

                // Clear old data to ensure a fresh dump
                store.clear();

                Object.keys(data.stocks).forEach(ticker => {
                    const cleanSym = ticker.split('.')[0].toUpperCase();
                    const metrics = data.stocks[ticker];
                    
                    // Save every single field from the JSON into the DB row
                    store.put({ 
                        sym: cleanSym, 
                        ...metrics 
                    });
                });

                tx.oncomplete = () => { 
                    console.log("Dump Complete"); 
                    refreshData(); 
                };
            } catch (e) { alert("Sync Failed. Ensure fundamentals.json is in the root folder."); }
        }

        // 2. THE MIRROR: Discovers every key and displays it
        async function refreshData() {
            const db = await getDB();
            const stocks = await new Promise(r => db.transaction(STORE).objectStore(STORE).getAll().onsuccess = e => r(e.target.result));
            const container = document.getElementById('app');

            if (!stocks.length) {
                container.innerHTML = "<div style='padding:50px;color:var(--tx3)'>Database empty. Click REFRESH DUMP.</div>";
                return;
            }

            // Discovery: Identify every unique field in the dump
            const keySet = new Set(['sym', 'ltp', 'roe', 'opm_pct', 'pe', 'debt_eq']);
            stocks.forEach(s => Object.keys(s).forEach(k => keySet.add(k)));
            const keys = Array.from(keySet);

            let html = `<div class="table-outer"><table><thead><tr>`;
            keys.forEach(k => {
                const css = k === 'sym' ? 'class="sticky-sym"' : '';
                html += `<th ${css}>${k.toUpperCase()}</th>`;
            });
            html += `</tr></thead><tbody>`;

            stocks.forEach(s => {
                html += `<tr>`;
                keys.forEach(k => {
                    const val = s[k] !== undefined ? s[k] : '—';
                    const css = k === 'sym' ? 'class="sticky-sym"' : '';
                    html += `<td ${css}>${val}</td>`;
                });
                html += `</tr>`;
            });
            container.innerHTML = html + `</tbody></table></div>`;
        }
    </script>
</body>
</html>
