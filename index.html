<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>Onyx // Portfolio Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg:#000; --s1:#050505; --b1:#111; --ac:#00f2ff; --gr:#00ff88; --rd:#ff4d6d; --tx:#fff; --tx3:#444; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { background:var(--bg); color:var(--tx); font-family:'JetBrains Mono',monospace; margin:0; padding:0; overflow-x:hidden; }
        
        /* Header Section */
        header { padding: 30px 20px 15px; border-bottom: 1px solid var(--b1); background: var(--bg); position: sticky; top: 0; z-index: 100; }
        .head-flex { display: flex; justify-content: space-between; align-items: flex-end; }
        h1 { font-size: 22px; margin: 0; color: var(--ac); letter-spacing: -1.5px; font-weight: 800; }
        .status-dot { font-size: 9px; color: var(--gr); text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; gap: 6px; margin-top: 4px; }
        .status-dot::before { content: ''; width: 6px; height: 6px; background: var(--gr); border-radius: 50%; display: inline-block; box-shadow: 0 0 8px var(--gr); }

        /* Search & Utility Bar */
        .search-bar { padding: 12px 20px; background: var(--s1); border-bottom: 1px solid var(--b1); }
        #q { width: 100%; background: #080808; border: 1px solid #1a1a1a; color: var(--tx); padding: 12px; border-radius: 8px; font-size: 14px; font-family: inherit; }
        #q:focus { border-color: var(--ac); }

        /* High-Density Data Grid */
        main { padding-bottom: 100px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        table { width: 100%; border-collapse: collapse; min-width: 700px; table-layout: fixed; }
        th { background: var(--s1); color: var(--tx3); font-size: 10px; text-align: left; padding: 18px 12px; position: sticky; top: 0; border-bottom: 2px solid var(--b1); text-transform: uppercase; cursor: pointer; z-index: 20; }
        th:active { color: var(--ac); }
        td { padding: 16px 12px; font-size: 13px; border-bottom: 1px solid #080808; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Visual Data States */
        .up { color: var(--gr); }
        .dn { color: var(--rd); }
        .dim { color: var(--tx3); font-size: 11px; }
        .tag { font-size: 9px; background: #111; padding: 4px 8px; border-radius: 4px; color: var(--ac); border: 1px solid #222; font-weight: 800; }
        
        /* Persistent Navigation Footer */
        footer { 
            position: fixed; bottom: 0; width: 100%; 
            background: rgba(0,0,0,0.95); backdrop-filter: blur(20px);
            border-top: 1px solid var(--b1); display: flex; 
            justify-content: space-around; align-items: center; 
            padding: 15px 0; z-index: 1000;
            padding-bottom: calc(15px + env(safe-area-inset-bottom));
        }
        .nav-link { text-decoration: none; color: var(--tx3); display: flex; flex-direction: column; align-items: center; width: 33%; transition: 0.2s; }
        .nav-link.active { color: var(--ac); }
        .nav-link:active { transform: scale(0.9); opacity: 0.6; }
        .nav-label { font-size: 8px; margin-top: 6px; letter-spacing: 2px; font-weight: 800; text-transform: uppercase; }

        /* Empty State */
        #empty-notice { padding: 50px 20px; text-align: center; display: none; }
        .btn-link { display: inline-block; margin-top: 20px; padding: 15px 30px; background: var(--ac); color: #000; border-radius: 8px; text-decoration: none; font-weight: 800; font-size: 12px; }
    </style>
</head>
<body>

    <header>
        <div class="head-flex">
            <div>
                <h1>ONYX</h1>
                <div class="status-dot" id="engine-status">Engine Connected</div>
            </div>
            <div style="text-align: right">
                <div id="stat-count" style="font-size: 11px; color: var(--tx3); font-weight: 800;">ITEMS: 0</div>
                <div id="stat-sync" style="font-size: 9px; color: var(--tx3); margin-top: 4px;">SYNC: --:--</div>
            </div>
        </div>
    </header>

    <div class="search-bar">
        <input type="text" id="q" placeholder="SEARCH PORTFOLIO..." onkeyup="ui.filter()">
    </div>

    <div id="empty-notice">
        <div style="color: var(--tx3); font-size: 12px;">NO UNIFIED DATA DETECTED</div>
        <a href="nexus.html" class="btn-link">OPEN NEXUS GATEWAY</a>
    </div>

    <main id="terminal-view">
        <table id="data-table">
            <thead>
                <tr>
                    <th style="width: 25%;" onclick="ui.sort('sym')">Symbol</th>
                    <th style="width: 15%;" onclick="ui.sort('price')">LTP</th>
                    <th style="width: 15%;" onclick="ui.sort('chg')">Change%</th>
                    <th style="width: 20%;" onclick="ui.sort('sector')">Sector</th>
                    <th style="width: 25%;" onclick="ui.sort('roe')">ROE / PE</th>
                </tr>
            </thead>
            <tbody id="rows">
                </tbody>
        </table>
    </main>

    <footer>
        <a href="index.html" class="nav-link active">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>
            <span class="nav-label">Terminal</span>
        </a>
        
        <a href="nexus.html" class="nav-link">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path>
            </svg>
            <span class="nav-label">Nexus</span>
        </a>
    </footer>

    <script>
        /**
         * ONYX CORE ENGINE
         */
        const core = {
            raw: [],
            data: [],
            async init() {
                try {
                    const res = await fetch('unified_data.json');
                    if (!res.ok) throw new Error();
                    
                    const json = await res.json();
                    
                    // The Blank Killer: Sanitizing raw JSON
                    this.raw = json.map(i => ({
                        sym: i.sym || 'N/A',
                        price: parseFloat(i.price) || 0.00,
                        chg: parseFloat(i.chg) || 0.00,
                        sector: i.sector || 'OTHER',
                        roe: parseFloat(i.roe) || 0.00,
                        pe: parseFloat(i.pe) || 0.00
                    }));

                    this.data = [...this.raw];
                    this.render();
                    
                    document.getElementById('stat-count').innerText = `ITEMS: ${this.raw.length}`;
                    document.getElementById('stat-sync').innerText = `SYNC: ${new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}`;
                } catch (e) {
                    document.getElementById('terminal-view').style.display = 'none';
                    document.getElementById('empty-notice').style.display = 'block';
                    document.getElementById('engine-status').style.color = 'var(--rd)';
                    document.getElementById('engine-status').innerText = 'Offline / Sync Req';
                }
            },

            render() {
                const tbody = document.getElementById('rows');
                tbody.innerHTML = this.data.map(r => `
                    <tr>
                        <td style="font-weight:800;">${r.sym}</td>
                        <td>${r.price.toFixed(2)}</td>
                        <td class="${r.chg >= 0 ? 'up' : 'dn'}">${r.chg > 0 ? '+' : ''}${r.chg.toFixed(2)}%</td>
                        <td><span class="tag">${r.sector}</span></td>
                        <td>
                            <span class="${r.roe > 15 ? 'up' : ''}">${r.roe.toFixed(1)}</span>
                            <span class="dim">/ ${r.pe.toFixed(1)}</span>
                        </td>
                    </tr>
                `).join('');
            }
        };

        const ui = {
            dir: 1,
            key: '',
            filter() {
                const val = document.getElementById('q').value.toUpperCase();
                core.data = core.raw.filter(i => i.sym.includes(val) || i.sector.includes(val));
                core.render();
            },
            sort(k) {
                if(this.key === k) this.dir *= -1; else { this.key = k; this.dir = 1; }
                core.data.sort((a,b) => {
                    let vA = a[k], vB = b[k];
                    return typeof vA === 'string' ? this.dir * vA.localeCompare(vB) : this.dir * (vA - vB);
                });
                core.render();
            }
        };

        window.onload = () => core.init();
    </script>
</body>
</html>
