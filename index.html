<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>Onyx | Unified Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg:#000; --s1:#0a0a0a; --b1:#222; --bl:#00f2ff; --gr:#064e3b; --rd:#7f1d1d; --tx:#fff; }
        *{box-sizing:border-box;margin:0;padding:0;}
        body { background:var(--bg); color:var(--tx); font-family:'JetBrains Mono',monospace; overflow:hidden; -webkit-text-size-adjust:100%; }
        
        /* HEADER & KPIs */
        header { background:var(--s1); border-bottom:1px solid var(--b1); padding:12px; display:flex; justify-content:space-around; }
        .kpi-box { text-align:center; }
        .kpi-label { font-size:8px; color:#666; text-transform:uppercase; letter-spacing:1px; }
        .kpi-val { font-size:14px; font-weight:800; margin-top:2px; color:var(--bl); }

        /* TAPE BAR CHART */
        #bar-wrap { padding:12px; background:#111; border-bottom:1px solid var(--b1); }
        #tape-bar { width:100%; height:32px; border-radius:4px; overflow:hidden; display:flex; background:#050505; }
        .seg { height:100%; cursor:pointer; flex-shrink:0; transition: opacity 0.2s; border-right:1px solid rgba(0,0,0,0.2); }
        .seg.dimmed { opacity:0.1; }

        /* LEGEND */
        #legend { display:flex; flex-wrap:wrap; gap:6px 12px; padding:10px; border-bottom:1px solid var(--b1); background:#000; max-height:80px; overflow-y:auto; }
        .leg { display:flex; align-items:center; gap:6px; font-size:9px; color:#666; cursor:pointer; }
        .leg.on { color:#fff; font-weight:800; }
        .dot { width:8px; height:8px; border-radius:2px; flex-shrink:0; }

        /* TABLE VIEW */
        .view { width:100%; overflow:auto; height:calc(100vh - 210px); background:#000; -webkit-overflow-scrolling:touch; }
        table { width:100%; border-collapse:collapse; font-size:10px; white-space:nowrap; }
        th { background:var(--s1); color:#444; padding:12px; position:sticky; top:0; z-index:10; border-bottom:2px solid var(--b1); text-align:left; text-transform: uppercase; }
        td { padding:12px; border-bottom:1px solid #111; }
        
        /* PINNED COLUMNS & THEMES */
        .sticky { position:sticky; left:0; background:#0a0a0a!important; z-index:5; border-right:1px solid var(--b1); color:var(--bl)!important; font-weight:800; }
        .pos { color:#00ff88!important; font-weight:800; }
        .neg { color:#ff4d6d!important; font-weight:800; }
        
        #status { padding:40px; font-size:11px; color:var(--bl); text-align:center; position:absolute; width:100%; top:200px; letter-spacing:1px; }
    </style>
</head>
<body>

<header>
    <div class="kpi-box"><div class="kpi-label">Holdings</div><div class="kpi-val" id="k-count">0</div></div>
    <div class="kpi-box"><div class="kpi-label">Fields</div><div class="kpi-val" id="k-cols">0</div></div>
    <div class="kpi-box"><div class="kpi-label">Net P&L</div><div class="kpi-val" id="k-pnl">—</div></div>
</header>

<div id="bar-wrap"><div id="tape-bar"></div></div>
<div id="legend"></div>
<div id="status">Waking Data Engine...</div>

<div class="view"><div id="app"></div></div>

<script>
// --- CONFIG & CONSTANTS ---
const DB_NAME = "OnyxPortfolioDB"; 
const STORE_NAME = "Stocks";
const DB_VERSION = 3; // Version bump to force-refresh field priority logic
const PALETTE = ['#00f2ff','#7000ff','#ff007a','#ffb800','#00ff88','#007aff','#ff4d6d','#f97316','#a3e635','#ec4899','#8b5cf6','#f43f5e'];

let MASTER = [], SECTORS = [], COL = {}, filter = null, DYNAMIC_FIELDS = [];

// --- UTILS ---
const cleanNum = (v) => {
    if (typeof v === 'number') return v;
    if (!v || v === '—') return 0;
    const n = parseFloat(v.toString().replace(/[^\d.-]/g, ''));
    return isNaN(n) ? 0 : n;
};

function getPriorityFields(item) {
    const allKeys = Object.keys(item).filter(k => !k.startsWith('_'));
    const priority = [
        'SYM', 'QTY', 'AVGBUY', 'LTP', 'PNL', 'PNL%', 'INVESTED', 
        'ROE', 'PE', 'PB', 'MCAP', 'OPM%', 'NPM%', 'ROCE%', 
        '1D%', '5D%', 'ATH%', '52W%', 
        'POS', 'NEG', 'SIGNAL', 'SECTOR'
    ];
    const remaining = allKeys.filter(k => !priority.includes(k));
    return [...priority.filter(p => allKeys.includes(p)), ...remaining];
}

// --- ENGINE INIT ---
async function init() {
    const statusEl = document.getElementById('status');
    
    const db = await new Promise((res) => {
        const req = indexedDB.open(DB_NAME, DB_VERSION);
        req.onupgradeneeded = e => {
            const d = e.target.result;
            if (d.objectStoreNames.contains(STORE_NAME)) d.deleteObjectStore(STORE_NAME);
            d.createObjectStore(STORE_NAME, { keyPath: "SYM" });
        };
        req.onsuccess = () => res(req.result);
    });

    const tx = db.transaction(STORE_NAME, "readonly");
    const existing = await new Promise(res => {
        tx.objectStore(STORE_NAME).getAll().onsuccess = e => res(e.target.result);
    });

    // Forced Hydration if empty or version mismatch detected
    if (existing.length === 0 || Object.keys(existing[0]).length < 15) {
        statusEl.innerHTML = "SYNCING STABLE 26+ FIELD SCHEMA...";
        try {
            const response = await fetch('fundamentals.json');
            const json = await response.json();
            const stocks = json.stocks || json;
            
            const writeTx = db.transaction(STORE_NAME, "readwrite");
            const store = writeTx.objectStore(STORE_NAME);
            
            Object.keys(stocks).forEach(ticker => {
                const s = stocks[ticker];
                const entry = { SYM: ticker.split('.')[0].toUpperCase() };
                Object.keys(s).forEach(k => entry[k.toUpperCase()] = s[k]);
                store.put(entry);
            });

            writeTx.oncomplete = () => location.reload();
        } catch (e) {
            statusEl.innerHTML = "ERR: JSON NOT FOUND.";
        }
        return;
    }

    MASTER = existing;
    statusEl.style.display = "none";
    
    // Sort Fields and Sectors
    DYNAMIC_FIELDS = getPriorityFields(MASTER[0]);
    SECTORS = [...new Set(MASTER.map(s => s.SECTOR || 'OTHER'))].sort();
    SECTORS.forEach((s, i) => COL[s] = PALETTE[i % PALETTE.length]);
    
    render();
}

// --- UI RENDER ---
function render() {
    let totalPnl = 0;
    document.getElementById('k-count').textContent = MASTER.length;
    document.getElementById('k-cols').textContent = DYNAMIC_FIELDS.length;

    const sc = {};
    MASTER.forEach(s => { 
        totalPnl += cleanNum(s.PNL);
        const weight = Math.max(cleanNum(s.MCAP) || cleanNum(s.LTP), 1);
        sc[s.SECTOR || 'OTHER'] = (sc[s.SECTOR || 'OTHER'] || 0) + weight; 
    });
    
    const pEl = document.getElementById('k-pnl');
    pEl.textContent = `₹${(totalPnl/100000).toFixed(2)}L`;
    pEl.style.color = totalPnl >= 0 ? '#00ff88' : '#ff4d6d';

    const totalWeight = Object.values(sc).reduce((a, b) => a + b, 0);
    document.getElementById('tape-bar').innerHTML = SECTORS.map(sec => {
        const pct = ((sc[sec] / totalWeight) * 100).toFixed(2);
        return `<div class="seg${filter && filter !== sec ? ' dimmed' : ''}" style="flex-basis:${pct}%;background:${COL[sec]}" onclick="tap('${sec}')"></div>`;
    }).join('');

    document.getElementById('legend').innerHTML = SECTORS.map(sec => `
        <div class="leg ${filter === sec ? 'on' : ''}" onclick="tap('${sec}')">
            <div class="dot" style="background:${COL[sec]}"></div>${sec}
        </div>
    `).join('');

    const rows = filter ? MASTER.filter(s => (s.SECTOR || 'OTHER') === filter) : MASTER;
    let h = `<table><thead><tr>`;
    DYNAMIC_FIELDS.forEach(f => h += `<th class="${f==='SYM'?'sticky':''}">${f}</th>`);
    h += `</tr></thead><tbody>`;

    rows.forEach(s => {
        h += `<tr>`;
        DYNAMIC_FIELDS.forEach(f => {
            const val = s[f] ?? '—';
            let cls = f === 'SYM' ? 'sticky' : '';
            const n = cleanNum(val);
            if (n !== 0) {
                const uf = f.toUpperCase();
                if ((uf.includes('PNL') || uf.includes('ROE') || uf === 'POS') && n > 0) cls += ' pos';
                if ((uf.includes('PNL') || uf === 'NEG') && n < 0) cls += ' neg';
            }
            h += `<td class="${cls}">${val}</td>`;
        });
        h += `</tr>`;
    });
    document.getElementById('app').innerHTML = h + `</tbody></table>`;
}

function tap(sec) { filter = filter === sec ? null : sec; render(); }

init();
</script>
</body>
</html>
