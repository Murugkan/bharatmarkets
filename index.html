<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Soya Portfolio</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
</head>
<body>

  <header class="app-header">
    <div class="logo">SOYA</div>
    <div id="import-status-strip"></div>
  </header>

  <nav class="app-nav">
    <button class="nb active" onclick="switchTab('portfolio')">Portfolio</button>
    <button class="nb" onclick="switchTab('watchlist')">Watchlist</button>
    <button class="nb" onclick="openImport()">Stock Upload</button>
  </nav>

  <main id="app-content">
    <div id="dashboard-view" class="tab-pane active">
      <div id="sector-grid"></div>
      <div id="stock-list"></div>
    </div>
  </main>

  <div id="ov" class="overlay" onclick="closePanel()"></div>
  <div id="import-panel" class="panel">
    <div class="panel-header">
      <div class="panel-title">Stock Intelligence Hub</div>
      <div class="panel-close" onclick="closePanel()">✕</div>
    </div>
    <div id="import-panel-body" class="panel-body">
      </div>
  </div>

  <script src="js/app-core.js"></script>
  <script src="js/app-import.js"></script>
  <script src="js/app-watchlist.js"></script>

  <script>
    // Global State
    window.S = {
      curTab: 'portfolio',
      portfolio: [],
      settings: JSON.parse(localStorage.getItem('soya_settings') || '{}'),
      _importStatus: null
    };

    // Initial Load
    async function init() {
      // Ensure we have our settings (GH Tokens, etc.)
      if (!S.settings.ghToken) {
        console.warn("GitHub Token missing. Sync will not work.");
      }
      
      // Load Master Data (symbols.json)
      await loadMasterData(); 
      
      // Render Initial View
      render();
    }

    function switchTab(tab) {
      S.curTab = tab;
      document.querySelectorAll('.nb').forEach(b => b.classList.remove('active'));
      event.target.classList.add('active');
      render(); // Triggered from app-watchlist.js
    }

    // Load static data from GitHub/Local
    async function loadMasterData() {
      try {
        const res = await fetch('symbols.json');
        window.FUND = await res.json();
        // Generate ISIN Map for the Import Scanner
        window.ISIN_MAP = {};
        window.FUND.forEach(item => {
          if (item.isin) ISIN_MAP[item.isin] = item.sym;
        });
      } catch (e) {
        console.error("Failed to load master symbols:", e);
      }
    }

    window.onload = init;
  </script>
</body>
</html>
