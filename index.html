<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BharatMarkets Pro</title>
    </head>
<body>

<div id="content"></div>

<div id="nav">
  <button class="nb active" onclick="showTab('portfolio',this)">💼Portfolio</button>
  <button class="nb" onclick="showTab('watchlist',this)">👁Watch</button>
  <button class="nb" onclick="showTab('analysis',this)">🔬Analysis</button>
  <button class="nb" onclick="showTab('upload',this)">⬆Import</button>
</div>

<div class="overlay" id="ov" onclick="closePanel()"></div>
<div class="bottom-panel" id="import-panel">
  <div id="import-panel-body"></div>
</div>

<div id="toast"></div>

<button onclick="toggleDebug()" style="position:fixed; top:10px; right:10px; z-index:9999; background:#ff3b30; color:white; border:none; padding:4px 8px; font-size:10px; opacity:0.6">DEBUG</button>

<div id="debug-window" style="display:none; position:fixed; bottom:80px; left:10px; right:10px; height:200px; background:black; color:#00ff00; font-family:monospace; font-size:10px; padding:10px; z-index:9998; border:1px solid #333; overflow-y:auto">
    <div id="debug-console"></div>
</div>

<script src="app-core.js"></script>
<script src="app-import.js"></script>
<script src="app-portfolio.js"></script>
<script src="app-watchlist.js"></script>
<script src="app-drill.js"></script>
<script src="app-analysis.js"></script>
<script src="app-settings.js"></script>
<script src="app-engine.js"></script>
<script src="app-boot.js"></script>

</body>
</html>
