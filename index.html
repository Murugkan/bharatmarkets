<script>
// 1. INCREMENT VERSION TO 2 (Forces Safari to re-examine the store)
const DB_NAME = "OnyxPortfolioDB"; 
const STORE_NAME = "Stocks";
const DB_VERSION = 2; 

const PALETTE = ['#00f2ff','#7000ff','#ff007a','#ffb800','#00ff88','#007aff','#ff4d6d','#f97316','#a3e635','#ec4899'];
let MASTER = [], SECTORS = [], COL = {}, filter = null, DYNAMIC_FIELDS = [];

async function init() {
    const statusEl = document.getElementById('status');
    
    const db = await new Promise((res) => {
        const req = indexedDB.open(DB_NAME, DB_VERSION);
        req.onupgradeneeded = e => {
            const d = e.target.result;
            if (d.objectStoreNames.contains(STORE_NAME)) d.deleteObjectStore(STORE_NAME);
            d.createObjectStore(STORE_NAME, { keyPath: "SYM" });
        };
        req.onsuccess = () => res(req.result);
    });

    const tx = db.transaction(STORE_NAME, "readonly");
    const existing = await new Promise(res => {
        tx.objectStore(STORE_NAME).getAll().onsuccess = e => res(e.target.result);
    });

    // 2. FORCE SYNC if Fields are missing (Your Chrome is stuck on 9, we need 40+)
    if (existing.length === 0 || Object.keys(existing[0]).length < 15) {
        statusEl.innerHTML = "UPGRADING DATA ENGINE: SYNCING ALL 40+ FIELDS...";
        const response = await fetch('fundamentals.json');
        const json = await response.json();
        const stocks = json.stocks || json;
        
        const writeTx = db.transaction(STORE_NAME, "readwrite");
        const store = writeTx.objectStore(STORE_NAME);
        
        Object.keys(stocks).forEach(ticker => {
            const s = stocks[ticker];
            const entry = { SYM: ticker.split('.')[0].toUpperCase() };
            // Force every key to UPPERCASE during ingestion
            Object.keys(s).forEach(k => entry[k.toUpperCase()] = s[k]);
            store.put(entry);
        });

        writeTx.oncomplete = () => location.reload();
        return;
    }

    MASTER = existing;
    statusEl.style.display = "none";

    // 3. FIELD DISCOVERY
    const allKeys = new Set();
    MASTER.forEach(item => Object.keys(item).forEach(k => { if(!k.startsWith('_')) allKeys.add(k); }));
    DYNAMIC_FIELDS = ['SYM', ...Array.from(allKeys).filter(f => !['SYM','SECTOR'].includes(f)), 'SECTOR'];
    
    SECTORS = [...new Set(MASTER.map(s => s.SECTOR || 'OTHER'))].sort();
    SECTORS.forEach((s, i) => COL[s] = PALETTE[i % PALETTE.length]);
    render();
}

// ... Use the render() and cleanNum() from the previous "Bulletproof" build ...
</script>
