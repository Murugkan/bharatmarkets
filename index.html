<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>BharatMarkets | Unified Core</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #04060f; --s1: #0a0e1a; --s2: #121a2d; --b1: #1e293b; --gr1: #00f2ff; --gr2: #00ff88; --rd1: #ff4d6d; --tx3: #708499; }
        body { background: var(--bg); color: #fff; font-family: 'JetBrains Mono', monospace; margin: 0; overflow: hidden; }
        header { height: 60px; background: var(--s1); border-bottom: 1px solid var(--b1); display: flex; align-items: center; padding: 0 20px; justify-content: space-between; }
        .logo { font-weight: 800; color: var(--gr1); font-size: 13px; }
        .view { width: 100%; overflow: auto; height: calc(100vh - 60px); }
        table { width: 100%; border-collapse: collapse; font-size: 10px; white-space: nowrap; }
        th { background: var(--s1); color: var(--tx3); padding: 12px 15px; position: sticky; top: 0; z-index: 10; border-bottom: 1px solid var(--b1); text-align: left; }
        td { padding: 12px 15px; border-bottom: 1px solid #182840; }
        .sticky { position: sticky; left: 0; background: var(--s2) !important; z-index: 5; border-right: 2px solid var(--gr1); color: var(--gr1); font-weight: 700; }
        .up { color: var(--gr2); } .down { color: var(--rd1); }
        .BUY { color: var(--gr2); font-weight: 800; } .SELL { color: var(--rd1); font-weight: 800; }
    </style>
</head>
<body onload="init()">

    <header><div class="logo">BHARAT MARKETS | DIRECT VIEW</div></header>
    <div id="app" class="view"></div>

    <script>
        const DB_NAME = "BharatCoreDB"; const STORE = "MasterData";

        // THE MAPPING: All direct fields + your new computed Pos/Neg
        const UI_FIELDS = ['SYM', 'QTY', 'AVG', 'LTP', 'CHG1D', 'PNL', 'PNL_PCT', 'ROE', 'PE', 'SIGNAL', 'POS', 'NEG', 'SECTOR'];

        async function runBuild() {
            const res = await fetch('fundamentals.json');
            const data = await res.json();
            const db = await openDB();
            const tx = db.transaction(STORE, "readwrite");
            const store = tx.objectStore(STORE);

            Object.keys(data.stocks).forEach(ticker => {
                const raw = data.stocks[ticker];
                const record = { SYM: ticker.split('.')[0].toUpperCase() };
                for (let key in raw) record[key.toUpperCase()] = raw[key];
                
                // 1. COMPUTE P&L
                const cost = (record.QTY || 0) * (record.AVG || 0);
                record.PNL = Math.round(((record.QTY || 0) * (record.LTP || 0)) - cost);
                record.PNL_PCT = cost ? ((record.PNL / cost) * 100).toFixed(2) : 0;

                // 2. COMPUTE POS/NEG (Threshold Logic)
                let p = 0, n = 0;
                if (record.ROE > 15) p++; else n++;
                if (record.PE < 25) p++; else n++;
                if (record.CHG1D > 0) p++; else n++;
                
                record.POS = p;
                record.NEG = n;

                store.put(record);
            });
            tx.oncomplete = () => render();
        }

        async function render() {
            const db = await openDB();
            const stocks = await new Promise(r => {
                db.transaction(STORE).objectStore(STORE).getAll().onsuccess = e => r(e.target.result);
            });

            let html = `<table><thead><tr>`;
            UI_FIELDS.forEach(f => html += `<th class="${f==='SYM'?'sticky':''}">${f}</th>`);
            html += `</tr></thead><tbody>`;

            stocks.forEach(s => {
                html += `<tr>`;
                UI_FIELDS.forEach(f => {
                    let val = s[f] !== undefined ? s[f] : '—';
                    let cls = f === 'SYM' ? 'sticky' : '';
                    if (['PNL', 'CHG1D', 'PNL_PCT'].includes(f)) cls += ` ${val >= 0 ? 'up' : 'down'}`;
                    if (f === 'SIGNAL') cls += ` ${val}`;
                    
                    html += `<td class="${cls}">${val}${ (f==='CHG1D'||f==='PNL_PCT') && val!=='—' ? '%' : ''}</td>`;
                });
                html += `</tr>`;
            });
            document.getElementById('app').innerHTML = html + `</tbody></table>`;
        }

        function openDB() {
            return new Promise(res => {
                const req = indexedDB.open(DB_NAME, 1);
                req.onupgradeneeded = e => e.target.result.createObjectStore(STORE, { keyPath: "SYM" });
                req.onsuccess = () => res(req.result);
            });
        }

        function init() { runBuild(); }
    </script>
</body>
</html>
