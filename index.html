</head>
<body>
    <header>
        <div class="kpi-box"><div class="kpi-label">Invested</div><div class="kpi-val" id="kpi-inv">—</div></div>
        <div class="kpi-box"><div class="kpi-label">Mkt Value</div><div class="kpi-val" id="kpi-val">—</div></div>
        <div class="kpi-box"><div class="kpi-label">Total P&L</div><div class="kpi-val" id="kpi-pnl">—</div></div>
    </header>
    <div id="bar-wrap"><div id="tape-bar"></div></div>
    <div id="legend"></div>
    <div id="filter-label">&nbsp;</div>
    <div class="view"><div id="app"></div></div>

<script>
const FIELDS  = ['SYM','QTY','AVG','LTP','PNL','ROE','SECTOR'];
const PALETTE = ['#00f2ff','#7000ff','#ff007a','#ffb800','#00ff88','#007aff','#ff4d6d','#f97316','#a3e635'];

let DATA = [], SECTORS = [], COL = {}, filter = null;

// ── Load portfolio from bmp_port_v2 (written by main app) ────────
function getHoldings() {
    try {
        const raw = localStorage.getItem('bmp_port_v2');
        if (!raw) return [];
        const parsed = JSON.parse(raw);
        if (Array.isArray(parsed)) return parsed;
        if (parsed && Array.isArray(parsed.portfolio)) return parsed.portfolio;
    } catch(e) {}
    return [];
}

// ── Boot: merge holdings + fundamentals.json ─────────────────────
async function init() {
    const holdings = getHoldings();

    // Load fundamentals for ltp / sector / roe
    let fund = {};
    try {
        const res = await fetch('fundamentals.json');
        if (res.ok) fund = (await res.json()).stocks || {};
    } catch(e) {}

    DATA = holdings
        .filter(h => (h.sym || h.SYM) && (h.qty || h.QTY) > 0)
        .map(h => {
            const sym  = h.sym  || h.SYM;
            const qty  = h.qty  || h.QTY  || 0;
            const avg  = h.avgBuy || h.avg || h.AVG || 0;
            const f    = fund[sym] || {};
            const ltp  = f.ltp  || h.ltp  || h.LTP  || 0;
            const cost = qty * avg;
            const mkt  = qty * ltp;
            return {
                SYM:    sym,
                QTY:    qty,
                AVG:    avg,
                LTP:    +ltp.toFixed(2),
                SECTOR: f.sector || h.sector || 'Other',
                ROE:    +(f.roe  || h.roe   || 0),
                COST:   cost,
                MKT:    mkt,
                PNL:    Math.round(mkt - cost)
            };
        })
        .filter(d => d.QTY > 0);

    // Fallback: if no holdings in localStorage, read from fundamentals directly
    // (shows market data without qty/avg — useful for watchlist view)
    if (DATA.length === 0 && Object.keys(fund).length > 0) {
        DATA = Object.keys(fund).map(sym => {
            const f = fund[sym];
            return {
                SYM: sym, QTY: 0, AVG: 0,
                LTP: +(f.ltp || 0).toFixed(2),
                SECTOR: f.sector || 'Other',
                ROE: +(f.roe || 0),
                COST: 0, MKT: 0, PNL: 0
            };
        }).filter(d => d.LTP > 0);
    }

    SECTORS = [...new Set(DATA.map(s => s.SECTOR))];
    SECTORS.forEach((s, i) => COL[s] = PALETTE[i % PALETTE.length]);
    render();
}

// ── Render everything ────────────────────────────────────────────
function render() {
    // KPIs
    let tI=0, tM=0, tP=0;
    DATA.forEach(s => { tI += s.COST; tM += s.MKT; tP += s.PNL; });
    document.getElementById('kpi-inv').textContent = `₹${(tI/100000).toFixed(2)}L`;
    document.getElementById('kpi-val').textContent = `₹${(tM/100000).toFixed(2)}L`;
    const kp = document.getElementById('kpi-pnl');
    kp.textContent  = `₹${(tP/100000).toFixed(2)}L`;
    kp.style.color  = tP >= 0 ? '#00ff88' : '#ff4d6d';

    // Bar
    const sc = {};
    DATA.forEach(s => { sc[s.SECTOR] = (sc[s.SECTOR]||0) + (s.COST || s.MKT); });
    const total = Object.values(sc).reduce((a,b) => a+b, 0);
    document.getElementById('tape-bar').innerHTML = total > 0 ? SECTORS.map(sec => {
        const pct = (sc[sec] / total * 100).toFixed(2);
        const dim = filter && filter !== sec ? ' dimmed' : '';
        return `<div class="seg${dim}" style="width:${pct}%;background:${COL[sec]}"
                     onclick="tap('${sec}')">${pct > 8 ? sec : ''}</div>`;
    }).join('') : '<div style="width:100%;background:#222;height:100%;border-radius:4px"></div>';

    // Legend
    document.getElementById('legend').innerHTML = SECTORS.map(sec =>
        `<div class="leg ${filter===sec?'on':''}" onclick="tap('${sec}')">
            <div class="dot" style="background:${COL[sec]}"></div>${sec}</div>`
    ).join('');

    // Filter label
    document.getElementById('filter-label').innerHTML =
        filter ? `Sector: <span>${filter}</span> — tap again to clear` : '&nbsp;';

    // Table
    const rows = filter ? DATA.filter(s => s.SECTOR === filter) : DATA;
    let h = `<table><thead><tr>`
        + FIELDS.map(f => `<th${f==='SYM'?' class="sticky"':''}>${f}</th>`).join('')
        + `</tr></thead><tbody>`;
    rows.forEach(s => {
        h += `<tr>` + FIELDS.map(f => {
            const v = s[f] ?? '—';
            const c = f==='SYM' ? 'sticky' : f==='PNL' ? (v>=0?'pos':'neg') : '';
            return `<td${c?` class="${c}"`:''}>${v}${f==='ROE'?'%':''}</td>`;
        }).join('') + `</tr>`;
    });
    document.getElementById('app').innerHTML = h + `</tbody></table>`;
}

function tap(sec) { filter = filter===sec ? null : sec; render(); }

init();
</script>

</body>
</html>
