<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bharat Markets Terminal</title>
    <style>
        :root {
            --fontStack-monospace: "Monaspace Neon", ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, monospace !important;
            --bg: #0d1117;
            --bl: #58a6ff;
            --gr: #3fb950;
            --rd: #f85149;
            --border: #30363d;
        }

        body {
            background: var(--bg);
            color: #c9d1d9;
            font-family: var(--fontStack-monospace);
            margin: 0;
            padding: 10px;
            font-size: 12px;
        }

        header {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
        }

        .kpi-box { border: 1px solid var(--border); padding: 5px 10px; border-radius: 4px; }
        .kpi-label { color: #8b949e; font-size: 10px; text-transform: uppercase; }
        .kpi-val { font-weight: bold; color: var(--bl); }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; color: #8b949e; border-bottom: 1px solid var(--border); padding: 8px; }
        td { padding: 8px; border-bottom: 1px solid #21262d; }
        
        .up { color: var(--gr); }
        .dn { color: var(--rd); }
    </style>
</head>
<body>

<header>
    <div class="kpi-box"><div class="kpi-label">Holdings</div><div class="kpi-val" id="k-count">0</div></div>
    <div class="kpi-box"><div class="kpi-label">Invested</div><div class="kpi-val" id="k-inv">₹0</div></div>
    <div class="kpi-box"><div class="kpi-label">Current</div><div class="kpi-val" id="k-cur">₹0</div></div>
    <div class="kpi-box"><div class="kpi-label">P&L</div><div class="kpi-val" id="k-pnl">₹0</div></div>
</header>

<div id="app-root">
    <table id="portfolio-table">
        <thead><tr id="table-header"></tr></thead>
        <tbody id="table-body"></tbody>
    </table>
</div>

<script>
    // CORE LOGIC START
    const UI_FIELDS = ['SYM', 'PRICE', 'CHG%', 'VAL', 'P&L%', 'FII%', 'DII%'];

    const resolve = (obj, field) => {
        const mappings = {
            'SYM': ['SYM', 'SYMBOL', 'TICKER'],
            'PRICE': ['PRICE', 'LTP', 'LAST'],
            'VAL': ['VALUE', 'TOTAL'],
            'CHG%': ['CHANGE%', 'CHG%'],
            'P&L%': ['PNL%', 'PROFIT%']
        };
        const targets = mappings[field] || [field];
        for (const t of targets) {
            if (obj[t] !== undefined) return obj[t];
            const cleanT = t.replace('%', '');
            if (obj[cleanT] !== undefined) return obj[cleanT];
        }
        return '—';
    };

    async function init() {
        try {
            const response = await fetch('fundamentals.json');
            const data = await response.json();
            render(data);
        } catch (err) {
            console.error("Failed to load data:", err);
        }
    }

    function render(data) {
        const headerRow = document.getElementById('table-header');
        const body = document.getElementById('table-body');
        
        headerRow.innerHTML = UI_FIELDS.map(f => `<th>${f}</th>`).join('');
        
        body.innerHTML = data.map(row => `
            <tr>
                ${UI_FIELDS.map(f => {
                    const val = resolve(row, f);
                    const isNum = !isNaN(parseFloat(val));
                    const css = (f.includes('%') && isNum) ? (val >= 0 ? 'up' : 'dn') : '';
                    return `<td class="${css}">${val}</td>`;
                }).join('')}
            </tr>
        `).join('');

        // Update KPIs (simplified logic)
        document.getElementById('k-count').innerText = data.length;
    }

    window.onload = init;
</script>
</body>
</html>
