<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>BharatMarkets Pro</title>

<style>

body{
font-family:system-ui;
background:#0f172a;
color:white;
margin:0;
padding:16px;
}

h1{
margin:0 0 10px 0;
font-size:22px;
}

.controls{
display:flex;
gap:10px;
margin-bottom:10px;
}

input{
padding:8px;
border-radius:6px;
border:none;
flex:1;
}

button{
padding:8px 14px;
border:none;
background:#2563eb;
color:white;
border-radius:6px;
}

table{
width:100%;
border-collapse:collapse;
font-size:14px;
}

th,td{
padding:8px;
border-bottom:1px solid #333;
}

.green{color:#22c55e;}
.red{color:#ef4444;}

.small{
color:#9ca3af;
font-size:12px;
}

</style>

</head>

<body>

<h1>BharatMarkets Pro</h1>

<div class="controls">
<input id="search" placeholder="Search stock">
<button onclick="update()">Refresh</button>
</div>

<div class="small" id="time"></div>

<table>

<thead>
<tr>
<th>Stock</th>
<th>LTP</th>
<th>%</th>
</tr>
</thead>

<tbody id="table"></tbody>

</table>

<script>

const STOCKS=[
"RELIANCE","TCS","INFY","HDFCBANK","ICICIBANK",
"SBIN","LT","ITC","BHARTIARTL","HINDUNILVR",
"AXISBANK","KOTAKBANK","BAJFINANCE","BAJAJFINSV",
"MARUTI","TITAN","ULTRACEMCO","ASIANPAINT",
"SUNPHARMA","HCLTECH","WIPRO"
]

async function fetchPrice(sym){

let url=`https://query1.finance.yahoo.com/v8/finance/chart/${sym}.NS?interval=1d&range=1d`

let r=await fetch(url)

let j=await r.json()

let meta=j.chart.result[0].meta

let ltp=meta.regularMarketPrice
let prev=meta.previousClose

let chg=((ltp-prev)/prev)*100

return {sym,ltp,chg}

}

function rowHTML(sym,ltp,chg){

let c=chg>=0?"green":"red"

return `
<tr>
<td>${sym}</td>
<td>₹${ltp.toFixed(2)}</td>
<td class="${c}">${chg.toFixed(2)}%</td>
</tr>
`

}

async function update(){

let table=document.getElementById("table")

table.innerHTML="Loading..."

let rows=[]

for(let s of STOCKS){

try{

let d=await fetchPrice(s)

rows.push(d)

}catch(e){}

}

rows.sort((a,b)=>b.chg-a.chg)

let html=""

let search=document.getElementById("search").value.toUpperCase()

for(let r of rows){

if(search && !r.sym.includes(search)) continue

html+=rowHTML(r.sym,r.ltp,r.chg)

}

table.innerHTML=html

document.getElementById("time").innerText=
"Updated "+new Date().toLocaleString()

}

update()

setInterval(update,60000)

</script>

</body>
</html>
