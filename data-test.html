<!DOCTYPE html>
<html>
<head>
    <title>Test Load Button</title>
    <style>
        body { background: #000; color: #fff; font-family: monospace; padding: 20px; }
        button { padding: 10px 20px; background: #00ff88; color: #000; border: none; cursor: pointer; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 9000; }
        .modal.show { display: flex; }
        .modal-content { background: #000; border: 1px solid #222; padding: 20px; border-radius: 12px; max-width: 600px; }
    </style>
</head>
<body>

<h1>🧪 Load Button Test</h1>
<button onclick="testLoadButton()">📥 Test Load Button</button>
<button onclick="clearConsole()">Clear Console</button>

<div id="log" style="margin-top: 20px; padding: 10px; background: #111; border: 1px solid #222; max-height: 400px; overflow-y: auto; font-size: 11px;"></div>

<div id="modal" class="modal">
    <div class="modal-content">
        <h2>✅ Import Wizard Opened!</h2>
        <p>The Load button works correctly.</p>
        <button onclick="closeModal()">Close</button>
    </div>
</div>

<script src="app-import.js"></script>
<script>
function log(msg) {
    var el = document.getElementById('log');
    el.innerHTML += msg + '<br>';
    el.scrollTop = el.scrollHeight;
    console.log(msg);
}

function clearConsole() {
    document.getElementById('log').innerHTML = '';
}

function testLoadButton() {
    log('🔍 Testing Load Button...');
    
    try {
        log('✓ Calling openImportWorkflow()');
        openImportWorkflow();
        log('✅ Success! Import wizard opened.');
    } catch(err) {
        log('❌ ERROR: ' + err.message);
        log('Stack: ' + err.stack);
    }
}

function closeModal() {
    var modal = document.getElementById('import-modal');
    if (modal) modal.style.display = 'none';
}

// Test if importState exists
log('Checking if importState exists...');
if (typeof importState !== 'undefined') {
    log('✅ importState found: ' + JSON.stringify(importState));
} else {
    log('❌ importState NOT defined');
}

// Test if openImportWorkflow exists
if (typeof openImportWorkflow === 'function') {
    log('✅ openImportWorkflow() function found');
} else {
    log('❌ openImportWorkflow() function NOT found');
}
</script>

</body>
</html>
