<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
    <title>Onyx | Analysis</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg:#000; --s1:#0a0a0a; --b1:#222; --bl:#00f2ff; --gr:#00ff88; --rd:#ff4d6d; --tx:#fff; --gr2:#00ff88; --rd2:#ff4d6d; --tx1:#fff; --tx3:#666; }
        *{box-sizing:border-box;margin:0;padding:0;}
        body { background:var(--bg); color:var(--tx); font-family:'JetBrains Mono',monospace; overflow:hidden; -webkit-text-size-adjust:100%; padding-bottom: 80px; }
        .view { width:100%; overflow:auto; height:calc(100vh - 80px); background:#000; -webkit-overflow-scrolling:touch; }
        footer { position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); border-top: 1px solid var(--b1); display: flex; justify-content: space-around; padding: 12px 0; padding-bottom: calc(12px + env(safe-area-inset-bottom)); z-index: 1000; }
        .nav-btn { text-decoration: none; color: #666; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 33%; padding: 8px 0; transition: color 0.2s; }
        .nav-btn:hover { color: var(--bl); }
        .nav-btn.active { color: var(--bl); font-weight: 800; }
        .nav-label { font-size: 8px; margin-top: 4px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        
        /* Drill styles */
        .drill-wrap { padding: 12px; }
        .drill-hdr { display: flex; align-items: center; gap: 10px; padding: 12px; border-bottom: 1px solid var(--b1); margin-bottom: 12px; }
        .back-btn { background: #222; color: #fff; border: 1px solid #444; border-radius: 6px; padding: 6px 12px; cursor: pointer; font-size: 11px; }
        .back-btn:hover { background: #333; }
        .dsym { font-size: 16px; font-weight: 800; color: var(--bl); }
        .dchg { font-size: 12px; font-weight: 700; }
        .u-f1min0 { flex: 1; min-width: 0; }
        .u-tar-fs0 { text-align: right; font-size: 10px; }
        .score-ring { width: 50px; height: 50px; border-radius: 50%; border: 2px solid; display: flex; flex-direction: column; align-items: center; justify-content: center; flex-shrink: 0; }
        .score-num { font-size: 18px; font-weight: 800; }
        .score-lbl { font-size: 8px; }
        .dtabs { display: flex; gap: 0; border-bottom: 1px solid var(--b1); margin-bottom: 12px; overflow-x: auto; }
        .dtab { flex: 1; min-width: 80px; padding: 10px; background: #111; color: #666; border: none; cursor: pointer; font-size: 10px; font-weight: 700; text-transform: uppercase; white-space: nowrap; border-bottom: 2px solid transparent; }
        .dtab.active { color: var(--bl); border-bottom-color: var(--bl); }
        .dtab:hover { color: var(--tx); }
        
        /* Content styles */
        .fin { padding-bottom: 20px; }
        .u-sub { font-size: 9px; color: #666; margin-top: 4px; }
        table { width: 100%; border-collapse: collapse; font-size: 10px; }
        th { background: var(--s1); color: #666; padding: 10px; text-align: left; border-bottom: 1px solid var(--b1); }
        td { padding: 10px; border-bottom: 1px solid #111; }
    </style>
</head>
<body>

<div class="view"><div id="app"></div></div>

<!-- Debug Button -->
<div style="position:fixed; top:80px; right:10px; z-index:999;">
  <button onclick="toggleDebug()" style="background:#00f2ff; color:#000; border:none; border-radius:4px; padding:8px 12px; font-size:11px; font-weight:800; cursor:pointer;">🐛 Debug</button>
</div>

<!-- Debug Panel -->
<div id="debugPanel" style="position:fixed; top:120px; right:10px; width:300px; background:#0a0a0a; border:1px solid #00f2ff; border-radius:4px; padding:12px; z-index:999; max-height:400px; overflow-y:auto; display:none; font-size:9px; color:#00f2ff; font-family:monospace;">
  <div style="margin-bottom:10px; font-weight:800;">🔍 DEBUG LOG</div>
  <div id="debugLog" style="line-height:1.6;"></div>
</div>

<footer>
    <a href="index.html" class="nav-btn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg><span class="nav-label">Portfolio</span></a>
    <a href="data.html" class="nav-btn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"></path><path d="M21 3v5h-5"></path><path d="M21 12a9 9 0 0 1-9 9 9.76 9.76 0 0 1-6.74-2.74L3 16"></path><path d="M3 21v-5h5"></path></svg><span class="nav-label">Data</span></a>
    <a href="analysis.html" class="nav-btn active"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg><span class="nav-label">Analysis</span></a>
</footer>

<!-- Load bridge first, then old JS files -->
<script src="bridge.js"></script>
<script src="app-analysis.js"></script>
<script src="app-drill.js"></script>

<script>
// ===== DEBUG LOGGING =====
let debugLogs = [];

function addDebug(msg) {
  const ts = new Date().toLocaleTimeString();
  const entry = `[${ts}] ${msg}`;
  debugLogs.push(entry);
  console.log(entry);
  updateDebugPanel();
}

function updateDebugPanel() {
  const panel = document.getElementById('debugLog');
  if (panel) {
    panel.innerHTML = debugLogs.slice(-20).map(log => `<div>${log}</div>`).join('');
    panel.scrollTop = panel.scrollHeight;
  }
}

function toggleDebug() {
  const panel = document.getElementById('debugPanel');
  panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
}

// ===== INIT FLOW =====
async function init() {
  try {
    addDebug('🚀 Init started');
    
    // 1. Load data from IndexedDB via bridge
    addDebug('📚 Loading bridge...');
    await initBridge();
    addDebug(`✅ Bridge ready: MASTER=${MASTER.length}`);
    
    // 2. Check if drill mode requested via URL parameter
    const params = new URLSearchParams(window.location.search);
    const drillTicker = params.get('drill');
    addDebug(`📍 URL param drill: ${drillTicker || 'none'}`);
    
    if (drillTicker) {
      // Open drill view directly for clicked stock
      addDebug(`🔍 Looking for stock: ${drillTicker}`);
      if (selectStock(drillTicker)) {
        addDebug(`✅ Selected: ${drillTicker}`);
        addDebug(`📋 S.selStock: ${S.selStock?.ticker || 'undefined'}`);
        addDebug(`🎨 Calling renderDrill...`);
        try {
          renderDrill(document.getElementById('app'));
          addDebug(`✅ renderDrill completed`);
        } catch (err) {
          addDebug(`❌ renderDrill error: ${err.message}`);
          console.error('renderDrill error:', err);
          document.getElementById('app').innerHTML = '<div style="padding:20px; color:#ff4d6d; font-size:11px;">❌ Error rendering drill:<br>' + err.message + '</div>';
        }
      } else {
        addDebug(`❌ Stock not found: ${drillTicker}`);
        document.getElementById('app').innerHTML = '<div style="padding:20px; color:#ff4d6d; text-align:center;">❌ Stock not found: ' + drillTicker + '</div>';
      }
    } else {
      // Show message - analysis moved to data.html
      addDebug('ℹ️ No drill param, showing info message');
      document.getElementById('app').innerHTML = '<div style="padding:40px; color:#8ab4f8; text-align:center;"><div style="font-size:14px; margin-bottom:20px;">📊 Analysis Coverage</div><div style="font-size:12px;">Moved to Data tab</div><div style="font-size:10px; color:#666; margin-top:10px;">Click stock in Portfolio to drill down</div></div>';
    }
    
    addDebug('✅ Init completed');
  } catch (err) {
    addDebug(`❌ FATAL ERROR: ${err.message}`);
    console.error('Init fatal error:', err);
    document.getElementById('app').innerHTML = '<div style="padding:20px; color:#ff4d6d; font-size:11px;">❌ Fatal error:<br>' + err.message + '</div>';
  }
}

// Start initialization
addDebug('⏳ Page loaded, starting init...');
init();
</script>

</body>
</html>
