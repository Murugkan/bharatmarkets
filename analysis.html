<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
    <title>Onyx | Analysis</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
    <style>
        :root{--bg:#060c18;--s1:#0a0e1a;--card:#0d1222;--b1:#1a2332;--tx1:#f0f6ff;--tx3:#7a8fa0;--ac:#00f2ff;--gr:#00e896;--rd:#ff6b85;--yw:#ffbf47}
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:var(--bg);color:var(--tx1);font-family:'JetBrains Mono',monospace;height:100vh;overflow:hidden;padding-top:max(0px, env(safe-area-inset-top))}
        
        .container{display:flex;flex-direction:column;height:100vh}
        .header{background:var(--s1);padding:8px 12px;border-bottom:1px solid var(--b1);display:flex;justify-content:space-between;align-items:center;gap:12px}
        .header-left{flex:1;display:flex;align-items:center;gap:8px}
        .header-title{font-size:14px;font-weight:800;color:var(--ac)}
        .header-subtitle{font-size:9px;color:var(--tx3);margin-top:2px}
        .header-price{text-align:right;display:flex;flex-direction:column}
        .price-val{font-size:14px;font-weight:800}
        .price-chg{font-size:10px;margin-top:2px}
        
        .tabs{background:var(--card);padding:8px 12px;border-bottom:1px solid var(--b1);display:flex;gap:8px;overflow-x:auto}
        .tab{padding:8px 14px;background:transparent;border:1px solid var(--b1);border-radius:4px;color:var(--tx3);cursor:pointer;font-size:10px;font-weight:700;white-space:nowrap;transition:all .2s}
        .tab.active{background:rgba(0,242,255,.1);border-color:var(--ac);color:var(--ac)}
        
        .content{flex:1;overflow-y:auto;padding:12px}
        .content::-webkit-scrollbar{width:6px}
        .content::-webkit-scrollbar-track{background:var(--s1)}
        .content::-webkit-scrollbar-thumb{background:var(--b1);border-radius:3px}
        
        .footer{position:fixed;bottom:0;width:100%;background:rgba(0,0,0,.95);border-top:1px solid var(--b1);display:flex;justify-content:space-around;padding:12px 0;z-index:100}
        .footer-btn{text-decoration:none;color:#666;display:flex;flex-direction:column;align-items:center;width:33%;font-size:8px;text-transform:uppercase;font-weight:800;transition:color .2s}
        .footer-btn.active{color:var(--ac)}
        
        .back-btn{background:none;border:none;color:var(--tx1);font-size:18px;cursor:pointer;padding:2px 4px;line-height:1}
        
        .placeholder{text-align:center;padding:40px 20px;color:var(--tx3)}
        .placeholder-emoji{font-size:32px;margin-bottom:12px}
        .tbd{color:#ff9800;opacity:.7;font-weight:700}
        
        .val-positive{color:var(--gr);font-weight:700}
        .val-negative{color:var(--rd);font-weight:700}
        .val-neutral{color:var(--ac);font-weight:700}
        .val-warning{color:var(--yw);font-weight:700}
        
        .metric-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid rgba(26,35,50,.2);color:var(--tx3);font-size:10px;line-height:1.3}
        .metric-row:last-child{border-bottom:none}
        .metric-label{flex:1;font-size:9px}
        .metric-value{text-align:right;font-weight:700;min-width:70px;font-size:10px}
        
        .section-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
        .section-row > div{background:var(--card);border:1px solid var(--b1);border-radius:6px;padding:10px}
        
        .weightage-container{background:var(--card);border:1px solid var(--b1);border-radius:6px;padding:8px;margin-bottom:8px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px}
        .weightage-box{text-align:center;padding:5px 6px;background:rgba(0,0,0,.3);border-radius:4px}
        .weightage-label{font-size:7px;color:var(--tx3);text-transform:uppercase;margin-bottom:2px;letter-spacing:0.5px}
        .weightage-value{font-size:22px;font-weight:800;line-height:1}
        .weightage-count{font-size:8px;color:var(--tx3);margin-top:2px;font-weight:600}
        .pos-box .weightage-value{color:var(--gr)}
        .neg-box .weightage-value{color:var(--rd)}
        .signal-box .weightage-value{color:var(--ac);font-size:18px}
        .signal-label{font-size:7px;color:var(--tx3);margin-top:2px;text-transform:uppercase;font-weight:700;letter-spacing:0.3px}
        
        .fund-card{background:var(--card);border:1px solid var(--b1);border-radius:6px;padding:10px;margin-bottom:8px}
        .fund-title{font-weight:800;color:var(--ac);font-size:9px;text-transform:uppercase;margin-bottom:8px}
        .trend-row{display:flex;justify-content:space-between;gap:4px}
        .trend-val{flex:1;text-align:center;font-size:9px;padding:4px;background:rgba(0,0,0,.3);border-radius:3px}
        .trend-val-header{font-size:7px;color:var(--tx3);margin-bottom:2px}
        .trend-val-number{font-weight:800;color:var(--tx1);font-size:9px}
        .trend-val-arrow{font-size:8px;margin-top:1px}
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="header-left">
            <button class="back-btn" onclick="history.back()">←</button>
            <div>
                <div class="header-title" id="ticker">—</div>
                <div class="header-subtitle" id="company">—</div>
            </div>
        </div>
        <div class="header-price">
            <div class="price-val" id="ltp">₹—</div>
            <div class="price-chg" id="chg" style="color:var(--gr)">—</div>
        </div>
    </div>
    
    <div class="tabs">
        <button class="tab active" onclick="switchTab(event, 'overview')">📊 Overview</button>
        <button class="tab" onclick="switchTab(event, 'technical')">📉 Technical</button>
        <button class="tab" onclick="switchTab(event, 'fundamentals')">📋 Fundamentals</button>
        <button class="tab" onclick="switchTab(event, 'guidance')">💡 Guidance</button>
    </div>
    
    <div class="content" id="content"></div>
</div>

<div class="footer">
    <a href="index.html" class="footer-btn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg><span>Portfolio</span></a>
    <a href="data.html" class="footer-btn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.76 9.76 0 0 1-6.74-2.74L3 16"/><path d="M3 21v-5h5"/></svg><span>Data</span></a>
    <a href="analysis.html" class="footer-btn active"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg><span>Analysis</span></a>
</div>

<script>
const DB = "OnyxPortfolioDB";
const STORE = "Stocks";
let currentStock = null;

const num = (v) => typeof v === 'number' ? v : parseFloat(v) || 0;
const fmt = (v, decimals = 2) => num(v) === 0 && !v ? '—' : num(v).toFixed(decimals);
const get = (obj, ...keys) => {
    for (let k of keys) {
        if (obj && obj[k] !== undefined) return obj[k];
    }
    return null;
};

const urlParams = new URLSearchParams(window.location.search);
const ticker = urlParams.get('drill') || urlParams.get('t');

async function loadStock() {
    if (!ticker) {
        document.getElementById('content').innerHTML = '<div class="placeholder"><div class="placeholder-emoji">❌</div><div>No stock selected</div></div>';
        return;
    }

    try {
        const db = await new Promise((resolve, reject) => {
            const req = indexedDB.open(DB);
            req.onsuccess = () => resolve(req.result);
            req.onerror = () => reject(new Error('DB error'));
        });

        const tx = db.transaction(STORE, 'readonly');
        const stock = await new Promise((resolve, reject) => {
            const req = tx.objectStore(STORE).get(ticker);
            req.onsuccess = () => resolve(req.result);
            req.onerror = () => reject(new Error('Query error'));
        });

        if (!stock) {
            document.getElementById('content').innerHTML = '<div class="placeholder"><div class="placeholder-emoji">🔍</div><div>Not found: ' + ticker + '</div></div>';
            return;
        }

        currentStock = stock;
        renderHeader();
        renderTab('overview');
    } catch (e) {
        document.getElementById('content').innerHTML = '<div class="placeholder"><div class="placeholder-emoji">⚠️</div><div>' + e.message + '</div></div>';
    }
}

function renderHeader() {
    const s = currentStock;
    document.getElementById('ticker').textContent = get(s, 'ticker') || '—';
    document.getElementById('company').textContent = get(s, 'name') || '—';
    document.getElementById('ltp').textContent = '₹' + fmt(get(s, 'ltp') || 0);
    
    const chg = num(get(s, 'changePct') || 0);
    const chgEl = document.getElementById('chg');
    chgEl.textContent = (chg >= 0 ? '▲ ' : '▼ ') + Math.abs(chg).toFixed(2) + '%';
    chgEl.style.color = chg >= 0 ? 'var(--gr)' : 'var(--rd)';
}

function switchTab(event, tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    event.target.classList.add('active');
    renderTab(tab);
}

function renderTab(tab) {
    const s = currentStock;
    let html = '';
    
    if (tab === 'overview') {
        const quarterly = get(s, 'quarterly') || [];
        const pe = num(get(s, 'pe'));
        const pb = num(get(s, 'pb'));
        const roce = num(get(s, 'roce'));
        const mcap = num(get(s, 'mcap'));
        const sales = num(get(s, 'sales'));
        const ebitda = num(get(s, 'ebitda'));
        const cfo = num(get(s, 'cfo'));
        const fcf = num(get(s, 'fcf') || 0);
        const prom = num(get(s, 'prom') || 0);
        const fii = num(get(s, 'fii') || 0);
        const dii = num(get(s, 'dii') || 0);
        
        const posSignals = num(get(s, 'pos') || 0);
        const negSignals = num(get(s, 'neg') || 0);
        const signal = get(s, 'signal') || 'HOLD';
        const totalSignals = posSignals + negSignals;
        const posWeightage = totalSignals > 0 ? Math.round((posSignals / totalSignals) * 100) : 0;
        const negWeightage = totalSignals > 0 ? Math.round((negSignals / totalSignals) * 100) : 0;

        let totalDebt = 0;
        if (quarterly && quarterly.length > 0) {
            for (let i = quarterly.length - 1; i >= 0; i--) {
                if (quarterly[i].debt && num(quarterly[i].debt) > 0) {
                    totalDebt = num(quarterly[i].debt);
                    break;
                }
            }
        }

        let debtToEbitda = 0;
        if (totalDebt > 0 && ebitda > 0) {
            debtToEbitda = totalDebt / ebitda;
        }

        let evEbitda = 0;
        if (mcap > 0 && ebitda > 0 && totalDebt > 0) {
            const cash = num(get(s, 'cash') || 0);
            const ev = mcap + totalDebt - (cash > 0 ? cash : 0);
            evEbitda = ev / ebitda;
        }

        let marginTrend = '—';
        if (quarterly && quarterly.length >= 2) {
            const recent = quarterly.slice(-3).map(q => num(q.opm || 0));
            if (recent.length > 0) {
                marginTrend = recent.map(m => fmt(m)).join('% → ') + '%';
            }
        }

        let cashConversion = 0;
        if (quarterly && quarterly.length > 0) {
            const latestNet = num(quarterly[quarterly.length - 1].net || 0);
            if (latestNet > 0 && cfo > 0) {
                cashConversion = (cfo / latestNet) * 100;
            }
        }

        const fcfYield = mcap > 0 && fcf > 0 ? ((fcf / mcap) * 100) : 0;

        html = `<div style="padding:8px 0;padding-bottom:80px">
            <div class="weightage-container">
                <div class="weightage-box pos-box">
                    <div class="weightage-label">Positive</div>
                    <div class="weightage-value">${posWeightage}%</div>
                    <div class="weightage-count">+${posSignals}</div>
                </div>
                <div class="weightage-box neg-box">
                    <div class="weightage-label">Negative</div>
                    <div class="weightage-value">${negWeightage}%</div>
                    <div class="weightage-count">-${negSignals}</div>
                </div>
                <div class="weightage-box signal-box">
                    <div class="weightage-label">Signal</div>
                    <div class="weightage-value">${signal}</div>
                    <div class="signal-label">${signal === 'BUY' ? '📈' : signal === 'SELL' ? '📉' : '⚪'}</div>
                </div>
            </div>

            <div class="section-row">
                <div>
                    <div style="font-weight:800;color:var(--ac);margin-bottom:8px;font-size:9px">📊 VALUATION</div>
                    <div class="metric-row"><div class="metric-label">P/E</div><div class="metric-value ${pe > 0 && pe < 20 ? 'val-positive' : pe >= 20 && pe < 40 ? 'val-neutral' : 'val-warning'}">${fmt(pe)}x</div></div>
                    <div class="metric-row"><div class="metric-label">P/B</div><div class="metric-value ${pb > 0 && pb < 1.5 ? 'val-positive' : pb >= 1.5 && pb < 3 ? 'val-neutral' : 'val-warning'}">${fmt(pb)}x</div></div>
                    <div class="metric-row"><div class="metric-label">EV/EBITDA</div><div class="metric-value">${evEbitda > 0 ? fmt(evEbitda, 1) + 'x' : '—'}</div></div>
                </div>
                
                <div>
                    <div style="font-weight:800;color:var(--ac);margin-bottom:8px;font-size:9px">⭐ QUALITY</div>
                    <div class="metric-row"><div class="metric-label">Op Margin</div><div class="metric-value val-neutral">${marginTrend}</div></div>
                    <div class="metric-row"><div class="metric-label">ROIC</div><div class="metric-value ${roce > 15 ? 'val-positive' : roce > 10 ? 'val-neutral' : 'val-warning'}">${fmt(roce)}%</div></div>
                    <div class="metric-row"><div class="metric-label">Cash Conv</div><div class="metric-value">${cashConversion > 0 ? fmt(cashConversion) + '%' : '—'}</div></div>
                </div>
            </div>

            <div class="section-row">
                <div>
                    <div style="font-weight:800;color:var(--ac);margin-bottom:8px;font-size:9px">📈 GROWTH</div>
                    <div class="metric-row"><div class="metric-label">Rev CAGR</div><div class="metric-value">—</div></div>
                    <div class="metric-row"><div class="metric-label">EPS CAGR</div><div class="metric-value">—</div></div>
                </div>

                <div>
                    <div style="font-weight:800;color:var(--ac);margin-bottom:8px;font-size:9px">🏦 HEALTH</div>
                    <div class="metric-row"><div class="metric-label">D/EBITDA</div><div class="metric-value">${debtToEbitda > 0 ? fmt(debtToEbitda, 1) + 'x' : '—'}</div></div>
                    <div class="metric-row"><div class="metric-label">FCF Yield</div><div class="metric-value">${fcfYield > 0 ? fmt(fcfYield, 1) + '%' : '—'}</div></div>
                </div>
            </div>

            <div style="background:var(--card);border:1px solid var(--b1);border-radius:6px;padding:10px">
                <div style="font-weight:800;color:var(--ac);margin-bottom:8px;font-size:9px">📋 HOLDINGS</div>
                <div class="metric-row"><div class="metric-label">Revenue</div><div class="metric-value">₹${fmt(sales)}Cr</div></div>
                <div class="metric-row"><div class="metric-label">EBITDA</div><div class="metric-value">₹${fmt(ebitda)}Cr</div></div>
                <div class="metric-row"><div class="metric-label">Market Cap</div><div class="metric-value">₹${fmt(mcap)}Cr</div></div>
                <div class="metric-row"><div class="metric-label">Promoter</div><div class="metric-value">${fmt(prom)}%</div></div>
                <div class="metric-row"><div class="metric-label">FII</div><div class="metric-value">${fmt(fii)}%</div></div>
                <div class="metric-row"><div class="metric-label">DII</div><div class="metric-value">${fmt(dii)}%</div></div>
            </div>
        </div>`;

    } else if (tab === 'technical') {
        html = '<div class="placeholder"><div class="placeholder-emoji">📉</div><div>Technical Analysis</div><div style="font-size:9px;color:#ff9800;margin-top:8px">Coming Soon</div></div>';
    
    } else if (tab === 'fundamentals') {
        const quarterly = get(s, 'quarterly') || [];
        
        if (!quarterly || quarterly.length === 0) {
            html = '<div class="placeholder"><div class="placeholder-emoji">📊</div><div>No quarterly data</div></div>';
        } else {
            html = '<div style="padding:8px 0;padding-bottom:80px">';
            
            // Revenue card
            html += '<div class="fund-card"><div class="fund-title">📊 Revenue</div><div class="trend-row">';
            for (let i = 0; i < quarterly.length; i++) {
                const val = num(quarterly[i].rev || 0);
                const arrow = i === 0 ? '—' : (val > num(quarterly[i-1].rev || 0) ? '📈' : '📉');
                html += `<div class="trend-val"><div class="trend-val-header">Q${i+1}</div><div class="trend-val-number">${val > 0 ? fmt(val, 0) : '—'}</div><div class="trend-val-arrow">${arrow}</div></div>`;
            }
            html += '</div></div>';
            
            // Net Profit card
            html += '<div class="fund-card"><div class="fund-title">💰 Net Profit</div><div class="trend-row">';
            for (let i = 0; i < quarterly.length; i++) {
                const val = num(quarterly[i].net || 0);
                const arrow = i === 0 ? '—' : (val > num(quarterly[i-1].net || 0) ? '📈' : '📉');
                html += `<div class="trend-val"><div class="trend-val-header">Q${i+1}</div><div class="trend-val-number">${val > 0 ? fmt(val, 0) : '—'}</div><div class="trend-val-arrow">${arrow}</div></div>`;
            }
            html += '</div></div>';
            
            // EBITDA card
            html += '<div class="fund-card"><div class="fund-title">📈 EBITDA</div><div class="trend-row">';
            for (let i = 0; i < quarterly.length; i++) {
                const val = num(quarterly[i].ebitda || 0);
                const arrow = i === 0 ? '—' : (val > num(quarterly[i-1].ebitda || 0) ? '📈' : '📉');
                html += `<div class="trend-val"><div class="trend-val-header">Q${i+1}</div><div class="trend-val-number">${val > 0 ? fmt(val, 0) : '—'}</div><div class="trend-val-arrow">${arrow}</div></div>`;
            }
            html += '</div></div>';
            
            // EPS card
            html += '<div class="fund-card"><div class="fund-title">💎 EPS</div><div class="trend-row">';
            for (let i = 0; i < quarterly.length; i++) {
                const val = num(quarterly[i].eps || 0);
                const arrow = i === 0 ? '—' : (val > num(quarterly[i-1].eps || 0) ? '📈' : '📉');
                html += `<div class="trend-val"><div class="trend-val-header">Q${i+1}</div><div class="trend-val-number">${val > 0 ? fmt(val, 2) : '—'}</div><div class="trend-val-arrow">${arrow}</div></div>`;
            }
            html += '</div></div>';
            
            // Operating Margin card
            html += '<div class="fund-card"><div class="fund-title">📊 Op Margin</div><div class="trend-row">';
            for (let i = 0; i < quarterly.length; i++) {
                const val = num(quarterly[i].opm || 0);
                const arrow = i === 0 ? '—' : (val > num(quarterly[i-1].opm || 0) ? '📈' : '📉');
                html += `<div class="trend-val"><div class="trend-val-header">Q${i+1}</div><div class="trend-val-number">${val > 0 ? fmt(val, 1) + '%' : '—'}</div><div class="trend-val-arrow">${arrow}</div></div>`;
            }
            html += '</div></div></div>';
        }
    
    } else if (tab === 'guidance') {
        html = '<div class="placeholder"><div class="placeholder-emoji">💡</div><div>Guidance & Insights</div><div style="font-size:9px;color:#ff9800;margin-top:8px">Coming Soon</div></div>';
    }
    
    document.getElementById('content').innerHTML = html;
}

loadStock();
</script>

</body>
</html>
