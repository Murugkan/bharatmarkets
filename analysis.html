function showTip(id, borderCol, html, ex, ey) {
  let tip = document.getElementById(id);
  if(!tip){ tip=document.createElement('div'); tip.id=id; document.body.appendChild(tip); }
  tip.style.cssText='position:fixed;background:rgba(10,20,40,.95);border:2px solid;border-radius:8px;padding:10px 14px;font-family:monospace;font-size:12px;z-index:9999;max-width:220px;min-width:150px';
  tip.style.borderColor = borderCol;
  tip.innerHTML = html;
  let left = ex + 12, top = ey - 80;
  if(left + 230 > window.innerWidth) left = Math.max(8, ex - 240);
  if(top < 8) top = ey + 12;
  if(top + 120 > window.innerHeight) top = Math.max(8, window.innerHeight - 130);
  tip.style.left = left+'px'; tip.style.top = top+'px';
  clearTimeout(tip._t);
  tip._t = setTimeout(()=>{ tip.remove(); }, 3000);
}

function handleChartClick(e, canvas, W2, H2) {
  const br = canvas.getBoundingClientRect();
  const scX = W2/br.width, scY = H2/br.height;
  const mx = (e.clientX-br.left)*scX, my = (e.clientY-br.top)*scY;

  // 1. MA lines
  if(maPoints.length) {
    const maHit = maPoints.reduce((best, p) => {
      const d = Math.sqrt((mx-p.x)**2 + (my-p.y)**2);
      return d < (best.d||999) ? {p, d} : best;
    }, {}).p;
    if(maHit && Math.sqrt((mx-maHit.x)**2+(my-maHit.y)**2) <= 14) {
      showTip('ma-tooltip', maHit.col,
        `<div style="color:${maHit.col};font-weight:bold;margin-bottom:6px">${maHit.label}</div>
         <div style="color:#aaa;font-size:11px;line-height:1.7">
           <div>Date: <span style="color:#fff">${maHit.date}</span></div>
           <div>Value: <span style="color:${maHit.col};font-weight:bold">₹${Math.round(maHit.value).toLocaleString('en-IN')}</span></div>
         </div>`, e.clientX, e.clientY);
      return;
    }
  }

  // 2. KPI overlay dots
  if(kpiPoints.length) {
    const kpiHit = kpiPoints.find(kpi => {
      const dx = mx-kpi.x, dy = my-kpi.y;
      return Math.sqrt(dx*dx+dy*dy) <= kpi.radius;
    });
    if(kpiHit) {
      const dispVal = kpiHit.key==='pe'  ? kpiHit.value.toFixed(1)+'x' :
                      kpiHit.key==='opm' ? kpiHit.value.toFixed(1)+'%' :
                      Math.abs(kpiHit.value)>=1000 ? (kpiHit.value/1000).toFixed(1)+'K Cr' :
                      kpiHit.value.toFixed(0)+' Cr';
      showTip('kpi-overlay-tooltip', kpiHit.col,
        `<div style="color:${kpiHit.col};font-weight:bold;margin-bottom:6px">${kpiHit.label}</div>
         <div style="color:#aaa;font-size:11px;line-height:1.7">
           <div>Date: <span style="color:#fff">${kpiHit.date==='now'?'Latest':kpiHit.date}</span></div>
           <div>Value: <span style="color:${kpiHit.col};font-weight:bold">${dispVal}</span></div>
         </div>`, e.clientX, e.clientY);
      return;
    }
  }

  // 3. Candlestick bars
  if(!candlestickBars.length) return;
  const bar = candlestickBars.find(b => mx>=b.x && mx<=b.x+b.w && my>=b.y && my<=b.y+b.h);
  let tip = document.getElementById('chart-tooltip');
  if(!bar || window.candleTooltipBar===bar.date) {
    if(tip) tip.remove();
    window.candleTooltipBar = null;
    return;
  }
  window.candleTooltipBar = bar.date;
  const o=bar.open.toFixed(2), h=bar.high.toFixed(2), l=bar.low.toFixed(2), c=bar.close.toFixed(2);
  const chg = ((c-o)/o*100).toFixed(2);
  const chgColor = chg>=0 ? '#00ff88' : '#ff4466';
  showTip('chart-tooltip','#00d4ff',
    `<div style="color:#00d4ff;font-weight:bold;margin-bottom:6px">${bar.date}</div>
     <div style="color:#aaa;font-size:11px;line-height:1.7">
       <div>O: ₹<span style="color:#fff">${o}</span> &nbsp; H: ₹<span style="color:#fff">${h}</span></div>
       <div>L: ₹<span style="color:#fff">${l}</span> &nbsp; C: ₹<span style="color:#fff">${c}</span></div>
     </div>
     <div style="margin-top:6px;color:${chgColor};font-weight:bold">${chg>=0?'+':''}${chg}%</div>
     <div style="color:#555;font-size:10px">Vol: ${(bar.volume/1e5).toFixed(1)}L</div>`,
    e.clientX, e.clientY);
}

function updateChartStats(s){
  const candles=getSlicedCandles(s, 0);
  if(!candles.length)return;
  const closes=candles.map(c=>c.c);
  const first=closes[0],last=closes[closes.length-1];
  const ret=((last-first)/first*100).toFixed(2);
  const hi=Math.max(...candles.map(c=>c.h));
  const lo=Math.min(...candles.map(c=>c.l));
  const vol=((hi-lo)/lo*100).toFixed(1);
  const up=last>=first;
  const retEl=document.getElementById('cstat-ret');
  const hiEl=document.getElementById('cstat-hi');
  const loEl=document.getElementById('cstat-lo');
  const volEl=document.getElementById('cstat-vol');
  if(retEl){retEl.textContent=(up?'+':'')+ret+'%';retEl.style.color=up?'var(--gr2)':'var(--rd2)';}
  if(hiEl)hiEl.textContent='₹'+fmt(hi);
  if(loEl)loEl.textContent='₹'+fmt(lo);
  if(volEl)volEl.textContent=vol+'%';
}

function canvasLoadAndDrawChart() {
  if(!currentStock) return;

  const headerEl = document.querySelector('.header');
  const tabsEl   = document.querySelector('.tabs');
  const footerEl = document.querySelector('.footer');
  const chromeH  = (headerEl ? headerEl.offsetHeight : 44)
                 + (tabsEl   ? tabsEl.offsetHeight   : 44)
                 + (footerEl ? footerEl.offsetHeight  : 60);

  const chartWrap = document.getElementById('chart-wrap');
  const volWrap   = document.getElementById('vol-wrap');

  if(chartWrap) {
    const content = document.getElementById('content');
    let toolbarH = 0;
    if(content) content.querySelectorAll('.cv-toolbar').forEach(el => { toolbarH += el.offsetHeight; });
    const available = Math.max(300, window.innerHeight - chromeH - toolbarH);

    // Set outer container to exact height so content div has nothing to scroll
    const outerDiv = chartWrap.closest('div[style*="background:var(--s1)"]') || chartWrap.parentElement;
    if(outerDiv && outerDiv !== content) outerDiv.style.height = available + 'px';

    if(volWrap) {
      if(S.maVis.vol) {
        const volH    = 160;
        const candleH = available - volH;
        chartWrap.style.height = candleH + 'px';
        volWrap.style.height   = volH    + 'px';
        volWrap.style.display  = '';
      } else {
        chartWrap.style.height = available + 'px';
        volWrap.style.height   = '0';
        volWrap.style.display  = 'none';
      }
    } else {
      chartWrap.style.height = available + 'px';
    }
  }

  attachChartResizeObserver(currentStock);
  scheduleTACharts(currentStock);
  setupChartInteraction();
}

// ════════════════════════════════════════════════
// PAN & ZOOM - Simpler Implementation
// ════════════════════════════════════════════════

function setupChartInteraction(){
  const canvas = document.getElementById('cv-candle');
  if(!canvas) return;
  if(setupChartInteraction._initializedFor === canvas) return;
  setupChartInteraction._initializedFor = canvas;
  const t={lastDist:0,isPanning:false,startX:0,startY:0,startPan:0,startYPan:0};

  // Unguarded rAF draw — bypasses scheduleTACharts' single-flight guard so
  // every touchmove/mousemove gets its own frame instead of being dropped.
  let _panRaf = null;
  const go = () => {
    if(_panRaf) cancelAnimationFrame(_panRaf);
    _panRaf = requestAnimationFrame(() => { _panRaf = null; scheduleTACharts(currentStock); });
  };

  // bars-per-pixel as a continuous float — NO Math.round here so sub-bar
  // swipes accumulate correctly instead of rounding to 0.
  const bpp = () => {
    const w = canvas.offsetWidth || 320;
    const visibleBars = Math.max(10, Math.max(20, Math.floor((w - 60) / 7)) / S.chartZoom);
    return visibleBars / (w - 60);   // bars per pixel, continuous
  };
  // Vertical pan: 1px = this fraction of visible price range
  const vpp = () => 1 / (canvas.offsetHeight || 400);

  canvas.addEventListener('mousedown', e => {
    t.isPanning = true; t.startX = e.clientX; t.startY = e.clientY;
    t.startPan = S.panOffset; t.startYPan = S.yPanOffset || 0;
  }, {passive: true});
  document.addEventListener('mousemove', e => {
    if(!t.isPanning || !currentStock) return;
    // Store as float; getSlicedCandles floors it via Math.max/min
    S.panOffset = Math.max(0, t.startPan - (e.clientX - t.startX) * bpp());
    S.yPanOffset = t.startYPan + (e.clientY - t.startY) * vpp();
    go();
  }, {passive: true});
  document.addEventListener('mouseup', () => { t.isPanning = false; }, {passive: true});
  canvas.addEventListener('wheel', e => {
    if(!currentStock) return; e.preventDefault();
    S.chartZoom = Math.max(0.3, Math.min(5, S.chartZoom * (e.deltaY < 0 ? 1.15 : 0.87)));
    scheduleTACharts(currentStock);
  }, {passive: false});

  const ts = e => {
    if(e.touches.length === 2){
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      t.lastDist = Math.sqrt(dx*dx + dy*dy); t.isPanning = false;
    } else {
      t.isPanning = true; t.startX = e.touches[0].clientX; t.startY = e.touches[0].clientY;
      t.startPan = S.panOffset; t.startYPan = S.yPanOffset || 0; t.lastDist = 0;
    }
  };
  const tm = e => {
    if(e.touches.length === 2){
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      const d = Math.sqrt(dx*dx + dy*dy);
      if(t.lastDist > 0){
        const delta = (d / t.lastDist) - 1;
        if(Math.abs(delta) > 0.005){
          const f = 1 + delta * 0.6;
          if(Math.abs(dy) > Math.abs(dx)) S.yAxisZoom = Math.max(0.5, Math.min(3, (S.yAxisZoom || 1) * f));
          else S.chartZoom = Math.max(0.3, Math.min(5, S.chartZoom * f));
          if(currentStock) go();
        }
      }
      t.lastDist = d; e.preventDefault();
    } else if(t.isPanning && currentStock){
      // Continuous float pan — same fix as mousemove
      S.panOffset = Math.max(0, t.startPan - (e.touches[0].clientX - t.startX) * bpp());
      S.yPanOffset = t.startYPan + (e.touches[0].clientY - t.startY) * vpp();
      go();
      e.preventDefault();
    }
  };
  const te = () => { t.isPanning = false; t.lastDist = 0; };
  canvas.ontouchstart = ts; canvas.addEventListener('touchmove', tm, {passive: false}); canvas.ontouchend = te;
  const v = document.getElementById('cv-vol');
  if(v){ v.ontouchstart = ts; v.addEventListener('touchmove', tm, {passive: false}); v.ontouchend = te; }
}

// ════════════════════════════════════════════════════════

var _newsDb = null;
var _newsDbPromise = null;
var _noiseRe = /share price today|live.*stock price|nse\/bse|ipo listing|ipo date|ipo price|ipo allotment|ipo gmp|stock.*chart|live price|price today|share price live|most active equities|stocks to watch|stocks in news|top stocks|daily brief india|trade spotlight|market wrap|opening bell|closing bell|comprehensive analysis|share price 202|investor guide|all you need to know/i;

function _openLink(url){ window.location.href = url; }
function _openExternal(url){ window.location.href = url; }

function renderNewsTab(s) {
  var sym  = s.ticker || s.sym;
  var enc  = encodeURIComponent(sym);

  // Build clean company name for Google search
  // Use full name, strip legal suffixes, keep meaningful words
  var STOP = /\b(ltd|limited|pvt|private|inc|corp|llp|mob|and|the|of)\b/gi;
  var co = (s.name || sym)
    .replace(/[^a-zA-Z0-9 ]/g, ' ')
    .replace(STOP, ' ')
    .replace(/\s+/g, ' ')
    .trim()
    .split(' ')
    .slice(0, 4)
    .join(' ');

  // Query gives Google enough context for AI Overview to surface:
  // earnings, results, regulatory news, analyst views, price movement
  var gQuery = co + ' stock news order win contract regulatory announcement';
  var gUrl   = 'https://www.google.com/search?q=' + encodeURIComponent(gQuery);

  var googlePill =
    '<a href="javascript:void(0)" onclick="_openLink(\''+gUrl.replace(/'/g,'%27')+'\')" '+
    'style="flex:0 0 auto;display:flex;align-items:center;gap:5px;padding:5px 11px;'+
    'border-radius:20px;border:1px solid #4285f455;background:#4285f415;'+
    'text-decoration:none;white-space:nowrap;cursor:pointer">'+
    '<svg width="13" height="13" viewBox="0 0 24 24">'+
      '<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>'+
      '<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>'+
      '<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>'+
      '<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>'+
    '</svg>'+
    '<span style="font-size:11px;font-weight:700;color:#fff">Google</span></a>';

  var links = [
    {l:'NSE',         u:'https://www.nseindia.com/get-quotes/equity?symbol='+enc,   c:'#2196f3'},
    {l:'Screener',    u:'https://www.screener.in/company/'+enc+'/',                  c:'#a855f7'},
    {l:'Corp Actions',u:'https://trendlyne.com/equity/corporate-actions/'+enc+'/0/',c:'#9c27b0'},
    {l:'Bulk Deals',  u:'https://trendlyne.com/equity/bulk-block-deals/'+enc+'/0/', c:'#e91e63'},
    {l:'Insider',     u:'https://trendlyne.com/equity/insider-trading/'+enc+'/0/',  c:'#f44336'},
    {l:'F&O',         u:'https://www.nseindia.com/option-chain?symbol='+enc,        c:'#ff9800'},
    {l:'ET Markets',  u:'https://economictimes.indiatimes.com/topic/'+enc,          c:'#f97316'},
    {l:'Chart',       u:'https://in.tradingview.com/symbols/NSE-'+enc+'/',          c:'#64b5f6'},
  ];
  var otherPills = links.map(function(lk){
    var u=lk.u.replace(/'/g,'%27');
    return '<a href="javascript:void(0)" onclick="_openLink(\''+u+'\')" '+
      'style="flex:0 0 auto;padding:5px 11px;border-radius:20px;border:1px solid '+lk.c+'55;'+
      'background:'+lk.c+'15;color:'+lk.c+';font-size:11px;font-weight:700;'+
      'text-decoration:none;white-space:nowrap;cursor:pointer">'+lk.l+'</a>';
  }).join('');

  var strip = '<div style="display:flex;gap:6px;overflow-x:auto;padding-bottom:10px;margin-bottom:12px;-webkit-overflow-scrolling:touch;scrollbar-width:none">'+
    googlePill+otherPills+'</div>';

  setTimeout(function(){ loadStockNews(sym, s.name); }, 50);
  return '<div style="padding:10px 12px">'+strip+
    '<div id="stock-news-list"><div class="u-pad14c">Loading…</div></div></div>';
}

function _renderBrief(b, staleStr){
  if(!b||!b.catalyst) return '';
  var sent=b.sentiment||'Neutral';
  var sc=sent==='Bullish'?'#00e896':sent==='Bearish'?'#ef5350':sent==='Mixed'?'#ffd54f':'#90a4ae';
  var si=sent==='Bullish'?'▲':sent==='Bearish'?'▼':sent==='Mixed'?'◆':'—';
  function row(label,val,lc){
    if(!val) return '';
    return '<div style="margin-bottom:9px">'+
      '<div style="font-size:9px;font-weight:700;color:'+(lc||'var(--tx3)')+';text-transform:uppercase;letter-spacing:0.4px;margin-bottom:3px">'+label+'</div>'+
      '<div style="font-size:12px;color:var(--tx1);line-height:1.5">'+val+'</div></div>';
  }
  return '<div style="margin-bottom:10px;border-radius:8px;background:var(--card);border:1px solid var(--b1);border-left:3px solid '+sc+'">'+
    '<div style="padding:9px 12px;border-bottom:1px solid var(--b1);display:flex;align-items:center;gap:8px">'+
      '<span style="font-size:10px;font-weight:800;color:'+sc+'">'+si+' '+sent.toUpperCase()+'</span>'+
      '<span style="font-size:9px;color:var(--tx3);margin-left:auto">'+(b.as_of||staleStr||'')+'</span>'+
    '</div>'+
    '<div style="padding:10px 12px">'+row('Key Catalyst',b.catalyst)+row('Street View',b.street_view)+row('Risk',b.risk,'#ef5350')+'</div></div>';
}

function _classify(t){
  var tl=(t||'').toLowerCase();
  if(/\bq[1-4]\b|result|earning|profit|loss|revenue|quarterly|pat |ebitda/.test(tl))              return {tag:'Results',    imp:'H',c:'#ef5350'};
  if(/dividend|bonus issue|stock split|buyback|agm|egm|record date|ex.date|merger|acqui|qip/.test(tl)) return {tag:'Corp Action',imp:'H',c:'#ef5350'};
  if(/bulk deal|block deal/.test(tl))                                                              return {tag:'Bulk/Block', imp:'H',c:'#ef5350'};
  if(/sebi|nclt|penalty|fine|show cause|fraud|scam|fir|raid|ban|contract win|order win|order receiv|l1 /.test(tl)) return {tag:'Regulatory',imp:'H',c:'#ef5350'};
  if(/promoter|insider|pledge|encumber|stake sale|stake hike/.test(tl))                           return {tag:'Insider',    imp:'H',c:'#ef5350'};
  if(/circuit|asm|gsm|open interest|rollover|expiry|pcr/.test(tl))                               return {tag:'F&O',        imp:'M',c:'#ffd54f'};
  if(/target price|price target|upgrade|downgrade|initiat|outperform|overweight|underweight/.test(tl)) return {tag:'Analyst',   imp:'M',c:'#ffd54f'};
  if(/capex|expansion|plant|capacity|launch|appoint|resign|guidance|forecast|deal|partner/.test(tl)) return {tag:'Strategy',  imp:'M',c:'#ffd54f'};
  return {tag:'General',imp:'L',c:'#546e7a'};
}
function _ago(d){
  if(!d||isNaN(d)) return '';
  var s=Math.floor((Date.now()-d)/1000);
  if(s<3600) return Math.floor(s/60)+'m ago';
  if(s<86400) return Math.floor(s/3600)+'h ago';
  var days=Math.floor(s/86400);
  return days<30?days+'d ago':Math.floor(days/30)+'mo ago';
}
function _trim(t){ return (t||'').replace(/\s+[-–|]\s+.{2,25}$/,'').trim(); }

async function loadStockNews(sym,name,retry){
  var el=document.getElementById('stock-news-list');
  if(!el) return;
  var words=(name||sym).replace(/[^a-zA-Z0-9 ]/g,' ').trim().split(/\s+/).slice(0,3).join(' ');
  var gnUrl='https://news.google.com/search?q='+encodeURIComponent(words+' NSE')+'&hl=en-IN&gl=IN&ceid=IN:en';
  var safeN=(name||'').replace(/'/g,"\\'");
  el.innerHTML='<div class="u-pad14c">Loading…</div>';
  try{
    if(retry) _newsDb=null;
    if(!_newsDb&&!_newsDbPromise){
      var base=(location.pathname.match(/^(\/[^/]+\/)/) || [,''])[1];
      _newsDbPromise=fetch(base+'data/news.json?_='+Date.now())
        .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
        .then(function(d){_newsDb=d;_newsDbPromise=null;return d;})
        .catch(function(e){_newsDbPromise=null;throw e;});
    }
    var db=await(_newsDb?Promise.resolve(_newsDb):_newsDbPromise);
    var staleMin=db.updated?Math.round((Date.now()-new Date(db.updated).getTime())/60000):null;
    var staleStr=!staleMin?'':staleMin<60?staleMin+'m ago':staleMin<1440?Math.round(staleMin/60)+'h ago':Math.floor(staleMin/1440)+'d ago';
    var entry=(db.news||{})[sym]||[];
    var items=Array.isArray(entry)?entry:(entry.items||[]);
    var brief=Array.isArray(entry)?null:(entry.brief||null);
    var cutoff=Date.now()-30*86400000;
    items=items.filter(function(it){return !_noiseRe.test(it.title||'')&&new Date(it.pubDate).getTime()>=cutoff;});
    items.sort(function(a,b){return new Date(b.pubDate)-new Date(a.pubDate);});
    var cards=items.map(function(item){
      var cl=_classify(item.title);
      var bdr=cl.imp==='L'?'#546e7a44':cl.c;
      var url=(item.link||gnUrl).replace(/'/g,'%27');
      return '<div onclick="_openLink(\''+url+'\')" style="padding:8px 12px;border-bottom:1px solid rgba(255,255,255,0.05);border-left:3px solid '+bdr+';cursor:pointer">'+
        '<div style="display:flex;align-items:center;gap:4px;margin-bottom:4px;flex-wrap:wrap">'+
          '<span style="font-size:10px;font-weight:700;color:var(--ac)">'+(item.source||'News')+'</span>'+
          (cl.imp!=='L'?'<span style="font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;background:'+cl.c+'20;color:'+cl.c+'">'+cl.imp+'</span>':'')+
          '<span style="font-size:9px;padding:1px 5px;border-radius:3px;background:var(--b1);color:var(--tx3)">'+cl.tag+'</span>'+
          '<span style="font-size:9px;color:var(--tx3);margin-left:auto">'+_ago(new Date(item.pubDate))+'</span>'+
        '</div>'+
        '<div style="font-size:12px;color:var(--tx1);line-height:1.45">'+_trim(item.title)+'</div></div>';
    }).join('');
    var bar='<div style="display:flex;justify-content:space-between;align-items:center;padding:0 0 8px">'+
      '<span style="font-size:9px;color:var(--tx3)">'+items.length+' stories · 1mo'+(staleStr?' · '+staleStr:'')+'</span>'+
      '<span onclick="_newsDb=null;loadStockNews(\''+sym+'\',\''+safeN+'\',true)" style="font-size:9px;color:var(--ac);cursor:pointer;text-decoration:underline">↺ Reload</span></div>';
    el.innerHTML=bar+_renderBrief(brief,staleStr)+
      (items.length?cards:'<div class="u-pad14c">No news in last month. <span onclick="_openLink(\''+gnUrl+'\')" style="color:var(--ac);cursor:pointer">Google News ↗</span></div>');
  }catch(e){
    el.innerHTML='<div style="padding:12px;font-size:11px;color:var(--tx2);line-height:1.8">'+
      '📂 <b>data/news.json</b> not found.<br>Run <b>GitHub Actions → Fetch Stock News</b>.<br><br>'+
      '<span onclick="_openLink(\''+gnUrl+'\')" style="color:var(--ac);cursor:pointer">🔍 Google News ↗</span></div>';
  }
}
