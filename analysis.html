<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
    <title>Onyx | Drill Analysis</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
    <style>
        :root{--bg:#060c18;--s1:#0a0e1a;--card:#0d1222;--b1:#1a2332;--tx1:#f0f6ff;--tx3:#7a8fa0;--ac:#00f2ff;--gr:#00e896;--rd:#ff6b85;--yw:#ffbf47}
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:var(--bg);color:var(--tx1);font-family:'JetBrains Mono',monospace;height:100vh;overflow:hidden;padding-top:max(0px, env(safe-area-inset-top))}
        
        .container{display:flex;flex-direction:column;height:100vh;overflow:hidden}
        
        .header{background:var(--s1);padding:8px 12px;border-bottom:1px solid var(--b1);display:flex;justify-content:space-between;align-items:center;gap:12px;flex-shrink:0}
        .header-left{flex:1;display:flex;align-items:center;gap:8px}
        .header-title{font-size:14px;font-weight:800;color:var(--ac)}
        .header-subtitle{font-size:9px;color:var(--tx3);margin-top:2px}
        .header-price{text-align:right;display:flex;flex-direction:column}
        .price-val{font-size:14px;font-weight:800}
        .price-chg{font-size:10px;margin-top:2px}
        
        .tabs{background:var(--card);padding:8px 12px;border-bottom:1px solid var(--b1);display:flex;gap:8px;overflow-x:auto;flex-shrink:0}
        .tabs::-webkit-scrollbar{height:4px}
        .tabs::-webkit-scrollbar-track{background:var(--s1)}
        .tabs::-webkit-scrollbar-thumb{background:var(--b1);border-radius:2px}
        .tab{padding:8px 14px;background:transparent;border:1px solid var(--b1);border-radius:4px;color:var(--tx3);cursor:pointer;font-size:10px;font-weight:700;white-space:nowrap;transition:all .2s}
        .tab.active{background:rgba(0,242,255,.1);border-color:var(--ac);color:var(--ac)}
        .tab:hover:not(.active){color:var(--tx1)}
        
        .content{flex:1;overflow-y:scroll !important;overflow-x:hidden;padding:12px;padding-bottom:100px;scrollbar-width:thin;scrollbar-color:rgba(0,242,255,.6) var(--s1);min-height:0;height:100%;-webkit-overflow-scrolling:touch}
        .content::-webkit-scrollbar{width:14px;background:transparent}
        .content::-webkit-scrollbar-track{background:transparent}
        .content::-webkit-scrollbar-thumb{background:rgba(0,242,255,.6);border-radius:8px;transition:all .2s;min-height:40px;border:3px solid transparent;background-clip:padding-box}
        .content::-webkit-scrollbar-thumb:hover{background:var(--ac);border-color:var(--ac);background-clip:padding-box}
        
        .footer{position:fixed;bottom:0;width:100%;background:rgba(0,0,0,.95);border-top:1px solid var(--b1);display:flex;justify-content:space-around;padding:12px 0;z-index:100;flex-shrink:0}
        .footer-btn{text-decoration:none;color:#666;display:flex;flex-direction:column;align-items:center;width:33%;font-size:8px;text-transform:uppercase;font-weight:800;transition:color .2s}
        .footer-btn.active{color:var(--ac)}
        
        .back-btn{background:none;border:none;color:var(--tx1);font-size:18px;cursor:pointer;padding:2px 4px;line-height:1}
        
        .placeholder{text-align:center;padding:40px 20px;color:var(--tx3)}
        .placeholder-emoji{font-size:32px;margin-bottom:12px}
        .tbd{color:#ff9800;opacity:.7;font-weight:700}
        
        /* TBD Link - Clickable */
        .tbd-link{color:#ff9800;opacity:0.9;font-weight:700;cursor:pointer;border-bottom:1px dashed #ff9800;text-decoration:none;transition:all .2s}
        .tbd-link:hover{opacity:1;color:#ffb347;border-bottom:1px solid #ffb347}
        
        /* Metric Value Colors */
        .val-positive{color:var(--gr);font-weight:700}
        .val-negative{color:var(--rd);font-weight:700}
        .val-neutral{color:var(--ac);font-weight:700}
        .val-warning{color:var(--yw);font-weight:700}
        
        /* Metric Row */
        .metric-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid rgba(26,35,50,.2);color:var(--tx3);font-size:11px;line-height:1.3}
        .metric-row:last-child{border-bottom:none}
        .metric-label{flex:1;font-size:10px}
        .metric-value{text-align:right;font-weight:700;min-width:70px;font-size:11px}
        
        /* Section Container for Two Columns */
        .section-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
        .section-row > div{background:var(--card);border:1px solid var(--b1);border-radius:6px;padding:10px}
        
        /* Weightage Summary */
        .weightage-container{background:var(--card);border:1px solid var(--b1);border-radius:6px;padding:0 6px 6px 6px;margin-bottom:6px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px}
        .weightage-box{text-align:center;padding:4px;background:rgba(0,0,0,.3);border-radius:4px}
        .weightage-label{font-size:7px;color:var(--tx3);text-transform:uppercase;margin-bottom:2px}
        .weightage-value{font-size:18px;font-weight:800}
        .pos-box .weightage-value{color:var(--gr)}
        .neg-box .weightage-value{color:var(--rd)}
        .signal-box .weightage-value{color:var(--ac);font-size:14px}
        .signal-label{font-size:8px;color:var(--tx3);margin-top:4px;text-transform:uppercase;font-weight:700}
        
        /* DEBUG PANEL */
        #debug-panel{position:fixed;bottom:50px;right:8px;width:280px;max-height:300px;background:rgba(10,14,26,.95);border:1px solid rgba(0,242,255,.6);border-radius:4px;z-index:9999;font-size:9px;color:var(--tx1);font-family:'JetBrains Mono',monospace;box-shadow:0 0 20px rgba(0,242,255,.2)}
        #debug-panel-header{background:rgba(0,242,255,.15);padding:6px 8px;border-bottom:1px solid rgba(0,242,255,.3);display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none}
        #debug-panel-header:hover{background:rgba(0,242,255,.25)}
        #debug-panel-title{font-weight:700;color:var(--ac)}
        #debug-panel-close{color:var(--ac);cursor:pointer;font-size:12px;line-height:1}
        #debug-logs{max-height:260px;overflow-y:auto;padding:6px;background:rgba(0,0,0,.3)}
        #debug-logs .log-line{padding:3px 4px;margin:2px 0;background:rgba(255,255,255,.05);border-left:2px solid rgba(0,232,150,.5);white-space:pre-wrap;word-break:break-all;line-height:1.3}
        #debug-logs .log-line.error{border-left-color:rgba(255,59,92,.8);color:rgba(255,107,133,.9)}
        #debug-logs .log-line.warn{border-left-color:rgba(255,191,71,.8);color:rgba(255,191,71,.9)}
        #debug-logs .log-line.info{border-left-color:rgba(0,242,255,.6)}
        #debug-logs::-webkit-scrollbar{width:6px}
        #debug-logs::-webkit-scrollbar-track{background:rgba(0,0,0,.2)}
        #debug-logs::-webkit-scrollbar-thumb{background:rgba(0,242,255,.4);border-radius:3px}
    </style>
</head>
<body>

<div class="container">
    <!-- DEBUG PANEL -->
    <div id="debug-panel">
        <div id="debug-panel-header">
            <div id="debug-panel-title">🐛 Debug Logs</div>
            <div id="debug-panel-close">✕</div>
        </div>
        <div id="debug-logs"></div>
    </div>
    
    <div class="header">
        <div class="header-left">
            <button class="back-btn" onclick="history.back()">←</button>
            <div>
                <div class="header-title" id="ticker">—</div>
                <div class="header-subtitle" id="company">—</div>
            </div>
        </div>
        <div class="header-price">
            <div class="price-val" id="ltp">₹—</div>
            <div class="price-chg" id="chg" style="color:var(--gr)">—</div>
        </div>
    </div>
    
    <div class="tabs">
        <button class="tab active" onclick="switchTab('overview')">📊 Overview</button>
        <button class="tab" onclick="switchTab('canvas')">🎨 Canvas</button>
        <button class="tab" onclick="switchTab('technical')">📉 Technical</button>
        <button class="tab" onclick="switchTab('technicalPro')">📈 Technical Pro</button>
        <button class="tab" onclick="switchTab('fundamentals')">📋 Fundamentals</button>
        <button class="tab" onclick="switchTab('guidance')">💡 Guidance</button>
    </div>
    
    <div class="content" id="content"></div>
</div>

<div class="footer">
    <a href="index.html" class="footer-btn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg><span>Portfolio</span></a>
    <a href="data.html" class="footer-btn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.76 9.76 0 0 1-6.74-2.74L3 16"/><path d="M3 21v-5h5"/></svg><span>Data</span></a>
    <a href="analysis.html" class="footer-btn active"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg><span>Analysis</span></a>
</div>

<script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/5.4.3/echarts.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/apexcharts/3.45.0/apexcharts.min.js"></script>

<script>
// ═══════════════════════════════════════════════════════════════════════
// 🐛 DEBUG PANEL - Capture console logs on iPhone
// ═══════════════════════════════════════════════════════════════════════
const DEBUG_ENABLED = true;
let debugLogs = [];
const MAX_LOGS = 50;

function addDebugLog(msg, type = 'info') {
  if (!DEBUG_ENABLED) return;
  debugLogs.push({ msg, type, time: new Date().toLocaleTimeString() });
  if (debugLogs.length > MAX_LOGS) debugLogs.shift();
  
  const logsContainer = document.getElementById('debug-logs');
  if (logsContainer) {
    const logEl = document.createElement('div');
    logEl.className = `log-line ${type}`;
    logEl.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
    logsContainer.appendChild(logEl);
    logsContainer.scrollTop = logsContainer.scrollHeight;
  }
}

// Intercept console methods
const originalLog = console.log;
const originalWarn = console.warn;
const originalError = console.error;

console.log = function(...args) {
  originalLog(...args);
  addDebugLog(args.join(' '), 'info');
};

console.warn = function(...args) {
  originalWarn(...args);
  addDebugLog(args.join(' '), 'warn');
};

console.error = function(...args) {
  originalError(...args);
  addDebugLog(args.join(' '), 'error');
};

// Debug panel close button
window.addEventListener('DOMContentLoaded', () => {
  const closeBtn = document.getElementById('debug-panel-close');
  const panel = document.getElementById('debug-panel');
  if (closeBtn && panel) {
    closeBtn.addEventListener('click', () => {
      panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
    });
  }
});

const DB = "OnyxPortfolioDB";
const STORE = "Stocks";
let currentStock = null;
let currentTab = "overview";
let dataSource = null; // Track where data comes from: 'db' or 'json'

// ✅ Canvas Chart State (REQUIRED for chart functions)
const S = {
  chartRange: '1Y',
  chartInterval: 'D',
  maVis: { sma20: true, sma50: true, ema200: true, vol: true },
  kpiVis: { pe: false, rev: false, net: false, cfo: false, opm: false, debt: false },
  chartPan: 0,      // Pan offset in pixels
  chartZoom: 1,     // Zoom level (1 = 100%)
  panStart: null    // Pan start position
};
let chartCache = {};


// Helpers
const num = (v) => typeof v === 'number' ? v : parseFloat(v) || 0;
const fmt = (v, decimals = 2) => num(v) === 0 && !v ? '—' : num(v).toFixed(decimals);
const get = (obj, ...keys) => {
    for (let k of keys) {
        if (obj[k] !== undefined) return obj[k];
    }
    return '—';
};

// Generate TBD link with search capability
const tbdLink = (label) => {
    const searchQuery = `${currentStock?.ticker || 'stock'} ${label}`;
    const googleSearch = `https://www.google.com/search?q=${encodeURIComponent(searchQuery)}`;
    return `<a href="${googleSearch}" target="_blank" class="tbd-link" title="Search: ${label}">TBD</a>`;
};

// Get URL param
const urlParams = new URLSearchParams(window.location.search);
const ticker = urlParams.get('drill') || urlParams.get('t');

console.log('URL Search:', window.location.search);
console.log('Ticker from URL:', ticker);

// Load data
async function loadStock() {
    if (!ticker) {
        // Try to get list of stocks for user guidance
        let stockList = 'ABCAPITAL, ABFRL, ADANIPORTS, ... (load data.html first)';
        try {
            const db = await new Promise(r => {
                const req = indexedDB.open(DB);
                req.onsuccess = () => r(req.result);
                req.onerror = () => r(null);
            });
            if (db && db.objectStoreNames.contains(STORE)) {
                const tx = db.transaction(STORE, 'readonly');
                const store = tx.objectStore(STORE);
                const keys = await new Promise(r => {
                    const req = store.getAllKeys();
                    req.onsuccess = () => r(req.result);
                    req.onerror = () => r([]);
                });
                if (keys.length > 0) {
                    stockList = keys.slice(0, 10).join(', ') + (keys.length > 10 ? '...' : '');
                }
            }
        } catch (e) {}
        
        document.getElementById('content').innerHTML = `
            <div class="placeholder">
                <div class="placeholder-emoji">❌</div>
                <div>No stock selected</div>
                <div style="font-size:9px;color:#ff9800;margin-top:8px">
                    Use: analysis.html?drill=TICKER<br/>
                    Example: analysis.html?drill=ABCAPITAL<br/>
                    Available: ${stockList}
                </div>
            </div>
        `;
        console.error('No ticker in URL. Usage: analysis.html?drill=TICKER');
        return;
    }
    
    console.log('Loading ticker:', ticker);
    
    const db = await new Promise(r => {
        const req = indexedDB.open(DB);
        req.onsuccess = () => {
            console.log('DB opened');
            r(req.result);
        };
        req.onerror = () => {
            console.error('DB error:', req.error);
            r(null);
        };
    });
    
    if (!db) {
        document.getElementById('content').innerHTML = '<div class="placeholder"><div class="placeholder-emoji">⚠️</div>Database error</div>';
        return;
    }
    
    try {
        const tx = db.transaction(STORE, 'readonly');
        const store = tx.objectStore(STORE);
        
        currentStock = await new Promise(r => {
            const req = store.get(ticker);
            req.onsuccess = () => {
                console.log('Stock loaded:', req.result);
                r(req.result);
            };
            req.onerror = () => {
                console.error('Store error:', req.error);
                r(null);
            };
        });
        
        if (!currentStock) {
            console.error('Stock not found:', ticker);
            document.getElementById('content').innerHTML = '<div class="placeholder"><div class="placeholder-emoji">🔍</div>Stock not found: ' + ticker + '</div>';
            return;
        }
        
        // Determine data source
        dataSource = currentStock._source || 'db'; // Check if _source field exists, default to 'db'
        console.log('Data Source:', dataSource);
        console.log('Full stock object:', currentStock);
        
        // 🚀 Auto-load candles for Canvas chart
        if (!currentStock.candles || currentStock.candles.length === 0) {
            try {
                const sym = currentStock.ticker || currentStock.sym || ticker;
                const res = await fetch(`./charts/${sym}.json`);
                if (res.ok) {
                    const data = await res.json();
                    currentStock.candles = data.bars || [];
                    console.log('Candles loaded:', currentStock.candles.length, 'bars');
                }
            } catch (e) {
                console.log('No candle data available (optional):', e.message);
            }
        }
        
        console.log('Rendering header and overview...');
        renderHeader();
        
        // Load guidance data from localStorage or external source
        loadGuidanceData(ticker);
        
        renderTab('overview');
    } catch(e) {
        console.error('Error:', e);
        document.getElementById('content').innerHTML = '<div class="placeholder"><div class="placeholder-emoji">❌</div>Error: ' + e.message + '</div>';
    }
}

// Render header
function renderHeader() {
    const s = currentStock;
    document.getElementById('ticker').textContent = get(s, 'ticker', 'sym', 'symbol');
    document.getElementById('company').textContent = get(s, 'name', 'company');
    document.getElementById('ltp').textContent = '₹' + fmt(get(s, 'ltp', 'price'));
    
    const chg = num(get(s, 'changePct', 'change', 'chg1d'));
    const chgEl = document.getElementById('chg');
    chgEl.innerHTML = `${chg >= 0 ? '▲' : '▼'} ${Math.abs(chg).toFixed(2)}%`;
    chgEl.style.color = chg >= 0 ? 'var(--gr)' : 'var(--rd)';
}

// Load guidance data
async function loadGuidanceData(ticker) {
    try {
        // Try to fetch from guidance.json (same domain)
        const response = await fetch('guidance.json');
        if (response.ok) {
            const data = await response.json();
            if (data[ticker]) {
                localStorage.setItem(`guidance_${ticker}`, JSON.stringify(data[ticker]));
                console.log('Guidance data cached for', ticker);
            }
        }
    } catch (e) {
        console.log('Guidance data not available or offline:', e.message);
    }
}

// Switch tabs
function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    event.target.classList.add('active');
    renderTab(tab);
}

// Render tabs
function renderTab(tab) {
    const s = currentStock;
    let html = '';
    
    if (tab === 'overview') {
        const pe = num(get(s, 'pe'));
        const pb = num(get(s, 'pb'));
        const roe = num(get(s, 'roe'));
        const roce = num(get(s, 'roce'));
        const opm = num(get(s, 'opm_pct'));
        const npm = num(get(s, 'npm_pct'));
        const ltp = num(get(s, 'ltp', 'price'));
        const mcap = num(get(s, 'mcap'));
        const sales = num(get(s, 'sales'));
        const ebitda = num(get(s, 'ebitda'));
        const cfo = num(get(s, 'cfo'));
        const fcf = num(get(s, 'fcf'));
        const eps = num(get(s, 'eps'));
        const prom = num(get(s, 'prom', 'prom_pct'));
        const fii = num(get(s, 'fii', 'fii_pct'));
        const dii = num(get(s, 'dii', 'dii_pct'));
        const quarterly = get(s, 'quarterly') || [];
        
        // EXTRACT: Positive & Negative signals, Signal
        const posSignals = num(get(s, 'pos', 'positive', 0));
        const negSignals = num(get(s, 'neg', 'negative', 0));
        const signal = get(s, 'signal', 'Signal', 'BUY');
        const totalSignals = posSignals + negSignals;
        const posWeightage = totalSignals > 0 ? Math.round((posSignals / totalSignals) * 100) : 0;
        const negWeightage = totalSignals > 0 ? Math.round((negSignals / totalSignals) * 100) : 0;
        
        // EXTRACT: Total Debt from quarterly ONLY (never use pre-calculated field)
        let totalDebt = 0;
        if (quarterly && quarterly.length > 0) {
            for (let i = quarterly.length - 1; i >= 0; i--) {
                if (quarterly[i].debt && num(quarterly[i].debt) > 0) {
                    totalDebt = num(quarterly[i].debt);
                    break;
                }
            }
        }
        
        // CALCULATE: Operating Margin Trend from quarterly
        let marginTrend = '—';
        if (quarterly && quarterly.length >= 2) {
            const recent = quarterly.slice(-3).map(q => num(q.opm || 0));
            if (recent.length > 0) {
                marginTrend = recent.map(m => fmt(m)).join('% → ') + '%';
            }
        }
        
        // CALCULATE: Revenue CAGR (3Y)
        let revenueCagr = 0;
        if (quarterly && quarterly.length >= 4) {
            const oldest = num(quarterly[0].rev || 0);
            const newest = num(quarterly[quarterly.length - 1].rev || 0);
            if (oldest > 0 && newest > 0) {
                const years = (quarterly.length - 1) / 4;
                revenueCagr = (Math.pow(newest / oldest, 1 / years) - 1) * 100;
            }
        }
        
        // CALCULATE: Earnings CAGR (3Y)
        let earningsCagr = 0;
        if (quarterly && quarterly.length >= 4) {
            const oldestEps = num(quarterly[0].eps || 0);
            const newestEps = num(quarterly[quarterly.length - 1].eps || 0);
            if (oldestEps > 0 && newestEps > 0) {
                const years = (quarterly.length - 1) / 4;
                earningsCagr = (Math.pow(newestEps / oldestEps, 1 / years) - 1) * 100;
            }
        }
        
        // CALCULATE: Cash Conversion
        let cashConversion = 0;
        if (quarterly && quarterly.length > 0) {
            const latestNet = num(quarterly[quarterly.length - 1].net || 0);
            if (latestNet > 0 && cfo > 0) {
                cashConversion = (cfo / latestNet) * 100;
            }
        }
        
        // CALCULATE: Interest Coverage = EBIT / Interest Expense
        let interestCoverage = 0;
        if (quarterly && quarterly.length > 0) {
            const latestEbit = num(quarterly[quarterly.length - 1].ebit || 0);
            const interestExp = num(get(s, 'interest_exp'));
            if (latestEbit > 0 && interestExp > 0) {
                interestCoverage = latestEbit / interestExp;
            }
        }
        
        // CALCULATE: Debt/EBITDA = totalDebt / ebitda
        let debtToEbitda = 0;
        if (totalDebt > 0 && ebitda > 0) {
            debtToEbitda = totalDebt / ebitda;
        }
        
        // CALCULATE: FCF Yield = (fcf / mcap) * 100
        const fcfYield = mcap > 0 && fcf > 0 ? ((fcf / mcap) * 100) : 0;
        
        // CALCULATE: EV/EBITDA = (mcap + totalDebt - cash) / ebitda
        let evEbitda = 0;
        if (mcap > 0 && ebitda > 0 && totalDebt > 0) {
            const cash = num(get(s, 'cash', 0)); // Default to 0 if not available
            const ev = mcap + totalDebt - (cash > 0 ? cash : 0);
            evEbitda = ev / ebitda;
        }
        
        html = `
            <div style="padding:8px 0;padding-bottom:80px">
            
            <!-- WEIGHTAGE & SIGNAL SUMMARY -->
            <div class="weightage-container">
                <div class="weightage-box pos-box">
                    <div class="weightage-label">Positive</div>
                    <div class="weightage-value">${posWeightage}%</div>

function filterBarsByDuration(bars, duration) {
    if (!bars || bars.length === 0) return [];
    
    if (duration === 'daily') {
        // Return all daily bars
        return bars;
    } else if (duration === 'weekly') {
        // Keep only one bar per week (first bar of each week)
        const filtered = [];
        let lastWeekStart = null;
        
        bars.forEach(bar => {
            const date = new Date(bar.d);
            const dayOfWeek = date.getDay();
            const weekStart = new Date(date);
            weekStart.setDate(date.getDate() - dayOfWeek); // Sunday as week start
            weekStart.setHours(0, 0, 0, 0);
            const weekKey = weekStart.toISOString().split('T')[0];
            
            if (lastWeekStart !== weekKey) {
                filtered.push(bar);
                lastWeekStart = weekKey;
            }
        });
        return filtered;
    } else if (duration === 'monthly') {
        // Keep only one bar per month (last bar of the month or month-end close)
        const filtered = [];
        let lastMonth = null;
        let monthBuffer = null;
        
        bars.forEach(bar => {
            const date = new Date(bar.d);
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const monthKey = year + '-' + month;
            
            if (lastMonth !== monthKey) {
                // New month found, push the previous month's bar (month-end close)
                if (monthBuffer) {
                    filtered.push(monthBuffer);
                }
                monthBuffer = bar;  // Buffer this bar as potential month-end
                lastMonth = monthKey;
            } else {
                // Same month, update buffer to keep the latest bar (closest to month-end)
                monthBuffer = bar;
            }
        });
        
        // Don't forget the last month's bar
        if (monthBuffer) {
            filtered.push(monthBuffer);
        }
        
        return filtered;
    }
    
    return bars;
}

    // Store the selected duration

    console.log(`📅 Duration changed to: ${duration}`);

}

            return;
        }
        
        const data = await res.json();
        let bars = data.bars || [];
        
        if (bars.length === 0) {
            priceContainer.innerHTML = '<div style="padding:20px;color:red;font-size:10px">No price data</div>';
            return;
        }

        // Filter bars by duration
        const duration = window.chartDuration || 'monthly';
        bars = filterBarsByDuration(bars, duration);
        
        if (bars.length === 0) {

        // FIX: Render unified chart with price + RSI + EMA + Metrics all in one
        renderPriceChart(priceContainer, sym, bars);
        
        // Update info
        const selected = Object.keys(metricsState).filter(k => metricsState[k]);
        if (selected.length === 0) {
            infoDiv.innerHTML = `<strong>📊 CHART:</strong> Candlesticks + RSI/EMA - Select metrics to display`;

    } catch (e) {
        console.error('Chart error:', e);
        priceContainer.innerHTML = `<div style="padding:20px;color:red;font-size:10px">${e.message}</div>`;
    }
}

function calculateRSI(closes, period = 14) {
    // Industry Standard: Wilder's RSI (TradingView compatible)
    // Source: https://en.wikipedia.org/wiki/Relative_strength_index
    
    if (closes.length < period + 1) return [];
    
    // Step 1: Calculate price changes
    const changes = [];
    for (let i = 1; i < closes.length; i++) {
        changes.push(closes[i] - closes[i - 1]);
    }
    
    // Step 2: Separate gains and losses
    const gains = changes.map(c => c > 0 ? c : 0);
    const losses = changes.map(c => c < 0 ? -c : 0);
    
    // Step 3: Calculate first average (simple average of first 'period' values)
    let avgGain = gains.slice(0, period).reduce((a, b) => a + b, 0) / period;
    let avgLoss = losses.slice(0, period).reduce((a, b) => a + b, 0) / period;
    
    // Step 4: Calculate RSI values using Wilder's smoothing
    const rsi = [];
    
    // First RSI at position 'period'
    const rs1 = avgLoss === 0 ? 100 : avgGain / avgLoss;
    rsi.push(100 - (100 / (1 + rs1)));
    
    // Subsequent RSI values with exponential smoothing
    for (let i = period; i < changes.length; i++) {
        avgGain = (avgGain * (period - 1) + gains[i]) / period;
        avgLoss = (avgLoss * (period - 1) + losses[i]) / period;
        
        const rs = avgLoss === 0 ? 100 : avgGain / avgLoss;
        rsi.push(100 - (100 / (1 + rs)));
    }
    
    return rsi;
}

function calculateEMA(closes, period) {
    // Exponential Moving Average
    if (closes.length < period) return [];
    
    const multiplier = 2 / (period + 1);
    const ema = [];
    
    // First EMA is simple average
    let sum = 0;
    for (let i = 0; i < period; i++) {
        sum += closes[i];
    }
    ema.push(sum / period);
    
    // Subsequent EMAs use exponential smoothing
    for (let i = period; i < closes.length; i++) {
        const prevEMA = ema[ema.length - 1];
        const newEMA = closes[i] * multiplier + prevEMA * (1 - multiplier);
        ema.push(newEMA);
    }
    
    // Shift array back to align with original closes
    // EMA[0] is at closes[period-1], so prepend nulls
    const aligned = Array(period - 1).fill(null).concat(ema);
    return aligned;
}

function renderPriceChart(container, sym, bars) {
    if (!container.clientWidth || container.clientWidth < 100) {
        setTimeout(() => renderPriceChart(container, sym, bars), 300);
        return;
    }

    try {
        // Dispose old chart if exists
        if (priceChart) {
            priceChart.dispose();
        }

        // Initialize ECharts
        priceChart = echarts.init(container, 'dark');
        priceSeries = {};

        // Prepare candlestick data: [open, close, low, high] - REALISTIC PRICES
        const ohlcData = bars.map(b => [
            parseFloat(b.o),
            parseFloat(b.c),
            parseFloat(b.l),
            parseFloat(b.h)
        ]);

        const dates = bars.map(b => b.d);
        const closes = bars.map(b => parseFloat(b.c));
        
        // FIX: Keep prices realistic (NOT normalized)
        // Only normalize for indicators (metrics & RSI calculations)

        // Calculate RSI and EMA for selected indicators
        const indicatorDataSets = {};
        const rsiColors = { rsi_7: '#ff6b9d', rsi_14: '#00d4ff', rsi_21: '#ffa500' };
        const emaColors = { ema_20: '#00ff00', ema_50: '#ffff00', ema_200: '#ff00ff' };
        const metricColors = { eps: '#f59e0b', net: '#26de81', rev: '#00d2d3', ebitda: '#9f7aea', opm: '#3b82f6', debt: '#ff6b6b' };
        
        // FIX: Combine RSI and metrics states for iteration
        const allStates = { ...rsiState, ...metricsState };
        
        Object.keys(allStates).forEach(key => {
            // Handle RSI
            if (key.startsWith('rsi_')) {
                const period = parseInt(key.replace('rsi_', ''));
                const rsiArray = calculateRSI(closes, period);  // FIX: Use original closes
                
                if (rsiArray.length > 0) {
                    const rsiDates = dates.slice(period);
                    const rsiData = rsiDates.map((date, idx) => [date, rsiArray[idx]]);
                    
                    indicatorDataSets[key] = {
                        name: `RSI(${period})`,
                        type: 'line',
                        xAxisIndex: 0,
                        yAxisIndex: 1,  // FIX: Right axis for normalized indicators
                        data: rsiData,
                        lineStyle: { color: rsiColors[key] || '#00f2ff', width: 2 },
                        smooth: true,
                        symbol: 'none'
                    };
                }
            }
            
            // Handle EMA
            if (key.startsWith('ema_')) {
                const period = parseInt(key.replace('ema_', ''));
                const emaArray = calculateEMA(closes, period);  // FIX: Use original closes
                
                if (emaArray.length > 0) {
                    const emaData = dates.map((date, idx) => 
                        emaArray[idx] !== null ? [date, emaArray[idx]] : null
                    ).filter(d => d !== null);
                    
                    indicatorDataSets[key] = {
                        name: `EMA(${period})`,
                        type: 'line',
                        xAxisIndex: 0,
                        yAxisIndex: 0,  // FIX: Left axis - with price (realistic)
                        data: emaData,
                        lineStyle: { color: emaColors[key] || '#ffffff', width: 1.5, type: 'dashed' },
                        smooth: true,
                        symbol: 'none'
                    };
                }
            }
            
            // FIX: Handle Metrics (NEW) - All on same chart
            if (key.startsWith('metric_')) {
                try {
                    const metricKey = key.replace('metric_', '');
                    const s = currentStock;
                    
                    // Debug: Check if quarterly data exists
                    if (!s) {
                        console.warn('currentStock is null/undefined');
                        return;
                    }
                    if (!s.quarterly) {
                        console.warn(`No quarterly data for ${s.ticker}`, s);
                        return;
                    }
                    if (!Array.isArray(s.quarterly) || s.quarterly.length === 0) {
                        console.warn(`Quarterly data is empty or not array for ${s.ticker}`);
                        return;
                    }
                    
                    const sorted = [...s.quarterly].sort((a, b) => new Date(a.d) - new Date(b.d));
                    console.log(`Rendering metric ${metricKey} with ${sorted.length} quarters`);
                    
                    // Map metric keys to data keys
                    const keyMap = {
                        'eps': 'e',
                        'net': 'n',
                        'rev': 'r',
                        'ebitda': 'eb',
                        'opm': 'op',
                        'debt': 'd'
                    };
                    
                    const dataKey = keyMap[metricKey] || metricKey;
                    
                    // Get metric values
                    const metricData = sorted.map(q => {
                        const val = q[dataKey];
                        return val !== undefined && val !== null ? [q.d, parseFloat(val)] : null;
                    }).filter(d => d !== null);
                    
                    console.log(`Metric ${metricKey}: ${metricData.length} data points`);
                    
                    if (metricData.length > 0) {
                        // Normalize to first value = 100
                        const firstVal = metricData[0][1];
                        if (firstVal !== 0) {
                            const normalized = metricData.map(d => [d[0], (d[1] / firstVal) * 100]);
                            
                            // Color with correct metric key (without 'metric_' prefix)
                            const metricColor = {
                                'eps': '#f59e0b',
                                'net': '#26de81', 
                                'rev': '#00d2d3',
                                'ebitda': '#9f7aea',
                                'opm': '#3b82f6',
                                'debt': '#ff6b6b'
                            }[metricKey] || '#ffffff';
                            
                            indicatorDataSets[key] = {
                                name: metricKey.toUpperCase(),
                                type: 'line',
                                xAxisIndex: 0,
                                yAxisIndex: 1,  // Right axis (normalized scale)
                                data: normalized,
                                lineStyle: { color: metricColor, width: 2 },
                                smooth: true,
                                symbol: 'none'
                            };
                            console.log(`✓ Added metric series: ${metricKey}`);
                        } else {
                            console.warn(`First metric value is 0 for ${metricKey}`);
                        }

                        console.warn(`No valid data points for metric ${metricKey}`);
                    }

                    console.error(`Metric ${key} render failed:`, e);
                }

        });

        // Build series

            {

                type: 'candlestick',
                xAxisIndex: 0,
                yAxisIndex: 0,  // Left axis - realistic prices
                data: ohlcData,  // FIX: Real prices, NOT normalized
                itemStyle: {

                    borderColor0: '#ff6b85',

                    xAxisIndex: [0],

        priceChart.setOption(option);

        return;
    }

        layout: {textColor: '#7a8fa0', background: {color: '#0a0e1a'}},
        timeScale: {timeVisible: false, secondsVisible: false, fixLeftEdge: true},
        leftPriceScale: {
            visible: false  // Hide metrics scale
        },
        rightPriceScale: {
            visible: true,  // Show volume scale
            textColor: '#7a8fa0',
            borderColor: '#1a2332',
            autoScale: true,
            formatPrice: (p) => {
                if (typeof p === 'number') {
                    if (p >= 10000000) return Math.round(p / 10000000) + 'Cr';
                    if (p >= 100000) return Math.round(p / 100000) + 'L';
                    if (p >= 1000) return Math.round(p / 1000) + 'K';
                    return Math.round(p).toString();
                }
                return p;
            }
        },
        grid: {horzLines: {color: 'rgba(255,255,255,.05)'}, vertLines: {color: 'rgba(255,255,255,.05)'}}
    };

            open: parseFloat(b.o),

            low: parseFloat(b.l),
            close: parseFloat(b.c)

            const volumeSeries = metricsChart.addHistogramSeries({
                color: 'rgba(0, 242, 255, 0.3)',
                priceScaleId: 'right',
                title: 'Volume'
            });

                time: c.time,
                value: parseFloat(bars[idx].v) || 0
            }));

            metricSeries['Volume'] = volumeSeries;

            metricsChart.priceScale('right').applyOptions({
                autoScale: true,
                formatPrice: (p) => {
                    if (typeof p === 'number') {
                        if (p >= 10000000) return Math.round(p / 10000000) + 'Cr';
                        if (p >= 100000) return Math.round(p / 100000) + 'L';
                        if (p >= 1000) return Math.round(p / 1000) + 'K';
                        return Math.round(p).toString();
                    }
                    return p;
                }
            });
        }

        const selectedMetrics = Object.keys(metricsState).filter(k => metricsState[k]);
        
        selectedMetrics.forEach(metricKey => {
            addMetricSeries(metricKey, cd, metricsChart);
        });

function addMetricSeries(metricKey, cd, chart) {
    const s = currentStock;
    if (!s || !s.quarterly || s.quarterly.length === 0) return;

    // Get all quarterly data points
    const sorted = [...s.quarterly].sort((a, b) => new Date(a.d) - new Date(b.d));
    
    // Get all price bar timestamps for snapping
    const priceTimestamps = cd.map(c => c.time);
    
    // Filter metric data that exists
    const metricData = sorted
        .filter(q => q[metricKey] !== undefined && q[metricKey] !== null)
        .map(q => {
            const metricTime = Math.floor(new Date(q.d).getTime() / 1000);
            // Snap to nearest price bar timestamp for X-axis alignment
            const snappedTime = priceTimestamps.reduce((prev, curr) => 
                Math.abs(curr - metricTime) < Math.abs(prev - metricTime) ? curr : prev
            );
            return {
                date: q.d,
                value: parseFloat(q[metricKey]),
                time: snappedTime  // Use snapped timestamp
            };
        });

    if (metricData.length === 0) {
        console.warn(`No data for metric: ${metricKey}`);
        return;
    }

    // Color mapping
    const config = {
        eps: {color: '#f59e0b', label: 'EPS'},
        net: {color: '#26de81', label: 'Net Inc'},
        rev: {color: '#00d2d3', label: 'Revenue'},
        ebitda: {color: '#9f7aea', label: 'EBITDA'},
        opm: {color: '#3b82f6', label: 'OPM%'},
        debt: {color: '#ff6b6b', label: 'Debt'}
    };

    const cfg = config[metricKey] || {color: '#00f2ff', label: metricKey};

    // NORMALIZE: Convert to index (first value = 100)
    const baseValue = metricData[0].value;
    const normalizedData = metricData.map(m => ({
        time: m.time,  // Use snapped timestamp
        value: baseValue !== 0 ? (m.value / baseValue) * 100 : 100,
        actualValue: m.value  // Store original for tooltip
    }));

    const minValue = Math.min(...normalizedData.map(d => d.value));
    const maxValue = Math.max(...normalizedData.map(d => d.value));

    // Add as line series on LEFT price scale (labels hidden)
    // Use marker to show data points clearly
    const ls = chart.addLineSeries({
        color: cfg.color,
        lineWidth: 2,
        lineStyle: 0,  // Solid
        pointMarkersVisible: true,  // Show points at data locations
        pointMarkersRadius: 3,
        title: cfg.label,  // REMOVE "(Q1=100)" - just show metric name
        priceScaleId: 'left'  // Use LEFT scale for metrics (hidden)
    });
    
    // Store ACTUAL VALUES in data for tooltip display
    ls.setData(normalizedData.map(d => ({
        time: d.time, 
        value: d.value,
        actualValue: d.actualValue  // Real value for tooltip
    })));
    
    metricSeries[cfg.label] = ls;

    console.log(`✅ ${cfg.label}: ${metricData.length} quarters | Real values stored for hover`);
}

function aggregateToWeekly(dailyBars) {
    if (!dailyBars || dailyBars.length === 0) return [];
    
    const weekly = [];
    let week = [];
    let currentWeekStart = null;
    
    for (let i = 0; i < dailyBars.length; i++) {
        const bar = dailyBars[i];
        const date = new Date(bar.d);
        const dayOfWeek = date.getDay(); // 0=Sun, 5=Fri, 6=Sat
        
        if (week.length === 0) {
            currentWeekStart = new Date(date);
        }
        
        week.push(bar);
        
        // Friday close or last bar
        const isLastBar = (i === dailyBars.length - 1);
        const isFriday = (dayOfWeek === 5);
        
        if (isFriday || isLastBar) {
            if (week.length > 0) {
                const o = week[0].o;
                const h = Math.max(...week.map(b => b.h));
                const l = Math.min(...week.map(b => b.l));
                const c = week[week.length - 1].c;
                const v = week.reduce((sum, b) => sum + b.v, 0);
                const d_str = week[week.length - 1].d;
                weekly.push({ d: d_str, o, h, l, c, v });
                week = [];
            }
        }
    }
    
    return weekly;
}

function aggregateToMonthly(dailyBars) {
    if (!dailyBars || dailyBars.length === 0) return [];
    
    const monthly = [];
    let month = [];
    let currentMonth = null;
    
    for (let i = 0; i < dailyBars.length; i++) {
        const bar = dailyBars[i];
        const date = new Date(bar.d);
        const monthKey = date.getFullYear() + '-' + String(date.getMonth() + 1).padStart(2, '0');
        
        if (currentMonth === null) {
            currentMonth = monthKey;
        }
        
        if (monthKey !== currentMonth) {
            // Month changed - finalize previous month
            if (month.length > 0) {
                const o = month[0].o;
                const h = Math.max(...month.map(b => b.h));
                const l = Math.min(...month.map(b => b.l));
                const c = month[month.length - 1].c;
                const v = month.reduce((sum, b) => sum + b.v, 0);
                const d_str = month[month.length - 1].d;
                monthly.push({ d: d_str, o, h, l, c, v });
                month = [];
            }
            currentMonth = monthKey;
        }
        
        month.push(bar);
    }
    
    // Add last month
    if (month.length > 0) {
        const o = month[0].o;
        const h = Math.max(...month.map(b => b.h));
        const l = Math.min(...month.map(b => b.l));
        const c = month[month.length - 1].c;
        const v = month.reduce((sum, b) => sum + b.v, 0);
        const d_str = month[month.length - 1].d;
        monthly.push({ d: d_str, o, h, l, c, v });
    }
    
    return monthly;
}

function downsampleRSI(dailyRSI, dailyBars, aggregatedBars) {
    // Map daily RSI values to aggregated bars by matching end date
    const downsampled = [];
    
    aggregatedBars.forEach(aggBar => {
        const aggDate = new Date(aggBar.d);
        let closestRSI = null;
        let minDiff = Infinity;
        
        for (let i = 0; i < dailyBars.length; i++) {
            if (dailyRSI[i] === null) continue;
            
            const dailyDate = new Date(dailyBars[i].d);
            const diff = Math.abs(aggDate - dailyDate);
            
            if (diff < minDiff) {
                minDiff = diff;
                closestRSI = dailyRSI[i];
            }
        }
        
        downsampled.push(closestRSI);
    });
    
    return downsampled;
}

function calculateEMA(bars, period = 20) {
    const ema = [];
    let sum = 0;
    const multiplier = 2 / (period + 1);
    
    bars.forEach((bar, i) => {
        if (i < period - 1) {
            sum += bar.c;
            ema.push(null);
        } else if (i === period - 1) {
            sum += bar.c;
            const sma = sum / period;
            ema.push(sma);
        } else {
            const prevEMA = ema[i - 1];
            const newEMA = bar.c * multiplier + prevEMA * (1 - multiplier);
            ema.push(newEMA);
        }
    });
    
    // Debug logging
    const validEMAs = ema.filter(e => e !== null);
    if (validEMAs.length > 0) {
        console.log(`📊 EMA(${period}) Calculation:`);
        console.log(`   Multiplier: ${multiplier.toFixed(4)}`);
        console.log(`   First EMA (at bar ${period-1}): ${ema[period-1]?.toFixed(2)}`);
        console.log(`   Last 3 EMAs: ${ema.slice(-3).map(e => e?.toFixed(2)).join(', ')}`);
        console.log(`   Valid points: ${validEMAs.length}/${ema.length}`);
    }
    
    return ema;
}

function calculateRSI(bars, period = 14) {
    if (!bars || bars.length <= period) return bars.map(() => null);
    
    const rsi = [];
    const changes = [];
    
    // Calculate all price changes
    for (let i = 1; i < bars.length; i++) {
        changes.push(bars[i].c - bars[i - 1].c);
    }
    
    // Calculate initial average gain and loss
    let sumGains = 0, sumLosses = 0;
    for (let i = 0; i < period; i++) {
        if (changes[i] > 0) {
            sumGains += changes[i];
        } else {
            sumLosses += Math.abs(changes[i]);
        }
    }
    
    let avgGain = sumGains / period;
    let avgLoss = sumLosses / period;
    
    // Fill nulls before period
    for (let i = 0; i < period; i++) {
        rsi.push(null);
    }
    
    // Calculate RSI from period onwards
    for (let i = period; i < changes.length; i++) {
        const change = changes[i];
        const currentGain = change > 0 ? change : 0;
        const currentLoss = change > 0 ? 0 : Math.abs(change);
        
        // Smooth average (Wilder's method)
        avgGain = (avgGain * (period - 1) + currentGain) / period;
        avgLoss = (avgLoss * (period - 1) + currentLoss) / period;
        
        const rs = avgLoss === 0 ? 100 : avgGain / avgLoss;
        const rsiValue = 100 - (100 / (1 + rs));
        rsi.push(rsiValue);
    }
    
    return rsi;
}

function formatVolume(v) {
    if (v >= 10000000) return (v / 10000000).toFixed(1) + 'Cr';
    if (v >= 100000) return (v / 100000).toFixed(1) + 'L';
    return (v / 1000).toFixed(0) + 'K';
}

function aggregateCandles(daily, interval){
  if(interval === 'D' || !daily.length) return daily;
  const buckets = {};
  daily.forEach(c => {
    const d = new Date(c.d);
    let key;
    if(interval === 'W'){
      const day = d.getDay();
      const monday = new Date(d);
      monday.setDate(d.getDate() - (day === 0 ? 6 : day - 1));
      key = monday.toISOString().slice(0,10);
    } else {
      key = c.d.slice(0,7);
    }
    if(!buckets[key]){
      buckets[key] = { d: key, o: c.o, h: c.h, l: c.l, c: c.c, v: c.v };
    } else {
      const b = buckets[key];
      b.h = Math.max(b.h, c.h);
      b.l = Math.min(b.l, c.l);
      b.c = c.c;
      b.v += c.v;
    }
  });
  return Object.values(buckets).sort((a,b) => a.d.localeCompare(b.d));
}

}

let _chartResizeObs = null;
function attachChartResizeObserver(s){
  if(_chartResizeObs) _chartResizeObs.disconnect();
  const wrap = document.getElementById('chart-wrap');

}

function getSlicedCandles(s, canvasWidth){
  const daily = s.candles || [];
  if(!daily.length) return daily;
  const allAgg = aggregateCandles(daily, S.chartInterval);
  if(!allAgg.length) return [];
  const now = new Date();
  const rangeMs = {'1M':30,'3M':91,'6M':182,'1Y':365,'5Y':1825}[S.chartRange] || 91;
  const cutoff = new Date(now - rangeMs*864e5).toISOString().slice(0,10);
  let rangeCandles = allAgg.filter(c => c.d >= cutoff);
  if(!rangeCandles.length) rangeCandles = allAgg.slice(-60);
  if(canvasWidth && canvasWidth > 0){
    const PAD_L = 6, PAD_R = 52;
    const chartW = canvasWidth - PAD_L - PAD_R;
    const IDEAL_BAR_W = 7;
    // MIN_BAR_W scales with zoom: zoom=0.5 → 8px bars (fewer), zoom=3 → 1.3px bars (more)
    // ✅ FLIPPED: zoom=3.0 means "3x magnification" → SMALLER min bar width → FEWER bars visible
    const MIN_BAR_W  = 4 * S.chartZoom;
    console.log('[SCHED] zoom=' + S.chartZoom.toFixed(2) + ' → MIN_BAR_W=' + MIN_BAR_W.toFixed(2));
    const maxFit = Math.floor(chartW / MIN_BAR_W);
    if(rangeCandles.length > maxFit){
      // ✅ PAN-BASED HISTORY SCROLL: S.chartPan controls which candles to display
      // S.chartPan: -400 (oldest) → 0 (most recent) → +400 (newest, clamped to most recent)
      const maxBackOffset = Math.max(0, rangeCandles.length - maxFit);
      const backPan = Math.max(0, -S.chartPan); // Negative pan = go back in history (0-400)
      const backNorm = Math.min(1, backPan / 400); // Normalize to 0-1
      const backOffset = Math.floor(backNorm * maxBackOffset); // How many candles back to start
      const startIdx = Math.max(0, maxBackOffset - backOffset);
      console.log('[SCHED] getSlicedCandles: pan=' + S.chartPan + ', showing candles ' + startIdx + ' to ' + (startIdx + maxFit));
      return rangeCandles.slice(startIdx, startIdx + maxFit);
    }
  }
  return rangeCandles;
}


function drawCandlestick(s){

  const cv=document.getElementById('cv-candle');
  if(!cv)return;

  const dpr=window.devicePixelRatio||1;
  cv.width=W2*dpr; cv.height=H2*dpr;
  cv.style.width=W2+'px'; cv.style.height=H2+'px';
  const ctx=cv.getContext('2d');

  const candles=getSlicedCandles(s, W2);

    ctx.fillStyle='#060c18'; ctx.fillRect(0,0,W2,H2);

    if(s._noChartData){
      ctx.fillStyle='rgba(245,166,35,.7)'; ctx.font='bold 11px DM Sans';

      ctx.fillText('Loading chart data…', W2/2, H2/2);

    return;
  }

  const W=W2,H=312;  // ✅ Increased 30% from 240
  const PAD={l:6,r:52,t:8,b:22};
  const cW=W-PAD.l-PAD.r, cH=H-PAD.t-PAD.b;
  const n=candles.length;
  const gap=cW/n;
  // Thinner bars for dense data: reduce multiplier and max width
  const bw=Math.max(1,Math.min(n > 40 ? 3 : 6, gap*0.25));

  // Full history + visible date range — used by both MAs and KPI overlays
  const allCandles = s.candles || candles;
  const visFirst = candles.length ? new Date(candles[0].d).getTime() : 0;
  const visLast  = candles.length ? new Date(candles[candles.length-1].d).getTime() : 1;
  const visRange = visLast - visFirst || 1;

  const allPrices=candles.flatMap(c=>[c.h,c.l]);
  if(s.sma20&&S.maVis.sma20)allPrices.push(s.sma20);
  if(s.sma50&&S.maVis.sma50)allPrices.push(s.sma50);
  if(s.ema200&&S.maVis.ema200)allPrices.push(s.ema200);
  const mn=Math.min(...allPrices), mx=Math.max(...allPrices), rng=mx-mn||1;
  const toY=p=>PAD.t+((mx-p)/rng)*cH;
  const barX=i=>{ const x = PAD.l+i*gap+gap/2; if(i===0||i===n-1) console.log('[DRAW] barX('+ i +') = ' + x.toFixed(1) + ' (gap=' + gap.toFixed(1) + ')'); return x; };

  // Background
  ctx.fillStyle='#070c18';
  ctx.fillRect(0,0,W,H);

  // Grid lines
  for(let i=0;i<=4;i++){
    const y=PAD.t+(cH/4)*i;
    ctx.strokeStyle='rgba(255,255,255,.1)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(PAD.l,y);ctx.lineTo(PAD.l+cW,y);ctx.stroke();
  }

  // Right axis separator (draw BEFORE labels so labels appear on top)
  ctx.fillStyle='rgba(7,12,24,.8)';
  ctx.fillRect(W-PAD.r,0,PAD.r,H);
  ctx.strokeStyle='rgba(100,130,180,.6)';  // ✅ Brighter blue for visibility
  ctx.lineWidth=1.5;  // ✅ Slightly thicker
  ctx.beginPath();ctx.moveTo(W-PAD.r,0);ctx.lineTo(W-PAD.r,H);ctx.stroke();

  // Price labels (draw AFTER background so they're visible on top)
  for(let i=0;i<=4;i++){
    const y=PAD.t+(cH/4)*i;
    const price=mx-(mx-mn)*(i/4);
    ctx.fillStyle='rgba(255,255,255,1)';
    ctx.font='bold 11px JetBrains Mono,monospace';ctx.textAlign='right';ctx.textBaseline='middle';
    ctx.fillText('₹'+Math.round(price).toLocaleString('en-IN'),W-6,y);
  }

  // Candles
  console.log('[DRAW] Drawing ' + candles.length + ' candles, first 3:');
  candles.forEach((c,i)=>{
    const bull=c.c>=c.o;
    const cx=barX(i);
    if(i<3) console.log('[DRAW] Candle ' + i + ': cx=' + Math.round(cx) + ', h=' + c.h.toFixed(2) + ', l=' + c.l.toFixed(2));
    const bodyTop=toY(Math.max(c.o,c.c));
    const bodyH=Math.max(1,Math.abs(toY(c.o)-toY(c.c)));

    // Wick
    ctx.strokeStyle=bull?'rgba(0,232,150,.8)':'rgba(255,107,133,.8)';
    ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(cx,toY(c.h));ctx.lineTo(cx,toY(c.l));ctx.stroke();

    // Body
    ctx.fillStyle=bull?'#00d084':'#ff3b5c';
    if(ctx.roundRect)ctx.roundRect(cx-bw/2,bodyTop,bw,bodyH,1);
    else ctx.rect(cx-bw/2,bodyTop,bw,bodyH);
    ctx.fill();

    if(!bull){ctx.strokeStyle='rgba(255,59,92,.3)';ctx.lineWidth=.5;ctx.stroke();}
  });

  // ── Moving Average curves computed from candle close prices ──
  function calcSMA(arr, period){
    return arr.map((c,i)=>{
      if(i < period-1) return null;
      const sum = arr.slice(i-period+1, i+1).reduce((a,b)=>a+b.c, 0);
      return sum / period;
    });
  }
  function calcEMA(arr, period){
    const k = 2/(period+1);
    const result = new Array(arr.length).fill(null);
    // Find first valid index
    let first = period-1;
    if(first >= arr.length) return result;
    result[first] = arr.slice(0,period).reduce((a,b)=>a+b.c,0)/period;
    for(let i=first+1; i<arr.length; i++){
      result[i] = arr[i].c * k + result[i-1] * (1-k);
    }
    return result;
  }
  function drawMALine(vals, col, dash, label){
    ctx.strokeStyle=col; ctx.lineWidth=1.2; ctx.setLineDash(dash||[]);
    ctx.beginPath();
    let started=false;
    vals.forEach((v,i)=>{
      if(v===null) return;
      const x=barX(i), y=toY(v);
      if(!started){ ctx.moveTo(x,y); started=true; } else ctx.lineTo(x,y);
    });
    ctx.stroke(); ctx.setLineDash([]);
    // Label at last valid point
    const lastIdx = vals.reduce((best,v,i)=>v!==null?i:best, -1);
    if(lastIdx>=0 && label){
      const lv = vals[lastIdx];
      ctx.fillStyle=col; ctx.font='bold 7px JetBrains Mono,monospace'; ctx.textAlign='right';
      ctx.fillText(label+' ₹'+Math.round(lv).toLocaleString('en-IN'), W-2, toY(lv)-3);
    }
  }
  // MAs computed on allCandles (full history), then only visible portion drawn
  // This ensures EMA200 is correct even on short-range views
  if(S.maVis.sma20 || S.maVis.sma50 || S.maVis.ema200){
    const allC = s.candles || candles;
    const sma20vals  = S.maVis.sma20  ? calcSMA(allC, 20)  : null;
    const sma50vals  = S.maVis.sma50  ? calcSMA(allC, 50)  : null;
    const ema200vals = S.maVis.ema200 ? calcEMA(allC, 200) : null;

    // Map allCandles index → visible x position using date
    function maX(allIdx){
      const t = new Date(allC[allIdx].d).getTime();
      return PAD.l + ((t - visFirst) / visRange) * cW;
    }
    function drawMAFull(vals, col, dash, label){
      if(!vals) return;
      ctx.strokeStyle = col; ctx.lineWidth = 1.2; ctx.setLineDash(dash||[]);
      ctx.beginPath();
      let started = false;
      vals.forEach((v,i)=>{
        if(v === null) return;
        const x = maX(i);
        if(x < PAD.l - 2 || x > PAD.l + cW + 2){ started = false; return; } // off-screen
        const y = toY(v);
        if(!started){ ctx.moveTo(x,y); started=true; } else ctx.lineTo(x,y);
      });
      ctx.stroke(); ctx.setLineDash([]);
      // Label at rightmost visible point
      let lastV = null, lastX = 0;
      vals.forEach((v,i)=>{
        if(v===null) return;
        const x = maX(i);
        if(x >= PAD.l && x <= PAD.l+cW){ lastV=v; lastX=x; }
      });
      if(lastV !== null){
        ctx.fillStyle=col; ctx.font='bold 7px JetBrains Mono,monospace'; ctx.textAlign='right';
        ctx.fillText(label+' ₹'+Math.round(lastV).toLocaleString('en-IN'), W-2, toY(lastV)-3);
      }
    }
    drawMAFull(sma20vals,  '#f59e0b', [],    'SMA20');
    drawMAFull(sma50vals,  '#3b82f6', [],    'SMA50');
    drawMAFull(ema200vals, '#a855f7', [4,3], 'EMA200');
  }

  // Current price dashed line
  if(s.ltp){
    const lastY=toY(s.ltp);
    const bull=s.candles?.length&&s.ltp>=(s.candles[0]?.c||s.ltp);
    ctx.strokeStyle=bull?'rgba(0,208,132,.5)':'rgba(255,59,92,.5)';
    ctx.lineWidth=.6;ctx.setLineDash([3,3]);
    ctx.beginPath();ctx.moveTo(PAD.l,lastY);ctx.lineTo(PAD.l+cW,lastY);ctx.stroke();
    ctx.setLineDash([]);
    // Price badge on right axis
    ctx.fillStyle=bull?'#00d084':'#ff3b5c';
    ctx.font='bold 9px JetBrains Mono,monospace';ctx.textAlign='right';
    ctx.fillText('₹'+Math.round(s.ltp).toLocaleString('en-IN'),W-2,Math.max(lastY+4,PAD.t+10));
  }

  // X-axis date labels — use actual candle.d dates, show ~5 evenly spaced
  const maxLabels = Math.min(6, Math.floor(cW / 40));
  const lblStep = Math.max(1, Math.floor(n / maxLabels));
  ctx.fillStyle='rgba(140,176,208,.55)'; ctx.font='7px JetBrains Mono,monospace';
  candles.forEach((c,i)=>{
    if(i % lblStep !== 0 && i !== n-1) return;
    const d = new Date(c.d);
    let lbl;
    if(S.chartInterval==='M')      lbl = (d.getMonth()+1)+'/'+String(d.getFullYear()).slice(2);
    else if(S.chartRange==='5Y'||S.chartRange==='1Y') lbl = (d.getMonth()+1)+'/'+String(d.getFullYear()).slice(2);
    else                            lbl = d.getDate()+'/'+(d.getMonth()+1);
    const x = barX(i);
    if(x > PAD.l+cW-8) return;
    ctx.textAlign = i===0 ? 'left' : (i===n-1 ? 'right' : 'center');
    ctx.fillText(lbl, x, H-4);
  });

  // ── KPI overlays on price chart ──────────────────────────────────
  const quarterly = s.quarterly || [];

  const KPI_DEFS = [
    {k:'pe',   label:'P/E',     col:'#f59e0b'},
    {k:'rev',  label:'Rev',     col:'#22d3ee'},
    {k:'net',  label:'Net',     col:'#4ade80'},
    {k:'cfo',  label:'CFO',     col:'#34d399'},
    {k:'opm',  label:'OPM%',    col:'#fb923c'},
    {k:'debt', label:'Debt',    col:'#f87171'},
  ];

  // Use FULL candle history for price lookups — not just visible slice
  // (allCandles, visFirst, visRange already defined above)

  function xForDate(dateStr){
    const t = new Date(dateStr).getTime();
    return PAD.l + ((t - visFirst) / visRange) * cW;
  }

  // Search FULL history for price on/before a date
  function priceAt(dateStr){
    for(let i=allCandles.length-1; i>=0; i--){
      if(allCandles[i].d <= dateStr) return allCandles[i].c;
    }
    return allCandles.length ? allCandles[0].c : (s.ltp || 0);
  }

  // Log raw quarterly data once
  if(quarterly.length){
        }

  KPI_DEFS.forEach(({k, label, col})=>{
    if(!S.kpiVis[k]) return;

    let pts = [];
    if(k === 'pe'){
      quarterly.forEach(q=>{
        if(!q.eps || q.eps <= 0) return;
        const annEPS = q.eps * 4;
        const price = priceAt(q.d);
        if(price > 0) pts.push({x: xForDate(q.d), v: price/annEPS, d: q.d});
      });
      // Always add current PE at far right
      if(s.pe > 0 && candles.length > 0){
        const rightX = PAD.l + cW;
        if(!pts.length || pts[pts.length-1].x < rightX - 10)
          pts.push({x: rightX, v: s.pe, d: 'now'});
      }
    } else {
      quarterly.forEach(q=>{
        const v = q[k];
        if(v != null) pts.push({x: xForDate(q.d), v, d: q.d});
      });
      // Add current value as rightmost anchor if available
      const curVal = k==='cfo'?s.cfo : k==='rev'?s.sales : k==='net'?s.npm_pct : k==='opm'?s.opm_pct : k==='debt'?s.debt_eq : null;
      if(curVal != null && pts.length){
        pts.push({x: PAD.l + cW, v: curVal, d: 'now'});
      }
    }

      // Keep points that fall within or near visible chart area
    // Extend margin so points just outside edges still connect to line
    pts = pts.filter(p => p.x >= PAD.l - 20 && p.x <= PAD.l + cW + 20);
    // If nothing visible, show all points spread across full width
    if(!pts.length && (quarterly.length || s.pe)){
      const allPts2 = [];
      if(k==='pe'){
        quarterly.forEach(q=>{
          if(!q.eps||q.eps<=0) return;
          const pr = priceAt(q.d);
          if(pr>0) allPts2.push({x:0, v:pr/(q.eps*4), d:q.d});
        });
        if(s.pe>0) allPts2.push({x:0, v:s.pe, d:'now'});
      } else {
        quarterly.forEach(q=>{ const v=q[k]; if(v!=null) allPts2.push({x:0,v,d:q.d}); });
      }
      if(allPts2.length>=2){
        const t0=new Date(allPts2[0].d==='now'?Date.now():allPts2[0].d).getTime();
        const t1=new Date(allPts2[allPts2.length-1].d==='now'?Date.now():allPts2[allPts2.length-1].d).getTime();
        const tr=t1-t0||1;
        allPts2.forEach(p=>{
          const t=new Date(p.d==='now'?Date.now():p.d).getTime();
          p.x = PAD.l + ((t-t0)/tr)*cW;
        });
        pts = allPts2;
      }
    }
      if(!pts.length) return;

    const drawLine = pts.length >= 2;

    // Map values to Y using a DEDICATED right-side scale for this KPI
    // This avoids the problem of small PE values (eg 18x) mapping to price range (eg 500-800)
    const vals = pts.map(p=>p.v);
    const vMin = Math.min(...vals)*0.92, vMax = Math.max(...vals)*1.08;
    const vRng = vMax - vMin || 1;
    // Use top 80% of chart height, leaving room for x-axis labels at bottom
    const yTop = PAD.t + 4, yBot = H - PAD.b - 16;
    const kpiY = v => yBot - ((v - vMin) / vRng) * (yBot - yTop);

    ctx.save();
    ctx.strokeStyle = col; ctx.lineWidth = 1.5; ctx.globalAlpha = 0.9;

    if(drawLine){
      // Subtle fill under line
      ctx.beginPath();
      pts.forEach((p,j)=>{ j===0 ? ctx.moveTo(p.x, kpiY(p.v)) : ctx.lineTo(p.x, kpiY(p.v)); });
      ctx.lineTo(pts[pts.length-1].x, yBot);
      ctx.lineTo(pts[0].x, yBot);
      ctx.closePath();
      ctx.fillStyle = col;
      ctx.globalAlpha = 0.08;
      ctx.fill();
      // Line
      ctx.globalAlpha = 0.9;
      ctx.beginPath();
      pts.forEach((p,j)=>{ j===0 ? ctx.moveTo(p.x, kpiY(p.v)) : ctx.lineTo(p.x, kpiY(p.v)); });
      ctx.stroke();
    }

    // Dots
    ctx.fillStyle = col; ctx.globalAlpha = 1;
    pts.forEach(p=>{
      ctx.beginPath();
      ctx.arc(p.x, kpiY(p.v), 2.5, 0, Math.PI*2);
      ctx.fill();
    });

    // Value labels above each dot (skip if too crowded)
    const labelEvery = pts.length > 6 ? 2 : 1;
    pts.forEach((p,j)=>{
      if(j % labelEvery !== 0 && j !== pts.length-1) return;
      const dispV = k==='pe'  ? p.v.toFixed(0)+'x' :
                    k==='opm' ? p.v.toFixed(1)+'%' :
                    Math.abs(p.v)>=1000 ? (p.v/1000).toFixed(1)+'K' : p.v.toFixed(0);
      ctx.fillStyle = col; ctx.globalAlpha = 0.85;
      ctx.font = '6px JetBrains Mono,monospace'; ctx.textAlign = 'center';
      ctx.fillText(dispV, p.x, kpiY(p.v) - 4);
    });

    // Label on right axis strip
    const last = pts[pts.length-1];
    const dispVal = k==='pe'  ? last.v.toFixed(0)+'x' :
                    k==='opm' ? last.v.toFixed(1)+'%' :
                    Math.abs(last.v)>=1000 ? (last.v/1000).toFixed(1)+'KCr' : last.v.toFixed(0)+'Cr';
    ctx.fillStyle = col; ctx.globalAlpha = 1;
    ctx.font = 'bold 7px JetBrains Mono,monospace'; ctx.textAlign = 'right';
    ctx.fillText(label+' '+dispVal, W-2, Math.max(kpiY(last.v)-3, PAD.t+8));
    ctx.restore();
  });
}

// Volume bars with 5-period MA trend line

function drawVolume(s){
  const cv=document.getElementById('cv-vol');
  if(!cv)return;
  const wrap=document.getElementById('vol-wrap');
  const W2=Math.max(wrap?wrap.offsetWidth:0, 280);
  const H2=75;
  const dpr=window.devicePixelRatio||1;
  cv.width=W2*dpr;cv.height=H2*dpr;
  cv.style.width=W2+'px';cv.style.height=H2+'px';
  const ctx=cv.getContext('2d');
  ctx.scale(dpr,dpr);

  const candles=getSlicedCandles(s, W2);
  if(!candles.length)return;

  ctx.fillStyle='#070c18';ctx.fillRect(0,0,W2,H2);

  const W=W2,H=H2;
  const PAD={l:8,r:52,t:6,b:18};
  const cW=W-PAD.l-PAD.r,cH=H-PAD.t-PAD.b;
  const n=candles.length,gap=cW/n,bw=Math.max(1,Math.min(n > 40 ? 2 : 4, gap*0.25));
  const mv=Math.max(...candles.map(c=>c.v))||1;
  
  // Volume bars colored by EACH candlestick's close > open logic (matches candlestick colors)

  // Left axis line (thicker for visibility)
  ctx.strokeStyle='rgba(100,130,180,.5)';
  ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(PAD.l,PAD.t);ctx.lineTo(PAD.l,PAD.t+cH);ctx.stroke();

  // Volume bars - each bar colored based on corresponding candlestick
  candles.forEach((c,i)=>{
    const bh=Math.max(2,(c.v/mv)*cH);
    const x=PAD.l+i*gap+(gap-bw)/2;
    // Color: green if close > open, red if close <= open (matches candlestick color)
    const barColor = (c.c > c.o) ? '#00d084' : '#ff3b5c';
    ctx.fillStyle=barColor;
    ctx.beginPath();
    ctx.rect(x,PAD.t+cH-bh,bw,bh);
    ctx.fill();
  });

  // ✅ RIGHT axis - Volume labels on RIGHT side (not left to avoid overlap)
  ctx.fillStyle='rgba(7,12,24,.8)';
  ctx.fillRect(W-PAD.r,0,PAD.r,H);
  ctx.strokeStyle='rgba(100,130,180,.6)';
  ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(W-PAD.r,0);ctx.lineTo(W-PAD.r,H);ctx.stroke();
  
  // ✅ Volume labels on RIGHT side (RIGHT aligned, with padding from edge)
  ctx.fillStyle='rgba(255,255,255,1)';
  ctx.font='bold 10px JetBrains Mono,monospace';
  ctx.textAlign='right';  // ✅ Changed from left to right
  ctx.textBaseline='middle';
  const maxVol = Math.max(...candles.map(c=>c.v))||1;
  for(let i=0; i<=2; i++){
    const y = PAD.t + cH - (cH/2)*i;
    const volValue = (i/2) * maxVol;
    let label;
    if (volValue >= 1e6) {
      label = (volValue / 1e6).toFixed(1) + 'M';
    } else if (volValue >= 1e3) {
      label = (volValue / 1e3).toFixed(0) + 'K';
    } else {
      label = volValue.toFixed(0);
    }
    ctx.fillText(label, W-6, y);  // ✅ Draw on right side (W-6)
  }
  
  // Price labels on right axis
  ctx.fillStyle='rgba(255,255,255,.95)';
  ctx.font='bold 9px JetBrains Mono,monospace';
  ctx.textAlign='right';
  ctx.fillText('₹'+Math.round(startPrice).toLocaleString('en-IN'), W-2, PAD.t+6);
  ctx.fillText('₹'+Math.round(endPrice).toLocaleString('en-IN'), W-2, H-2);
  
  // X-axis date labels - adaptive to zoom level
  const maxLabels = Math.min(6, Math.floor(cW / 90));  // ✅ Increased min labels from 5 to 6
  const lblStep = Math.max(1, Math.floor(n / maxLabels));
  ctx.fillStyle='rgba(255,255,255,.85)';
  ctx.font='bold 10px JetBrains Mono,monospace';
  ctx.textAlign='center';
  let dateDebug = [];
  
  console.log('[XAXIS] zoom=' + S.chartZoom.toFixed(2) + ', n=' + n + ', lblStep=' + lblStep + ', maxLabels=' + maxLabels);
  
  candles.forEach((c,i)=>{
    // Show label at step intervals AND always show last candle date
    if(i % lblStep !== 0 && i !== n-1) return;
    const dateStr = c.d ? String(c.d).trim() : '';
    let lbl = '?';
    
    if(dateStr.length >= 10){
      try {
        const parts = dateStr.slice(0,10).split('-');
        if(parts.length === 3){
          const [yr, mo, da] = parts;
          // Show full date for zoomed views (fewer candles), compact for zoomed out
          if(n > 100) lbl = mo + '/' + yr.slice(2);      // Zoomed out: MM/YY
          else if(n > 50) lbl = mo + '/' + da;            // Medium: MM/DD  
          else lbl = da + '/' + mo + '/' + yr.slice(2);   // Zoomed in: DD/MM/YY
        }
      } catch(e){
        lbl = '!';
      }
    }
    
    const x = PAD.l+i*gap+gap/2;
    if(x > W-PAD.r-4) return;
    ctx.fillText(lbl, x, H-1);
    if(i === 0 || i === n-1) dateDebug.push({i, dateStr, lbl, zoom: S.chartZoom.toFixed(2)});
  });
  if(dateDebug.length > 0) console.log('[XAXIS] dates:', dateDebug);
  
  // Volume trend line (smoothed MA5)
  const volMA = candles.map((c,i)=>{
    if(i<4) return null;
    return candles.slice(i-4,i+1).reduce((a,b)=>a+b.v,0)/5;
  });
  ctx.strokeStyle='rgba(255,255,255,.3)'; ctx.lineWidth=1.5; ctx.beginPath();
  let started=false;
  volMA.forEach((v,i)=>{
    if(v===null) return;
    const x=PAD.l+i*gap+gap/2;
    const y=PAD.t+cH-(v/mv)*cH;
    if(!started){ctx.moveTo(x,y);started=true;} else ctx.lineTo(x,y);
  });
  ctx.stroke();
}

function updateChartStats(s){
  const candles=getSlicedCandles(s, 0);
  if(!candles.length)return;
  const closes=candles.map(c=>c.c);
  const first=closes[0],last=closes[closes.length-1];
  const ret=((last-first)/first*100).toFixed(2);
  const hi=Math.max(...candles.map(c=>c.h));
  const lo=Math.min(...candles.map(c=>c.l));
  const vol=((hi-lo)/lo*100).toFixed(1);
  const up=last>=first;
  const retEl=document.getElementById('cstat-ret');
  const hiEl=document.getElementById('cstat-hi');
  const loEl=document.getElementById('cstat-lo');
  const volEl=document.getElementById('cstat-vol');
  if(retEl){retEl.textContent=(up?'+':'')+ret+'%';retEl.style.color=up?'var(--gr2)':'var(--rd2)';}
  if(hiEl)hiEl.textContent='₹'+fmt(hi);
  if(loEl)loEl.textContent='₹'+fmt(lo);
  if(volEl)volEl.textContent=vol+'%';
}

function canvasSetChartRange(r) { S.chartRange = r; scheduleChartRedraw(); }
function canvasSetChartInterval(iv) { S.chartInterval = iv; scheduleChartRedraw(); }
function canvasToggleMA(key) { S.maVis[key] = !S.maVis[key]; if (key === 'vol') renderTab('canvas'); else scheduleChartRedraw(); }
function toggleKPI(k) { S.kpiVis[k] = !S.kpiVis[k]; scheduleChartRedraw(); }

async function canvasLoadAndDrawChart(sym) {
  // ✅ Step 1: Check if stock ALREADY HAS candle data (from your database/app)
  if(currentStock && currentStock.candles && currentStock.candles.length > 0) {
    attachChartResizeObserver(currentStock);
    scheduleTACharts(currentStock);
    setupChartInteraction();  // Enable pan/zoom once
    return;
  }
  
  // ✅ Step 2: Try optional JSON file (if you have one)
  try {
    const res = await fetch(`./charts/${sym}.json`);
    if (res.ok) {
      const data = await res.json();
      currentStock.candles = data.bars || [];
      chartCache[sym] = currentStock.candles;
      attachChartResizeObserver(currentStock);
      scheduleTACharts(currentStock);
      setupChartInteraction();  // Enable pan/zoom once
      return;
    }
  } catch (e) {
    // JSON not available - that's ok
  }
  
  // ✅ Step 3: Use whatever data we have, or show helpful message
  if(currentStock) {
    attachChartResizeObserver(currentStock);
    scheduleTACharts(currentStock);
    setupChartInteraction();  // Enable pan/zoom once
  }
}

let chartInteraction = {
  isPanning: false,
  startX: 0,
  startPan: 0
};

function setupChartInteraction() {
  const canvas = document.getElementById('cv-candle');
  if (!canvas) return;
  
  // Shared touch state
  const touchState = { lastDistance: 0, gestureStart: 1 };
  let lastRedrawTime = 0;
  const REDRAW_THROTTLE_MS = 16;  // ✅ Throttle to ~60fps for smooth motion
  
  // Debounced redraw: only redraw if 16ms has passed (prevents excessive redraws)
  const throttledRedraw = (stock) => {
    const now = performance.now();
    if (now - lastRedrawTime >= REDRAW_THROTTLE_MS) {
      scheduleTACharts(stock);
      lastRedrawTime = now;
    }
  };
  
  // Mouse/Touch Pan on canvas
  canvas.onmousedown = (e) => {
    console.log('[CHART] mousedown - isPanning=true, startX=' + e.clientX);
    chartInteraction.isPanning = true;
    chartInteraction.startX = e.clientX;
    chartInteraction.startPan = S.chartPan;
  };
  
  canvas.onmousemove = (e) => {
    if (!chartInteraction.isPanning || !currentStock) {
      console.log('[CHART] mousemove ignored: isPanning=' + chartInteraction.isPanning + ', currentStock=' + !!currentStock);
      return;
    }
    const delta = e.clientX - chartInteraction.startX;
    let newPan = chartInteraction.startPan + delta;
    
    console.log('[CHART] mousemove: delta=' + delta + ', newPan=' + newPan);
    
    // Allow free panning with generous limits
    newPan = Math.max(-400, Math.min(400, newPan));
    console.log('[CHART] after limit: newPan=' + newPan);
    S.chartPan = newPan;
    console.log('[CHART] calling scheduleTACharts, S.chartPan=' + S.chartPan);
    scheduleTACharts(currentStock);
  };
  
  canvas.onmouseup = () => { chartInteraction.isPanning = false; };
  canvas.onmouseleave = () => { chartInteraction.isPanning = false; };
  
  // Touch handlers with pinch support
  const handleTouchStart = (e) => {
    console.log('[TOUCH] touchstart: ' + e.touches.length + ' fingers');
    if (e.touches.length === 2) {
      // PINCH DETECTED: Calculate initial distance
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      touchState.lastDistance = Math.sqrt(dx*dx + dy*dy);
      chartInteraction.isPanning = false;
      console.log('[TOUCH] 2-finger pinch start, initial distance=' + touchState.lastDistance.toFixed(0));
    } else if (e.touches.length === 1) {
      // SINGLE TOUCH PAN
      chartInteraction.isPanning = true;
      chartInteraction.startX = e.touches[0].clientX;
      chartInteraction.startPan = S.chartPan;
      touchState.lastDistance = 0;
      console.log('[TOUCH] Pan start');
    }
  };
  
  const handleTouchMove = (e) => {
    if (e.touches.length === 2) {
      // TWO-FINGER PINCH: Calculate distance between two touch points
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      const distance = Math.sqrt(dx*dx + dy*dy);
      
      // CRITICAL: Don't check minimum distance - apply zoom on ANY 2-finger movement
      if (touchState.lastDistance > 0) {
        const ratio = distance / touchState.lastDistance;
        const delta = ratio - 1.0;  // How much changed: 1.01 = 1% increase, 0.99 = 1% decrease
        
        console.log('[TOUCH] 2-finger pinch: ratio=' + ratio.toFixed(4) + ', delta=' + delta.toFixed(4));
        
        // VERY SENSITIVE: Apply zoom on any movement > 0.5%
        if (Math.abs(delta) > 0.005) {
          // Smooth continuous zoom (not discrete steps)
          const smoothFactor = 1.0 + (delta * 0.5);  // delta * 0.5 = smooth response
          const oldZoom = S.chartZoom;
          S.chartZoom = Math.max(0.5, Math.min(3, S.chartZoom * smoothFactor));
          
          if (Math.abs(S.chartZoom - oldZoom) > 0.01) {  // Only log if zoom actually changed
            console.log('[TOUCH] ZOOM: ' + oldZoom.toFixed(2) + ' → ' + S.chartZoom.toFixed(2) + ' (ratio=' + ratio.toFixed(3) + ')');
            throttledRedraw(currentStock);  // ✅ Throttled for smooth 60fps
          }
        }
      }
      touchState.lastDistance = distance;
      e.preventDefault();
    } else if (e.touches.length === 1) {
      // SINGLE TOUCH PAN
      if (chartInteraction.isPanning && currentStock) {
        const delta = e.touches[0].clientX - chartInteraction.startX;
        let newPan = chartInteraction.startPan + delta;
        newPan = Math.max(-400, Math.min(400, newPan));
        S.chartPan = newPan;
        throttledRedraw(currentStock);  // ✅ Throttled for smooth 60fps
      }
    }
  };
  
  const handleTouchEnd = () => {
    console.log('[TOUCH] touchend');
    chartInteraction.isPanning = false;
    touchState.lastDistance = 0;
  };
  
  canvas.ontouchstart = handleTouchStart;
  canvas.ontouchmove = handleTouchMove;
  canvas.ontouchend = handleTouchEnd;
  
  // iOS Pinch Support - gesturechange detects pinch on iOS (shared state)
  const handleGestureStart = (e) => {
    touchState.gestureStart = e.scale;
    console.log('[GESTURE] TOP CHART gesturestart: scale=' + touchState.gestureStart);
  };
  
  const handleGestureChange = (e) => {
    if (!currentStock) {
      console.log('[GESTURE] No currentStock');
      return;
    }
    const scaleFactor = e.scale / touchState.gestureStart;
    const factor = scaleFactor > 1.02 ? 1.08 : scaleFactor < 0.98 ? 0.92 : 1.0;
    S.chartZoom = Math.max(0.5, Math.min(3, S.chartZoom * factor));
    console.log('[GESTURE] TOP CHART Pinch: scale=' + e.scale.toFixed(2) + ', baseScale=' + touchState.gestureStart.toFixed(2) + ', ratio=' + scaleFactor.toFixed(2) + ', factor=' + factor.toFixed(2) + ', newZoom=' + S.chartZoom.toFixed(2));
    scheduleTACharts(currentStock);
    e.preventDefault();
  };
  
  const handleGestureEnd = (e) => {
    console.log('[GESTURE] TOP CHART gestureend: final zoom=' + S.chartZoom.toFixed(2));
  };
  
  // DISABLED: Gesture events cause conflict with touch-based pinch detection
  // Use smooth touch-based pinch instead (no gesture events)
  // canvas.ongesturestart = handleGestureStart;
  // canvas.ongesturechange = handleGestureChange;
  // canvas.ongestureend = handleGestureEnd;
  console.log('[CHART] Main canvas: TOUCH-BASED PINCH ONLY (gesture disabled)');
  
  // Wheel Zoom on canvas
  canvas.onwheel = (e) => {
    if (!currentStock) return;
    e.preventDefault();
    const factor = e.deltaY < 0 ? 1.1 : 0.9;
    S.chartZoom = Math.max(0.5, Math.min(3, S.chartZoom * factor));
    scheduleTACharts(currentStock);
  };
  
  // Volume canvas - touch-based pinch only (no gesture events)
  const volCanvas = document.getElementById('cv-vol');
  if (volCanvas) {
    volCanvas.ontouchstart = handleTouchStart;
    volCanvas.ontouchmove = handleTouchMove;
    volCanvas.ontouchend = handleTouchEnd;
    // DISABLED: Gesture events conflict with touch-based detection
    // volCanvas.ongesturestart = handleGestureStart;
    // volCanvas.ongesturechange = handleGestureChange;
    // volCanvas.ongestureend = handleGestureEnd;
    console.log('[CHART] Volume canvas: TOUCH-BASED PINCH ONLY');
  }
}

// Auto-setup when canvas is ready
document.addEventListener('DOMContentLoaded', setupChartInteraction);



</script>
