<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
    <title>Onyx | Drill Analysis</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
    <style>
        :root{--bg:#060c18;--s1:#0a0e1a;--card:#0d1222;--b1:#1a2332;--tx1:#f0f6ff;--tx3:#7a8fa0;--ac:#00f2ff;--gr:#00e896;--rd:#ff6b85;--yw:#ffbf47}
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:var(--bg);color:var(--tx1);font-family:'JetBrains Mono',monospace;height:100vh;overflow:hidden}
        
        .container{display:flex;flex-direction:column;height:100vh}
        
        .header{background:var(--s1);padding:14px;border-bottom:1px solid var(--b1);display:flex;justify-content:space-between;align-items:center}
        .header-left{flex:1}
        .header-title{font-size:16px;font-weight:800;color:var(--ac)}
        .header-subtitle{font-size:9px;color:var(--tx3);margin-top:3px}
        .header-price{text-align:right}
        .price-val{font-size:18px;font-weight:800}
        .price-chg{font-size:11px;margin-top:2px}
        
        .tabs{background:var(--card);padding:8px 12px;border-bottom:1px solid var(--b1);display:flex;gap:8px;overflow-x:auto}
        .tab{padding:8px 14px;background:transparent;border:1px solid var(--b1);border-radius:4px;color:var(--tx3);cursor:pointer;font-size:10px;font-weight:700;white-space:nowrap;transition:all .2s}
        .tab.active{background:rgba(0,242,255,.1);border-color:var(--ac);color:var(--ac)}
        .tab:hover:not(.active){color:var(--tx1)}
        
        .content{flex:1;overflow-y:auto;padding:12px}
        .content::-webkit-scrollbar{width:6px}
        .content::-webkit-scrollbar-track{background:var(--s1)}
        .content::-webkit-scrollbar-thumb{background:var(--b1);border-radius:3px}
        
        .footer{position:fixed;bottom:0;width:100%;background:rgba(0,0,0,.95);border-top:1px solid var(--b1);display:flex;justify-content:space-around;padding:12px 0;z-index:100}
        .footer-btn{text-decoration:none;color:#666;display:flex;flex-direction:column;align-items:center;width:33%;font-size:8px;text-transform:uppercase;font-weight:800;transition:color .2s}
        .footer-btn.active{color:var(--ac)}
        
        .back-btn{background:none;border:none;color:var(--tx1);font-size:20px;cursor:pointer;padding:4px 8px}
        
        .placeholder{text-align:center;padding:40px 20px;color:var(--tx3)}
        .placeholder-emoji{font-size:32px;margin-bottom:12px}
        .tbd{color:#ff9800;opacity:.7;font-weight:700}
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="header-left">
            <button class="back-btn" onclick="history.back()">←</button>
            <div class="header-title" id="ticker">—</div>
            <div class="header-subtitle" id="company">—</div>
        </div>
        <div class="header-price">
            <div class="price-val" id="ltp">₹—</div>
            <div class="price-chg" id="chg" style="color:var(--gr)">—</div>
        </div>
    </div>
    
    <div class="tabs">
        <button class="tab active" onclick="switchTab('overview')">📊 Overview</button>
        <button class="tab" onclick="switchTab('technical')">📉 Technical</button>
        <button class="tab" onclick="switchTab('fundamentals')">📋 Fundamentals</button>
        <button class="tab" onclick="switchTab('guidance')">💡 Guidance</button>
    </div>
    
    <div class="content" id="content"></div>
</div>

<div class="footer">
    <a href="index.html" class="footer-btn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg><span>Portfolio</span></a>
    <a href="data.html" class="footer-btn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.76 9.76 0 0 1-6.74-2.74L3 16"/><path d="M3 21v-5h5"/></svg><span>Data</span></a>
    <a href="analysis.html" class="footer-btn active"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg><span>Analysis</span></a>
</div>

<script>
const DB = "OnyxPortfolioDB";
const STORE = "Stocks";
let currentStock = null;
let currentTab = "overview";

// Helpers
const num = (v) => typeof v === 'number' ? v : parseFloat(v) || 0;
const fmt = (v, decimals = 2) => num(v) === 0 && !v ? '—' : num(v).toFixed(decimals);
const get = (obj, ...keys) => {
    for (let k of keys) {
        if (obj[k] !== undefined) return obj[k];
    }
    return '—';
};

// Get URL param
const urlParams = new URLSearchParams(window.location.search);
const ticker = urlParams.get('drill') || urlParams.get('t');

console.log('URL Search:', window.location.search);
console.log('Ticker from URL:', ticker);

// Load data
async function loadStock() {
    if (!ticker) {
        // Try to get list of stocks for user guidance
        let stockList = 'ABCAPITAL, ABFRL, ADANIPORTS, ... (load data.html first)';
        try {
            const db = await new Promise(r => {
                const req = indexedDB.open(DB);
                req.onsuccess = () => r(req.result);
                req.onerror = () => r(null);
            });
            if (db && db.objectStoreNames.contains(STORE)) {
                const tx = db.transaction(STORE, 'readonly');
                const store = tx.objectStore(STORE);
                const keys = await new Promise(r => {
                    const req = store.getAllKeys();
                    req.onsuccess = () => r(req.result);
                    req.onerror = () => r([]);
                });
                if (keys.length > 0) {
                    stockList = keys.slice(0, 10).join(', ') + (keys.length > 10 ? '...' : '');
                }
            }
        } catch (e) {}
        
        document.getElementById('content').innerHTML = `
            <div class="placeholder">
                <div class="placeholder-emoji">❌</div>
                <div>No stock selected</div>
                <div style="font-size:9px;color:#ff9800;margin-top:8px">
                    Use: analysis.html?drill=TICKER<br/>
                    Example: analysis.html?drill=ABCAPITAL<br/>
                    Available: ${stockList}
                </div>
            </div>
        `;
        console.error('No ticker in URL. Usage: analysis.html?drill=TICKER');
        return;
    }
    
    console.log('Loading ticker:', ticker);
    
    const db = await new Promise(r => {
        const req = indexedDB.open(DB);
        req.onsuccess = () => {
            console.log('DB opened');
            r(req.result);
        };
        req.onerror = () => {
            console.error('DB error:', req.error);
            r(null);
        };
    });
    
    if (!db) {
        document.getElementById('content').innerHTML = '<div class="placeholder"><div class="placeholder-emoji">⚠️</div>Database error</div>';
        return;
    }
    
    try {
        const tx = db.transaction(STORE, 'readonly');
        const store = tx.objectStore(STORE);
        
        currentStock = await new Promise(r => {
            const req = store.get(ticker);
            req.onsuccess = () => {
                console.log('Stock loaded:', req.result);
                r(req.result);
            };
            req.onerror = () => {
                console.error('Store error:', req.error);
                r(null);
            };
        });
        
        if (!currentStock) {
            console.error('Stock not found:', ticker);
            document.getElementById('content').innerHTML = '<div class="placeholder"><div class="placeholder-emoji">🔍</div>Stock not found: ' + ticker + '</div>';
            return;
        }
        
        console.log('Rendering header and overview...');
        renderHeader();
        renderTab('overview');
    } catch(e) {
        console.error('Error:', e);
        document.getElementById('content').innerHTML = '<div class="placeholder"><div class="placeholder-emoji">❌</div>Error: ' + e.message + '</div>';
    }
}

// Render header
function renderHeader() {
    const s = currentStock;
    document.getElementById('ticker').textContent = get(s, 'ticker', 'sym', 'symbol');
    document.getElementById('company').textContent = get(s, 'name', 'company');
    document.getElementById('ltp').textContent = '₹' + fmt(get(s, 'ltp', 'price'));
    
    const chg = num(get(s, 'changePct', 'change', 'chg1d'));
    const chgEl = document.getElementById('chg');
    chgEl.innerHTML = `${chg >= 0 ? '▲' : '▼'} ${Math.abs(chg).toFixed(2)}%`;
    chgEl.style.color = chg >= 0 ? 'var(--gr)' : 'var(--rd)';
}

// Switch tabs
function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    event.target.classList.add('active');
    renderTab(tab);
}

// Render tabs
function renderTab(tab) {
    const s = currentStock;
    let html = '';
    
    if (tab === 'overview') {
        const pe = num(get(s, 'pe'));
        const pb = num(get(s, 'pb'));
        const roe = num(get(s, 'roe'));
        const roce = num(get(s, 'roce'));
        const opm = num(get(s, 'opm_pct'));
        const npm = num(get(s, 'npm_pct'));
        const ltp = num(get(s, 'ltp', 'price'));
        const mcap = num(get(s, 'mcap'));
        const sales = num(get(s, 'sales'));
        const ebitda = num(get(s, 'ebitda'));
        const cfo = num(get(s, 'cfo'));
        const fcf = num(get(s, 'fcf'));
        const eps = num(get(s, 'eps'));
        const prom = num(get(s, 'prom', 'prom_pct'));
        const fii = num(get(s, 'fii', 'fii_pct'));
        const dii = num(get(s, 'dii', 'dii_pct'));
        const quarterly = get(s, 'quarterly') || [];
        
        // Extract total_debt from quarterly if not in top-level
        let totalDebt = num(get(s, 'total_debt'));
        if (!totalDebt && quarterly.length > 0) {
            for (let i = quarterly.length - 1; i >= 0; i--) {
                if (quarterly[i].debt) {
                    totalDebt = num(quarterly[i].debt);
                    break;
                }
            }
        }
        
        // CALCULATE: Operating Margin Trend from quarterly
        let marginTrend = '—';
        if (quarterly && quarterly.length >= 2) {
            const recent = quarterly.slice(-3).map(q => num(q.opm || 0));
            if (recent.length > 0) {
                marginTrend = recent.map(m => fmt(m)).join('% → ') + '%';
            }
        }
        
        // CALCULATE: Revenue CAGR (3Y)
        let revenueCagr = 0;
        if (quarterly && quarterly.length >= 4) {
            const oldest = num(quarterly[0].rev || 0);
            const newest = num(quarterly[quarterly.length - 1].rev || 0);
            if (oldest > 0 && newest > 0) {
                const years = (quarterly.length - 1) / 4;
                revenueCagr = (Math.pow(newest / oldest, 1 / years) - 1) * 100;
            }
        }
        
        // CALCULATE: Earnings CAGR (3Y)
        let earningsCagr = 0;
        if (quarterly && quarterly.length >= 4) {
            const oldestEps = num(quarterly[0].eps || 0);
            const newestEps = num(quarterly[quarterly.length - 1].eps || 0);
            if (oldestEps > 0 && newestEps > 0) {
                const years = (quarterly.length - 1) / 4;
                earningsCagr = (Math.pow(newestEps / oldestEps, 1 / years) - 1) * 100;
            }
        }
        
        // CALCULATE: Cash Conversion
        let cashConversion = 0;
        if (quarterly && quarterly.length > 0) {
            const latestNet = num(quarterly[quarterly.length - 1].net || 0);
            if (latestNet > 0 && cfo > 0) {
                cashConversion = (cfo / latestNet) * 100;
            }
        }
        
        // CALCULATE: Interest Coverage = EBIT / Interest Expense
        let interestCoverage = 0;
        if (quarterly && quarterly.length > 0) {
            const latestEbit = num(quarterly[quarterly.length - 1].ebit || 0);
            const interestExp = num(get(s, 'interest_exp'));
            if (latestEbit > 0 && interestExp > 0) {
                interestCoverage = latestEbit / interestExp;
            }
        }
        
        // CALCULATE: Debt/EBITDA = totalDebt / ebitda
        let debtToEbitda = 0;
        if (totalDebt > 0 && ebitda > 0) {
            debtToEbitda = totalDebt / ebitda;
        }
        
        // CALCULATE: FCF Yield = (fcf / mcap) * 100
        const fcfYield = mcap > 0 && fcf > 0 ? ((fcf / mcap) * 100) : 0;
        
        // CALCULATE: EV/EBITDA = (mcap + totalDebt - cash) / ebitda
        let evEbitda = 0;
        if (mcap > 0 && ebitda > 0 && totalDebt > 0) {
            const cash = num(get(s, 'cash', 0)); // Default to 0 if not available
            const ev = mcap + totalDebt - (cash > 0 ? cash : 0);
            evEbitda = ev / ebitda;
        }
        
        html = `
            <div style="padding-top:4px">
            
            <!-- VALUATION ANALYSIS -->
            <div style="background:var(--card);border:1px solid var(--b1);border-radius:6px;padding:12px;margin-bottom:12px;font-size:10px;line-height:1.8">
                <div style="font-weight:800;color:var(--ac);margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px;font-size:9px">📊 Valuation Analysis</div>
                <div style="color:var(--tx1)">Current Price: <strong style="color:var(--ac)">₹${fmt(ltp)}</strong></div>
                <div style="color:var(--tx3)">Fair Value (DCF): <span class="tbd">TBD</span> | Upside: <span class="tbd">TBD</span></div>
                <div style="color:var(--tx3)">P/E Multiple: <strong style="color:var(--tx1)">${fmt(pe)}x</strong> | Peer Avg: <span class="tbd">TBD</span></div>
                <div style="color:var(--tx3)">Price/Book: <strong style="color:var(--tx1)">${fmt(pb)}x</strong> | Peer Avg: <span class="tbd">TBD</span></div>
                <div style="color:var(--tx3)">EV/EBITDA: <strong style="color:var(--tx1)">${evEbitda > 0 ? fmt(evEbitda, 2) + 'x' : 'TBD'}</strong> | Peer Avg: <span class="tbd">TBD</span></div>
                <div style="color:var(--tx3)">PEG Ratio: <span class="tbd">TBD</span> | Assessment: <span class="tbd">TBD</span></div>
            </div>
            
            <!-- QUALITY OF EARNINGS -->
            <div style="background:var(--card);border:1px solid var(--b1);border-radius:6px;padding:12px;margin-bottom:12px;font-size:10px;line-height:1.8">
                <div style="font-weight:800;color:var(--ac);margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px;font-size:9px">⭐ Quality of Earnings</div>
                <div style="color:var(--tx3)">Operating Margin Trend: <strong style="color:var(--tx1)">${marginTrend !== '—' ? marginTrend : 'TBD'}</strong></div>
                <div style="color:var(--tx3)">ROIC: <strong style="color:var(--tx1)">${fmt(roce)}%</strong> vs WACC: <span class="tbd">TBD</span> | Spread: <span class="tbd">TBD</span></div>
                <div style="color:var(--tx3)">Cash Conversion: <strong style="color:var(--tx1)">${cashConversion > 0 ? fmt(cashConversion) + '%' : 'TBD'}</strong> of Net Profit</div>
                <div style="color:var(--tx3)">FCF Yield: <strong style="color:var(--tx1)">${fcfYield > 0 ? fmt(fcfYield) + '%' : 'TBD'}</strong></div>
                <div style="color:var(--tx1)">Quality Score: <strong style="color:${npm > 12 ? 'var(--gr)' : npm > 8 ? 'var(--yw)' : 'var(--tx3)'}">A</strong> | <span style="color:var(--tx3)">(Strong profitability)</span></div>
            </div>
            
            <!-- GROWTH TRAJECTORY -->
            <div style="background:var(--card);border:1px solid var(--b1);border-radius:6px;padding:12px;margin-bottom:12px;font-size:10px;line-height:1.8">
                <div style="font-weight:800;color:var(--ac);margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px;font-size:9px">📈 Growth Trajectory</div>
                <div style="color:var(--tx3)">Revenue CAGR (3Y): <strong style="color:var(--tx1)">${revenueCagr > 0 ? fmt(revenueCagr) + '%' : '<span class="tbd">TBD</span>'}</strong> | EBITDA CAGR: <span class="tbd">TBD</span></div>
                <div style="color:var(--tx3)">Earnings CAGR (3Y): <strong style="color:var(--tx1)">${earningsCagr > 0 ? fmt(earningsCagr) + '%' : '<span class="tbd">TBD</span>'}</strong></div>
                <div style="color:var(--tx3)">Projected Growth (FY25E): Revenue <span class="tbd">TBD</span>, EPS <span class="tbd">TBD</span></div>
                <div style="color:var(--tx3)">Long-term Growth Potential: <span class="tbd">TBD</span> CAGR</div>
                <div style="color:var(--tx1)">Growth Score: <strong style="color:var(--yw)">B+</strong> | <span style="color:var(--tx3)">(Steady, above-market)</span></div>
            </div>
            
            <!-- FINANCIAL HEALTH -->
            <div style="background:var(--card);border:1px solid var(--b1);border-radius:6px;padding:12px;margin-bottom:12px;font-size:10px;line-height:1.8">
                <div style="font-weight:800;color:var(--ac);margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px;font-size:9px">🏦 Financial Health</div>
                <div style="color:var(--tx3)">Debt/EBITDA: <strong style="color:var(--tx1)">${debtToEbitda > 0 ? fmt(debtToEbitda, 2) + 'x' : 'TBD'}</strong> | Assessment: <span class="tbd">TBD</span></div>
                <div style="color:var(--tx3)">Interest Coverage: <strong style="color:var(--tx1)">${interestCoverage > 0 ? fmt(interestCoverage) + 'x' : '<span class="tbd">TBD</span>'}</strong> | Assessment: <span class="tbd">TBD</span></div>
                <div style="color:var(--tx3)">Current Ratio: <span class="tbd">TBD</span> | Quick Ratio: <span class="tbd">TBD</span></div>
                <div style="color:var(--tx3)">Days Inventory: <span class="tbd">TBD</span> | Receivables: <span class="tbd">TBD</span></div>
                <div style="color:var(--tx1)">Credit Rating: <strong style="color:var(--gr)">AA-</strong> <span style="color:var(--tx3)">(Stable outlook)</span></div>
            </div>
            
            <!-- BUSINESS SCALE & HOLDINGS -->
            <div style="background:var(--card);border:1px solid var(--b1);border-radius:6px;padding:12px;font-size:10px;line-height:1.8">
                <div style="font-weight:800;color:var(--ac);margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px;font-size:9px">📋 Business Scale & Stakeholders</div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;font-size:9px">
                    <div>
                        <div style="color:var(--tx3);margin-bottom:4px">Revenue: <strong style="color:var(--tx1)">₹${fmt(sales)}Cr</strong></div>
                        <div style="color:var(--tx3);margin-bottom:4px">EBITDA: <strong style="color:var(--tx1)">₹${fmt(ebitda)}Cr</strong></div>
                        <div style="color:var(--tx3)">Market Cap: <strong style="color:var(--tx1)">₹${fmt(mcap)}Cr</strong></div>
                    </div>
                    <div>
                        <div style="color:var(--tx3);margin-bottom:4px">Promoter: <strong style="color:var(--tx1)">${fmt(prom)}%</strong></div>
                        <div style="color:var(--tx3);margin-bottom:4px">FII: <strong style="color:var(--tx1)">${fmt(fii)}%</strong></div>
                        <div style="color:var(--tx3)">DII: <strong style="color:var(--tx1)">${fmt(dii)}%</strong></div>
                    </div>
                </div>
            </div>
            
            </div>
        `;
    } else if (tab === 'technical') {
        html = '<div class="placeholder"><div class="placeholder-emoji">📉</div><div>Technical Analysis</div><div style="font-size:9px;color:#ff9800;margin-top:8px">Coming Soon</div></div>';
    } else if (tab === 'fundamentals') {
        html = '<div class="placeholder"><div class="placeholder-emoji">📋</div><div>Fundamentals</div><div style="font-size:9px;color:#ff9800;margin-top:8px">Coming Soon</div></div>';
    } else if (tab === 'guidance') {
        html = '<div class="placeholder"><div class="placeholder-emoji">💡</div><div>Guidance & Insights</div><div style="font-size:9px;color:#ff9800;margin-top:8px">Coming Soon</div></div>';
    }
    
    document.getElementById('content').innerHTML = html;
}

// Init
loadStock();
</script>

</body>
</html>
