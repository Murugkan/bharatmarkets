<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
    <title>Onyx | Drill View</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg:#000; --s1:#0a0a0a; --b1:#222; --bl:#00f2ff; --gr:#00ff88; --rd:#ff4d6d; --tx:#fff; }
        *{box-sizing:border-box;margin:0;padding:0;}
        body { background:var(--bg); color:var(--tx); font-family:'JetBrains Mono',monospace; overflow:hidden; -webkit-text-size-adjust:100%; padding-bottom: 80px; }
        .view { width:100%; overflow:auto; height:calc(100vh - 80px); background:#000; -webkit-overflow-scrolling:touch; }
        footer { position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); border-top: 1px solid var(--b1); display: flex; justify-content: space-around; padding: 12px 0; padding-bottom: calc(12px + env(safe-area-inset-bottom)); z-index: 1000; }
        .nav-btn { text-decoration: none; color: #666; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 33%; padding: 8px 0; transition: color 0.2s; }
        .nav-btn:hover { color: var(--bl); }
        .nav-btn.active { color: var(--bl); font-weight: 800; }
        .nav-label { font-size: 8px; margin-top: 4px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="view"><div id="app"></div></div>

<!-- Debug Button -->
<div style="position:fixed; top:80px; right:10px; z-index:999;">
  <button onclick="toggleDebug()" style="background:#00f2ff; color:#000; border:none; border-radius:4px; padding:8px 12px; font-size:11px; font-weight:800; cursor:pointer;">🐛 Debug</button>
</div>

<!-- Debug Panel -->
<div id="debugPanel" style="position:fixed; top:120px; right:10px; width:300px; background:#0a0a0a; border:1px solid #00f2ff; border-radius:4px; padding:12px; z-index:999; max-height:400px; overflow-y:auto; display:none; font-size:9px; color:#00f2ff; font-family:monospace;">
  <div style="margin-bottom:10px; font-weight:800;">🔍 DEBUG LOG</div>
  <div id="debugLog" style="line-height:1.6;"></div>
</div>

<footer>
    <a href="index.html" class="nav-btn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg><span class="nav-label">Portfolio</span></a>
    <a href="data.html" class="nav-btn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"></path><path d="M21 3v5h-5"></path><path d="M21 12a9 9 0 0 1-9 9 9.76 9.76 0 0 1-6.74-2.74L3 16"></path><path d="M3 21v-5h5"></path></svg><span class="nav-label">Data</span></a>
    <a href="analysis.html" class="nav-btn active"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg><span class="nav-label">Analysis</span></a>
</footer>

<script src="bridge.js"></script>

<script>
// ===== DEBUG LOGGING =====
let debugLogs = [];

function addDebug(msg) {
  const ts = new Date().toLocaleTimeString();
  const entry = `[${ts}] ${msg}`;
  debugLogs.push(entry);
  console.log(entry);
  updateDebugPanel();
}

function updateDebugPanel() {
  const panel = document.getElementById('debugLog');
  if (panel) {
    panel.innerHTML = debugLogs.slice(-20).map(log => `<div>${log}</div>`).join('');
    panel.scrollTop = panel.scrollHeight;
  }
}

function toggleDebug() {
  const panel = document.getElementById('debugPanel');
  panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
}

// ===== INIT =====
async function init() {
  try {
    addDebug('🚀 Init started');
    
    addDebug('📚 Loading bridge...');
    await initBridge();
    addDebug(`✅ Bridge ready: MASTER=${MASTER.length}`);
    
    const params = new URLSearchParams(window.location.search);
    const drillTicker = params.get('drill');
    addDebug(`📍 URL param drill: ${drillTicker || 'none'}`);
    
    if (drillTicker) {
      addDebug(`🔍 Looking for stock: ${drillTicker}`);
      if (selectStock(drillTicker)) {
        addDebug(`✅ Selected: ${drillTicker}`);
        showDrill();
        addDebug(`✅ Drill view displayed`);
      } else {
        addDebug(`❌ Stock not found: ${drillTicker}`);
        document.getElementById('app').innerHTML = '<div style="padding:20px; color:#ff4d6d; text-align:center;">❌ Stock not found</div>';
      }
    } else {
      addDebug('ℹ️ No drill param');
      document.getElementById('app').innerHTML = '<div style="padding:40px; color:#8ab4f8; text-align:center;"><div style="font-size:14px; margin-bottom:20px;">📊 Drill View</div><div style="font-size:12px;">Click stock in Portfolio to view details</div></div>';
    }
  } catch (err) {
    addDebug(`❌ FATAL: ${err.message}`);
    console.error('Init error:', err);
    document.getElementById('app').innerHTML = '<div style="padding:20px; color:#ff4d6d; font-size:11px;">❌ Error: ' + err.message + '</div>';
  }
}

// ===== DRILL VIEW =====
function showDrill() {
  const s = S.selStock;
  if (!s) return;
  
  const num = (val) => {
    if (typeof val === 'number') return val;
    if (typeof val === 'string') {
      const n = parseFloat(val);
      return isNaN(n) ? 0 : n;
    }
    return 0;
  };
  
  const fmt = (val, decimals = 2) => {
    const n = num(val);
    return n === 0 && val === '—' ? '—' : n.toFixed(decimals);
  };
  
  const bull = num(s.changePct) >= 0;
  const col = bull ? 'var(--gr)' : 'var(--rd)';
  
  document.getElementById('app').innerHTML = `
    <div style="padding:12px;">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; padding-bottom:12px; border-bottom:1px solid var(--b1);">
        <div style="flex:1;">
          <div style="font-size:16px; font-weight:800; color:var(--bl);">${s.symbol}</div>
          <div style="font-size:12px; color:var(--tx); margin-top:4px;">${s.name}</div>
          <div style="font-size:10px; color:#666; margin-top:2px;">${s.sector || '—'}</div>
        </div>
        <div style="text-align:right;">
          <div style="font-size:14px; font-weight:800;">₹${fmt(s.ltp)}</div>
          <div style="font-size:12px; color:${col}; margin-top:2px;">${bull ? '▲' : '▼'} ${Math.abs(num(s.changePct)).toFixed(2)}%</div>
        </div>
      </div>
      
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:12px;">
        <div style="background:var(--s1); padding:10px; border-radius:4px;">
          <div style="font-size:9px; color:#666; margin-bottom:4px;">PE Ratio</div>
          <div style="font-size:13px; font-weight:800; color:var(--bl);">${fmt(s.pe)}</div>
        </div>
        <div style="background:var(--s1); padding:10px; border-radius:4px;">
          <div style="font-size:9px; color:#666; margin-bottom:4px;">ROE %</div>
          <div style="font-size:13px; font-weight:800; color:var(--gr);">${fmt(s.roe)}%</div>
        </div>
        <div style="background:var(--s1); padding:10px; border-radius:4px;">
          <div style="font-size:9px; color:#666; margin-bottom:4px;">OPM %</div>
          <div style="font-size:13px; font-weight:800; color:var(--bl);">${fmt(s.opm)}%</div>
        </div>
        <div style="background:var(--s1); padding:10px; border-radius:4px;">
          <div style="font-size:9px; color:#666; margin-bottom:4px;">Market Cap</div>
          <div style="font-size:13px; font-weight:800; color:var(--bl);">₹${(num(s.mcap) / 100000).toFixed(1)}L</div>
        </div>
      </div>
      
      <div style="background:var(--s1); padding:12px; border-radius:4px; margin-bottom:12px;">
        <div style="font-size:11px; font-weight:800; margin-bottom:8px; color:var(--bl);">Financial Metrics</div>
        <table style="width:100%; font-size:10px;">
          <tr><td style="padding:6px 0; color:#666;">EPS</td><td style="text-align:right; font-weight:700;">₹${fmt(s.eps)}</td></tr>
          <tr><td style="padding:6px 0; color:#666;">ROCE %</td><td style="text-align:right; font-weight:700;">${fmt(s.roce)}%</td></tr>
          <tr><td style="padding:6px 0; color:#666;">NPM %</td><td style="text-align:right; font-weight:700;">${fmt(s.npm)}%</td></tr>
          <tr><td style="padding:6px 0; color:#666;">PB Ratio</td><td style="text-align:right; font-weight:700;">${fmt(s.pb)}</td></tr>
        </table>
      </div>
      
      <div style="background:var(--s1); padding:12px; border-radius:4px;">
        <div style="font-size:11px; font-weight:800; margin-bottom:8px; color:var(--bl);">Holdings</div>
        <table style="width:100%; font-size:10px;">
          <tr><td style="padding:6px 0; color:#666;">Quantity</td><td style="text-align:right; font-weight:700;">${num(s.qty)}</td></tr>
          <tr><td style="padding:6px 0; color:#666;">Avg Price</td><td style="text-align:right; font-weight:700;">₹${fmt(s.avg)}</td></tr>
          <tr style="border-top:1px solid #333;"><td style="padding:6px 0; color:#666; font-weight:700;">P&L</td><td style="text-align:right; font-weight:700; color:var(--gr);">₹${((num(s.ltp) - num(s.avg)) * num(s.qty)).toFixed(0)}</td></tr>
        </table>
      </div>
    </div>
  `;
}

// Start
addDebug('⏳ Page loaded');
init();
</script>

</body>
</html>
