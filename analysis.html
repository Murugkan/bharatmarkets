<!DOCTYPE html>
<html lang="en">
<head>
    <script src="auth-gate.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
    <title>raalan | analysis</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
    <style>
        :root{--bg:#060c18;--s1:#0a0e1a;--card:#0d1222;--b1:#1a2332;--b3:#7a8fa0;--tx1:#f0f6ff;--tx3:#7a8fa0;--ac:#00f2ff;--gr:#00e896;--rd:#ff6b85;--yw:#ffbf47}
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:var(--bg);color:var(--tx1);font-family:'JetBrains Mono',monospace;height:100vh;overflow:hidden;padding-top:max(0px, env(safe-area-inset-top))}
        
        .container{display:flex;flex-direction:column;height:100vh;overflow:hidden}
        
        .header{background:var(--s1);padding:5px 12px;border-bottom:1px solid var(--b1);display:flex;justify-content:space-between;align-items:center;gap:12px;flex-shrink:0}
        .header-left{flex:1;display:flex;align-items:center;gap:8px}
        .header-title{font-size:14px;font-weight:800;color:var(--ac)}
        .header-subtitle{font-size:9px;color:var(--tx3);margin-top:1px}
        .header-price{text-align:right;display:flex;flex-direction:column}
        .price-val{font-size:14px;font-weight:800}
        .price-chg{font-size:10px;margin-top:1px}
        
        .tabs{background:var(--card);padding:5px 12px;border-bottom:1px solid var(--b1);display:flex;gap:8px;overflow-x:auto;flex-shrink:0}
        .tabs::-webkit-scrollbar{height:4px}
        .tabs::-webkit-scrollbar-track{background:var(--s1)}
        .tabs::-webkit-scrollbar-thumb{background:var(--b1);border-radius:2px}
        .tab{padding:8px 14px;background:transparent;border:1px solid var(--b1);border-radius:4px;color:var(--tx3);cursor:pointer;font-size:10px;font-weight:700;white-space:nowrap;transition:all .2s}
        .tab.active{background:rgba(0,242,255,.1);border-color:var(--ac);color:var(--ac)}
        .tab:hover:not(.active){color:var(--tx1)}
        
        .content{flex:1;overflow-y:scroll !important;overflow-x:hidden;padding:12px;padding-bottom:100px;scrollbar-width:thin;scrollbar-color:rgba(0,242,255,.6) var(--s1);min-height:0;height:100%;-webkit-overflow-scrolling:touch;contain:layout style paint;will-change:scroll-position}
        .content.canvas-active{padding:0 !important;overflow:hidden !important}
        .content::-webkit-scrollbar{width:14px;background:transparent}
        .content::-webkit-scrollbar-track{background:transparent}
        .content::-webkit-scrollbar-thumb{background:rgba(0,242,255,.6);border-radius:8px;transition:all .2s;min-height:40px;border:3px solid transparent;background-clip:padding-box}
        .content::-webkit-scrollbar-thumb:hover{background:var(--ac);border-color:var(--ac);background-clip:padding-box}
        
        .footer{position:fixed;bottom:0;width:100%;background:rgba(0,0,0,.95);border-top:1px solid var(--b1);display:flex;justify-content:space-around;padding:12px 0;z-index:100;flex-shrink:0}
        .footer-btn{text-decoration:none;color:#666;display:flex;flex-direction:column;align-items:center;width:33%;font-size:8px;text-transform:uppercase;font-weight:800;transition:color .2s}
        .footer-btn.active{color:var(--ac)}
        
        .back-btn{background:none;border:none;color:var(--tx1);font-size:18px;cursor:pointer;padding:2px 4px;line-height:1}
        
        .placeholder{text-align:center;padding:40px 20px;color:var(--tx3)}
        .placeholder-emoji{font-size:32px;margin-bottom:12px}
        .tbd{color:#9d8cff;opacity:.7;font-weight:700}
        
        /* TBD Link - Clickable */
        .tbd-link{color:#9d8cff;opacity:0.9;font-weight:700;cursor:pointer;border-bottom:1px dashed #9d8cff;text-decoration:none;transition:all .2s}
        .tbd-link:hover{opacity:1;color:#b8acff;border-bottom:1px solid #b8acff}
        
        /* Metric Value Colors */
        .val-positive{color:var(--gr);font-weight:700}
        .val-negative{color:var(--rd);font-weight:700}
        .val-neutral{color:var(--yw);font-weight:700}
        .val-warning{color:var(--yw);font-weight:700}
        
        /* Metric Row */
        .metric-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid rgba(26,35,50,.2);color:var(--tx3);font-size:11px;line-height:1.3}
        .metric-row:last-child{border-bottom:none}
        .metric-label{flex:1;font-size:10px}
        .metric-value{text-align:right;font-weight:700;min-width:70px;font-size:11px}
        
        /* Section Container for Two Columns */
        .section-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
        .section-row > div{background:var(--card);border:1px solid var(--b1);border-radius:6px;padding:10px}
        
        /* Weightage Summary */
        .weightage-container{background:var(--card);border:1px solid var(--b1);border-radius:6px;padding:0 6px 6px 6px;margin-bottom:6px;display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:4px}
        .weightage-box{text-align:center;padding:4px;background:rgba(0,0,0,.3);border-radius:4px}
        .weightage-label{font-size:7px;color:var(--tx3);text-transform:uppercase;margin-bottom:2px}
        .weightage-value{font-size:18px;font-weight:800}
        .pos-box .weightage-value{color:var(--gr)}
        .neg-box .weightage-value{color:var(--rd)}
        .neu-box .weightage-value{color:var(--yw)}
        .signal-box .weightage-value{font-size:14px}
        .signal-label{font-size:8px;color:var(--tx3);margin-top:4px;text-transform:uppercase;font-weight:700}
        
        /* NEWS TAB STYLES */
        .sec-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--tx2);margin-bottom:12px;display:flex;gap:4px}
        .u-pad14c{padding:14px;color:var(--tx3);text-align:center;font-size:11px}
        .u-tx3-10mt{font-size:10px;color:var(--tx3);margin-top:3px}
        .imp-L{background:#888}
        .pill{font-size:7px;padding:2px 5px;border-radius:3px;background:var(--b1);color:var(--tx3)}
        .pill-bl{background:#1e3350;color:#64b5f6}
        
        /* NEWS */
        .news-card{padding:10px 12px;border-bottom:1px solid rgba(255,255,255,0.06);cursor:pointer}
        .news-card:last-child{border-bottom:none}
        .news-card:active{background:rgba(255,255,255,0.04)}
        .news-meta{display:flex;align-items:center;gap:6px;margin-bottom:5px;flex-wrap:wrap}
        .news-source{font-size:10px;font-weight:700;color:var(--ac)}
        .news-age{font-size:9px;color:var(--tx3);margin-left:auto}
        .news-headline{font-size:12px;color:var(--tx1);line-height:1.45;font-weight:500}
        .badge{font-size:8px;padding:2px 5px;border-radius:3px;font-weight:700;color:#fff;white-space:nowrap}
        .badge-H{background:#e53935}
        .badge-M{background:#f57c00}
        .badge-L{background:#546e7a}
        .badge-tag{background:#1e3350;color:#64b5f6;font-size:8px;padding:2px 5px;border-radius:3px}
        /* ── Research-note presentation (fundamentals + insights tabs) ── */
        .fx-sec{display:flex;align-items:baseline;gap:10px;margin:20px 2px 10px}
        .fx-num{font-size:9px;font-weight:800;letter-spacing:1px}
        .fx-ttl{font-size:10.5px;font-weight:800;color:var(--tx1);letter-spacing:2px;text-transform:uppercase}
        .fx-rule{flex:1;height:1px;background:linear-gradient(90deg,var(--b1),transparent)}
        .fx-card{background:linear-gradient(180deg,#0f1528,#0b101e);border:1px solid var(--b1);border-radius:10px;overflow:hidden;margin-bottom:10px;box-shadow:0 2px 10px rgba(0,0,0,.35)}
        .fx-card-h{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:9px 13px;background:rgba(255,255,255,.025);border-bottom:1px solid var(--b1)}
        .fx-card-b{padding:11px 13px}
        .fx-lab{font-size:8px;font-weight:800;color:var(--tx3);text-transform:uppercase;letter-spacing:1.2px}
        .fx-prose{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',Roboto,sans-serif;font-size:11.5px;color:var(--tx1);line-height:1.65;letter-spacing:.1px}
        .fx-metric{font-size:9.5px;color:var(--tx3);line-height:1.6;margin-bottom:7px;padding-bottom:7px;border-bottom:1px dashed rgba(26,35,50,.7)}
        .fx-foot{font-size:9px;line-height:1.5;margin-top:7px;opacity:.85;font-family:-apple-system,BlinkMacSystemFont,sans-serif}
        .fx-badge{flex-shrink:0;font-size:7.5px;font-weight:800;border:1px solid;border-radius:20px;padding:2px 8px;text-transform:uppercase;letter-spacing:.6px;white-space:nowrap}
        .fx-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;display:inline-block}
        .fx-kv{display:flex;gap:12px;padding:8px 0;border-bottom:1px solid rgba(26,35,50,.45)}
        .fx-kv:last-child{border-bottom:none}
        .fx-kv:first-child{padding-top:2px}
        .fx-kv-l{flex:0 0 92px;font-size:8px;font-weight:800;color:var(--tx3);text-transform:uppercase;letter-spacing:.8px;padding-top:2px;line-height:1.4}
        .fx-kv-v{flex:1}
        .fx-stack{padding:8px 0;border-bottom:1px solid rgba(26,35,50,.45)}
        .fx-stack:last-child{border-bottom:none}
        .fx-stack:first-child{padding-top:2px}
        .fx-stack .fx-lab{margin-bottom:4px;display:block}
        .fx-li{display:flex;align-items:flex-start;gap:8px;padding:3px 0}
        .fx-li-m{font-size:10px;line-height:1.6;flex-shrink:0;font-weight:700}
        .fx-li .fx-badge{margin-top:2px}
        .fx-chip{flex:1;display:flex;align-items:center;justify-content:space-between;gap:8px;background:linear-gradient(180deg,#0f1528,#0b101e);border:1px solid var(--b1);border-radius:10px;padding:10px 12px}
        .fx-score{display:flex;flex-wrap:wrap;gap:6px 12px;margin-top:10px;padding-top:10px;border-top:1px solid var(--b1)}
        .fx-score-i{display:inline-flex;align-items:center;gap:5px;font-size:8px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.6px}
    </style>
</head>
<body>
<div class="container">
    
    <div class="header">
        <div class="header-left">
            <button class="back-btn" onclick="history.back()">←</button>
            <div>
                <div class="header-title" id="ticker">—</div>

            <div class="price-val" id="ltp">₹—</div>

<script>

const DB = "raalanportfolio";
const STORE = "stocks";
let currentStock = null;
let currentTab = "overview";


// ✅ Canvas Chart State (REQUIRED for chart functions)
const S = {
  chartRange: 'MAX',  // period dropdown removed — always show full available history
  chartInterval: 'M',  // only ohlcv_monthly exists now (daily/weekly removed from pipeline)
  navInterval: 'M',    // mutual fund NAV chart's own D/W/M toggle (separate from chartInterval). Defaults to monthly; user can switch to D/W via the toolbar buttons
  maVis: { vol: true },
  kpiVis: { pe: false, rev: false, net: false, cfo: false, ncf: false, opm: false, op: false, pbt: false, eps: false, fcf: false, assets: false, borrowings: false, interest: false, ccr: false, promoter: false, roce: false, divpayout: false },
  chartPan: 0,
  panOffset: 0,
  chartZoom: 1,
  yAxisZoom: 1,       // ✅ Vertical zoom (bar height)
  yPanOffset: 0,      // Vertical pan (price shift fraction of range)
  panStart: null,     // Pan start position
  financialSource: { accounting: 'consolidated', frequency: 'annual' },  // ✅ NEW: User selected data source (consolidated/standalone, annual/quarterly)
  kpiControlsExpanded: false  // chart KPI/filter rows collapsed by default to maximize chart space
};
let candlestickBars = [];  // ✅ Track bar positions for click detection
let kpiPoints = [];  // ✅ Track KPI overlay points for tooltip clicks
let maPoints = [];   // Track MA line points for click/tooltip


// Helpers
const num = (v) => typeof v === 'number' ? v : parseFloat(v) || 0;
const fmt = (v, decimals = 2) => num(v) === 0 && !v ? '—' : num(v).toFixed(decimals);
const get = (obj, ...keys) => {
    if (!obj) return '—';
    
    // Try exact key first (for direct properties)
    for (let k of keys) {
        if (obj[k] !== undefined && obj[k] !== null) return obj[k];
    }
    
    // Try field mapping (for nested properties)
    for (let k of keys) {
        const resolved = resolveField(obj, k);
        if (resolved !== undefined && resolved !== null) return resolved;
    }
    
    return '—';
};

// ✅ Update financial data source (consolidated/standalone, annual/quarterly)
function updateFinancialSource(value, type) {
  S.financialSource[type] = value;
  
  // Recalculate KPI overlays with new source
  if(currentStock) {
    // Clear cached quarterly data so it's recalculated with new source
    delete currentStock._quarterlyCache;
    scheduleChartRedraw();
  }
}


// Detects mutual fund / SGB / QSIF records — these carry price.ltp_nav and
// nav_history.periods instead of equity OHLCV (price.ohlcv_monthly) and
// financials/ratios/valuation (all empty {} for these instrument types).
// Builds (and memoizes on the stock object) the sorted daily NAV point array
// from nav_history.periods. Single source of truth — both the toolbar (which
// needs point count early, for D/W/M button highlighting) and the chart
// drawer call this, so there's no risk of one building an incomplete cache
// (e.g. missing _t timestamps) that the other then trusts as already-built.
function ensureNavCache(s){
  if(!s._navCache) {
    const periods = (s.nav_history && s.nav_history.periods) || {};
    s._navCache = Object.keys(periods)
      .map(d => ({ d, v: parseFloat(periods[d]) || 0 }))
      .filter(p => p.d && p.v > 0)
      .sort((a, b) => a.d.localeCompare(b.d));
    s._navCache.forEach(p => { if(!p._t) p._t = new Date(p.d).getTime(); });
  }
  return s._navCache;
}

function isMutualFund(s) {
    if (!s) return false;
    const it = (s.company_details && s.company_details.instrument_type) || s.instrument_type || '';
    if (String(it).toUpperCase().includes('MUTUAL FUND')) return true;
    // Fallback: presence of nav_history.periods with no equity OHLCV is also
    // a reliable signal, in case instrument_type is missing/renamed upstream.
    const hasNavHistory = !!(s.nav_history && s.nav_history.periods && Object.keys(s.nav_history.periods).length);
    const hasOhlcv = !!(s.price && s.price.ohlcv_monthly && s.price.ohlcv_monthly.length);
    return hasNavHistory && !hasOhlcv;
}

// 🎯 INDEXEDDB FIELD MAPPING RESOLVER
// Maps analysis.html field paths to IndexedDB stock object structure
const fieldMapping = {
    // Price & Performance (from price object)
    'ltp': ['price.ltp.price'],
    'price': ['price.ltp.price'],
    'changePct': ['price.ltp.change_pct', 'price.price_change_pct'],
    'change': ['price.ltp.change', 'price.price_change'],
    'chg1d': ['price.ltp.change', 'price.price_change'],
    
    // Valuation (from valuation.pe.pe_ttm and valuation.eps.eps_ttm)
    'trailing_pe': ['valuation.pe.pe_ttm'],
    'pe': ['valuation.pe.pe_ttm'],
    'forward_pe': ['valuation.pe.pe_forward'],
    'price_to_book': ['valuation.pe.price_to_book'],
    'pb': ['valuation.pe.price_to_book'],
    'price_to_sales': ['valuation.pe.price_to_sales'],
    'ev_to_ebitda': ['valuation.pe.ev_to_ebitda'],
    'ev_to_revenue': ['valuation.pe.ev_to_revenue'],
    'peg': ['valuation.pe.peg', 'valuation.pe.peg_ttm'],
    'book_value': ['valuation.market.book_value'],
    
    // EPS Values (from valuation.eps.eps_ttm)
    'trailing_eps': ['valuation.eps.eps_ttm'],
    'eps_ttm': ['valuation.eps.eps_ttm'],
    'forward_eps': ['valuation.eps.eps_forward'],
    'basic_eps': ['valuation.history.basic_eps'],
    'diluted_eps': ['valuation.history.diluted_eps'],
    
    // Market Cap & Enterprise Value
    'market_cap': ['valuation.market.market_cap'],
    'mcap': ['valuation.market.market_cap'],
    'enterprise_value': ['valuation.market.enterprise_value'],
    'basic_shares': ['valuation.history.basic_shares'],
    'diluted_shares': ['valuation.history.diluted_shares'],

    // Flat financial fields (from financials object)
    'ebitda': ['valuation.market.ebitda'],
    'ebit': ['financials.ebit'],
    'gross_profit': ['financials.gross_profit'],
    'net_profit_flat': ['financials.net_profit'],
    'revenue_flat': ['financials.revenue'],
    'total_debt_flat': ['financials.borrowings'],
    'cash_and_equivalents': ['financials.cash_and_equivalents'],
    'accounts_receivable': ['financials.accounts_receivable'],
    'working_capital': ['financials.working_capital'],
    'invested_capital': ['financials.invested_capital'],
    
    // ✅ COMPREHENSIVE FINANCIAL METRICS with user-selected source
    // Uses {accounting} = consolidated/standalone, {frequency} = annual/quarterly
    // Income Statement
    'sales': ['financials.revenue.{accounting}.{frequency}'],
    'revenue': ['financials.revenue.{accounting}.{frequency}'],
    'net_profit': ['financials.net_profit.{accounting}.{frequency}'],
    'net_income': ['financials.net_profit.{accounting}.{frequency}'],
    'operating_profit': ['financials.ebit.{accounting}.{frequency}'],
    'op': ['financials.ebit.{accounting}.{frequency}'],
    'opm_pct': ['financials.operating_margin_pct.{accounting}.{frequency}'],
    'operating_margin': ['financials.operating_margin_pct.{accounting}.{frequency}'],
    'profit_before_tax': ['financials.profit_before_tax.{accounting}.{frequency}'],
    'pbt': ['financials.profit_before_tax.{accounting}.annual'],
    'tax_pct': ['financials.tax_rate_pct.{accounting}.{frequency}'],
    'tax': ['financials.tax_rate_pct.{accounting}.annual'],
    'eps': ['financials.eps.{accounting}.{frequency}'],
    'earnings_per_share': ['financials.eps.{accounting}.annual'],
    'depreciation': ['financials.depreciation.{accounting}.{frequency}'],
    'interest_expense': ['financials.interest.{accounting}.{frequency}'],
    'interest': ['financials.interest.{accounting}.annual'],
    'other_income': ['financials.other_income.{accounting}.{frequency}'],
    'expenses': ['financials.expenses.{accounting}.{frequency}'],
    
    // Balance Sheet - Assets (annual only)
    'total_assets': ['financials.total_assets.{accounting}.annual'],
    'assets': ['financials.total_assets.{accounting}.annual'],
    'fixed_assets': ['financials.net_fixed_assets.{accounting}.annual'],
    'other_assets': ['financials.other_assets.{accounting}.annual'],
    'investments': ['financials.investments.{accounting}.annual'],
    'cwip': ['financials.capital_wip.{accounting}.annual'],
    
    // Balance Sheet - Liabilities (annual only)
    'total_liabilities': ['financials.total_liabilities.{accounting}.annual'],
    'liabilities': ['financials.total_liabilities.{accounting}.annual'],
    'borrowings': ['financials.borrowings.{accounting}.annual'],
    'debt': ['financials.borrowings.{accounting}.annual'],
    'other_liabilities': ['financials.other_liabilities.{accounting}.annual'],
    
    // Balance Sheet - Equity (annual only)
    'equity_capital': ['financials.share_capital.{accounting}.annual'],
    'reserves': ['financials.reserves.{accounting}.annual'],
    
    // Cash Flow (annual only)
    'cfo': ['financials.operating_cash_flow.{accounting}.annual'],
    'operating_cash_flow': ['financials.operating_cash_flow.{accounting}.annual'],
    'cfi': ['financials.investing_cash_flow.{accounting}.annual'],
    'cff': ['financials.financing_cash_flow.{accounting}.annual'],
    'net_cash_flow': ['financials.net_cash_flow.{accounting}.annual'],
    'free_cash_flow': ['financials.fcf.{accounting}.annual'],
    'fcf': ['financials.fcf.{accounting}.annual'],
    'cfo_over_op': ['financials.cash_conversion_ratio.{accounting}.annual'],
    
    // Dividend
    'dividend_payout_pct': ['financials.dividend_payout_pct.{accounting}.annual'],

    // Ratios (from ratios object - flat keys per metadata)
    'roce': ['ratios.screener.roce_pct'],
    'return_on_capital_employed': ['ratios.screener.roce_pct'],
    'return_on_equity': ['derived_metrics.calculated_metrics.roe_pct', 'ratios.ttm.roe_pct'],
    'roe': ['derived_metrics.calculated_metrics.roe_pct', 'ratios.ttm.roe_pct'],

// 🎯 RESOLVE FIELD FROM INDEXEDDB STOCK OBJECT
function resolveField(stock, fieldName) {
    const paths = fieldMapping[fieldName];
    if (!paths) return undefined;
    
    const accounting = S.financialSource?.accounting || 'consolidated';
    const frequency = S.financialSource?.frequency || 'annual';
    
    const resolvedPaths = paths.map(path => 
      path.replace('{accounting}', accounting).replace('{frequency}', frequency)
    );
    
    for (let path of resolvedPaths) {
        const value = getNestedValue(stock, path);
        if (value !== undefined && value !== null) return value;
    }
    return undefined;
}

// Helper to get nested object value by dot notation
function getNestedValue(obj, path) {
    if (!obj) return undefined;
    const parts = path.split('.');
    let current = obj;
    for (let part of parts) {
        if (current && typeof current === 'object' && part in current) {
            current = current[part];
        } else {
            return undefined;
        }
    }
    return current;
}

// Count Positive/Negative/Neutral signals from
// derived_metrics.ai_insights_guidance.insights.analysis.*.signal
// (e.g. valuation, growth, profitability, cash_strength, catalyst, moat, opportunity)
function getSignalCounts(stock) {
    const analysis = getNestedValue(stock, 'derived_metrics.ai_insights_guidance.insights.analysis');
    let pos = 0, neg = 0, neutral = 0;
    if (analysis && typeof analysis === 'object') {
        for (const pillar of Object.values(analysis)) {
            const sig = (pillar && pillar.signal || '').toLowerCase();
            if (sig === 'positive') pos++;
            else if (sig === 'negative') neg++;
            else if (sig === 'neutral') neutral++;
        }
    }
    return { pos, neg, neutral, total: pos + neg + neutral };
}

// Get URL param
const urlParams = new URLSearchParams(window.location.search);
const ticker = urlParams.get('drill') || urlParams.get('t');




async function loadStock() {
    if (!ticker) {
        document.getElementById('content').innerHTML = `
            <div class="placeholder">
                <div class="placeholder-emoji">❌</div>
                <div>No stock selected</div>
                <div style="font-size:9px;color:#9d8cff;margin-top:8px">Use: analysis.html?drill=TICKER</div>
            </div>`;
        return;
    }

    const db = await new Promise(r => {
        const req = indexedDB.open(DB, 8);
        req.onsuccess = () => r(req.result);
        req.onerror = () => r(null);
    });

    if (!db) {
        document.getElementById('content').innerHTML = '<div class="placeholder"><div class="placeholder-emoji">⚠️</div>Database error</div>';
        return;
    }

    try {
        const tx = db.transaction(STORE, 'readonly');
        const store = tx.objectStore(STORE);
        currentStock = await new Promise(r => {
            const req = store.get(ticker);
            req.onsuccess = () => r(req.result);
            req.onerror = () => r(null);
        });
        
        if (!currentStock) {
            document.getElementById('content').innerHTML = '<div class="placeholder"><div class="placeholder-emoji">🔍</div>Stock not found: ' + ticker + '</div>';
            return;
        }

        // Build s.candles from price history — only ohlcv_monthly exists now
        if (!currentStock.candles || currentStock.candles.length === 0) {
            let historyData = null;
            if (currentStock.price && currentStock.price.ohlcv_monthly && Array.isArray(currentStock.price.ohlcv_monthly))
                historyData = currentStock.price.ohlcv_monthly;

            if (historyData && historyData.length > 0) {
                try {
                    currentStock.candles = historyData.map(bar => ({
                        d: bar.Date,
                        o: parseFloat(bar.Open),
                        h: parseFloat(bar.High),
                        l: parseFloat(bar.Low),
                        c: parseFloat(bar.Close),
                        v: parseInt(bar.Volume) || 0
                    })).filter(bar => !isNaN(bar.o) && !isNaN(bar.h) && !isNaN(bar.l) && !isNaN(bar.c));
                } catch(e) { currentStock.candles = []; }
            }
        }

        renderHeader();
        const hashTab = window.location.hash.replace('#', '');
        const validTabs = ['overview','canvas','news','charts','fundamentals','guidance'];
        const initTab = validTabs.includes(hashTab) ? hashTab : 'overview';
        if (initTab !== 'overview') {
            document.querySelectorAll('.tab').forEach(t => {
                t.classList.toggle('active', t.getAttribute('onclick') === "switchTab('" + initTab + "')");
            });
        }
        document.getElementById('content').classList.toggle('canvas-active', initTab === 'canvas');
        renderTab(initTab);
    } catch(e) {
        document.getElementById('content').innerHTML = '<div class="placeholder"><div class="placeholder-emoji">❌</div>Error: ' + e.message + '</div>';
    }
}

// Render tabs
function renderTab(tab) {
    const s = currentStock;
    let html = '';
    
    if (tab === 'overview') {
        const pe = num(get(s, 'pe', 'trailing_pe'));
        const pb = num(get(s, 'pb', 'price_to_book'));
        const roe = num(get(s, 'roe', 'return_on_equity'));
        const roceData = resolveField(s, 'roce');
        const roce = num(typeof roceData === 'object' && roceData !== null
            ? latestFromDict(roceData) : roceData);
        const opm = num(get(s, 'opm', 'operating_margin', 'operating_margins'));
        const ltp = num(get(s, 'ltp'));
        const faceValue = num(get(s, 'face_value'));
        const mcapRaw = num(get(s, 'mcap', 'market_cap'));
        // valuation.market.market_cap is in rupees; convert to Cr (÷1Cr=10,000,000)
        const mcap = mcapRaw > 1e8 ? mcapRaw / 1e7 : mcapRaw; // if >10Cr in rupees, convert

        // Sales/Revenue: latest annual value from financials
        const salesData = resolveField(s, 'sales');
        const sales = num(typeof salesData === 'object' && salesData !== null
            ? latestFromDict(salesData)
            : salesData);

        // EBITDA: flat field from financials (valuation.market.ebitda is in
        // rupees; convert to Cr, same as market_cap)
        const ebitdaRaw = num(resolveField(s, 'ebitda'));
        const ebitda = ebitdaRaw > 1e8 ? ebitdaRaw / 1e7 : ebitdaRaw;

        // CFO / FCF: latest annual value
        const cfoData = resolveField(s, 'cfo');
        const cfo = num(typeof cfoData === 'object' && cfoData !== null
            ? latestFromDict(cfoData)
            : cfoData);

        const fcfData = resolveField(s, 'fcf');
        const fcf = num(typeof fcfData === 'object' && fcfData !== null
            ? latestFromDict(fcfData)
            : fcfData);

        const eps = num(get(s, 'eps_ttm', 'trailing_eps'));

        // Ownership: time-series dicts — get latest date value
        function latestFromDict(dict) {
            if (!dict || typeof dict !== 'object') return 0;
            const keys = Object.keys(dict).sort();
            return keys.length ? num(dict[keys[keys.length - 1]]) : 0;
        }
        const promDict = resolveField(s, 'promoter');
        const fiiDict  = resolveField(s, 'fii');
        const diiDict  = resolveField(s, 'dii');
        const prom = latestFromDict(promDict);
        const fii  = latestFromDict(fiiDict);
        const dii  = latestFromDict(diiDict);

        const quarterly = getQuarterlyData(s);
        
        // EXTRACT: Total Debt — latest annual borrowings
        let totalDebt = 0;
        if (quarterly && quarterly.length > 0) {
            for (let i = quarterly.length - 1; i >= 0; i--) {
                if (quarterly[i].borrowings && num(quarterly[i].borrowings) > 0) {
                    totalDebt = num(quarterly[i].borrowings);
                    break;
                }
            }
        }
        if (!totalDebt) {
            const debtData = resolveField(s, 'debt');
            totalDebt = num(typeof debtData === 'object' && debtData !== null
                ? latestFromDict(debtData) : debtData);
        }
        
        // CALCULATE: Operating Margin Trend from quarterly
        let marginTrend = '—';
        let marginTrendDelta = 0;
        if (quarterly && quarterly.length >= 2) {
            const recent = quarterly.slice(-3).map(q => num(q.opm || 0));
            if (recent.length > 0) {
                marginTrend = recent.map(m => fmt(m)).join('% → ') + '%';
                marginTrendDelta = recent[recent.length - 1] - recent[0];
            }
        }
        
        // CALCULATE: Revenue CAGR (3Y)
        let revenueCagr = 0;
        if (quarterly && quarterly.length >= 4) {
            const oldest = num(quarterly[0].rev || 0);
            const newest = num(quarterly[quarterly.length - 1].rev || 0);
            if (oldest > 0 && newest > 0) {
                const years = (quarterly.length - 1) / 4;
                revenueCagr = (Math.pow(newest / oldest, 1 / years) - 1) * 100;
            }
        }
        
        // CALCULATE: Earnings CAGR (3Y)
        let earningsCagr = 0;
        if (quarterly && quarterly.length >= 4) {
            const oldestEps = num(quarterly[0].eps || 0);
            const newestEps = num(quarterly[quarterly.length - 1].eps || 0);
            if (oldestEps > 0 && newestEps > 0) {
                const years = (quarterly.length - 1) / 4;
                earningsCagr = (Math.pow(newestEps / oldestEps, 1 / years) - 1) * 100;
            }
        }
        
        // CALCULATE: Cash Conversion
        let cashConversion = 0;
        if (quarterly && quarterly.length > 0) {
            const latestNet = num(quarterly[quarterly.length - 1].net || 0);
            if (latestNet > 0 && cfo > 0) {
                cashConversion = (cfo / latestNet) * 100;
            }
        }
        
        // CALCULATE: Interest Coverage = Operating Profit / Interest
        let interestCoverage = 0;
        if (quarterly && quarterly.length > 0) {
            const latest = quarterly[quarterly.length - 1];
            const latestOp = num(latest.op || 0);
            const latestInt = num(latest.interest || 0);
            if (latestOp > 0 && latestInt > 0) {
                interestCoverage = latestOp / latestInt;
            }
        }
        if (!interestCoverage) {
            const intData = resolveField(s, 'interest');
            const intVal = num(typeof intData === 'object' && intData !== null
                ? latestFromDict(intData) : intData);
            const opData = resolveField(s, 'operating_profit');
            const opVal = num(typeof opData === 'object' && opData !== null
                ? latestFromDict(opData) : opData);
            if (opVal > 0 && intVal > 0) interestCoverage = opVal / intVal;
        }
        
        // CALCULATE: Debt/EBITDA = totalDebt / ebitda
        let debtToEbitda = 0;
        if (totalDebt > 0 && ebitda > 0) {
            debtToEbitda = totalDebt / ebitda;
        }
        
        // CALCULATE: FCF Yield = (fcf / mcap) * 100
        const fcfYield = mcap > 0 && fcf > 0 ? ((fcf / mcap) * 100) : 0;
        
        // CALCULATE: EV/EBITDA — use pre-calculated field first
        let evEbitda = num(get(s, 'ev_to_ebitda'));
        if (!evEbitda && mcap > 0 && ebitda > 0) {
            const cash = num(resolveField(s, 'cash_and_equivalents')) || 0;
            const ev = mcap + totalDebt - cash;
            evEbitda = ev / ebitda;
        }

        // EXTRACT: PEG ratio, Current Ratio, Quick Ratio
        const peg = num(get(s, 'peg'));
        const currentRatio = num(get(s, 'current_ratio'));
        const quickRatio = num(get(s, 'quick_ratio'));

        // EXTRACT: ROA, Revenue Growth (TTM), Debt/Equity
        // ratios.ttm.*_pct fields are fractions (0.15 = 15%); debt_to_equity_ratio
        // is already in percent-of-equity terms (9.83 ≈ D/E ratio 0.098).
        const roa = num(get(s, 'roa')) * 100;
        const revGrowthTTM = num(get(s, 'revenue_growth')) * 100;
        const debtToEquity = num(get(s, 'debt_to_equity'));

        // CLASSIFY: 13 real, data-driven metrics as positive/neutral/warning.
        // (Q Score, G Score, Credit were hardcoded placeholders and have
        // been removed from the page entirely — see TBD links below.)
        const peClass    = pe > 0 && pe < 20 ? 'val-positive' : pe >= 20 && pe < 40 ? 'val-neutral' : 'val-negative';
        const pbClass    = pb > 0 && pb < 1.5 ? 'val-positive' : pb >= 1.5 && pb < 3 ? 'val-neutral' : 'val-negative';
        const evClass    = evEbitda > 0 ? (evEbitda < 12 ? 'val-positive' : evEbitda < 20 ? 'val-neutral' : 'val-negative') : 'tbd';
        const roicClass  = roce === 0 ? 'tbd' : roce > 15 ? 'val-positive' : roce > 10 ? 'val-neutral' : 'val-negative';
        const ccClass    = cashConversion > 100 ? 'val-positive' : cashConversion > 50 ? 'val-neutral' : 'val-negative';
        const fcfYClass  = fcfYield > 5 ? 'val-positive' : fcfYield > 2 ? 'val-neutral' : 'tbd';
        const revCagrClass = revenueCagr > 15 ? 'val-positive' : revenueCagr > 8 ? 'val-neutral' : 'tbd';
        const epsCagrClass = earningsCagr > 20 ? 'val-positive' : earningsCagr > 10 ? 'val-neutral' : 'tbd';
        const deClass   = debtToEbitda > 0 && debtToEbitda < 2 ? 'val-positive' : debtToEbitda < 3.5 ? 'val-neutral' : 'val-negative';
        const icClass   = interestCoverage > 5 ? 'val-positive' : interestCoverage > 2 ? 'val-neutral' : 'tbd';
        const promClass = prom > 50 ? 'val-positive' : prom > 30 ? 'val-neutral' : 'val-negative';
        const fiiClass  = fii > 20 ? 'val-positive' : fii > 10 ? 'val-neutral' : 'val-negative';
        const diiClass  = dii > 15 ? 'val-positive' : dii > 10 ? 'val-neutral' : 'val-negative';
        const pegClass  = peg > 0 ? (peg < 1 ? 'val-positive' : peg < 2 ? 'val-neutral' : 'val-negative') : 'tbd';
        const curClass  = currentRatio > 0 ? (currentRatio > 1.5 ? 'val-positive' : currentRatio >= 1 ? 'val-neutral' : 'val-negative') : 'tbd';
        const quickClass = quickRatio > 0 ? (quickRatio > 1 ? 'val-positive' : quickRatio >= 0.5 ? 'val-neutral' : 'val-negative') : 'tbd';
        const roaClass  = roa === 0 ? 'tbd' : roa > 10 ? 'val-positive' : roa > 5 ? 'val-neutral' : 'val-negative';
        const revGrowthClass = revGrowthTTM > 10 ? 'val-positive' : revGrowthTTM > 5 ? 'val-neutral' : 'val-negative';
        const deqClass  = debtToEquity < 50 ? 'val-positive' : debtToEquity < 100 ? 'val-neutral' : 'val-negative';
        const opmTrendClass = marginTrend === '—' ? 'tbd' : (marginTrendDelta > 0.5 ? 'val-positive' : marginTrendDelta < -0.5 ? 'val-negative' : 'val-neutral');

        const allClasses = [peClass, pbClass, evClass, roicClass, ccClass, fcfYClass, revCagrClass, epsCagrClass, deClass, icClass, promClass, fiiClass, diiClass, pegClass, curClass, quickClass, roaClass, revGrowthClass, deqClass, opmTrendClass];
        const posSignals = allClasses.filter(c => c === 'val-positive').length;
        const negSignals = allClasses.filter(c => c === 'val-negative').length;
        const neuSignals = allClasses.length - posSignals - negSignals;
        const totalSignals = posSignals + negSignals;
        const posWeightage = totalSignals > 0 ? Math.round((posSignals / totalSignals) * 100) : 0;
        const negWeightage = totalSignals > 0 ? Math.round((negSignals / totalSignals) * 100) : 0;
        const neuWeightage = Math.round((neuSignals / allClasses.length) * 100);

        // COMPUTE: Overall signal — simple majority of pos vs neg metrics
        const signal = posSignals > negSignals ? 'BUY' : negSignals > posSignals ? 'SELL' : 'HOLD';

        // Backend's own pre-computed score, for reference/comparison
        const backendScore = num(get(s, 'fundamental_score'));
        const backendRating = get(s, 'backend_rating');
        
        html = `
            <div style="padding:8px 0;padding-bottom:80px">
            
            <!-- WEIGHTAGE & SIGNAL SUMMARY -->
            <div class="weightage-container">
                <div class="weightage-box pos-box">
                    <div class="weightage-label">Positive</div>
                    <div class="weightage-value">${posWeightage}%</div>
                    <div style="font-size:10px;color:var(--tx3)">+${posSignals}</div>
                </div>
                <div class="weightage-box neg-box">
                    <div class="weightage-label">Negative</div>
                    <div class="weightage-value">${negWeightage}%</div>
                    <div style="font-size:10px;color:var(--tx3)">-${negSignals}</div>
                </div>
                <div class="weightage-box neu-box">
                    <div class="weightage-label">Neutral</div>
                    <div class="weightage-value">${neuWeightage}%</div>
                    <div style="font-size:10px;color:var(--tx3)">${neuSignals}</div>
                </div>
                <div class="weightage-box signal-box">
                    <div class="weightage-label">Signal</div>
                    <div class="weightage-value ${signal === 'BUY' ? 'val-positive' : signal === 'SELL' ? 'val-negative' : 'val-neutral'}">${signal}</div>
                    <div class="signal-label">${signal === 'BUY' ? '📈 Bullish' : signal === 'SELL' ? '📉 Bearish' : '⚪ Neutral'}</div>
                </div>
            </div>
            <div style="text-align:center;font-size:11px;color:var(--tx3);margin:-2px 0 6px 0">
                Backend score: ${backendScore > 0 ? fmt(backendScore, 1) : '—'}/100${backendRating !== '—' && backendRating !== 'NO DATA' ? ' · <span class="' + (backendRating.includes('BUY') ? 'val-positive' : backendRating.includes('SELL') ? 'val-negative' : 'val-neutral') + '">' + backendRating + '</span>' : ''}
            </div>
            
            <!-- ROW 1: Valuation + Quality -->
            <div class="section-row">
                <!-- VALUATION ANALYSIS -->
                <div>
                    <div style="font-weight:800;color:var(--ac);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px;font-size:8px">📊 Valuation</div>
                    <div class="metric-row">
                        <div class="metric-label">Price</div>
                        <div class="metric-value val-neutral">₹${fmt(ltp)}</div>
                    </div>
                    <div class="metric-row">
                        <div class="metric-label">Face Value</div>
                        <div class="metric-value val-neutral">₹${fmt(faceValue, faceValue % 1 === 0 ? 0 : 2)}</div>
                    </div>
                    <div class="metric-row">
                        <div class="metric-label">Fair Value</div>
                        <div class="metric-value">${tbdLink('DCF Fair Value')}</div>
                    </div>
                    <div class="metric-row">
                        <div class="metric-label">P/E</div>
                        <div class="metric-value ${peClass}">${fmt(pe)}x</div>
                    </div>
                    <div class="metric-row">
                        <div class="metric-label">P/B</div>
                        <div class="metric-value ${pbClass}">${fmt(pb)}x</div>
                    </div>
                    <div class="metric-row">
                        <div class="metric-label">EV/EBITDA</div>
                        <div class="metric-value ${evClass}">${evEbitda > 0 ? fmt(evEbitda, 1) + 'x' : tbdLink('EV/EBITDA')}</div>
                    </div>

// Sentiment highlighter: colours positive/negative phrases inside prose
function hlSent(t){
  if(!t) return t;
  const wrap = (s,c) => `<span style="color:${c};font-weight:700">${s}</span>`;
  let out = String(t);
  // Directional numbers: +16%, up ~410 bps, -12%, down 5%
  out = out.replace(/(^|[\s(>])(\+\s?~?\d[\d.,]*\s?(?:%|bps|x\b|Cr\b)?)/g, (m,p,n) => p + wrap(n,'var(--gr)'));
  out = out.replace(/(^|[\s(>])(-\s?~?\d[\d.,]*\s?(?:%|bps))/g, (m,p,n) => p + wrap(n,'var(--rd)'));
  out = out.replace(/\b(up|grew|gained|rose|jumped)(\s+(?:by\s+)?~?\d[\d.,]*\s?(?:%|bps|x)?)/gi, (m,w,n) => wrap(w+n,'var(--gr)'));
  out = out.replace(/\b(down|fell|dropped|declined)(\s+(?:by\s+)?~?\d[\d.,]*\s?(?:%|bps|x)?)/gi, (m,w,n) => wrap(w+n,'var(--rd)'));
  // Positive vocabulary
  out = out.replace(/\b(debt-free|growth|grew|growing|gains?|gaining|improv(?:e|ed|es|ing|ement)s?|strong(?:er|est)?|strengthen(?:ing|ed)?|expand(?:ed|ing|s)?|expansions?|accelerat(?:e|ed|es|ing|ion)|outperform\w*|beat|exceed(?:ed|s|ing)?|breakeven|bullish|upside|record|robust|healthy|tailwinds?|turnaround|de-?leveraging|premiumization|profitable)\b/gi, m => wrap(m,'var(--gr)'));
  // Negative vocabulary
  out = out.replace(/\b(declin(?:e|ed|es|ing)s?|fell|fall(?:ing|s)?|dropp?(?:ed|ing)?|weak(?:er|ness|ening)?|loss(?:es)?|negative|risks?|risky|concerns?|pressur(?:e|es|ed|ing)|headwinds?|downside|downgrad(?:e|ed|es|ing)|caution(?:ary)?|bearish|miss(?:ed|es)?|slowdown|drag|deteriorat\w+|erosion|dilut(?:ive|ion)|stress|threats?|volatil\w+|inflation|overvalu\w+|contraction)\b/gi, m => wrap(m,'var(--rd)'));
  return out;
}

function aggregateCandles(daily, interval){

function getSlicedCandles(s, canvasWidth){
  // Only ohlcv_monthly is produced by the pipeline now (daily/weekly removed)
  const raw = s.price?.ohlcv_monthly?.length ? s.price.ohlcv_monthly : null;

  // Cache normalised array — rebuilt once per stock (no interval switching anymore)
  if(!s._dailyCache) {
    s._dailyCache = raw
      ? raw.map(b => ({
          d: String(b.Date || b.d || ''),
          o: parseFloat(b.Open  || b.o || 0),
          h: parseFloat(b.High  || b.h || 0),
          l: parseFloat(b.Low   || b.l || 0),
          c: parseFloat(b.Close || b.c || 0),
          v: parseInt(b.Volume  || b.v || 0)
        })).filter(b => b.d && b.c > 0)
        .sort((a, b) => a.d.localeCompare(b.d))
      : (s.candles || []);
    // Pre-parse timestamps for fast date math
    s._dailyCache.forEach(b => { if(!b._t) b._t = new Date(b.d).getTime(); });
  }
  const daily = s._dailyCache;

  if (!daily.length) return [];

  // Period dropdown removed — always show full available history
  let f = daily;
  if (!f.length) return [];

  const w = Math.max(100, canvasWidth || 320);
  const base = Math.max(20, Math.floor((w-60)/7));
  const vis  = Math.max(10, Math.round(base / S.chartZoom));
  const maxP = Math.max(0, f.length - vis);
  const pan  = Math.max(0, Math.min(maxP, Math.floor(S.panOffset)));
  const end  = f.length - pan;
  return f.slice(Math.max(0, end - vis), end);
}

// Mutual fund / SGB / QSIF equivalent of getSlicedCandles — nav_history.periods
// is a flat {date: navValue} map (no open/high/low/volume), so this produces
// a sorted array of {d, v} points instead of OHLCV bars. Same pan/zoom math
// as getSlicedCandles so the existing gesture handlers work unchanged.
// Daily NAV history can run into thousands of points (10+ years), which makes
// panning tedious — so this aggregates to weekly/monthly (last value of the
// period, i.e. standard "period-end NAV") based on S.navInterval.
function aggregateNavPoints(daily, interval){
  if(interval === 'D' || !daily.length) return daily;
  const buckets = new Map(); // key -> last point seen for that key (input is date-sorted, so last write wins)
  daily.forEach(p => {
    const dt = new Date(p._t);
    let key;
    if(interval === 'W'){
      // ISO week key: Monday of that week, as YYYY-MM-DD
      const day = (dt.getUTCDay() + 6) % 7; // 0=Mon..6=Sun
      const monday = new Date(dt); monday.setUTCDate(dt.getUTCDate() - day);
      key = monday.toISOString().slice(0,10);
    } else { // 'M'
      key = dt.getUTCFullYear() + '-' + String(dt.getUTCMonth()+1).padStart(2,'0');
    }
    buckets.set(key, p); // last (most recent) point in the bucket wins — period-end NAV
  });
  return Array.from(buckets.values()).sort((a,b) => a.d.localeCompare(b.d));
}

// Picks a sensible default interval per fund based on how much daily history
// it actually has — funds range from <1yr (QSIF-style new launches) to 12+yrs
// (older AMFI funds), so a single fixed default either over-aggregates short
// histories or leaves long histories too dense to pan smoothly.
// Thresholds: <= ~9 months of daily points stays daily; up to ~4 years goes
// weekly; beyond that goes monthly.
function resolveNavInterval(s){
  const daily = s._navCache || [];
  const n = daily.length;
  if(n <= 200) return 'D';      // ~9 months of trading days
  if(n <= 1100) return 'W';     // ~4-4.5 years
  return 'M';
}

function getSlicedNavPoints(s, canvasWidth){
  const daily = ensureNavCache(s);
  if (!daily.length) return [];

  // S.navInterval is null until the user manually picks D/W/M for this stock
  // (set by setNavInterval). Until then, auto-resolve per-fund and remember
  // it as the active interval so the toolbar buttons highlight correctly.
  const interval = S.navInterval || resolveNavInterval(s);
  if(!s._navAggCache) s._navAggCache = {};
  if(!s._navAggCache[interval]) s._navAggCache[interval] = aggregateNavPoints(daily, interval);
  const all = s._navAggCache[interval];
  if (!all.length) return [];

  const w = Math.max(100, canvasWidth || 320);
  const base = Math.max(20, Math.floor((w-60)/7));
  const vis  = Math.max(10, Math.round(base / S.chartZoom));
  const maxP = Math.max(0, all.length - vis);
  const pan  = Math.max(0, Math.min(maxP, S.panOffset));
  const end  = all.length - pan;
  return all.slice(Math.max(0, end - vis), end);
}

// Mutual fund equivalent of drawCandlestick — draws a single connected NAV
// line + dots, reusing the same canvas sizing, grid, axis label, and
// pan/zoom (S.panOffset/S.chartZoom) conventions as the equity OHLC chart.
function drawNavLine(s){
  try {
    const cv = document.getElementById('cv-candle');
    if(!cv) return;
    kpiPoints = [];
    maPoints = [];
    candlestickBars = [];

    const wrap = document.getElementById('chart-wrap');
    const W2 = Math.max(wrap?wrap.offsetWidth:0, cv.offsetWidth, 280);
    const H2 = Math.max(wrap?wrap.offsetHeight:0, cv.offsetHeight, 300);
    const dpr = window.devicePixelRatio || 1;
    cv.width = W2*dpr; cv.height = H2*dpr;
    cv.style.width = W2+'px'; cv.style.height = H2+'px';
    const ctx = cv.getContext('2d');
    ctx.scale(dpr,dpr);
    ctx.imageSmoothingEnabled = false;

    const pts = getSlicedNavPoints(s, W2);
    if(!pts.length){
      ctx.fillStyle='#060c18'; ctx.fillRect(0,0,W2,H2);
      ctx.textAlign='center';
      ctx.fillStyle='rgba(120,150,180,.4)'; ctx.font='12px DM Sans';
      ctx.fillText('No NAV history for '+(s.ticker||s.sym), W2/2, H2/2);
      return;
    }

    const W=W2, H=H2;
    const PAD={l:8,r:40,t:8,b:21};
    const cW=W-PAD.l-PAD.r, cH=H-PAD.t-PAD.b;
    const n=pts.length;

    pts.forEach(p => { if(!p._t) p._t = new Date(p.d).getTime(); });
    const visFirst = pts[0]._t, visLast = pts[n-1]._t;
    const visRange = visLast - visFirst || 1;

    let mn=Infinity, mx=-Infinity;
    for(let i=0;i<n;i++){ if(pts[i].v<mn)mn=pts[i].v; if(pts[i].v>mx)mx=pts[i].v; }
    if(mn===Infinity||mx===-Infinity){ mn=0; mx=1; }
    // Small headroom so the line doesn't touch the very top/bottom edge
    const pad = (mx-mn)*0.06 || mx*0.02 || 1;
    mn -= pad; mx += pad;
    const rng = mx-mn || 1;

    const toY = v => PAD.t + ((mx-v)/rng) * cH;
    const toX = t => PAD.l + ((t-visFirst)/visRange) * cW;
    const barHeightZoom = S.yAxisZoom || 1.0;
    const midY = PAD.t + cH/2;
    const zoomY = y => midY - (midY-y)*barHeightZoom;

    // Background
    ctx.fillStyle='#070c18';
    ctx.fillRect(0,0,W,H);

    // X-axis tick step, computed once and shared by the vertical gridlines
    // and the date labels below, so they line up with each other. Spacing
    // assumption (70px/label) accounts for actual "MM/YY" label width at
    // 12px bold — narrower spacing caused centered labels to overlap.
    const xMaxLabels = Math.max(6, Math.min(8, Math.floor(cW/70)));
    const xLblStep = Math.max(1, Math.floor(n/xMaxLabels));

    // Grid lines — denser than the equity chart since NAV oscillations are
    // often small relative to the full y-range.
    const GRID_DIV = 8;
    for(let i=0;i<=GRID_DIV;i++){
      const y=PAD.t+(cH/GRID_DIV)*i;
      ctx.strokeStyle='rgba(255,255,255,.22)';ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(PAD.l,y);ctx.lineTo(PAD.l+cW,y);ctx.stroke();
    }
    // Vertical gridlines at the same X positions the date labels use below.
    pts.forEach((p,i) => {
      if(i % xLblStep !== 0 && i !== n-1) return;
      const x = toX(p._t);
      ctx.strokeStyle='rgba(255,255,255,.22)';ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(x,PAD.t);ctx.lineTo(x,PAD.t+cH);ctx.stroke();
    });

    // Right axis separator
    ctx.fillStyle='rgba(7,12,24,.8)';
    ctx.fillRect(W-PAD.r,0,PAD.r,H);
    ctx.strokeStyle='rgba(100,130,180,.6)';
    ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(W-PAD.r,0);ctx.lineTo(W-PAD.r,H);ctx.stroke();

    // NAV value labels (right axis) — matches GRID_DIV above
    for(let i=0;i<=GRID_DIV;i++){
      const y=PAD.t+(cH/GRID_DIV)*i;
      const v=mx-(mx-mn)*(i/GRID_DIV);
      ctx.fillStyle='rgba(255,255,255,1)';
      ctx.font='bold 11px JetBrains Mono,monospace';ctx.textAlign='right';ctx.textBaseline='middle';
      ctx.fillText(Math.round(v).toLocaleString('en-IN'), W-6, y);
    }

    // Clip chart drawing to chart area
    ctx.save();
    ctx.beginPath();
    ctx.rect(PAD.l, 0, cW, H);
    ctx.clip();

    // NAV line — green if up over the visible window, red if down
    const up = pts[n-1].v >= pts[0].v;
    const lineCol = up ? 'rgba(0,255,136,.95)' : 'rgba(255,68,102,.95)';
    ctx.strokeStyle = lineCol;
    ctx.lineWidth = 1.5; // constant width regardless of zoom, like a price line
    ctx.beginPath();
    pts.forEach((p,i) => {
      const x = toX(p._t), y = zoomY(toY(p.v));
      candlestickBars.push({ date:p.d, close:p.v, x:x-2, y:y-2, w:4, h:4 }); // minimal hit-box for future tooltip reuse
      i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
    });
    ctx.stroke();

    // Dot on the last point
    const lastX = toX(pts[n-1]._t), lastY = zoomY(toY(pts[n-1].v));
    ctx.fillStyle = lineCol;
    ctx.beginPath();
    ctx.arc(lastX, lastY, 3, 0, Math.PI*2);
    ctx.fill();

    ctx.restore();

    // Current NAV dashed line + badge
    const navVal = (s.price && s.price.ltp_nav) || pts[n-1].v;
    const navY = zoomY(toY(navVal));
    ctx.strokeStyle = up ? 'rgba(0,208,132,.5)' : 'rgba(255,59,92,.5)';
    ctx.lineWidth=.6; ctx.setLineDash([3,3]);
    ctx.beginPath();ctx.moveTo(PAD.l,navY);ctx.lineTo(PAD.l+cW,navY);ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = up ? '#00d084' : '#ff3b5c';
    ctx.font='bold 9px JetBrains Mono,monospace';ctx.textAlign='right';
    ctx.fillText(navVal.toFixed(2), W-2, Math.max(navY+4, PAD.t+10));

    // X-axis date labels — the last point sits exactly at PAD.l+cW, so it
    // X-axis date labels — the last point sits exactly at PAD.l+cW, so it
    // must be exempted from the right-edge proximity check below (it was
    // being silently dropped every time, since toX() for the final point
    // always lands past the cutoff). Uses xLblStep computed above, shared
    // with the vertical gridlines so ticks and labels always align.
    ctx.fillStyle='rgba(255,255,255,0.9)';
    ctx.font='bold 12px sans-serif';
    ctx.textBaseline='top';
    pts.forEach((p,i) => {
      if(i % xLblStep !== 0 && i !== n-1) return;
      const parts = p.d.split('-');
      if(parts.length !== 3) return;
      const lbl = parts[1]+'/'+parts[0].slice(2);
      const x = toX(p._t);
      const isLast = i === n-1;
      if(!isLast && x > PAD.l+cW-45) return; // skip labels that would collide with the always-drawn last label (≈ one label-width of clearance)
      ctx.textAlign = i===0 ? 'left' : (isLast ? 'right' : 'center');
      ctx.fillText(lbl, isLast ? PAD.l+cW : x, PAD.t+cH+4);
    });
  } catch(e) {
    const cv = document.getElementById('cv-candle');
    if(cv){
      const ctx = cv.getContext('2d');
      ctx.fillStyle='#060c18'; ctx.fillRect(0,0,cv.width,cv.height);
      ctx.fillStyle='rgba(255,107,133,0.7)'; ctx.font='bold 11px monospace'; ctx.textAlign='center';
      ctx.fillText('Chart render failed', cv.width/2, cv.height/2);
      ctx.font='10px monospace';
      ctx.fillText(e.message, cv.width/2, cv.height/2+20);
    }
  }
}

// Extract quarterly data with all KPI metrics
function getQuarterlyData(s){
  if(s._quarterlyCache) return s._quarterlyCache;
  const quarterly = [];
  
  if(!s || !s.financials) return quarterly;
  
  try {
    // ✅ Use user-selected data source instead of hardcoded consolidated/annual
    const accounting = S.financialSource?.accounting || 'consolidated';
    const frequency = S.financialSource?.frequency || 'annual';
    const f = s.financials;
    
    // Get data from selected accounting method and frequency
    const getFinancialData = (fieldName) => {
      if(!f[fieldName]) return {};
      if(!f[fieldName][accounting]) return {};
      return f[fieldName][accounting][frequency] || {};
    };
    
    // Field names matching actual market_data.json financials keys
    const salesData = getFinancialData('revenue');
    const netProfitData = getFinancialData('net_profit');
    const operatingProfitData = getFinancialData('ebit');
    const opmData = getFinancialData('operating_margin_pct');
    const pbtData = getFinancialData('profit_before_tax');
    const epsData = getFinancialData('eps');
    const cfoData = getFinancialData('operating_cash_flow');
    const fcfData = getFinancialData('fcf');
    const ncfData = getFinancialData('net_cash_flow');
    const assetsData = getFinancialData('total_assets');
    const borrowingsData = getFinancialData('borrowings');
    const interestData = getFinancialData('interest');
    const ccrData = getFinancialData('cash_conversion_ratio');
    const divPayoutData = getFinancialData('dividend_payout_pct');

    // promoter and roce do NOT live under s.financials — different buckets.
    // promoter: company_details.shareholding.pattern.promoters (ownership %, always present)
    // roce: ratios.screener.roce_pct (sector-conditional — absent for banks/NBFCs by design)
    const promoterData = s.company_details?.shareholding?.pattern?.promoters || {};
    const roceData = s.ratios?.screener?.roce_pct || {};

    // Get all unique dates
    const allDates = new Set([
      ...Object.keys(salesData),
      ...Object.keys(netProfitData),
      ...Object.keys(operatingProfitData),
      ...Object.keys(opmData),
      ...Object.keys(pbtData),
      ...Object.keys(epsData),
      ...Object.keys(cfoData),
      ...Object.keys(fcfData),
      ...Object.keys(ncfData),
      ...Object.keys(assetsData),
      ...Object.keys(borrowingsData),
      ...Object.keys(interestData),
      ...Object.keys(ccrData),
      ...Object.keys(divPayoutData),
      ...Object.keys(promoterData),
      ...Object.keys(roceData)
    ]);
    
    // Build data points - sorted oldest first
    Array.from(allDates).sort().forEach(date => {
      const q = { d: date };
      
      // Income Statement metrics
      if(salesData[date]) q.rev = parseFloat(salesData[date]) || 0;
      if(operatingProfitData[date]) q.op = parseFloat(operatingProfitData[date]) || 0;
      if(opmData[date]) q.opm = parseFloat(opmData[date]) || 0;
      if(pbtData[date]) q.pbt = parseFloat(pbtData[date]) || 0;
      if(netProfitData[date]) q.net = parseFloat(netProfitData[date]) || 0;
      if(epsData[date]) q.eps = parseFloat(epsData[date]) || 0;
      if(interestData[date]) q.interest = parseFloat(interestData[date]) || 0;
      if(ccrData[date]) q.ccr = parseFloat(ccrData[date]) || 0;
      
      // Balance Sheet metrics
      if(assetsData[date]) q.assets = parseFloat(assetsData[date]) || 0;
      if(borrowingsData[date]) q.borrowings = parseFloat(borrowingsData[date]) || 0;
      
      // Cash Flow metrics
      if(cfoData[date]) q.cfo = parseFloat(cfoData[date]) || 0;
      if(fcfData[date]) q.fcf = parseFloat(fcfData[date]) || 0;
      if(ncfData[date]) q.ncf = parseFloat(ncfData[date]) || 0;

      // Dividend
      if(divPayoutData[date] != null) q.divpayout = parseFloat(divPayoutData[date]) || 0;

      // Ownership & sector-conditional ratio (different source buckets)
      if(promoterData[date] != null) q.promoter = parseFloat(promoterData[date]) || 0;
      if(roceData[date] != null) q.roce = parseFloat(roceData[date]) || 0;
      
      if(Object.keys(q).length > 1) quarterly.push(q);
    });
    
    if(quarterly.length > 0) { s._quarterlyCache = quarterly; return quarterly; }
  } catch(e) {}
  const fallback = s.quarterly || [];
  s._quarterlyCache = fallback;
  return fallback;
}


function drawCandlestick(s){
  try {
    const cv=document.getElementById('cv-candle');
    if(!cv)return;
    
    // ✅ Clear KPI points before redrawing
    kpiPoints = [];
    maPoints = [];
  
  const wrap=document.getElementById('chart-wrap');
  // offsetWidth gives the rendered pixel width — reliable after DOM paint
  const W2=Math.max(wrap?wrap.offsetWidth:0, cv.offsetWidth, 280);
  const H2=Math.max(wrap?wrap.offsetHeight:0, cv.offsetHeight, 200);
  const dpr=window.devicePixelRatio||1;
  cv.width=W2*dpr;
  cv.height=H2*dpr;
  cv.style.width=W2+'px';
  cv.style.height=H2+'px';
  const ctx=cv.getContext('2d');
  ctx.scale(dpr,dpr);
  
  // ✅ Disable image smoothing to prevent blur when zoomed
  ctx.imageSmoothingEnabled = false;

  // Wire click/touch → tooltip (module-scope handleChartClick)
  cv.onclick = (e) => handleChartClick(e, cv, W2, H2);
  cv.ontouchend = (e) => {
    if(e.touches.length === 0 && !chartInteraction.isPanning) {
      const t = e.changedTouches[0];
      handleChartClick(new MouseEvent('click',{clientX:t.clientX,clientY:t.clientY}), cv, W2, H2);
    }
  };

  const candles=getSlicedCandles(s, W2);
  if(!candles.length){
    ctx.fillStyle='#060c18'; ctx.fillRect(0,0,W2,H2);
    ctx.textAlign='center';
    if(s._noChartData){
      ctx.fillStyle='rgba(245,166,35,.7)'; ctx.font='bold 11px DM Sans';
      ctx.fillText('No chart data for '+s.ticker || s.sym, W2/2, H2/2-16);
      ctx.fillStyle='rgba(140,176,208,.5)'; ctx.font='10px DM Sans';
      ctx.fillText('Add to watchlist.txt → run GitHub Actions', W2/2, H2/2+4);
      ctx.fillText('(fetch_type: new_symbol)', W2/2, H2/2+20);
    } else {
      ctx.fillStyle='rgba(120,150,180,.4)'; ctx.font='12px DM Sans';
      ctx.fillText('Loading chart data…', W2/2, H2/2);
    }
    return;
  }
  

  const W=W2,H=H2;
  const volVisible = !!S.maVis.vol;
  const PAD={l:8,r:62,t:8,b: volVisible ? 22 : 36};
  const cW=W-PAD.l-PAD.r, cH=H-PAD.t-PAD.b;
  const n=candles.length;
  const gap=cW/n;
  // ✅ Apply zoom to bar width: zoom in = wider bars, zoom out = narrower bars
  const baseWidth = Math.max(1,Math.min(n > 40 ? 3 : 6, gap*0.25));
  const bw = baseWidth * S.chartZoom;

  // Full price history for KPI priceAt() lookups — only ohlcv_monthly exists now
  const _fullHistory = s.price?.ohlcv_monthly?.length ? s.price.ohlcv_monthly : null;
  const allCandles = (_fullHistory
    ? _fullHistory.map(b => ({
        d: String(b.Date || b.d || ''),
        c: parseFloat(b.Close || b.c || 0)
      })).filter(b => b.d && b.c > 0)
    : (s.candles || candles).slice()
  ).sort((a, b) => a.d.localeCompare(b.d));
  // Pre-parse timestamps once
  allCandles.forEach(b => { if(!b._t) b._t = new Date(b.d).getTime(); });
  candles.forEach(b => { if(!b._t) b._t = new Date(b.d).getTime(); });
  const visFirst = candles.length ? candles[0]._t : 0;
  const visLast  = candles.length ? candles[candles.length-1]._t : 1;
  const visRange = visLast - visFirst || 1;
  
  // ✅ FIX: KPI overlays use FULL history range for correct positioning during pan
  const allFirst = allCandles.length ? allCandles[0]._t : visFirst;
  const allLast  = allCandles.length ? allCandles[allCandles.length-1]._t : visLast;
  const allRange = allLast - allFirst || 1;

  const allPrices=candles.flatMap(c=>[c.h,c.l]);

  // Use loop instead of Math.max/min spread to avoid stack overflow on large arrays
  let mn=Infinity, mx=-Infinity;
  for(let i=0;i<allPrices.length;i++){ if(allPrices[i]<mn)mn=allPrices[i]; if(allPrices[i]>mx)mx=allPrices[i]; }
  
  // Ensure we have valid price data
  if(allPrices.length === 0) {
    ctx.fillStyle='#060c18';
    ctx.fillRect(0,0,W,H);
    ctx.fillStyle='rgba(255,107,133,0.7)';
    ctx.font='bold 11px monospace';
    ctx.textAlign='center';
    ctx.fillText('No valid price data', W/2, H/2);
    return;
  }
  if(mn===Infinity || mx===-Infinity){ mn=0; mx=1; }
  const rng=mx-mn||1;
  // Vertical pan: shift the visible price window up/down
  const yShift = (S.yPanOffset||0) * rng;
  mn += yShift; mx += yShift;

  // ✅ Y-axis labels use FULL range - they stay stable, don't move
  const toY=p=>PAD.t+((mx-p)/rng)*cH;
  
  // ✅ VERTICAL BAR ZOOM: Uses your VERTICAL PINCH GESTURE (S.yAxisZoom)
  const barHeightZoom = S.yAxisZoom || 1.0;  // 1.0 = normal, 2.0 = 2x taller
  const barX = i => PAD.l + i*gap + gap/2;

  // Background
  ctx.fillStyle='#070c18';
  ctx.fillRect(0,0,W,H);

  // Grid lines — horizontal
  for(let i=0;i<=8;i++){
    const y=PAD.t+(cH/8)*i;
    ctx.strokeStyle='rgba(255,255,255,.22)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(PAD.l,y);ctx.lineTo(PAD.l+cW,y);ctx.stroke();
  }
  // Vertical gridlines — at same positions as x-axis date labels
  {
    const vStep = Math.max(1, Math.floor(n / Math.min(volVisible ? 4 : 6, Math.floor(cW / 50))));
    ctx.strokeStyle='rgba(255,255,255,.22)';ctx.lineWidth=1;
    candles.forEach((c,i)=>{
      if(i % vStep !== 0 && i !== n-1) return;
      const x = barX(i);
      if(x > PAD.l+cW-8) return;
      ctx.beginPath();ctx.moveTo(x,PAD.t);ctx.lineTo(x,PAD.t+cH);ctx.stroke();
    });
  }

  // Right axis separator (draw BEFORE labels so labels appear on top)
  ctx.fillStyle='rgba(7,12,24,.8)';
  ctx.fillRect(W-PAD.r,0,PAD.r,H);
  ctx.strokeStyle='rgba(100,130,180,.6)';  // ✅ Brighter blue for visibility
  ctx.lineWidth=1.5;  // ✅ Slightly thicker
  ctx.beginPath();ctx.moveTo(W-PAD.r,0);ctx.lineTo(W-PAD.r,H);ctx.stroke();

  // Price labels (draw AFTER background so they're visible on top)
  for(let i=0;i<=8;i++){
    const y=PAD.t+(cH/8)*i;
    const price=mx-(mx-mn)*(i/8);
    ctx.fillStyle='rgba(255,255,255,1)';
    ctx.font='bold 11px JetBrains Mono,monospace';ctx.textAlign='right';ctx.textBaseline='middle';
    ctx.fillText(Math.round(price).toLocaleString('en-IN'),W-6,y);
  }

  // Clip all chart drawing to chart area — nothing bleeds into right axis strip
  ctx.save();
  ctx.beginPath();
  ctx.rect(PAD.l, 0, cW, H);
  ctx.clip();

  // Candles - ✅ Track bar positions for click detection
  candlestickBars = [];
  
  candles.forEach((c,i)=>{
    const bull=c.c>=c.o;
    const cx=barX(i);
    const yHigh=toY(c.h), yLow=toY(c.l);
    const yOpen=toY(c.o), yClose=toY(c.c);

    // ✅ Apply bar height zoom around the high-low midpoint (keeps zoom behavior consistent with prior candle version)
    const midY=(yHigh+yLow)/2;
    const halfRange=Math.max(1,(yLow-yHigh)/2)*barHeightZoom;
    const zHigh=midY-halfRange, zLow=midY+halfRange;
    const zOpen=midY-((midY-yOpen)*barHeightZoom);
    const zClose=midY-((midY-yClose)*barHeightZoom);

    // ✅ Track bar for click detection — bounding box spans full high-low range
    candlestickBars.push({
      date: c.d,
      open: c.o,
      high: c.h,
      low: c.l,
      close: c.c,
      volume: c.v,
      bull: bull,
      x: cx - bw/2,
      y: Math.min(zHigh, zLow),
      w: bw,
      h: Math.max(1, Math.abs(zLow - zHigh))
    });

    const col = bull?'rgba(0,255,136,.95)':'rgba(255,68,102,.95)';
    ctx.strokeStyle=col;
    ctx.lineWidth=Math.max(1, bw*0.18);

    // Vertical high-low line
    ctx.beginPath();ctx.moveTo(cx,zHigh);ctx.lineTo(cx,zLow);ctx.stroke();

    // Left tick = open
    ctx.beginPath();ctx.moveTo(cx-bw/2,zOpen);ctx.lineTo(cx,zOpen);ctx.stroke();

    // Right tick = close
    ctx.beginPath();ctx.moveTo(cx,zClose);ctx.lineTo(cx+bw/2,zClose);ctx.stroke();
  });

  // Restore chart clip — x-axis labels and right-axis items draw freely
  ctx.restore();

  // Current price dashed line
  const _ltp = resolveField(s, 'ltp');
  if(_ltp){
    const lastY=toY(_ltp);
    const bull = candles.length && _ltp >= candles[0].c;
    ctx.strokeStyle=bull?'rgba(0,208,132,.5)':'rgba(255,59,92,.5)';
    ctx.lineWidth=.6;ctx.setLineDash([3,3]);
    ctx.beginPath();ctx.moveTo(PAD.l,lastY);ctx.lineTo(PAD.l+cW,lastY);ctx.stroke();
    ctx.setLineDash([]);
    // Price badge on right axis — clamp further from the top gridline label
    // (drawn at PAD.t) to avoid the two labels colliding when the live price
    // sits near the chart's visible maximum.
    ctx.fillStyle=bull?'#00d084':'#ff3b5c';
    ctx.font='bold 9px JetBrains Mono,monospace';ctx.textAlign='right';
    ctx.fillText(Math.round(_ltp).toLocaleString('en-IN'),W-2,Math.max(lastY+4,PAD.t+24));
  }

  // X-axis date labels - optimized for mobile
  const maxLabels = Math.min(volVisible ? 4 : 6, Math.floor(cW / 50));
  const lblStep = Math.max(1, Math.floor(n / maxLabels));
  ctx.fillStyle='rgba(255,255,255,0.9)';
  ctx.font='bold 12px sans-serif';  // ✅ Bigger font for mobile
  ctx.textBaseline = 'top';
  candles.forEach((c,i)=>{
    if(i % lblStep !== 0 && i !== n-1) return;
    let lbl = '';
    
    // Parse date string YYYY-MM-DD
    if(c.d && typeof c.d === 'string') {
      const parts = c.d.split('-');
      if(parts.length === 3) {
        const [yyyy, mm, dd] = parts;
        lbl = mm+'/'+ yyyy.slice(2);  // monthly-only data, always show MM/YY
      }
    }
    
    const x = barX(i);
    if(x > PAD.l+cW-8) return;
    ctx.textAlign = i===0 ? 'left' : (i===n-1 ? 'right' : 'center');
    ctx.fillText(lbl, x, PAD.t + cH + 10);  // ✅ More space below
  });

  // ── KPI overlays on price chart ──────────────────────────────────
  const quarterly = getQuarterlyData(s);
  drawCandlestick._kpiLabelY = []; // reset label collision tracker

  const KPI_DEFS = [
    // Income Statement
    {k:'rev',  label:'Rev',       col:'#22d3ee'},
    {k:'op',   label:'Op.Profit', col:'#ec4899'},
    {k:'opm',  label:'OPM%',      col:'#fb923c'},
    {k:'pbt',  label:'PBT',       col:'#8b5cf6'},
    {k:'net',  label:'Net',       col:'#4ade80'},
    {k:'eps',  label:'EPS',       col:'#06b6d4'},
    {k:'interest', label:'Interest', col:'#e879f9'},
    // Balance Sheet
    {k:'assets',     label:'Assets',  col:'#f0ad4e'},
    {k:'borrowings', label:'Borrow',  col:'#ff6b6b'},
    // Cash Flow
    {k:'cfo',  label:'CFO',  col:'#34d399'},
    {k:'fcf',  label:'FCF',  col:'#14b8a6'},
    {k:'ncf',  label:'NCF',  col:'#2dd4bf'},
    {k:'ccr',  label:'CCR',  col:'#5eead4'},
    // Valuation
    {k:'pe',   label:'P/E',  col:'#f59e0b'},
    // Ownership & sector-conditional ratio (roce absent for banks/NBFCs by design)
    {k:'promoter',  label:'Promoter%', col:'#fbbf24'},
    {k:'roce',      label:'ROCE%',     col:'#c084fc'},
    {k:'divpayout', label:'DivPayout%',col:'#60a5fa'},
  ];

  // Use FULL candle history for price lookups — not just visible slice
  // (allCandles, visFirst, visRange, allFirst, allRange already defined above)

  function xForDate(dateStr){
    // Parse date string YYYY-MM-DD to timestamp without new Date() overhead
    const p = dateStr.split('-');
    const t = Date.UTC(+p[0], +p[1]-1, +p[2]);
    return PAD.l + ((t - visFirst) / visRange) * cW;
  }

  // Search FULL history for price on/before a date
  function priceAt(dateStr){
    for(let i=allCandles.length-1; i>=0; i--){
      if(allCandles[i].d <= dateStr) return allCandles[i].c;
    }
    return allCandles.length ? allCandles[0].c : (resolveField(s, 'ltp') || 0);
  }

  // Log raw quarterly data once (commented out - uncomment for debugging)
  // if(quarterly.length){
  //  // }

  // Draw KPI overlays
  try {
  KPI_DEFS.forEach(({k, label, col})=>{
    if(!S.kpiVis[k]) return;

    let pts = [];
    try {
      if(k === 'pe'){
        // P/E ratio from EPS
        if(quarterly && quarterly.length > 0) {
          quarterly.forEach(q=>{
            if(!q.eps || q.eps <= 0) return;
            const annEPS = q.eps * 4;
            const price = priceAt(q.d);
            if(price > 0) pts.push({x: xForDate(q.d), v: price/annEPS, d: q.d});
          });
        }
      } else {
        // Other KPIs from quarterly data
        if(quarterly && quarterly.length > 0) {
          quarterly.forEach(q=>{
            const v = q[k];
            if(v != null && !isNaN(v)) pts.push({x: xForDate(q.d), v, d: q.d});
          });
        }
      }

      // Wide margin so annual dots just outside viewport still anchor the line
      pts = pts.filter(p => p.x >= PAD.l - cW && p.x <= PAD.l + cW * 2);

      if(pts.length < 2) return;
    } catch(e) {
      return;
    }

    if(!pts.length) return;

    const drawLine = pts.length >= 2;

    // Map values to Y using a DEDICATED right-side scale for this KPI
    // This avoids the problem of small PE values (eg 18x) mapping to price range (eg 500-800)
    const vals = pts.map(p=>p.v);
    const rawMin = Math.min(...vals)*0.92, rawMax = Math.max(...vals)*1.08;
    const rawMid = (rawMin + rawMax) / 2;
    const vRng = (rawMax - rawMin || 1) / (S.yAxisZoom || 1);
    const vMin = rawMid - vRng / 2, vMax = rawMid + vRng / 2;
    // Use top 80% of chart height, leaving room for x-axis labels at bottom
    const yTop = PAD.t + 4, yBot = H - PAD.b - 16;
    const kpiY = v => yBot - ((v - vMin) / vRng) * (yBot - yTop);

    ctx.save();
    // Clip lines/fills to chart area only — prevent bleeding into right axis
    ctx.beginPath();
    ctx.rect(PAD.l, PAD.t, cW, H - PAD.t - PAD.b);
    ctx.clip();
    ctx.strokeStyle = col; ctx.lineWidth = 1.5; ctx.globalAlpha = 0.9;

    if(drawLine){
      // Line only — no fill
      ctx.globalAlpha = 0.9;
      ctx.beginPath();
      pts.forEach((p,j)=>{ j===0 ? ctx.moveTo(p.x, kpiY(p.v)) : ctx.lineTo(p.x, kpiY(p.v)); });
      ctx.stroke();
    }

    // Dots
    ctx.fillStyle = col; ctx.globalAlpha = 1;
    pts.forEach(p=>{
      ctx.beginPath();
      ctx.arc(p.x, kpiY(p.v), 2.5, 0, Math.PI*2);
      ctx.fill();
      kpiPoints.push({
        x: p.x,
        y: kpiY(p.v),
        label: label,
        value: p.v,
        date: p.d,
        key: k,
        col: col,
        radius: 12
      });
    });

    ctx.restore(); // restore clip
  });
  } catch(e) {
    const cv = document.getElementById('cv-candle');
    if(cv) {
      const ctx = cv.getContext('2d');
      ctx.fillStyle = '#060c18';
      ctx.fillRect(0, 0, cv.width, cv.height);
      ctx.fillStyle = 'rgba(255, 107, 133, 0.7)';
      ctx.font = 'bold 11px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('Chart render failed', cv.width/2, cv.height/2);
      ctx.font = '10px monospace';
      ctx.fillText(e.message, cv.width/2, cv.height/2 + 20);
    }
  }
  } catch(e) {} // close outer try wrapping drawCandlestick body
}

// Volume bars with 5-period MA trend line

function drawVolume(s){
  const cv=document.getElementById('cv-vol');
  if(!cv)return;
  const wrap=document.getElementById('vol-wrap');
  const W2=Math.max(wrap?wrap.offsetWidth:0, 280);
  const H2=Math.max(wrap?wrap.offsetHeight:0, 100);
  const dpr=window.devicePixelRatio||1;
  cv.width=W2*dpr;
  cv.height=H2*dpr;
  cv.style.width=W2+'px';
  cv.style.height=H2+'px';
  const ctx=cv.getContext('2d');
  ctx.scale(dpr,dpr);
  
  // ✅ Disable image smoothing to prevent blur when zoomed
  ctx.imageSmoothingEnabled = false;

  const candles=getSlicedCandles(s, W2);
  if(!candles.length)return;

  ctx.fillStyle='#070c18';ctx.fillRect(0,0,W2,H2);

  const W=W2,H=H2;
  const PAD={l:8,r:62,t:6,b:34};
  const cW=W-PAD.l-PAD.r,cH=H-PAD.t-PAD.b;
  const n=candles.length,gap=cW/n;
  // ✅ Apply zoom to volume bar width too
  const volBaseWidth = Math.max(1,Math.min(n > 40 ? 2 : 4, gap*0.25));
  const bw = volBaseWidth * S.chartZoom;
  const mv=Math.max(...candles.map(c=>c.v))||1;
  
  // Calculate price range from candles for labels
  const allPrices = candles.map(c=>c.h).concat(candles.map(c=>c.l));
  const _ltpVol = resolveField(s, 'ltp') || 0;
  const startPrice = Math.max(...allPrices) || _ltpVol;
  const endPrice = Math.min(...allPrices) || _ltpVol;
  
  // Volume bars colored by EACH candlestick's close > open logic (matches candlestick colors)

  // Left axis line (thicker for visibility)
  ctx.strokeStyle='rgba(100,130,180,.5)';
  ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(PAD.l,PAD.t);ctx.lineTo(PAD.l,PAD.t+cH);ctx.stroke();

  // Vertical gridlines — match x-axis label positions
  {
    const vStep = Math.max(1, Math.floor(n / Math.min(4, Math.floor(cW/50))));
    ctx.strokeStyle='rgba(255,255,255,.22)';ctx.lineWidth=1;
    candles.forEach((c,i)=>{
      if(i % vStep !== 0 && i !== n-1) return;
      const x = PAD.l+i*gap+(gap-bw)/2;
      if(x > PAD.l+cW-8) return;
      ctx.beginPath();ctx.moveTo(x,PAD.t);ctx.lineTo(x,PAD.t+cH);ctx.stroke();
    });
  }

  // Volume bars - each bar colored based on corresponding candlestick
  candles.forEach((c,i)=>{
    const bh=Math.max(2,(c.v/mv)*cH);
    const x = PAD.l+i*gap+(gap-bw)/2;
    // Color: green if close > open, red if close <= open (matches candlestick color)
    const barColor = (c.c > c.o) ? '#00d084' : '#ff3b5c';
    ctx.fillStyle=barColor;
    ctx.beginPath();
    ctx.rect(x,PAD.t+cH-bh,bw,bh);
    ctx.fill();
  });

  // ✅ RIGHT axis - Volume labels on RIGHT side (not left to avoid overlap)
  ctx.fillStyle='rgba(7,12,24,.8)';
  ctx.fillRect(W-PAD.r,0,PAD.r,H);
  ctx.strokeStyle='rgba(100,130,180,.6)';
  ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(W-PAD.r,0);ctx.lineTo(W-PAD.r,H);ctx.stroke();
  
  // ✅ Volume labels on RIGHT side (RIGHT aligned, with padding from edge)
  // Avoid colliding with the price-range labels (top/bottom corners, drawn
  // below) by keeping the volume scale's own labels inset within [PAD.t+10, PAD.t+cH-10]
  // instead of touching the exact same y as the price labels.
  ctx.fillStyle='rgba(255,255,255,1)';
  ctx.font='bold 10px JetBrains Mono,monospace';
  ctx.textAlign='right';  // ✅ Changed from left to right
  ctx.textBaseline='middle';
  const maxVol = Math.max(...candles.map(c=>c.v))||1;
  const volLabelTop = PAD.t + 10, volLabelBottom = PAD.t + cH - 10;
  for(let i=0; i<=2; i++){
    const y = volLabelBottom - ((volLabelBottom-volLabelTop)/2)*i;
    const volValue = (i/2) * maxVol;
    let label;
    if (volValue >= 1e6) {
      label = (volValue / 1e6).toFixed(1) + 'M';
    } else if (volValue >= 1e3) {
      label = (volValue / 1e3).toFixed(0) + 'K';
    } else {
      label = volValue.toFixed(0);
    }
    ctx.fillText(label, W-6, y);  // ✅ Draw on right side (W-6)
  }
  
  // Price labels on right axis — anchored to the true canvas top/bottom edges,
  // now clear of the volume scale labels above (which stop 10px short of these).
  ctx.fillStyle='rgba(255,255,255,.95)';
  ctx.font='bold 9px JetBrains Mono,monospace';
  ctx.textAlign='right';
  ctx.fillText(Math.round(startPrice).toLocaleString('en-IN'), W-2, PAD.t+6);
  ctx.fillText(Math.round(endPrice).toLocaleString('en-IN'), W-2, H-2);
  
  // Volume trend line (smoothed MA5)
  const volMA = candles.map((c,i)=>{
    if(i<4) return null;
    return candles.slice(i-4,i+1).reduce((a,b)=>a+b.v,0)/5;
  });
  ctx.strokeStyle='rgba(255,255,255,.3)'; ctx.lineWidth=1.5; ctx.beginPath();
  let started=false;
  volMA.forEach((v,i)=>{
    if(v===null) return;
    const x=PAD.l+i*gap+gap/2;
    const y=PAD.t+cH-(v/mv)*cH;
    if(!started){ctx.moveTo(x,y);started=true;} else ctx.lineTo(x,y);
  });
  ctx.stroke();
  
  // ✅ X-axis date labels for volume chart - optimized for mobile
  const volMaxLabels = Math.min(4, Math.floor(cW / 50));  // ✅ Fewer labels on mobile
  const volLblStep = Math.max(1, Math.floor(n / volMaxLabels));
  ctx.fillStyle='rgba(255,255,255,0.9)';
  ctx.font='bold 12px sans-serif';  // ✅ Bigger font for mobile
  ctx.textBaseline='top';
  candles.forEach((c,i)=>{
    if(i % volLblStep !== 0 && i !== n-1) return;
    let lbl = '';
    
    // Parse date string YYYY-MM-DD
    if(c.d && typeof c.d === 'string') {
      const parts = c.d.split('-');
      if(parts.length === 3) {
        const [yyyy, mm, dd] = parts;
        lbl = mm+'/'+ yyyy.slice(2);  // monthly-only data, always show MM/YY
      }
    }
    
    const x = PAD.l + i*gap + gap/2;
    if(x > PAD.l+cW-8) return;
    ctx.textAlign = i===0 ? 'left' : (i===n-1 ? 'right' : 'center');
    ctx.fillText(lbl, x, PAD.t + cH + 8);  // ✅ Below volume chart
  });
}
