        .header-subtitle{font-size:9px;color:var(--tx3);margin-top:2px}
        .header-price{text-align:right;display:flex;flex-direction:column}
        .price-val{font-size:14px;font-weight:800}

        .tabs::-webkit-scrollbar-track{background:var(--s1)}
        .tabs::-webkit-scrollbar-thumb{background:var(--b1);border-radius:2px}
        .tab{padding:8px 14px;background:transparent;border:1px solid var(--b1);border-radius:4px;color:var(--tx3);cursor:pointer;font-size:10px;font-weight:700;white-space:nowrap;transition:all .2s}

        .tbd-link{color:#ff9800;opacity:0.9;font-weight:700;cursor:pointer;border-bottom:1px dashed #ff9800;text-decoration:none;transition:all .2s}

        .val-neutral{color:var(--ac);font-weight:700}
        .val-warning{color:var(--yw);font-weight:700}

<script>

const DB = "raalanportfolio";
const STORE = "stocks";
let currentStock = null;
let currentTab = "overview";
let dataSource = null; // Track where data comes from: 'db' or 'json'

// ✅ AUTO-INIT: Load portfolio on first visit
window.addEventListener('load', async () => {
  try {
    // Check if portfolio already loaded
    const db = await new Promise((resolve) => {
      const req = indexedDB.open(DB, 8);
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => resolve(null);
    });
    
    if (db) {
      const tx = db.transaction(STORE, 'readonly');
      const store = tx.objectStore(STORE);
      const req = store.get('GRSE');
      
      req.onsuccess = () => {
        const grse = req.result;
        // If GRSE doesn't have qty field, need to load portfolio
        if (!grse || grse.qty === undefined) {
          loadPortfolioData();
        }
      };
    }
  } catch (e) {
  }
});


// ✅ Canvas Chart State (REQUIRED for chart functions)
const S = {
  chartRange: '1Y',
  chartInterval: 'D',
  maVis: { sma20: true, sma50: true, ema200: true, vol: true },
  kpiVis: { pe: false, sales: false, rev: false, net: false, cfo: false, ncf: false, opm: false, debt: false, op: false, pbt: false, eps: false, fcf: false, assets: false, borrowings: false },
  chartPan: 0,
  panOffset: 0,
  chartZoom: 1,
  yAxisZoom: 1,       // ✅ Vertical zoom (bar height)
  panStart: null,     // Pan start position
  financialSource: { accounting: 'consolidated', frequency: 'annual' }  // ✅ NEW: User selected data source (consolidated/standalone, annual/quarterly)
};
let chartCache = {};
let candlestickBars = [];  // ✅ Track bar positions for click detection
let kpiPoints = [];  // ✅ Track KPI overlay points for tooltip clicks
let maPoints = [];   // Track MA line points for click/tooltip


// Helpers
const num = (v) => typeof v === 'number' ? v : parseFloat(v) || 0;
const fmt = (v, decimals = 2) => num(v) === 0 && !v ? '—' : num(v).toFixed(decimals);
const get = (obj, ...keys) => {
    if (!obj) return '—';
    
    // Try exact key first (for direct properties)
    for (let k of keys) {
        if (obj[k] !== undefined && obj[k] !== null) return obj[k];
    }
    
    // Try field mapping (for nested properties)
    for (let k of keys) {
        const resolved = resolveField(obj, k);
        if (resolved !== undefined && resolved !== null) return resolved;
    }
    
    return '—';
};

// ✅ Update financial data source (consolidated/standalone, annual/quarterly)
function updateFinancialSource(value, type) {
  S.financialSource[type] = value;
  
  // Recalculate KPI overlays with new source
  if(currentStock) {
    // Clear cached quarterly data so it's recalculated with new source
    delete currentStock._quarterlyCache;
    scheduleChartRedraw();
  }
}

async function loadPortfolioData(forceClear = false) {
  
  try {
    const response = await fetch('../uploads/market_data.json');
    if (!response.ok) throw new Error(`Failed: ${response.status}`);
    const allData = await response.json();
    
    // Set portfolio holdings at CORRECT location: company_details.qty
    if (allData.GRSE) {
      allData.GRSE.company_details = allData.GRSE.company_details || {};
      allData.GRSE.company_details.qty = 50;
      allData.GRSE.company_details.avg_cost = 2400;
    }
    if (allData.ABCAPITAL) {
      allData.ABCAPITAL.company_details = allData.ABCAPITAL.company_details || {};
      allData.ABCAPITAL.company_details.qty = 100;
      allData.ABCAPITAL.company_details.avg_cost = 350;
    }
    
    // Open IndexedDB
    let db;
    if (forceClear) {
      const deleteReq = indexedDB.deleteDatabase(DB);
      await new Promise((resolve) => {
        deleteReq.onsuccess = resolve;
        deleteReq.onerror = resolve;
      });
    }
    
    db = await new Promise((resolve, reject) => {
      const req = indexedDB.open(DB, 8);
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(new Error('DB open failed'));
      req.onupgradeneeded = (e) => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains(STORE)) {
          db.createObjectStore(STORE, { keyPath: 'ticker' });
        }
      };
    });
    
    const tx = db.transaction(STORE, 'readwrite');
    const store = tx.objectStore(STORE);
    
    if (forceClear) {
      await new Promise((resolve) => {
        const clearReq = store.clear();
        clearReq.onsuccess = resolve;
        clearReq.onerror = resolve;
      });
    }
    
    let saved = 0;
    let portfolio = 0;
    
    for (const [ticker, stock] of Object.entries(allData)) {
      stock.ticker = ticker;
      
      // Ensure company_details exists and has qty field
      stock.company_details = stock.company_details || {};
      stock.company_details.qty = stock.company_details.qty || 0;
      
      await new Promise((resolve) => {
        const req = store.put(stock);
        req.onsuccess = () => {
          saved++;
          const qty = stock.company_details.qty || 0;
          if (qty > 0) {
            portfolio++;
          }
          resolve();
        };
        req.onerror = () => resolve();
      });
    }
    
    db.close();
    
    
  } catch (e) {
  }
}

// 🎯 RESOLVE FIELD FROM INDEXEDDB STOCK OBJECT
function resolveField(stock, fieldName) {
    const paths = fieldMapping[fieldName];
    if (!paths) return undefined;
    
    // ✅ NEW: Replace {accounting} and {frequency} placeholders with user selection
    const accounting = S.financialSource?.accounting || 'consolidated';
    const frequency = S.financialSource?.frequency || 'annual';
    
    const resolvedPaths = paths.map(path => 
      path.replace('{accounting}', accounting).replace('{frequency}', frequency)
    );
    
    for (let path of resolvedPaths) {
        const value = getNestedValue(stock, path);
        if (value !== undefined && value !== null) return value;
    }
    return undefined;
}

// Helper to get nested object value by dot notation
function getNestedValue(obj, path) {
    if (!obj) return undefined;
    const parts = path.split('.');
    let current = obj;
    for (let part of parts) {
        if (current && typeof current === 'object' && part in current) {
            current = current[part];
        } else {
            return undefined;
        }
    }
    return current;
}

            });

                });

                    Available: ${stockList}
                </div>
            </div>
        `;
        return;
    }
    
    
    
    const db = await new Promise(r => {
        const req = indexedDB.open(DB);
        req.onsuccess = () => {
            
            r(req.result);
        };
        req.onerror = () => {
            r(null);
        };
    });
    
    if (!db) {
        document.getElementById('content').innerHTML = '<div class="placeholder"><div class="placeholder-emoji">⚠️</div>Database error</div>';
        return;
    }
    
    try {
        const tx = db.transaction(STORE, 'readonly');
        const store = tx.objectStore(STORE);
        
        currentStock = await new Promise(r => {
            const req = store.get(ticker);
            req.onsuccess = () => {
                
                r(req.result);
            };
            req.onerror = () => {
                r(null);
            };
        });
        
        if (!currentStock) {
            document.getElementById('content').innerHTML = '<div class="placeholder"><div class="placeholder-emoji">🔍</div>Stock not found: ' + ticker + '</div>';
            return;
        }
        
        // 🔍 DEBUG: Log the actual stock object structure
        
        // Determine data source
        dataSource = currentStock._source || 'db'; // Check if _source field exists, default to 'db'
        
        // 🚀 Auto-load candles from price history fields with support for d/w/m intervals
        if (!currentStock.candles || currentStock.candles.length === 0) {
            // Try to load from price object history fields (history_6mo_1d, history_5y_1wk, history_5y_1mo)
            let historyData = null;
            let historyType = null;
            
            // Priority: daily > weekly > monthly
            if (currentStock.price && currentStock.price.history_6mo_1d && Array.isArray(currentStock.price.history_6mo_1d)) {
                historyData = currentStock.price.history_6mo_1d;
                historyType = 'daily (6mo)';
            } else if (currentStock.price && currentStock.price.history_5y_1wk && Array.isArray(currentStock.price.history_5y_1wk)) {
                historyData = currentStock.price.history_5y_1wk;
                historyType = 'weekly (5y)';
            } else if (currentStock.price && currentStock.price.history_5y_1mo && Array.isArray(currentStock.price.history_5y_1mo)) {
                historyData = currentStock.price.history_5y_1mo;
                historyType = 'monthly (5y)';
            }
            
            // Convert history format { Date, Open, High, Low, Close, Volume } to chart format
            if (historyData && historyData.length > 0) {
                try {
                    // Use efficient array conversion for large datasets
                    currentStock.candles = historyData.map((bar, idx) => ({
                        d: bar.Date,  // Date as YYYY-MM-DD string
                        o: parseFloat(bar.Open),
                        h: parseFloat(bar.High),
                        l: parseFloat(bar.Low),
                        c: parseFloat(bar.Close),
                        v: parseInt(bar.Volume) || 0
                    })).filter(bar => !isNaN(bar.o) && !isNaN(bar.h) && !isNaN(bar.l) && !isNaN(bar.c)); // Remove invalid entries
                } catch (e) {
                    currentStock.candles = [];
                }
            }
            
            // Fallback: Try generic price_history field
            if (!currentStock.candles || currentStock.candles.length === 0) {
                if (currentStock.price_history) {
                    if (Array.isArray(currentStock.price_history)) {
                        currentStock.candles = currentStock.price_history;
                    } else if (currentStock.price_history.bars && Array.isArray(currentStock.price_history.bars)) {
                        currentStock.candles = currentStock.price_history.bars;
                    }
                }
            }
            
            // Final fallback: try external file
            if (!currentStock.candles || currentStock.candles.length === 0) {
                try {
                    const sym = currentStock.ticker || currentStock.sym || ticker;
                    const res = await fetch(`./charts/${sym}.json`);
                    if (res.ok) {
                        const data = await res.json();
                        currentStock.candles = data.bars || [];
                    }
                } catch (e) {
                }
            }
        }
        
        renderHeader();
        renderTab('overview');
    } catch(e) {
        document.getElementById('content').innerHTML = '<div class="placeholder"><div class="placeholder-emoji">❌</div>Error: ' + e.message + '</div>';
    }
}

        const mcap = mcapRaw > 1e8 ? mcapRaw / 1e7 : mcapRaw; // if >10Cr in rupees, convert

            }

function filterBarsByDuration(bars, duration) {
    if (!bars || bars.length === 0) return [];
    
    if (duration === 'daily') {
        // Return all daily bars
        return bars;
    } else if (duration === 'weekly') {
        // Keep only one bar per week (first bar of each week)
        const filtered = [];
        let lastWeekStart = null;
        
        bars.forEach(bar => {
            const date = new Date(bar.d);
            const dayOfWeek = date.getDay();
            const weekStart = new Date(date);
            weekStart.setDate(date.getDate() - dayOfWeek); // Sunday as week start
            weekStart.setHours(0, 0, 0, 0);
            const weekKey = weekStart.toISOString().split('T')[0];
            
            if (lastWeekStart !== weekKey) {
                filtered.push(bar);
                lastWeekStart = weekKey;
            }
        });
        return filtered;
    } else if (duration === 'monthly') {
        // Keep only one bar per month (last bar of the month or month-end close)
        const filtered = [];
        let lastMonth = null;
        let monthBuffer = null;
        
        bars.forEach(bar => {
            const date = new Date(bar.d);
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const monthKey = year + '-' + month;
            
            if (lastMonth !== monthKey) {
                // New month found, push the previous month's bar (month-end close)
                if (monthBuffer) {
                    filtered.push(monthBuffer);
                }
                monthBuffer = bar;  // Buffer this bar as potential month-end
                lastMonth = monthKey;
            } else {
                // Same month, update buffer to keep the latest bar (closest to month-end)
                monthBuffer = bar;
            }
        });
        
        // Don't forget the last month's bar
        if (monthBuffer) {
            filtered.push(monthBuffer);
        }
        
        return filtered;
    }
    
    return bars;
}

function calculateRSI(closes, period = 14) {
    // Industry Standard: Wilder's RSI (TradingView compatible)
    // Source: https://en.wikipedia.org/wiki/Relative_strength_index
    
    if (closes.length < period + 1) return [];
    
    // Step 1: Calculate price changes
    const changes = [];
    for (let i = 1; i < closes.length; i++) {
        changes.push(closes[i] - closes[i - 1]);
    }
    
    // Step 2: Separate gains and losses
    const gains = changes.map(c => c > 0 ? c : 0);
    const losses = changes.map(c => c < 0 ? -c : 0);
    
    // Step 3: Calculate first average (simple average of first 'period' values)
    let avgGain = gains.slice(0, period).reduce((a, b) => a + b, 0) / period;
    let avgLoss = losses.slice(0, period).reduce((a, b) => a + b, 0) / period;
    
    // Step 4: Calculate RSI values using Wilder's smoothing
    const rsi = [];
    
    // First RSI at position 'period'
    const rs1 = avgLoss === 0 ? 100 : avgGain / avgLoss;
    rsi.push(100 - (100 / (1 + rs1)));
    
    // Subsequent RSI values with exponential smoothing
    for (let i = period; i < changes.length; i++) {
        avgGain = (avgGain * (period - 1) + gains[i]) / period;
        avgLoss = (avgLoss * (period - 1) + losses[i]) / period;
        
        const rs = avgLoss === 0 ? 100 : avgGain / avgLoss;
        rsi.push(100 - (100 / (1 + rs)));
    }
    
    return rsi;
}

function calculateEMA(closes, period) {
    // Exponential Moving Average
    if (closes.length < period) return [];
    
    const multiplier = 2 / (period + 1);
    const ema = [];
    
    // First EMA is simple average
    let sum = 0;
    for (let i = 0; i < period; i++) {
        sum += closes[i];
    }
    ema.push(sum / period);
    
    // Subsequent EMAs use exponential smoothing
    for (let i = period; i < closes.length; i++) {
        const prevEMA = ema[ema.length - 1];
        const newEMA = closes[i] * multiplier + prevEMA * (1 - multiplier);
        ema.push(newEMA);
    }
    
    // Shift array back to align with original closes
    // EMA[0] is at closes[period-1], so prepend nulls
    const aligned = Array(period - 1).fill(null).concat(ema);
    return aligned;
}

function addMetricSeries(metricKey, cd, chart) {
    const s = currentStock;
    if (!s || !s.quarterly || s.quarterly.length === 0) return;

    // Get all quarterly data points
    const sorted = [...s.quarterly].sort((a, b) => new Date(a.d) - new Date(b.d));
    
    // Get all price bar timestamps for snapping
    const priceTimestamps = cd.map(c => c.time);
    
    // Filter metric data that exists
    const metricData = sorted
        .filter(q => q[metricKey] !== undefined && q[metricKey] !== null)
        .map(q => {
            const metricTime = Math.floor(new Date(q.d).getTime() / 1000);
            // Snap to nearest price bar timestamp for X-axis alignment
            const snappedTime = priceTimestamps.reduce((prev, curr) => 
                Math.abs(curr - metricTime) < Math.abs(prev - metricTime) ? curr : prev
            );
            return {
                date: q.d,
                value: parseFloat(q[metricKey]),
                time: snappedTime  // Use snapped timestamp
            };
        });

    if (metricData.length === 0) {
        
        return;
    }

    // Color mapping
    const config = {
        eps: {color: '#f59e0b', label: 'EPS'},
        net: {color: '#26de81', label: 'Net Inc'},
        rev: {color: '#00d2d3', label: 'Revenue'},
        ebitda: {color: '#9f7aea', label: 'EBITDA'},
        opm: {color: '#3b82f6', label: 'OPM%'},
        debt: {color: '#ff6b6b', label: 'Debt'}
    };

    const cfg = config[metricKey] || {color: '#00f2ff', label: metricKey};

    // NORMALIZE: Convert to index (first value = 100)
    const baseValue = metricData[0].value;
    const normalizedData = metricData.map(m => ({
        time: m.time,  // Use snapped timestamp
        value: baseValue !== 0 ? (m.value / baseValue) * 100 : 100,
        actualValue: m.value  // Store original for tooltip
    }));

    const minValue = Math.min(...normalizedData.map(d => d.value));
    const maxValue = Math.max(...normalizedData.map(d => d.value));

    // Add as line series on LEFT price scale (labels hidden)
    // Use marker to show data points clearly
    const ls = chart.addLineSeries({
        color: cfg.color,
        lineWidth: 2,
        lineStyle: 0,  // Solid
        pointMarkersVisible: true,  // Show points at data locations
        pointMarkersRadius: 3,
        title: cfg.label,  // REMOVE "(Q1=100)" - just show metric name
        priceScaleId: 'left'  // Use LEFT scale for metrics (hidden)
    });
    
    // Store ACTUAL VALUES in data for tooltip display
    ls.setData(normalizedData.map(d => ({
        time: d.time, 
        value: d.value,
        actualValue: d.actualValue  // Real value for tooltip
    })));
    
    metricSeries[cfg.label] = ls;

    
}

function aggregateToWeekly(dailyBars) {
    if (!dailyBars || dailyBars.length === 0) return [];
    
    const weekly = [];
    let week = [];
    let currentWeekStart = null;
    
    for (let i = 0; i < dailyBars.length; i++) {
        const bar = dailyBars[i];
        const date = new Date(bar.d);
        const dayOfWeek = date.getDay(); // 0=Sun, 5=Fri, 6=Sat
        
        if (week.length === 0) {
            currentWeekStart = new Date(date);
        }
        
        week.push(bar);
        
        // Friday close or last bar
        const isLastBar = (i === dailyBars.length - 1);
        const isFriday = (dayOfWeek === 5);
        
        if (isFriday || isLastBar) {
            if (week.length > 0) {
                const o = week[0].o;
                const h = Math.max(...week.map(b => b.h));
                const l = Math.min(...week.map(b => b.l));
                const c = week[week.length - 1].c;
                const v = week.reduce((sum, b) => sum + b.v, 0);
                const d_str = week[week.length - 1].d;
                weekly.push({ d: d_str, o, h, l, c, v });
                week = [];
            }
        }
    }
    
    return weekly;
}

function aggregateToMonthly(dailyBars) {
    if (!dailyBars || dailyBars.length === 0) return [];
    
    const monthly = [];
    let month = [];
    let currentMonth = null;
    
    for (let i = 0; i < dailyBars.length; i++) {
        const bar = dailyBars[i];
        const date = new Date(bar.d);
        const monthKey = date.getFullYear() + '-' + String(date.getMonth() + 1).padStart(2, '0');
        
        if (currentMonth === null) {
            currentMonth = monthKey;
        }
        
        if (monthKey !== currentMonth) {
            // Month changed - finalize previous month
            if (month.length > 0) {
                const o = month[0].o;
                const h = Math.max(...month.map(b => b.h));
                const l = Math.min(...month.map(b => b.l));
                const c = month[month.length - 1].c;
                const v = month.reduce((sum, b) => sum + b.v, 0);
                const d_str = month[month.length - 1].d;
                monthly.push({ d: d_str, o, h, l, c, v });
                month = [];
            }
            currentMonth = monthKey;
        }
        
        month.push(bar);
    }
    
    // Add last month
    if (month.length > 0) {
        const o = month[0].o;
        const h = Math.max(...month.map(b => b.h));
        const l = Math.min(...month.map(b => b.l));
        const c = month[month.length - 1].c;
        const v = month.reduce((sum, b) => sum + b.v, 0);
        const d_str = month[month.length - 1].d;
        monthly.push({ d: d_str, o, h, l, c, v });
    }
    
    return monthly;
}

function downsampleRSI(dailyRSI, dailyBars, aggregatedBars) {
    // Map daily RSI values to aggregated bars by matching end date
    const downsampled = [];
    
    aggregatedBars.forEach(aggBar => {
        const aggDate = new Date(aggBar.d);
        let closestRSI = null;
        let minDiff = Infinity;
        
        for (let i = 0; i < dailyBars.length; i++) {
            if (dailyRSI[i] === null) continue;
            
            const dailyDate = new Date(dailyBars[i].d);
            const diff = Math.abs(aggDate - dailyDate);
            
            if (diff < minDiff) {
                minDiff = diff;
                closestRSI = dailyRSI[i];
            }
        }
        
        downsampled.push(closestRSI);
    });
    
    return downsampled;
}

function calculateEMA(bars, period = 20) {
    const ema = [];
    let sum = 0;
    const multiplier = 2 / (period + 1);
    
    bars.forEach((bar, i) => {
        if (i < period - 1) {
            sum += bar.c;
            ema.push(null);
        } else if (i === period - 1) {
            sum += bar.c;
            const sma = sum / period;
            ema.push(sma);
        } else {
            const prevEMA = ema[i - 1];
            const newEMA = bar.c * multiplier + prevEMA * (1 - multiplier);
            ema.push(newEMA);
        }
    });
    
    // Debug logging
    const validEMAs = ema.filter(e => e !== null);
    if (validEMAs.length > 0) {
        
    }
    
    return ema;
}

function calculateRSI(bars, period = 14) {
    if (!bars || bars.length <= period) return bars.map(() => null);
    
    const rsi = [];
    const changes = [];
    
    // Calculate all price changes
    for (let i = 1; i < bars.length; i++) {
        changes.push(bars[i].c - bars[i - 1].c);
    }
    
    // Calculate initial average gain and loss
    let sumGains = 0, sumLosses = 0;
    for (let i = 0; i < period; i++) {
        if (changes[i] > 0) {
            sumGains += changes[i];
        } else {
            sumLosses += Math.abs(changes[i]);
        }
    }
    
    let avgGain = sumGains / period;
    let avgLoss = sumLosses / period;
    
    // Fill nulls before period
    for (let i = 0; i < period; i++) {
        rsi.push(null);
    }
    
    // Calculate RSI from period onwards
    for (let i = period; i < changes.length; i++) {
        const change = changes[i];
        const currentGain = change > 0 ? change : 0;
        const currentLoss = change > 0 ? 0 : Math.abs(change);
        
        // Smooth average (Wilder's method)
        avgGain = (avgGain * (period - 1) + currentGain) / period;
        avgLoss = (avgLoss * (period - 1) + currentLoss) / period;
        
        const rs = avgLoss === 0 ? 100 : avgGain / avgLoss;
        const rsiValue = 100 - (100 / (1 + rs));
        rsi.push(rsiValue);
    }
    
    return rsi;
}

}

function aggregateCandles(daily, interval){
  // If interval is 'D', return daily data as-is
  if(interval === 'D' || !daily.length) return daily;

// Recalculate technical indicators for current candles
function recalculateIndicators(s){
  if(!s || !s.candles || s.candles.length === 0) return;
  
  // Create cache key based on interval + candle count + last candle close
  const cacheKey = `${S.chartInterval}_${s.candles.length}_${s.candles[s.candles.length-1]?.c || 0}`;
  
  // Skip if we've already calculated for this exact data set
  if(recalculateIndicators._lastKey === cacheKey) return;
  recalculateIndicators._lastKey = cacheKey;
  
  
  try {
    // Calculate SMAs (not EMAs - simpler moving averages)
    s.sma20 = calculateSMA(s.candles, 20);
    s.sma50 = calculateSMA(s.candles, 50);
    s.ema200 = calculateEMA(s.candles, 200);
  } catch(e) {
    s.sma20 = [];
    s.sma50 = [];
    s.ema200 = [];
  }
}

// Calculate Simple Moving Average
function calculateSMA(bars, period) {
  if(!bars || bars.length < period) return [];
  const sma = [];
  for(let i = 0; i < bars.length; i++) {
    if(i < period - 1) {
      sma.push(null);
    } else {
      let sum = 0;
      for(let j = i - period + 1; j <= i; j++) {
        sum += bars[j].c;
      }
      sma.push(sum / period);
    }
  }
  return sma;
}

function getSlicedCandles(s, canvasWidth){
  // Pick the right raw source based on interval
  let raw = null;
  if (S.chartInterval === 'W' && s.price?.history_5y_1wk?.length)
    raw = s.price.history_5y_1wk;
  else if (S.chartInterval === 'M' && s.price?.history_5y_1mo?.length)
    raw = s.price.history_5y_1mo;
  else if (s.price?.history_6mo_1d?.length)
    raw = s.price.history_6mo_1d;
  else if (s.price?.history_5y_1wk?.length)
    raw = s.price.history_5y_1wk;

  // Normalise to {d, o, h, l, c, v}
  let daily = raw
    ? raw.map(b => ({
        d: String(b.Date || b.d || ''),
        o: parseFloat(b.Open  || b.o || 0),
        h: parseFloat(b.High  || b.h || 0),
        l: parseFloat(b.Low   || b.l || 0),
        c: parseFloat(b.Close || b.c || 0),
        v: parseInt(b.Volume  || b.v || 0)
      })).filter(b => b.d && b.c > 0)
    : (s.candles || []);

  if (!daily.length) return [];
  daily.sort((a, b) => a.d.localeCompare(b.d));

  // Apply period cutoff
  const now = new Date();
  const days = {'1M':30,'3M':91,'6M':182,'1Y':365,'5Y':1825}[S.chartRange] || 365;
  const cutoff = new Date(now - days*864e5).toISOString().slice(0,10);
  let f = daily.filter(c => c.d >= cutoff);
  if (!f.length) f = daily.slice(-Math.max(20, Math.floor(daily.length * 0.25)));
  if (!f.length) return [];

  const w = Math.max(100, canvasWidth || 320);
  const base = Math.max(20, Math.floor((w-60)/7));
  const vis  = Math.max(10, Math.round(base / S.chartZoom));
  const maxP = Math.max(0, f.length - vis);
  const pan  = Math.max(0, Math.min(maxP, S.panOffset));
  const end  = f.length - pan;
  return f.slice(Math.max(0, end - vis), end);
}

// Extract quarterly data with all KPI metrics
function getQuarterlyData(s){
  const quarterly = [];
  
  if(!s || !s.financials) return quarterly;
  
  try {
    // ✅ Use user-selected data source instead of hardcoded consolidated/annual
    const accounting = S.financialSource?.accounting || 'consolidated';
    const frequency = S.financialSource?.frequency || 'annual';
    const f = s.financials;
    
    // Get data from selected accounting method and frequency
    const getFinancialData = (fieldName) => {
      if(!f[fieldName]) return {};
      if(!f[fieldName][accounting]) return {};
      return f[fieldName][accounting][frequency] || {};
    };
    
    // ✅ Map ALL financial metrics with CORRECT field names from market_data.json
    const salesData = getFinancialData('Sales');
    const netProfitData = getFinancialData('Net_Profit');
    const operatingProfitData = getFinancialData('Operating_Profit');
    const opmData = getFinancialData('OPM_pct');
    const pbtData = getFinancialData('Profit_before_tax');
    const epsData = getFinancialData('EPS_Rs');
    const cfoData = getFinancialData('CFO');
    const fcfData = getFinancialData('Free_Cash_Flow');
    const ncfData = getFinancialData('Net_Cash_Flow');
    const assetsData = getFinancialData('Total_Assets');
    const borrowingsData = getFinancialData('Borrowings');
    const interestData = getFinancialData('Interest');
    
    // Get all unique dates
    const allDates = new Set([
      ...Object.keys(salesData),
      ...Object.keys(netProfitData),
      ...Object.keys(operatingProfitData),
      ...Object.keys(opmData),
      ...Object.keys(pbtData),
      ...Object.keys(epsData),
      ...Object.keys(cfoData),
      ...Object.keys(fcfData),
      ...Object.keys(ncfData),
      ...Object.keys(assetsData),
      ...Object.keys(borrowingsData),
      ...Object.keys(interestData)
    ]);
    
    // Build data points - sorted oldest first
    Array.from(allDates).sort().forEach(date => {
      const q = { d: date };
      
      // Income Statement metrics
      if(salesData[date]) { q.rev = parseFloat(salesData[date]) || 0; q.sales = q.rev; }
      if(operatingProfitData[date]) q.op = parseFloat(operatingProfitData[date]) || 0;
      if(opmData[date]) q.opm = parseFloat(opmData[date]) || 0;
      if(pbtData[date]) q.pbt = parseFloat(pbtData[date]) || 0;
      if(netProfitData[date]) q.net = parseFloat(netProfitData[date]) || 0;
      if(epsData[date]) q.eps = parseFloat(epsData[date]) || 0;
      if(interestData[date]) q.interest = parseFloat(interestData[date]) || 0;
      
      // Balance Sheet metrics
      if(assetsData[date]) q.assets = parseFloat(assetsData[date]) || 0;
      if(borrowingsData[date]) q.borrowings = parseFloat(borrowingsData[date]) || 0;
      if(borrowingsData[date]) q.debt = parseFloat(borrowingsData[date]) || 0;
      
      // Cash Flow metrics
      if(cfoData[date]) q.cfo = parseFloat(cfoData[date]) || 0;
      if(fcfData[date]) q.fcf = parseFloat(fcfData[date]) || 0;
      if(ncfData[date]) q.ncf = parseFloat(ncfData[date]) || 0;
      
      if(Object.keys(q).length > 1) quarterly.push(q);
    });
    
    if(quarterly.length > 0) return quarterly;
  } catch(e) {
  }
  
  
  // Fallback to simple quarterly array if exists
  return s.quarterly || [];
}

  if(s.ema200&&S.maVis.ema200)allPrices.push(...s.ema200.filter(v=>v!==null));
  
  // Ensure we have valid price data
  if(allPrices.length === 0) {
    ctx.fillStyle='#060c18';
    ctx.fillRect(0,0,W,H);
    ctx.fillStyle='rgba(255,107,133,0.7)';
    ctx.font='bold 11px monospace';
    ctx.textAlign='center';
    ctx.fillText('No valid price data', W/2, H/2);
    return;
  }
  
  const mn=Math.min(...allPrices), mx=Math.max(...allPrices), rng=mx-mn||1;
  
  // ✅ Y-axis labels use FULL range - they stay stable, don't move
  const toY=p=>PAD.t+((mx-p)/rng)*cH;
  
  // ✅ VERTICAL BAR ZOOM: Uses your VERTICAL PINCH GESTURE (S.yAxisZoom)
  const barHeightZoom = S.yAxisZoom || 1.0;  // 1.0 = normal, 2.0 = 2x taller
  const barX = i => PAD.l + i*gap + gap/2;

  // Background
  ctx.fillStyle='#070c18';
  ctx.fillRect(0,0,W,H);

  // Grid lines
  for(let i=0;i<=4;i++){
    const y=PAD.t+(cH/4)*i;
    ctx.strokeStyle='rgba(255,255,255,.1)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(PAD.l,y);ctx.lineTo(PAD.l+cW,y);ctx.stroke();
  }

  // Right axis separator (draw BEFORE labels so labels appear on top)
  ctx.fillStyle='rgba(7,12,24,.8)';
  ctx.fillRect(W-PAD.r,0,PAD.r,H);
  ctx.strokeStyle='rgba(100,130,180,.6)';  // ✅ Brighter blue for visibility
  ctx.lineWidth=1.5;  // ✅ Slightly thicker
  ctx.beginPath();ctx.moveTo(W-PAD.r,0);ctx.lineTo(W-PAD.r,H);ctx.stroke();

  // Price labels (draw AFTER background so they're visible on top)
  for(let i=0;i<=4;i++){
    const y=PAD.t+(cH/4)*i;
    const price=mx-(mx-mn)*(i/4);
    ctx.fillStyle='rgba(255,255,255,1)';
    ctx.font='bold 11px JetBrains Mono,monospace';ctx.textAlign='right';ctx.textBaseline='middle';
    ctx.fillText(Math.round(price).toLocaleString('en-IN'),W-6,y);
  }

  // Clip all chart drawing to chart area — nothing bleeds into right axis strip
  ctx.save();
  ctx.beginPath();
  ctx.rect(PAD.l, 0, cW, H);
  ctx.clip();

  // Candles - ✅ Track bar positions for click detection
  candlestickBars = [];
  
  candles.forEach((c,i)=>{
    const bull=c.c>=c.o;
    const cx=barX(i);
    let bodyTop=toY(Math.max(c.o,c.c));
    let bodyH=Math.max(1,Math.abs(toY(c.o)-toY(c.c)));
    
    // ✅ Apply bar height zoom (bars get taller when zoomed in, labels stay same)
    const bodyCenter = bodyTop + bodyH/2;
    const originalBodyH = bodyH;
    bodyH = bodyH * barHeightZoom;  // Make bars MUCH taller
    bodyTop = bodyCenter - bodyH/2;  // Recenter the body
    
    // ✅ Track bar for click detection
    candlestickBars.push({
      date: c.d,
      open: c.o,
      high: c.h,
      low: c.l,
      close: c.c,
      volume: c.v,
      bull: bull,
      x: cx - bw/2,
      y: bodyTop,
      w: bw,
      h: bodyH
    });
    
    // Wick
    ctx.strokeStyle=bull?'rgba(0,255,136,.95)':'rgba(255,68,102,.95)';  // ✅ Much brighter wicks
    ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(cx,toY(c.h));ctx.lineTo(cx,toY(c.l));ctx.stroke();

    // Body (taller due to zoom)
    ctx.fillStyle=bull?'#00ff88':'#ff4466';  // ✅ Brighter colors
    if(ctx.roundRect)ctx.roundRect(cx-bw/2,bodyTop,bw,bodyH,1);
    else ctx.rect(cx-bw/2,bodyTop,bw,bodyH);
    ctx.fill();

    if(!bull){ctx.strokeStyle='rgba(255,68,102,.5)';ctx.lineWidth=1;ctx.stroke();}  // ✅ More visible border
  });

  // ── Moving Average curves computed from candle close prices ──
  function calcSMA(arr, period){
    return arr.map((c,i)=>{
      if(i < period-1) return null;
      const sum = arr.slice(i-period+1, i+1).reduce((a,b)=>a+b.c, 0);
      return sum / period;
    });
  }
  function calcEMA(arr, period){
    const k = 2/(period+1);
    const result = new Array(arr.length).fill(null);
    // Find first valid index
    let first = period-1;
    if(first >= arr.length) return result;
    result[first] = arr.slice(0,period).reduce((a,b)=>a+b.c,0)/period;
    for(let i=first+1; i<arr.length; i++){
      result[i] = arr[i].c * k + result[i-1] * (1-k);
    }
    return result;
  }
  function drawMALine(vals, col, dash, label){
    ctx.strokeStyle=col; ctx.lineWidth=1.2; ctx.setLineDash(dash||[]);
    ctx.beginPath();
    let started=false;
    vals.forEach((v,i)=>{
      if(v===null) return;
      const x=barX(i), y=toY(v);
      if(!started){ ctx.moveTo(x,y); started=true; } else ctx.lineTo(x,y);
    });
    ctx.stroke(); ctx.setLineDash([]);
    // Label at last valid point
    const lastIdx = vals.reduce((best,v,i)=>v!==null?i:best, -1);
    if(lastIdx>=0 && label){
      const lv = vals[lastIdx];
      ctx.fillStyle=col; ctx.font='bold 7px JetBrains Mono,monospace'; ctx.textAlign='right';
      ctx.fillText(label+' '+Math.round(lv).toLocaleString('en-IN'), W-2, toY(lv)-3);
    }
  }
  // MAs computed on allCandles (full history), then only visible portion drawn
  // This ensures EMA200 is correct even on short-range views
  if(S.maVis.sma20 || S.maVis.sma50 || S.maVis.ema200){
    const allC = s.candles || candles;
    const sma20vals  = S.maVis.sma20  ? calcSMA(allC, 20)  : null;
    const sma50vals  = S.maVis.sma50  ? calcSMA(allC, 50)  : null;
    const ema200vals = S.maVis.ema200 ? calcEMA(allC, 200) : null;

    // Map allCandles index → visible x position using date
    function maX(allIdx){
      const t = new Date(allC[allIdx].d).getTime();
      return PAD.l + ((t - visFirst) / visRange) * cW;
    }
    function drawMAFull(vals, col, dash, label){
      if(!vals) return;
      ctx.strokeStyle = col; ctx.lineWidth = 1.2; ctx.setLineDash(dash||[]);
      ctx.beginPath();
      let started = false;
      vals.forEach((v,i)=>{
        if(v === null) return;
        const x = maX(i);
        if(x < PAD.l - 2 || x > PAD.l + cW + 2){ started = false; return; }
        const y = toY(v);
        if(!started){ ctx.moveTo(x,y); started=true; } else ctx.lineTo(x,y);
        // Sample hit points every ~10px
        if(maPoints.length === 0 || x - maPoints[maPoints.length-1].x > 10)
          maPoints.push({x, y, label, value: v, date: allC[i].d, col});
      });
      ctx.stroke(); ctx.setLineDash([]);
    }
    drawMAFull(sma20vals,  '#f59e0b', [],    'SMA20');
    drawMAFull(sma50vals,  '#3b82f6', [],    'SMA50');
    drawMAFull(ema200vals, '#a855f7', [4,3], 'EMA200');
  }

  // Restore chart clip — x-axis labels and right-axis items draw freely
  ctx.restore();

  // Current price dashed line
  const _ltp = resolveField(s, 'ltp');
  if(_ltp){
    const lastY=toY(_ltp);
    const bull = candles.length && _ltp >= candles[0].c;
    ctx.strokeStyle=bull?'rgba(0,208,132,.5)':'rgba(255,59,92,.5)';
    ctx.lineWidth=.6;ctx.setLineDash([3,3]);
    ctx.beginPath();ctx.moveTo(PAD.l,lastY);ctx.lineTo(PAD.l+cW,lastY);ctx.stroke();
    ctx.setLineDash([]);
    // Price badge on right axis
    ctx.fillStyle=bull?'#00d084':'#ff3b5c';
    ctx.font='bold 9px JetBrains Mono,monospace';ctx.textAlign='right';
    ctx.fillText(Math.round(_ltp).toLocaleString('en-IN'),W-2,Math.max(lastY+4,PAD.t+10));
  }

  // X-axis date labels - optimized for mobile
  const maxLabels = Math.min(4, Math.floor(cW / 50));  // ✅ Fewer labels on mobile
  const lblStep = Math.max(1, Math.floor(n / maxLabels));
  ctx.fillStyle='rgba(255,255,255,0.9)';
  ctx.font='bold 12px sans-serif';  // ✅ Bigger font for mobile
  ctx.textBaseline = 'top';
  candles.forEach((c,i)=>{
    if(i % lblStep !== 0 && i !== n-1) return;
    let lbl = '';
    
    // Parse date string YYYY-MM-DD
    if(c.d && typeof c.d === 'string') {
      const parts = c.d.split('-');
      if(parts.length === 3) {
        const [yyyy, mm, dd] = parts;
        if(S.chartInterval==='M')      lbl = mm+'/'+ yyyy.slice(2);
        else if(S.chartRange==='5Y'||S.chartRange==='1Y') lbl = mm+'/'+ yyyy.slice(2);
        else                            lbl = dd+'/'+ mm;
      }
    }
    
    const x = barX(i);
    if(x > PAD.l+cW-8) return;
    ctx.textAlign = i===0 ? 'left' : (i===n-1 ? 'right' : 'center');
    ctx.fillText(lbl, x, PAD.t + cH + 10);  // ✅ More space below
  });

  // ── KPI overlays on price chart ──────────────────────────────────
  const quarterly = getQuarterlyData(s);
  drawCandlestick._kpiLabelY = []; // reset label collision tracker

  const KPI_DEFS = [
    // Income Statement
    {k:'sales', label:'Sales',    col:'#a78bfa'},
    {k:'rev',  label:'Rev',       col:'#22d3ee'},
    {k:'op',   label:'Op.Profit', col:'#ec4899'},
    {k:'opm',  label:'OPM%',      col:'#fb923c'},
    {k:'pbt',  label:'PBT',       col:'#8b5cf6'},
    {k:'net',  label:'Net',       col:'#4ade80'},
    {k:'eps',  label:'EPS',       col:'#06b6d4'},
    // Balance Sheet
    {k:'assets',     label:'Assets',  col:'#f0ad4e'},
    {k:'borrowings', label:'Borrow',  col:'#ff6b6b'},
    {k:'debt',       label:'Debt',    col:'#f87171'},
    // Cash Flow
    {k:'cfo',  label:'CFO',  col:'#34d399'},
    {k:'fcf',  label:'FCF',  col:'#14b8a6'},
    {k:'ncf',  label:'NCF',  col:'#2dd4bf'},
    // Valuation
    {k:'pe',   label:'P/E',  col:'#f59e0b'},
  ];

  // Use FULL candle history for price lookups — not just visible slice
  // (allCandles, visFirst, visRange, allFirst, allRange already defined above)

  function xForDate(dateStr){
    // ✅ Use VISIBLE range for alignment (same as candlesticks)
    const t = new Date(dateStr).getTime();
    const x = PAD.l + ((t - visFirst) / visRange) * cW;
    return x;
  }

  // Search FULL history for price on/before a date
  function priceAt(dateStr){
    for(let i=allCandles.length-1; i>=0; i--){
      if(allCandles[i].d <= dateStr) return allCandles[i].c;
    }
    return allCandles.length ? allCandles[0].c : (resolveField(s, 'ltp') || 0);
  }

  // Log raw quarterly data once (commented out - uncomment for debugging)
  // if(quarterly.length){
  //  // }

  // Draw KPI overlays
  try {
  KPI_DEFS.forEach(({k, label, col})=>{
    if(!S.kpiVis[k]) return;

    let pts = [];
    try {
      if(k === 'pe'){
        // P/E ratio from EPS
        if(quarterly && quarterly.length > 0) {
          quarterly.forEach(q=>{
            if(!q.eps || q.eps <= 0) return;
            const annEPS = q.eps * 4;
            const price = priceAt(q.d);
            if(price > 0) pts.push({x: xForDate(q.d), v: price/annEPS, d: q.d});
          });
        }
      } else {
        // Other KPIs from quarterly data
        if(quarterly && quarterly.length > 0) {
          quarterly.forEach(q=>{
            const v = q[k];
            if(v != null && !isNaN(v)) pts.push({x: xForDate(q.d), v, d: q.d});
          });
        }
      }

      // Wide margin so annual dots just outside viewport still anchor the line
      pts = pts.filter(p => p.x >= PAD.l - cW && p.x <= PAD.l + cW * 2);

      if(pts.length < 2) return;
    } catch(e) {
      return;
    }

    if(!pts.length) return;

    const drawLine = pts.length >= 2;

    // Map values to Y using a DEDICATED right-side scale for this KPI
    // This avoids the problem of small PE values (eg 18x) mapping to price range (eg 500-800)
    const vals = pts.map(p=>p.v);
    const vMin = Math.min(...vals)*0.92, vMax = Math.max(...vals)*1.08;
    const vRng = vMax - vMin || 1;
    // Use top 80% of chart height, leaving room for x-axis labels at bottom
    const yTop = PAD.t + 4, yBot = H - PAD.b - 16;
    const kpiY = v => yBot - ((v - vMin) / vRng) * (yBot - yTop);

    ctx.save();
    // Clip lines/fills to chart area only — prevent bleeding into right axis
    ctx.beginPath();
    ctx.rect(PAD.l, PAD.t, cW, H - PAD.t - PAD.b);
    ctx.clip();
    ctx.strokeStyle = col; ctx.lineWidth = 1.5; ctx.globalAlpha = 0.9;

    if(drawLine){
      // Line only — no fill
      ctx.globalAlpha = 0.9;
      ctx.beginPath();
      pts.forEach((p,j)=>{ j===0 ? ctx.moveTo(p.x, kpiY(p.v)) : ctx.lineTo(p.x, kpiY(p.v)); });
      ctx.stroke();
    }

    // Dots
    ctx.fillStyle = col; ctx.globalAlpha = 1;
    pts.forEach(p=>{
      ctx.beginPath();
      ctx.arc(p.x, kpiY(p.v), 2.5, 0, Math.PI*2);
      ctx.fill();
      kpiPoints.push({
        x: p.x,
        y: kpiY(p.v),
        label: label,
        value: p.v,
        date: p.d,
        key: k,
        col: col,
        radius: 12
      });
    });

    ctx.restore(); // restore clip
  });
  } catch(e) {
    const cv = document.getElementById('cv-candle');
    if(cv) {
      const ctx = cv.getContext('2d');
      ctx.fillStyle = '#060c18';
      ctx.fillRect(0, 0, cv.width, cv.height);
      ctx.fillStyle = 'rgba(255, 107, 133, 0.7)';
      ctx.font = 'bold 11px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('Chart render failed', cv.width/2, cv.height/2);
      ctx.font = '10px monospace';
      ctx.fillText(e.message, cv.width/2, cv.height/2 + 20);
    }
  }
  } catch(e) {} // close outer try wrapping drawCandlestick body
}

// chartInteraction declared here so it's available before first use in drawVolume touch handler
let chartInteraction = {isPanning:false};

// Volume bars with 5-period MA trend line

function drawVolume(s){
  const cv=document.getElementById('cv-vol');
  if(!cv)return;
  const wrap=document.getElementById('vol-wrap');
  const W2=Math.max(wrap?wrap.offsetWidth:0, 280);
  const H2=130;  // ✅ Increased from 112 to 130 for more x-axis label space
  const dpr=window.devicePixelRatio||1;
  cv.width=W2*dpr;
  cv.height=H2*dpr;
  cv.style.width=W2+'px';
  cv.style.height=H2+'px';
  const ctx=cv.getContext('2d');
  ctx.scale(dpr,dpr);
  
  // ✅ Disable image smoothing to prevent blur when zoomed
  ctx.imageSmoothingEnabled = false;

  const candles=getSlicedCandles(s, W2);
  if(!candles.length)return;

  ctx.fillStyle='#070c18';ctx.fillRect(0,0,W2,H2);

  const W=W2,H=H2;
  const PAD={l:8,r:62,t:6,b:28};
  const cW=W-PAD.l-PAD.r,cH=H-PAD.t-PAD.b;
  const n=candles.length,gap=cW/n;
  // ✅ Apply zoom to volume bar width too
  const volBaseWidth = Math.max(1,Math.min(n > 40 ? 2 : 4, gap*0.25));
  const bw = volBaseWidth * S.chartZoom;
  const mv=Math.max(...candles.map(c=>c.v))||1;
  
  // Calculate price range from candles for labels
  const allPrices = candles.map(c=>c.h).concat(candles.map(c=>c.l));
  const _ltpVol = resolveField(s, 'ltp') || 0;
  const startPrice = Math.max(...allPrices) || _ltpVol;
  const endPrice = Math.min(...allPrices) || _ltpVol;
  
  // Volume bars colored by EACH candlestick's close > open logic (matches candlestick colors)

  // Left axis line (thicker for visibility)
  ctx.strokeStyle='rgba(100,130,180,.5)';
  ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(PAD.l,PAD.t);ctx.lineTo(PAD.l,PAD.t+cH);ctx.stroke();

  // Volume bars - each bar colored based on corresponding candlestick
  candles.forEach((c,i)=>{
    const bh=Math.max(2,(c.v/mv)*cH);
    const x = PAD.l+i*gap+(gap-bw)/2;
    // Color: green if close > open, red if close <= open (matches candlestick color)
    const barColor = (c.c > c.o) ? '#00d084' : '#ff3b5c';
    ctx.fillStyle=barColor;
    ctx.beginPath();
    ctx.rect(x,PAD.t+cH-bh,bw,bh);
    ctx.fill();
  });

  // ✅ RIGHT axis - Volume labels on RIGHT side (not left to avoid overlap)
  ctx.fillStyle='rgba(7,12,24,.8)';
  ctx.fillRect(W-PAD.r,0,PAD.r,H);
  ctx.strokeStyle='rgba(100,130,180,.6)';
  ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(W-PAD.r,0);ctx.lineTo(W-PAD.r,H);ctx.stroke();
  
  // ✅ Volume labels on RIGHT side (RIGHT aligned, with padding from edge)
  ctx.fillStyle='rgba(255,255,255,1)';
  ctx.font='bold 10px JetBrains Mono,monospace';
  ctx.textAlign='right';  // ✅ Changed from left to right
  ctx.textBaseline='middle';
  const maxVol = Math.max(...candles.map(c=>c.v))||1;
  for(let i=0; i<=2; i++){
    const y = PAD.t + cH - (cH/2)*i;
    const volValue = (i/2) * maxVol;
    let label;
    if (volValue >= 1e6) {
      label = (volValue / 1e6).toFixed(1) + 'M';
    } else if (volValue >= 1e3) {
      label = (volValue / 1e3).toFixed(0) + 'K';
    } else {
      label = volValue.toFixed(0);
    }
    ctx.fillText(label, W-6, y);  // ✅ Draw on right side (W-6)
  }
  
  // Price labels on right axis
  ctx.fillStyle='rgba(255,255,255,.95)';
  ctx.font='bold 9px JetBrains Mono,monospace';
  ctx.textAlign='right';
  ctx.fillText(Math.round(startPrice).toLocaleString('en-IN'), W-2, PAD.t+6);
  ctx.fillText(Math.round(endPrice).toLocaleString('en-IN'), W-2, H-2);
  
  // Volume trend line (smoothed MA5)
  const volMA = candles.map((c,i)=>{
    if(i<4) return null;
    return candles.slice(i-4,i+1).reduce((a,b)=>a+b.v,0)/5;
  });
  ctx.strokeStyle='rgba(255,255,255,.3)'; ctx.lineWidth=1.5; ctx.beginPath();
  let started=false;
  volMA.forEach((v,i)=>{
    if(v===null) return;
    const x=PAD.l+i*gap+gap/2;
    const y=PAD.t+cH-(v/mv)*cH;
    if(!started){ctx.moveTo(x,y);started=true;} else ctx.lineTo(x,y);
  });
  ctx.stroke();
  
  // ✅ X-axis date labels for volume chart - optimized for mobile
  const volMaxLabels = Math.min(4, Math.floor(cW / 50));  // ✅ Fewer labels on mobile
  const volLblStep = Math.max(1, Math.floor(n / volMaxLabels));
  ctx.fillStyle='rgba(255,255,255,0.9)';
  ctx.font='bold 12px sans-serif';  // ✅ Bigger font for mobile
  ctx.textBaseline='top';
  candles.forEach((c,i)=>{
    if(i % volLblStep !== 0 && i !== n-1) return;
    let lbl = '';
    
    // Parse date string YYYY-MM-DD
    if(c.d && typeof c.d === 'string') {
      const parts = c.d.split('-');
      if(parts.length === 3) {
        const [yyyy, mm, dd] = parts;
        if(S.chartInterval==='M')      lbl = mm+'/'+ yyyy.slice(2);
        else if(S.chartRange==='5Y'||S.chartRange==='1Y') lbl = mm+'/'+ yyyy.slice(2);
        else                            lbl = dd+'/'+ mm;
      }
    }
    
    const x = PAD.l + i*gap + gap/2;
    if(x > PAD.l+cW-8) return;
    ctx.textAlign = i===0 ? 'left' : (i===n-1 ? 'right' : 'center');
    ctx.fillText(lbl, x, PAD.t + cH + 8);  // ✅ Below volume chart
  });
}

// ── Tooltip helper ────────────────────────────────────
function showTip(id, borderCol, html, ex, ey) {
  let tip = document.getElementById(id);
  if(!tip){ tip=document.createElement('div'); tip.id=id; document.body.appendChild(tip); }
  tip.style.cssText='position:fixed;background:rgba(10,20,40,.95);border:2px solid;border-radius:8px;padding:10px 14px;font-family:monospace;font-size:12px;z-index:9999;max-width:220px;min-width:150px';
  tip.style.borderColor = borderCol;
  tip.innerHTML = html;
  let left = ex + 12, top = ey - 80;
  if(left + 230 > window.innerWidth) left = Math.max(8, ex - 240);
  if(top < 8) top = ey + 12;
  if(top + 120 > window.innerHeight) top = Math.max(8, window.innerHeight - 130);
  tip.style.left = left+'px'; tip.style.top = top+'px';
  clearTimeout(tip._t);
  tip._t = setTimeout(()=>{ tip.remove(); }, 3000);
}

function handleChartClick(e, canvas, W2, H2) {
  const br = canvas.getBoundingClientRect();
  const scX = W2/br.width, scY = H2/br.height;
  const mx = (e.clientX-br.left)*scX, my = (e.clientY-br.top)*scY;

  // 1. MA lines
  if(maPoints.length) {
    const maHit = maPoints.reduce((best, p) => {
      const d = Math.sqrt((mx-p.x)**2 + (my-p.y)**2);
      return d < (best.d||999) ? {p, d} : best;
    }, {}).p;
    if(maHit && Math.sqrt((mx-maHit.x)**2+(my-maHit.y)**2) <= 14) {
      showTip('ma-tooltip', maHit.col,
        `<div style="color:${maHit.col};font-weight:bold;margin-bottom:6px">${maHit.label}</div>
         <div style="color:#aaa;font-size:11px;line-height:1.7">
           <div>Date: <span style="color:#fff">${maHit.date}</span></div>
           <div>Value: <span style="color:${maHit.col};font-weight:bold">₹${Math.round(maHit.value).toLocaleString('en-IN')}</span></div>
         </div>`, e.clientX, e.clientY);
      return;
    }
  }

  // 2. KPI overlay dots
  if(kpiPoints.length) {
    const kpiHit = kpiPoints.find(kpi => {
      const dx = mx-kpi.x, dy = my-kpi.y;
      return Math.sqrt(dx*dx+dy*dy) <= kpi.radius;
    });
    if(kpiHit) {
      const dispVal = kpiHit.key==='pe'  ? kpiHit.value.toFixed(1)+'x' :
                      kpiHit.key==='opm' ? kpiHit.value.toFixed(1)+'%' :
                      Math.abs(kpiHit.value)>=1000 ? (kpiHit.value/1000).toFixed(1)+'K Cr' :
                      kpiHit.value.toFixed(0)+' Cr';
      showTip('kpi-overlay-tooltip', kpiHit.col,
        `<div style="color:${kpiHit.col};font-weight:bold;margin-bottom:6px">${kpiHit.label}</div>
         <div style="color:#aaa;font-size:11px;line-height:1.7">
           <div>Date: <span style="color:#fff">${kpiHit.date==='now'?'Latest':kpiHit.date}</span></div>
           <div>Value: <span style="color:${kpiHit.col};font-weight:bold">${dispVal}</span></div>
         </div>`, e.clientX, e.clientY);
      return;
    }
  }

  // 3. Candlestick bars
  if(!candlestickBars.length) return;
  const bar = candlestickBars.find(b => mx>=b.x && mx<=b.x+b.w && my>=b.y && my<=b.y+b.h);
  let tip = document.getElementById('chart-tooltip');
  if(!bar || window.candleTooltipBar===bar.date) {
    if(tip) tip.remove();
    window.candleTooltipBar = null;
    return;
  }
  window.candleTooltipBar = bar.date;
  const o=bar.open.toFixed(2), h=bar.high.toFixed(2), l=bar.low.toFixed(2), c=bar.close.toFixed(2);
  const chg = ((c-o)/o*100).toFixed(2);
  const chgColor = chg>=0 ? '#00ff88' : '#ff4466';
  showTip('chart-tooltip','#00d4ff',
    `<div style="color:#00d4ff;font-weight:bold;margin-bottom:6px">${bar.date}</div>
     <div style="color:#aaa;font-size:11px;line-height:1.7">
       <div>O: ₹<span style="color:#fff">${o}</span> &nbsp; H: ₹<span style="color:#fff">${h}</span></div>
       <div>L: ₹<span style="color:#fff">${l}</span> &nbsp; C: ₹<span style="color:#fff">${c}</span></div>
     </div>
     <div style="margin-top:6px;color:${chgColor};font-weight:bold">${chg>=0?'+':''}${chg}%</div>
     <div style="color:#555;font-size:10px">Vol: ${(bar.volume/1e5).toFixed(1)}L</div>`,
    e.clientX, e.clientY);
}

function updateChartStats(s){
  const candles=getSlicedCandles(s, 0);
  if(!candles.length)return;
  const closes=candles.map(c=>c.c);
  const first=closes[0],last=closes[closes.length-1];
  const ret=((last-first)/first*100).toFixed(2);
  const hi=Math.max(...candles.map(c=>c.h));
  const lo=Math.min(...candles.map(c=>c.l));
  const vol=((hi-lo)/lo*100).toFixed(1);
  const up=last>=first;
  const retEl=document.getElementById('cstat-ret');
  const hiEl=document.getElementById('cstat-hi');
  const loEl=document.getElementById('cstat-lo');
  const volEl=document.getElementById('cstat-vol');
  if(retEl){retEl.textContent=(up?'+':'')+ret+'%';retEl.style.color=up?'var(--gr2)':'var(--rd2)';}
  if(hiEl)hiEl.textContent='₹'+fmt(hi);
  if(loEl)loEl.textContent='₹'+fmt(lo);
  if(volEl)volEl.textContent=vol+'%';
}

// Chart control functions
function canvasSetChartRange(r){ S.chartRange=r; S.panOffset=0; scheduleTACharts._pending=false; scheduleChartRedraw(); }
function canvasSetChartInterval(iv){
  S.chartInterval=iv; S.panOffset=0; scheduleTACharts._pending=false; recalculateIndicators._lastKey=null;
  if(currentStock && currentStock.price) {
    let historyData = null;
    let historyType = null;
    
    // Load from correct source based on interval
    if(iv === 'D') {
      historyData = currentStock.price.history_6mo_1d;
      historyType = 'Daily (6mo)';
    } else if(iv === 'W') {
      historyData = currentStock.price.history_5y_1wk;
      historyType = 'Weekly (5y)';
    } else if(iv === 'M') {
      historyData = currentStock.price.history_5y_1mo;
      historyType = 'Monthly (5y)';
    }
    
    // Convert to candle format
    if(historyData && Array.isArray(historyData) && historyData.length > 0) {
      try {
        const converted = [];
        for(let i = 0; i < historyData.length; i++) {
          const bar = historyData[i];
          const candle = {
            d: String(bar.Date || ''),
            o: parseFloat(bar.Open || 0),
            h: parseFloat(bar.High || 0),
            l: parseFloat(bar.Low || 0),
            c: parseFloat(bar.Close || 0),
            v: parseInt(bar.Volume || 0)
          };
          
          // Only add if all OHLC values are valid numbers
          if(!isNaN(candle.o) && !isNaN(candle.h) && !isNaN(candle.l) && !isNaN(candle.c) && candle.o > 0) {
            converted.push(candle);
          }
        }
        
        if(converted.length > 0) {
          currentStock.candles = converted;
          
          // Clear cached indicators
          delete currentStock.sma20;
          delete currentStock.sma50;
          delete currentStock.ema200;
          delete currentStock.rsi14;
          recalculateIndicators._lastKey = null;
          aggregateCandles._cache = null;
          
          scheduleChartRedraw();
          return;
        } else {
        }
      } catch(e) {
      }
    } else {
    }
  }
  
  scheduleChartRedraw();
}

  if(key==='vol'){setupChartInteraction._initialized=false;renderTab('canvas');}
  else scheduleChartRedraw();

function toggleAllKPI(on){
  Object.keys(S.kpiVis).forEach(k=>{S.kpiVis[k]=on;const cb=document.getElementById('kpi-'+k);if(cb)cb.checked=on;});

function toggleKPI(k){
  S.kpiVis[k]=!S.kpiVis[k];
  const allOn=Object.values(S.kpiVis).every(v=>v),allOff=Object.values(S.kpiVis).every(v=>!v);

async function canvasLoadAndDrawChart(sym) {
  // ✅ Step 1: Check if stock ALREADY HAS candle data (from your database/app)
  if(currentStock && currentStock.candles && currentStock.candles.length > 0) {
    attachChartResizeObserver(currentStock);
    scheduleTACharts(currentStock);
    setupChartInteraction();  // Enable pan/zoom once
    return;
  }
  
  // ✅ Step 2: Try optional JSON file (if you have one)
  try {
    const res = await fetch(`./charts/${sym}.json`);
    if (res.ok) {
      const data = await res.json();
      currentStock.candles = data.bars || [];
      chartCache[sym] = currentStock.candles;
      attachChartResizeObserver(currentStock);
      scheduleTACharts(currentStock);
      setupChartInteraction();  // Enable pan/zoom once
      return;
    }
  } catch (e) {
    // JSON not available - that's ok
  }
  
  // ✅ Step 3: Use whatever data we have, or show helpful message
  if(currentStock) {
    attachChartResizeObserver(currentStock);
    scheduleTACharts(currentStock);
    setupChartInteraction();  // Enable pan/zoom once
  }
}

// PAN & ZOOM - Simpler Implementation
// ════════════════════════════════════════════════

function setupChartInteraction(){
  if(setupChartInteraction._initialized) return;
  const canvas = document.getElementById('cv-candle');
  if(!canvas) return;
  setupChartInteraction._initialized = true;
  const t={lastDist:0,isPanning:false,startX:0,startPan:0};
  let lastT=0;
  const go=()=>{const n=performance.now();if(n-lastT>=32){scheduleTACharts(currentStock);lastT=n;}};
  const bpp=()=>{const w=canvas.offsetWidth||320;return Math.max(10,Math.round(Math.max(20,Math.floor((w-60)/7))/S.chartZoom))/(w-60);};

  canvas.addEventListener('mousedown',e=>{t.isPanning=true;t.startX=e.clientX;t.startPan=S.panOffset;},{passive:true});
  document.addEventListener('mousemove',e=>{
    if(!t.isPanning||!currentStock)return;
    S.panOffset=Math.max(0,t.startPan-Math.round((e.clientX-t.startX)*bpp()));
    go();
  },{passive:true});
  document.addEventListener('mouseup',()=>{t.isPanning=false;},{passive:true});
  canvas.addEventListener('wheel',e=>{
    if(!currentStock)return; e.preventDefault();
    S.chartZoom=Math.max(0.3,Math.min(5,S.chartZoom*(e.deltaY<0?1.15:0.87)));
    scheduleTACharts(currentStock);
  },{passive:false});

  const ts=e=>{
    if(e.touches.length===2){
      const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;
      t.lastDist=Math.sqrt(dx*dx+dy*dy);t.isPanning=false;
    }else{t.isPanning=true;t.startX=e.touches[0].clientX;t.startPan=S.panOffset;t.lastDist=0;}
  };
  const tm=e=>{
    if(e.touches.length===2){
      const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;
      const d=Math.sqrt(dx*dx+dy*dy);
      if(t.lastDist>0){
        const delta=(d/t.lastDist)-1;
        if(Math.abs(delta)>0.005){
          const f=1+delta*0.6;
          if(Math.abs(dy)>Math.abs(dx)) S.yAxisZoom=Math.max(0.5,Math.min(3,(S.yAxisZoom||1)*f));
          else S.chartZoom=Math.max(0.3,Math.min(5,S.chartZoom*f));
          if(currentStock) go();
        }
      }
      t.lastDist=d; e.preventDefault();
    }else if(t.isPanning&&currentStock){
      S.panOffset=Math.max(0,t.startPan-Math.round((e.touches[0].clientX-t.startX)*bpp()));
      go();
    }
  };
  const te=()=>{t.isPanning=false;t.lastDist=0;};
  canvas.ontouchstart=ts;canvas.ontouchmove=tm;canvas.ontouchend=te;
  const v=document.getElementById('cv-vol');
  if(v){v.ontouchstart=ts;v.ontouchmove=tm;v.ontouchend=te;}
}
// Auto-setup when canvas is ready
document.addEventListener('DOMContentLoaded', setupChartInteraction);

function timeAgo(d){if(!d||isNaN(d))return '';const s=Math.floor((Date.now()-d)/1000);if(s<60)return 'just now';if(s<3600)return Math.floor(s/60)+'m ago';if(s<86400)return Math.floor(s/3600)+'h ago';return Math.floor(s/86400)+'d ago';}

function classifyNews(t){
  const u=t.toUpperCase();
  if(/RESULT|PROFIT|REVENUE|EARNING|Q[1-4]/.test(u))return{tag:'RESULTS',imp:'H'};
  if(/RBI|REPO|INFLATION|CPI|GDP|RATE CUT|RATE HIKE|MONETARY/.test(u))return{tag:'RBI',imp:'H'};
  if(/SEBI|REGULATION|PENALTY|PROBE|CBI|ED/.test(u))return{tag:'POLICY',imp:'H'};
  if(/OIL|CRUDE|OPEC|BRENT|PETROLEUM/.test(u))return{tag:'OIL',imp:'H'};
  if(/WAR|IRAN|ISRAEL|CONFLICT|SANCTION|GEO|MILITARY/.test(u))return{tag:'GEO',imp:'H'};
  if(/FII|FPI|DII|FOREIGN INFLOW|OUTFLOW/.test(u))return{tag:'FII',imp:'M'};
  if(/MERGER|ACQUI|DEAL|STAKE|BUYBACK|DIVIDEND/.test(u))return{tag:'CORP',imp:'M'};
  if(/SENSEX|NIFTY|RALLY|CRASH|SURGE|PLUNGE/.test(u))return{tag:'INDEX',imp:'M'};
  return{tag:'NEWS',imp:'L'};
}

function extractDomain(url){try{return new URL(url).hostname.replace(/^www\./,'').split('.')[0];}catch(_){return 'News';}}

async function loadStockNews(sym,name){
  const el=document.getElementById('stock-news-list');
  if(!el)return;
  try{
    const query=encodeURIComponent(sym+' '+name+' NSE India stock');
    const url='https://api.rss2json.com/v1/api.json?rss_url='+encodeURIComponent('https://news.google.com/rss/search?q='+query+'&hl=en-IN&gl=IN&ceid=IN:en')+'&count=8';
    const res=await fetch(url);
    const d=await res.json();
    const items=d.items||[];
    if(!items.length){el.innerHTML=`<div class="u-pad14c">No recent news for ${sym}</div>`;return;}
    el.innerHTML=items.map(item=>{
      const{tag,imp}=classifyNews(item.title);
      const src=item.source?.name||extractDomain(item.link)||'News';
      return `<div class="news-item" style="margin:0;border-radius:0;border-left:none;border-right:none;border-top:none">
        <div class="news-src">
          <span>${src}</span>
          <span class="imp-badge imp-${imp}">${imp==='H'?'HIGH':imp==='M'?'MED':'LOW'}</span>
          <span class="pill pill-bl" style="font-size:7px">${tag}</span>
          <span>${timeAgo(new Date(item.pubDate))}</span>
        </div>
        <div class="news-title">${item.title}</div>
      </div>`;
    }).join('');
  }catch(e){
    el.innerHTML=`<div class="u-pad14c">Could not load news</div>`;
  }
}
