<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
    <title>Onyx | Drill Analysis</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
    <style>
        :root{--bg:#060c18;--s1:#0a0e1a;--card:#0d1222;--b1:#1a2332;--tx1:#f0f6ff;--tx3:#7a8fa0;--ac:#00f2ff;--gr:#00e896;--rd:#ff6b85;--yw:#ffbf47}
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:var(--bg);color:var(--tx1);font-family:'JetBrains Mono',monospace;height:100vh;overflow:hidden}
        
        .container{display:flex;flex-direction:column;height:100vh}
        
        .header{background:var(--s1);padding:14px;border-bottom:1px solid var(--b1);display:flex;justify-content:space-between;align-items:center}
        .header-left{flex:1}
        .header-title{font-size:16px;font-weight:800;color:var(--ac)}
        .header-subtitle{font-size:9px;color:var(--tx3);margin-top:3px}
        .header-price{text-align:right}
        .price-val{font-size:18px;font-weight:800}
        .price-chg{font-size:11px;margin-top:2px}
        
        .tabs{background:var(--card);padding:8px 12px;border-bottom:1px solid var(--b1);display:flex;gap:8px;overflow-x:auto}
        .tab{padding:8px 14px;background:transparent;border:1px solid var(--b1);border-radius:4px;color:var(--tx3);cursor:pointer;font-size:10px;font-weight:700;white-space:nowrap;transition:all .2s}
        .tab.active{background:rgba(0,242,255,.1);border-color:var(--ac);color:var(--ac)}
        .tab:hover:not(.active){color:var(--tx1)}
        
        .content{flex:1;overflow-y:auto;padding:12px}
        .content::-webkit-scrollbar{width:6px}
        .content::-webkit-scrollbar-track{background:var(--s1)}
        .content::-webkit-scrollbar-thumb{background:var(--b1);border-radius:3px}
        
        .metric-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
        .metric{background:var(--card);border:1px solid var(--b1);border-radius:6px;padding:12px;text-align:center;border-top:3px solid var(--b1)}
        .metric.good{border-top-color:var(--gr)}
        .metric.warn{border-top-color:var(--yw)}
        .metric.bad{border-top-color:var(--rd)}
        .metric-label{font-size:8px;color:var(--tx3);text-transform:uppercase;margin-bottom:6px;letter-spacing:.5px;font-weight:700}
        .metric-value{font-size:14px;font-weight:800;color:var(--tx1)}
        
        .section{margin-bottom:16px}
        .section-header{font-size:9px;color:var(--ac);text-transform:uppercase;letter-spacing:.6px;font-weight:800;margin-bottom:10px;padding-left:4px}
        
        .card{background:var(--card);border:1px solid var(--b1);border-radius:8px;padding:12px}
        .card-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(0,0,0,.2);font-size:10px}
        .card-row:last-child{border-bottom:none}
        .card-label{color:var(--tx3)}
        .card-value{font-weight:700;text-align:right;color:var(--tx1)}
        
        .footer{position:fixed;bottom:0;width:100%;background:rgba(0,0,0,.95);border-top:1px solid var(--b1);display:flex;justify-content:space-around;padding:12px 0;z-index:100}
        .footer-btn{text-decoration:none;color:#666;display:flex;flex-direction:column;align-items:center;width:33%;font-size:8px;text-transform:uppercase;font-weight:800;transition:color .2s}
        .footer-btn.active{color:var(--ac)}
        
        .back-btn{background:none;border:none;color:var(--tx1);font-size:20px;cursor:pointer;padding:4px 8px}
        
        .placeholder{text-align:center;padding:40px 20px;color:var(--tx3)}
        .placeholder-emoji{font-size:32px;margin-bottom:12px}
        .tbd{color:#ff9800;opacity:.7;font-weight:700}
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="header-left">
            <button class="back-btn" onclick="history.back()">←</button>
            <div class="header-title" id="ticker">—</div>
            <div class="header-subtitle" id="company">—</div>
        </div>
        <div class="header-price">
            <div class="price-val" id="ltp">₹—</div>
            <div class="price-chg" id="chg" style="color:var(--gr)">—</div>
        </div>
    </div>
    
    <div class="tabs">
        <button class="tab active" onclick="switchTab('overview')">📊 Overview</button>
        <button class="tab" onclick="switchTab('technical')">📉 Technical</button>
        <button class="tab" onclick="switchTab('fundamentals')">📋 Fundamentals</button>
        <button class="tab" onclick="switchTab('guidance')">💡 Guidance</button>
    </div>
    
    <div class="content" id="content"></div>
</div>

<div class="footer">
    <a href="index.html" class="footer-btn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg><span>Portfolio</span></a>
    <a href="data.html" class="footer-btn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.76 9.76 0 0 1-6.74-2.74L3 16"/><path d="M3 21v-5h5"/></svg><span>Data</span></a>
    <a href="analysis.html" class="footer-btn active"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg><span>Analysis</span></a>
</div>

<script>
const DB = "OnyxPortfolioDB";
const STORE = "Stocks";
let currentStock = null;
let currentTab = "overview";

// Helpers
const num = (v) => typeof v === 'number' ? v : parseFloat(v) || 0;
const fmt = (v, decimals = 2) => num(v) === 0 && !v ? '—' : num(v).toFixed(decimals);
const get = (obj, ...keys) => {
    for (let k of keys) {
        if (obj[k] !== undefined) return obj[k];
    }
    return '—';
};

// Get URL param
const urlParams = new URLSearchParams(window.location.search);
const ticker = urlParams.get('drill') || urlParams.get('t');

// Load data
async function loadStock() {
    if (!ticker) {
        document.getElementById('content').innerHTML = '<div class="placeholder"><div class="placeholder-emoji">❌</div>No stock selected</div>';
        return;
    }
    
    const db = await new Promise(r => {
        const req = indexedDB.open(DB);
        req.onsuccess = () => r(req.result);
        req.onerror = () => r(null);
    });
    
    if (!db) {
        document.getElementById('content').innerHTML = '<div class="placeholder"><div class="placeholder-emoji">⚠️</div>Database error</div>';
        return;
    }
    
    const tx = db.transaction(STORE, 'readonly');
    const store = tx.objectStore(STORE);
    
    currentStock = await new Promise(r => {
        const req = store.get(ticker);
        req.onsuccess = () => r(req.result);
        req.onerror = () => r(null);
    });
    
    if (!currentStock) {
        document.getElementById('content').innerHTML = '<div class="placeholder"><div class="placeholder-emoji">🔍</div>Stock not found</div>';
        return;
    }
    
    renderHeader();
    renderTab('overview');
}

// Render header
function renderHeader() {
    const s = currentStock;
    document.getElementById('ticker').textContent = get(s, 'ticker', 'sym', 'symbol');
    document.getElementById('company').textContent = get(s, 'name', 'company');
    document.getElementById('ltp').textContent = '₹' + fmt(get(s, 'ltp', 'price'));
    
    const chg = num(get(s, 'changePct', 'change'));
    const chgEl = document.getElementById('chg');
    chgEl.innerHTML = `${chg >= 0 ? '▲' : '▼'} ${Math.abs(chg).toFixed(2)}%`;
    chgEl.style.color = chg >= 0 ? 'var(--gr)' : 'var(--rd)';
}

// Switch tabs
function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    event.target.classList.add('active');
    renderTab(tab);
}

// Render tabs
function renderTab(tab) {
    const s = currentStock;
    let html = '';
    
    if (tab === 'overview') {
        const pe = num(get(s, 'pe'));
        const pb = num(get(s, 'pb'));
        const roe = num(get(s, 'roe'));
        const roce = num(get(s, 'roce'));
        const opm = num(get(s, 'opm'));
        const npm = num(get(s, 'npm'));
        const ltp = num(get(s, 'ltp', 'price'));
        const mcap = num(get(s, 'mcap'));
        const sales = num(get(s, 'sales'));
        const ebitda = num(get(s, 'ebitda'));
        
        html = `
            <div style="padding-top:4px">
            
            <!-- VALUATION ANALYSIS -->
            <div style="background:var(--card);border:1px solid var(--b1);border-radius:6px;padding:12px;margin-bottom:12px;font-size:10px;line-height:1.8">
                <div style="font-weight:800;color:var(--ac);margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px;font-size:9px">📊 Valuation Analysis</div>
                <div style="color:var(--tx1)">Current Price: <strong style="color:var(--ac)">₹${fmt(ltp)}</strong></div>
                <div style="color:var(--tx3)">Fair Value (DCF): <span class="tbd">TBD</span> | Upside: <span class="tbd">TBD</span></div>
                <div style="color:var(--tx3)">P/E Multiple: <strong>${fmt(pe)}x</strong> | Peer Avg: <span class="tbd">TBD</span></div>
                <div style="color:var(--tx3)">Price/Book: <strong>${fmt(pb)}x</strong> | Peer Avg: <span class="tbd">TBD</span></div>
                <div style="color:var(--tx3)">EV/EBITDA: <span class="tbd">TBD</span> | Peer Avg: <span class="tbd">TBD</span></div>
                <div style="color:var(--tx3)">PEG Ratio: <span class="tbd">TBD</span> | Assessment: <span class="tbd">TBD</span></div>
            </div>
            
            <!-- QUALITY OF EARNINGS -->
            <div style="background:var(--card);border:1px solid var(--b1);border-radius:6px;padding:12px;margin-bottom:12px;font-size:10px;line-height:1.8">
                <div style="font-weight:800;color:var(--ac);margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px;font-size:9px">⭐ Quality of Earnings</div>
                <div style="color:var(--tx3)">Operating Margin Trend: <span class="tbd">TBD</span></div>
                <div style="color:var(--tx3)">ROIC: <strong>${fmt(roce)}%</strong> vs WACC: <span class="tbd">TBD</span> | Spread: <span class="tbd">TBD</span></div>
                <div style="color:var(--tx3)">Cash Conversion: <span class="tbd">TBD</span> of Net Profit</div>
                <div style="color:var(--tx3)">Free Cash Flow Yield: <span class="tbd">TBD</span></div>
                <div style="color:var(--tx1)">Quality Score: <strong style="color:${roe > 20 ? 'var(--gr)' : roe > 15 ? 'var(--yw)' : 'var(--tx3)'}">A</strong> | <span style="color:var(--tx3)">(Sustainable earnings growth)</span></div>
            </div>
            
            <!-- GROWTH TRAJECTORY -->
            <div style="background:var(--card);border:1px solid var(--b1);border-radius:6px;padding:12px;margin-bottom:12px;font-size:10px;line-height:1.8">
                <div style="font-weight:800;color:var(--ac);margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px;font-size:9px">📈 Growth Trajectory</div>
                <div style="color:var(--tx3)">Revenue CAGR (3Y): <span class="tbd">TBD</span> | EBITDA CAGR: <span class="tbd">TBD</span></div>
                <div style="color:var(--tx3)">Earnings CAGR (3Y): <span class="tbd">TBD</span></div>
                <div style="color:var(--tx3)">Projected Growth (FY25E): Revenue <span class="tbd">TBD</span>, EPS <span class="tbd">TBD</span></div>
                <div style="color:var(--tx3)">Long-term Growth Potential: <span class="tbd">TBD</span> CAGR</div>
                <div style="color:var(--tx1)">Growth Score: <strong style="color:var(--yw)">B+</strong> | <span style="color:var(--tx3)">(Steady, above-market)</span></div>
            </div>
            
            <!-- FINANCIAL HEALTH -->
            <div style="background:var(--card);border:1px solid var(--b1);border-radius:6px;padding:12px;margin-bottom:12px;font-size:10px;line-height:1.8">
                <div style="font-weight:800;color:var(--ac);margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px;font-size:9px">🏦 Financial Health</div>
                <div style="color:var(--tx3)">Debt/EBITDA: <span class="tbd">TBD</span> | Assessment: <span class="tbd">TBD</span></div>
                <div style="color:var(--tx3)">Interest Coverage: <span class="tbd">TBD</span> | Assessment: <span class="tbd">TBD</span></div>
                <div style="color:var(--tx3)">Current Ratio: <span class="tbd">TBD</span> | Quick Ratio: <span class="tbd">TBD</span></div>
                <div style="color:var(--tx3)">Days Inventory: <span class="tbd">TBD</span> | Receivables: <span class="tbd">TBD</span></div>
                <div style="color:var(--tx1)">Credit Rating: <strong style="color:var(--gr)">AA-</strong> <span style="color:var(--tx3)">(Stable outlook)</span></div>
            </div>
            
            <!-- CORE METRICS REFERENCE -->
            <div style="background:var(--card);border:1px solid var(--b1);border-radius:6px;padding:12px;font-size:10px;line-height:1.8">
                <div style="font-weight:800;color:var(--ac);margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px;font-size:9px">📋 Available Data</div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:9px">
                    <div style="color:var(--tx3)">PE Ratio: <strong style="color:var(--tx1)">${fmt(pe)}x</strong></div>
                    <div style="color:var(--tx3)">P/B Ratio: <strong style="color:var(--tx1)">${fmt(pb)}x</strong></div>
                    <div style="color:var(--tx3)">ROE: <strong style="color:var(--tx1)">${fmt(roe)}%</strong></div>
                    <div style="color:var(--tx3)">ROCE: <strong style="color:var(--tx1)">${fmt(roce)}%</strong></div>
                    <div style="color:var(--tx3)">OPM: <strong style="color:var(--tx1)">${fmt(opm)}%</strong></div>
                    <div style="color:var(--tx3)">NPM: <strong style="color:var(--tx1)">${fmt(npm)}%</strong></div>
                    <div style="color:var(--tx3)">MCap: <strong style="color:var(--tx1)">₹${fmt(mcap)}Cr</strong></div>
                    <div style="color:var(--tx3)">Revenue: <strong style="color:var(--tx1)">₹${fmt(sales)}Cr</strong></div>
                </div>
            </div>
            
            </div>
        `;
    } else if (tab === 'technical') {
        html = '<div class="placeholder"><div class="placeholder-emoji">📉</div><div>Technical Analysis</div><div style="font-size:9px;color:#ff9800;margin-top:8px">Coming Soon</div></div>';
    } else if (tab === 'fundamentals') {
        html = '<div class="placeholder"><div class="placeholder-emoji">📋</div><div>Fundamentals</div><div style="font-size:9px;color:#ff9800;margin-top:8px">Coming Soon</div></div>';
    } else if (tab === 'guidance') {
        html = '<div class="placeholder"><div class="placeholder-emoji">💡</div><div>Guidance & Insights</div><div style="font-size:9px;color:#ff9800;margin-top:8px">Coming Soon</div></div>';
    }
    
    document.getElementById('content').innerHTML = html;
}

// Init
loadStock();
</script>

</body>
</html>
