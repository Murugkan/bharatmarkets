name: intraday

on:
  schedule:
    # Every 1 hour during trading hours (09:15-16:30 IST)
    - cron: "0 4-10 * * 1-5"
    - cron: "0 11 * * 1-5"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  intraday:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install yfinance

      - name: Fetch intraday data
        run: python fetch_intraday.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add data/intraday_yahoo_*.json data/meta_intraday_yahoo_*.json data/intraday_yahoo_*.log
          
          git diff --cached --quiet && exit 0
          
          git commit -m "intraday: prices [$(date -u +'%Y-%m-%dT%H:%M:%SZ')]"
          git pull --rebase origin main
          git push origin HEAD:main
