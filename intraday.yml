name: "[INTRADAY] Fetch Prices (Every 1 Hour)"

on:
  schedule:
    # Every 1 hour during trading hours (09:15-16:30 IST)
    - cron: "0 4-10 * * 1-5"
    - cron: "0 11 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  intraday-fetch:
    name: "Intraday - Fetch Prices (fetch_intraday.py)"
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install yfinance

      - name: "[INTRADAY] Fetch prices from Yahoo Finance"
        run: python fetch_intraday.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add data/intraday_yahoo_*.json data/intraday_screener_*.json data/meta_intraday_*.json data/intraday_*.log 2>/dev/null || true
          
          git diff --cached --quiet && exit 0
          
          git commit -m "intraday: prices [$(date -u +'%Y-%m-%dT%H:%M:%SZ')]"
          git pull --rebase origin main
          git push origin HEAD:main
