<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
    <title>Portfolio Data</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg:#000; --s1:#0a0a0a; --b1:#222; --bl:#00f2ff; --gr:#00ff88; --rd:#ff4d6d; --tx:#fff; }
        *{box-sizing:border-box;margin:0;padding:0;}
        body { background:var(--bg); color:var(--tx); font-family:'JetBrains Mono',monospace; padding-bottom:80px; }
        header { background:var(--s1); border-bottom:1px solid var(--b1); padding:12px; display:flex; justify-content:space-between; align-items:center; }
        .title { font-size:14px; font-weight:800; color:var(--bl); }
        .header-right { display:flex; gap:10px; }
        button { padding:8px 12px; background:#00ff88; color:#000; border:none; border-radius:4px; cursor:pointer; font-weight:bold; font-size:11px; }
        button:hover { opacity:0.9; }
        .container { padding:15px; max-width:100%; margin:0 auto; }
        .refresh-section { background:#0a0a0a; border:1px solid var(--b1); border-radius:8px; padding:15px; margin-bottom:20px; }
        .refresh-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(250px, 1fr)); gap:15px; }
        .refresh-card { background:#050505; border:1px solid var(--b1); border-radius:6px; padding:12px; }
        .refresh-card-title { font-size:11px; color:var(--bl); font-weight:800; margin-bottom:8px; }
        .refresh-btn { width:100%; padding:10px; background:var(--gr); color:#000; border:none; border-radius:4px; font-weight:bold; cursor:pointer; font-size:11px; }
        .refresh-btn:hover { opacity:0.9; }
        .table-wrap { overflow-x:auto; background:#050505; border:1px solid var(--b1); border-radius:8px; margin-top:20px; max-height:600px; overflow-y:auto; }
        table { width:100%; border-collapse:collapse; font-size:10px; }
        th { background:#111; color:#00ff88; padding:8px; text-align:left; border-bottom:1px solid var(--b1); position:sticky; top:0; font-weight:800; }
        td { padding:8px; border-bottom:0.5px solid #111; }
        tr:hover { background:#0a0a0a; }
        .pos { color:#00ff88; }
        .neg { color:#ff6b85; }
        
        footer { position:fixed; bottom:0; width:100%; background:rgba(0,0,0,0.95); border-top:1px solid #222; display:flex; justify-content:space-around; padding:12px 0; z-index:1000; }
        .nav-btn { text-decoration:none; color:#666; display:flex; flex-direction:column; align-items:center; width:33%; padding:8px 0; transition:color 0.2s; }
        .nav-btn:hover { color:var(--bl); }
        .nav-btn.active { color:var(--bl); font-weight:800; }
        .nav-label { font-size:8px; margin-top:4px; font-weight:800; text-transform:uppercase; letter-spacing:1px; }
        
        /* FULL-SCREEN IMPORT MODAL */
        #import-overlay { position:fixed; top:0; left:0; right:0; bottom:0; background:#000; z-index:1100; display:none; flex-direction:column; }
        #import-overlay.active { display:flex; }
        
        .import-header { display:flex; justify-content:space-between; align-items:center; padding:20px; background:#0a0a0a; border-bottom:2px solid var(--b1); flex-shrink:0; }
        .import-header-title { font-size:16px; font-weight:800; color:#00ff88; }
        .import-header-close { background:#ff6b85; color:#fff; border:none; padding:10px 15px; border-radius:4px; cursor:pointer; font-weight:bold; font-size:16px; }
        .import-header-close:hover { opacity:0.9; }
        
        .import-content { flex:1; overflow-y:auto; overflow-x:auto; padding:25px; background:#000; }
        
        .import-footer { display:flex; gap:10px; padding:20px; background:#0a0a0a; border-top:2px solid var(--b1); flex-shrink:0; }
        .import-footer button { flex:1; padding:15px; font-size:12px; font-weight:bold; }
        
        /* Wizard styles */
        .imp-tabs { display:flex; gap:0; border-bottom:2px solid #333; margin-bottom:20px; }
        .imp-tab { flex:1; padding:12px; text-align:center; font-size:12px; font-weight:700; cursor:pointer; color:#666; border-bottom:2px solid transparent; margin-bottom:-2px; transition:all .2s; }
        .imp-tab.on { color:#00ff88; border-bottom-color:#00ff88; }
        .imp-pane { display:none; } 
        .imp-pane.on { display:block; }
        
        .file-drop { border:3px dashed #333; border-radius:12px; padding:40px 20px; text-align:center; cursor:pointer; transition:all .2s; background:#050505; }
        .file-drop:hover, .file-drop.drag { border-color:#00ff88; background:rgba(0,255,136,0.08); }
        .file-drop input[type=file] { display:none; }
        .file-drop-icon { font-size:48px; margin-bottom:12px; }
        .file-drop-title { font-size:16px; font-weight:700; color:#fff; margin-bottom:8px; }
        .file-drop-sub { font-size:11px; color:#999; line-height:1.8; }
        .file-drop-sub b { color:#00ff88; }
        
        .import-textarea { width:100%; padding:12px; background:#050505; border:1px solid #333; border-radius:6px; color:#fff; font-family:monospace; font-size:12px; resize:vertical; min-height:200px; }
        
        .import-status { font-size:11px; color:#999; padding:10px 0; min-height:24px; }
        .import-status.ok { color:#00ff88; }
        .import-status.err { color:#ff6b85; }
        
        .import-preview { margin-top:20px; background:#050505; border:1px solid #333; border-radius:6px; padding:15px; max-height:400px; overflow-y:auto; display:none; }
        .import-preview.on { display:block; }
        .import-preview-title { font-size:12px; font-weight:800; color:#00ff88; margin-bottom:12px; }
        .import-preview-row { display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid #222; font-size:11px; }
        
        .import-fmt { background:#050505; border:1px solid #333; border-radius:6px; padding:12px; font-size:10px; color:#999; line-height:1.8; margin-bottom:15px; }
    </style>
</head>
<body>

<header>
    <div class="title">📊 PORTFOLIO DATA</div>
    <div class="header-right">
        <button onclick="openImportWorkflow()">📥 Load</button>
        <button onclick="location.reload()">🔄 Reload</button>
        <button onclick="exportData()">📤 Export</button>
    </div>
</header>

<div class="container">
    <!-- Refresh Controls -->
    <div class="refresh-section">
        <div class="refresh-grid">
            <div class="refresh-card">
                <div class="refresh-card-title">📈 Refresh Prices</div>
                <button class="refresh-btn" onclick="refreshPrices()">Refresh Prices</button>
                <div style="font-size:9px;color:#666;margin-top:8px;">Last Updated: Never</div>
            </div>
            <div class="refresh-card">
                <div class="refresh-card-title">💹 Refresh Fundamentals</div>
                <button class="refresh-btn" onclick="refreshFundamentals()">Refresh Fundamentals</button>
                <div style="font-size:9px;color:#666;margin-top:8px;">Last Updated: Never</div>
            </div>
            <div class="refresh-card">
                <div class="refresh-card-title">🔗 Full Sync & Reload</div>
                <button class="refresh-btn" onclick="fullSync()">Full Sync & Reload</button>
                <div style="font-size:9px;color:#666;margin-top:8px;">Last Updated: Never</div>
            </div>
        </div>
    </div>
    
    <!-- Data Table -->
    <div class="table-wrap">
        <table id="portfolio-table">
            <thead>
                <tr>
                    <th>Symbol</th>
                    <th>Name</th>
                    <th>Type</th>
                    <th>QTY</th>
                    <th>AVG</th>
                    <th>LTP</th>
                    <th>Invested</th>
                    <th>Current</th>
                    <th>P&L</th>
                    <th>P&L%</th>
                    <th>Sector</th>
                    <th>ISIN</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="portfolio-body">
                <tr><td colspan="13" style="text-align:center;padding:20px;color:#666;">No data loaded</td></tr>
            </tbody>
        </table>
    </div>
</div>

<!-- FULL-SCREEN IMPORT MODAL -->
<div id="import-overlay">
  <div class="import-header">
    <div class="import-header-title">📁 Import Portfolio</div>
    <button class="import-header-close" onclick="closeImportModal()">✕ CLOSE</button>
  </div>
  
  <div class="import-content" id="import-content"></div>
  
  <div class="import-footer">
    <button onclick="applyImport('replace')" style="background:#00ff88;color:#000">✓ Import (Replace All)</button>
    <button onclick="applyImport('append')" style="background:#333;color:#00ff88">+ Append to Existing</button>
  </div>
</div>

<!-- Footer -->
<footer>
    <a href="index.html" class="nav-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>
        <span class="nav-label">Portfolio</span>
    </a>
    <a href="data.html" class="nav-btn active">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"></path><path d="M21 3v5h-5"></path><path d="M21 12a9 9 0 0 1-9 9 9.76 9.76 0 0 1-6.74-2.74L3 16"></path><path d="M3 21v-5h5"></path></svg>
        <span class="nav-label">Data</span>
    </a>
    <a href="nexus.html" class="nav-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
        <span class="nav-label">Import</span>
    </a>
</footer>

<script src="app-import.js"></script>
<script>
let parsedHoldings = [];

// ════════════════════════════════════════════════════
// IMPORT MODAL CONTROL
// ════════════════════════════════════════════════════

function openImportWorkflow() {
  parsedHoldings = [];
  const overlay = document.getElementById('import-overlay');
  const content = document.getElementById('import-content');
  
  if (overlay && content) {
    content.innerHTML = renderImportPanel();
    overlay.classList.add('active');
  }
}

function closeImportModal() {
  const overlay = document.getElementById('import-overlay');
  if (overlay) {
    overlay.classList.remove('active');
  }
}

function renderImportPanel() {
  return `
  <div class="imp-tabs">
    <div class="imp-tab on" onclick="switchImpTab('file')">📁 CDSL XLS</div>
    <div class="imp-tab" onclick="switchImpTab('paste')">📋 CDSL Text</div>
    <div class="imp-tab" onclick="switchImpTab('manual')">✏ Manual</div>
  </div>

  <div class="imp-pane on" id="ipane-file">
    <div class="file-drop" id="file-drop-zone"
      onclick="document.getElementById('file-input').click()"
      ondragover="event.preventDefault();this.classList.add('drag')"
      ondragleave="this.classList.remove('drag')"
      ondrop="handleFileDrop(event)">
      <input type="file" id="file-input" accept=".xls,.xlsx,.csv,.txt,.tsv" style="display:none"
        onchange="handleFileSelect(this.files[0])">
      <div class="file-drop-icon">📂</div>
      <div class="file-drop-title">Click to select CDSL XLS file</div>
      <div class="file-drop-sub">
        <b>CDSL Easiest → Portfolio → Equity Summary Details → Download XLS</b><br>
        Supports: XLS, XLSX, CSV, TSV (tab-separated)
      </div>
    </div>
    <div class="import-status" id="file-status"></div>
    <div id="imp-report" style="display:none;"></div>
  </div>

  <div class="imp-pane" id="ipane-paste">
    <div class="import-fmt">
      <b style="color:#00ff88">How to get this:</b><br>
      CDSL Easiest → Statement → Holdings → Select All → Copy → Paste below<br><br>
      <b style="color:#ffff00">Format:</b><br>
      INE040A01034 HDFC BANK LIMITED - EQ Beneficiary 84 68628.00<br><br>
      <b style="color:#ff6b85">⚠ No avg buy price in this format</b> — use XLS tab for full data
    </div>
    <textarea class="import-textarea" id="import-ta" placeholder="Paste CDSL statement text here…" oninput="liveParseImport(this.value)"></textarea>
  </div>

  <div class="imp-pane" id="ipane-manual">
    <div class="import-fmt">
      <b style="color:#00ff88">Format:</b>  SYMBOL, QTY, AVG_BUY<br>
      One stock per line. AVG_BUY is optional.<br><br>
      <b style="color:#00bbff">Examples:</b><br>
      RELIANCE, 10, 2450<br>
      HDFCBANK, 84, 817.50<br>
      TATAPOWER, 100<br><br>
      <b style="color:#999">Find your symbol:</b> use NSE website or Screener.in
    </div>
    <textarea class="import-textarea" id="import-ta-manual" placeholder="RELIANCE, 10, 2450&#10;HDFCBANK, 84, 817&#10;TATAPOWER, 100, 385" oninput="liveParseImport(this.value,'manual')"></textarea>
  </div>

  <div id="import-preview" class="import-preview">
    <div class="import-preview-title" id="import-preview-title">Preview</div>
    <div id="import-preview-rows"></div>
  </div>
  `;
}

function switchImpTab(tab) {
  ['file', 'paste', 'manual'].forEach(t => {
    const pane = document.getElementById('ipane-' + t);
    if (pane) pane.classList.toggle('on', t === tab);
  });
}

function handleFileDrop(e) {
  e.preventDefault();
  const zone = document.getElementById('file-drop-zone');
  if (zone) zone.classList.remove('drag');
  if (e.dataTransfer.files.length > 0) {
    handleFileSelect(e.dataTransfer.files[0]);
  }
}

function handleFileSelect(file) {
  if (!file) return;
  const status = document.getElementById('file-status');
  if (!status) return;

  status.textContent = '⏳ Reading ' + file.name + '…';
  status.className = 'import-status';
  
  const ext = file.name.split('.').pop().toLowerCase();

  if (ext === 'xls' || ext === 'xlsx') {
    loadSheetJS(() => {
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const wb = XLSX.read(e.target.result, { type: 'binary' });
          const ws = wb.Sheets[wb.SheetNames[0]];
          const csv = XLSX.utils.sheet_to_csv(ws);
          processImportText(csv, file.name, status);
        } catch (err) {
          status.textContent = '✗ Error: ' + err.message;
          status.className = 'import-status err';
        }
      };
      reader.readAsBinaryString(file);
    });
    return;
  }

  const reader = new FileReader();
  reader.onload = (e) => processImportText(e.target.result, file.name, status);
  reader.readAsText(file);
}

let _sheetJSLoaded = false;
function loadSheetJS(cb) {
  if (_sheetJSLoaded) { cb(); return; }
  if (window.XLSX) { _sheetJSLoaded = true; cb(); return; }

  const s = document.createElement('script');
  s.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
  s.onload = () => { _sheetJSLoaded = true; cb(); };
  s.onerror = () => {
    const status = document.getElementById('file-status');
    if (status) {
      status.textContent = '✗ Could not load XLS reader — try CSV format';
      status.className = 'import-status err';
    }
  };
  document.head.appendChild(s);
}

function processImportText(text, filename, statusEl) {
  parsedHoldings = parsePortfolioText(text);

  if (parsedHoldings.length) {
    if (statusEl) {
      statusEl.textContent = '✓ ' + filename + ' — ' + parsedHoldings.length + ' holdings detected';
      statusEl.className = 'import-status ok';
    }
    showImportPreview();
  } else {
    if (statusEl) {
      statusEl.textContent = '✗ No holdings found in ' + filename;
      statusEl.className = 'import-status err';
    }
  }
}

function liveParseImport(text, mode) {
  parsedHoldings = parsePortfolioText(text);
  
  if (!text.trim()) {
    const preEl = document.getElementById('import-preview');
    if (preEl) preEl.classList.remove('on');
    return;
  }

  if (!parsedHoldings.length) {
    const preEl = document.getElementById('import-preview');
    if (preEl) preEl.classList.remove('on');
    return;
  }

  showImportPreview();
}

function showImportPreview() {
  const preEl = document.getElementById('import-preview');
  const preRows = document.getElementById('import-preview-rows');
  const preTitle = document.getElementById('import-preview-title');

  if (!preEl || !preRows) return;

  preTitle.textContent = '✓ ' + parsedHoldings.length + ' holdings detected';
  preRows.innerHTML = parsedHoldings.slice(0, 15).map(h => `
    <div class="import-preview-row">
      <div style="flex:1">
        <div style="font-weight:700;color:#00ff88">${h.sym}</div>
        <div style="font-size:9px;color:#666">${h.isin || ''}</div>
      </div>
      <div style="text-align:right">
        <div>×${h.qty}</div>
        <div style="color:#00ff88">₹${h.avgBuy.toFixed(2)}</div>
      </div>
    </div>`).join('') +
    (parsedHoldings.length > 15 ? '<div style="padding:10px;color:#666;text-align:center">+' + (parsedHoldings.length - 15) + ' more…</div>' : '');

  preEl.classList.add('on');
}

function applyImport(mode) {
  if (!parsedHoldings || !parsedHoldings.length) {
    alert('No holdings to import');
    return;
  }

  // For now, just show success
  alert('✓ Imported ' + parsedHoldings.length + ' holdings!');
  closeImportModal();
}

// ════════════════════════════════════════════════════
// DATA PAGE FUNCTIONS
// ════════════════════════════════════════════════════

function refreshPrices() {
    if (typeof refreshPortfolioData === 'function') {
        refreshPortfolioData();
    } else {
        alert('Prices refresh - loading prices.json');
    }
}

function refreshFundamentals() {
    if (typeof loadFundamentals === 'function') {
        loadFundamentals(true);
    } else {
        alert('Fundamentals refresh - loading fundamentals.json');
    }
}

function fullSync() {
    refreshPrices();
    refreshFundamentals();
    location.reload();
}

function exportData() {
    var portfolio = [];
    try {
        var data = localStorage.getItem('portfolio');
        if (data) {
            portfolio = JSON.parse(data);
        }
    } catch(e) {}
    
    if (portfolio.length === 0) {
        alert('No portfolio data to export');
        return;
    }
    
    var csv = 'Symbol,Name,Type,QTY,AVG,LTP,Sector,ISIN\n';
    for (var i = 0; i < portfolio.length; i++) {
        var s = portfolio[i];
        csv += (s.sym || '-') + ',' + (s.name || '-') + ',' + (s.type || 'PORTFOLIO') + ',' + (s.qty || 0) + ',' + (s.avg || 0) + ',' + (s.ltp || 0) + ',' + (s.sector || '-') + ',' + (s.isin || '-') + '\n';
    }
    
    var blob = new Blob([csv], {type:'text/csv'});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'portfolio.csv';
    a.click();
}

function loadPortfolioTable() {
    var portfolio = [];
    try {
        var data = localStorage.getItem('portfolio');
        if (data) {
            portfolio = JSON.parse(data);
        }
    } catch(e) {
        console.error('Error loading portfolio:', e);
    }
    
    renderTable(portfolio);
}

function renderTable(portfolio) {
    var tbody = document.getElementById('portfolio-body');
    if (portfolio.length === 0) {
        tbody.innerHTML = '<tr><td colspan="13" style="text-align:center;padding:20px;color:#666;">No data loaded</td></tr>';
        return;
    }
    
    var html = '';
    for (var i = 0; i < portfolio.length; i++) {
        var s = portfolio[i];
        var invested = (s.qty || 0) * (s.avg || 0);
        var current = (s.qty || 0) * (s.ltp || 0);
        var pnl = current - invested;
        var pnlPct = invested > 0 ? ((pnl / invested) * 100) : 0;
        var pnlClass = pnl >= 0 ? 'pos' : 'neg';
        
        html += '<tr><td>' + (s.sym || '-') + '</td><td>' + (s.name || '-') + '</td><td>' + (s.type || '-') + '</td><td>' + (s.qty || 0) + '</td><td>₹' + (s.avg || 0).toFixed(2) + '</td><td>₹' + (s.ltp || 0).toFixed(2) + '</td><td>₹' + invested.toFixed(2) + '</td><td>₹' + current.toFixed(2) + '</td><td class="' + pnlClass + '">₹' + pnl.toFixed(2) + '</td><td class="' + pnlClass + '">' + pnlPct.toFixed(2) + '%</td><td>' + (s.sector || '-') + '</td><td>' + (s.isin || '-') + '</td><td><button onclick="deleteStock(' + i + ')" style="background:#ff6b85;color:#fff;padding:2px 6px;font-size:9px;border:none;border-radius:2px;cursor:pointer;">✕</button></td></tr>';
    }
    tbody.innerHTML = html;
}

function deleteStock(idx) {
    alert('Delete - coming soon');
}

window.addEventListener('DOMContentLoaded', loadPortfolioTable);
</script>

</body>
</html>
