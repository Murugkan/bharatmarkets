<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>DQA</title>

<style>
body{margin:0;background:#000;color:#fff;font-family:monospace}
header{padding:12px;background:#0a0a0a;border-bottom:1px solid #222;display:flex;justify-content:space-between}
button{background:#00ff88;border:none;padding:8px 12px;font-weight:bold;border-radius:6px}

.table-wrap{margin:10px;border:1px solid #222;border-radius:8px;overflow:auto}
table{width:100%;border-collapse:collapse;font-size:11px}
th{background:#111;color:#00ff88;padding:8px;text-align:left}
td{padding:8px;border-bottom:1px solid #111;vertical-align:middle}

/* DEBUG /
#debug-panel{
position:fixed;bottom:0;left:0;right:0;
max-height:40%;background:#000;border-top:2px solid #00ff88;
overflow:auto;display:none;font-size:10px;
}
#debug-log{padding:10px;color:#0f0;white-space:pre-wrap}
.debug-btn{position:fixed;bottom:10px;right:10px;background:#00f2ff;color:#000}
</style>
</head>

<body>

<header>
<div>📊 DATA QUALITY AUDIT (DQA)</div>
<div>
<button onclick="loadDQA()">🔄 Reload</button>
</div>
</header>

<div class="table-wrap">
<table>
<thead>
<tr>
<th>SYM</th>
<th>NAME</th>
<th>TYPE</th>
<th>QTY</th>
<th>AVG</th>
<th>SECTOR</th>
<th>ISIN</th>
</tr>
</thead>
<tbody id="tbody">
<tr><td colspan="7">Loading...</td></tr>
</tbody>
</table>
</div>

<button class="debug-btn" onclick="toggleDebug()">🐞</button>

<div id="debug-panel">
<div id="debug-log"></div>
</div>

<script>

/ ================= DEBUG ================= /
var logs=[];
function log(m){logs.push(m);document.getElementById("debug-log").textContent=logs.join("\n")}
function toggleDebug(){
var p=document.getElementById("debug-panel");
p.style.display=p.style.display==="none"?"block":"none";
}

/ ================= DB ================= /
var DB="BharatEngineDB";
var STORE="UnifiedStocks";

function openDB(cb){

var req=indexedDB.open(DB,2);

req.onupgradeneeded=function(e){
var db=e.target.result;
log("DB upgrade");

if(!db.objectStoreNames.contains(STORE)){
db.createObjectStore(STORE,{keyPath:"sym"});
log("Store created");
}
};

req.onerror=function(){log("DB error")};

req.onsuccess=function(e){
log("DB ready");
cb(e.target.result);
};
}

/ ================= LOAD ================= /
function loadDQA(){

log("Loading...");

openDB(function(db){

try{
var tx=db.transaction(STORE,"readonly");
var store=tx.objectStore(STORE);
var req=store.getAll();

req.onsuccess=function(){

var data=req.result||[];
log("Stocks: "+data.length);

render(data);
};

}catch(err){
log("TX error: "+err.message);
}

});
}

/ ================= RENDER ================= /
function render(data){

var tbody=document.getElementById("tbody");

if(!data.length){
tbody.innerHTML="<tr><td colspan='7'>No Data</td></tr>";
return;
}

var html="";

data.forEach(function(s){

html+="<tr>"+
"<td>"+safe(s.sym)+"</td>"+
"<td>"+safe(s.name)+"</td>"+
"<td>"+(s.type||"portfolio")+"</td>"+
"<td>"+(s.qty||0)+"</td>"+
"<td>"+Number(s.avg||0).toFixed(2)+"</td>"+
"<td>"+safe(s.sector)+"</td>"+
"<td>"+safe(s.isin)+"</td>"+
"</tr>";

});

tbody.innerHTML=html;
log("Rendered: "+data.length);
}

/ ================= SAFE ================= /
function safe(v){
var d=document.createElement("div");
d.textContent=v||"";
return d.innerHTML;
}

/ ================= INIT ================= */
window.onload=function(){
log("Init");
loadDQA();
};

</script>

</body>
</html>
