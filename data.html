<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
    <title>Onyx | DATA</title>
    <link rel="stylesheet" href="app-styles.css">
    <script src="app-core.js"></script>
    <style>
        .input-group { margin-bottom: 20px; }
        label { display: block; font-size: 10px; color: var(--tx3); margin-bottom: 8px; text-transform: uppercase; font-weight: 800; }
        
        #conn-status { padding: 4px 10px; border-radius: 4px; font-size: 9px; font-weight: 900; }
        .status-off { background: #331111; color: #ff4444; border: 1px solid #ff4444; }
        .status-on { background: #113311; color: var(--gr); border: 1px solid var(--gr); }

        input { 
            width: 100%; background: #111; border: 1px solid #444; color: #fff; 
            padding: 14px; border-radius: 4px; font-size: 15px; box-sizing: border-box;
        }
        input.success { border-color: var(--gr); }
        input.error { border-color: #ff4444; }

        .btn-main { width: 100%; background: var(--bl); color: #000; border: none; padding: 16px; font-weight: 900; border-radius: 4px; text-transform: uppercase; }
        
        /* THE DEBUG WINDOW */
        #debug-window { 
            display: none; position: fixed; bottom: 80px; left: 15px; right: 15px; 
            background: #111; border: 1px solid #ff4444; padding: 15px; z-index: 1000;
            max-height: 200px; overflow-y: auto; font-family: monospace; font-size: 9px; color: #ff4444;
        }
    </style>
</head>
<body>

<div class="sec" style="margin: 20px 15px;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
        <h3 style="font-size:11px; color:var(--tx3); text-transform:uppercase;">0. System Connection</h3>
        <div id="conn-status" class="status-off">DISCONNECTED</div>
    </div>

    <div class="input-group">
        <label>GitHub Token (PAT)</label>
        <input type="password" id="gh-token" placeholder="paste github_pat_...">
    </div>

    <div class="input-group">
        <label>Repository (user/repo)</label>
        <input type="text" id="gh-repo" placeholder="e.g. murugkan/bharatmarkets">
    </div>

    <button id="btn-connect" class="btn-main" onclick="validatePAT()">Connect & Sync Cloud</button>
    <button onclick="toggleDebug()" style="background:none; border:none; color:#555; width:100%; margin-top:10px; font-size:9px;">[🐞 DEBUG CONSOLE]</button>
</div>

<div id="debug-window"><b>RAW SYSTEM ERRORS:</b><hr></div>

<div id="data-log" style="margin: 0 15px; height:100px; background:#000; border:1px solid #222; overflow-y:auto; padding:10px; font-size:10px; color:#888;"></div>

<nav class="footer-nav">
    <a href="data.html" class="nav-item active">📂 DATA</a>
    <a href="index.html" class="nav-item">📊 PORTFOLIO</a>
</nav>

<script>
window.addEventListener('load', () => {
    loadState();
    document.getElementById('gh-token').value = S.settings.ghToken || '';
    document.getElementById('gh-repo').value = S.settings.ghRepo || '';
    refreshUIStatus();
});

function toggleDebug() {
    const dbg = document.getElementById('debug-window');
    dbg.style.display = dbg.style.display === 'none' ? 'block' : 'none';
}

function debugLog(err) {
    const dbg = document.getElementById('debug-window');
    dbg.innerHTML += `<br>> ${err}`;
    dbg.scrollTop = dbg.scrollHeight;
}

function refreshUIStatus() {
    const badge = document.getElementById('conn-status');
    const isOk = S.settings._ghStatus === 'ok';
    badge.innerText = isOk ? 'CONNECTED' : 'DISCONNECTED';
    badge.className = isOk ? 'status-on' : 'status-off';
}

async function validatePAT() {
    const btn = document.getElementById('btn-connect');
    const t = document.getElementById('gh-token').value.trim();
    const r = document.getElementById('gh-repo').value.trim();
    
    if(!t || !r) return toast("Missing Credentials");

    btn.disabled = true;
    btn.innerText = "VERIFYING...";
    
    S.settings.ghToken = t;
    S.settings.ghRepo = r;

    try {
        // PRO TIP: We fetch the repo metadata to verify access
        const res = await fetch(`https://api.github.com/repos/${r}`, {
            headers: { 
                'Authorization': `token ${t}`,
                'Accept': 'application/vnd.github.v3+json'
            }
        });

        if (res.ok) {
            dataLog("Success: Connected", "✅");
            S.settings._ghStatus = 'ok';
            saveSettings();
            refreshUIStatus();
        } else {
            const errData = await res.json();
            debugLog(`API Error: ${res.status} - ${errData.message}`);
            dataLog("Auth Failed", "❌");
            S.settings._ghStatus = 'dim';
            refreshUIStatus();
        }
    } catch (e) {
        debugLog(`Browser Error: ${e.message}`);
        dataLog("Network Error", "⚠️");
    } finally {
        btn.disabled = false;
        btn.innerText = "CONNECT & SYNC CLOUD";
    }
}
</script>
</body>
</html>
