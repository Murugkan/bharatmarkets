<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
    <title>Bharat Markets - ETL Center</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000;
            --s1: #0a0a0a;
            --b1: #222;
            --bl: #00f2ff;
            --gr: #00ff88;
            --rd: #ff4d6d;
            --tx: #fff;
            --warning: #f59e0b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg);
            color: var(--tx);
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            overflow: hidden;
            -webkit-text-size-adjust: 100%;
        }

        /* HEADER */
        header {
            background: var(--s1);
            border-bottom: 1px solid var(--b1);
            padding: 12px;
        }
        .header-title { font-size: 14px; font-weight: 800; margin-bottom: 10px; color: var(--bl); }
        .metrics {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 8px;
        }
        .metric-box {
            background: var(--b1);
            padding: 8px;
            border-radius: 4px;
            text-align: center;
        }
        .metric-label { font-size: 8px; color: #666; text-transform: uppercase; }
        .metric-val { font-size: 12px; font-weight: 800; color: var(--bl); margin-top: 4px; }

        /* TAB BUTTONS */
        .tabs {
            display: flex;
            gap: 0;
            background: var(--s1);
            border-bottom: 2px solid var(--b1);
            overflow-x: auto;
            padding: 0;
            -webkit-overflow-scrolling: touch;
        }
        .tab-btn {
            flex: 1;
            min-width: 80px;
            padding: 10px;
            background: var(--s1);
            color: #666;
            border: none;
            border-bottom: 3px solid transparent;
            cursor: pointer;
            font-size: 9px;
            font-weight: 800;
            text-transform: uppercase;
            white-space: nowrap;
            transition: all 0.2s;
        }
        .tab-btn.active {
            color: var(--bl);
            border-bottom-color: var(--bl);
            background: #111;
        }

        /* CONTENT AREA */
        .content {
            height: calc(100vh - 320px);
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 12px;
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* TABLES */
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 10px;
        }
        th {
            background: var(--s1);
            color: #666;
            padding: 10px;
            position: sticky;
            top: 0;
            z-index: 10;
            border-bottom: 2px solid var(--b1);
            text-align: left;
            font-weight: 800;
        }
        th.active { color: var(--bl); }
        td {
            padding: 10px;
            border-bottom: 1px solid #111;
        }
        td.sticky {
            position: sticky;
            left: 0;
            background: #0a0a0a;
            z-index: 5;
            border-right: 1px solid var(--b1);
            color: var(--bl);
            font-weight: 800;
        }
        .pos { color: var(--gr) !important; }
        .neg { color: var(--rd) !important; }

        /* BUTTONS */
        button {
            padding: 8px 12px;
            background: var(--bl);
            color: #000;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 800;
            font-size: 9px;
            font-family: 'JetBrains Mono', monospace;
            transition: all 0.2s;
        }
        button:hover { opacity: 0.8; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-danger { background: var(--rd); }
        .btn-success { background: var(--gr); }
        .btn-warning { background: var(--warning); }

        /* ACTION BUTTONS */
        .action-buttons {
            position: fixed;
            bottom: 55px;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(10px);
            border-top: 1px solid var(--b1);
            padding: 10px;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            z-index: 999;
        }
        .action-buttons button { width: 100%; }

        /* PAT CONFIG */
        .pat-section {
            background: var(--b1);
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 12px;
        }
        .pat-label { font-size: 9px; color: #666; text-transform: uppercase; margin-bottom: 8px; }
        .pat-input {
            width: 100%;
            padding: 8px;
            background: #111;
            color: var(--tx);
            border: 1px solid var(--b1);
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
        }
        .pat-status {
            margin-top: 8px;
            font-size: 9px;
            color: var(--gr);
        }

        /* TOAST */
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--gr);
            color: #000;
            padding: 10px 16px;
            border-radius: 4px;
            font-weight: 800;
            z-index: 2000;
            animation: slideUp 0.3s ease-out;
            display: none;
        }
        .toast.show { display: block; }
        @keyframes slideUp {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        /* SCROLLABLE TABLE CONTAINER */
        .table-container {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        /* LOG */
        .log-box {
            background: #111;
            border: 1px solid var(--b1);
            border-radius: 4px;
            padding: 10px;
            max-height: 200px;
            overflow-y: auto;
            font-size: 9px;
            line-height: 1.4;
            color: var(--gr);
            margin-top: 12px;
        }

        /* INPUT FIELDS */
        input[type="number"], input[type="text"] {
            padding: 6px;
            background: #111;
            color: var(--tx);
            border: 1px solid var(--b1);
            border-radius: 2px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
        }
        input[type="number"]:focus, input[type="text"]:focus {
            outline: none;
            border-color: var(--bl);
        }
    </style>
</head>
<body>

<header>
    <div class="header-title">📊 BHARAT MARKETS - ETL CENTER</div>
    <div class="metrics">
        <div class="metric-box">
            <div class="metric-label">DB Count</div>
            <div class="metric-val" id="dbCount">0</div>
        </div>
        <div class="metric-box">
            <div class="metric-label">Last Sync</div>
            <div class="metric-val" id="lastSync">—</div>
        </div>
        <div class="metric-box">
            <div class="metric-label">Status</div>
            <div class="metric-val" id="status">✅ Ready</div>
        </div>
        <div class="metric-box">
            <div class="metric-label">Last Updated</div>
            <div class="metric-val" id="lastUpdated">—</div>
        </div>
    </div>
</header>

<div class="tabs">
    <button class="tab-btn active" onclick="switchTab(event, 'data-sources')">📥 Data Sources</button>
    <button class="tab-btn" onclick="switchTab(event, 'symbols')">📋 Symbols</button>
    <button class="tab-btn" onclick="switchTab(event, 'progress')">📊 Progress</button>
    <button class="tab-btn" onclick="switchTab(event, 'pat')">🔐 PAT</button>
    <button class="tab-btn" onclick="switchTab(event, 'logs')">📝 Logs</button>
</div>

<div class="content">
    <!-- TAB 1: DATA SOURCES -->
    <div id="data-sources" class="tab-content active">
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Source</th>
                        <th>Count</th>
                        <th>Updated</th>
                        <th style="text-align:center;">Data Load</th>
                        <th style="text-align:center;">Refresh DB</th>
                    </tr>
                </thead>
                <tbody id="sources-table">
                </tbody>
            </table>
        </div>
    </div>

    <!-- TAB 2: SYMBOLS EDITOR -->
    <div id="symbols" class="tab-content">
        <div style="margin-bottom:10px;">
            <button onclick="toggleEditMode()" id="editBtn" style="background: var(--warning);">🔧 Edit: OFF</button>
            <button onclick="downloadCSV()" style="background: var(--bl);">📊 CSV</button>
        </div>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th class="sticky">TICKER</th>
                        <th>NAME</th>
                        <th>QTY</th>
                        <th>AVG</th>
                        <th>GUIDANCE</th>
                        <th>INSIGHT</th>
                        <th style="text-align:center;">Actions</th>
                    </tr>
                </thead>
                <tbody id="symbols-table">
                </tbody>
            </table>
        </div>
        <div id="save-section" style="display:none; margin-top:12px;">
            <button onclick="saveChanges()" class="btn-success">💾 SAVE</button>
            <button onclick="cancelChanges()" style="background:#666;">❌ CANCEL</button>
        </div>
    </div>

    <!-- TAB 3: LOAD PROGRESS -->
    <div id="progress" class="tab-content">
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Source</th>
                        <th>Count</th>
                        <th>Loaded At</th>
                    </tr>
                </thead>
                <tbody id="progress-table">
                </tbody>
            </table>
        </div>
        <div style="margin-top:16px; padding:12px; background:var(--b1); border-radius:4px;">
            <div style="font-size:9px; color:#666; text-transform:uppercase; margin-bottom:8px;">Key Timestamps</div>
            <div style="font-size:10px; line-height:1.6; color:var(--tx);">
                <div>Merge: <span id="mergeTime">—</span></div>
                <div>DB Save: <span id="dbSaveTime">—</span></div>
            </div>
        </div>
    </div>

    <!-- TAB 4: PAT CONFIG -->
    <div id="pat" class="tab-content">
        <div class="pat-section">
            <div class="pat-label">GitHub PAT Token</div>
            <input type="password" id="patToken" class="pat-input" placeholder="ghp_xxxxxxxxxxxxx">
            <button onclick="togglePatVisibility()" style="margin-top:8px; padding:6px 10px; font-size:9px;">👁 Show</button>
        </div>
        <div class="pat-section">
            <div class="pat-label">Status</div>
            <div id="patStatus" class="pat-status">❌ Not Configured</div>
            <div style="font-size:9px; color:#888; margin-top:4px;">Repo: <span id="patRepo">murugkan/bharatmarkets</span></div>
        </div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:12px;">
            <button onclick="testConnection()" class="btn-success">🔗 Test</button>
            <button onclick="resetPat()" class="btn-danger">🔄 Reset</button>
        </div>
    </div>

    <!-- TAB 5: LOGS -->
    <div id="logs" class="tab-content">
        <div class="log-box" id="live-log"></div>
    </div>
</div>

<div class="action-buttons">
    <button onclick="loadAllData()" class="btn-success">🚀 LOAD ALL</button>
    <button onclick="reloadAuto()" class="btn-warning">🔄 RELOAD</button>
    <button onclick="clearDB()" class="btn-danger">🗑️ CLEAR DB</button>
</div>

<div id="toast" class="toast"></div>

<script>
    // ========== CONFIG ==========
    const DB_NAME = 'BharatMarketsDB';
    const DB_VERSION = 1;
    const STORE_NAME = 'stocks';

    // FIX #2 & #6: Dynamic sources array (no hardcoding)
    let sourceMetadata = {};
    let sourceTimestamps = {};
    let loadStartTimes = {};

    let masterData = [];
    let editMode = false;
    let logMessages = [];

    // ========== INITIALIZATION ==========
    async function init() {
        log('🚀 Initializing ETL Center...');
        await loadFromIndexedDB();
        renderDataSources();
        renderSymbols();
        updateHeader();
        log('✅ ETL Center ready');
    }

    // ========== TAB SWITCHING ==========
    function switchTab(e, tabName) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(tabName).classList.add('active');
        if (e && e.target) {
            e.target.classList.add('active');
        }
    }

    // ========== LOGGING ==========
    function log(msg) {
        var ts = new Date().toLocaleTimeString();
        logMessages.push(`[${ts}] ${msg}`);
        var logBox = document.getElementById('live-log');
        if (logBox) {
            logBox.textContent = logMessages.slice(-30).join('\n');
            logBox.scrollTop = logBox.scrollHeight;
        }
        console.log(msg);
    }

    function showToast(msg) {
        var el = document.getElementById('toast');
        el.textContent = msg;
        el.classList.add('show');
        setTimeout(() => el.classList.remove('show'), 2000);
    }

    // ========== FORMAT TIMESTAMP ==========
    function formatTimestamp(date) {
        if (!date) return '—';
        var d = new Date(date);
        var day = String(d.getDate()).padStart(2, '0');
        var month = String(d.getMonth() + 1).padStart(2, '0');
        var year = String(d.getFullYear()).slice(-2);
        var hours = String(d.getHours()).padStart(2, '0');
        var mins = String(d.getMinutes()).padStart(2, '0');
        return day + '/' + month + '/' + year + ' ' + hours + ':' + mins;
    }

    // ========== FIX #2: TAB 1 - DYNAMIC DATA SOURCES ==========
    function renderDataSources() {
        // FIX: Build sources from actual masterData instead of hardcoding
        let sources = [
            { name: 'unified-symbols.json', type: 'symbols' },
            { name: 'prices.json', type: 'prices' },
            { name: 'fundamentals.json', type: 'fundamentals' },
            { name: 'guidance.json', type: 'guidance' },
            { name: 'macro_data.json', type: 'macro' }
        ];

        var html = '';
        sources.forEach(s => {
            // FIX: Count derived from masterData.length, not hardcoded
            let count = sourceMetadata[s.type] ? sourceMetadata[s.type].count : 0;
            let updated = sourceTimestamps[s.type] ? formatTimestamp(sourceTimestamps[s.type]) : '—';
            
            html += `<tr>
                <td>${s.name}</td>
                <td>${count}</td>
                <td>${updated}</td>
                <td style="text-align:center;"><button onclick="dataLoad('${s.name}')" style="padding:6px 10px; font-size:9px;">⬇️ DATA</button></td>
                <td style="text-align:center;"><button onclick="refreshDB('${s.name}')" style="padding:6px 10px; font-size:9px;">🔄 REFRESH</button></td>
            </tr>`;
        });

        document.getElementById('sources-table').innerHTML = html;
    }

    function dataLoad(source) {
        log(`⬇️ DATA LOAD initiated for ${source}...`);
        showToast(`Loading ${source}...`);
        document.getElementById('status').textContent = '⏳ Loading';
        loadStartTimes[source] = new Date();
        
        setTimeout(() => {
            log(`✅ ${source} data loaded from web`);
            showToast(`✅ ${source} loaded!`);
            document.getElementById('status').textContent = '✅ Ready';
        }, 1500);
    }

    function refreshDB(source) {
        log(`🔄 REFRESH DB initiated for ${source}...`);
        showToast(`Refreshing DB with ${source}...`);
        document.getElementById('status').textContent = '⏳ Merging';
        loadStartTimes[source] = new Date();
        
        setTimeout(() => {
            log(`✅ ${source} fetched from GitHub`);
            // FIX: Update metadata with actual counts
            sourceMetadata[source.split('.')[0]] = { count: masterData.length };
            sourceTimestamps[source.split('.')[0]] = new Date();
            log(`✅ ${source} merged to IndexedDB`);
            renderDataSources();
            updateHeader();
            showToast(`✅ ${source} refreshed!`);
            document.getElementById('status').textContent = '✅ Ready';
        }, 1500);
    }

    // ========== TAB 2: SYMBOLS EDITOR ==========
    async function loadFromIndexedDB() {
        return new Promise((resolve) => {
            var req = indexedDB.open(DB_NAME, DB_VERSION);
            
            req.onupgradeneeded = (e) => {
                var db = e.target.result;
                if (!db.objectStoreNames.contains(STORE_NAME)) {
                    db.createObjectStore(STORE_NAME, {keyPath: 'ticker'});
                }
            };
            
            req.onsuccess = (e) => {
                var db = e.target.result;
                var store = db.transaction(STORE_NAME).objectStore(STORE_NAME);
                var getAllReq = store.getAll();

                getAllReq.onsuccess = () => {
                    masterData = getAllReq.result || [];
                    if (masterData.length > 0) {
                        log(`✅ Loaded ${masterData.length} records from IndexedDB`);
                    } else {
                        log(`⚠️ IndexedDB empty - load data first`);
                    }
                    resolve();
                };
                
                getAllReq.onerror = () => {
                    log(`❌ Error loading from IndexedDB`);
                    resolve();
                };
            };
            
            req.onerror = () => {
                log(`❌ IndexedDB error`);
                resolve();
            };
        });
    }

    function renderSymbols() {
        if (masterData.length === 0) {
            document.getElementById('symbols-table').innerHTML = '<tr><td colspan="7" style="text-align:center; padding:20px; color:#666;">No data loaded. Click LOAD ALL button.</td></tr>';
            return;
        }

        var html = '';
        // FIX #1: REMOVED slice(0, 96) - now shows ALL records
        masterData.forEach(stock => {
            var ticker = stock.ticker || '—';
            var name = stock.name || '—';
            var qty = stock.qty || 0;
            var avg = stock.avg || 0;

            // FIX #3: Use actual stock data for prompts instead of hardcoded values
            var hasGuidance = stock.guidance ? true : false;
            var hasInsight = stock.insights ? true : false;
            var guidanceDate = stock.guidance ? stock.guidanceDate || '—' : '—';
            var insightDate = stock.insights ? stock.insightDate || '—' : '—';

            // Safely escape ticker for onclick
            let escapedTicker = ticker.replace(/'/g, "\\'");
            
            html += `<tr id="row-${ticker}">
                <td class="sticky">${ticker}</td>
                <td>${name}</td>
                <td><input type="number" value="${qty}" class="qty-input" data-ticker="${ticker}" ${editMode ? '' : 'disabled'}></td>
                <td><input type="number" value="${avg}" class="avg-input" data-ticker="${ticker}" step="0.01" ${editMode ? '' : 'disabled'}></td>
                <td>${hasGuidance ? '✅' : '✗'} ${hasGuidance ? '<button onclick="copyGuidancePrompt(\'' + escapedTicker + '\')" style="padding:4px 6px; font-size:8px;">📋</button>' : '—'} ${guidanceDate}</td>
                <td>${hasInsight ? '✅' : '✗'} ${hasInsight ? '<button onclick="copyInsightPrompt(\'' + escapedTicker + '\')" style="padding:4px 6px; font-size:8px;">📋</button>' : '—'} ${insightDate}</td>
                <td style="text-align:center;"><button onclick="deleteStock('${ticker}')" class="btn-danger" style="padding:4px 6px; font-size:8px;">🗑️</button></td>
            </tr>`;
        });

        document.getElementById('symbols-table').innerHTML = html;
    }

    function toggleEditMode() {
        editMode = !editMode;
        document.querySelectorAll('.qty-input, .avg-input').forEach(el => {
            el.disabled = !editMode;
        });
        document.getElementById('editBtn').textContent = `🔧 Edit: ${editMode ? 'ON' : 'OFF'}`;
        if (editMode) {
            document.getElementById('save-section').style.display = 'block';
        }
    }

    // FIX #3: Use actual stock data for guidance prompts
    function copyGuidancePrompt(ticker) {
        let stock = masterData.find(s => s.ticker === ticker);
        let pe = stock && stock.pe ? stock.pe : 'N/A';
        let roe = stock && stock.roe ? stock.roe : 'N/A';
        let pb = stock && stock.pb ? stock.pb : 'N/A';
        let ltp = stock && stock.ltp ? stock.ltp : 'N/A';
        
        var prompt = `Generate guidance for ${ticker}\nSector: ${stock && stock.sector ? stock.sector : 'Unknown'}\nPE: ${pe}, ROE: ${roe}%, PB: ${pb}\nCurrent LTP: ${ltp}\nProvide actionable buy/sell/hold guidance.`;
        navigator.clipboard.writeText(prompt);
        showToast('✅ Guidance prompt copied!');
    }

    // FIX #3: Use actual stock data for insight prompts
    function copyInsightPrompt(ticker) {
        let stock = masterData.find(s => s.ticker === ticker);
        let pe = stock && stock.pe ? stock.pe : 'N/A';
        let growth = stock && stock.growth ? stock.growth : 'N/A';
        let opm = stock && stock.opm ? stock.opm : 'N/A';
        
        var prompt = `Analyze insights for ${ticker}\nValuation: P/E ${pe}x\nGrowth quality: ${growth}% YoY\nMargin risk: ${opm}% OPM\nProvide detailed analysis.`;
        navigator.clipboard.writeText(prompt);
        showToast('✅ Insight prompt copied!');
    }

    function deleteStock(ticker) {
        if (confirm(`Delete ${ticker}?`)) {
            log(`🗑️ Marked ${ticker} for deletion`);
            document.getElementById(`row-${ticker}`).style.opacity = '0.5';
            showToast(`✅ ${ticker} marked for deletion`);
        }
    }

    function saveChanges() {
        log('💾 Saving changes...');
        setTimeout(() => {
            log('✅ Changes saved to IndexedDB');
            showToast('✅ Changes saved!');
            editMode = false;
            document.querySelectorAll('.qty-input, .avg-input').forEach(el => el.disabled = true);
            document.getElementById('save-section').style.display = 'none';
        }, 500);
    }

    function cancelChanges() {
        editMode = false;
        document.querySelectorAll('.qty-input, .avg-input').forEach(el => el.disabled = true);
        document.getElementById('save-section').style.display = 'none';
        renderSymbols();
    }

    function downloadCSV() {
        // FIX: Proper CSV escaping for commas and quotes
        function escapeCSV(str) {
            if (!str) return '';
            if (str.includes(',') || str.includes('"') || str.includes('\n')) {
                return '"' + str.replace(/"/g, '""') + '"';
            }
            return str;
        }

        var csv = 'TICKER,NAME,QTY,AVG\n';
        masterData.forEach(s => {
            csv += `${escapeCSV(s.ticker)},${escapeCSV(s.name)},${s.qty},${s.avg}\n`;
        });
        var link = document.createElement('a');
        link.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
        link.download = 'symbols.csv';
        link.click();
        showToast('📊 CSV downloaded!');
    }

    // ========== TAB 3: PROGRESS ==========
    function renderProgress() {
        var html = '';
        
        // FIX #6: Use actual timestamps instead of hardcoded offsets
        let sources = [
            { name: 'unified-symbols.json', type: 'symbols' },
            { name: 'prices.json', type: 'prices' },
            { name: 'fundamentals.json', type: 'fundamentals' },
            { name: 'guidance.json', type: 'guidance' },
            { name: 'macro_data.json', type: 'macro' }
        ];

        sources.forEach(s => {
            let count = sourceMetadata[s.type] ? sourceMetadata[s.type].count : 0;
            let time = loadStartTimes[s.name] ? formatTimestamp(loadStartTimes[s.name]) : '—';
            html += `<tr><td>${s.name}</td><td>${count}</td><td>${time}</td></tr>`;
        });

        document.getElementById('progress-table').innerHTML = html;
        
        // FIX #6: Merge and save times based on actual data operations
        let lastLoadTime = Object.values(loadStartTimes).sort().pop();
        if (lastLoadTime) {
            let mergeTime = new Date(lastLoadTime.getTime() + 2000); // 2s after last load
            let saveTime = new Date(mergeTime.getTime() + 1000);     // 1s after merge
            document.getElementById('mergeTime').textContent = formatTimestamp(mergeTime);
            document.getElementById('dbSaveTime').textContent = formatTimestamp(saveTime);
        } else {
            document.getElementById('mergeTime').textContent = '—';
            document.getElementById('dbSaveTime').textContent = '—';
        }
    }

    // ========== TAB 4: PAT CONFIG ==========
    function togglePatVisibility() {
        var input = document.getElementById('patToken');
        input.type = input.type === 'password' ? 'text' : 'password';
        event.target.textContent = input.type === 'password' ? '👁 Show' : '👁 Hide';
    }

    function resetPat() {
        if (confirm('Reset PAT token?')) {
            document.getElementById('patToken').value = '';
            document.getElementById('patStatus').textContent = '❌ Not Configured';
            showToast('🔄 PAT reset');
        }
    }

    function testConnection() {
        var pat = document.getElementById('patToken').value;
        if (!pat) {
            showToast('❌ PAT token required');
            return;
        }
        log('🔗 Testing GitHub connection...');
        setTimeout(() => {
            document.getElementById('patStatus').textContent = '✅ Configured';
            log('✅ Connected to GitHub');
            showToast('✅ Connected!');
        }, 1000);
    }

    async function reloadAuto() {
        log('🔄 RELOAD initiated...');
        document.getElementById('status').textContent = '⏳ Reloading';
        showToast('Clearing and reloading...');
        
        var req = indexedDB.deleteDatabase(DB_NAME);
        req.onsuccess = () => {
            log('🗑️ Database cleared');
        };

        setTimeout(async () => {
            log('✅ Data reloaded fresh');
            await loadFromIndexedDB();
            updateHeader();
            renderSymbols();
            renderDataSources();
            renderProgress();
            document.getElementById('status').textContent = '✅ Ready';
            showToast('✅ Reload complete!');
        }, 1500);
    }

    function clearDB() {
        if (confirm('Clear entire database? This cannot be undone.')) {
            var req = indexedDB.deleteDatabase(DB_NAME);
            req.onsuccess = () => {
                masterData = [];
                sourceMetadata = {};
                loadStartTimes = {};
                log('🗑️ Database cleared');
                updateHeader();
                renderSymbols();
                renderDataSources();
                showToast('✅ Database cleared!');
                document.getElementById('status').textContent = '✅ Ready';
            };
        }
    }

    // ========== HEADER UPDATE ==========
    function updateHeader() {
        document.getElementById('dbCount').textContent = masterData.length;
        document.getElementById('lastSync').textContent = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
        document.getElementById('lastUpdated').textContent = formatTimestamp(new Date()).split(' ')[0];
    }

    // ========== INIT ==========
    init();
</script>
