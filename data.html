<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>Onyx | DATA</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="app-core.js"></script>
    <style>
        body { background:#000; color:#fff; font-family:sans-serif; margin:0; padding:20px; }
        .card { background:#0a0a0a; border:1px solid #1a1a1a; padding:15px; border-radius:8px; margin-bottom:15px; }
        .btn { width:100%; background:#00f2ff; color:#000; border:none; padding:15px; font-weight:800; border-radius:4px; }
        input { width:100%; background:#111; border:1px solid #333; color:#fff; padding:12px; margin-bottom:10px; box-sizing:border-box; }
        .res-row { display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid #111; }
    </style>
</head>
<body>

<div class="card">
    <h3 style="font-size:10px; color:#555;">GITHUB CONFIG</h3>
    <input type="password" id="gh-token" placeholder="GitHub PAT">
    <input type="text" id="gh-repo" placeholder="username/repo">
    <button class="btn" onclick="saveSettingsAndTest()">SAVE & TEST CONNECTION</button>
    <div id="gh-diag" style="margin-top:10px; font-size:11px;"></div>
</div>

<div class="card">
    <h3 style="font-size:10px; color:#555;">PORTFOLIO IMPORT</h3>
    <input type="file" id="f-picker" style="display:none" onchange="processFile(this)">
    <button class="btn" style="background:#111; color:#00f2ff; border:1px solid #00f2ff;" onclick="document.getElementById('f-picker').click()">UPLOAD FILE</button>
</div>

<div id="res-area" class="card" style="display:none">
    <h3 style="font-size:10px; color:#00f2ff;">RESOLUTION ENGINE</h3>
    <div id="res-list"></div>
</div>

<script>
function saveSettingsAndTest() {
    S.settings.ghToken = document.getElementById('gh-token').value;
    S.settings.ghRepo = document.getElementById('gh-repo').value;
    localStorage.setItem('bm_settings', JSON.stringify(S));
    testGitHubConnection();
}

async function processFile(input) {
    const reader = new FileReader();
    reader.onload = async (e) => {
        const wb = XLSX.read(e.target.result, {type:'binary'});
        const data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
        document.getElementById('res-area').style.display = 'block';
        const list = document.getElementById('res-list');
        list.innerHTML = '';

        for(let row of data) {
            const name = row["Company Name"] || row["Security Name"] || Object.values(row)[0];
            const res = await resolveSymbol(name);
            const div = document.createElement('div');
            div.className = 'res-row';
            div.innerHTML = `
                <div style="flex:1">
                    <div style="font-size:10px; color:#555">${name}</div>
                    <div style="color:${res?'#00ff88':'#ff4444'}">${res?res.symbol:'FAILED'}</div>
                </div>
                <input type="text" placeholder="Fix" style="width:100px; margin:0; padding:5px;" 
                    onchange="updateAlias('${name}', this.value)" value="${res?res.symbol:''}">
            `;
            list.appendChild(div);
        }
    };
    reader.readAsBinaryString(input.files[0]);
}

window.onload = () => {
    document.getElementById('gh-token').value = S.settings.ghToken || '';
    document.getElementById('gh-repo').value = S.settings.ghRepo || '';
};
</script>
</body>
</html>
