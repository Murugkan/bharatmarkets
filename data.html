<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETL Data Center - Bharat Markets</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .header {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .header h1 {
            color: #333;
            margin-bottom: 10px;
        }
        .header p {
            color: #666;
            font-size: 14px;
        }
        .main {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .card h2 {
            font-size: 18px;
            color: #333;
            margin-bottom: 15px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }
        .status-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .status-item {
            padding: 12px;
            background: #f5f5f5;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }
        .status-item.loading {
            border-left-color: #fbbf24;
        }
        .status-item.success {
            border-left-color: #10b981;
        }
        .status-item.error {
            border-left-color: #ef4444;
        }
        .status-item-label {
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
            font-weight: 600;
        }
        .status-item-value {
            font-size: 14px;
            color: #333;
            margin-top: 4px;
            font-weight: 500;
        }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e5e7eb;
            border-radius: 4px;
            overflow: hidden;
            margin: 15px 0;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.3s ease;
        }
        .buttons {
            display: flex;
            gap: 10px;
            margin: 15px 0;
        }
        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(102, 126, 234, 0.4);
        }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .btn-secondary {
            background: #f3f4f6;
            color: #333;
            border: 1px solid #d1d5db;
        }
        .btn-secondary:hover {
            background: #e5e7eb;
        }
        .log-box {
            background: #1f2937;
            color: #10b981;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 12px;
            max-height: 200px;
            overflow-y: auto;
            line-height: 1.5;
        }
        .log-entry {
            margin-bottom: 5px;
        }
        .log-entry.error {
            color: #ef4444;
        }
        .log-entry.success {
            color: #10b981;
        }
        .log-entry.info {
            color: #60a5fa;
        }
        .data-grid {
            overflow-x: auto;
            margin-top: 15px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        th {
            background: #f3f4f6;
            padding: 10px;
            text-align: left;
            font-weight: 600;
            color: #333;
            border-bottom: 2px solid #e5e7eb;
        }
        td {
            padding: 10px;
            border-bottom: 1px solid #e5e7eb;
            color: #666;
        }
        tr:hover {
            background: #f9fafb;
        }
        .ticker {
            font-weight: 600;
            color: #667eea;
        }
        .timestamp {
            font-size: 11px;
            color: #999;
        }
        @media (max-width: 1024px) {
            .main {
                grid-template-columns: 1fr;
            }
        }
        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            margin-right: 5px;
        }
        .badge.success {
            background: #d1fae5;
            color: #065f46;
        }
        .badge.loading {
            background: #fef3c7;
            color: #92400e;
        }
        .badge.error {
            background: #fee2e2;
            color: #991b1b;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 ETL Data Center - Bharat Markets</h1>
            <p>Real-time data merge from GitHub → IndexedDB (OnyxPortfolioDB)</p>
        </div>

        <div class="main">
            <!-- Control Panel -->
            <div class="card">
                <h2>⚙️ Control Panel</h2>
                
                <div class="status-grid">
                    <div class="status-item">
                        <div class="status-item-label">Database</div>
                        <div class="status-item-value" id="dbStatus">Not Initialized</div>
                    </div>
                    <div class="status-item">
                        <div class="status-item-label">Records Merged</div>
                        <div class="status-item-value" id="recordsCount">0</div>
                    </div>
                    <div class="status-item">
                        <div class="status-item-label">Load Status</div>
                        <div class="status-item-value" id="loadStatus">Idle</div>
                    </div>
                    <div class="status-item">
                        <div class="status-item-label">Last Merge</div>
                        <div class="status-item-value timestamp" id="lastMerge">—</div>
                    </div>
                </div>

                <div class="progress-bar">
                    <div class="progress-fill" id="progressBar"></div>
                </div>

                <div class="buttons">
                    <button class="btn-primary" id="loadBtn" onclick="loadAllData()">Load & Merge Data</button>
                    <button class="btn-secondary" onclick="viewDatabase()">View DB</button>
                </div>

                <button class="btn-secondary" style="width: 100%; margin-top: 10px;" onclick="clearDatabase()">Clear Database</button>
            </div>

            <!-- Logs -->
            <div class="card">
                <h2>📋 Activity Log</h2>
                <div class="log-box" id="logBox"></div>
            </div>
        </div>

        <!-- Data Preview -->
        <div class="card">
            <h2>📊 Merged Data Preview</h2>
            <div class="data-grid">
                <table>
                    <thead>
                        <tr>
                            <th>Ticker</th>
                            <th>Name</th>
                            <th>LTP</th>
                            <th>PE</th>
                            <th>Symbols Loaded</th>
                            <th>Prices Loaded</th>
                        </tr>
                    </thead>
                    <tbody id="dataTable">
                        <tr><td colspan="6" style="text-align: center; color: #999;">No data loaded yet</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const GITHUB_REPO = 'https://raw.githubusercontent.com/murugkan/bharatmarkets/main/data';
        const FILES = {
            symbols: `${GITHUB_REPO}/unified-symbols.json`,
            prices: `${GITHUB_REPO}/prices.json`,
            fundamentals: `${GITHUB_REPO}/fundamentals.json`,
            guidance: `${GITHUB_REPO}/guidance.json`,
            macro: `${GITHUB_REPO}/macro_data.json`
        };

        let db = null;

        // ============ DATABASE SETUP ============
        function initDatabase() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open('OnyxPortfolioDB', 9);
                
                request.onerror = () => {
                    log('❌ Database init failed', 'error');
                    reject(request.error);
                };
                
                request.onsuccess = () => {
                    db = request.result;
                    log('✅ Database initialized', 'success');
                    updateDbStatus('Connected');
                    resolve(db);
                };
                
                request.onupgradeneeded = (event) => {
                    const database = event.target.result;
                    if (!database.objectStoreNames.contains('Stocks')) {
                        database.createObjectStore('Stocks', { keyPath: 'ticker' });
                        log('📦 Created Stocks store', 'info');
                    }
                };
            });
        }

        // ============ GITHUB FETCH ============
        async function fetchFile(name, url) {
            try {
                log(`⏳ Fetching ${name}...`, 'info');
                const response = await fetch(url);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                log(`✅ Fetched ${name}`, 'success');
                return data;
            } catch (error) {
                log(`❌ Failed to fetch ${name}: ${error.message}`, 'error');
                throw error;
            }
        }

        // ============ MERGE LOGIC ============
        function mergeRecords(symbols, prices, fundamentals, guidance, macro) {
            log('🔄 Starting merge...', 'info');
            const merged = {};

            // Get load times
            const symbolsLoadedAt = symbols.updated;
            const pricesLoadedAt = prices.updated || prices.lastLoadedAt;
            const fundamentalsLoadedAt = fundamentals.updated;
            const guidanceLoadedAt = guidance._metadata?.loadedAt;
            const macroLoadedAt = macro._metadata?.loadedAt;

            // Merge by ticker from symbols (base)
            Object.entries(symbols.symbols || {}).forEach(([_, stock]) => {
                const ticker = stock.ticker;
                
                // Base from symbols
                merged[ticker] = {
                    ticker,
                    name: stock.name,
                    isin: stock.isin,
                    sector: stock.sector,
                    industry: stock.industry,
                    qty: stock.qty,
                    avg: stock.avg,
                    symbols_loaded_at: symbolsLoadedAt
                };

                // Merge from prices
                if (prices.quotes?.[ticker]) {
                    const priceData = prices.quotes[ticker];
                    Object.assign(merged[ticker], {
                        ltp: priceData.ltp,
                        pe: priceData.pe,
                        pb: priceData.pb,
                        eps: priceData.eps,
                        change: priceData.change,
                        changePct: priceData.changePct,
                        prices_loaded_at: pricesLoadedAt
                    });
                }

                // Merge from fundamentals
                if (fundamentals.stocks?.[ticker]) {
                    const fundData = fundamentals.stocks[ticker];
                    Object.assign(merged[ticker], {
                        signal: fundData.signal,
                        pe_fwd: fundData.fwd_pe,
                        roe: fundData.roe,
                        opm: fundData.opm_pct,
                        npm: fundData.npm_pct,
                        fundamentals_loaded_at: fundamentalsLoadedAt
                    });
                }

                // Merge from guidance (if exists)
                if (guidance[ticker]) {
                    const guidData = guidance[ticker];
                    merged[ticker].guidance_updated = guidData.guidance?.updated;
                    merged[ticker].insights_updated = guidData.insights?.updated;
                    merged[ticker].guidance_action = guidData.insights?.action;
                    merged[ticker].guidance_summary = guidData.guidance?.summary;
                    merged[ticker].guidance_loaded_at = guidanceLoadedAt;
                }

                // Macro data (single record, shared across all)
                if (macro.indicators) {
                    merged[ticker].macro_loaded_at = macroLoadedAt;
                    merged[ticker].macro_count = macro.indicators.length;
                }

                // Merge timestamp
                merged[ticker].merged_at = new Date().toISOString();
            });

            log(`✅ Merged ${Object.keys(merged).length} records`, 'success');
            return Object.values(merged);
        }

        // ============ DATABASE OPERATIONS ============
        function saveToDatabase(records) {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction(['Stocks'], 'readwrite');
                const store = transaction.objectStore('Stocks');

                // Clear old data
                store.clear();
                log('🗑️ Cleared old records', 'info');

                // Insert new data
                records.forEach(record => {
                    store.add(record);
                });

                transaction.oncomplete = () => {
                    log(`💾 Saved ${records.length} records to IndexedDB`, 'success');
                    updateRecordsCount(records.length);
                    updateLastMerge();
                    resolve();
                };

                transaction.onerror = () => {
                    log(`❌ Database save failed: ${transaction.error}`, 'error');
                    reject(transaction.error);
                };
            });
        }

        function getAllRecords() {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction(['Stocks'], 'readonly');
                const store = transaction.objectStore('Stocks');
                const request = store.getAll();

                request.onsuccess = () => {
                    resolve(request.result);
                };

                request.onerror = () => {
                    reject(request.error);
                };
            });
        }

        // ============ MAIN LOAD FUNCTION ============
        async function loadAllData() {
            try {
                updateLoadStatus('Loading...');
                document.getElementById('loadBtn').disabled = true;
                updateProgress(10);

                // Initialize DB if needed
                if (!db) {
                    await initDatabase();
                }

                updateProgress(20);

                // Fetch all files
                const [symbols, prices, fundamentals, guidance, macro] = await Promise.all([
                    fetchFile('Symbols', FILES.symbols),
                    fetchFile('Prices', FILES.prices),
                    fetchFile('Fundamentals', FILES.fundamentals),
                    fetchFile('Guidance', FILES.guidance),
                    fetchFile('Macro', FILES.macro)
                ]);

                updateProgress(50);
                log('📥 All files fetched successfully', 'success');

                // Merge
                const merged = mergeRecords(symbols, prices, fundamentals, guidance, macro);
                updateProgress(75);

                // Save to database
                await saveToDatabase(merged);
                updateProgress(100);

                // Display preview
                await displayPreview();
                updateLoadStatus('✅ Complete');
                log('🎉 ETL Pipeline Complete!', 'success');

            } catch (error) {
                log(`❌ Pipeline error: ${error.message}`, 'error');
                updateLoadStatus('❌ Failed');
            } finally {
                document.getElementById('loadBtn').disabled = false;
                setTimeout(() => updateProgress(0), 500);
            }
        }

        async function displayPreview() {
            const records = await getAllRecords();
            const tbody = document.getElementById('dataTable');
            tbody.innerHTML = '';

            records.slice(0, 10).forEach(record => {
                const row = tbody.insertRow();
                row.innerHTML = `
                    <td class="ticker">${record.ticker}</td>
                    <td>${record.name}</td>
                    <td>${record.ltp ? record.ltp.toFixed(2) : '—'}</td>
                    <td>${record.pe ? record.pe.toFixed(2) : '—'}</td>
                    <td class="timestamp">${record.symbols_loaded_at || '—'}</td>
                    <td class="timestamp">${record.prices_loaded_at || '—'}</td>
                `;
            });

            if (records.length > 10) {
                const row = tbody.insertRow();
                row.innerHTML = `<td colspan="6" style="text-align: center; color: #999;">... and ${records.length - 10} more records</td>`;
            }
        }

        async function viewDatabase() {
            try {
                const records = await getAllRecords();
                console.log('Database Records:', records);
                alert(`📊 ${records.length} records in database. Check console for details.`);
            } catch (error) {
                alert('Error reading database: ' + error.message);
            }
        }

        function clearDatabase() {
            if (confirm('⚠️ Clear all data from database?')) {
                const transaction = db.transaction(['Stocks'], 'readwrite');
                const store = transaction.objectStore('Stocks');
                store.clear();

                transaction.oncomplete = () => {
                    log('🗑️ Database cleared', 'info');
                    document.getElementById('dataTable').innerHTML = '<tr><td colspan="6" style="text-align: center; color: #999;">No data loaded yet</td></tr>';
                    updateRecordsCount(0);
                };
            }
        }

        // ============ UI HELPERS ============
        function log(message, type = 'info') {
            const logBox = document.getElementById('logBox');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logBox.insertBefore(entry, logBox.firstChild);
            
            // Keep only last 50 entries
            while (logBox.children.length > 50) {
                logBox.removeChild(logBox.lastChild);
            }
        }

        function updateProgress(value) {
            document.getElementById('progressBar').style.width = value + '%';
        }

        function updateLoadStatus(status) {
            document.getElementById('loadStatus').textContent = status;
        }

        function updateDbStatus(status) {
            document.getElementById('dbStatus').textContent = status;
        }

        function updateRecordsCount(count) {
            document.getElementById('recordsCount').textContent = count;
        }

        function updateLastMerge() {
            const now = new Date().toLocaleString();
            document.getElementById('lastMerge').textContent = now;
        }

        // ============ INITIALIZATION ============
        window.addEventListener('DOMContentLoaded', async () => {
            log('🚀 ETL Data Center initialized', 'info');
            try {
                await initDatabase();
                const records = await getAllRecords();
                if (records.length > 0) {
                    updateRecordsCount(records.length);
                    updateLastMerge();
                    await displayPreview();
                }
            } catch (error) {
                log(`Failed to initialize: ${error.message}`, 'error');
            }
        });
    </script>
</body>
</html>
