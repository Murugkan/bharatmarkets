<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
    <title>Onyx | DATA</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="app-core.js"></script>
    <style>
        body { background:#000; color:#fff; font-family:sans-serif; margin:0; padding-bottom:120px; -webkit-tap-highlight-color: transparent; }
        .sec { margin: 15px; padding: 15px; background: #080808; border-radius: 8px; border: 1px solid #111; position: relative; }
        .btn-main { 
            width: 100%; background: #00f2ff; color: #000; border: none; padding: 18px; 
            font-weight: 900; border-radius: 4px; text-transform: uppercase; margin-top:10px;
            cursor: pointer; display: block; transition: 0.2s;
        }
        .btn-main:active { transform: scale(0.98); opacity: 0.8; }
        .btn-connected { background: #111 !important; color: #00ff88 !important; border: 1px solid #00ff88 !important; }
        
        #conn-status { font-size:12px; margin-top:12px; color:#00f2ff; font-weight:bold; display:block; text-align:center; }
        #mini-log { font-family: monospace; font-size: 10px; color: #555; margin-top: 8px; text-align: center; height: 14px; overflow: hidden; }
        
        input[type="text"], input[type="password"] { 
            background:#111; border:1px solid #333; color:#fff; padding:14px; 
            border-radius:3px; width: 100%; box-sizing: border-box; font-size: 16px; margin-bottom: 10px; 
        }
    </style>
</head>
<body>

<div class="sec">
    <h3 style="font-size:10px; color:#555; text-transform:uppercase; margin-bottom:10px;">0. Connection</h3>
    <input type="password" id="pat" placeholder="GitHub PAT (Masked)">
    <input type="text" id="repo" placeholder="user/repo">
    
    <button type="button" class="btn-main" id="btn-connect">CONNECT</button>
    
    <span id="conn-status">Status: Not Connected</span>
    <div id="mini-log">Waiting for input...</div>
</div>

<div class="sec" id="import-gate" style="opacity:0.3; pointer-events:none;">
    <h3 style="font-size:10px; color:#555; text-transform:uppercase; margin-bottom:10px;">1. Import</h3>
    <input type="file" id="f-in" style="display:none" onchange="handleFile(this)">
    <button class="btn-main" style="background:#222; color:#00f2ff; border:1px solid #00f2ff;" onclick="document.getElementById('f-in').click()">📂 SELECT .CSV / .XLSX</button>
</div>

<script>
const btn = document.getElementById('btn-connect');
const status = document.getElementById('conn-status');
const logLine = document.getElementById('mini-log');

btn.addEventListener('click', async () => {
    // UI Feedback
    btn.innerText = "CONNECTING...";
    logLine.innerText = "Initiating GitHub handshake...";
    
    S.settings.ghToken = document.getElementById('pat').value;
    S.settings.ghRepo = document.getElementById('repo').value;
    
    try {
        const ok = await validatePAT();
        if(ok) {
            // Successful State
            btn.innerText = "CONNECTED";
            btn.classList.add('btn-connected');
            status.innerText = "✅ Link Active";
            status.style.color = "#00ff88";
            logLine.innerText = "Repository synced successfully.";
            
            document.getElementById('import-gate').style.opacity = "1";
            document.getElementById('import-gate').style.pointerEvents = "auto";
            saveSettings();
        } else {
            // Failed State
            btn.innerText = "CONNECT";
            status.innerText = "❌ Connection Failed";
            status.style.color = "#ff4444";
            logLine.innerText = "Check PAT permissions or Repo path.";
        }
    } catch(e) {
        btn.innerText = "CONNECT";
        status.innerText = "❌ Load Failed";
        logLine.innerText = e.message;
    }
});

window.onload = () => {
    document.getElementById('pat').value = S.settings.ghToken || '';
    document.getElementById('repo').value = S.settings.ghRepo || '';
};
</script>
</body>
</html>
