<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
    <title>Bharat Markets - ETL Center</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000;
            --s1: #0a0a0a;
            --b1: #222;
            --bl: #00f2ff;
            --gr: #00ff88;
            --rd: #ff4d6d;
            --tx: #fff;
            --warning: #f59e0b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg);
            color: var(--tx);
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            overflow: hidden;
            -webkit-text-size-adjust: 100%;
            padding-bottom: 80px;
        }

        /* HEADER */
        header {
            background: var(--s1);
            border-bottom: 1px solid var(--b1);
            padding: 12px;
        }
        .header-title { font-size: 14px; font-weight: 800; margin-bottom: 10px; color: var(--bl); }
        .metrics {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 8px;
        }
        .metric-box {
            background: var(--b1);
            padding: 8px;
            border-radius: 4px;
            text-align: center;
        }
        .metric-label { font-size: 8px; color: #666; text-transform: uppercase; }
        .metric-val { font-size: 12px; font-weight: 800; color: var(--bl); margin-top: 4px; }

        /* TAB BUTTONS */
        .tabs {
            display: flex;
            gap: 0;
            background: var(--s1);
            border-bottom: 2px solid var(--b1);
            overflow-x: auto;
            padding: 0;
            -webkit-overflow-scrolling: touch;
        }
        .tab-btn {
            flex: 1;
            min-width: 80px;
            padding: 10px;
            background: var(--s1);
            color: #666;
            border: none;
            border-bottom: 3px solid transparent;
            cursor: pointer;
            font-size: 9px;
            font-weight: 800;
            text-transform: uppercase;
            white-space: nowrap;
            transition: all 0.2s;
        }
        .tab-btn.active {
            color: var(--bl);
            border-bottom-color: var(--bl);
            background: #111;
        }

        /* CONTENT AREA */
        .content {
            height: calc(100vh - 180px);
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 12px;
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* TABLES */
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 10px;
        }
        th {
            background: var(--s1);
            color: #666;
            padding: 10px;
            position: sticky;
            top: 0;
            z-index: 10;
            border-bottom: 2px solid var(--b1);
            text-align: left;
            font-weight: 800;
        }
        th.active { color: var(--bl); }
        td {
            padding: 10px;
            border-bottom: 1px solid #111;
        }
        td.sticky {
            position: sticky;
            left: 0;
            background: #0a0a0a;
            z-index: 5;
            border-right: 1px solid var(--b1);
            color: var(--bl);
            font-weight: 800;
        }
        .pos { color: var(--gr) !important; }
        .neg { color: var(--rd) !important; }

        /* BUTTONS */
        button {
            padding: 8px 12px;
            background: var(--bl);
            color: #000;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 800;
            font-size: 9px;
            font-family: 'JetBrains Mono', monospace;
            transition: all 0.2s;
        }
        button:hover { opacity: 0.8; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-danger { background: var(--rd); }
        .btn-success { background: var(--gr); }
        .btn-warning { background: var(--warning); }

        /* INLINE BUTTONS */
        .inline-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            margin-bottom: 15px;
        }

        .inline-buttons button {
            width: 100%;
            padding: 10px 8px;
            font-size: 11px;
            border-radius: 6px;
        }

        /* NAVIGATION FOOTER */
        .nav-footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(10px);
            border-top: 1px solid var(--b1);
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            padding-bottom: calc(12px + env(safe-area-inset-bottom));
            z-index: 999;
        }

        .nav-btn {
            text-decoration: none;
            color: #666;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 50%;
            padding: 8px 0;
            transition: color 0.2s;
        }

        .nav-btn:hover {
            color: var(--bl);
        }

        .nav-btn.active {
            color: var(--bl);
            font-weight: 800;
        }

        .nav-label {
            font-size: 8px;
            margin-top: 4px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* PAT CONFIG */
        .pat-section {
            background: var(--b1);
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 12px;
        }
        .pat-label { font-size: 9px; color: #666; text-transform: uppercase; margin-bottom: 8px; }
        .pat-input {
            width: 100%;
            padding: 8px;
            background: #111;
            color: var(--tx);
            border: 1px solid var(--b1);
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
        }
        .pat-status {
            margin-top: 8px;
            font-size: 9px;
            color: var(--gr);
        }

        /* TOAST */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--gr);
            color: #000;
            padding: 10px 16px;
            border-radius: 4px;
            font-weight: 800;
            z-index: 2000;
            animation: slideUp 0.3s ease-out;
            display: none;
        }
        .toast.show { display: block; }
        @keyframes slideUp {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        /* SCROLLABLE TABLE CONTAINER */
        .table-container {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        /* LOG */
        .log-box {
            background: #111;
            border: 1px solid var(--b1);
            border-radius: 4px;
            padding: 10px;
            max-height: 200px;
            overflow-y: auto;
            font-size: 9px;
            color: var(--gr);
            line-height: 1.4;
        }

        /* INPUT FIELDS */
        input[type="number"], input[type="text"] {
            padding: 6px;
            background: #111;
            color: var(--tx);
            border: 1px solid var(--b1);
            border-radius: 2px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
        }
        input[type="number"]:focus, input[type="text"]:focus {
            outline: none;
            border-color: var(--bl);
        }

        /* SECTION HEADERS */
        .section-header {
            font-size: 12px;
            font-weight: 800;
            margin-bottom: 10px;
            color: var(--bl);
        }

        .section-header.success {
            color: var(--gr);
        }

        /* SECTION BOX */
        .section-box {
            margin: 15px 0;
            padding: 12px;
            background: var(--s1);
            border-radius: 8px;
            border: 1px solid var(--b1);
        }
    </style>
</head>
<body>

<header>
    <div class="header-title">📊 BHARAT MARKETS - ETL CENTER</div>
    <div class="metrics">
        <div class="metric-box">
            <div class="metric-label">DB Count</div>
            <div class="metric-val" id="dbCount">0</div>
        </div>
        <div class="metric-box">
            <div class="metric-label">Last Sync</div>
            <div class="metric-val" id="lastSync">—</div>
        </div>
        <div class="metric-box">
            <div class="metric-label">Status</div>
            <div class="metric-val" id="status">✅ Ready</div>
        </div>
        <div class="metric-box">
            <div class="metric-label">Last Updated</div>
            <div class="metric-val" id="lastUpdated">—</div>
        </div>
    </div>
</header>

<div class="tabs">
    <button class="tab-btn active" onclick="switchTab('etl-pipeline')">⚙️ ETL Pipeline</button>
    <button class="tab-btn" onclick="switchTab('symbols')">📋 Symbols</button>
    <button class="tab-btn" onclick="switchTab('pat')">🔐 PAT</button>
</div>

<div class="content">
    <!-- TAB 1: COMBINED ETL PIPELINE -->
    <div id="etl-pipeline" class="tab-content active">
        
        <!-- ACTION BUTTONS -->
        <div class="inline-buttons">
            <button onclick="loadAllData()" style="background:linear-gradient(135deg, #00ff88 0%, #00dd66 100%); color:#000; padding:6px 4px;"><span style="font-size:12px;">🚀</span>LOAD ALL</button>
            <button onclick="reloadAuto()" style="background:linear-gradient(135deg, #00f2ff 0%, #00ccff 100%); color:#000; padding:6px 4px;"><span style="font-size:12px;">🔄</span>RELOAD</button>
            <button onclick="clearDB()" style="background:linear-gradient(135deg, #ff4d6d 0%, #ff1a4d 100%); color:#fff; padding:6px 4px;"><span style="font-size:12px;">🗑️</span>CLEAR DB</button>
        </div>

        <!-- SECTION 1: DATA SOURCES -->
        <div class="section-box">
            <div class="section-header">📥 Data Sources</div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Source</th>
                            <th>Count</th>
                            <th>Updated (IST)</th>
                            <th style="text-align:center;">Data Load</th>
                            <th style="text-align:center;">Refresh DB</th>
                        </tr>
                    </thead>
                    <tbody id="sources-table">
                    </tbody>
                </table>
            </div>
        </div>

        <!-- SECTION 2: LIVE LOG -->
        <div class="section-box">
            <div class="section-header">📋 Live Log</div>
            <div class="log-box" id="live-log">
                <div style="color:#666;">[Logs appear here]</div>
            </div>
        </div>

    </div>

    <!-- TAB 2: SYMBOLS EDITOR -->
    <div id="symbols" class="tab-content">
        <div style="margin-bottom:10px;">
            <button onclick="toggleEditMode()">🔧 Edit Mode: OFF</button>
            <button onclick="downloadCSV()" style="background: var(--gr);">📊 Export CSV</button>
        </div>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th class="sticky">TICKER</th>
                        <th>NAME</th>
                        <th>QTY</th>
                        <th>AVG</th>
                        <th>GUIDANCE</th>
                        <th>INSIGHT</th>
                        <th style="text-align:center;">Actions</th>
                    </tr>
                </thead>
                <tbody id="symbols-table">
                </tbody>
            </table>
        </div>
        <div id="save-section" style="display:none; margin-top:12px;">
            <button onclick="saveChanges()" class="btn-success">💾 SAVE CHANGES</button>
            <button onclick="cancelChanges()">❌ Cancel</button>
        </div>
    </div>

    <!-- TAB 3: PAT CONFIG -->
    <div id="pat" class="tab-content">
        <div class="pat-section">
            <div class="pat-label">GitHub PAT Token</div>
            <input type="password" id="patToken" class="pat-input" placeholder="ghp_••••••••••••••••••••••••••••••••">
            <div style="display:flex; gap:8px; margin-top:8px;">
                <button onclick="togglePatVisibility()" style="flex:1;">👁 Show</button>
                <button onclick="resetPat()" class="btn-danger" style="flex:1;">🔄 Reset</button>
            </div>
            <div class="pat-status">
                <div id="patStatus">❌ Not Configured</div>
                <div id="patRepo" style="color:#999;">—</div>
            </div>
            <button onclick="testConnection()" style="width:100%; margin-top:12px; background:var(--warning);">🔗 Test Connection</button>
        </div>
    </div>

</div>

<!-- NAVIGATION FOOTER -->
<footer class="nav-footer">
    <a href="index.html" class="nav-btn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg><span class="nav-label">Portfolio</span></a>
    <a href="data.html" class="nav-btn active"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"></path><path d="M21 3v5h-5"></path><path d="M21 12a9 9 0 0 1-9 9 9.76 9.76 0 0 1-6.74-2.74L3 16"></path><path d="M3 21v-5h5"></path></svg><span class="nav-label">Data</span></a>
</footer>

<div class="toast" id="toast"></div>

<script>
    const DB_NAME = 'OnyxPortfolioDB';
    const DB_VERSION = 8;
    const STORE_NAME = 'Stocks';

    let masterData = [];
    let sourceData = {};
    let guidanceData = {};
    let editMode = false;
    let logMessages = [];
    let dataUpdatedTimes = {};

    const GITHUB_CONFIG = {
        OWNER: 'murugkan',
        REPO: 'bharatmarkets',
        BRANCH: 'main',
        PATHS: {
            symbols: 'unified-symbols.json',
            prices: 'prices.json',
            fundamentals: 'fundamentals.json',
            guidance: 'guidance.json',
            macro: 'macro_data.json'
        }
    };
    
    const RAW_GITHUB_URL = `https://raw.githubusercontent.com/${GITHUB_CONFIG.OWNER}/${GITHUB_CONFIG.REPO}/${GITHUB_CONFIG.BRANCH}`;
    
    const DATA_SOURCES = [
        { name: 'unified-symbols.json', path: GITHUB_CONFIG.PATHS.symbols },
        { name: 'prices.json', path: GITHUB_CONFIG.PATHS.prices },
        { name: 'fundamentals.json', path: GITHUB_CONFIG.PATHS.fundamentals },
        { name: 'guidance.json', path: GITHUB_CONFIG.PATHS.guidance }
    ];

    async function fetchGitHubData(filePath) {
        try {
            const url = `${RAW_GITHUB_URL}/${filePath}`;
            
            log(`📡 Fetching: ${filePath}`);
            const response = await fetch(url);
            
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }
            
            const data = await response.json();
            
            if (data && data.updated) {
                dataUpdatedTimes[filePath] = data.updated;
                log(`✅ Fetched ${filePath} - Data updated: ${data.updated}`);
            } else if (data && data.lastLoadedAt) {
                dataUpdatedTimes[filePath] = data.lastLoadedAt;
                log(`✅ Fetched ${filePath} - Last loaded: ${data.lastLoadedAt}`);
            } else {
                dataUpdatedTimes[filePath] = '—';
                log(`✅ Fetched ${filePath} - No timestamp in metadata`);
            }
            
            return data;
        } catch (e) {
            log(`❌ GitHub fetch failed: ${filePath}`);
            dataUpdatedTimes[filePath] = '❌ Error';
            return null;
        }
    }

    async function initializeFromGitHub() {
        log('🚀 Initializing from GitHub...');
        const symbolsData = await fetchGitHubData(DATA_SOURCES[0].path);
        
        if (!symbolsData) return Promise.resolve();
        
        let stocks = null;
        if (Array.isArray(symbolsData)) {
            stocks = symbolsData;
        } else if (symbolsData.symbols && Array.isArray(symbolsData.symbols)) {
            stocks = symbolsData.symbols;
        } else if (typeof symbolsData === 'object') {
            stocks = Object.values(symbolsData);
        }
        
        if (!stocks || stocks.length === 0) return Promise.resolve();
        
        masterData = stocks;
        
        return new Promise((resolve) => {
            var req = indexedDB.open(DB_NAME, DB_VERSION);
            
            req.onupgradeneeded = (e) => {
                var db = e.target.result;
                if (!db.objectStoreNames.contains(STORE_NAME)) {
                    db.createObjectStore(STORE_NAME, { keyPath: 'ticker' });
                }
            };
            
            req.onsuccess = (e) => {
                var db = e.target.result;
                try {
                    var transaction = db.transaction(STORE_NAME, 'readwrite');
                    var store = transaction.objectStore(STORE_NAME);
                    store.clear();
                    masterData.forEach(stock => store.put(stock));
                    transaction.oncomplete = () => resolve();
                    transaction.onerror = () => resolve();
                } catch (err) {
                    resolve();
                }
            };
            
            req.onerror = () => resolve();
        });
    }

    async function init() {
        document.getElementById('status').textContent = '⏳ Initializing...';
        log('🚀 ETL Center starting up...');
        
        try {
            // Just load from IndexedDB - don't fetch from GitHub
            await loadFromIndexedDB();
            
            if (masterData.length > 0) {
                log(`📊 Loaded: ${masterData.length} records from IndexedDB`);
                document.getElementById('status').textContent = '✅ Ready';
            } else {
                log('⚠️ No data. Click 🚀 LOAD ALL to fetch from GitHub');
                document.getElementById('status').textContent = '⚠️ Click LOAD ALL';
            }
        } catch (e) {
            log(`⚠️ Error: ${e.message}`);
            document.getElementById('status').textContent = '⚠️ Error';
        }
        
        renderDataSources();
        renderSymbols();
        updateHeader();
    }

    function switchTab(tabName) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(tabName).classList.add('active');
        event.target.classList.add('active');
    }

    function log(msg) {
        var ts = new Date().toLocaleTimeString();
        logMessages.push(`[${ts}] ${msg}`);
        var logBox = document.getElementById('live-log');
        if (logBox) {
            logBox.textContent = logMessages.slice(-30).join('\n');
            logBox.scrollTop = logBox.scrollHeight;
        }
        console.log(msg);
    }

    function showToast(msg) {
        var el = document.getElementById('toast');
        el.textContent = msg;
        el.classList.add('show');
        setTimeout(() => el.classList.remove('show'), 2000);
    }

    function renderDataSources() {
        var html = '';
        DATA_SOURCES.forEach((s, index) => {
            var count = masterData.length > 0 ? masterData.length : '—';
            var jsonTime = dataUpdatedTimes[s.path] || '—';
            
            // Convert ISO to IST (UTC+5:30)
            var istTime = '—';
            if (jsonTime && jsonTime !== '—' && !jsonTime.includes('❌')) {
                try {
                    var date = new Date(jsonTime);
                    istTime = date.toLocaleString('en-IN', { timeZone: 'Asia/Kolkata' });
                } catch(e) {
                    istTime = jsonTime;
                }
            }
            
            // First file (unified-symbols) opens wizard, others load data
            var loadButton = '';
            if (index === 0) {
                loadButton = `<button onclick="openWizard()" style="padding:4px 8px; font-size:8px; background:linear-gradient(135deg, #f59e0b 0%, #f87316 100%); color:#000; font-weight:800;">🧙 Wizard</button>`;
            } else {
                loadButton = `<button onclick="dataLoad('${s.name}')" style="padding:4px 8px; font-size:8px;">⬇️</button>`;
            }
            
            html += `<tr>
                <td>${s.name}</td>
                <td>${count}</td>
                <td style="font-size:9px;">${istTime}</td>
                <td style="text-align:center;">${loadButton}</td>
                <td style="text-align:center;"><button onclick="refreshDB('${s.name}')" style="padding:4px 8px; font-size:8px;">🔄</button></td>
            </tr>`;
        });
        document.getElementById('sources-table').innerHTML = html;
    }

    function dataLoad(source) {
        log(`⬇️ Loading ${source}...`);
        showToast(`Fetching ${source}...`);
        const sourceObj = DATA_SOURCES.find(s => s.name === source);
        if (!sourceObj) return;
        
        fetchGitHubData(sourceObj.path).then(data => {
            if (data) {
                log(`✅ Fetched ${source} from GitHub`);
                mergeAndSaveData(source, data);
                showToast(`✅ ${source} loaded & merged!`);
            } else {
                log(`❌ Failed to load ${source}`);
                showToast(`❌ Failed to load ${source}`);
            }
        });
    }

    function refreshDB(source) {
        log(`🔄 REFRESH DB initiated for ${source}...`);
        showToast(`Refreshing ${source}...`);
        const sourceObj = DATA_SOURCES.find(s => s.name === source);
        if (!sourceObj) return;
        
        fetchGitHubData(sourceObj.path).then(data => {
            if (data) {
                log(`✅ ${source} refreshed from GitHub`);
                mergeAndSaveData(source, data);
            }
        });
    }

    function mergeAndSaveData(source, data) {
        let priceMap = {}, fundMap = {};
        
        if (source === 'prices.json') {
            priceMap = data.quotes && typeof data.quotes === 'object' ? data.quotes : data;
            masterData.forEach((stock, i) => {
                if (priceMap[stock.ticker]) {
                    masterData[i] = {...masterData[i], ...priceMap[stock.ticker]};
                }
            });
        } else if (source === 'fundamentals.json') {
            fundMap = data.stocks && typeof data.stocks === 'object' ? data.stocks : data;
            masterData.forEach((stock, i) => {
                if (fundMap[stock.ticker]) {
                    masterData[i] = {...masterData[i], ...fundMap[stock.ticker]};
                }
            });
        }
        
        // Save to IndexedDB
        var req = indexedDB.open(DB_NAME, DB_VERSION);
        req.onsuccess = (e) => {
            var db = e.target.result;
            var transaction = db.transaction(STORE_NAME, 'readwrite');
            var store = transaction.objectStore(STORE_NAME);
            store.clear();
            masterData.forEach(stock => store.put(stock));
            transaction.oncomplete = () => {
                log(`✅ Merged ${source} to IndexedDB`);
                renderSymbols();
                renderDataSources();
                showToast(`✅ ${source} saved!`);
            };
        };
    }

    async function loadFromIndexedDB() {
        return new Promise((resolve) => {
            var req = indexedDB.open(DB_NAME, DB_VERSION);
            
            req.onerror = () => {
                masterData = [];
                resolve();
            };
            
            req.onupgradeneeded = (e) => {
                var db = e.target.result;
                if (!db.objectStoreNames.contains(STORE_NAME)) {
                    db.createObjectStore(STORE_NAME, { keyPath: 'ticker' });
                }
            };
            
            req.onsuccess = (e) => {
                var db = e.target.result;
                try {
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        masterData = [];
                        resolve();
                        return;
                    }
                    
                    var transaction = db.transaction(STORE_NAME, 'readonly');
                    var store = transaction.objectStore(STORE_NAME);
                    var getAllReq = store.getAll();

                    getAllReq.onsuccess = () => {
                        masterData = getAllReq.result || [];
                        resolve();
                    };
                    
                    getAllReq.onerror = () => {
                        masterData = [];
                        resolve();
                    };
                } catch (e) {
                    masterData = [];
                    resolve();

    function deleteStock(ticker) {
        if (confirm(`Delete ${ticker} from unified-symbols.json?`)) {
            var pat = document.getElementById('patToken').value;
            if (!pat) {

                return;
            }
            
            // Remove from masterData

            // Upload to GitHub
            uploadToGitHub(pat, 'unified-symbols.json', masterData, `Delete ${ticker}`);
            
            log(`🗑️ ${ticker} deleted from unified-symbols.json`);
            updateHeader();
            renderSymbols();
        }
    }
    
    function uploadToGitHub(pat, filename, data, message) {
        const url = `https://api.github.com/repos/${GITHUB_CONFIG.OWNER}/${GITHUB_CONFIG.REPO}/contents/${filename}`;
        
        // Get current file to get sha
        fetch(`${RAW_GITHUB_URL}/${filename}`)
            .then(r => r.json())
            .then(currentData => {
                // Get sha from GitHub API
                fetch(url, {
                    headers: { 'Authorization': `token ${pat}` }
                })
                .then(r => r.json())
                .then(fileInfo => {
                    const content = btoa(JSON.stringify(data, null, 2));
                    
                    return fetch(url, {
                        method: 'PUT',
                        headers: {
                            'Authorization': `token ${pat}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            message: message,
                            content: content,
                            sha: fileInfo.sha
                        })
                    });
                })
                .then(r => {
                    if (r.ok) {
                        log(`✅ ${filename} uploaded to GitHub`);
                        showToast(`✅ ${filename} updated!`);
                    } else {
                        log(`❌ Failed to upload ${filename}`);
                        showToast(`❌ Upload failed`);
                    }
                });
            })
            .catch(e => {
                log(`❌ Upload error: ${e.message}`);
                showToast(`❌ Error uploading`);
            });
    }

    async function loadAllData() {
        log('🚀 LOAD ALL initiated...');
        document.getElementById('status').textContent = '⏳ Loading';
        showToast('Loading all data from GitHub...');
        
        // Fetch only 3 core data sources
        const results = await Promise.all(
            DATA_SOURCES.map(source => fetchGitHubData(source.path))
        );
        
        log('✅ All files loaded from GitHub');
        
        let symbolsData = results[0];
        let symbolsList = null;
        
        if (Array.isArray(symbolsData)) {
            symbolsList = symbolsData;
        } else if (symbolsData && symbolsData.symbols && Array.isArray(symbolsData.symbols)) {
            symbolsList = symbolsData.symbols;
        } else if (symbolsData && symbolsData.stocks && Array.isArray(symbolsData.stocks)) {
            symbolsList = symbolsData.stocks;
        } else if (symbolsData && typeof symbolsData === 'object') {
            symbolsList = Object.values(symbolsData);
        }
        
        if (!symbolsList || symbolsList.length === 0) {
            log('❌ Could not parse symbols data');
            document.getElementById('status').textContent = '❌ Failed';
            return;
        }
        
        const pricesData = results[1] || {};
        const fundamentalsData = results[2] || {};
        const newGuidanceData = results[3] || {};
        
        log('📦 Parsing results...');
        
        // Store guidance data globally
        if (newGuidanceData && typeof newGuidanceData === 'object') {
            guidanceData = newGuidanceData;
            log('✅ Loaded guidance data');
        }
        
        let priceMap = {};
        if (pricesData.quotes && typeof pricesData.quotes === 'object' && !Array.isArray(pricesData.quotes)) {
            priceMap = pricesData.quotes;
            log('✅ Found prices in "quotes" wrapper');
        } else {
            priceMap = Object.keys(pricesData).some(k => k === k.toUpperCase()) ? pricesData : {};
        }
        
        let fundMap = {};
        if (fundamentalsData.stocks && typeof fundamentalsData.stocks === 'object' && !Array.isArray(fundamentalsData.stocks)) {
            fundMap = fundamentalsData.stocks;
            log('✅ Found fundamentals in "stocks" wrapper');
        } else {
            fundMap = Object.keys(fundamentalsData).some(k => k === k.toUpperCase()) ? fundamentalsData : {};
        }
        
        let mergedStocks = [];
        symbolsList.forEach(symbol => {
            const ticker = symbol.ticker || symbol.TICKER || symbol.name;
            if (!ticker) return;
            
            const merged = {
                ...symbol,
                ...(priceMap[ticker] || {}),
                ...(fundMap[ticker] || {}),
                ticker: ticker
            };
            
            mergedStocks.push(merged);
        });
        
        log(`✅ Merged data from all sources: ${mergedStocks.length} records enriched`);
        
        var req = indexedDB.open(DB_NAME, DB_VERSION);
        req.onsuccess = (e) => {
            var db = e.target.result;
            try {
                var transaction = db.transaction(STORE_NAME, 'readwrite');
                var store = transaction.objectStore(STORE_NAME);
                store.clear();
                
                masterData = mergedStocks;
                mergedStocks.forEach(stock => {
                    store.put(stock);
                });
                
                transaction.oncomplete = () => {
                    log(`✅ Merged ${mergedStocks.length} records to IndexedDB`);
                    
                    updateHeader();
                    renderSymbols();
                    renderDataSources();
                    document.getElementById('status').textContent = '✅ Ready';
                    showToast('✅ Load complete!');
                };
                
                transaction.onerror = () => {
                    log(`⚠️ IndexedDB error: ${transaction.error}`);
                    document.getElementById('status').textContent = '⚠️ Error';
                };
            } catch (err) {
                log(`⚠️ Error: ${err.message}`);
                document.getElementById('status').textContent = '⚠️ Error';
            }
        };
        
        req.onerror = () => {
            log(`⚠️ Could not open IndexedDB`);
            document.getElementById('status').textContent = '⚠️ Error';
        };
    }

    async function reloadAuto() {
        log('🔄 RELOAD AUTO initiated...');
        document.getElementById('status').textContent = '⏳ Reloading';
        showToast('Clearing and reloading from GitHub...');
        
        await new Promise(resolve => {
            var req = indexedDB.deleteDatabase(DB_NAME);

        log('✅ DB cleared');
        
        await initializeFromGitHub();
        await loadFromIndexedDB();
        updateHeader();
        renderSymbols();
        renderDataSources();
        document.getElementById('status').textContent = '✅ Ready';
        showToast('✅ Reload complete!');
    }
