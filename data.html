<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
    <title>Onyx | DATA</title>
    <link rel="stylesheet" href="app-styles.css">
    <script src="app-core.js"></script>
    <style>
        .input-group { margin-bottom: 20px; }
        label { display: block; font-size: 10px; color: var(--bl); margin-bottom: 8px; text-transform: uppercase; font-weight: 800; }
        input { 
            width: 100%; background: #111; border: 1px solid #444; color: #fff; 
            padding: 14px; border-radius: 4px; font-size: 15px; box-sizing: border-box;
        }
        input:focus { border-color: var(--bl); background: #000; outline: none; }
        .btn-main { 
            width: 100%; background: var(--bl); color: #000; border: none; 
            padding: 16px; font-weight: 900; border-radius: 4px; text-transform: uppercase; margin-bottom: 10px;
        }
        #data-log { 
            background: #000; border: 1px solid #222; padding: 12px; 
            height: 120px; overflow-y: auto; font-family: monospace; font-size: 10px; margin-top: 20px; color: #888;
        }
        tr { border-bottom: 1px solid #222; }
    </style>
</head>
<body>

<div class="sec" style="margin: 20px 15px;">
    <h3 style="font-size:11px; color:var(--tx3); text-transform:uppercase; margin-bottom:15px;">0. Connection Settings</h3>
    <div class="input-group">
        <label>GitHub Token (PAT)</label>
        <input type="password" id="gh-token" placeholder="paste github_pat_...">
    </div>

    <div class="input-group">
        <label>Repository (user/repo)</label>
        <input type="text" id="gh-repo" placeholder="e.g. murugkan/bharatmarkets">
    </div>

    <button class="btn-main" onclick="validatePAT()">Connect & Sync Cloud</button>
</div>

<div class="sec" style="margin: 20px 15px;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
        <h3 style="font-size:11px; color:var(--tx3); text-transform:uppercase;">1. DQA // Symbol Audit</h3>
        <button onclick="reloadData()" style="background:none; border:none; color:var(--bl); font-size:10px; font-weight:bold;">RELOAD ↻</button>
    </div>
    <table style="width:100%; border-collapse:collapse; font-size:12px;">
        <tbody id="dqa-body"></tbody>
    </table>
</div>

<div id="data-log" style="margin: 0 15px;"></div>

<nav class="footer-nav">
    <a href="data.html" class="nav-item active">📂<br>DATA</a>
    <a href="index.html" class="nav-item">📊<br>PORTFOLIO</a>
</nav>

<script>
window.addEventListener('load', () => {
    loadState();
    document.getElementById('gh-token').value = S.settings.ghToken || '';
    document.getElementById('gh-repo').value = S.settings.ghRepo || '';
    renderDQA();
});

async function validatePAT() {
    const t = document.getElementById('gh-token').value.trim();
    const r = document.getElementById('gh-repo').value.trim();
    
    if(!t || !r) return toast("Enter both Token and Repo");

    // Save to global state immediately for the fetch headers to use
    S.settings.ghToken = t;
    S.settings.ghRepo = r;
    
    dataLog("Verifying GitHub Access...", "📡");

    try {
        const res = await fetch(`https://api.github.com/repos/${r}`, {
            headers: ghHeaders()
        });

        if (res.ok) {
            dataLog("Success! Repo Linked: " + r, "✅");
            S.settings._ghStatus = 'ok';
            saveSettings();
            toast("Connection Verified");
        } else {
            dataLog("Error: " + res.status + " - Unauthorized", "❌");
            toast("Connection Failed");
        }
    } catch (e) {
        dataLog("Network Error", "⚠️");
    }
}

function renderDQA() {
    const body = document.getElementById('dqa-body');
    if (!body) return;
    body.innerHTML = SYMBOLS.length ? '' : '<tr><td style="color:#444; padding:20px; text-align:center;">No data found in local storage.</td></tr>';
    
    SYMBOLS.forEach(s => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td style="padding:15px 5px; font-weight:800; color:var(--bl);">${s.sym}</td>
            <td style="color:#666; font-size:10px;">${(s.name || '').slice(0,18)}</td>
            <td style="text-align:right; color:#ff4444; font-weight:bold; font-size:10px;" onclick="removeSym('${s.sym}')">DELETE</td>
        `;
        body.appendChild(tr);
    });
}

function removeSym(sym) {
    if(confirm("Remove " + sym + "?")) {
        window.SYMBOLS = SYMBOLS.filter(x => x.sym !== sym);
        localStorage.setItem('bm_symbols', JSON.stringify(SYMBOLS));
        renderDQA();
    }
}

async function reloadData() {
    if(!requirePAT()) return;
    dataLog("Downloading symbols.json...", "☁️");
    const data = await ghFetchRaw('symbols.json');
    if(data) {
        window.SYMBOLS = data;
        localStorage.setItem('bm_symbols', JSON.stringify(data));
        renderDQA();
        dataLog("DQA Sync Complete", "✅");
    }
}
</script>
</body>
</html>
