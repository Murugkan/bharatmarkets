<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
    <title>Onyx | DATA</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="app-core.js"></script>
    <style>
        body { background:#000; color:#fff; font-family:sans-serif; margin:0; padding-bottom:120px; -webkit-tap-highlight-color: transparent; }
        .sec { margin: 15px; padding: 15px; background: #080808; border-radius: 8px; border: 1px solid #111; position: relative; z-index: 10; }
        .btn-main { 
            width: 100%; background: #00f2ff; color: #000; border: none; padding: 18px; 
            font-weight: 900; border-radius: 4px; text-transform: uppercase; margin-top:10px;
            cursor: pointer; position: relative; z-index: 999; display: block;
        }
        .btn-main:active { background: #008b91; transform: scale(0.98); }
        #conn-status { font-size:12px; margin-top:12px; color:#00f2ff; font-weight:bold; display:block; text-align:center; }
        .truncate { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 11px; max-width: 180px; }
        .card { border: 1px solid #333; padding: 10px; margin-top: 10px; border-radius: 4px; background: #111; }
        .unresolved { border-color: #ff4444; background: #110505; }
        input[type="text"] { background:#000; border:1px solid #333; color:#fff; padding:12px; border-radius:3px; width: 100%; box-sizing: border-box; font-size: 16px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="sec">
    <h3 style="font-size:10px; color:#555; text-transform:uppercase; margin-bottom:10px;">0. Connection</h3>
    <input type="text" id="pat" placeholder="GitHub PAT">
    <input type="text" id="repo" placeholder="user/repo">
    <button type="button" class="btn-main" id="btn-connect">CONNECT & SYNC</button>
    <span id="conn-status">Status: Not Connected</span>
</div>

<div class="sec" id="import-gate" style="opacity:0.3; pointer-events:none;">
    <h3 style="font-size:10px; color:#555; text-transform:uppercase; margin-bottom:10px;">1. Import</h3>
    <div style="display:flex; gap:5px; margin-bottom:15px;">
        <button class="btn-main" style="background:#111; color:#555; font-size:10px;" onclick="switchTab('A')">FILE UPLOAD</button>
        <button class="btn-main" style="background:#111; color:#555; font-size:10px;" onclick="switchTab('B')">MANUAL ENTRY</button>
    </div>
    <div id="tab-a">
        <input type="file" id="f-in" style="display:none" onchange="handleFile(this)">
        <button class="btn-main" style="background:#222; color:#00f2ff; border:1px solid #00f2ff;" onclick="document.getElementById('f-in').click()">📂 SELECT .CSV / .XLSX</button>
    </div>
</div>

<div id="res-panel" class="sec" style="display:none;">
    <h3 style="font-size:10px; color:#00f2ff; text-transform:uppercase;">Resolution Results</h3>
    <div id="res-list"></div>
</div>

<div class="sec"><div id="data-log" style="font-size:10px; color:#444; height:80px; overflow:auto;"></div></div>

<script>
let rawStocks = [], resItems = [], unresItems = [];

document.getElementById('btn-connect').addEventListener('click', async () => {
    const status = document.getElementById('conn-status');
    status.innerText = "⏳ Connecting...";
    S.settings.ghToken = document.getElementById('pat').value;
    S.settings.ghRepo = document.getElementById('repo').value;
    try {
        const ok = await validatePAT();
        if(ok) {
            status.innerText = "✅ Connected & Synced";
            status.style.color = "#00ff88";
            document.getElementById('import-gate').style.opacity = "1";
            document.getElementById('import-gate').style.pointerEvents = "auto";
            saveSettings();
        } else {
            status.innerText = "❌ Connection Failed";
            status.style.color = "#ff4444";
        }
    } catch(e) { status.innerText = "❌ Error: " + e.message; }
});

async function handleFile(input) {
    if(!input.files[0]) return;
    rawStocks = await parseFile(input.files[0]);
    startResolution();
}

async function startResolution() {
    document.getElementById('res-panel').style.display = 'block';
    const list = document.getElementById('res-list'); list.innerHTML = '';
    for(let s of rawStocks) {
        if(checkDuplicate(s.name)) continue;
        const res = await searchYahoo(s.name);
        if(res && res.score > 70) {
            list.innerHTML += `<div class="card">✅ ${res.quote.symbol} (${s.name})</div>`;
        } else {
            list.innerHTML += `<div class="card unresolved"><div class="truncate">${s.name}</div><input type="text" placeholder="Manual Symbol"></div>`;
        }
    }
}

window.onload = () => {
    document.getElementById('pat').value = S.settings.ghToken || '';
    document.getElementById('repo').value = S.settings.ghRepo || '';
};
</script>
</body>
</html>
