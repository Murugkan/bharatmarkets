<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>Onyx | DATA</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="app-core.js"></script>
    <style>
        body { background:#000; color:#fff; font-family:-apple-system, sans-serif; margin:0; padding:15px; }
        .card { background:#0a0a0a; border:1px solid #1a1a1a; padding:15px; border-radius:8px; margin-bottom:15px; }
        .btn { width:100%; background:#00f2ff; color:#000; border:none; padding:16px; font-weight:800; border-radius:4px; font-size:12px; }
        input { width:100%; background:#111; border:1px solid #333; color:#fff; padding:12px; margin-bottom:10px; box-sizing:border-box; font-size:16px; border-radius:4px; }
        #debug-console { height:120px; background:#050505; border:1px solid #222; overflow-y:auto; margin-top:10px; padding:5px; border-radius:4px; font-family:monospace; }
        .res-row { display:flex; justify-content:space-between; align-items:center; padding:12px 0; border-bottom:1px solid #111; }
        input.fix { width:90px; background:#111; border:1px solid #333; color:#fff; padding:8px; margin:0; font-size:13px; text-align:center; }
    </style>
</head>
<body>

<div class="card">
    <h3 style="font-size:10px; color:#555; margin-bottom:10px;">0. CONNECTION</h3>
    <input type="password" id="p" placeholder="GitHub PAT">
    <input type="text" id="r" placeholder="username/repository">
    <button class="btn" onclick="testGitHubConnection()">SAVE & DIAGNOSE</button>
    <div id="gh-diag"></div>
</div>

<div class="card">
    <h3 style="font-size:10px; color:#555; margin-bottom:10px;">1. IMPORT</h3>
    <button class="btn" style="background:#111; color:#00f2ff; border:1px solid #00f2ff" onclick="document.getElementById('fin').click()">SELECT EXCEL/CSV</button>
    <input type="file" id="fin" style="display:none" onchange="startImport(this)">
    <div id="debug-console"></div>
</div>

<div id="res-area" class="card" style="display:none">
    <h3 style="font-size:10px; color:#00f2ff; margin-bottom:10px;">RESOLUTION RESULTS</h3>
    <div id="res-list"></div>
</div>

<script>
async function startImport(input) {
    const reader = new FileReader();
    reader.onload = async (e) => {
        try {
            const wb = XLSX.read(e.target.result, {type:'binary'});
            const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
            const list = document.getElementById('res-list');
            document.getElementById('res-area').style.display = 'block';
            list.innerHTML = '';
            
            dataLog(`Processing ${rows.length} rows...`, 'info');

            for(let r of rows) {
                const name = r["Company Name"] || r["Security Name"] || Object.values(r)[0];
                const res = await resolveSymbol(name);
                if(!res) continue;

                const rowDiv = document.createElement('div');
                rowDiv.className = 'res-row';
                rowDiv.innerHTML = `
                    <div style="flex:1">
                        <div style="font-size:10px; color:#555">${name}</div>
                        <div style="color:${res.error?'#ff4444':'#00ff88'}; font-weight:bold">${res.symbol}</div>
                    </div>
                    <input type="text" class="fix" placeholder="Fix" 
                        value="${res.error?'':res.symbol}" 
                        onchange="updateAlias('${name}', this.value)">
                `;
                list.appendChild(rowDiv);
            }
            dataLog("Finished.", "success");
        } catch(err) { dataLog("Error: " + err.message, "error"); }
    };
    reader.readAsBinaryString(input.files[0]);
}

window.onload = () => {
    document.getElementById('p').value = window.S.settings.ghToken || '';
    document.getElementById('r').value = window.S.settings.ghRepo || '';
};
</script>
</body>
</html>
