<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>Onyx | DATA DEBUG</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="app-core.js"></script>
    <style>
        body { background:#000; color:#fff; font-family:sans-serif; margin:0; padding:15px; padding-bottom:200px; }
        .card { background:#0a0a0a; border:1px solid #1a1a1a; padding:15px; border-radius:8px; margin-bottom:15px; }
        .btn { width:100%; background:#00f2ff; color:#000; border:none; padding:15px; font-weight:800; border-radius:4px; margin-bottom:10px; }
        input { width:100%; background:#111; border:1px solid #333; color:#fff; padding:12px; margin-bottom:10px; box-sizing:border-box; font-size:16px; }
        
        /* THE DEBUG CONSOLE */
        #debug-console { 
            position:fixed; bottom:0; left:0; right:0; height:180px; 
            background:#050505; border-top:2px solid #333; 
            overflow-y:auto; padding:10px; font-family:monospace; z-index:9999;
        }
        .debug-title { font-size:9px; color:#555; text-transform:uppercase; margin-bottom:5px; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="font-size:10px; color:#555; text-transform:uppercase;">1. GitHub Access</h2>
    <input type="password" id="pat" placeholder="GitHub PAT">
    <input type="text" id="repo" placeholder="username/repo">
    <button class="btn" onclick="saveAndTest()">SAVE & DIAGNOSE</button>
    <div id="gh-diag"></div>
</div>

<div class="card">
    <h2 style="font-size:10px; color:#555; text-transform:uppercase;">2. Import & Resolve</h2>
    <input type="file" id="file-in" style="display:none" onchange="processImport(this)">
    <button class="btn" style="background:#111; color:#00f2ff; border:1px solid #00f2ff" onclick="document.getElementById('file-in').click()">SELECT FILE</button>
</div>

<div id="res-card" class="card" style="display:none">
    <div id="res-list"></div>
</div>

<div id="debug-console">
    <div class="debug-title">System Logs (Live)</div>
</div>

<script>
function saveAndTest() {
    S.settings.ghToken = document.getElementById('pat').value;
    S.settings.ghRepo = document.getElementById('repo').value;
    localStorage.setItem('bm_settings', JSON.stringify(S));
    testGitHubConnection();
}

async function processImport(input) {
    const reader = new FileReader();
    reader.onload = async (e) => {
        const wb = XLSX.read(e.target.result, {type:'binary'});
        const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
        document.getElementById('res-card').style.display = 'block';
        const list = document.getElementById('res-list');
        list.innerHTML = 'Processing...';

        for(let r of rows) {
            const rawName = r["Company Name"] || r["Security Name"] || Object.values(r)[0];
            const result = await resolveSymbol(rawName);
            const div = document.createElement('div');
            div.style.cssText = "display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid #111";
            div.innerHTML = `
                <div>
                    <div style="font-size:10px; color:#555">${rawName}</div>
                    <div style="color:${result?'#00ff88':'#ff4444'}">${result?result.symbol:'FAILED'}</div>
                </div>
                <input type="text" style="width:80px; margin:0; padding:4px;" value="${result?result.symbol:''}" onchange="updateAlias('${rawName}', this.value)">
            `;
            list.appendChild(div);
        }
    };
    reader.readAsBinaryString(input.files[0]);
}

window.onload = () => {
    document.getElementById('pat').value = S.settings.ghToken || '';
    document.getElementById('repo').value = S.settings.ghRepo || '';
    dataLog("System Ready. Waiting for file...", "info");
};
</script>
</body>
</html>
