<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
    <title>Onyx | Data Loader</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg:#000; --s1:#0a0a0a; --b1:#222; --bl:#00f2ff; --gr:#00ff88; --rd:#ff4d6d; --tx:#fff; }
        *{box-sizing:border-box;margin:0;padding:0;}
        body { background:var(--bg); color:var(--tx); font-family:'JetBrains Mono',monospace; overflow:hidden; -webkit-text-size-adjust:100%; padding-bottom: 80px; }
        header { background:var(--s1); border-bottom:1px solid var(--b1); padding:12px; display:flex; justify-content:space-around; }
        .kpi-box { text-align:center; }
        .kpi-label { font-size:8px; color:#666; text-transform:uppercase; letter-spacing:1px; }
        .kpi-val { font-size:14px; font-weight:800; margin-top:2px; color:var(--bl); }
        #bar-wrap { padding:12px; background:#111; border-bottom:1px solid var(--b1); }
        #tape-bar { width:100%; height:32px; border-radius:4px; overflow:hidden; display:flex; background:#050505; }
        .seg { height:100%; cursor:pointer; flex-shrink:0; border-right:1px solid rgba(0,0,0,0.3); }
        #legend { display:flex; flex-wrap:wrap; gap:6px 12px; padding:10px; border-bottom:1px solid var(--b1); background:#000; max-height:80px; overflow-y:auto; }
        .leg { display:flex; align-items:center; gap:6px; font-size:9px; color:#666; cursor:pointer; }
        .leg.on { color:#fff; font-weight:800; }
        .dot { width:8px; height:8px; border-radius:2px; }
        .view { width:100%; overflow:auto; height:calc(100vh - 210px); background:#000; -webkit-overflow-scrolling:touch; }
        table { width:100%; border-collapse:collapse; font-size:10px; white-space:nowrap; }
        th { background:var(--s1); color:#666; padding:12px; position:sticky; top:0; z-index:10; border-bottom:2px solid var(--b1); text-align:left; cursor: pointer; }
        th.active { color: var(--bl); }
        td { padding:12px; border-bottom:1px solid #111; }
        .sticky { position:sticky; left:0; background:#0a0a0a!important; z-index:5; border-right:1px solid var(--b1); color:var(--bl)!important; }
        .pos { color:var(--gr)!important; }
        .neg { color:var(--rd)!important; }
        #status { padding:40px; font-size:11px; color:var(--bl); text-align:center; position:absolute; width:100%; top:200px; z-index:100; }
        #debug-log {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 0;
            background: #000;
            color: #0f0;
            border-top: 2px solid #0f0;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            overflow-y: auto;
            z-index: 9998;
            padding: 10px;
            line-height: 1.3;
            white-space: pre-wrap;
            word-break: break-all;
            transition: height 0.3s;
        }
        #debug-log.show { height: 300px; }
        footer { position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); border-top: 1px solid var(--b1); display: flex; justify-content: space-around; padding: 12px 0; padding-bottom: calc(12px + env(safe-area-inset-bottom)); z-index: 1000; }
        .nav-btn { text-decoration: none; color: #666; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 25%; padding: 8px 0; transition: color 0.2s; font-size:9px; }
        .nav-btn:hover { color: var(--bl); }
        .nav-btn.active { color: var(--bl); font-weight: 800; }
        .nav-label { font-size: 8px; margin-top: 4px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        .nav-btn svg { width: 16px; height: 16px; }
        #log-toggle { background: #0f0; color: #000; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 10px; position: fixed; bottom: 65px; right: 10px; z-index: 999; }
    </style>
</head>
<body>

<header>
    <div class="kpi-box"><div class="kpi-label">Records</div><div class="kpi-val" id="k-count">0</div></div>
    <div class="kpi-box"><div class="kpi-label">Status</div><div class="kpi-val" id="k-status" style="font-size:10px;">Ready</div></div>
    <div class="kpi-box" style="cursor:pointer;" onclick="loadAndMergeData()" title="Load data"><div class="kpi-label">Action</div><div class="kpi-val" style="color:#00ff88; font-size:11px;">LOAD ↓</div></div>
</header>

<div id="bar-wrap"><div id="tape-bar"></div></div>
<div id="legend"></div>
<div id="status" style="display:none;">Loading...</div>
<div class="view"><div id="app"></div></div>
<div id="debug-log"></div>

<footer>
    <a href="index.html" class="nav-btn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg><span class="nav-label">Portfolio</span></a>
    <a href="data.html" class="nav-btn active"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"></path><path d="M21 3v5h-5"></path><path d="M21 12a9 9 0 0 1-9 9 9.76 9.76 0 0 1-6.74-2.74L3 16"></path><path d="M3 21v-5h5"></path></svg><span class="nav-label">Data</span></a>
    <a href="nexus.html" class="nav-btn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg><span class="nav-label">Import</span></a>
    <button id="log-toggle" onclick="toggleLog()">Log</button>
</footer>

<script>
    const DB_NAME = "OnyxPortfolioDB", STORE_NAME = "Stocks", DB_VERSION = 8;
    const PALETTE = ['#00f2ff','#7000ff','#ff007a','#ffb800','#00ff88','#007aff','#ff4d6d','#f97316','#a3e635','#ec4899','#8b5cf6','#f43f5e'];
    let MASTER = [], SECTORS = [], COL = {}, filter = null, sortCol = 'SYM', sortAsc = true;
    const UI_FIELDS = ['SYM', 'SIGNAL', 'POS', 'NEG', 'LTP', 'QTY', 'AVG', 'CHANGE', 'ROE', 'ROCE', 'OPM', 'NPM', 'PE', 'PB', 'EPS', 'SECTOR'];
    
    var debugLog = [];
    
    function log(msg) {
        var ts = new Date().toLocaleTimeString();
        debugLog.push('[' + ts + '] ' + msg);
        var el = document.getElementById('debug-log');
        if (el) {
            el.textContent = debugLog.slice(-50).join('\n');
            el.scrollTop = el.scrollHeight;
        }
        console.log(msg);
    }
    
    function toggleLog() {
        document.getElementById('debug-log').classList.toggle('show');
    }
    
    const cleanNum = (v) => {
        if (typeof v === 'number') return v;
        if (!v || v === '—') return 0;
        return parseFloat(v.toString().replace(/[^\d.-]/g, '')) || 0;
    };
    
    const fmt = (val, field) => {
        const n = cleanNum(val);
        if (n === 0 && val === '—') return '—';
        if (['LTP', 'AVG', 'PNL', 'INVESTED'].includes(field)) return n.toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        if (field.includes('%')) return n.toFixed(2) + '%';
        return val;
    };
    
    const resolve = (obj, field) => {
        const f = field.toUpperCase();
        const mappings = { 
            'SYM':['ticker','SYM','SYMBOL','TICKER'], 
            'SIGNAL':['signal','SIGNAL','TECH_SIGNAL'],
            'POS':['pos','POS','POSITIVE'], 
            'NEG':['neg','NEG','NEGATIVE'], 
            'LTP':['ltp','LTP','PRICE','price'], 
            'QTY':['qty','QTY','quantity'], 
            'AVG':['avg','AVG','AVGBUY','avgbuy'], 
            'CHANGE':['change','changePct','1D%','CHANGE_1D'], 
            'ROE':['roe','ROE%','ROE'], 
            'ROCE':['roce','ROCE%','ROCE'],
            'OPM':['opm','OPM%','OPM','opmPct'],
            'NPM':['npm','NPM%','NPM','npmPct'], 
            'PE':['pe','PE','P/E'], 
            'PB':['pb','PB','P/B'], 
            'EPS':['eps','EPS'], 
            'SECTOR':['sector','SECTOR'],
            'NAME':['name','NAME','COMPANY'],
            'OPEN':['open','OPEN'],
            'HIGH':['high','HIGH'],
            'LOW':['low','LOW'],
            'VOL':['vol','VOL','VOLUME'],
            'BETA':['beta','BETA'],
            'DIV_YIELD':['div_yield','DIV_YIELD','DIVYIELD'],
            'W52H':['w52h','W52H','52W_HIGH'],
            'W52L':['w52l','W52L','52W_LOW']
        };
        const targets = mappings[f] || [f, field];
        for (let t of targets) {
            if (obj[t] !== undefined) return obj[t];
            const cleanT = t.replace('%', '').replace('_PCT', '');
            if (obj[cleanT] !== undefined) return obj[cleanT];
        }
        return '—';
    };
    
    function loadAndMergeData() {
        document.getElementById('k-status').textContent = 'Loading...';
        log('⏳ Starting load...');
        
        Promise.all([
            fetch('unified-symbols.json').then(r => r.json()),
            fetch('prices.json').then(r => r.json()),
            fetch('fundamentals.json').then(r => r.json())
        ]).then(([symbolsData, pricesData, fundamentalsData]) => {
            log('✅ JSONs loaded');
            
            // Extract arrays
            var symbols = symbolsData || [];
            var prices = Array.isArray(pricesData) ? pricesData : (pricesData.quotes ? Object.values(pricesData.quotes) : []);
            var fundamentals = Array.isArray(fundamentalsData) ? fundamentalsData : (fundamentalsData.stocks ? Object.values(fundamentalsData.stocks) : []);
            
            log('📦 Symbols: ' + symbols.length + ', Prices: ' + prices.length + ', Fundamentals: ' + fundamentals.length);
            
            // Merge
            var merged = {};
            symbols.forEach(s => {
                if (s.ticker) merged[s.ticker] = {...s};
            });
            prices.forEach(p => {
                if (p.ticker && merged[p.ticker]) Object.assign(merged[p.ticker], p);
            });
            fundamentals.forEach(f => {
                if (f.ticker && merged[f.ticker]) Object.assign(merged[f.ticker], f);
            });
            
            var records = Object.values(merged);
            log('✅ Merged ' + records.length + ' records');
            
            if (records.length > 0) {
                var fields = Object.keys(records[0]);
                log('📋 First record: ' + fields.length + ' fields');
                log('   ' + fields.join(', '));
            }
            
            saveToIndexedDB(records);
            
        }).catch(err => {
            log('❌ Error: ' + err.message);
            document.getElementById('k-status').textContent = 'Error!';
        });
    }
    
    function saveToIndexedDB(records) {
        log('💾 Saving to IndexedDB...');
        
        var req = indexedDB.open(DB_NAME, DB_VERSION);
        
        req.onupgradeneeded = (e) => {
            var db = e.target.result;
            if (db.objectStoreNames.contains(STORE_NAME)) db.deleteObjectStore(STORE_NAME);
            db.createObjectStore(STORE_NAME, {keyPath: 'ticker'});
            log('✅ Store created');
        };
        
        req.onsuccess = (e) => {
            var db = e.target.result;
            var tx = db.transaction(STORE_NAME, 'readwrite');
            var store = tx.objectStore(STORE_NAME);
            
            var saved = 0;
            records.forEach((r, i) => {
                if (r.ticker) {
                    store.put(r);
                    saved++;
                }
            });
            
            tx.oncomplete = () => {
                log('✅ Saved ' + saved + ' records');
                document.getElementById('k-status').textContent = 'Ready';
                document.getElementById('k-count').textContent = saved;
                loadFromIndexedDB();
            };
        };
        
        req.onerror = () => {
            log('❌ DB error');
            document.getElementById('k-status').textContent = 'Error!';
        };
    }
    
    function loadFromIndexedDB() {
        var req = indexedDB.open(DB_NAME, DB_VERSION);
        req.onsuccess = (e) => {
            var db = e.target.result;
            var store = db.transaction(STORE_NAME).objectStore(STORE_NAME);
            var getAllReq = store.getAll();
            
            getAllReq.onsuccess = () => {
                MASTER = getAllReq.result;
                log('✅ Loaded ' + MASTER.length + ' from DB');
                buildSectors();
                render();
            };
        };
    }
    
    function buildSectors() {
        var sectorMap = {};
        MASTER.forEach(r => {
            var s = resolve(r, 'SECTOR') || 'Other';
            if (!sectorMap[s]) sectorMap[s] = 0;
            sectorMap[s]++;
        });
        SECTORS = Object.keys(sectorMap).sort();
        renderLegend();
    }
    
    function renderLegend() {
        var html = '<span class="leg on" onclick="filter=null; render();">ALL (' + MASTER.length + ')</span>';
        SECTORS.forEach((s, i) => {
            var count = MASTER.filter(r => resolve(r, 'SECTOR') === s).length;
            html += '<span class="leg" onclick="filter=\'' + s + '\'; render();" style="cursor:pointer;"><span class="dot" style="background:' + PALETTE[i % PALETTE.length] + '"></span>' + s + ' (' + count + ')</span>';
        });
        document.getElementById('legend').innerHTML = html;
    }
    
    function render() {
        var data = filter ? MASTER.filter(r => resolve(r, 'SECTOR') === filter) : MASTER;
        
        data.sort((a, b) => {
            var av = cleanNum(resolve(a, sortCol));
            var bv = cleanNum(resolve(b, sortCol));
            return sortAsc ? av - bv : bv - av;
        });
        
        var html = '<table><thead><tr>';
        UI_FIELDS.forEach(f => {
            html += '<th onclick="doSort(\'' + f + '\')" class="' + (f===sortCol?'active':'') + ' ' + (f==='SYM'?'sticky':'') + '"><sup>' + (f===sortCol?(sortAsc?'▲':'▼'):'') + '</sup>' + f + '</th>';
        });
        html += '</tr></thead><tbody>';
        
        data.forEach(r => {
            html += '<tr>';
            UI_FIELDS.forEach(f => {
                var val = resolve(r, f);
                var cls = f === 'SYM' ? 'sticky' : '';
                if (f === 'POS' && cleanNum(val) > 0) cls += ' pos';
                if (f === 'NEG' && cleanNum(val) > 0) cls += ' neg';
                html += '<td class="' + cls + '">' + fmt(val, f) + '</td>';
            });
            html += '</tr>';
        });
        
        html += '</tbody></table>';
        
        document.getElementById('app').innerHTML = html;
    }
    
    function doSort(col) {
        if (sortCol === col) sortAsc = !sortAsc;
        else { sortCol = col; sortAsc = true; }
        render();
    }
    
    // Load on init
    loadFromIndexedDB();
</script>
</body>
</html>
