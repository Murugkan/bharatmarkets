<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
    <title>Bharat Markets - ETL Center</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000;
            --s1: #0a0a0a;
            --b1: #222;
            --bl: #00f2ff;
            --gr: #00ff88;
            --rd: #ff4d6d;
            --tx: #fff;
            --warning: #f59e0b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg);
            color: var(--tx);
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            overflow: hidden;
            -webkit-text-size-adjust: 100%;
            padding-bottom: 80px;
        }

        /* HEADER */
        header {
            background: var(--s1);
            border-bottom: 1px solid var(--b1);
            padding: 12px;
        }
        .header-title { font-size: 14px; font-weight: 800; margin-bottom: 10px; color: var(--bl); }
        .metrics {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 8px;
        }
        .metric-box {
            background: var(--b1);
            padding: 8px;
            border-radius: 4px;
            text-align: center;
        }
        .metric-label { font-size: 8px; color: #666; text-transform: uppercase; }
        .metric-val { font-size: 12px; font-weight: 800; color: var(--bl); margin-top: 4px; }

        /* TAB BUTTONS */
        .tabs {
            display: flex;
            gap: 0;
            background: var(--s1);
            border-bottom: 2px solid var(--b1);
            overflow-x: auto;
            padding: 0;
            -webkit-overflow-scrolling: touch;
        }
        .tab-btn {
            flex: 1;
            min-width: 80px;
            padding: 10px;
            background: var(--s1);
            color: #666;
            border: none;
            border-bottom: 3px solid transparent;
            cursor: pointer;
            font-size: 9px;
            font-weight: 800;
            text-transform: uppercase;
            white-space: nowrap;
            transition: all 0.2s;
        }
        .tab-btn.active {
            color: var(--bl);
            border-bottom-color: var(--bl);
            background: #111;
        }

        /* CONTENT AREA */
        .content {
            height: calc(100vh - 180px);
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 12px;
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* TABLES */
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 10px;
        }
        th {
            background: var(--s1);
            color: #666;
            padding: 8px;
            position: sticky;
            top: 0;
            z-index: 10;
            border-bottom: 2px solid var(--b1);
            text-align: left;
            font-weight: 800;
        }
        th.active { color: var(--bl); }
        td {
            padding: 6px 8px;
            border-bottom: 1px solid #111;
        }
        td.sticky {
            position: sticky;
            left: 0;
            background: #0a0a0a;
            z-index: 5;
            border-right: 1px solid var(--b1);
            color: var(--bl);
            font-weight: 800;
        }
        .pos { color: var(--gr) !important; }
        .neg { color: var(--rd) !important; }

        /* BUTTONS */
        button {
            padding: 8px 12px;
            background: var(--bl);
            color: #000;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 800;
            font-size: 9px;
            font-family: 'JetBrains Mono', monospace;
            transition: all 0.2s;
        }
        button:hover { opacity: 0.8; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-danger { background: var(--rd); }
        .btn-success { background: var(--gr); }
        .btn-warning { background: var(--warning); }

        /* INLINE BUTTONS */
        .inline-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            margin-bottom: 15px;
        }

        .inline-buttons button {
            width: 100%;
            padding: 10px 8px;
            font-size: 11px;
            border-radius: 6px;
        }

        /* NAVIGATION FOOTER */
        .nav-footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(10px);
            border-top: 1px solid var(--b1);
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            padding-bottom: calc(12px + env(safe-area-inset-bottom));
            z-index: 999;
        }

        .nav-btn {
            text-decoration: none;
            color: #666;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 50%;
            padding: 8px 0;
            transition: color 0.2s;
        }

        .nav-btn:hover {
            color: var(--bl);
        }

        .nav-btn.active {
            color: var(--bl);
            font-weight: 800;
        }

        .nav-label {
            font-size: 8px;
            margin-top: 4px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* PAT CONFIG */
        .pat-section {
            background: var(--b1);
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 12px;
        }
        .pat-label { font-size: 9px; color: #666; text-transform: uppercase; margin-bottom: 8px; }
        .pat-input {
            width: 100%;
            padding: 8px;
            background: #111;
            color: var(--tx);
            border: 1px solid var(--b1);
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
        }
        .pat-status {
            margin-top: 8px;
            font-size: 9px;
            color: var(--gr);
        }

        /* TOAST */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--gr);
            color: #000;
            padding: 10px 16px;
            border-radius: 4px;
            font-weight: 800;
            z-index: 2000;
            animation: slideUp 0.3s ease-out;
            display: none;
        }
        .toast.show { display: block; }
        @keyframes slideUp {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        /* SCROLLABLE TABLE CONTAINER */
        .table-container {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        /* LOG */
        .log-box {
            background: #111;
            border: 1px solid var(--b1);
            border-radius: 4px;
            padding: 10px;
            height: 400px;
            overflow-x: auto;
            overflow-y: auto;
            font-size: 9px;
            color: var(--gr);
            line-height: 1.4;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        /* INPUT FIELDS */
        input[type="number"], input[type="text"] {
            padding: 6px;
            background: #111;
            color: var(--tx);
            border: 1px solid var(--b1);
            border-radius: 2px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
        }
        input[type="number"]:focus, input[type="text"]:focus {
            outline: none;
            border-color: var(--bl);
        }

        /* SECTION HEADERS */
        .section-header {
            font-size: 12px;
            font-weight: 800;
            margin-bottom: 10px;
            color: var(--bl);
        }

        .section-header.success {
            color: var(--gr);
        }

        /* SECTION BOX */
        .section-box {
            margin: 15px 0;
            padding: 12px;
            background: var(--s1);
            border-radius: 8px;
            border: 1px solid var(--b1);
        }
    </style>
</head>
<body>

<header>
    <div class="header-title">📊 BHARAT MARKETS - ETL CENTER</div>
</header>

<div class="tabs">
    <button class="tab-btn active" onclick="switchTab('etl-pipeline')">⚙️ Data Stats</button>
    <button class="tab-btn" onclick="switchTab('symbols')">📋 Stock List</button>
</div>

<div class="content">
    <!-- TAB 1: COMBINED ETL PIPELINE -->
    <div id="etl-pipeline" class="tab-content active">
        
        <!-- ACTION BUTTONS -->
        <div class="inline-buttons">
            <button onclick="loadAllData()" style="background:linear-gradient(135deg, #00ff88 0%, #00dd66 100%); color:#000; padding:6px 4px;"><span style="font-size:12px;">🚀</span>Load JSON</button>
            <button onclick="reloadAuto()" style="background:linear-gradient(135deg, #00f2ff 0%, #00ccff 100%); color:#000; padding:6px 4px;"><span style="font-size:12px;">🔄</span>Refresh</button>
            <div style="background:linear-gradient(135deg, #6366f1 0%, #4f46e5 100%); color:#fff; padding:8px 12px; border-radius:4px; font-weight:800; display:flex; align-items:center; gap:8px;">
                <span style="font-size:10px;">DB:</span>
                <span style="font-size:14px; font-weight:800;" id="dbCountBox">0</span>
            </div>
        </div>

        <!-- SECTION 1: DATA SOURCES -->
        <div class="section-box">
            <div class="section-header">📊 Data Sources</div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Source</th>
                            <th>Count</th>
                            <th>Updated (IST)</th>
                            <th style="text-align:center;">Data Load</th>
                        </tr>
                    </thead>
                    <tbody id="sources-table">
                    </tbody>
                </table>
            </div>

        <!-- SECTION 2: LIVE LOG -->
        <div class="section-box">
            <div class="section-header">📋 Live Log</div>
            <div class="log-box" id="live-log">
                <div style="color:#666;">[Logs appear here]</div>
            </div>

        <!-- SECTION 3: PAT CONFIG -->
        <div class="section-box">

                <div class="pat-label">GitHub PAT Token</div>
                <input type="password" id="patToken" class="pat-input" placeholder="ghp_••••••••••••••••••••••••••••••••">
                <div style="display:flex; gap:8px; margin-top:8px;">
                    <button onclick="togglePatVisibility()" style="flex:1;">👁 Show</button>
                    <button onclick="savePat()" style="flex:1; background:#00ff88; color:#000; font-weight:bold;">💾 Save</button>
                    <button onclick="resetPat()" class="btn-danger" style="flex:1;">🔄 Reset</button>
                    <button onclick="testConnection()" style="flex:1; background:var(--warning);">🔗 Test</button>
                </div>

                    <div id="patStatus">❌ Not Configured</div>

    </div>

    <!-- TAB 2: SYMBOLS EDITOR -->
    <div id="symbols" class="tab-content">
        <div style="margin-bottom:10px;">
            <button onclick="toggleEditMode()">🔧 Edit Mode: OFF</button>
            <button onclick="downloadCSV()" style="background: var(--gr);">📊 Export CSV</button>
        </div>
        <div id="save-section" style="display:none; margin-bottom:12px;">
            <button onclick="saveChanges()" class="btn-success">💾 SAVE CHANGES</button>
            <button onclick="cancelChanges()">❌ Cancel</button>
        </div>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th class="sticky">TICKER</th>

                        <th>AVG</th>

                    </tr>
                </thead>
                <tbody id="symbols-table">

    <!-- TAB 3: PAT CONFIG -->
</div>

</footer>

<div class="toast" id="toast"></div>

<script>
    const DB_NAME = 'OnyxPortfolioDB';
    const DB_VERSION = 8;
    const STORE_NAME = 'Stocks';

    let masterData = [];
    let sourceCounts = {};
    let sourceData = {};
    let editMode = false;
    let logMessages = [];
    let dataUpdatedTimes = {};

    const GITHUB_CONFIG = {
        OWNER: 'murugkan',
        REPO: 'bharatmarkets',
        BRANCH: 'main',
        PATHS: {
            symbols: 'unified-symbols.json',
            prices: 'prices.json',
            fundamentals: 'fundamentals.json',
            guidance: 'guidance.json',
            macro: 'macro_data.json'
        }
    };
    
    const RAW_GITHUB_URL = `https://raw.githubusercontent.com/${GITHUB_CONFIG.OWNER}/${GITHUB_CONFIG.REPO}/${GITHUB_CONFIG.BRANCH}`;
    
    const DATA_SOURCES = [
        { name: 'unified-symbols.json', path: GITHUB_CONFIG.PATHS.symbols },
        { name: 'prices.json', path: GITHUB_CONFIG.PATHS.prices },
        { name: 'fundamentals.json', path: GITHUB_CONFIG.PATHS.fundamentals }
    ];

    async function fetchGitHubData(filePath) {
        try {
            // Add cache-busting to force fresh data from GitHub
            const url = `${RAW_GITHUB_URL}/${filePath}?v=${Date.now()}`;
            
            log(`📡 Fetching: ${filePath}`);
            const response = await fetch(url, {
                cache: 'no-store',
                headers: {
                    'Cache-Control': 'no-cache, no-store, must-revalidate',
                    'Pragma': 'no-cache'
                }
            });
            
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }
            
            const data = await response.json();
            
            if (data && data.updated) {
                dataUpdatedTimes[filePath] = data.updated;
                log(`✅ Fetched ${filePath} - Data updated: ${data.updated}`);
            } else if (data && data.lastLoadedAt) {
                dataUpdatedTimes[filePath] = data.lastLoadedAt;
                log(`✅ Fetched ${filePath} - Last loaded: ${data.lastLoadedAt}`);
            } else {
                dataUpdatedTimes[filePath] = '—';
                log(`✅ Fetched ${filePath} - No timestamp in metadata`);
            }
            
            // Save to localStorage
            localStorage.setItem('dataUpdatedTimes', JSON.stringify(dataUpdatedTimes));
            
            return data;
        } catch (e) {
            log(`❌ GitHub fetch failed: ${filePath}`);
            dataUpdatedTimes[filePath] = '❌ Error';
            localStorage.setItem('dataUpdatedTimes', JSON.stringify(dataUpdatedTimes));
            return null;
        }
    }

    async function initializeFromGitHub() {
        log('🚀 Initializing from GitHub...');
        const symbolsData = await fetchGitHubData(DATA_SOURCES[0].path);
        
        if (!symbolsData) return Promise.resolve();
        
        let stocks = null;
        if (Array.isArray(symbolsData)) {
            stocks = symbolsData;
        } else if (symbolsData.symbols && Array.isArray(symbolsData.symbols)) {
            stocks = symbolsData.symbols;
        } else if (typeof symbolsData === 'object') {
            stocks = Object.values(symbolsData);
        }
        
        if (!stocks || stocks.length === 0) return Promise.resolve();
        
        masterData = stocks;
        
        return new Promise((resolve) => {
            var req = indexedDB.open(DB_NAME, DB_VERSION);
            
            req.onupgradeneeded = (e) => {
                var db = e.target.result;
                if (!db.objectStoreNames.contains(STORE_NAME)) {
                    db.createObjectStore(STORE_NAME, { keyPath: 'ticker' });
                }
            };
            
            req.onsuccess = (e) => {
                var db = e.target.result;
                try {
                    var transaction = db.transaction(STORE_NAME, 'readwrite');
                    var store = transaction.objectStore(STORE_NAME);
                    store.clear();
                    masterData.forEach(stock => store.put(stock));
                    transaction.oncomplete = () => resolve();
                    transaction.onerror = () => resolve();
                } catch (err) {
                    resolve();
                }
            };
            
            req.onerror = () => resolve();
        });
    }

    async function init() {
        try {
            log('🚀 ETL Center starting...');
            document.getElementById('status').textContent = '⏳ Loading...';
            
            // Load PAT from storage
            log('📍 Loading PAT...');
            loadPatFromStorage();
            
            // Load updated times from storage
            log('📍 Loading updated times...');
            const savedTimes = localStorage.getItem('dataUpdatedTimes');
            if (savedTimes) {
                dataUpdatedTimes = JSON.parse(savedTimes);
            }
            
            // Load source counts from storage
            log('📍 Loading source counts...');
            const savedCounts = localStorage.getItem('sourceCounts');
            if (savedCounts) {
                sourceCounts = JSON.parse(savedCounts);
                log(`📊 Loaded source counts: ${JSON.stringify(sourceCounts)}`);
            }
            
            log('📍 Loading from IndexedDB...');
            // Load from IndexedDB only - don't clear!
            await loadFromIndexedDB();
            
            if (masterData.length > 0) {
                log(`📊 Loaded: ${masterData.length} records from IndexedDB`);
                document.getElementById('status').textContent = '✅ Ready';
            } else {
                log('⚠️ No data. Click 🚀 LOAD ALL to fetch from GitHub');
                document.getElementById('status').textContent = '⚠️ Click LOAD ALL';
            }
            
            log('📍 Rendering tables...');
            renderDataSources();
            log('✅ Data sources rendered');
            
            renderSymbols();
            log('✅ Symbols rendered');
            
            updateHeader();
            log('✅ Init complete');
        } catch (e) {
            log(`❌ Init error: ${e.message}`);
            console.error('Init exception:', e);
            document.getElementById('status').textContent = '⚠️ Error';
        }
    }

    function switchTab(tabName) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(tabName).classList.add('active');
        event.target.classList.add('active');
        
        // Log tab switch
        var tabLabel = event.target.textContent.trim();
        log(`📑 Switched to: ${tabLabel}`);
    }

    function log(msg) {
        var ts = new Date().toLocaleTimeString();
        logMessages.push(`[${ts}] ${msg}`);
        var logBox = document.getElementById('live-log');
        if (logBox) {
            logBox.textContent = logMessages.slice(-30).join('\n');
            logBox.scrollTop = logBox.scrollHeight;
        }
        console.log(msg);
    }

    function showToast(msg) {
        var el = document.getElementById('toast');
        el.textContent = msg;
        el.classList.add('show');
        setTimeout(() => el.classList.remove('show'), 2000);
    }

    function renderDataSources() {
        var html = '';
        
        // If no data sources, show placeholder rows
        if (!DATA_SOURCES || DATA_SOURCES.length === 0) {
            html = `<tr><td colspan="4" style="text-align:center; color:#666;">No data sources configured</td></tr>`;
            document.getElementById('sources-table').innerHTML = html;
            return;
        }
        
        DATA_SOURCES.forEach((s, index) => {
            // Get count from sourceCounts object using the file name
            var count = sourceCounts[s.name] || '—';
            var jsonTime = dataUpdatedTimes[s.path] || '—';
            
            // Convert ISO to IST (UTC+5:30)
            var istTime = '—';
            if (jsonTime && jsonTime !== '—' && !jsonTime.includes('❌')) {
                try {
                    var date = new Date(jsonTime);
                    istTime = date.toLocaleString('en-IN', { timeZone: 'Asia/Kolkata' });
                } catch(e) {
                    istTime = jsonTime;
                }
            }
            
            // First file (unified-symbols) opens wizard, others load data
            var loadButton = '';
            if (index === 0) {
                loadButton = `<button onclick="openWizard()" style="padding:4px 8px; font-size:8px; background:linear-gradient(135deg, #f59e0b 0%, #f87316 100%); color:#000; font-weight:800;">🧙 Wizard</button>`;
            } else {
                loadButton = `<button onclick="dataLoad('${s.name}')" style="padding:4px 8px; font-size:8px;">⬇️</button>`;
            }
            
            html += `<tr>
                <td>${s.name}</td>
                <td>${count}</td>
                <td style="font-size:9px;">${istTime}</td>
                <td style="text-align:center;">${loadButton}</td>
            </tr>`;
        });
        
        if (html === '') {
            html = `<tr><td colspan="4" style="text-align:center; color:#666;">—</td></tr>`;
        }
        
        document.getElementById('sources-table').innerHTML = html;
        log('📊 Data sources table rendered');
    }

    function dataLoad(source) {
        var pat = document.getElementById('patToken').value;
        if (!pat) {
            log('❌ PAT required');
            showToast('❌ Set PAT token first');
            return;
        }
        
        let fetchType = source === 'prices.json' ? 'prices_only' : 'fundamentals_only';
        log(`🚀 Triggering: ${source}`);
        showToast('⏳ Running workflow...');
        
        triggerWorkflow(pat, fetchType, source);
    }

    function triggerWorkflow(pat, fetchType, source) {
        const url = `https://api.github.com/repos/${GITHUB_CONFIG.OWNER}/${GITHUB_CONFIG.REPO}/actions/workflows/fetch-prices.yml/dispatches`;
        
        fetch(url, {
            method: 'POST',
            headers: {
                'Authorization': `token ${pat}`,
                'Accept': 'application/vnd.github.v3+json'
            },
            body: JSON.stringify({
                ref: GITHUB_CONFIG.BRANCH,
                inputs: { fetch_type: fetchType }
            })
        })
        .then(r => {
            if (r.ok) {
                log(`✅ Workflow started`);
                showToast('⏳ Wait 30 sec...');
                setTimeout(() => fetchUpdated(source), 30000);
            } else {
                return r.json().then(e => {
                    log(`❌ Trigger failed`);
                    showToast('❌ Failed');
                });
            }
        })
        .catch(e => {
            log(`❌ Error`);
            showToast('❌ Error');
        });
    }

    function fetchUpdated(source) {
        log(`📥 Fetching ${source}...`);
        fetch(`${source}?cache=${Date.now()}`, {
            cache: 'no-store'
        })
            .then(r => r.json())
            .then(data => {
                if (data) {
                    log(`✅ ${source} updated!`);
                    showToast('✅ Reloading...');
                    setTimeout(() => location.reload(), 500);
                } else {
                    log(`❌ Fetch failed`);
                    showToast('❌ Failed');
                }
            })
            .catch(e => {
                log(`❌ Error`);
                showToast('❌ Error');
            });
    }

    function refreshDB(source) {
        // ⚠️ NOTE: Both 'Load' (⬇️) and 'Refresh' (🔄) buttons do the same thing
        // They both trigger the GitHub workflow to fetch updated data
        dataLoad(source);
    }
    
    function mergeAndSaveData(source, data) {
        let priceMap = {}, fundMap = {};
        
        if (source === 'prices.json') {
            priceMap = data.quotes && typeof data.quotes === 'object' ? data.quotes : data;
            masterData.forEach((stock, i) => {
                if (priceMap[stock.ticker]) {
                    masterData[i] = {...masterData[i], ...priceMap[stock.ticker]};
                }
            });
            log(`✅ Merged prices into ${masterData.length} stocks`);
        } else if (source === 'fundamentals.json') {
            fundMap = data.stocks && typeof data.stocks === 'object' ? data.stocks : data;
            masterData.forEach((stock, i) => {
                if (fundMap[stock.ticker]) {
                    masterData[i] = {...masterData[i], ...fundMap[stock.ticker]};
                }
            });
            log(`✅ Merged fundamentals into ${masterData.length} stocks`);
        }
        
        // Save to IndexedDB
        var req = indexedDB.open(DB_NAME, DB_VERSION);
        req.onsuccess = (e) => {
            var db = e.target.result;
            var transaction = db.transaction(STORE_NAME, 'readwrite');
            var store = transaction.objectStore(STORE_NAME);
            store.clear();
            masterData.forEach(stock => store.put(stock));
            transaction.oncomplete = () => {
                log(`✅ Saved to IndexedDB`);
                renderSymbols();
                renderDataSources();
                showToast(`✅ ${source} merged & saved!`);
            };
        };
    }

    async function loadFromIndexedDB() {
        return new Promise((resolve) => {
            var req = indexedDB.open(DB_NAME, DB_VERSION);
            
            req.onerror = () => {
                masterData = [];
                resolve();
            };
            
            req.onupgradeneeded = (e) => {
                var db = e.target.result;
                if (!db.objectStoreNames.contains(STORE_NAME)) {
                    db.createObjectStore(STORE_NAME, { keyPath: 'ticker' });
                }
            };
            
            req.onsuccess = (e) => {
                var db = e.target.result;
                try {
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        masterData = [];
                        resolve();
                        return;
                    }
                    
                    var transaction = db.transaction(STORE_NAME, 'readonly');
                    var store = transaction.objectStore(STORE_NAME);
                    var getAllReq = store.getAll();

                    getAllReq.onsuccess = () => {
                        masterData = getAllReq.result || [];
                        resolve();
                    };
                    
                    getAllReq.onerror = () => {
                        masterData = [];
                        resolve();
                    };
                } catch (e) {
                    masterData = [];
                    resolve();
                }
            };
        });
    }

    function renderSymbols() {
        log('📋 Rendering stock list...');
        var html = '';
        
        if (!masterData || masterData.length === 0) {
            html = '<tr><td colspan="7" style="text-align:center; color:#666; padding:40px;">📭 No data loaded. Click "🚀 LOAD ALL" to populate symbols.</td></tr>';
        } else {
            masterData.slice(0, 50).forEach(stock => {
                var ticker = stock.ticker || '—';
                var qty = stock.qty || 0;
                var avg = stock.avg || 0;
                var updated = stock.updated || '—';

                html += `<tr id="row-${ticker}">
                    <td class="sticky">${ticker}</td>
                    <td><input type="number" value="${qty}" class="qty-input" data-ticker="${ticker}" ${editMode ? '' : 'disabled'}></td>
                    <td><input type="number" value="${avg}" class="avg-input" data-ticker="${ticker}" step="0.01" ${editMode ? '' : 'disabled'}></td>
                    <td style="font-size:9px; color:var(--gr);">${updated}</td>
                    <td>—</td>
                    <td style="text-align:center;"><button onclick="deleteStock('${ticker}')" class="btn-danger" style="padding:4px 6px; font-size:8px;">🗑️</button></td>
                </tr>`;
            });
        }

        document.getElementById('symbols-table').innerHTML = html;
        
        // Update DB count box
        var dbCountBox = document.getElementById('dbCountBox');
        if (dbCountBox) {
            dbCountBox.textContent = masterData.length || 0;
        }
        
        log(`✅ Stock list displayed: ${masterData.length} records`);
    }

    function toggleEditMode() {
        editMode = !editMode;
        document.querySelectorAll('.qty-input, .avg-input').forEach(el => {
            el.disabled = !editMode;
        });
        event.target.textContent = `🔧 Edit Mode: ${editMode ? 'ON' : 'OFF'}`;
        if (editMode) {
            document.getElementById('save-section').style.display = 'block';
            log('✏️ Edit mode ON');
        } else {
            document.getElementById('save-section').style.display = 'none';
            log('🔒 Edit mode OFF');
        }
    }

    function deleteStock(ticker) {
        if (!confirm(`Delete ${ticker} permanently?`)) return;
        
        var pat = document.getElementById('patToken').value;
        if (!pat) {
            log('❌ PAT required to delete');
            showToast('❌ Configure PAT first');
            return;
        }
        
        log(`🗑️ Deleting ${ticker}...`);
        showToast(`Deleting ${ticker}...`);
        
        // Remove from display immediately
        var row = document.getElementById(`row-${ticker}`);
        if (row) row.remove();
        
        // Remove from masterData
        masterData = masterData.filter(s => s.ticker !== ticker);
        
        // Fetch current unified-symbols.json
        fetch('unified-symbols.json?cache=' + Date.now())
            .then(r => r.json())
            .then(data => {
                // Remove ticker from symbols array
                let symbols = data.symbols || Object.values(data);
                symbols = symbols.filter(s => s.ticker !== ticker);
                
                // Prepare upload data
                const uploadData = data.symbols ? { symbols: symbols } : symbols;
                
                // Upload back to GitHub
                uploadToGitHub(pat, 'unified-symbols.json', uploadData, `Delete ${ticker}`);
            })
            .catch(e => {
                log(`❌ Error: ${e.message}`);
                showToast('❌ Failed to delete');
            });
    }
    
    function uploadToGitHub(pat, filename, content, message) {
        const apiUrl = `https://api.github.com/repos/${GITHUB_CONFIG.OWNER}/${GITHUB_CONFIG.REPO}/contents/${filename}`;
        
        // Step 1: GET current file to get SHA
        fetch(apiUrl, {
            headers: { 'Authorization': `token ${pat}` }
        })
        .then(r => r.json())
        .then(fileData => {
            // Step 2: PUT updated content with SHA
            const encodedContent = btoa(JSON.stringify(content, null, 2));
            
            return fetch(apiUrl, {
                method: 'PUT',
                headers: {
                    'Authorization': `token ${pat}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    message: message,
                    content: encodedContent,
                    sha: fileData.sha,
                    branch: GITHUB_CONFIG.BRANCH
                })
            });
        })
        .then(r => {
            if (r.ok) {
                log(`✅ Deleted from GitHub`);
                showToast('✅ Deleted!');
            } else {
                return r.json().then(e => {
                    log(`❌ Upload failed: ${e.message}`);
                    showToast('❌ Failed');
                });
            }
        })
        .catch(e => {
            log(`❌ Error: ${e.message}`);
            showToast('❌ Error');
        });
    }

    function saveChanges() {
        var pat = document.getElementById('patToken').value;
        if (!pat) {
            showToast('❌ PAT required to save');
            return;
        }
        
        log('💾 Saving changes...');
        
        // Get all edited values
        document.querySelectorAll('.qty-input').forEach(input => {
            var ticker = input.dataset.ticker;
            var newQty = parseFloat(input.value) || 0;
            var stock = masterData.find(s => s.ticker === ticker);
            if (stock) stock.qty = newQty;
        });
        
        document.querySelectorAll('.avg-input').forEach(input => {
            var ticker = input.dataset.ticker;
            var newAvg = parseFloat(input.value) || 0;
            var stock = masterData.find(s => s.ticker === ticker);
            if (stock) stock.avg = newAvg;
        });
        
        // Upload to GitHub
        uploadUnifiedSymbols(pat);
        
        // Save to IndexedDB
        var req = indexedDB.open(DB_NAME, DB_VERSION);
        req.onsuccess = (e) => {
            var db = e.target.result;
            var transaction = db.transaction(STORE_NAME, 'readwrite');
            var store = transaction.objectStore(STORE_NAME);
            
            // Add updated timestamp to all stocks
            const now = new Date().toLocaleTimeString();
            masterData.forEach(stock => {
                stock.updated = now;
                store.put(stock);
            });
            
            transaction.oncomplete = () => {
                log('✅ Changes saved to IndexedDB');
                editMode = false;
                document.querySelectorAll('.qty-input, .avg-input').forEach(el => el.disabled = true);
                document.getElementById('save-section').style.display = 'none';
                document.querySelector('button[onclick="toggleEditMode()"]').textContent = '🔧 Edit Mode: OFF';
                updateHeader();
                renderSymbols();
                showToast('✅ Saved!');
            };
        };
    }
    
    function uploadUnifiedSymbols(pat) {
        const url = `https://api.github.com/repos/${GITHUB_CONFIG.OWNER}/${GITHUB_CONFIG.REPO}/contents/unified-symbols.json`;
        
        // Fetch current file first
        fetch(`${RAW_GITHUB_URL}/unified-symbols.json?v=${Date.now()}`, {
            cache: 'no-store'
        })
            .then(r => r.json())
            .then(currentData => {
                let symbols = currentData.symbols || [];
                
                // Update only changed stocks in the array
                symbols = symbols.map(stock => {
                    const updated = masterData.find(m => m.ticker === stock.ticker);
                    if (updated) {
                        // Only update QTY and AVG, keep other fields
                        return {
                            ...stock,
                            qty: updated.qty,
                            avg: updated.avg
                        };
                    }
                    return stock;
                });
                
                // Get SHA and upload
                fetch(url, {
                    headers: { 'Authorization': `token ${pat}` }
                })
                .then(r => r.json())
                .then(fileInfo => {
                    const fileContent = JSON.stringify({ symbols }, null, 2);
                    const encodedContent = btoa(fileContent);
                    
                    return fetch(url, {
                        method: 'PUT',
                        headers: {
                            'Authorization': `token ${pat}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            message: 'Update QTY/AVG via ETL Center',
                            content: encodedContent,
                            sha: fileInfo.sha
                        })
                    });
                })
                .then(r => {
                    if (r.ok) {
                        log('✅ Updated unified-symbols.json on GitHub');
                    } else {
                        log('❌ Upload failed');
                    }
                })
                .catch(e => {
                    log(`❌ Upload error: ${e.message}`);
                });
            })
            .catch(e => {
                log(`❌ Error: ${e.message}`);
            });
    }

    function cancelChanges() {
        editMode = false;
        document.querySelectorAll('.qty-input, .avg-input').forEach(el => el.disabled = true);
        document.getElementById('save-section').style.display = 'none';
        renderSymbols();
    }

    function downloadCSV() {
        var csv = 'TICKER,QTY,AVG\n';
        masterData.forEach(s => {
            csv += `${s.ticker},${s.qty},${s.avg}\n`;
        });
        var link = document.createElement('a');
        link.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
        link.download = 'symbols.csv';
        link.click();
        log(`📥 CSV exported: ${masterData.length} rows`);
        showToast('📊 CSV downloaded!');
    }


    function openWizard() {
        var pat = document.getElementById('patToken').value;
        if (!pat) {
            showToast('❌ PAT token required');
            switchTab('pat');
            return;
        }
        
        log('🧙 Opening symbol wizard...');
        
        // Load app-import.js if not already loaded
        if (!window.appImportLoaded) {
            var script = document.createElement('script');
            script.src = 'app-import.js';
            script.onload = () => {
                window.appImportLoaded = true;
                triggerWizard(pat);
            };
            script.onerror = () => {
                showToast('❌ Failed to load wizard');
                log('❌ Could not load app-import.js');
            };
            document.head.appendChild(script);
        } else {
            triggerWizard(pat);
        }
    }
    
    function triggerWizard(pat) {
        // Call app-import.js workflow
        if (typeof window.openImportWorkflow === 'function') {
            window.openImportWorkflow();
            log('✅ Import workflow opened');
        } else {
            showToast('❌ Workflow not found');
        }
    }

    function togglePatVisibility() {
        var input = document.getElementById('patToken');
        input.type = input.type === 'password' ? 'text' : 'password';
        event.target.textContent = input.type === 'password' ? '👁 Show' : '👁 Hide';
    }

    function savePat() {
        var pat = document.getElementById('patToken').value;
        if (!pat) {
            showToast('❌ Enter PAT token first');
            return;
        }
        localStorage.setItem('github_pat', pat);
        log('✅ PAT saved to localStorage');
        showToast('✅ PAT saved!');
        testConnection();
    }
    
    function loadPatFromStorage() {
        var pat = localStorage.getItem('github_pat');
        if (pat) {
            document.getElementById('patToken').value = pat;
            log('✅ PAT loaded from storage');
            testConnection();
        }
    }
    
    function resetPat() {
        if (confirm('Reset PAT token?')) {
            document.getElementById('patToken').value = '';
            localStorage.removeItem('github_pat');
            document.getElementById('patStatus').textContent = '❌ Not Configured';
            document.getElementById('patRepo').textContent = '—';
            showToast('🔄 PAT reset');
            log('🔄 PAT cleared');
        }
    }

    function testConnection() {
        var pat = document.getElementById('patToken').value;
        if (!pat) {
            showToast('❌ PAT token required');
            return;
        }
        log('🔗 Testing GitHub connection...');
        setTimeout(() => {
            document.getElementById('patStatus').textContent = '✅ Configured';
            document.getElementById('patRepo').textContent = 'murugkan/bharatmarkets';
            log('✅ Connected to GitHub');
            showToast('✅ Connected!');
        }, 1000);
    }

    async function loadAllData() {
        try {
            log('🚀 Fetching JSON files...');
            showToast('Loading data...');
            
            // Fetch only 3 core data sources
            const results = await Promise.all(
                DATA_SOURCES.map(source => fetchGitHubData(source.path))
            );
            
            log('✅ Files fetched');
            
            let symbolsData = results[0];
            let symbolsList = null;
            
            if (Array.isArray(symbolsData)) {
                symbolsList = symbolsData;
            } else if (symbolsData && symbolsData.symbols && Array.isArray(symbolsData.symbols)) {
                symbolsList = symbolsData.symbols;
            } else if (symbolsData && symbolsData.stocks && Array.isArray(symbolsData.stocks)) {
                symbolsList = symbolsData.stocks;
            } else if (symbolsData && typeof symbolsData === 'object') {
                symbolsList = Object.values(symbolsData);
            }
            
            if (!symbolsList || symbolsList.length === 0) {
                log('❌ Parse error');
                showToast('❌ Load failed');
                renderDataSources();
                renderSymbols();
                return;
            }
        
        const pricesData = results[1] || {};
        const fundamentalsData = results[2] || {};
        
        log('📦 Merging data...');
        
        let priceMap = {};
        if (pricesData.quotes && typeof pricesData.quotes === 'object' && !Array.isArray(pricesData.quotes)) {
            priceMap = pricesData.quotes;
            log('✅ Prices fetched');
        } else {
            priceMap = Object.keys(pricesData).some(k => k === k.toUpperCase()) ? pricesData : {};
        }
        
        let fundMap = {};
        if (fundamentalsData.stocks && typeof fundamentalsData.stocks === 'object' && !Array.isArray(fundamentalsData.stocks)) {
            fundMap = fundamentalsData.stocks;
            log('✅ Fundamentals fetched');
        } else {
            fundMap = Object.keys(fundamentalsData).some(k => k === k.toUpperCase()) ? fundamentalsData : {};
        }
        
        // Track per-file counts
        sourceCounts = {
            'unified-symbols.json': symbolsList ? symbolsList.length : 0,
            'prices.json': Object.keys(priceMap).length,
            'fundamentals.json': Object.keys(fundMap).length
        };
        log(`📊 Symbols: ${sourceCounts['unified-symbols.json']}, Prices: ${sourceCounts['prices.json']}, Fundamentals: ${sourceCounts['fundamentals.json']}`);
        
        let mergedStocks = [];
        symbolsList.forEach(symbol => {
            const ticker = symbol.ticker || symbol.TICKER || symbol.name;
            if (!ticker) return;
            
            const merged = {
                ...symbol,
                ...(priceMap[ticker] || {}),
                ...(fundMap[ticker] || {}),
                ticker: ticker
            };
            
            mergedStocks.push(merged);
        });
        
        log(`✅ Merged: ${mergedStocks.length} stocks`);
        
        // DEBUG: Show first 3 stocks to verify data freshness
        if (mergedStocks.length > 0) {
            const sampleTickers = mergedStocks.slice(0, 3).map(s => s.ticker).join(', ');
            log(`📊 Sample tickers (first 3): ${sampleTickers}`);
        }
        
        // Save sourceCounts to localStorage for persistence
        localStorage.setItem('sourceCounts', JSON.stringify(sourceCounts));
        log(`💾 Source counts saved to localStorage`);
        
        // UPDATE UI IMMEDIATELY - don't wait for DB
        masterData = mergedStocks;
        const now = new Date().toLocaleTimeString();
        masterData.forEach(stock => {
            stock.updated = now;
        });
        
        renderSymbols();
        renderDataSources();
        showToast('✅ Data loaded!');
        log(`✅ UI updated: ${mergedStocks.length} stocks`);
        
        // Save to DB in BACKGROUND - non-blocking
        saveToIndexedDB(mergedStocks, now);
        
        } catch (error) {
            log(`❌ Error: ${error.message}`);
            showToast('❌ Error');
            // Show tables even on error
            renderDataSources();
            renderSymbols();
        }
    }
    
    function saveToIndexedDB(stocks, timestamp) {
        var req = indexedDB.open(DB_NAME, DB_VERSION);
        req.onsuccess = (e) => {
            var db = e.target.result;
            try {
                var transaction = db.transaction(STORE_NAME, 'readwrite');
                var store = transaction.objectStore(STORE_NAME);
                store.clear();
                
                stocks.forEach(stock => {
                    store.put(stock);
                });
                
                transaction.oncomplete = () => {
                    log(`💾 DB saved: ${stocks.length} stocks`);
                };
                
                transaction.onerror = () => {
                    log(`⚠️ DB error`);
                };
            } catch (err) {
                log(`⚠️ Error: ${err.message}`);
            }
        };
        
        req.onerror = () => {
            log(`⚠️ DB unavailable`);
        };
    }

    async function reloadAuto() {
        log('🔄 Full reset...');
        showToast('Clearing & reloading...');
        
        // Clear browser caches
        sessionStorage.clear();
        localStorage.clear();
        log('✅ Caches cleared');
        
        // Clear IndexedDB
        await new Promise(resolve => {
            var req = indexedDB.deleteDatabase(DB_NAME);
            req.onsuccess = resolve;
        });
        log('✅ DB cleared');
        
        // Re-initialize
        await initializeFromGitHub();
        await loadFromIndexedDB();
        updateHeader();
        renderSymbols();
        renderDataSources();
        showToast('✅ Ready!');
        log('✅ Reset complete');
    }

    function clearDB() {
        if (confirm('Clear entire database?')) {
            var req = indexedDB.deleteDatabase(DB_NAME);
            req.onsuccess = () => {
                masterData = [];
                log('🗑️ Database cleared');
                updateHeader();
                renderSymbols();
                showToast('✅ Database cleared!');
            };
        }
    }

    function updateHeader() {
        // Metrics div removed - this function is no longer needed
    }
    
    function updateStatus(text) {
        // Status element was in removed metrics div - safely skip if not found
        var statusEl = document.getElementById('status');
        if (statusEl) {
            statusEl.textContent = text;
        }
    }

    // Initialize on page load with error handling
    console.log('Script loaded, calling init()...');
    log('📍 Page initialized');
    try {
        init();
    } catch (err) {
        console.error('Init error:', err);
        log('❌ Init failed: ' + err.message);
    }
