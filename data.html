<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
    <title>Bharat Markets - ETL Center</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000;
            --s1: #0a0a0a;
            --b1: #222;
            --bl: #00f2ff;
            --gr: #00ff88;
            --rd: #ff4d6d;
            --tx: #fff;
            --warning: #f59e0b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg);
            color: var(--tx);
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            overflow: hidden;
            -webkit-text-size-adjust: 100%;
            padding-bottom: 80px;
        }

        /* HEADER */
        header {
            background: var(--s1);
            border-bottom: 1px solid var(--b1);
            padding: 12px;
        }
        .header-title { font-size: 14px; font-weight: 800; margin-bottom: 10px; color: var(--bl); }
        .metrics {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 8px;
        }
        .metric-box {
            background: var(--b1);
            padding: 8px;
            border-radius: 4px;
            text-align: center;
        }
        .metric-label { font-size: 8px; color: #666; text-transform: uppercase; }
        .metric-val { font-size: 12px; font-weight: 800; color: var(--bl); margin-top: 4px; }

        /* TAB BUTTONS */
        .tabs {
            display: flex;
            gap: 0;
            background: var(--s1);
            border-bottom: 2px solid var(--b1);
            overflow-x: auto;
            padding: 0;
            -webkit-overflow-scrolling: touch;
        }
        .tab-btn {
            flex: 1;
            min-width: 80px;
            padding: 10px;
            background: var(--s1);
            color: #666;
            border: none;
            border-bottom: 3px solid transparent;
            cursor: pointer;
            font-size: 9px;
            font-weight: 800;
            text-transform: uppercase;
            white-space: nowrap;
            transition: all 0.2s;
        }
        .tab-btn.active {
            color: var(--bl);
            border-bottom-color: var(--bl);
            background: #111;
        }

        /* CONTENT AREA */
        .content {
            height: calc(100vh - 180px);
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 12px;
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* TABLES */
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 10px;
        }
        th {
            background: var(--s1);
            color: #666;
            padding: 8px;
            position: sticky;
            top: 0;
            z-index: 10;
            border-bottom: 2px solid var(--b1);
            text-align: left;
            font-weight: 800;
        }
        th.active { color: var(--bl); }
        td {
            padding: 6px 8px;
            border-bottom: 1px solid #111;
        }
        td.sticky {
            position: sticky;
            left: 0;
            background: #0a0a0a;
            z-index: 5;
            border-right: 1px solid var(--b1);
            color: var(--bl);
            font-weight: 800;
        }
        .pos { color: var(--gr) !important; }
        .neg { color: var(--rd) !important; }

        /* BUTTONS */
        button {
            padding: 8px 12px;
            background: var(--bl);
            color: #000;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 800;
            font-size: 9px;
            font-family: 'JetBrains Mono', monospace;
            transition: all 0.2s;
        }
        button:hover { opacity: 0.8; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-danger { background: var(--rd); }
        .btn-success { background: var(--gr); }
        .btn-warning { background: var(--warning); }

        /* INLINE BUTTONS */
        .inline-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            margin-bottom: 15px;
        }

        .inline-buttons button {
            width: 100%;
            padding: 10px 8px;
            font-size: 11px;
            border-radius: 6px;
        }

        /* NAVIGATION FOOTER */
        .nav-footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(10px);
            border-top: 1px solid var(--b1);
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            padding-bottom: calc(12px + env(safe-area-inset-bottom));
            z-index: 999;
        }

        .nav-btn {
            text-decoration: none;
            color: #666;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 50%;
            padding: 8px 0;
            transition: color 0.2s;
        }

        .nav-btn:hover {
            color: var(--bl);
        }

        .nav-btn.active {
            color: var(--bl);
            font-weight: 800;
        }

        .nav-label {
            font-size: 8px;
            margin-top: 4px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* PAT CONFIG */
        .pat-section {
            background: var(--b1);
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 12px;
        }
        .pat-label { font-size: 9px; color: #666; text-transform: uppercase; margin-bottom: 8px; }
        .pat-input {
            width: 100%;
            padding: 8px;
            background: #111;
            color: var(--tx);
            border: 1px solid var(--b1);
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
        }
        .pat-status {
            margin-top: 8px;
            font-size: 9px;
            color: var(--gr);
        }

        /* TOAST */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--gr);
            color: #000;
            padding: 10px 16px;
            border-radius: 4px;
            font-weight: 800;
            z-index: 2000;
            animation: slideUp 0.3s ease-out;
            display: none;
        }
        .toast.show { display: block; }
        @keyframes slideUp {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        /* SCROLLABLE TABLE CONTAINER */
        .table-container {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        /* LOG */
        .log-box {
            background: #111;
            border: 1px solid var(--b1);
            border-radius: 4px;
            padding: 10px;
            max-height: 200px;
            overflow-y: auto;
            font-size: 9px;
            color: var(--gr);
            line-height: 1.4;
        }

        /* INPUT FIELDS */
        input[type="number"], input[type="text"] {
            padding: 6px;
            background: #111;
            color: var(--tx);
            border: 1px solid var(--b1);
            border-radius: 2px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
        }
        input[type="number"]:focus, input[type="text"]:focus {
            outline: none;
            border-color: var(--bl);
        }

        /* SECTION HEADERS */
        .section-header {
            font-size: 12px;
            font-weight: 800;
            margin-bottom: 10px;
            color: var(--bl);
        }

        .section-header.success {
            color: var(--gr);
        }

        /* SECTION BOX */
        .section-box {
            margin: 15px 0;
            padding: 12px;
            background: var(--s1);
            border-radius: 8px;
            border: 1px solid var(--b1);
        }
    </style>
</head>
<body>

<header>
    <div class="header-title">📊 BHARAT MARKETS - ETL CENTER</div>
</header>

<div class="tabs">
    <button class="tab-btn active" onclick="switchTab('etl-pipeline')">📊 Data status</button>
    <button class="tab-btn" onclick="switchTab('symbols')">📋 Stock list</button>
    <button class="tab-btn" onclick="switchTab('pat')">🔐 PAT</button>

<div class="content">
    <!-- TAB 1: COMBINED ETL PIPELINE -->
    <div id="etl-pipeline" class="tab-content active">
        
        <!-- ACTION BUTTONS -->
        <div class="inline-buttons">
            <button id="loadJsonBtn" onclick="loadAllData()" style="background:linear-gradient(135deg, #00ff88 0%, #00dd66 100%); color:#000; padding:6px 4px; transition: all 0.3s;"><span style="font-size:12px;">🚀</span>LOAD JSON<br><span id="statusBadge" style="font-size:9px; font-weight:normal;">✅ Ready</span></button>
            <button onclick="reloadAuto()" style="background:linear-gradient(135deg, #00f2ff 0%, #00ccff 100%); color:#000; padding:6px 4px; title='Complete DB & UI wipe & rebuild';"><span style="font-size:12px;">🔄</span>REFRESH</button>
            <div style="background:linear-gradient(135deg, #ff4d6d 0%, #ff1a4d 100%); color:#fff; padding:6px 4px; border-radius:4px; text-align:center; font-weight:800; font-size:11px;">db <span id="dbCountBox">0</span></div>
        </div>

        <!-- PROGRESS BAR -->
        <div id="progressContainer" style="display:none; padding:12px; background:#0a0a0a; border-bottom:1px solid #222;">

        <div class="table-container">

</div>

<div class="toast" id="toast"></div>

<script>
    const DB_NAME = 'OnyxPortfolioDB';
    const DB_VERSION = 8;
    const STORE_NAME = 'Stocks';

    let masterData = [];
    let sourceData = {};
    let guidanceData = {};
    let guidanceTimestamps = {};
    let editMode = false;
    let logMessages = [];
    let dataUpdatedTimes = {};

    const GITHUB_CONFIG = {
        OWNER: 'murugkan',
        REPO: 'bharatmarkets',
        BRANCH: 'main',
        PATHS: {
            symbols: 'unified-symbols.json',
            prices: 'prices.json',
            fundamentals: 'fundamentals.json',
            guidance: 'guidance.json',
            macro: 'macro_data.json'
        }
    };
    
    const RAW_GITHUB_URL = `https://raw.githubusercontent.com/${GITHUB_CONFIG.OWNER}/${GITHUB_CONFIG.REPO}/${GITHUB_CONFIG.BRANCH}`;
    
    const DATA_SOURCES = [
        { name: 'unified-symbols.json', path: GITHUB_CONFIG.PATHS.symbols },
        { name: 'prices.json', path: GITHUB_CONFIG.PATHS.prices },
        { name: 'fundamentals.json', path: GITHUB_CONFIG.PATHS.fundamentals },
        { name: 'guidance.json', path: GITHUB_CONFIG.PATHS.guidance }
    ];

    async function fetchGitHubData(filePath) {
        try {
            const url = `${RAW_GITHUB_URL}/${filePath}`;
            const fetchTime = new Date().toISOString();
            
            log(`📡 Fetching: ${filePath}`);
            
            // Add 30 second timeout
            const controller = new AbortController();
            const timeout = setTimeout(() => controller.abort(), 30000);
            
            try {
                const response = await fetch(url, { signal: controller.signal });
                clearTimeout(timeout);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const data = await response.json();
                
                // Priority 1: Check HTTP Last-Modified header (most reliable)
                const lastModified = response.headers.get('last-modified');
                if (lastModified) {
                    dataUpdatedTimes[filePath] = new Date(lastModified).toISOString();
                    log(`✅ Fetched ${filePath} - Last modified: ${lastModified}`);
                }
                // Priority 2: Check for _metadata.updated in data
                else if (data && data._metadata && data._metadata.updated) {
                    dataUpdatedTimes[filePath] = data._metadata.updated;
                    log(`✅ Fetched ${filePath} - Metadata updated: ${data._metadata.updated}`);
                }
                // Priority 3: Check for top-level updated field
                else if (data && data.updated) {
                    dataUpdatedTimes[filePath] = data.updated;
                    log(`✅ Fetched ${filePath} - Data updated: ${data.updated}`);
                }
                // Priority 4: Check for lastLoadedAt
                else if (data && data.lastLoadedAt) {
                    dataUpdatedTimes[filePath] = data.lastLoadedAt;
                    log(`✅ Fetched ${filePath} - Last loaded: ${data.lastLoadedAt}`);
                }
                // Fallback: Use fetch time
                else {
                    dataUpdatedTimes[filePath] = fetchTime;
                    log(`✅ Fetched ${filePath} - Using fetch time: ${fetchTime}`);
                }
            
                // Save to localStorage
                localStorage.setItem('dataUpdatedTimes', JSON.stringify(dataUpdatedTimes));
                
                return data;
                
            } catch (abortErr) {
                clearTimeout(timeout);
                if (abortErr.name === 'AbortError') {
                    log(`⏱️ Timeout fetching ${filePath} (30s)`);
                } else {
                    log(`❌ Network error: ${filePath}`);
                }
                return null;
            }
        } catch (e) {
            log(`❌ Error parsing ${filePath}: ${e.message}`);
            return null;
        }
    }

    async function initializeFromGitHub() {
        log('🚀 Initializing from GitHub...');
        const symbolsData = await fetchGitHubData(DATA_SOURCES[0].path);
        
        if (!symbolsData) return Promise.resolve();
        
        let stocks = null;
        if (Array.isArray(symbolsData)) {
            stocks = symbolsData;
        } else if (symbolsData.symbols && Array.isArray(symbolsData.symbols)) {
            stocks = symbolsData.symbols;
        } else if (typeof symbolsData === 'object') {
            stocks = Object.values(symbolsData);
        }
        
        if (!stocks || stocks.length === 0) return Promise.resolve();
        
        masterData = stocks;
        
        return new Promise((resolve) => {
            var req = indexedDB.open(DB_NAME, DB_VERSION);
            
            req.onupgradeneeded = (e) => {
                var db = e.target.result;
                if (!db.objectStoreNames.contains(STORE_NAME)) {
                    db.createObjectStore(STORE_NAME, { keyPath: 'ticker' });
                }
            };
            
            req.onsuccess = (e) => {
                var db = e.target.result;
                try {
                    var transaction = db.transaction(STORE_NAME, 'readwrite');
                    var store = transaction.objectStore(STORE_NAME);
                    store.clear();
                    masterData.forEach(stock => store.put(stock));
                    transaction.oncomplete = () => resolve();
                    transaction.onerror = () => resolve();
                } catch (err) {
                    resolve();
                }
            };
            
            req.onerror = () => resolve();
        });
    }

    async function init() {
        loadSavedLogs();  // Restore previous logs
        updateStatusButton('⏳ Loading...');
        log('🚀 ETL Center starting...');
        
        // Load PAT from storage
        loadPatFromStorage();
        
        // Load updated times from storage
        const savedTimes = localStorage.getItem('dataUpdatedTimes');
        if (savedTimes) {
            dataUpdatedTimes = JSON.parse(savedTimes);
        }
        
        try {
            // Load from IndexedDB only - don't clear!
            await loadFromIndexedDB();
            loadGuidanceFromStorage();
            
            if (masterData.length > 0) {
                log(`📊 Loaded: ${masterData.length} records from IndexedDB`);
                updateStatusButton('✅ Ready');
            } else {
                log('⚠️ No data. Click LOAD JSON to fetch from GitHub');
                updateStatusButton('⚠️ No Data');
            }
        } catch (e) {
            log(`⚠️ Error: ${e.message}`);
            updateStatusButton('⚠️ Error');
        }
        
        renderDataSources();
        renderSymbols();
        updateHeader();
    }

    function updateStatusButton(statusText) {
        const btn = document.getElementById('loadJsonBtn');
        const badge = document.getElementById('statusBadge');
        
        // Safe: Only update if elements exist (data.html page)
        if (btn && badge) {
            badge.textContent = statusText;
            
            // Update button styling based on status
            if (statusText.includes('Ready')) {
                btn.style.background = 'linear-gradient(135deg, #00ff88 0%, #00dd66 100%)';
                btn.style.color = '#000';
                btn.disabled = false;
            } else if (statusText.includes('Loading') || statusText.includes('Clearing')) {
                btn.style.background = 'linear-gradient(135deg, #f59e0b 0%, #f87316 100%)';
                btn.style.color = '#000';
                btn.disabled = true;
            } else if (statusText.includes('Error') || statusText.includes('Failed')) {
                btn.style.background = 'linear-gradient(135deg, #ff4d6d 0%, #ff1a4d 100%)';
                btn.style.color = '#fff';
                btn.disabled = false;
            } else {
                btn.style.background = 'linear-gradient(135deg, #00f2ff 0%, #00ccff 100%)';
                btn.style.color = '#000';
                btn.disabled = false;
            }
        }
        
        // Always log
        log(statusText);
    }
    
    function showProgress(show = true) {
        const container = document.getElementById('progressContainer');
        if (container) {
            container.style.display = show ? 'block' : 'none';
            // Reset progress bar
            if (show) {
                const progressBar = document.getElementById('progressBar');
                if (progressBar) progressBar.style.width = '0%';
            }
        }
    }
    
    function updateProgress(current, total, filename = '') {
        const progressBar = document.getElementById('progressBar');
        const progressText = document.getElementById('progressText');
        const fileLabel = document.getElementById('currentFileLabel');
        
        if (progressBar) {
            progressBar.style.width = (current / total * 100) + '%';
        }
        if (progressText) {
            progressText.textContent = `${current}/${total}`;
        }
        if (fileLabel && filename) {
            fileLabel.textContent = `📂 Loading: ${filename}`;
        }
    }
    
    function saveLogs() {
        try {
            localStorage.setItem('etl_logs', JSON.stringify(logMessages.slice(-100)));
        } catch(e) {
            console.warn('Storage full');
        }
    }
    
    function loadSavedLogs() {
        try {
            const saved = localStorage.getItem('etl_logs');
            if (saved && Array.isArray(JSON.parse(saved))) {
                logMessages = JSON.parse(saved);
            }
        } catch(e) {}
    }

    function switchTab(tabName) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(tabName).classList.add('active');
        event.target.classList.add('active');
        
        // Refresh data when switching tabs
        if (tabName === 'symbols') {
            renderSymbols();
        } else if (tabName === 'etl-pipeline') {
            renderDataSources();
        }
    }

    function log(msg) {
        var ts = new Date().toLocaleTimeString();
        logMessages.push(`[${ts}] ${msg}`);
        var logBox = document.getElementById('live-log');
        if (logBox) {
            logBox.textContent = logMessages.slice(-30).join('\n');
            logBox.scrollTop = logBox.scrollHeight;
        }
        saveLogs();
        console.log(msg);
    }

    function showToast(msg) {
        var el = document.getElementById('toast');
        el.textContent = msg;

    function renderDataSources() {

            var count = '⏳ Loading...';
            const fullUrl = `${RAW_GITHUB_URL}/${s.path}?cache=${Date.now()}`;
            fetch(fullUrl)
                .then(r => r.json())
                .then(data => {
                    if (data.count !== undefined) {
                        // For prices.json which has "count" field
                        count = data.count;
                    } else if (data.symbols && Array.isArray(data.symbols)) {
                        // For unified-symbols.json with symbols array
                        count = data.symbols.length;
                    } else if (data.stocks && typeof data.stocks === 'object' && !Array.isArray(data.stocks)) {
                        // For fundamentals.json with stocks object
                        count = Object.keys(data.stocks).length;
                    } else if (Array.isArray(data)) {
                        // If it's a direct array
                        count = data.length;
                    } else {
                        count = '—';
                    }
                    // Update the count in the table cell
                    var countCell = document.querySelector(`[data-source="${s.name}"] .count-cell`);
                    if (countCell) countCell.textContent = count;
                })
                .catch(e => {
                    var countCell = document.querySelector(`[data-source="${s.name}"] .count-cell`);
                    if (countCell) countCell.textContent = '❌';
                });
            
            // Get the actual timestamp from dataUpdatedTimes
            var jsonTime = dataUpdatedTimes[s.path] || '—';
            
            // Convert ISO to IST (UTC+5:30)
            var istTime = '—';
            if (jsonTime && jsonTime !== '—' && !jsonTime.includes('❌')) {
                try {
                    var date = new Date(jsonTime);
                    istTime = date.toLocaleString('en-IN', { timeZone: 'Asia/Kolkata' });
                } catch(e) {
                    istTime = jsonTime;
                }
            }
            
            // First file (unified-symbols) opens wizard, others load data
            var loadButton = '';
            if (index === 0) {

            }
            
            html += `<tr data-source="${s.name}">
                <td>${s.name}</td>
                <td class="count-cell">${count}</td>
                <td style="font-size:9px;">${istTime}</td>
                <td style="text-align:center;">${loadButton}</td>
            </tr>`;
        });
        document.getElementById('sources-table').innerHTML = html;

    function triggerWorkflow(pat, fetchType, source) {
        const url = `https://api.github.com/repos/${GITHUB_CONFIG.OWNER}/${GITHUB_CONFIG.REPO}/actions/workflows/fetch-prices.yml/dispatches`;
        
        fetch(url, {
            method: 'POST',
            headers: {
                'Authorization': `token ${pat}`,
                'Accept': 'application/vnd.github.v3+json'
            },
            body: JSON.stringify({
                ref: GITHUB_CONFIG.BRANCH,
                inputs: { fetch_type: fetchType }
            })
        })
        .then(r => {
            if (r.ok) {
                log(`✅ Workflow triggered! Waiting...`);
                showToast('⏳ Workflow running (30 sec)...');
                setTimeout(() => fetchUpdated(source), 30000);
            } else {
                return r.json().then(e => {
                    log(`❌ Workflow trigger failed: ${e.message}`);
                    showToast('❌ Failed');
                });
            }
        })
        .catch(e => {
            log(`❌ Error: ${e.message}`);
            showToast('❌ Error');
        });

    function mergeAndSaveData(source, data) {
        let priceMap = {}, fundMap = {};
        
        if (source === 'prices.json') {
            priceMap = data.quotes && typeof data.quotes === 'object' ? data.quotes : data;
            masterData.forEach((stock, i) => {
                if (priceMap[stock.ticker]) {
                    masterData[i] = {...masterData[i], ...priceMap[stock.ticker]};
                }
            });
            log(`✅ Merged prices into ${masterData.length} stocks`);
        } else if (source === 'fundamentals.json') {
            fundMap = data.stocks && typeof data.stocks === 'object' ? data.stocks : data;
            masterData.forEach((stock, i) => {
                if (fundMap[stock.ticker]) {
                    masterData[i] = {...masterData[i], ...fundMap[stock.ticker]};
                }
            });
            log(`✅ Merged fundamentals into ${masterData.length} stocks`);
        }
        
        // Save to IndexedDB
        var req = indexedDB.open(DB_NAME, DB_VERSION);
        req.onsuccess = (e) => {
            var db = e.target.result;
            var transaction = db.transaction(STORE_NAME, 'readwrite');
            var store = transaction.objectStore(STORE_NAME);
            store.clear();
            masterData.forEach(stock => store.put(stock));
            transaction.oncomplete = () => {
                log(`✅ Saved to IndexedDB`);
                renderSymbols();
                renderDataSources();
                showToast(`✅ ${source} merged & saved!`);
            };
        };
    }

    async function loadFromIndexedDB() {
        return new Promise((resolve) => {
            // Try opening with current version first, then with incremented version
            var attemptVersion = DB_VERSION;
            
            function attemptOpen(version) {
                var req = indexedDB.open(DB_NAME, version);
                
                req.onerror = () => {
                    masterData = [];
                    resolve();
                };
                
                req.onupgradeneeded = (e) => {
                    var db = e.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        db.createObjectStore(STORE_NAME, { keyPath: 'ticker' });
                    }
                };
                
                req.onsuccess = (e) => {
                    var db = e.target.result;
                    try {
                        if (!db.objectStoreNames.contains(STORE_NAME)) {
                            masterData = [];
                            resolve();
                            return;
                        }
                        
                        var transaction = db.transaction(STORE_NAME, 'readonly');
                        var store = transaction.objectStore(STORE_NAME);
                        var getAllReq = store.getAll();

                        getAllReq.onsuccess = () => {
                            masterData = getAllReq.result || [];
                            log(`✅ Loaded ${masterData.length} stocks from IndexedDB`);
                            resolve();
                        };
                        
                        getAllReq.onerror = () => {
                            masterData = [];
                            resolve();
                        };
                    } catch (e) {
                        masterData = [];
                        resolve();
                    }
                };
            }
            
            attemptOpen(attemptVersion);
        });
    }

    function saveGuidanceToGitHub(ticker, guidanceText, pat) {
        const apiUrl = `https://api.github.com/repos/${GITHUB_CONFIG.OWNER}/${GITHUB_CONFIG.REPO}/contents/${GITHUB_CONFIG.PATHS.guidance}`;
        
        var newGuidance = {};
        try {
            var lines = guidanceText.trim().split('\n');
            lines.forEach(line => {
                var colonIdx = line.indexOf(':');
                if (colonIdx > 0) {
                    var key = line.substring(0, colonIdx).trim().toLowerCase().replace(/\s+/g, '_');
                    var value = line.substring(colonIdx + 1).trim();
                    
                    if (key === 'key_commitments' && value) {
                        newGuidance[key] = value.split(';').map(s => s.trim());
                    } else if (key === 'risks_flagged' && value) {
                        newGuidance[key] = value.split(',').map(s => s.trim());
                    } else {
                        newGuidance[key] = value || null;
                    }
                }
            });
            
        } catch(e) {
            showToast(`❌ Parse error: ${e.message}`);
            updateStatusButton('❌ Error');
            return;
        }
        
        fetch(apiUrl, {
            headers: { 'Authorization': `token ${pat}` }
        })
        .then(r => r.ok ? r.json() : Promise.reject(`HTTP ${r.status}`))
        .then(fileData => {
            var content = {};
            try {
                content = JSON.parse(atob(fileData.content));
            } catch(e) {
                log(`⚠️ Could not parse existing file`);
            }
            
            if (!content[ticker]) content[ticker] = {};
            
            newGuidance.updated = new Date().toLocaleDateString('en-GB', { day: '2-digit', month: '2-digit', year: '2-digit' });
            content[ticker].guidance = newGuidance;
            guidanceTimestamps[ticker] = new Date().toISOString();
            guidanceData[ticker] = { ...guidanceData[ticker], guidance: newGuidance };
            saveGuidanceToStorage();
            
            const jsonString = JSON.stringify(content, null, 2);
            const encodedContent = btoa(unescape(encodeURIComponent(jsonString)));
            
            return fetch(apiUrl, {
                method: 'PUT',
                headers: {
                    'Authorization': `token ${pat}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    message: `Update guidance for ${ticker}`,
                    content: encodedContent,
                    sha: fileData.sha,
                    branch: GITHUB_CONFIG.BRANCH
                })
            });
        })
        .then(r => {
            if (!r?.ok) throw new Error('Failed to save');
            renderSymbols();
            updateStatusButton('✅ Ready');
            showToast('✅ Guidance updated!');
        })
        .catch(e => {
            updateStatusButton('❌ Error');
            showToast(`❌ Error: ${e.message}`);
        });
    }

    function deleteStock(ticker) {
        if (!confirm(`Delete ${ticker} permanently? (Removes from IndexedDB + Guidance)`)) return;
        
        var pat = document.getElementById('patToken').value;
        if (!pat) {
            log('❌ PAT required to delete');
            showToast('❌ Configure PAT first');
            return;
        }
        
        log(`🗑️ Deleting ${ticker}...`);
        showToast(`Deleting ${ticker}...`);
        
        // Remove from display immediately
        var row = document.getElementById(`row-${ticker}`);
        if (row) row.remove();
        
        // Remove from masterData
        masterData = masterData.filter(s => s.ticker !== ticker);
        
        // Remove from guidance data
        delete guidanceData[ticker];
        delete guidanceTimestamps[ticker];
        saveGuidanceToStorage();
        
        // Remove from IndexedDB
        return new Promise(resolve => {
            var req = indexedDB.open(DB_NAME, DB_VERSION);
            req.onsuccess = (e) => {
                var db = e.target.result;
                try {
                    var transaction = db.transaction(STORE_NAME, 'readwrite');
                    var store = transaction.objectStore(STORE_NAME);
                    store.delete(ticker);
                    transaction.oncomplete = () => {
                        log(`✅ Deleted ${ticker} from IndexedDB + Guidance`);
                        updateHeader();
                        resolve();
                    };
                } catch(err) {
                    log(`❌ IndexedDB delete failed: ${err.message}`);
                    resolve();
                }
            };
        }).then(() => {
            // Fetch current unified-symbols.json
            fetch('unified-symbols.json?cache=' + Date.now())
                .then(r => r.json())
                .then(data => {
                    // Remove ticker from symbols array
                    let symbols = data.symbols || Object.values(data);
                    symbols = symbols.filter(s => s.ticker !== ticker);
                    
                    // Prepare upload data
                    const uploadData = data.symbols ? { symbols: symbols } : symbols;
                    
                    // Upload back to GitHub
                    uploadToGitHub(pat, 'unified-symbols.json', uploadData, `Delete ${ticker}`);
                })
                .catch(e => {
                    log(`❌ Error: ${e.message}`);
                    showToast('❌ Failed to delete from GitHub');
                });
        });
    }
    
    function uploadToGitHub(pat, filename, content, message) {
        const apiUrl = `https://api.github.com/repos/${GITHUB_CONFIG.OWNER}/${GITHUB_CONFIG.REPO}/contents/${filename}`;
        
        // Step 1: GET current file to get SHA
        fetch(apiUrl, {
            headers: { 'Authorization': `token ${pat}` }
        })
        .then(r => r.json())
        .then(fileData => {
            // Step 2: PUT updated content with SHA
            const encodedContent = btoa(JSON.stringify(content, null, 2));
            
            return fetch(apiUrl, {
                method: 'PUT',
                headers: {
                    'Authorization': `token ${pat}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    message: message,
                    content: encodedContent,
                    sha: fileData.sha,
                    branch: GITHUB_CONFIG.BRANCH
                })
            });
        })
        .then(r => {
            if (r.ok) {
                log(`✅ Deleted from GitHub`);
                showToast('✅ Deleted!');
            } else {
                return r.json().then(e => {
                    log(`❌ Upload failed: ${e.message}`);
                    showToast('❌ Failed');
                });
            }
        })
        .catch(e => {
            log(`❌ Error: ${e.message}`);
            showToast('❌ Error');
        });
    }

    function saveChanges() {
        var pat = document.getElementById('patToken').value;
        if (!pat) {
            showToast('❌ PAT required to save');
            return;
        }
        
        log('💾 Saving changes...');
        
        // Get all edited values
        document.querySelectorAll('.qty-input').forEach(input => {
            var ticker = input.dataset.ticker;
            var newQty = parseFloat(input.value) || 0;
            var stock = masterData.find(s => s.ticker === ticker);
            if (stock) stock.qty = newQty;
        });
        
        document.querySelectorAll('.avg-input').forEach(input => {
            var ticker = input.dataset.ticker;
            var newAvg = parseFloat(input.value) || 0;
            var stock = masterData.find(s => s.ticker === ticker);
            if (stock) stock.avg = newAvg;
        });
        
        // Upload to GitHub
        uploadUnifiedSymbols(pat);
        
        // Save to IndexedDB
        var req = indexedDB.open(DB_NAME, DB_VERSION);
        req.onsuccess = (e) => {
            var db = e.target.result;
            var transaction = db.transaction(STORE_NAME, 'readwrite');
            var store = transaction.objectStore(STORE_NAME);
            
            // Add updated timestamp to all stocks
            const now = new Date().toLocaleTimeString();
            masterData.forEach(stock => {
                stock.updated = now;
                store.put(stock);
            });
            
            transaction.oncomplete = () => {
                log('✅ Changes saved to IndexedDB');
                editMode = false;
                document.querySelectorAll('.qty-input, .avg-input').forEach(el => el.disabled = true);
                document.getElementById('save-section').style.display = 'none';
                document.querySelector('button[onclick="toggleEditMode()"]').textContent = '🔧 Edit Mode: OFF';
                updateHeader();
                renderSymbols();
                showToast('✅ Saved!');
            };
        };
    }
    
    function uploadUnifiedSymbols(pat) {
        const url = `https://api.github.com/repos/${GITHUB_CONFIG.OWNER}/${GITHUB_CONFIG.REPO}/contents/unified-symbols.json`;
        
        // Fetch current file first
        fetch(`${RAW_GITHUB_URL}/unified-symbols.json`)
            .then(r => r.json())
            .then(currentData => {
                let symbols = currentData.symbols || [];
                
                // Update only changed stocks in the array
                symbols = symbols.map(stock => {
                    const updated = masterData.find(m => m.ticker === stock.ticker);
                    if (updated) {
                        // Only update QTY and AVG, keep other fields
                        return {
                            ...stock,
                            qty: updated.qty,
                            avg: updated.avg
                        };
                    }
                    return stock;
                });
                
                // Get SHA and upload
                fetch(url, {
                    headers: { 'Authorization': `token ${pat}` }
                })
                .then(r => r.json())
                .then(fileInfo => {
                    const fileContent = JSON.stringify({ symbols }, null, 2);
                    const encodedContent = btoa(fileContent);
                    
                    return fetch(url, {
                        method: 'PUT',
                        headers: {
                            'Authorization': `token ${pat}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            message: 'Update QTY/AVG via ETL Center',
                            content: encodedContent,
                            sha: fileInfo.sha
                        })
                    });
                })
                .then(r => {
                    if (r.ok) {
                        log('✅ Updated unified-symbols.json on GitHub');
                    } else {
                        log('❌ Upload failed');
                    }
                })
                .catch(e => {
                    log(`❌ Upload error: ${e.message}`);
                });
            })
            .catch(e => {
                log(`❌ Error: ${e.message}`);
            });
    }

    function cancelChanges() {
        editMode = false;
        document.querySelectorAll('.qty-input, .avg-input').forEach(el => el.disabled = true);
        document.getElementById('save-section').style.display = 'none';
        renderSymbols();
    }

        var link = document.createElement('a');
        link.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
        link.download = 'symbols.csv';

    async function loadAllData() {
        log('🚀 LOAD JSON initiated - clearing cache...');
        updateStatusButton('⏳ Clearing cache');
        showToast('Clearing cache and loading fresh data...');
        
        // Step 1: Clear IndexedDB
        await new Promise(resolve => {
            var req = indexedDB.deleteDatabase(DB_NAME);
            req.onsuccess = () => {
                log('✅ IndexedDB cleared');
                setTimeout(resolve, 300);
            };
            req.onerror = () => {
                log('⚠️ Could not clear IndexedDB');
                setTimeout(resolve, 300);
            };
        });
        
        // Step 2: Clear browser cache for JSON files
        localStorage.removeItem('dataUpdatedTimes');
        dataUpdatedTimes = {};
        log('✅ Browser cache cleared');
        
        // Step 3: Load fresh data from GitHub (sequential for reliability)
        log('📡 Fetching fresh data from GitHub (sequential)...');
        updateStatusButton('⏳ Loading');
        showProgress(true);
        
        const results = [];
        for (let i = 0; i < DATA_SOURCES.length; i++) {
            const source = DATA_SOURCES[i];
            const filename = source.path.split('/').pop();
            const data = await fetchGitHubData(source.path);
            results.push(data);
            
            // Update progress AFTER loading
            updateProgress(i + 1, DATA_SOURCES.length, filename);
            log(`✓ File ${i + 1}/${DATA_SOURCES.length}: ${filename}`);
        }
        
        showProgress(false);
        log('✅ All files loaded from GitHub');
        
        let symbolsData = results[0];
        let symbolsList = null;
        
        if (Array.isArray(symbolsData)) {
            symbolsList = symbolsData;
        } else if (symbolsData && symbolsData.symbols && Array.isArray(symbolsData.symbols)) {
            symbolsList = symbolsData.symbols;
        } else if (symbolsData && symbolsData.stocks && Array.isArray(symbolsData.stocks)) {
            symbolsList = symbolsData.stocks;
        } else if (symbolsData && typeof symbolsData === 'object') {
            symbolsList = Object.values(symbolsData);
        }
        
        // Debug: Check symbol structure
        if (symbolsList && symbolsList.length > 0) {
            const firstSym = symbolsList[0];
            log(`🔍 SYMBOL fields: ${Object.keys(firstSym).slice(0, 10).join(", ")}...`);
            if (firstSym.ltp !== undefined || firstSym.prev !== undefined) {
                log(`⚠️ ISSUE: Symbol has price fields! ltp=${firstSym.ltp}, prev=${firstSym.prev}`);
            }
        }
        
        if (!symbolsList || symbolsList.length === 0) {
            log('❌ Could not parse symbols data');
            updateStatusButton('❌ Failed');
            return;
        }
        
        const pricesData = results[1] || {};
        const fundamentalsData = results[2] || {};
        const guidanceFileData = results[3] || {};
        
        log('📦 Parsing results...');
        
        // Extract guidance data and timestamps
        if (guidanceFileData && typeof guidanceFileData === 'object') {
            Object.keys(guidanceFileData).forEach(ticker => {
                if (ticker !== '_metadata' && guidanceFileData[ticker]) {
                    guidanceData[ticker] = guidanceFileData[ticker];
                    // Store ISO timestamp from guidance.updated (DD/MM/YY format)
                    if (guidanceFileData[ticker].guidance && guidanceFileData[ticker].guidance.updated) {
                        var dateStr = guidanceFileData[ticker].guidance.updated;
                        var isoDate = convertDDMMYYtoISO(dateStr);
                        guidanceTimestamps[ticker] = isoDate;
                    }
                    if (guidanceFileData[ticker].insights && guidanceFileData[ticker].insights.updated) {
                        var dateStr = guidanceFileData[ticker].insights.updated;
                        var isoDate = convertDDMMYYtoISO(dateStr);
                        guidanceTimestamps[ticker] = isoDate;
                    }
                }
            });
            log(`✅ Loaded guidance data for ${Object.keys(guidanceData).length} stocks`);
        }
            saveGuidanceToStorage();
        
        let priceMap = {};
        if (pricesData.quotes && typeof pricesData.quotes === 'object' && !Array.isArray(pricesData.quotes)) {
            priceMap = pricesData.quotes;
            log('✅ Found prices in "quotes" wrapper');
        } else {
            priceMap = Object.keys(pricesData).some(k => k === k.toUpperCase()) ? pricesData : {};
        }
        
        let fundMap = {};
        if (fundamentalsData.stocks && typeof fundamentalsData.stocks === 'object' && !Array.isArray(fundamentalsData.stocks)) {
            fundMap = fundamentalsData.stocks;
            log('✅ Found fundamentals in "stocks" wrapper');
        } else {
            fundMap = Object.keys(fundamentalsData).some(k => k === k.toUpperCase()) ? fundamentalsData : {};
        }
        
        let mergedStocks = [];
        // Debug: Show what we're merging
        if (symbolsList.length > 0) {
            const firstSymbol = symbolsList[0];
            const firstPrice = priceMap[firstSymbol.ticker];
            log(`🔍 DEBUG Before merge: ${firstSymbol.ticker} | sym.ltp=${firstSymbol.ltp} | price.ltp=${firstPrice?.ltp}`);
        }
        let priceMatches = 0, fundMatches = 0;
        
        symbolsList.forEach(symbol => {
            const ticker = symbol.ticker || symbol.TICKER || symbol.name;
            if (!ticker) return;
            
            const priceData = priceMap[ticker];
            const fundData = fundMap[ticker];
            
            if (priceData) priceMatches++;
            if (fundData) fundMatches++;
            
            const merged = {
                ...symbol,
                ...(fundData || {}),
                ...(priceData || {}),
                ticker: ticker
            };
            
            mergedStocks.push(merged);
        });
        
        log(`✅ Merged data from all sources: ${mergedStocks.length} records enriched`);
        log(`📊 Price matches: ${priceMatches}/${symbolsList.length} | Fund matches: ${fundMatches}/${symbolsList.length}`);
        
        if (priceMatches === 0) log('⚠️ WARNING: No price data matched!');
        if (fundMatches === 0) log('⚠️ WARNING: No fundamentals data matched!');
        
        // Open DB without incrementing version - handle store deletion properly
        var req = indexedDB.open(DB_NAME, DB_VERSION);
        
        req.onupgradeneeded = (e) => {
            var db = e.target.result;
            try {
                if (db.objectStoreNames.contains(STORE_NAME)) {
                    db.deleteObjectStore(STORE_NAME);
                }
                db.createObjectStore(STORE_NAME, { keyPath: 'ticker' });
                log('✅ Object store created');
            } catch(err) {
                log(`⚠️ Upgrade error: ${err.message}`);
            }
        };
        
        req.onsuccess = (e) => {
            var db = e.target.result;
            try {
                var transaction = db.transaction(STORE_NAME, 'readwrite');
                var store = transaction.objectStore(STORE_NAME);
                
                // Clear old data first
                store.clear();
                
                masterData = mergedStocks;
                const now = new Date().toLocaleTimeString();
                let putCount = 0;
                
                mergedStocks.forEach(stock => {
                    stock.updated = now;
                    var putReq = store.put(stock);
                    putReq.onsuccess = () => putCount++;
                    putReq.onerror = () => log(`⚠️ Failed to save ${stock.ticker}: ${putReq.error}`);
                
                // Log sample data being saved
                if (mergedStocks.length > 0) {
                    const sample = mergedStocks[0];
                    log(`📌 Sample: ${sample.ticker} | LTP: ${sample.ltp} | PE: ${sample.pe} | OPM: ${sample.opm_pct}%`);
                }
                });
                
                transaction.oncomplete = () => {
                    log(`✅ Saved ${putCount}/${mergedStocks.length} records to IndexedDB`);
                    updateHeader();
                    renderSymbols();
                    renderDataSources();
                    updateStatusButton('✅ Ready');
                    showToast('✅ Load complete!');
                };
                
                transaction.onerror = () => {
                    log(`❌ Transaction aborted: ${transaction.error}`);
                    updateStatusButton('❌ Error');
                    showToast('❌ Failed to save data');
                };
                
                transaction.onabort = () => {
                    log(`❌ Transaction aborted`);
                    updateStatusButton('❌ Error');
                };
            } catch (err) {
                log(`❌ Error: ${err.message}`);
                updateStatusButton('❌ Error');
                showToast(`❌ Error: ${err.message}`);
            }
        };
        
        req.onerror = () => {
            log(`⚠️ Could not open IndexedDB: ${req.error}`);
            updateStatusButton('⚠️ Error');
        };
    }
    
    function convertDDMMYYtoISO(ddmmyyStr) {
        try {
            var parts = ddmmyyStr.split('/');
            if (parts.length === 3) {
                var day = parts[0];
                var month = parts[1];
                var year = '20' + parts[2];
                var isoStr = year + '-' + month + '-' + day + 'T00:00:00Z';
                return new Date(isoStr).toISOString();
            }
        } catch(e) {}
        return new Date().toISOString();
    }

    async function reloadAuto() {
        log('🔄 REFRESH: Quick reload from IndexedDB...');
        updateStatusButton('⏳ Syncing...');
        
        try {
            // Just reload from IndexedDB - no fetch, no clear
            await loadFromIndexedDB();
            loadGuidanceFromStorage();
            
            renderDataSources();
            renderSymbols();
            updateHeader();
            
            log(`✅ Synced ${masterData.length} records from IndexedDB`);
            updateStatusButton('✅ Ready');
            showToast('✅ Quick sync complete!');
        } catch (e) {
            log(`❌ Sync failed: ${e.message}`);
            updateStatusButton('❌ Error');
        }
    }
        

    function updateHeader() {
        document.getElementById('dbCountBox').textContent = masterData.length;
    }

    // Initialize with error handling
    (async () => {
        try {
            await init();
        } catch (err) {
            console.error('Init error:', err);
            document.body.innerHTML = '<div style="color:red;padding:20px;font-family:monospace;"><h2>Initialization Error</h2><pre>' + err.message + '</pre><p>' + err.stack + '</p></div>';
        }
    })();
