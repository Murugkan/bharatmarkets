<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
    <title>Onyx | DATA</title>
    <link rel="stylesheet" href="app-styles.css">
    <script src="app-core.js"></script>
    <style>
        body { background:#000; color:#fff; font-family:sans-serif; margin:0; padding-bottom:100px; }
        .sec { margin: 20px 15px; padding: 15px; background: #080808; border-radius: 8px; border: 1px solid #111; }
        input { width: 100%; background: #111; border: 1px solid #333; color: #fff; padding: 14px; border-radius: 4px; font-size: 15px; box-sizing: border-box; margin-bottom: 10px; }
        .btn-main { width: 100%; background: #00f2ff; color: #000; border: none; padding: 16px; font-weight: 900; border-radius: 4px; text-transform: uppercase; }
        #conn-status { float:right; padding: 4px 10px; border-radius: 4px; font-size: 9px; font-weight: 900; }
        .status-off { background: #311; color: #f44; border: 1px solid #f44; }
        .status-on { background: #131; color: #0f9; border: 1px solid #0f9; }
        #data-log { background: #000; border: 1px solid #222; padding: 10px; height: 120px; overflow-y: auto; font-size: 10px; color: #888; margin: 15px; border-radius: 4px; }
    </style>
</head>
<body>

<div class="sec">
    <div id="conn-status" class="status-off">DISCONNECTED</div>
    <h3 style="font-size:11px; color:#555; text-transform:uppercase;">0. System Connection</h3>
    <input type="password" id="gh-token" placeholder="GitHub PAT">
    <input type="text" id="gh-repo" placeholder="user/repo">
    <button class="btn-main" onclick="validatePAT()">Connect & Sync</button>
</div>

<div class="sec">
    <h3 style="font-size:11px; color:#555; text-transform:uppercase;">1. Import Engine</h3>
    <input type="file" id="csv-file" style="display:none" onchange="handleImport(this)">
    <button class="btn-main" style="background:#222; color:#00f2ff; border:1px solid #00f2ff;" onclick="document.getElementById('csv-file').click()">📂 Select CSV File</button>
    <button id="sync-btn" class="btn-main" style="display:none; background:#fff;" onclick="pushToCloud()">☁️ Push to GitHub</button>
</div>

<div id="data-log"></div>

<nav class="footer-nav">
    <a href="data.html" class="nav-item active">DATA</a>
    <a href="index.html" class="nav-item">PORTFOLIO</a>
</nav>

<script>
window.addEventListener('load', () => {
    document.getElementById('gh-token').value = S.settings.ghToken || '';
    document.getElementById('gh-repo').value = S.settings.ghRepo || '';
    refreshUI();
});

function refreshUI() {
    const b = document.getElementById('conn-status');
    const ok = S.settings._ghStatus === 'ok';
    b.innerText = ok ? 'CONNECTED' : 'DISCONNECTED';
    b.className = ok ? 'status-on' : 'status-off';
}

async function validatePAT() {
    const t = document.getElementById('gh-token').value.trim();
    const r = document.getElementById('gh-repo').value.trim();
    S.settings.ghToken = t; S.settings.ghRepo = r;
    dataLog("Validating...", "📡");
    try {
        const res = await fetch(`https://api.github.com/repos/${r}`, { headers: ghHeaders() });
        if(res.ok) {
            S.settings._ghStatus = 'ok';
            saveSettings(); refreshUI();
            dataLog("Success", "✅");
        }
    } catch(e) { dataLog("Failed", "❌"); }
}

async function handleImport(input) {
    if(!input.files.length) return;
    const file = input.files[0];
    dataLog(`Loading: ${file.name}`, "📂");
    try {
        window.pendingContent = await processSelectedFile(file);
        const lines = window.pendingContent.split('\n').length;
        dataLog(`Ready: ${lines} lines detected`, "🔍");
        document.getElementById('sync-btn').style.display = 'block';
    } catch(e) { dataLog("Read Error", "❌"); }
}

async function pushToCloud() {
    dataLog("Syncing to GitHub...", "☁️");
    const res = await ghPut('symbols.json', window.pendingContent, 'Update via iPhone');
    if(res.ok) dataLog("Cloud Sync Complete", "✅");
}
</script>
</body>
</html>
