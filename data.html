<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
    <title>Portfolio Data</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg:#000; --s1:#0a0a0a; --b1:#222; --bl:#00f2ff; --gr:#00ff88; --rd:#ff4d6d; --tx:#fff; }
        *{box-sizing:border-box;margin:0;padding:0;}
        body { background:var(--bg); color:var(--tx); font-family:'JetBrains Mono',monospace; padding-bottom:80px; }
        header { background:var(--s1); border-bottom:1px solid var(--b1); padding:12px; display:flex; justify-content:space-between; align-items:center; }
        .title { font-size:14px; font-weight:800; color:var(--bl); }
        .header-right { display:flex; gap:10px; }
        button { padding:8px 12px; background:#00ff88; color:#000; border:none; border-radius:4px; cursor:pointer; font-weight:bold; font-size:11px; }
        button:hover { opacity:0.9; }
        .container { padding:15px; max-width:100%; margin:0 auto; }
        .refresh-section { background:#0a0a0a; border:1px solid var(--b1); border-radius:8px; padding:15px; margin-bottom:20px; }
        .refresh-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(250px, 1fr)); gap:15px; }
        .refresh-card { background:#050505; border:1px solid var(--b1); border-radius:6px; padding:12px; }
        .refresh-card-title { font-size:11px; color:var(--bl); font-weight:800; margin-bottom:8px; }
        .refresh-btn { width:100%; padding:10px; background:var(--gr); color:#000; border:none; border-radius:4px; font-weight:bold; cursor:pointer; font-size:11px; transition: opacity 0.2s; }
        .refresh-btn:hover { opacity:0.9; }
        .refresh-btn:disabled { opacity:0.5; cursor:not-allowed; }
        .refresh-timestamp { font-size:9px; color:#666; margin-top:8px; }
        .refresh-status { font-size:9px; color:#888; margin-top:4px; font-style:italic; }
        .table-wrap { overflow-x:auto; background:#050505; border:1px solid var(--b1); border-radius:8px; margin-top:20px; max-height:600px; overflow-y:auto; }
        table { width:100%; border-collapse:collapse; font-size:10px; }
        th { background:#111; color:#00ff88; padding:8px; text-align:left; border-bottom:1px solid var(--b1); position:sticky; top:0; font-weight:800; }
        td { padding:8px; border-bottom:0.5px solid #111; }
        tr:hover { background:#0a0a0a; }
        .pos { color:#00ff88; }
        .neg { color:#ff6b85; }
        .editable { cursor:pointer; color:#00ff88; text-decoration:underline; }
        .editable:hover { opacity:0.8; }
        
        footer { position:fixed; bottom:0; width:100%; background:rgba(0,0,0,0.95); border-top:1px solid #222; display:flex; justify-content:space-around; padding:12px 0; z-index:1000; }
        .nav-btn { text-decoration:none; color:#666; display:flex; flex-direction:column; align-items:center; width:33%; padding:8px 0; transition:color 0.2s; }
        .nav-btn:hover { color:var(--bl); }
        .nav-btn.active { color:var(--bl); font-weight:800; }
        .nav-label { font-size:8px; margin-top:4px; font-weight:800; text-transform:uppercase; letter-spacing:1px; }
        
        .alert { padding:10px; margin:10px 0; border-radius:4px; font-size:11px; }
        .alert-success { background:#0a2a1a; color:#00ff88; border-left:3px solid #00ff88; }
        .alert-error { background:#2a0a0a; color:#ff6b85; border-left:3px solid #ff6b85; }
        .alert-info { background:#0a1a2a; color:#00f2ff; border-left:3px solid #00f2ff; }

        /* DQA Styles */
        .dqa-header { background:#0a0a0a; border:1px solid var(--b1); border-radius:8px; padding:15px; margin-bottom:20px; }
        .dqa-title { font-size:14px; font-weight:800; color:var(--bl); margin-bottom:12px; }
        .dqa-info { display:flex; gap:20px; flex-wrap:wrap; font-size:11px; align-items:center; }
        .dqa-stat { display:flex; flex-direction:column; }
        .dqa-label { color:#666; font-size:9px; margin-bottom:3px; }
        .dqa-value { color:var(--gr); font-weight:800; font-size:12px; }
        .dqa-reload { background:var(--gr); color:#000; border:none; padding:8px 12px; border-radius:4px; font-weight:bold; cursor:pointer; font-size:11px; }
        .dqa-reload:hover { opacity:0.9; }

        .dqa-table-container { 
          overflow-x:auto; 
          overflow-y:auto; 
          background:#050505; 
          border:1px solid var(--b1); 
          border-radius:8px; 
          max-height:65vh;
          -webkit-overflow-scrolling:touch;
          margin-top:20px;
        }

        .dqa-table { 
          width:100%; 
          border-collapse:collapse; 
          font-size:10px;
          position:relative;
        }

        .dqa-table thead tr {
          position:sticky;
          top:0;
          z-index:10;
          background:#111;
        }

        .dqa-table th {
          background:#111;
          color:var(--gr);
          padding:8px;
          text-align:left;
          border-bottom:2px solid var(--b1);
          font-weight:800;
          white-space:nowrap;
        }

        .dqa-table td {
          padding:8px;
          border-bottom:1px solid #111;
        }

        .dqa-sym {
          position:sticky;
          left:0;
          background:#0a0a0a;
          z-index:5;
          font-weight:800;
          color:var(--bl);
          font-family:'JetBrains Mono',monospace;
          min-width:70px;
          padding:8px !important;
        }

        .dqa-table thead .dqa-sym {
          background:#111;
          z-index:11;
        }

        .dqa-table tr:hover td { background:#0a0a0a; }
        .dqa-table tr:hover .dqa-sym { background:#111; }

        .dqa-name { max-width:120px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
        .dqa-cat { display:inline-block; padding:3px 8px; border-radius:3px; font-size:9px; font-weight:800; cursor:pointer; transition:opacity 0.2s; }
        .dqa-cat.portfolio { background:#003366; color:#00f2ff; }
        .dqa-cat.watchlist { background:#330066; color:#ff00ff; }
        .dqa-cat:hover { opacity:0.8; }
        
        .dqa-delete-btn { color:var(--rd); cursor:pointer; font-weight:bold; transition:opacity 0.2s; }
        .dqa-delete-btn:hover { opacity:0.7; }

        .input-edit {
          background:#111;
          border:1px solid var(--bl);
          color:var(--bl);
          padding:4px 6px;
          border-radius:3px;
          font-family:'JetBrains Mono',monospace;
          font-size:10px;
          width:70px;
        }
    </style>
</head>
<body>

<header>
    <div class="title">📊 PORTFOLIO DATA</div>
    <div class="header-right">
        <button onclick="window.location.href='nexus.html'">📥 Load</button>
        <button onclick="location.reload()">🔄 Reload</button>
    </div>
</header>

<div class="container">
    <div id="status-container"></div>
    
    <div class="refresh-section">
        <div class="refresh-grid">
            <div class="refresh-card">
                <div class="refresh-card-title">📈 Refresh Prices</div>
                <button class="refresh-btn" id="refresh-prices-btn" onclick="refreshPrices()">Refresh Prices</button>
                <div class="refresh-timestamp" id="prices-timestamp">Last Updated: Never</div>
            </div>
            <div class="refresh-card">
                <div class="refresh-card-title">💹 Refresh Fundamentals</div>
                <button class="refresh-btn" id="refresh-fundamentals-btn" onclick="refreshFundamentals()">Refresh Fundamentals</button>
                <div class="refresh-timestamp" id="fundamentals-timestamp">Last Updated: Never</div>
            </div>
            <div class="refresh-card">
                <div class="refresh-card-title">🔗 Full Sync & Reload</div>
                <button class="refresh-btn" id="refresh-sync-btn" onclick="fullSync()">Full Sync & Reload</button>
            </div>
        </div>
    </div>
    
    <div class="dqa-header">
        <div class="dqa-title">📊 DATA QUALITY AUDIT (DQA)</div>
        <div class="dqa-info">
            <div class="dqa-stat">
                <div class="dqa-label">Holdings</div>
                <div class="dqa-value" id="dqa-holdings">0</div>
            </div>
            <div class="dqa-stat">
                <div class="dqa-label">Fundamentals</div>
                <div class="dqa-value" id="dqa-fund-date">—</div>
            </div>
            <div class="dqa-stat">
                <div class="dqa-label">Prices</div>
                <div class="dqa-value" id="dqa-price-date">—</div>
            </div>
            <button class="dqa-reload" onclick="reloadDQA()">↻ Reload</button>
        </div>
    </div>

    <div class="dqa-table-container">
        <table class="dqa-table" id="dqa-table">
            <thead>
                <tr>
                    <th class="dqa-sym">SYM</th>
                    <th class="dqa-name">NAME</th>
                    <th>CAT</th>
                    <th>FUND</th>
                    <th>PRICE</th>
                    <th>QTY</th>
                    <th>AVG</th>
                    <th>✕</th>
                </tr>
            </thead>
            <tbody id="dqa-tbody">
                <tr><td colspan="8" style="text-align:center;padding:20px;color:#666;">Loading data from BharatEngineDB...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<footer>
    <a href="index.html" class="nav-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>
        <span class="nav-label">Portfolio</span>
    </a>
    <a href="data.html" class="nav-btn active">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"></path><path d="M21 3v5h-5"></path><path d="M21 12a9 9 0 0 1-9 9 9.76 9.76 0 0 1-6.74-2.74L3 16"></path><path d="M3 21v-5h5"></path></svg>
        <span class="nav-label">Data</span>
    </a>
</footer>

<script src="app-engine 4.js"></script>

<script>
var dqaState = {
    symbols: [],
    prices: null,
    fundamentals: null
};

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// Option 4: Integration Logic
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

async function loadDQAData() {
    try {
        // 1. Rehydrate the engine's MASTER_DATA from IndexedDB
        if (typeof rehydrateFromDB === 'function') {
            await rehydrateFromDB();
            
            // 2. Map MASTER_DATA to our local state
            dqaState.symbols = MASTER_DATA.map(s => ({
                ticker: s.sym || s.ticker,
                name: s.name || '-',
                type: s.type || 'portfolio',
                qty: s.qty || 0,
                avg: s.avg || 0
            }));

            // 3. Check JSON snapshots in localStorage for "Audit" status icons
            try {
                const p = localStorage.getItem('prices-json');
                const f = localStorage.getItem('fundamentals-json');
                if (p) dqaState.prices = JSON.parse(p);
                if (f) dqaState.fundamentals = JSON.parse(f);
            } catch(e) { console.warn("Cache parse error", e); }

            updateDQADisplay();
        } else {
            document.getElementById('dqa-tbody').innerHTML = '<tr><td colspan="8" style="color:var(--rd);">Error: Engine script not loaded.</td></tr>';
        }
    } catch (err) {
        console.error("DQA Load Error:", err);
    }
}

function updateDQADisplay() {
    document.getElementById('dqa-holdings').textContent = dqaState.symbols.length;
    
    if (dqaState.fundamentals?.updated) {
        document.getElementById('dqa-fund-date').textContent = new Date(dqaState.fundamentals.updated).toLocaleDateString();
    }
    if (dqaState.prices?.updated) {
        document.getElementById('dqa-price-date').textContent = new Date(dqaState.prices.updated).toLocaleDateString();
    }
    
    populateDQATable();
}

function populateDQATable() {
    const tbody = document.getElementById('dqa-tbody');
    tbody.innerHTML = '';
    
    if (dqaState.symbols.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:20px;color:#666;">No holdings found in BharatEngineDB.</td></tr>';
        return;
    }

    dqaState.symbols.forEach(s => {
        const row = document.createElement('tr');
        
        // Audit checks against cached JSON
        const hasFund = dqaState.fundamentals && dqaState.fundamentals[s.ticker];
        const hasPrice = dqaState.prices?.quotes && dqaState.prices.quotes[s.ticker];
        
        row.innerHTML = `
            <td class="dqa-sym">${s.ticker}</td>
            <td class="dqa-name">${s.name}</td>
            <td><span class="dqa-cat ${s.type}">${s.type}</span></td>
            <td>${hasFund ? '✅' : '❌'}</td>
            <td>${hasPrice ? '✅' : '❌'}</td>
            <td class="editable" onclick="editValue(this, '${s.ticker}', 'qty')">${s.qty}</td>
            <td class="editable" onclick="editValue(this, '${s.ticker}', 'avg')">${s.avg}</td>
            <td class="dqa-delete-btn" onclick="deleteSymbol('${s.ticker}')">✕</td>
        `;
        tbody.appendChild(row);
    });
}

function editValue(el, ticker, field) {
    const current = el.textContent;
    const input = document.createElement('input');
    input.className = 'input-edit';
    input.type = 'number';
    input.value = current;
    
    el.textContent = '';
    el.appendChild(input);
    input.focus();
    
    input.onblur = () => {
        const newVal = parseFloat(input.value) || 0;
        const sym = dqaState.symbols.find(s => s.ticker === ticker);
        if (sym) sym[field] = newVal;
        el.textContent = newVal;
        // In a real app, you'd trigger a DB update here
    };
}

function deleteSymbol(ticker) {
    if (confirm(`Remove ${ticker}?`)) {
        dqaState.symbols = dqaState.symbols.filter(s => s.ticker !== ticker);
        populateDQATable();
    }
}

function reloadDQA() { loadDQAData(); }

window.addEventListener('DOMContentLoaded', loadDQAData);
</script>
</body>
</html>
