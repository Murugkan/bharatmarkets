<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>Onyx | DATA</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="app-core.js"></script>
    <style>
        body { background:#000; color:#fff; font-family:sans-serif; margin:0; padding:15px; }
        .card { background:#0a0a0a; border:1px solid #1a1a1a; padding:15px; border-radius:8px; margin-bottom:15px; }
        .btn { width:100%; background:#00f2ff; color:#000; border:none; padding:15px; font-weight:800; border-radius:4px; margin-bottom:10px; }
        input { width:100%; background:#111; border:1px solid #333; color:#fff; padding:12px; margin-bottom:10px; box-sizing:border-box; font-size:16px; }
        .row { display:flex; justify-content:space-between; align-items:center; padding:12px 0; border-bottom:1px solid #111; }
        .u-grn { color:#00ff88; font-weight:700; }
        .u-red { color:#ff4444; font-weight:700; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="font-size:10px; color:#555; text-transform:uppercase;">1. GitHub Access</h2>
    <input type="password" id="pat" placeholder="GitHub PAT">
    <input type="text" id="repo" placeholder="username/repo">
    <button class="btn" onclick="saveAndTest()">SAVE & DIAGNOSE</button>
    <div id="gh-diag" style="display:none"></div>
</div>

<div class="card">
    <h2 style="font-size:10px; color:#555; text-transform:uppercase;">2. Import Portfolio</h2>
    <input type="file" id="file-in" style="display:none" onchange="processImport(this)">
    <button class="btn" style="background:#111; color:#00f2ff; border:1px solid #00f2ff" onclick="document.getElementById('file-in').click()">SELECT EXCEL/CSV</button>
</div>

<div id="res-card" class="card" style="display:none">
    <h2 style="font-size:10px; color:#00f2ff; text-transform:uppercase;">3. Stock Resolution</h2>
    <div id="res-list"></div>
</div>

<script>
function saveAndTest() {
    S.settings.ghToken = document.getElementById('pat').value;
    S.settings.ghRepo = document.getElementById('repo').value;
    localStorage.setItem('bm_settings', JSON.stringify(S));
    testGitHubConnection();
}

async function processImport(input) {
    if(!input.files[0]) return;
    const reader = new FileReader();
    reader.onload = async (e) => {
        const wb = XLSX.read(e.target.result, {type:'binary'});
        const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
        document.getElementById('res-card').style.display = 'block';
        const list = document.getElementById('res-list');
        list.innerHTML = '<div style="color:#555; font-size:12px;">Resolving symbols...</div>';

        let html = '';
        for(let r of rows) {
            const rawName = r["Company Name"] || r["Security Name"] || Object.values(r)[0];
            if(!rawName) continue;
            
            const result = await resolveSymbol(rawName);
            html += `
                <div class="row">
                    <div style="flex:1">
                        <div style="font-size:10px; color:#666">${rawName}</div>
                        <div class="${result ? 'u-grn' : 'u-red'}">${result ? result.symbol : 'FAILED'}</div>
                    </div>
                    <input type="text" placeholder="Ticker" 
                        style="width:90px; margin:0; padding:6px; font-size:12px"
                        value="${result ? result.symbol : ''}" 
                        onchange="updateAlias('${rawName}', this.value)">
                </div>`;
        }
        list.innerHTML = html;
    };
    reader.readAsBinaryString(input.files[0]);
}

window.onload = () => {
    document.getElementById('pat').value = S.settings.ghToken || '';
    document.getElementById('repo').value = S.settings.ghRepo || '';
};
</script>
</body>
</html>
