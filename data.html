<script>

/* ============================
   ✅ FIXED DB CONFIG (GLOBAL)
============================ /
var DB_NAME = "BharatEngineDB";       // FIXED
var STORE_NAME = "UnifiedStocks";     // FIXED


/ ============================
   ✅ FIX 1: loadPortfolioTable
============================ /
function loadPortfolioTable() {

    var request = indexedDB.open(DB_NAME, 1);

    request.onerror = function () {
        renderTable([]);
    };

    request.onsuccess = function (e) {
        var db = e.target.result;
        var tx = db.transaction(STORE_NAME, 'readonly');
        var store = tx.objectStore(STORE_NAME);
        var getAll = store.getAll();

        getAll.onsuccess = function () {
            var stocks = getAll.result || [];
            renderTable(stocks);
        };
    };
}


/ ============================
   ✅ FIX 2: renderTable mapping
============================ /
function renderTable(portfolio) {

    var tbody = document.getElementById('portfolio-body');

    if (portfolio.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8">No data loaded</td></tr>';
        return;
    }

    var html = '';

    portfolio.forEach(function (s) {

        var sym = s.sym || '-';                 // FIXED
        var name = s.name || '-';
        var type = (s.type || 'portfolio');     // FIXED
        var qty = s.qty || 0;
        var avg = s.avg || 0;
        var sector = s.sector || '-';
        var isin = s.isin || '-';

        html += '<tr>' +
            '<td>' + sym + '</td>' +
            '<td>' + name + '</td>' +
            '<td>' + type + '</td>' +
            '<td>' + qty + '</td>' +
            '<td>' + avg + '</td>' +
            '<td>' + sector + '</td>' +
            '<td>' + isin + '</td>' +
            '</tr>';
    });

    tbody.innerHTML = html;
}


/ ============================
   ✅ FIX 3: DQA loader (CRITICAL)
============================ /
function loadDQAData() {

    var dbRequest = indexedDB.open(DB_NAME, 1);

    dbRequest.onsuccess = function (event) {

        var db = event.target.result;
        var tx = db.transaction(STORE_NAME, 'readonly');
        var store = tx.objectStore(STORE_NAME);
        var getAllRequest = store.getAll();

        getAllRequest.onsuccess = function () {

            var stocks = getAllRequest.result;

            dqaState.symbols = stocks.map(function (stock) {
                return {
                    ticker: stock.sym,   // FIXED
                    name: stock.name,
                    type: (stock.type || 'portfolio').toLowerCase(), // FIXED
                    qty: stock.qty || 0,
                    avg: stock.avg || 0,
                    isin: stock.isin || '',
                    sector: stock.sector || ''
                };
            });

            updateDQADisplay();
        };
    };
}


/ ============================
   ✅ FIX 4: updateStock (optional safe fix)
============================ /
function updateStock(sym, updates) {

    var request = indexedDB.open(DB_NAME, 1);

    request.onsuccess = function (e) {

        var db = e.target.result;
        var tx = db.transaction(STORE_NAME, 'readwrite');
        var store = tx.objectStore(STORE_NAME);

        var get = store.get(sym);

        get.onsuccess = function () {

            var s = get.result;
            if (!s) return;

            if (updates.qty !== undefined) s.qty = updates.qty;
            if (updates.avg !== undefined) s.avg = updates.avg;

            store.put(s);
            loadPortfolioTable();
        };
    };
}


/ ============================
   ✅ FIX 5: deleteStock
============================ */
function deleteStock(sym) {

    if (!confirm('Delete ' + sym + '?')) return;

    var request = indexedDB.open(DB_NAME, 1);

    request.onsuccess = function (e) {

        var db = e.target.result;
        var tx = db.transaction(STORE_NAME, 'readwrite');
        var store = tx.objectStore(STORE_NAME);

        store.delete(sym);

        tx.oncomplete = function () {
            loadPortfolioTable();
        };
    };
}

</script>
