<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Portfolio Data</title>

<style>
:root {
  --bg:#000; --card:#0a0a0a; --border:#222;
  --green:#00ff88; --blue:#00f2ff; --red:#ff4d6d;
}

body { margin:0; background:var(--bg); color:#fff; font-family:monospace; }

/* HEADER /
header {
  padding:12px;
  background:#0a0a0a;
  border-bottom:1px solid var(--border);
  display:flex;
  justify-content:space-between;
}

button {
  background:var(--green);
  border:none;
  padding:8px 12px;
  font-weight:bold;
  cursor:pointer;
}

/ DQA TABLE /
.table-wrap {
  margin:15px;
  border:1px solid var(--border);
  border-radius:8px;
  overflow:auto;
}

table {
  width:100%;
  border-collapse:collapse;
  font-size:11px;
}

th {
  background:#111;
  color:var(--green);
  padding:8px;
  text-align:left;
}

td {
  padding:8px;
  border-bottom:1px solid #111;
  vertical-align:middle;   / ✅ FIXED /
}

/ DEBUG PANEL /
#debug-panel {
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  max-height:40%;
  background:#000;
  border-top:2px solid var(--green);
  overflow:auto;
  font-size:10px;
  display:none;
}

#debug-log {
  padding:10px;
  white-space:pre-wrap;
  color:#0f0;
}

.debug-btn {
  position:fixed;
  bottom:10px;
  right:10px;
  background:#00f2ff;
  color:#000;
  font-size:10px;
}
</style>
</head>

<body>

<header>
<div>📊 DATA QUALITY AUDIT (DQA)</div>
<div>
<button onclick="openImportWorkflow()">📥 Load</button>
<button onclick="loadDQA()">🔄 Reload</button>
</div>
</header>

<div class="table-wrap">
<table>
<thead>
<tr>
<th>SYM</th>
<th>NAME</th>
<th>TYPE</th>
<th>QTY</th>
<th>AVG</th>
<th>SECTOR</th>
<th>ISIN</th>
</tr>
</thead>
<tbody id="tbody">
<tr><td colspan="7">Loading...</td></tr>
</tbody>
</table>
</div>

<!-- DEBUG -->
<button class="debug-btn" onclick="toggleDebug()">🐞 Debug</button>

<div id="debug-panel">
<div id="debug-log"></div>
</div>

<script src="app-import.js"></script>

<script>

/ ===============================
   DEBUG LOGGER
=============================== /
var logs = [];

function log(msg){
  logs.push(msg);
  document.getElementById("debug-log").textContent = logs.join("\n");
}

function toggleDebug(){
  var panel = document.getElementById("debug-panel");
  panel.style.display = panel.style.display === "none" ? "block" : "none";
}

/ ===============================
   DB CONFIG (FIXED)
=============================== /
var DB_NAME = "BharatEngineDB";
var STORE = "UnifiedStocks";

/ ===============================
   LOAD DATA (FIXED)
=============================== /
function loadDQA(){

  log("Opening DB...");

  var req = indexedDB.open(DB_NAME,1);

  req.onerror = function(){
    log("❌ DB open failed");
    render([]);
  };

  req.onsuccess = function(e){

    log("✅ DB opened");

    var db = e.target.result;
    var tx = db.transaction(STORE,"readonly");
    var store = tx.objectStore(STORE);

    var getAll = store.getAll();

    getAll.onerror = function(){
      log("❌ Read failed");
      render([]);
    };

    getAll.onsuccess = function(){

      var stocks = getAll.result || [];

      log("Loaded stocks: " + stocks.length);

      var mapped = stocks.map(function(s){
        return {
          ticker: s.sym,                       // ✅ FIXED
          name: s.name,
          type: (s.type || "portfolio").toLowerCase(),
          qty: s.qty || 0,
          avg: s.avg || 0,
          sector: s.sector || "",
          isin: s.isin || ""
        };
      });

      render(mapped);
    };
  };
}

/ ===============================
   RENDER
=============================== /
function render(data){

  var tbody = document.getElementById("tbody");

  if(!data.length){
    tbody.innerHTML = "<tr><td colspan='7'>No Data</td></tr>";
    return;
  }

  var html = "";

  data.forEach(function(s){

    html += "<tr>"+
      "<td>"+safe(s.ticker)+"</td>"+
      "<td>"+safe(s.name)+"</td>"+
      "<td>"+s.type+"</td>"+
      "<td>"+s.qty+"</td>"+
      "<td>"+Number(s.avg).toFixed(2)+"</td>"+
      "<td>"+safe(s.sector)+"</td>"+
      "<td>"+safe(s.isin)+"</td>"+
    "</tr>";
  });

  tbody.innerHTML = html;

  log("Rendered rows: " + data.length);
}

/ ===============================
   SAFE HTML
=============================== /
function safe(str){
  if(!str) return "";
  var d=document.createElement("div");
  d.textContent=str;
  return d.innerHTML;
}

/ ===============================
   INIT
=============================== */
window.onload = function(){
  log("Page loaded");
  loadDQA();
};

</script>

</body>
</html>
