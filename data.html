<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
    <title>Onyx | DATA</title>
    <link rel="stylesheet" href="app-styles.css">
    <script src="app-core.js"></script>
    <style>
        .input-group { margin-bottom: 20px; }
        label { display: block; font-size: 10px; color: var(--tx3); margin-bottom: 8px; text-transform: uppercase; font-weight: 800; }
        
        /* Persistent Status Badge */
        #conn-status { 
            display: inline-block; padding: 4px 10px; border-radius: 4px; 
            font-size: 9px; font-weight: 900; margin-bottom: 15px; 
        }
        .status-off { background: #331111; color: #ff4444; border: 1px solid #ff4444; }
        .status-on { background: #113311; color: var(--gr); border: 1px solid var(--gr); }

        input { 
            width: 100%; background: #111; border: 1px solid #444; color: #fff; 
            padding: 14px; border-radius: 4px; font-size: 15px; box-sizing: border-box; transition: 0.3s;
        }
        input.success { border-color: var(--gr); box-shadow: 0 0 10px rgba(0,255,150,0.2); }
        input.error { border-color: #ff4444; }

        .btn-main { 
            width: 100%; background: var(--bl); color: #000; border: none; 
            padding: 16px; font-weight: 900; border-radius: 4px; text-transform: uppercase; transition: 0.2s;
        }
        .btn-main:disabled { background: #333; color: #666; }

        #data-log { 
            background: #000; border: 1px solid #222; padding: 12px; 
            height: 120px; overflow-y: auto; font-family: monospace; font-size: 10px; margin-top: 20px; color: #888;
        }
    </style>
</head>
<body>

<div class="sec" style="margin: 20px 15px;">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h3 style="font-size:11px; color:var(--tx3); text-transform:uppercase;">0. System Connection</h3>
        <div id="conn-status" class="status-off">OFFLINE</div>
    </div>

    <div class="input-group">
        <label>GitHub Token (PAT)</label>
        <input type="password" id="gh-token" placeholder="paste github_pat_...">
    </div>

    <div class="input-group">
        <label>Repository (user/repo)</label>
        <input type="text" id="gh-repo" placeholder="e.g. murugkan/bharatmarkets">
    </div>

    <button id="btn-connect" class="btn-main" onclick="validatePAT()">Connect & Sync Cloud</button>
</div>

<div class="sec" style="margin: 20px 15px;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
        <h3 style="font-size:11px; color:var(--tx3); text-transform:uppercase;">1. DQA // Symbol Audit</h3>
        <button onclick="reloadData()" style="background:none; border:none; color:var(--bl); font-size:10px; font-weight:bold;">RELOAD ↻</button>
    </div>
    <table style="width:100%; border-collapse:collapse; font-size:12px;">
        <tbody id="dqa-body"></tbody>
    </table>
</div>

<div id="data-log" style="margin: 0 15px;"></div>

<nav class="footer-nav">
    <a href="data.html" class="nav-item active">📂 DATA</a>
    <a href="index.html" class="nav-item">📊 PORTFOLIO</a>
</nav>

<script>
window.addEventListener('load', () => {
    loadState();
    document.getElementById('gh-token').value = S.settings.ghToken || '';
    document.getElementById('gh-repo').value = S.settings.ghRepo || '';
    refreshUIStatus();
    renderDQA();
});

function refreshUIStatus() {
    const badge = document.getElementById('conn-status');
    const isOk = S.settings._ghStatus === 'ok';
    badge.innerText = isOk ? 'CONNECTED' : 'DISCONNECTED';
    badge.className = isOk ? 'status-on' : 'status-off';
}

async function validatePAT() {
    const btn = document.getElementById('btn-connect');
    const tEl = document.getElementById('gh-token');
    const rEl = document.getElementById('gh-repo');
    
    const t = tEl.value.trim();
    const r = rEl.value.trim();
    
    if(!t || !r) return toast("Enter both Token and Repo");

    // UI Feedback: Loading
    btn.disabled = true;
    btn.innerText = "VERIFYING...";
    tEl.className = rEl.className = ''; 
    
    S.settings.ghToken = t;
    S.settings.ghRepo = r;
    
    dataLog("Checking GitHub API Access...", "📡");

    try {
        const res = await fetch(`https://api.github.com/repos/${r}`, {
            headers: ghHeaders()
        });

        if (res.ok) {
            dataLog("Success! Connection Established.", "✅");
            S.settings._ghStatus = 'ok';
            tEl.classList.add('success');
            rEl.classList.add('success');
            saveSettings();
            refreshUIStatus();
            toast("Cloud Connected Successfully");
        } else {
            dataLog("Auth Error: Check PAT/Repo Name", "❌");
            S.settings._ghStatus = 'dim';
            tEl.classList.add('error');
            rEl.classList.add('error');
            refreshUIStatus();
        }
    } catch (e) {
        dataLog("Network Error: Check Internet Connection", "⚠️");
        tEl.classList.add('error');
    } finally {
        btn.disabled = false;
        btn.innerText = "CONNECT & SYNC CLOUD";
    }
}

function renderDQA() {
    const body = document.getElementById('dqa-body');
    if (!body) return;
    body.innerHTML = SYMBOLS.length ? '' : '<tr><td style="color:#444; padding:20px; text-align:center;">Empty local storage.</td></tr>';
    
    SYMBOLS.forEach(s => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td style="padding:15px 5px; font-weight:800; color:var(--bl);">${s.sym}</td>
            <td style="color:#666; font-size:10px;">${(s.name || '').slice(0,18)}</td>
            <td style="text-align:right; color:#ff4444; font-size:10px;" onclick="removeSym('${s.sym}')">DELETE</td>
        `;
        body.appendChild(tr);
    });
}

function removeSym(sym) {
    if(confirm("Delete " + sym + "?")) {
        window.SYMBOLS = SYMBOLS.filter(x => x.sym !== sym);
        localStorage.setItem('bm_symbols', JSON.stringify(SYMBOLS));
        renderDQA();
    }
}

async function reloadData() {
    if(!requirePAT()) return;
    dataLog("Syncing Symbols from Cloud...", "☁️");
    const data = await ghFetchRaw('symbols.json');
    if(data) {
        window.SYMBOLS = data;
        localStorage.setItem('bm_symbols', JSON.stringify(data));
        renderDQA();
        dataLog("DQA Updated Successfully", "✅");
    }
}
</script>
</body>
</html>
