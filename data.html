<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
    <title>Portfolio Data</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg:#000; --s1:#0a0a0a; --b1:#222; --bl:#00f2ff; --gr:#00ff88; --rd:#ff4d6d; --tx:#fff; }
        *{box-sizing:border-box;margin:0;padding:0;}
        body { background:var(--bg); color:var(--tx); font-family:'JetBrains Mono',monospace; padding-bottom:80px; }
        body.modal-open { overflow:hidden; }
        
        header { background:var(--s1); border-bottom:1px solid var(--b1); padding:12px; display:flex; justify-content:space-between; align-items:center; }
        .title { font-size:14px; font-weight:800; color:var(--bl); }
        .header-right { display:flex; gap:10px; }
        button { padding:8px 12px; background:#00ff88; color:#000; border:none; border-radius:4px; cursor:pointer; font-weight:bold; font-size:11px; }
        button:hover { opacity:0.9; }
        
        .container { padding:15px; max-width:100%; margin:0 auto; }
        
        /* STEP 1 IMPORT SECTION */
        #import-section { background:#0a0a0a; border:1px solid var(--b1); border-radius:8px; padding:20px; margin-bottom:20px; }
        #file-drop-zone { padding:30px; border:2px dashed #333; border-radius:8px; text-align:center; cursor:pointer; background:#050505; transition:all 0.2s; }
        #file-drop-zone:hover { border-color:#00ff88; background:rgba(0,255,136,0.08); }
        #file-drop-zone.drag { border-color:#00ff88; background:rgba(0,255,136,0.15); }
        #step1-preview { margin:15px 0; }
        
        /* PORTFOLIO TABLE */
        .table-wrap { overflow-x:auto; background:#050505; border:1px solid var(--b1); border-radius:8px; margin-top:20px; max-height:600px; overflow-y:auto; }
        table { width:100%; border-collapse:collapse; font-size:10px; }
        th { background:#111; color:#00ff88; padding:8px; text-align:left; border-bottom:1px solid var(--b1); position:sticky; top:0; font-weight:800; }
        td { padding:8px; border-bottom:0.5px solid #111; }
        tr:hover { background:#0a0a0a; }
        
        /* WIZARD MODAL */
        #wizard-modal { position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(0,0,0,0.95); z-index:9000; display:none; align-items:center; justify-content:center; overflow-y:auto; }
        
        /* FOOTER NAV */
        footer { position:fixed; bottom:0; width:100%; background:rgba(0,0,0,0.95); border-top:1px solid #222; display:flex; justify-content:space-around; padding:12px 0; z-index:1000; }
        .nav-btn { text-decoration:none; color:#666; display:flex; flex-direction:column; align-items:center; width:33%; padding:8px 0; transition:color 0.2s; }
        .nav-btn:hover { color:var(--bl); }
        .nav-btn.active { color:var(--bl); font-weight:800; }
        .nav-label { font-size:8px; margin-top:4px; font-weight:800; text-transform:uppercase; letter-spacing:1px; }
    </style>
</head>
<body>

<header>
    <div class="title">📊 PORTFOLIO DATA</div>
    <div class="header-right">
        <button onclick="location.reload()">🔄 Reload</button>
    </div>
</header>

<!-- STEP 1: UPLOAD PORTFOLIO FILE -->
<div id="import-section" class="container">
    <h3 style="color:#00ff88;margin-bottom:15px;">📁 Step 1: Upload Portfolio File</h3>
    <div id="file-drop-zone" 
         ondrop="handleDrop(event)" 
         ondragover="handleDragOver(event)" 
         ondragleave="handleDragLeave(event)"
         onclick="document.getElementById('file-input').click()">
        <div style="font-size:32px;margin-bottom:10px;">📂</div>
        <div style="color:#fff;font-weight:bold;margin-bottom:5px;">Click or drag & drop CSV/XLS file</div>
        <div style="color:#666;font-size:12px;">Supports: CSV, XLS, XLSX, TSV</div>
    </div>
    <input type="file" id="file-input" accept=".csv,.xls,.xlsx,.tsv,.txt" style="display:none;" onchange="handleFileImport(this.files[0])">
    <div id="step1-status" style="margin:10px 0;font-size:12px;color:#666;"></div>
    
    <!-- BUTTON AT TOP -->
    <div id="wizard-start" style="display:none;margin:15px 0;text-align:center;">
        <button onclick="startWizardFromStep2()" style="padding:12px 24px;background:#00ff88;color:#000;border:none;border-radius:6px;cursor:pointer;font-weight:bold;font-size:12px;">Continue to Step 2 →</button>
    </div>
    
    <div id="step1-preview"></div>
</div>

<!-- PORTFOLIO TABLE -->
<div id="app" class="container">
</div>

<footer>
    <a href="#" class="nav-btn active">
        <div>📊</div>
        <div class="nav-label">Data</div>
    </a>
    <a href="#" class="nav-btn">
        <div>📈</div>
        <div class="nav-label">Analysis</div>
    </a>
    <a href="#" class="nav-btn">
        <div>⚙️</div>
        <div class="nav-label">Settings</div>
    </a>
</footer>

<script>
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// STEP 1: File Drop Handlers
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

function handleDrop(e) {
    e.preventDefault();
    e.stopPropagation();
    document.getElementById('file-drop-zone').classList.remove('drag');
    if (e.dataTransfer.files.length > 0) {
        handleFileImport(e.dataTransfer.files[0]);
    }
}

function handleDragOver(e) {
    e.preventDefault();
    document.getElementById('file-drop-zone').classList.add('drag');
}

function handleDragLeave(e) {
    document.getElementById('file-drop-zone').classList.remove('drag');
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// PORTFOLIO TABLE LOADER
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

function loadPortfolioTable() {
    openDB('BharatEngineDB', 1, function(db) {
        var tx = db.transaction('UnifiedStocks', 'readonly');
        var store = tx.objectStore('UnifiedStocks');
        var req = store.getAll();
        
        req.onsuccess = function() {
            var stocks = req.result || [];
            if (stocks.length === 0) {
                document.getElementById('app').innerHTML = '<div style="padding:20px;text-align:center;color:#666;">No portfolio data. Upload a file to get started.</div>';
                return;
            }
            renderPortfolioTable(stocks);
        };
    });
}

function renderPortfolioTable(stocks) {
    var html = '<h3 style="color:#00ff88;margin-bottom:15px;margin-top:30px;">Portfolio</h3>';
    html += '<div class="table-wrap"><table><tr style="background:#111;"><th>Stock</th><th style="text-align:right;">QTY</th><th style="text-align:right;">AVG</th><th>ISIN</th><th>Sector</th></tr>';
    
    stocks.forEach(s => {
        html += '<tr><td>' + s.name + '</td><td style="text-align:right;">' + s.qty + '</td><td style="text-align:right;">₹' + (s.avg ? s.avg.toFixed(2) : '-') + '</td><td style="font-size:9px;color:#666;">' + (s.isin || '-') + '</td><td style="font-size:9px;color:#666;">' + (s.sector || '-') + '</td></tr>';
    });
    
    html += '</table></div>';
    document.getElementById('app').innerHTML = html;
}

function openDB(dbName, version, cb) {
    var req = indexedDB.open(dbName, version);
    req.onupgradeneeded = function(e) {
        var db = e.target.result;
        if (!db.objectStoreNames.contains('UnifiedStocks')) {
            db.createObjectStore('UnifiedStocks', {keyPath: 'sym'});
        }
    };
    req.onsuccess = function() { cb(req.result); };
    req.onerror = function() { console.error('DB error'); };
}

window.addEventListener('DOMContentLoaded', loadPortfolioTable);
</script>

<!-- Import Wizard Module -->
<script src="app-import-COMPLETE.js"></script>

</body>
</html>
