<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
    <title>Onyx | DATA</title>
    <link rel="stylesheet" href="app-styles.css">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="app-core.js"></script>
    <style>
        body { background:#000; color:#fff; font-family:sans-serif; margin:0; padding-bottom:120px; }
        .sec { margin: 15px; padding: 15px; background: #080808; border-radius: 8px; border: 1px solid #111; }
        .btn-main { width: 100%; background: #00f2ff; color: #000; border: none; padding: 16px; font-weight: 900; border-radius: 4px; text-transform: uppercase; margin-top:10px; }
        .btn-sec { background:#222; color:#00f2ff; border:1px solid #00f2ff; padding:12px; border-radius:4px; font-weight:700; width:100%; margin-top:10px; }
        #data-log { background: #000; border: 1px solid #222; padding: 10px; height: 100px; overflow-y: auto; font-size: 10px; color: #888; border-radius: 4px; }
        .tab-btn { background:#111; color:#555; border:1px solid #222; padding:10px; flex:1; font-size:11px; font-weight:bold; }
        .tab-btn.active { background:#222; color:#00f2ff; border-color:#00f2ff; }
        .pill { padding:8px 15px; border-radius:20px; border:1px solid #333; font-size:10px; background:#111; color:#555; }
        .pill.active { background:#00f2ff; color:#000; border-color:#00f2ff; font-weight:bold; }
        .card { border: 1px solid #333; padding: 10px; margin-top: 10px; border-radius: 4px; overflow:hidden; }
        .duplicate { border-color: #FFBF00; background: #1a1400; }
        .unresolved { border-color: #ff4444; background: #110505; }
        .truncate { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 11px; }
        input[type="text"], textarea { background:#111; border:1px solid #333; color:#fff; padding:10px; border-radius:3px; width: 100%; box-sizing: border-box; }
    </style>
</head>
<body>
<div class="sec">
    <h3 style="font-size:10px; color:#555; text-transform:uppercase; margin-bottom:10px;">0. Connection</h3>
    <input type="text" id="pat" placeholder="GitHub PAT" style="margin-bottom:10px;">
    <input type="text" id="repo" placeholder="user/repo" style="margin-bottom:10px;">
    <button class="btn-main" onclick="connect()">Connect & Sync</button>
    <div id="conn-status" style="font-size:12px; margin-top:10px; color:#00f2ff; font-weight:bold;">Status: Not Connected</div>
</div>
<div class="sec" id="import-gate" style="opacity:0.3; pointer-events:none;">
    <h3 style="font-size:10px; color:#555; text-transform:uppercase; margin-bottom:10px;">1. Import</h3>
    <div style="display:flex; gap:5px; margin-bottom:15px;">
        <button id="tab-a-btn" class="tab-btn active" onclick="switchTab('A')">FILE UPLOAD</button>
        <button id="tab-b-btn" class="tab-btn" onclick="switchTab('B')">MANUAL ENTRY</button>
    </div>
    <div id="tab-a"><input type="file" id="f-in" style="display:none" onchange="handleFile(this)"><button class="btn-sec" onclick="document.getElementById('f-in').click()">📂 SELECT .CSV / .XLSX</button></div>
    <div id="tab-b" style="display:none;"><textarea id="m-in" rows="5" placeholder="Reliance, 10, 2500" oninput="liveParse()"></textarea></div>
    <div style="margin-top:15px; display:flex; align-items:center; gap:10px;">
        <span style="font-size:10px; color:#555;">CATEGORY:</span>
        <button id="p-port" class="pill active" onclick="setCat('Portfolio')">PORTFOLIO</button>
        <button id="p-watch" class="pill" onclick="setCat('Watchlist')">WATCHLIST</button>
    </div>
    <button id="res-btn" class="btn-main" style="display:none;" onclick="startResolution()">Resolve 0 Stocks</button>
</div>
<div id="res-panel" class="sec" style="display:none;">
    <h3 id="res-title" style="font-size:10px; color:#00f2ff; text-transform:uppercase;">Resolution Results</h3>
    <div id="res-list"></div>
    <div style="display:flex; gap:10px; margin-top:15px;"><button class="btn-main" onclick="finalize(true)">Replace All</button><button class="btn-main" style="background:#fff;" onclick="finalize(false)">Append</button></div>
</div>
<div class="sec"><div id="data-log"></div></div>
<nav class="footer-nav"><a href="data.html" class="nav-item active">DATA</a><a href="index.html" class="nav-item">PORTFOLIO</a></nav>
<script>
let rawStocks = [], resItems = [], unresItems = [], cat = 'Portfolio';
async function connect() {
    S.settings.ghToken = document.getElementById('pat').value; S.settings.ghRepo = document.getElementById('repo').value;
    const ok = await validatePAT();
    document.getElementById('conn-status').innerText = ok ? '✅ Connected' : '❌ Failed';
    if(ok) { document.getElementById('import-gate').style.opacity = '1'; document.getElementById('import-gate').style.pointerEvents = 'auto'; saveSettings(); }
}
function switchTab(t) {
    document.getElementById('tab-a').style.display = t === 'A' ? 'block' : 'none';
    document.getElementById('tab-b').style.display = t === 'B' ? 'block' : 'none';
    document.getElementById('tab-a-btn').classList.toggle('active', t === 'A');
    document.getElementById('tab-b-btn').classList.toggle('active', t === 'B');
}
function setCat(c) {
    cat = c; document.getElementById('p-port').classList.toggle('active', c === 'Portfolio');
    document.getElementById('p-watch').classList.toggle('active', c === 'Watchlist');
}
async function handleFile(input) { rawStocks = await parseFile(input.files[0]); updateResBtn(); }
function liveParse() {
    const lines = document.getElementById('m-in').value.split('\n').filter(l => l.includes(','));
    rawStocks = lines.map(l => { const p = l.split(','); return { name: p[0].trim(), qty: p[1].trim(), avg: p[2].trim() }; });
    updateResBtn();
}
function updateResBtn() { const btn = document.getElementById('res-btn'); btn.style.display = rawStocks.length ? 'block' : 'none'; btn.innerText = `Resolve ${rawStocks.length} Stocks`; }
async function startResolution() {
    document.getElementById('res-panel').style.display = 'block';
    const list = document.getElementById('res-list'); list.innerHTML = ''; resItems = []; unresItems = [];
    for(let s of rawStocks) {
        const dup = checkDuplicate(s.name);
        if(dup) { list.innerHTML += `<div class="card duplicate"><div class="truncate">[SKIP] ${s.name}</div></div>`; continue; }
        log(`Resolving: ${s.name}...`, "⏳");
        const yahoo = await searchYahoo(s.name);
        if(yahoo && yahoo.score > 70) {
            resItems.push({...s, sym: yahoo.quote.symbol, src: 'yahoo'});
            list.innerHTML += `<div class="card"><div>✅ ${yahoo.quote.symbol} (${s.name})</div></div>`;
        } else {
            const nse = await searchNSE(s.name);
            if(nse) { resItems.push({...s, sym: nse + '.NS', src: 'nse'}); list.innerHTML += `<div class="card"><div>✅ ${nse}.NS</div></div>`; }
            else { unresItems.push(s); renderUnresolved(); }
        }
    }
}
function renderUnresolved() {
    const list = document.getElementById('res-list');
    const html = unresItems.map((it, i) => `<div class="card unresolved"><div class="truncate">${it.name}</div><div style="display:flex; gap:5px; margin-top:5px;"><input type="text" id="fix-${i}" placeholder="Symbol" style="flex:1;"><button onclick="fixUnres(${i})" style="background:#00f2ff; border:none; padding:8px; border-radius:3px; font-weight:bold;">FIX</button></div></div>`).join('');
    list.innerHTML += html; unresItems = [];
}
function fixUnres(i) {
    const sym = document.getElementById(`fix-${i}`).value.toUpperCase();
    if(!sym) return;
    resItems.push({...rawStocks[i], sym: sym.includes('.') ? sym : sym + '.NS', src: 'manual'});
    log(`Fixed: ${sym}`, "✅");
}
async function finalize(isReplace) {
    log("Syncing...", "⏳");
    const entries = resItems.map(i => ({ sym: i.sym, name: i.name, isin: '', sector: '', category: cat, qty: i.qty, avg: i.avg, resolved: true }));
    const data = isReplace ? entries : [...window.SYMBOLS, ...entries];
    const r1 = await ghPut('symbols.json', JSON.stringify(data, null, 2), 'v9.8 Sync');
    if(r1.ok) {
        const txt = data.map(s => s.sym.replace('.NS', '')).join('\n');
        await ghPut('portfolio_symbols.txt', txt, 'v9.8 Sync');
        log("Sync Complete!", "🏆");
    }
}
function log(m, i) { const l = document.getElementById('data-log'); l.innerHTML = `<div>${i} ${m}</div>` + l.innerHTML; }
window.onload = () => { document.getElementById('pat').value = S.settings.ghToken; document.getElementById('repo').value = S.settings.ghRepo; };
</script>
</body>
</html>
