<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
    <title>Portfolio Data</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg:#000; --s1:#0a0a0a; --b1:#222; --bl:#00f2ff; --gr:#00ff88; --rd:#ff4d6d; --tx:#fff; }
        *{box-sizing:border-box;margin:0;padding:0;}
        body { background:var(--bg); color:var(--tx); font-family:'JetBrains Mono',monospace; padding-bottom:80px; }
        header { background:var(--s1); border-bottom:1px solid var(--b1); padding:12px; display:flex; justify-content:space-between; align-items:center; }
        .title { font-size:14px; font-weight:800; color:var(--bl); }
        .header-right { display:flex; gap:10px; }
        button { padding:8px 12px; background:#00ff88; color:#000; border:none; border-radius:4px; cursor:pointer; font-weight:bold; font-size:11px; }
        .container { padding:15px; max-width:100%; margin:0 auto; }
        
        /* DQA Styles */
        .dqa-header { background:#0a0a0a; border:1px solid var(--b1); border-radius:8px; padding:15px; margin-bottom:20px; }
        .dqa-title { font-size:14px; font-weight:800; color:var(--bl); margin-bottom:12px; }
        .dqa-info { display:flex; gap:20px; flex-wrap:wrap; font-size:11px; align-items:center; }
        .dqa-stat { display:flex; flex-direction:column; }
        .dqa-label { color:#666; font-size:9px; margin-bottom:3px; }
        .dqa-value { color:var(--gr); font-weight:800; font-size:12px; }
        
        .dqa-table-container { 
          overflow-x:auto; 
          background:#050505; 
          border:1px solid var(--b1); 
          border-radius:8px; 
          max-height:65vh;
          margin-top:20px;
        }

        table { width:100%; border-collapse:collapse; font-size:10px; }
        th { background:#111; color:var(--gr); padding:10px; text-align:left; border-bottom:2px solid var(--b1); position:sticky; top:0; }
        td { padding:10px; border-bottom:1px solid #111; }
        .dqa-sym { font-weight:800; color:var(--bl); }
        .dqa-cat { padding:2px 6px; border-radius:3px; font-size:9px; text-transform:uppercase; }
        .portfolio { background:#003366; color:#00f2ff; }
        .watchlist { background:#330066; color:#ff00ff; }
        
        footer { position:fixed; bottom:0; width:100%; background:rgba(0,0,0,0.95); border-top:1px solid #222; display:flex; justify-content:space-around; padding:12px 0; }
        .nav-btn { text-decoration:none; color:#666; font-size:8px; text-align:center; }
        .nav-btn.active { color:var(--bl); }
    </style>
</head>
<body>

<header>
    <div class="title">📊 PORTFOLIO DATA</div>
    <div class="header-right">
        <button onclick="location.reload()">🔄 Reload</button>
    </div>
</header>

<div class="container">
    <div class="dqa-header">
        <div class="dqa-title">📊 DATA QUALITY AUDIT (DQA)</div>
        <div class="dqa-info">
            <div class="dqa-stat">
                <div class="dqa-label">Holdings</div>
                <div class="dqa-value" id="dqa-holdings">0</div>
            </div>
            <div class="dqa-stat">
                <div class="dqa-label">Fundamentals</div>
                <div class="dqa-value" id="dqa-fund-date">—</div>
            </div>
            <div class="dqa-stat">
                <div class="dqa-label">Prices</div>
                <div class="dqa-value" id="dqa-price-date">—</div>
            </div>
            <button onclick="loadDQAData()" style="background:var(--gr); color:#000; padding:4px 8px; border-radius:4px; font-size:10px;">↻ Refresh Table</button>
        </div>
    </div>

    <div class="dqa-table-container">
        <table>
            <thead>
                <tr>
                    <th>SYM</th>
                    <th>NAME</th>
                    <th>CAT</th>
                    <th>FUND</th>
                    <th>PRICE</th>
                    <th>QTY</th>
                    <th>AVG</th>
                    <th>✕</th>
                </tr>
            </thead>
            <tbody id="dqa-tbody">
                <tr><td colspan="8" style="text-align:center;padding:20px;color:#666;">Initializing BharatEngine...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<footer>
    <a href="index.html" class="nav-btn">PORTFOLIO</a>
    <a href="data.html" class="nav-btn active">DATA</a>
    <a href="nexus.html" class="nav-btn">IMPORT</a>
</footer>

<script src="app-engine.Js"></script>

<script>
var dqaState = {
    symbols: [],
    prices: null,
    fundamentals: null
};

async function loadDQAData() {
    const tbody = document.getElementById('dqa-tbody');
    
    // Check for engine functions
    if (typeof rehydrateFromDB !== 'function') {
        tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:20px;color:var(--rd);">Error: Engine script (app-engine.Js) failed to load. Ensure filename matches exactly.</td></tr>';
        return;
    }

    try {
        await rehydrateFromDB();
        
        dqaState.symbols = (window.MASTER_DATA || []).map(function(s) {
            return {
                ticker: s.sym || s.ticker,
                name: s.name || '-',
                type: s.type || 'portfolio',
                qty: s.qty || 0,
                avg: s.avg || 0
            };
        });

        try {
            var p = localStorage.getItem('prices-json');
            var f = localStorage.getItem('fundamentals-json');
            if (p) dqaState.prices = JSON.parse(p);
            if (f) dqaState.fundamentals = JSON.parse(f);
        } catch(e) {}

        renderTable();
    } catch (err) {
        tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:20px;color:var(--rd);">DB Sync Error: ' + err.message + '</td></tr>';
    }
}

function renderTable() {
    var tbody = document.getElementById('dqa-tbody');
    document.getElementById('dqa-holdings').textContent = dqaState.symbols.length;
    
    if (dqaState.fundamentals && dqaState.fundamentals.updated) {
        document.getElementById('dqa-fund-date').textContent = new Date(dqaState.fundamentals.updated).toLocaleDateString();
    }
    if (dqaState.prices && dqaState.prices.updated) {
        document.getElementById('dqa-price-date').textContent = new Date(dqaState.prices.updated).toLocaleDateString();
    }

    tbody.innerHTML = '';
    
    if (dqaState.symbols.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:20px;color:#666;">No data found in BharatEngineDB.</td></tr>';
        return;
    }

    dqaState.symbols.forEach(function(s) {
        var hasFund = dqaState.fundamentals && dqaState.fundamentals[s.ticker];
        var hasPrice = dqaState.prices && dqaState.prices.quotes && dqaState.prices.quotes[s.ticker];
        
        var row = document.createElement('tr');
        row.innerHTML = `
            <td class="dqa-sym">${s.ticker}</td>
            <td>${s.name}</td>
            <td><span class="dqa-cat ${s.type}">${s.type}</span></td>
            <td>${hasFund ? '✅' : '❌'}</td>
            <td>${hasPrice ? '✅' : '
