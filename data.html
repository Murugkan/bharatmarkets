<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
    <title>Portfolio | Data</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --bg:#000; --s1:#0a0a0a; --b1:#222; --bl:#00f2ff; --gr:#00ff88; --rd:#ff4d6d; --tx:#fff; }
        *{box-sizing:border-box;margin:0;padding:0;}
        body { background:var(--bg); color:var(--tx); font-family:'JetBrains Mono',monospace; padding-bottom:80px; }
        
        header { background:var(--s1); border-bottom:1px solid var(--b1); padding:12px; display:flex; justify-content:space-between; align-items:center; }
        .title { font-size:14px; font-weight:800; color:var(--bl); }
        .header-right { display:flex; gap:10px; }
        button { padding:8px 12px; background:#00ff88; color:#000; border:none; border-radius:4px; cursor:pointer; font-weight:bold; font-size:11px; }
        button:hover { opacity:0.9; }
        
        .container { padding:15px; max-width:100%; margin:0 auto; }
        
        .table-wrap { overflow-x:auto; background:#050505; border:1px solid var(--b1); border-radius:8px; margin-top:20px; max-height:600px; overflow-y:auto; }
        table { width:100%; border-collapse:collapse; font-size:10px; }
        th { background:#111; color:#00ff88; padding:8px; text-align:left; border-bottom:1px solid var(--b1); position:sticky; top:0; font-weight:800; }
        td { padding:8px; border-bottom:0.5px solid #111; }
        tr:hover { background:#0a0a0a; }
        .pos { color:#00ff88; }
        .neg { color:#ff6b85; }
        
        /* Modal */
        .modal { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); display:none; align-items:center; justify-content:center; z-index:2000; overflow-y:auto; padding:20px 0; }
        .modal.show { display:flex; }
        .modal-content { background:#0a0a0a; border:1px solid #222; border-radius:8px; padding:20px; max-width:600px; width:90%; max-height:90vh; overflow-y:auto; }
        .modal-content h2 { color:#00f2ff; margin-bottom:15px; font-size:14px; }
        .modal-content label { display:block; margin-bottom:8px; font-size:11px; color:#888; }
        .modal-content input, .modal-content textarea { width:100%; padding:8px; background:#000; border:1px solid #222; color:#00ff88; border-radius:4px; font-family:monospace; font-size:10px; margin-bottom:10px; }
        .modal-content textarea { height:100px; resize:vertical; }
        .modal-btn { width:100%; padding:10px; background:#00ff88; color:#000; border:none; border-radius:4px; font-weight:bold; cursor:pointer; margin-bottom:10px; font-size:11px; }
        .modal-btn.close { background:#666; color:#fff; }
        .divider { text-align:center; color:#666; font-size:10px; margin:15px 0; }
        
        footer { position:fixed; bottom:0; width:100%; background:rgba(0,0,0,0.95); border-top:1px solid #222; display:flex; justify-content:space-around; padding:12px 0; z-index:1000; }
        .nav-btn { text-decoration:none; color:#666; display:flex; flex-direction:column; align-items:center; width:33%; padding:8px 0; transition:color 0.2s; }
        .nav-btn:hover { color:var(--bl); }
        .nav-btn.active { color:var(--bl); font-weight:800; }
        .nav-label { font-size:8px; margin-top:4px; font-weight:800; text-transform:uppercase; letter-spacing:1px; }
    </style>
</head>
<body>

<header>
    <div class="title">📊 PORTFOLIO DATA</div>
    <div class="header-right">
        <button onclick="openLoadWizard()">📥 Load</button>
        <button onclick="reloadData()">🔄 Reload</button>
        <button onclick="exportCSV()">📤 Export</button>
    </div>
</header>

<div class="container">
    <div class="table-wrap">
        <table id="portfolio-table">
            <thead>
                <tr>
                    <th>Symbol</th>
                    <th>Name</th>
                    <th>Type</th>
                    <th>QTY</th>
                    <th>AVG</th>
                    <th>LTP</th>
                    <th>Sector</th>
                    <th>ISIN</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="portfolio-body">
                <tr><td colspan="9" style="text-align:center;padding:20px;color:#666;">No data loaded. Click Load to add stocks.</td></tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Load Wizard Modal -->
<div id="load-modal" class="modal">
    <div class="modal-content">
        <h2>📥 Load Stocks - Step 1 of 2</h2>
        
        <label>Upload CSV, XLS, or TXT File:</label>
        <input type="file" id="file-input" accept=".csv,.txt,.xls,.xlsx">
        <button class="modal-btn" onclick="loadFile()">Load File</button>
        
        <div class="divider">OR</div>
        
        <label>Add Manually (one per line - Name,QTY,AVG):</label>
        <textarea id="manual-input" placeholder="HDFC Bank,84,817.50&#10;Reliance,10,2450&#10;TCS,20,3500"></textarea>
        <button class="modal-btn" onclick="loadManual()">Add Manually</button>
        
        <div class="divider">GitHub Sync (Optional)</div>
        
        <label>GitHub PAT (for symbol dictionary sync):</label>
        <input type="password" id="github-pat" placeholder="ghp_xxxxxxxxxxxx">
        <div style="font-size:9px;color:#666;margin-bottom:10px;">Leave empty to skip GitHub sync</div>
        
        <button class="modal-btn close" onclick="closeModal()">Close</button>
    </div>
</div>

<!-- Footer -->
<footer>
    <a href="index.html" class="nav-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>
        <span class="nav-label">Portfolio</span>
    </a>
    <a href="data.html" class="nav-btn active">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"></path><path d="M21 3v5h-5"></path><path d="M21 12a9 9 0 0 1-9 9 9.76 9.76 0 0 1-6.74-2.74L3 16"></path><path d="M3 21v-5h5"></path></svg>
        <span class="nav-label">Data</span>
    </a>
    <a href="portfolio.html" class="nav-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20"></path><path d="M2 12h20"></path></svg>
        <span class="nav-label">Reporting</span>
    </a>
</footer>

<script>
var portfolio = [];

function openLoadWizard() {
    document.getElementById('load-modal').classList.add('show');
}

function closeModal() {
    document.getElementById('load-modal').classList.remove('show');
    document.getElementById('file-input').value = '';
    document.getElementById('manual-input').value = '';
    document.getElementById('github-pat').value = '';
}

function loadFile() {
    var file = document.getElementById('file-input').files[0];
    if (!file) {
        alert('Select a file');
        return;
    }
    
    var filename = file.name.toLowerCase();
    var reader = new FileReader();
    
    if (filename.endsWith('.xls') || filename.endsWith('.xlsx')) {
        reader.onload = function(e) {
            try {
                var data = new Uint8Array(e.target.result);
                var workbook = XLSX.read(data, {type: 'array'});
                var sheet = workbook.Sheets[workbook.SheetNames[0]];
                var rows = XLSX.utils.sheet_to_json(sheet);
                parseXLS(rows);
            } catch(err) {
                alert('Error reading XLS: ' + err.message);
            }
        };
        reader.readAsArrayBuffer(file);
    } else {
        reader.onload = function(e) {
            parseCSV(e.target.result);
        };
        reader.readAsText(file);
    }
}

function parseCSV(text) {
    var lines = text.split('\n');
    var stocks = [];
    
    for (var i = 0; i < lines.length; i++) {
        var line = lines[i].trim();
        if (!line) continue;
        if (line.toLowerCase().includes('name') || line.toLowerCase().includes('stock')) continue;
        
        var parts = line.split(',');
        if (parts.length >= 3) {
            var name = parts[0].trim();
            var qty = parseInt(parts[1]) || 0;
            var avg = parseFloat(parts[2]) || 0;
            
            if (name && qty > 0 && avg > 0) {
                stocks.push({
                    sym: name.substring(0, 6).toUpperCase(),
                    name: name,
                    qty: qty,
                    avg: avg,
                    ltp: 0,
                    type: 'PORTFOLIO',
                    sector: '-',
                    isin: '-'
                });
            }
        }
    }
    
    if (stocks.length === 0) {
        alert('No valid stocks found. Format: Name,QTY,AVG');
        return;
    }
    
    addStocks(stocks);
}

function parseXLS(rows) {
    var stocks = [];
    
    for (var i = 0; i < rows.length; i++) {
        var row = rows[i];
        var name = row['Stock Name'] || row['Name'] || row['name'] || '';
        var qty = parseInt(row['QTY'] || row['Quantity'] || row['qty'] || 0) || 0;
        var avg = parseFloat(row['AVG'] || row['Average'] || row['avg'] || 0) || 0;
        
        if (name && qty > 0 && avg > 0) {
            stocks.push({
                sym: name.substring(0, 6).toUpperCase(),
                name: name,
                qty: qty,
                avg: avg,
                ltp: 0,
                type: 'PORTFOLIO',
                sector: '-',
                isin: '-'
            });
        }
    }
    
    if (stocks.length === 0) {
        alert('No valid stocks found in XLS');
        return;
    }
    
    addStocks(stocks);
}

function loadManual() {
    var text = document.getElementById('manual-input').value.trim();
    if (!text) {
        alert('Enter stock data');
        return;
    }
    parseCSV(text);
}

function addStocks(stocks) {
    for (var i = 0; i < stocks.length; i++) {
        portfolio.push(stocks[i]);
    }
    savePortfolio();
    closeModal();
    renderTable();
    alert('Loaded ' + stocks.length + ' stocks');
}

function deleteStock(idx) {
    if (!confirm('Delete ' + portfolio[idx].name + '?')) return;
    portfolio.splice(idx, 1);
    savePortfolio();
    renderTable();
}

function savePortfolio() {
    try {
        localStorage.setItem('portfolio-data', JSON.stringify(portfolio));
    } catch(e) {
        console.error('Error saving:', e);
    }
}

function loadPortfolio() {
    try {
        var data = localStorage.getItem('portfolio-data');
        portfolio = data ? JSON.parse(data) : [];
        renderTable();
    } catch(e) {
        console.error('Error loading:', e);
        portfolio = [];
    }
}

function renderTable() {
    var tbody = document.getElementById('portfolio-body');
    if (portfolio.length === 0) {
        tbody.innerHTML = '<tr><td colspan="9" style="text-align:center;padding:20px;color:#666;">No data loaded. Click Load to add stocks.</td></tr>';
        return;
    }
    
    var html = '';
    for (var i = 0; i < portfolio.length; i++) {
        var s = portfolio[i];
        html += '<tr>' +
            '<td>' + (s.sym || '-') + '</td>' +
            '<td>' + s.name + '</td>' +
            '<td>' + (s.type || '-') + '</td>' +
            '<td>' + s.qty + '</td>' +
            '<td>₹' + (s.avg || 0).toFixed(2) + '</td>' +
            '<td>₹' + (s.ltp || 0).toFixed(2) + '</td>' +
            '<td>' + (s.sector || '-') + '</td>' +
            '<td>' + (s.isin || '-') + '</td>' +
            '<td><button onclick="deleteStock(' + i + ')" style="background:#ff6b85;color:#fff;padding:2px 6px;font-size:9px;border:none;border-radius:2px;cursor:pointer;">✕</button></td>' +
            '</tr>';
    }
    tbody.innerHTML = html;
}

function reloadData() {
    loadPortfolio();
    alert('Reloaded');
}

function exportCSV() {
    var csv = 'Symbol,Name,Type,QTY,AVG,LTP,Sector,ISIN\n';
    for (var i = 0; i < portfolio.length; i++) {
        var s = portfolio[i];
        csv += s.sym + ',' + s.name + ',' + s.type + ',' + s.qty + ',' + s.avg + ',' + s.ltp + ',' + s.sector + ',' + s.isin + '\n';
    }
    var blob = new Blob([csv], {type:'text/csv'});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'stocks-' + new Date().toISOString().split('T')[0] + '.csv';
    a.click();
}

window.addEventListener('DOMContentLoaded', loadPortfolio);
</script>

</body>
</html>
