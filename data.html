<script>
async function processImport(input) {
    const reader = new FileReader();
    reader.onload = async (e) => {
        const wb = XLSX.read(e.target.result, {type:'binary'});
        const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
        document.getElementById('res-card').style.display = 'block';
        const list = document.getElementById('res-list');
        list.innerHTML = ''; // Clear "Processing..."

        for(let r of rows) {
            const rawName = r["Company Name"] || r["Security Name"] || Object.values(r)[0];
            if(!rawName) continue;

            const result = await resolveSymbol(rawName);
            const div = document.createElement('div');
            div.style.cssText = "display:flex; justify-content:space-between; align-items:center; padding:12px 0; border-bottom:1px solid #111";
            
            // If fallback is true, color it orange to show it's a guess
            const color = result ? (result.fallback ? '#ffbf47' : '#00ff88') : '#ff4444';
            
            div.innerHTML = `
                <div style="flex:1">
                    <div style="font-size:10px; color:#555">${rawName}</div>
                    <div style="color:${color}; font-weight:bold; font-family:monospace">${result ? result.symbol : 'FAILED'}</div>
                </div>
                <input type="text" placeholder="Ticker" 
                    style="width:90px; margin:0; padding:8px; background:#111; border:1px solid #333; color:#fff; font-size:12px;" 
                    value="${result ? result.symbol : ''}" 
                    onchange="updateAlias('${rawName}', this.value)">
            `;
            list.appendChild(div);
        }
    };
    reader.readAsBinaryString(input.files[0]);
}
</script>
