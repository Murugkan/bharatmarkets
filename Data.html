<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
    <title>Onyx | Data Terminal</title>
    <link rel="stylesheet" href="app-styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="app-core.js"></script>
</head>
<body>

<header style="text-align:center; margin: 20px 0 30px 0;">
    <div style="font-size:12px; font-weight:800; letter-spacing:4px; color:var(--bl); text-transform:uppercase;">
        TERMINAL // NEXUS
    </div>
</header>

<div class="sec">
    <div class="sec-hdr">
        <div>
            <div class="sec-title">⚙ PAT & Config</div>
            <div style="font-size:9px; color:var(--tx3)">GitHub token · repository · status</div>
        </div>
    </div>
    <div style="padding:12px 20px; display:flex; gap:20px; border-bottom:1px solid var(--b1);">
        <div style="display:flex; align-items:center; gap:6px;">
            <span class="dot dot-off" id="dot-token"></span>
            <span style="font-size:9px; color:var(--tx3); font-weight:800;">PAT</span>
        </div>
        <div style="display:flex; align-items:center; gap:6px;">
            <span class="dot dot-off" id="dot-repo"></span>
            <span style="font-size:9px; color:var(--tx3); font-weight:800;">REPO</span>
        </div>
    </div>
</div>

<div class="sec">
    <div class="sec-hdr">
        <div>
            <div class="sec-title">Local Portfolio Cache</div>
            <div id="cache-count" style="font-size:18px; font-weight:800; margin-top:5px;">0 STOCKS</div>
        </div>
        <div style="text-align:right">
            <div style="font-size:8px; color:#444; text-transform:uppercase;">Engine</div>
            <div style="font-size:11px; font-weight:800;">ONYX v8</div>
        </div>
    </div>
</div>

<div style="padding: 0 5px;">
    <button class="btn-main" style="background:var(--bl); color:#000; margin-bottom:12px;" onclick="UI.triggerFile()">
        📩 LOAD PORTFOLIO STOCKS LIST
    </button>
    
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:20px;">
        <button class="btn" style="background:var(--s1); color:var(--tx); border:1px solid var(--b1); padding:15px;" onclick="UI.openManual()">
            ⌨️ MANUAL
        </button>
        <button class="btn" style="background:var(--s1); color:var(--rd); border:1px solid var(--b1); padding:15px;" onclick="Core.wipeDB()">
            🗑️ WIPE
        </button>
    </div>
</div>

<div class="sec">
    <div class="sec-hdr">
        <div class="sec-title">DQA Table // Audit</div>
        <button class="btn btn-ghost" onclick="Core.syncToCloud()">REFRESH</button>
    </div>
    <div id="dqa-list" style="max-height:300px; overflow-y:auto;">
        <div style="padding:20px; text-align:center; font-size:10px; color:#333;">No audit data available.</div>
    </div>
</div>

<div class="sec">
    <div class="sec-hdr">
        <div class="sec-title">Workflow Engine</div>
    </div>
    <div style="padding:15px;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
            <span style="font-size:10px;">Prices Update</span>
            <span id="status-prices" style="font-size:10px; color:var(--tx3)">IDLE</span>
        </div>
        <button class="btn-main" style="padding:12px; font-size:10px; background:var(--b1); color:var(--tx);" onclick="Core.runWorkflow('prices_only')">RUN EXTRACTION</button>
    </div>
</div>

<div id="log-terminal">
    <div id="status-line">[SYSTEM] Terminal ready for ingestion...</div>
</div>

<input type="file" id="f-input" hidden onchange="Core.processFile(this)">

<script>
    /**
     * INITIALIZATION
     * Core logic is preserved in app-core.js
     */
    window.onload = () => {
        // 1. Check Auth (PAT/Repo)
        Core.updateStatusDots();
        
        // 2. Load and Render 109 Stocks if they exist
        UI.refreshCache();
        
        // 3. Start Terminal
        UI.log("Nexus Terminal Online - Version 8.0");
    };
</script>

</body>
</html>
